과 컴플라이언스 전문가를 대상으로 한 대규모 이벤트로서 70여개의 기업과 2만여명의 관람객이 참가하여 세계적 수준의 보안 솔루션과 서비스를 선보인다.</p>\n<p>지니언스는 2016년부터 올해로 연속 3번째 참가하여 IoT와 클라우드 시대 보안 위협에 대한 새로운 대처 방안을 제시한다. 네트워크를 보호하기 위해 접속하는 사용자의 단말의 상태를 식별, 인증, 통제하는 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 통해 단말의 일반정보 및 확장정보는 물론 단말의 위협 정보까지 제공하는 차세대 NAC의 메시지를 고객에게 선보인다.</p>\n<p>이를 통해 고객은 단말을 통해 발생할 수 있는 사이버 위협뿐 아니라 비즈니스 위협에도 대응할 수 있게 되며 가시성의 확대를 통해 단말로부터 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 있게 된다.</p>\n<p>과거 전시회 참가 목적이 브랜드와 제품을 1차적으로 인지시키는 수준에서 올해는 실질적인 성과를 거둬들이는 원년으로 삼았다. 싱가포르 현지 파트너인 저맷(Zermatt)사와 적극적인 협업을 통해 전시회 기획 단계부터 현지화된 부스 운영 및 고객 초청, 컨퍼런스 발표 등 다채로운 행사로 구성했다.</p>\n<p>특히, 싱가포르의 경우 NAC(Network Access Control : 네트워크 접근제어)의 도입률이 높고 시장이 성숙된 점을 감안해 기존 NAC 사용 고객의 Pain Points인 기존 네트워크와의 연동, 다양한 이기종 플랫폼과의 연동 이슈로 인한 구축의 어려움과 운영의 비효율화를 해결할 수 있는 방안을 제시해 윈백 시장을 적극 공략한다는 방침이다.</p>\n<p>지니언스 해외사업부 한형권 이사는 “금번 전시회는 불특정 다수가 아닌 철저한 타깃팅을 통해 NAC를 사용하고 있지만 구축 및 운영의 어려움 겪는 기업에게 해결책을 제시할 것이다”며 “고객 환경에 적합한 구축과 운영의 용이성을 강점으로 NAC 윈백 시장을 공략하는 총력을 다하겠다”고 밝혔다.</p>\n<p>한편, 지니언스 미국법인은 2019년 10월 6일부터 9일까지 두바이에서 개최되는 중동 최대 IT 전시회인 ‘GITEX(Gulf Information Technology Exhibition)’에 참가해 중동 시장 개척에 적극 나선다. 중동지역에서 BYOD(Bring Your Own Device)와 IoT가 큰 이슈로 대두됨에 따라 클라우드 및 네트워크 접점에 있는 모든 단말과 접근 경로에서의 위협을 해소할 수 있는 ‘지니안 NAC’의 차세대 메시지를 고객에게  어필한다는 계획이다.</p>\n<p>지니언스 김계연 미국법인장은 ““클라우드, IoT 등 IT 환경 변화에 따라 다양한 단말의 증가로 관리의 어려움과 관리되지 않은 단말의 잠재적인 보안 위협이 급속히 증가하고 있다”며 “지니안 NAC의 차세대 기술인 DPI(Device Platform Intelligence)를 통해 단말 식별 및 탐지의 정확성을 배가하고 보안관리 및 운영을 위한 확장정보와 위협 정보를 한눈에 파악해, 다양한 위협에 신속히 대응하고 해결하는 것이 지니언스 솔루션의 최대 강점”이라고 밝혔다.</p>\n<p>지니언스는 2016년 미국 법인설립을 필두로 글로벌 비즈니스에 진입하여 현재까지 전 세계 33개국의 34개 현지 파트너를 확보했다. 특히, 올해는 미국과 동남아를 넘어 유럽, 남미, 중동/아프리카 지역까지 파트너를 확보했다. 지니언스의 글로벌 비즈니스는 각 국가의 특성 및 현지화에 초점을 두고 진행하고 있다. 미국은 보안 관제 서비스 공급사(MSSP: Managed Security Services Providers)와 제휴를 통해 클라우드 기반으로 서비스를 제공하고 있으며 동남아 지역의 경우 현지 파트너를 통해 소프트웨어 라이선스 방식으로 사업을 진행하고 있다</p>", "body_text": "* **IoT &** **클라우드 시대 보안 위협의 새로운 대처 방안 제시…아태지역 NAC 윈백사업 강화**\n* **현지 파트너와 공동 진행…부스 운영, 세션 발표, 고객 상담 등 다채로운 행사 구성**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2019년 10월9일부터 10일까지 싱가포르에서 개최되는 ‘클라우드 & 사이버 시큐리티...", "full_text": "* **IoT &** **클라우드 시대 보안 위협의 새로운 대처 방안 제시…아태지역 NAC 윈백사업 강화**\n* **현지 파트너와 공동 진행…부스 운영, 세션 발표, 고객 상담 등 다채로운 행사 구성**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2019년 10월9일부터 10일까지 싱가포르에서 개최되는 ‘클라우드 & 사이버 시큐리티 엑스포(Cloud & Cyber Security Expo) 2019’에 참가한다. 아태지역 정보보안 분야의 최고 권위를 자랑하는 금번 전시회는 클라우드 보안과 컴플라이언스 전문가를 대상으로 한 대규모 이벤트로서 70여개의 기업과 2만여명의 관람객이 참가하여 세계적 수준의 보안 솔루션과 서비스를 선보인다.\n\n지니언스는 2016년부터 올해로 연속 3번째 참가하여 IoT와 클라우드 시대 보안 위협에 대한 새로운 대처 방안을 제시한다. 네트워크를 보호하기 위해 접속하는 사용자의 단말의 상태를 식별, 인증, 통제하는 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 통해 단말의 일반정보 및 확장정보는 물론 단말의 위협 정보까지 제공하는 차세대 NAC의 메시지를 고객에게 선보인다.\n\n이를 통해 고객은 단말을 통해 발생할 수 있는 사이버 위협뿐 아니라 비즈니스 위협에도 대응할 수 있게 되며 가시성의 확대를 통해 단말로부터 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 있게 된다.\n\n과거 전시회 참가 목적이 브랜드와 제품을 1차적으로 인지시키는 수준에서 올해는 실질적인 성과를 거둬들이는 원년으로 삼았다. 싱가포르 현지 파트너인 저맷(Zermatt)사와 적극적인 협업을 통해 전시회 기획 단계부터 현지화된 부스 운영 및 고객 초청, 컨퍼런스 발표 등 다채로운 행사로 구성했다.\n\n특히, 싱가포르의 경우 NAC(Network Access Control : 네트워크 접근제어)의 도입률이 높고 시장이 성숙된 점을 감안해 기존 NAC 사용 고객의 Pain Points인 기존 네트워크와의 연동, 다양한 이기종 플랫폼과의 연동 이슈로 인한 구축의 어려움과 운영의 비효율화를 해결할 수 있는 방안을 제시해 윈백 시장을 적극 공략한다는 방침이다.\n\n지니언스 해외사업부 한형권 이사는 “금번 전시회는 불특정 다수가 아닌 철저한 타깃팅을 통해 NAC를 사용하고 있지만 구축 및 운영의 어려움 겪는 기업에게 해결책을 제시할 것이다”며 “고객 환경에 적합한 구축과 운영의 용이성을 강점으로 NAC 윈백 시장을 공략하는 총력을 다하겠다”고 밝혔다.\n\n한편, 지니언스 미국법인은 2019년 10월 6일부터 9일까지 두바이에서 개최되는 중동 최대 IT 전시회인 ‘GITEX(Gulf Information Technology Exhibition)’에 참가해 중동 시장 개척에 적극 나선다. 중동지역에서 BYOD(Bring Your Own Device)와 IoT가 큰 이슈로 대두됨에 따라 클라우드 및 네트워크 접점에 있는 모든 단말과 접근 경로에서의 위협을 해소할 수 있는 ‘지니안 NAC’의 차세대 메시지를 고객에게  어필한다는 계획이다.\n\n지니언스 김계연 미국법인장은 ““클라우드, IoT 등 IT 환경 변화에 따라 다양한 단말의 증가로 관리의 어려움과 관리되지 않은 단말의 잠재적인 보안 위협이 급속히 증가하고 있다”며 “지니안 NAC의 차세대 기술인 DPI(Device Platform Intelligence)를 통해 단말 식별 및 탐지의 정확성을 배가하고 보안관리 및 운영을 위한 확장정보와 위협 정보를 한눈에 파악해, 다양한 위협에 신속히 대응하고 해결하는 것이 지니언스 솔루션의 최대 강점”이라고 밝혔다.\n\n지니언스는 2016년 미국 법인설립을 필두로 글로벌 비즈니스에 진입하여 현재까지 전 세계 33개국의 34개 현지 파트너를 확보했다. 특히, 올해는 미국과 동남아를 넘어 유럽, 남미, 중동/아프리카 지역까지 파트너를 확보했다. 지니언스의 글로벌 비즈니스는 각 국가의 특성 및 현지화에 초점을 두고 진행하고 있다. 미국은 보안 관제 서비스 공급사(MSSP: Managed Security Services Providers)와 제휴를 통해 클라우드 기반으로 서비스를 제공하고 있으며 동남아 지역의 경우 현지 파트너를 통해 소프트웨어 라이선스 방식으로 사업을 진행하고 있다"}, {"title": "국내 최대규모 NH농협은행 EDR 구축 사업…승자는 ‘지니언스’", "date": "2019.10.08", "link": "https://www.genians.co.kr/pr-room/press/국내-최대규모-nh농협은행-edr-구축-사업승자는-지니", "category": "EDR", "body_html": "<p>국내 최대 규모의 농협 EDR(단말 이상 행위 및 탐지 대응) 솔루션 구축 사업자로 지니언스가 선정된 것이 언론에 보도되었습니다.</p>\n<p>농협측은 EDR 솔루션의 철저한 검증을 진행하여 20~30여개 사의 솔루션을 테스트 했으며 이 과정에서 단말과의 통합성, 연계성 등에서 지니언스가 가장 높은 점수를 받았습니다.</p>\n<p>2019년 하반기 최대 EDR 사업을 지니언스가 수주 하면서 2020년 시장에서 가파른 성장을 할 것으로 기대하고 있습니다.</p>\n<p>많은 응원 부탁 드립니다.</p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=186617\">[디지털데일리] 국내 최대규모 NH농협은행 EDR 구축 사업…승자는 ‘지니언스’</a></p>", "body_text": "국내 최대 규모의 농협 EDR(단말 이상 행위 및 탐지 대응) 솔루션 구축 사업자로 지니언스가 선정된 것이 언론에 보도되었습니다.\n\n농협측은 EDR 솔루션의 철저한 검증을 진행하여 20~30여개 사의 솔루션을 테스트 했으며 이 과정에서 단말과의 통합성, 연계성 등에서 지니언스가 가장 높은 점수를 받았습니다.\n\n2019년 하반기 최대 EDR 사업을 지니언스가...", "full_text": "국내 최대 규모의 농협 EDR(단말 이상 행위 및 탐지 대응) 솔루션 구축 사업자로 지니언스가 선정된 것이 언론에 보도되었습니다.\n\n농협측은 EDR 솔루션의 철저한 검증을 진행하여 20~30여개 사의 솔루션을 테스트 했으며 이 과정에서 단말과의 통합성, 연계성 등에서 지니언스가 가장 높은 점수를 받았습니다.\n\n2019년 하반기 최대 EDR 사업을 지니언스가 수주 하면서 2020년 시장에서 가파른 성장을 할 것으로 기대하고 있습니다.\n\n많은 응원 부탁 드립니다.\n\n[[디지털데일리] 국내 최대규모 NH농협은행 EDR 구축 사업…승자는 ‘지니언스’](http://www.ddaily.co.kr/news/article/?no=186617)"}, {"title": "지니언스, NAC 부문 솔루션 대상 수상", "date": "2019.10.03", "link": "https://www.genians.co.kr/pr-room/press/지니언스-nac-부문-솔루션-대상-수상", "category": "NAC", "body_html": "<p>지니언스가 ‘2019 시큐리티 어워드 코리아’에서 네트워크접근제어(NAC) 부문 솔루션 대상을 수상하였습니다.</p>\n<p>‘지니안 NAC’는 통합 내부 네트워크 보안 플랫폼으로 IoT, 클라우드 등 새로운 네트워크 환경을 지원하며 단말/사용자에서 서비스까지 통합관리가 가능합니다.</p>\n<p>국내 NAC 시장의 부동의 시장 점유율 1위 이며 IT/OT에 특화된 단말 식별 및 탐지 기술인 DPI (Device Platform Intelligence)를 통해 단말의 일반정보는 물론 확정 정보화 취약점 정보까지 제공하여 생명주기 관리(Lifecycle Management)까지 업무 영역을 확대할 수 있습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/KakaoTalk_20191008_093659336.jpg?width=960&amp;height=721&amp;name=KakaoTalk_20191008_093659336.jpg\" /></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=83539&amp;kind=\">[보안뉴스] [시큐리티 어워드 코리아] 지니언스, NAC 부문 솔루션 대상 수상</a></p>", "body_text": "지니언스가 ‘2019 시큐리티 어워드 코리아’에서 네트워크접근제어(NAC) 부문 솔루션 대상을 수상하였습니다.\n\n‘지니안 NAC’는 통합 내부 네트워크 보안 플랫폼으로 IoT, 클라우드 등 새로운 네트워크 환경을 지원하며 단말/사용자에서 서비스까지 통합관리가 가능합니다.\n\n국내 NAC 시장의 부동의 시장 점유율 1위 이며 IT/OT에 특화된 단말 식별 및 ...", "full_text": "지니언스가 ‘2019 시큐리티 어워드 코리아’에서 네트워크접근제어(NAC) 부문 솔루션 대상을 수상하였습니다.\n\n‘지니안 NAC’는 통합 내부 네트워크 보안 플랫폼으로 IoT, 클라우드 등 새로운 네트워크 환경을 지원하며 단말/사용자에서 서비스까지 통합관리가 가능합니다.\n\n국내 NAC 시장의 부동의 시장 점유율 1위 이며 IT/OT에 특화된 단말 식별 및 탐지 기술인 DPI (Device Platform Intelligence)를 통해 단말의 일반정보는 물론 확정 정보화 취약점 정보까지 제공하여 생명주기 관리(Lifecycle Management)까지 업무 영역을 확대할 수 있습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/KakaoTalk_20191008_093659336.jpg?width=960&height=721&name=KakaoTalk_20191008_093659336.jpg)\n\n \n\n[[보안뉴스] [시큐리티 어워드 코리아] 지니언스, NAC 부문 솔루션 대상 수상](https://www.boannews.com/media/view.asp?idx=83539&kind=)"}, {"title": "이동범 지니언스 대표 “loT· 5G 특화한 보안 기술로 해외 시장 개척한다\"", "date": "2019.10.02", "link": "https://www.genians.co.kr/pr-room/press/이동범-지니언스-대표-lot-5g-특화한-보안-기술로-해외", "category": "기타 뉴스", "body_html": "<p>지니언스의 NAC솔루션 “지니안 NAC”의 차세대 기술인 DPI(Device Platform Intelligence) 사물인터넷과 5G시대에 특화된 기술로 소개되었습니다.</p>\n<p>DPI는 단말 식별 및 탐지의 정확성을 배가하고 보안관리 및 운영을 위한 확장정보와 위협 정보를 한눈에 파악해, 다양한 위협에 신속히 대응하고 해결하는 것이 특징입니다.</p>\n<p>이를 통해 고객은 단말을 통해 발생할 수 있는 사이버 위협뿐 아니라 비즈니스 위협에도 대응할 수 있게 되며 가시성의 확대를 통해 단말로부터 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 게 됩니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/111.jpg?width=808&amp;height=606&amp;name=111.jpg\" /></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2019/10/03/2019100300451.html\">[IT조선] 이동범 지니언스 대표 \"loT· 5G 특화한 보안 기술로 해외 시장 개척한다\"</a></p>", "body_text": "지니언스의 NAC솔루션 “지니안 NAC”의 차세대 기술인 DPI(Device Platform Intelligence) 사물인터넷과 5G시대에 특화된 기술로 소개되었습니다.\n\nDPI는 단말 식별 및 탐지의 정확성을 배가하고 보안관리 및 운영을 위한 확장정보와 위협 정보를 한눈에 파악해, 다양한 위협에 신속히 대응하고 해결하는 것이 특징입니다.\n\n이를 통해 고...", "full_text": "지니언스의 NAC솔루션 “지니안 NAC”의 차세대 기술인 DPI(Device Platform Intelligence) 사물인터넷과 5G시대에 특화된 기술로 소개되었습니다.\n\nDPI는 단말 식별 및 탐지의 정확성을 배가하고 보안관리 및 운영을 위한 확장정보와 위협 정보를 한눈에 파악해, 다양한 위협에 신속히 대응하고 해결하는 것이 특징입니다.\n\n이를 통해 고객은 단말을 통해 발생할 수 있는 사이버 위협뿐 아니라 비즈니스 위협에도 대응할 수 있게 되며 가시성의 확대를 통해 단말로부터 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 게 됩니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/111.jpg?width=808&height=606&name=111.jpg)\n\n[[IT조선] 이동범 지니언스 대표 \"loT· 5G 특화한 보안 기술로 해외 시장 개척한다\"](http://it.chosun.com/site/data/html_dir/2019/10/03/2019100300451.html)"}, {"title": "지니언스, ‘지니안 인사이츠 E’…단말 이상행위 분석해 실행단계서 차단", "date": "2019.09.30", "link": "https://www.genians.co.kr/pr-room/press/지니언스-지니안-인사이츠-e단말-이상행위-분", "category": "기타 뉴스", "body_html": "<p>지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’가 전자신문 특집 기사에 게재되었습니다.</p>\n<p>‘지니안 인사이츠 E’ 는 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있는 제품입니다.</p>\n<p>안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있습니다.</p>\n<p>특히, 단말 이상행위 분석에 특화된 ‘레드스톤소프트’를 인수하여 행위기반 위협탐지 기술(XBA)을 내재화 하였으며 이를 통해 신/변종 랜섬웨어 및 파일리스(Fileless)공격까지 탐지 및 대응이 가능한 위협대응 포트폴리오를 완성하였습니다.</p>\n<p>[그림 1] ‘지니안 인사이츠 E’의 악성코드 및 이상행위 모니터링 대쉬 보드</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-3.jpg?width=1550&amp;height=657&amp;name=1-3.jpg\" /></p>\n<p>[그림 2] 지니언스 EDR 솔루션 '지니안 인사이츠 E (Genian Insight E)</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/I_E-3.jpg?width=2362&amp;height=2362&amp;name=I_E-3.jpg\" /></p>\n<p><a href=\"http://www.etnews.com/20190930000147\">[전자신문] [기획]지니언스 '지니안 인사이츠 E'…단말 이상행위 분석해 실행단계서 공격 차단</a></p>", "body_text": "지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’가 전자신문 특집 기사에 게재되었습니다.\n\n‘지니안 인사이츠 E’ 는 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있는 제품입니다.\n\n안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기 하는 사이버 공격 철벽방어... 'EDR' 시대 로딩 중](http://www.etnews.com/20190930000091)"}, {"title": "지니언스, 30일 올쇼티비서 '네트워크 가시성 확보 DPI' 제시", "date": "2019.09.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-30일-올쇼티비서-네트워크-가시성-확보-dpi-제", "category": "기타 뉴스", "body_html": "<p>지니언스(대표 이동범)는 30일 오후 3시 전자신문 웨비나 전문방송 올쇼티비에서 '네트워크 가시성을 높이기 위한 DPI(Device Platform Intelligence)기술'을 소개한다.</p>\n<p>기업 네트워크는 더 이상 데스크톱과 스마트폰 전유물이 아니다. 업무용 패드, 스캐너, AP(Access Point), 감시카메라(IP Camera), 디지털 도어, 방범 장치, 기타 사물인터넷(IoT) 장비까지 늘었다. 이를 노린 사이버 위협도 증가했다. 완벽한 관리와 보안을 위해서 네트워크 환경을 이해해야 한다. 네트워크에 존재하는 단말과 사물을 정확히 인지할 수 있는 기술이 필요하다.</p>\n<p>지니언스는 네트워크상 단말을 정확히 탐지하고 식별할 수 있는 DPI 기술을 소개한다. DPI는 자동으로 네트워크에 존재하는 단말을 탐지하고 정확히 식별한다. 단말 종류뿐 아니라 제조사와 이미지 그리고 취약성 정보까지 연관된 다양한 정보를 제공한다.</p>\n<p>이를 통해 단말에서 발생할 수 있는 사이버 위협뿐만 아니라 비즈니스 위협에도 대응할 수 있다. 가시성 확대를 통해 단말에서 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 있다. DPI는 단순히 단말 정보 분석만을 위한 솔루션이 아니다.</p>\n<p>웨비나는 올쇼티비 사이트에서 등록하면 무료로 참여할 수 있다.</p>\n<p>http://www.allshowtv.com/detail.html?idx=93</p>", "body_text": "지니언스(대표 이동범)는 30일 오후 3시 전자신문 웨비나 전문방송 올쇼티비에서 '네트워크 가시성을 높이기 위한 DPI(Device Platform Intelligence)기술'을 소개한다.\n\n기업 네트워크는 더 이상 데스크톱과 스마트폰 전유물이 아니다. 업무용 패드, 스캐너, AP(Access Point), 감시카메라(IP Camera), 디지털 도어, ...", "full_text": "지니언스(대표 이동범)는 30일 오후 3시 전자신문 웨비나 전문방송 올쇼티비에서 '네트워크 가시성을 높이기 위한 DPI(Device Platform Intelligence)기술'을 소개한다.\n\n기업 네트워크는 더 이상 데스크톱과 스마트폰 전유물이 아니다. 업무용 패드, 스캐너, AP(Access Point), 감시카메라(IP Camera), 디지털 도어, 방범 장치, 기타 사물인터넷(IoT) 장비까지 늘었다. 이를 노린 사이버 위협도 증가했다. 완벽한 관리와 보안을 위해서 네트워크 환경을 이해해야 한다. 네트워크에 존재하는 단말과 사물을 정확히 인지할 수 있는 기술이 필요하다.\n\n지니언스는 네트워크상 단말을 정확히 탐지하고 식별할 수 있는 DPI 기술을 소개한다. DPI는 자동으로 네트워크에 존재하는 단말을 탐지하고 정확히 식별한다. 단말 종류뿐 아니라 제조사와 이미지 그리고 취약성 정보까지 연관된 다양한 정보를 제공한다.\n\n이를 통해 단말에서 발생할 수 있는 사이버 위협뿐만 아니라 비즈니스 위협에도 대응할 수 있다. 가시성 확대를 통해 단말에서 야기될 수 있는 종합적인 위험을 효과적으로 관리할 수 있다. DPI는 단순히 단말 정보 분석만을 위한 솔루션이 아니다.\n\n웨비나는 올쇼티비 사이트에서 등록하면 무료로 참여할 수 있다.\n\nhttp://www.allshowtv.com/detail.html?idx=93"}, {"title": "지니언스, 글로벌 비즈니스 가속화…33개국 34개 현지 파트너 확보", "date": "2019.09.09", "link": "https://www.genians.co.kr/pr-room/press/지니언스-글로벌-비즈니스-가속화33개국-34개-현지-파", "category": "비즈니스 & 성과", "body_html": "<p>지니언스(263860, 대표이사 이동범)의 글로벌 비즈니스가 탄력을 받고 있다. 지니언스는 현재까지 전 세계 33개국의 34개 현지 파트너를 확보했다고 밝혔다. 특히, 올해에는 미국과 동남아를 넘어 유럽, 남미, 중동/아프리카 지역까지 파트너를 확보해 비즈니스 영역을 전 세계로 확장하고 있다.</p>\n<p>미국 진출을 필두로 시작된 지니언스의 글로벌 비즈니스는 각 국가의 특성 및 현지화에 초점을 두고 진행해 왔다. 미국은 보안 관제 서비스 공급사(MSSP: Managed Security Services Providers)와 제휴를 통해 클라우드 기반으로 서비스를 제공하고 있으며 동남아 지역의 경우 현지 파트너를 통해 소프트웨어 라이선스 방식으로 사업을 진행하고 있다.</p>\n<p>글로벌 시장 진입 초기에는 정부의 해외지원 사업과 해외 유수의 전시회를 통해 파트너를 발굴했지만 올해는 해외 파트너사나 기업이 직접 지니언스를 인바운드로 컨택 하는 빈도가 잦아졌다. 이는 가트너가 발표한 네트워크 접근제어 마켓가이드에 시스코와 함께 대표기업으로 지니언스가 선정된 것과 ‘지니언스 APAC 서밋(Genians APAC Summit)’을 통해 동남아 지역에서의 기업 인지도가 향상됐기 때문으로 풀이된다.</p>\n<p>동남아 지역의 NAC 시장은 국가별로 차이가 있어 그 전략도 차별화로 접근하고 있다. 성장기에 있는 필리핀, 말레이시아, 태국은 ‘지니언스 NAC’의 제품의 우수한 기술력을 근간으로 온라인으로 지원되는 빠른 기술지원, 제품의 직관적인 인터페이스로 쉽게 개발 및 구현이 가능한 점을 고객에게 어필하고 있다.</p>\n<p>성숙기로 분류되는 싱가포르의 경우 기존 사용하고 있는 NAC 제품보다 다양한 기능을 제공하고 편리성을 강조하여 윈백을 강화하는 쪽에 포커싱을 두고 있다. 도입기인 인도네시아는 컴플라이언스 이슈가 증가하면서 금융권을 대상으로 비즈니스를 강화하고 있다.</p>\n<p>고객군별로는 지난해 태국의 치앙마이대학교, 타이항공을 수주한 이래 올해는 지니언스 로드쇼 인 말레이시아(Genians Road Show in Malaysia)를 통해 말레이시아의 공공기관에 NAC를 수출하는 협의를 진행하고 있다.</p>\n<p>지니언스 이동범 대표이사는 “해외에서 제대로 브랜드와 기술력을 알릴 수 있는 보안 기업으로 자리 잡는 것은 지니언스 뿐 아니라 국가적인 사명이라고 생각한다”며 “국가별 특성은 고려하지만 국내 다양한 고객의 구축 경험을 토대로한 NAC의 기술의 표준화가 해외 시장 확대에 큰 힘이 될 것”이라고 밝혔다.</p>\n<p>한편, 지니언스는 올 10월 싱가포르에서 개최되는 ‘클라우드 엑스포 아시아’ 행사에 참여 예정이며 인도네시아 및 말레이시아의 엔드유저 기업을 대상으로 로드쇼를 진행해 동남아 시장에서의 성과 창출에 박차를 가한다는 계획이다.</p>", "body_text": "지니언스(263860, 대표이사 이동범)의 글로벌 비즈니스가 탄력을 받고 있다. 지니언스는 현재까지 전 세계 33개국의 34개 현지 파트너를 확보했다고 밝혔다. 특히, 올해에는 미국과 동남아를 넘어 유럽, 남미, 중동/아프리카 지역까지 파트너를 확보해 비즈니스 영역을 전 세계로 확장하고 있다.\n\n미국 진출을 필두로 시작된 지니언스의 글로벌 비즈니스는 각 국...", "full_text": "지니언스(263860, 대표이사 이동범)의 글로벌 비즈니스가 탄력을 받고 있다. 지니언스는 현재까지 전 세계 33개국의 34개 현지 파트너를 확보했다고 밝혔다. 특히, 올해에는 미국과 동남아를 넘어 유럽, 남미, 중동/아프리카 지역까지 파트너를 확보해 비즈니스 영역을 전 세계로 확장하고 있다.\n\n미국 진출을 필두로 시작된 지니언스의 글로벌 비즈니스는 각 국가의 특성 및 현지화에 초점을 두고 진행해 왔다. 미국은 보안 관제
