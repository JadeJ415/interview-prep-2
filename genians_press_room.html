 수립에도 노력하고 있다. 이러한 정부의 지원은 국내 보안 기업들의 성장 기회를 부각시키고 있으며, 이로 인해 사이버 보안 시장은 국가 경제와 기업 경쟁력을 강화하는 핵심 산업으로 자리 잡을 전망이다.  </p>\n<p>심의섭 NH투자증권 책임연구원은 “전 세계적으로 사이버 보안 산업에 대한 중요성이 계속 증가하고 있지만, 국내 보안 분야는 여전히 저평가된 측면이 있다”며 “이번 공동 기업 설명회를 통해 국내 주요 사이버 보안 기업들의 성장 가능성을 더욱 널리 알리고, 투자 기회를 발굴할 수 있기를 기대한다”고 전했다.  </p>\n<p>보안 업계 관계자는 “이번 공동 기업 설명회를 통해 보안 기업들이 투자자들과의 소통을 강화하고, 산업에 대한 관심을 높일 수 있는 좋은 기회가 될 것”이라며 “보안 산업의 중요성이 지속적으로 증가하는 만큼, 앞으로도 정기적인 공동 기업 설명회를 개최하여, 보안 기술과 시장에 대한 투자의 필요성을 꾸준히 알릴 계획”이라고 말했다.  </p>\n<p>한편, 지난 4월 모니터랩, 엑스게이트, 지니언스, 한싹, 휴네시온, SGA솔루션즈 등 6개 사이버 보안 기업은 온라인 공동 IR 설명회를 진행했다. 이는 보안 업계 최초로 열린 '공동 IR 설명회'로, 투자자들로부터 긍정적인 평가를 받았다.</p>", "body_text": "국내 사이버 보안 기업 4개사는 12월 10일 여의도 파크원 NH금융타워에서 국내 기관투자자 및 PB(프라이빗뱅커)를 대상으로, ‘2024 사이버 보안 기업 콥데이(Corporate Day)’를 개최한다고 9일 밝혔다. 본 행사는 올 상반기에 이어 두 번째로 진행되는 사이버 보안 '공동 기업 설명회(IR)'로, NH투자증권이 후원한다.  \n  \n이번 설명회...", "full_text": "국내 사이버 보안 기업 4개사는 12월 10일 여의도 파크원 NH금융타워에서 국내 기관투자자 및 PB(프라이빗뱅커)를 대상으로, ‘2024 사이버 보안 기업 콥데이(Corporate Day)’를 개최한다고 9일 밝혔다. 본 행사는 올 상반기에 이어 두 번째로 진행되는 사이버 보안 '공동 기업 설명회(IR)'로, NH투자증권이 후원한다.  \n  \n이번 설명회는 보안 산업 가치 재조명과 보안 기업에 대한 투자자 이해 증진을 목표로 진행되며, △지니언스(263860) △파수(150900) △휴네시온(290270) △SGA솔루션즈(184230) 총 4개의 보안 기업이 참가한다.   \n  \n네트워크 및 엔드포인트 보안, 데이터 보안 및 관리, 망연계 및 접근제어, 제로트러스트 및 시스템 보안 등 각 분야를 선도하는 네 개사는 최신 비즈니스 현황, 비즈니스 모델, 중장기 성장 전략 등에 대해 상세히 소개하고, 투자자들과 실시간으로 의견을 나누는 시간도 마련한다  \n  \n최근 글로벌 사이버 공격의 피해 규모가 급증하면서, 사이버 보안은 이제 선택이 아닌 필수로 자리 잡았다. 특히 AI 기반 사이버 공격과 같은 새로운 형태의 위협이 등장하며, 공격의 지능화 및 고도화가 진행됨에 따라 사이버 보안의 중요성은 더욱 강조되고 있다.  \n  \n정부는 이러한 환경에 대응하기 위해, 정보보호 규제 강화와 산업별 특화 보안 규제 의무 확대 등 사이버 보안 시장 확대를 위한 다양한 지원을 하고 있으며, 국내 사이버 안보 전략 수립에도 노력하고 있다. 이러한 정부의 지원은 국내 보안 기업들의 성장 기회를 부각시키고 있으며, 이로 인해 사이버 보안 시장은 국가 경제와 기업 경쟁력을 강화하는 핵심 산업으로 자리 잡을 전망이다.  \n  \n심의섭 NH투자증권 책임연구원은 “전 세계적으로 사이버 보안 산업에 대한 중요성이 계속 증가하고 있지만, 국내 보안 분야는 여전히 저평가된 측면이 있다”며 “이번 공동 기업 설명회를 통해 국내 주요 사이버 보안 기업들의 성장 가능성을 더욱 널리 알리고, 투자 기회를 발굴할 수 있기를 기대한다”고 전했다.  \n  \n보안 업계 관계자는 “이번 공동 기업 설명회를 통해 보안 기업들이 투자자들과의 소통을 강화하고, 산업에 대한 관심을 높일 수 있는 좋은 기회가 될 것”이라며 “보안 산업의 중요성이 지속적으로 증가하는 만큼, 앞으로도 정기적인 공동 기업 설명회를 개최하여, 보안 기술과 시장에 대한 투자의 필요성을 꾸준히 알릴 계획”이라고 말했다.  \n  \n한편, 지난 4월 모니터랩, 엑스게이트, 지니언스, 한싹, 휴네시온, SGA솔루션즈 등 6개 사이버 보안 기업은 온라인 공동 IR 설명회를 진행했다. 이는 보안 업계 최초로 열린 '공동 IR 설명회'로, 투자자들로부터 긍정적인 평가를 받았다."}, {"title": "- 2024 3분기 연결 기준 매출액, 당기순이익도 전년比 35%, 234% 증가한 104억, 22억 기록 - 지자체 및 대기업 NAC 수요 확대에 따른 매출 증가…민간 부문 비중 확대 - 클라우드 NAC 매니지드 서비스 고객 지속 확보...SMB 시장 커버리지 확장", "date": "2024.11.14", "link": "https://www.genians.co.kr/pr-room/press/20241114", "category": "NAC", "body_html": "<p>지니언스가 3분기에도 호실적 기록했다.  </p>\n<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2024년 3분기 연결 기준 영업이익이 전년 동기 대비 660.8% 성장한 22억 원을 달성했다고 14일 공시를 통해 밝혔다. 매출액과 당기순이익은 각각 104억 원, 22억 원을 기록하며 34.9%, 234.4% 증가했다.  </p>\n<p>3분기 연결기준 누적 매출액, 영업이익도 293억 원, 37억 원을 기록하며, 전년 比 12.2%, 36.4% 증가했다. 당기순이익은 35.8% 오른 47억 원이다.  </p>\n<p>지니언스는 ‘NAC(Network Access Control)’의 지자체 및 대기업향 수요 증가를 호실적 요인으로 꼽았다. 회사는 NAC가 공공 부문에서 강세를 이어가고 있는 동시에, 민간 부문으로도 시장 점유율을 확대해 가고 있다고 설명했다. NAC의 설치부터 운영까지 전 과정을 원스톱으로 제공하는 ‘클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)' 고객사도 확보하며 시장 커버리지를 확장했다.  </p>\n<p>‘EDR(Endpoint Detection &amp; Response)’ 사업도 공공과 민간 부문에서 고른 성과를 내고 있다. ‘EDR 구독형 비즈니스 모델’에 비중이 지속적으로 확대되고 있어, 향후 수익성 측면에서도 긍정적인 요인으로 작용할 전망이다.  </p>\n<p>지니언스는 제로트러스트 시장에서도 입지를 강화하고 있다. 제로트러스트 사업의 고도화를 위해 SSL-VPN 전문 기업 ‘퓨쳐텍정보통신’을 흡수합병했으며, ‘제로트러스트 도입 시범사업’ 국책 과제도 수주했다.  </p>\n<p>지니언스는 4분기에도 NAC의 안정적 성장과 XDR 기반 얼라이언스 확대, 국책 과제 수행 등을 통해 제품 경쟁력을 강화하며 다양한 보안 수요에 대응할 계획이다. 또한, 글로벌 비즈니스 거점 확대와 활동 강화를 통해 호실적을 지속적으로 이어나갈 방침이다.  </p>\n<p>이동범 지니언스 대표는 “NAC, EDR, 제로트러스트 각 분야에서 고른 성장을 이루어낸 덕분에 보안업계 비수기로 여겨지는 3분기에도 호실적을 기록할 수 있었다”며 “국내 사업의 견조한 성과를 바탕으로 글로벌 비즈니스 확장에 박차를 가해, 4분기에도 실적 성장세를 이어갈 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 2016년 미국 법인 설립 이후, 글로벌 시장 공략을 위한 적극적인 행보를 이어오고 있다. 최근에는 아랍에미리트(UAE)에 신규 사무소를 개설하고, 기존 해외사업팀을 해외사업본부로 확대 개편해 글로벌 사업에 특화된 인재도 영입했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 3분기에도 호실적 기록했다.  \n  \n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2024년 3분기 연결 기준 영업이익이 전년 동기 대비 660.8% 성장한 22억 원을 달성했다고 14일 공시를 통해 밝혔다 을 기반으로, 글로벌 사이버 보안 시장 확장에 속도를 낼 계획이다. 특히 글로벌 트렌드를 반영한 지역별 사업 확대 전략을 수립하고, 네트워크를 활용한 적극적인 영업 활동을 통해 다양한 국가의 신규 고객을 확보할 예정이다.  </p>\n<p>또한, 지니언스는 기존 해외사업팀을 해외사업본부로 확대 개편하여, 미국 법인과의 역할을 세분화 하는 등 더욱 전문적이고 세밀한 사업을 전개할 방침이다. 해외사업본부는 글로벌 비즈니스에 대한 전반적인 전략을 수립하고, 중동•유럽•아프리카•아태지역을 중심으로 해외 사업을 추진할 계획이다. 미국 법인은 글로벌 비즈니스 전략을 기반으로 북중미 및 남미 시장을 중점적으로 공략할 예정이다.  </p>\n<p>나세일 본부장은 “지난 25여 년간 IT 업계에서 쌓아온 경험은 향후 지니언스의 글로벌 사업 확장에 큰 시너지를 낼 것으로 기대한다”며 “지역별 해외 사업 확대 전략을 수립하고, 미국 법인과의 긴밀한 협업을 통해 글로벌 시장에서의 영역을 더욱 넓힐 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 2016년 미국 법인 설립 이후, 글로벌 시장 공략을 위한 적극적인 행보를 이어오고 있다. 최근에는 아랍에미리트(UAE)에 신규 사무소를 개설하고, 기존 해외사업팀을 해외사업본부로 확대 개편하여 글로벌 사업에 특화된 인재도 추가로 영입했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 인재 영입을 통해 글로벌 사업을 강화한다.  \n  \n사이버 보안 기업 지니언스(263860, 대표 이동범)는 나세일 전 시스코 사업본부 임원을 해외사업 본부장으로 영입했다고 6일 밝혔다.  \n  \n나세일 본부장은 LG전자와 LG CNS 등 LG그룹 IT 계열사를 거쳐, 시스코 시스템즈 코리아(Cisco Systems Korea) 사업본부 임원을 ...", "full_text": "지니언스가 인재 영입을 통해 글로벌 사업을 강화한다.  \n  \n사이버 보안 기업 지니언스(263860, 대표 이동범)는 나세일 전 시스코 사업본부 임원을 해외사업 본부장으로 영입했다고 6일 밝혔다.  \n  \n나세일 본부장은 LG전자와 LG CNS 등 LG그룹 IT 계열사를 거쳐, 시스코 시스템즈 코리아(Cisco Systems Korea) 사업본부 임원을 역임한 IT 솔루션 분야의 전문가다. 지난 25여 년간 통신사, 기업, 공공 시장을 대상으로 다양한 사업 기획 및 세일즈를 주도하며 성공적인 사업 성과를 거두었다.  \n  \n지니언스는 나세일 본부장의 폭넓은 IT 분야의 전문성과 전략적 비전을 기반으로, 글로벌 사이버 보안 시장 확장에 속도를 낼 계획이다. 특히 글로벌 트렌드를 반영한 지역별 사업 확대 전략을 수립하고, 네트워크를 활용한 적극적인 영업 활동을 통해 다양한 국가의 신규 고객을 확보할 예정이다.  \n  \n또한, 지니언스는 기존 해외사업팀을 해외사업본부로 확대 개편하여, 미국 법인과의 역할을 세분화 하는 등 더욱 전문적이고 세밀한 사업을 전개할 방침이다. 해외사업본부는 글로벌 비즈니스에 대한 전반적인 전략을 수립하고, 중동•유럽•아프리카•아태지역을 중심으로 해외 사업을 추진할 계획이다. 미국 법인은 글로벌 비즈니스 전략을 기반으로 북중미 및 남미 시장을 중점적으로 공략할 예정이다.  \n  \n나세일 본부장은 “지난 25여 년간 IT 업계에서 쌓아온 경험은 향후 지니언스의 글로벌 사업 확장에 큰 시너지를 낼 것으로 기대한다”며 “지역별 해외 사업 확대 전략을 수립하고, 미국 법인과의 긴밀한 협업을 통해 글로벌 시장에서의 영역을 더욱 넓힐 것”이라고 말했다.  \n  \n한편, 지니언스는 2016년 미국 법인 설립 이후, 글로벌 시장 공략을 위한 적극적인 행보를 이어오고 있다. 최근에는 아랍에미리트(UAE)에 신규 사무소를 개설하고, 기존 해외사업팀을 해외사업본부로 확대 개편하여 글로벌 사업에 특화된 인재도 추가로 영입했다.\n\n|  |\n|"}, {"title": "- 글로벌 기술 허브 두바이 인터넷시티에 신규 사무소 개설…고객 밀착형 비즈니스 확대 - 현지 맞춤형 보안 솔루션 개발 및 공급으로 중동 공략 강화 - NIPA UAE IT 지원센터 입주…다양한 지원 및 글로벌 네트워크 확장 기회", "date": "2024.10.18", "link": "https://www.genians.co.kr/pr-room/press/20241018", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문 기업 지니언스가 아랍에미리트(UAE) 두바이에 신규 사무소를 개설했다고 18일 밝혔다.  </p>\n<p>지니언스의 신규 사무소는 중동 지역의 기술 허브인 두바이 인터넷시티(DIC, Dubai Internet City)에 위치해 있다. DIC에는 구글, 마이크로소프트 등 포춘 500대 기업을 포함해 3,000개 이상의 기업이 입주해 있으며, 2만 9,000명 이상의 전문가들이 근무하고 있다.  </p>\n<p>지니언스는 현재 보유한 50여 개의 중동 고객 레퍼런스를 바탕으로 사업 영역을 지속적으로 확대할 계획이다. 특히 중동 시장에 적합한 관리형 사이버 보안 시스템과 체계를 개발하는 등 38억 규모 국책 과제를 수행하여, 중동에서 유럽 및 아프리카 시장으로 사업을 확장할 예정이다.  </p>\n<p>특히 이번 UAE 사무소 개설은 지니언스가 중동 시장에서 사업을 확장하는 데 있어 중요한 역할을 할 것으로 기대된다. 회사는 현지 사무소를 통해 중동 시장에 대한 이해도를 높이고, 파트너와의 협력을 강화할 계획이다. 중동 지역 내 고객 기반을 확대하여 시장에 성공적으로 안착한다는 전략이다.  </p>\n<p>지니언스는 신규 사무소 개설을 기점으로 GITEX, GISEC 등 중동 지역 IT•보안 전시회에 참가하고, 중동 주요 국가를 대상으로 로드쇼를 개최하는 등 고객 밀착형 비즈니스를 확대할 방침이다. 또한, 온라인 비즈니스를 위한 맞춤형 머트리얼 제작과 검색 최적화를 통해 고객 접점과 접근성을 대폭 높이고, 인도 기반의 기술 지원팀과 협력하여 글로벌 기술 지원 및 교육 프로그램도 고도화할 계획이다.  </p>\n<p>최근 중동 지역의 IT 및 금융 분야에 대한 투자가 확대됨에 따라, 정보보호의 필요성이 지속적으로 증가하고 있다. 시장조사업체 마켓앤마켓에 따르면, 중동 사이버 보안 시장 규모는 2028년까지 연평균 9.6% 성장하여 총 234억 달러(한화 약 32조 2천700억 원) 규모로 확대될 전망이다.  </p>\n<p>김계연 지니언스 CTO 및 미국 법인장은 \"중동 지역의 문화 및 IT 시스템 관리 방식이 한국과 유사한 점이 많아 국내 보안 솔루션에 대한 선호도가 높다\"며 “지니언스의 UAE사무소는 중동뿐만 아니라 유럽 및 아프리카 시장까지 확장하는 허브 역할을 수행할 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 두바이 인터넷시티(DIC)에 위치한 ‘UAE IT지원센터’에 입주해 있다. ‘UAE IT지원센터’는 정보통신산업진흥원(NIPA)이 중동 지역 수출 신시장 개척 정책의 일환으로 설립한 곳으로, 국내 ICT 분야의 유망한 중소•중견기업 7개사가 함께 입주해 있다. 'UAE IT지원센터'에 입주한 기업들은 사무시설과 비즈니스 인프라를 활용하며 투자자 및 바이어와의 글로벌 네트워크 확장 기회를 얻을 수 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스가 아랍에미리트(UAE) 두바이에 신규 사무소를 개설했다고 18일 밝혔다.  \n  \n지니언스의 신규 사무소는 중동 지역의 기술 허브인 두바이 인터넷시티(DIC, Dubai Internet City)에 위치해 있다. DIC에는 구글, 마이크로소프트 등 포춘 500대 기업을 포함해 3,000개 이상의 기업이 입주해 있으며, 2만 ...", "full_text": "사이버 보안 전문 기업 지니언스가 아랍에미리트(UAE) 두바이에 신규 사무소를 개설했다고 18일 밝혔다.  \n  \n지니언스의 신규 사무소는 중동 지역의 기술 허브인 두바이 인터넷시티(DIC, Dubai Internet City)에 위치해 있다. DIC에는 구글, 마이크로소프트 등 포춘 500대 기업을 포함해 3,000개 이상의 기업이 입주해 있으며, 2만 9,000명 이상의 전문가들이 근무하고 있다.  \n  \n지니언스는 현재 보유한 50여 개의 중동 고객 레퍼런스를 바탕으로 사업 영역을 지속적으로 확대할 계획이다. 특히 중동 시장에 적합한 관리형 사이버 보안 시스템과 체계를 개발하는 등 38억 규모 국책 과제를 수행하여, 중동에서 유럽 및 아프리카 시장으로 사업을 확장할 예정이다.  \n  \n특히 이번 UAE 사무소 개설은 지니언스가 중동 시장에서 사업을 확장하는 데 있어 중요한 역할을 할 것으로 기대된다. 회사는 현지 사무소를 통해 중동 시장에 대한 이해도를 높이고, 파트너와의 협력을 강화할 계획이다. 중동 지역 내 고객 기반을 확대하여 시장에 성공적으로 안착한다는 전략이다.  \n  \n지니언스는 신규 사무소 개설을 기점으로 GITEX, GISEC 등 중동 지역 IT•보안 전시회에 참가하고, 중동 주요 국가를 대상으로 로드쇼를 개최하는 등 고객 밀착형 비즈니스를 확대할 방침이다. 또한, 온라인 비즈니스를 위한 맞춤형 머트리얼 제작과 검색 최적화를 통해 고객 접점과 접근성을 대폭 높이고, 인도 기반의 기술 지원팀과 협력하여 글로벌 기술 지원 및 교육 프로그램도 고도화할 계획이다.  \n  \n최근 중동 지역의 IT 및 금융 분야에 대한 투자가 확대됨에 따라, 정보보호의 필요성이 지속적으로 증가하고 있다. 시장조사업체 마켓앤마켓에 따르면, 중동 사이버 보안 시장 규모는 2028년까지 연평균 9.6% 성장하여 총 234억 달러(한화 약 32조 2천700억 원) 규모로 확대될 전망이다.  \n  \n김계연 지니언스 CTO 및 미국 법인장은 \"중동 지역의 문화 및 IT 시스템 관리 방식이 한국과 유사한 점이 많아 국내 보안 솔루션에 대한 선호도가 높다\"며 “지니언스의 UAE사무소는 중동뿐만 아니라 유럽 및 아프리카 시장까지 확장하는 허브 역할을 수행할 것”이라고 말했다.  \n  \n한편, 지니언스는 두바이 인터넷시티(DIC)에 위치한 ‘UAE IT지원센터’에 입주해 있다. ‘UAE IT지원센터’는 정보통신산업진흥원(NIPA)이 중동 지역 수출 신시장 개척 정책의 일환으로 설립한 곳으로, 국내 ICT 분야의 유망한 중소•중견기업 7개사가 함께 입주해 있다. 'UAE IT지원센터'에 입주한 기업들은 사무시설과 비즈니스 인프라를 활용하며 투자자 및 바이어와의 글로벌 네트워크 확장 기회를 얻을 수 있다.\n\n|  |\n|"}, {"title": "- 중동 최대 규모 ICT 전시회 '자이텍스 두바이 2024' 참가 - “NAC, ZTNA에 이어 EDR까지” 국내 시장에서 입증한 경쟁력 기반으로 글로벌 공략 확대", "date": "2024.10.10", "link": "https://www.genians.co.kr/pr-room/press/20241010", "category": "NAC", "body_html": "<p>지니언스가 'EDR(Endpoint Detection and Response)’로 글로벌 공략을 가속화한다.  </p>\n<p>사이버 보안 기업 지니언스는 오는 14일부터 18일까지 아랍에미리트(UAE) 두바이에서 열리는 ‘자이텍스 두바이 2024(GITEX DUBAI 2024)’에 참가해 '지니안 EDR(Genian EDR)'를 선보인다고 10일 밝혔다.  </p>\n<p>‘자이텍스’는 1981년부터 개최된 중동 최대의 글로벌 IT 박람회로, 매년 약 70개국 4,500여 개 기업이 참가하여 최첨단 기술과 서비스를 선보인다. 이 행사는 활발한 비즈니스 논의의 장으로, 참가사들은 다양한 투자 및 협업 기회를 모색할 수 있다.  </p>\n<p>이번 전시회는 지니언스가 ‘지니안 EDR’을 글로벌 시장에 처음 선보이는 자리다. '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링과 정보 수집을 통해 위협의 탐지, 분석, 대응 기능을 제공하는 보안 솔루션이다. 2018년 국내 시장에 처음 출시된 이후, 공공에서 민간으로 적용 범위를 넓히며 성공적으로 안착했다.  </p>\n<p>지니언스는 국내에서 성공적으로 안착한 EDR을 통해 글로벌 시장 공략에 박차를 가할 계획이다. 회사 측은 국내의 많은 고객 레퍼런스를 기반으로, 글로벌 고객의 다양한 수요에 맞춘 솔루션 제공이 가능할 것이라 설명했다. 지난해 지니언스의 EDR 공공조달시장 점유율은 78%에 달한다.  </p>\n<p>지니언스는 ‘지니안 NAC(Network Access Control)’를 도입 중인 글로벌 고객을 대상으로 적극적인 영업 활동도 전개할 계획이다. 특히 ‘EDR 솔루션’을 ‘NAC 솔루션’과 연동할 경우, 별도의 에이전트 설치 없이 기존 환경 변화를 최소화하면서 시스템 구축이 가능하다. 또한 회사는 ‘지니언스 시큐리티 센터(Genians Security Center)’가 발행하는 ‘위협 인텔리전스 보고서’를 통해 다양한 사이버 위협 정보도 제공할 예정이다.  </p>\n<p>최근 APT, 랜섬웨어 등 사이버 위협이 고도화됨에 따라, 신속한 분석 및 대응으로 안전한 보안 환경을 제공하는 EDR 제품에 대한 수요가 증가하고 있다. 글로벌 시장조사 전문기관 AMR은 전 세계 EDR 시장 규모가 2021년 19억 달러(약 2조 5,000억 원)로, 2022년부터 2031년까지 연평균 25.3% 성장해 2031년에는 183억 달러(약 24조 5,000억 원)에 이를 것으로 전망했다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 \"이번 전시회는 글로벌 시장에 ‘지니안EDR’의 우수성을 알릴 수 있는 좋은 기회”라며 “확보한 글로벌 고객 대상으로 연동 가능성을 부각하여, 글로벌 EDR 시장에서 지니언스가 성공적으로 자리잡을 수 있도록 노력할 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 이번 ‘자이텍스 두바이 2024’에서 NAC, ZTNA(Zero Trust Network Access) 보안 솔루션도 함께 선보인다. 기존 고객 성공사례를 소개하고 라이브 데모를 시현하여 제품에 대한 접근성을 강화할 계획이다. 전시 관람객들은 원격•클라우드, 하이브리드 네트워크 환경 등 모든 접점에서 보안을 유지하고 원활하게 엑세스할 수 있는 기술을 확인할 수 있다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 'EDR(Endpoint Detection and Response)’로 글로벌 공략을 가속화한다.  \n  \n사이버 보안 기업 지니언스는 오는 14일부터 18일까지 아랍에미리트(UAE) 두바이에서 열리는 ‘자이텍스 두바이 2024(GITEX DUBAI 2024)’에 참가해 '지니안 EDR(Genian EDR)'를 선보인다고 10일 밝혔다.  \n  ...", "full_text": "지니언스가 'EDR(Endpoint Detection and Response)’로 글로벌 공략을 가속화한다.  \n  \n사이버 보안 기업 지니언스는 오는 14일부터 18일까지 아랍에미리트(UAE) 두바이에서 열리는 ‘자이텍스 두바이 2024(GITEX DUBAI 2024)’에 참가해 '지니안 EDR(Genian EDR)'를 선보인다고 10일 밝혔다.  \n  \n‘자이텍스’는 1981년부터 개최된 중동 최대의 글로벌 IT 박람회로, 매년 약 70개국 4,500여 개 기업이 참가하여 최첨단 기술과 서비스를 선보인다. 이 행사는 활발한 비즈니스 논의의 장으로, 참가사들은 다양한 투자 및 협업 기회를 모색할 수 있다.  \n  \n이번 전시회는 지니언스가 ‘지니안 EDR’을 글로벌 시장에 처음 선보이는 자리다. '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링과 정보 수집을 통해 위협의 탐지, 분석, 대응 기능을 제공하는 보안 솔루션이다. 2018년 국내 시장에 처음 출시된 이후, 공공에서 민간으로 적용 범위를 넓히며 성공적으로 안착했다.  \n  \n지니언스는 국내에서 성공적으로 안착한 EDR을 통해 글로벌 시장 공략에 박차를 가할 계획이다. 회사 측은 국내의 많은 고객 레퍼런스를 기반으로, 글로벌 고객의 다양한 수요에 맞춘 솔루션 제공이 가능할 것이라 설명했다. 지난해 지니언스의 EDR 공공조달시장 점유율은 78%에 달한다.  \n  \n지니언스는 ‘지니안 NAC(Network Access Control)’를 도입 중인 글로벌 고객을 대상으로 적극적인 영업 활동도 전개할 계획이다. 특히 ‘EDR 솔루션’을 ‘NAC 솔루션’과 연동할 경우, 별도의 에이전트 설치 없이 기존 환경 변화를 최소화하면서 시스템 구축이 가능하다. 또한 회사는 ‘지니언스 시큐리티 센터(Genians Security Center)’가 발행하는 ‘위협 인텔리전스 보고서’를 통해 다양한 사이버 위협 정보도 제공할 예정이다.  \n  \n최근 APT, 랜섬웨어 등 사이버 위협이 고도화됨에 따라, 신속한 분석 및 대응으로 안전한 보안 환경을 제공하는 EDR 제품에 대한 수요가 증가하고 있다. 글로벌 시장조사 전문기관 AMR은 전 세계 EDR 시장 규모가 2021년 19억 달러(약 2조 5,000억 원)로, 2022년부터 2031년까지 연평균 25.3% 성장해 2031년에는 183억 달러(약 24조 5,000억 원)에 이를 것으로 전망했다.  \n  \n김계연 지니언스 CTO•미국법인장은 \"이번 전시회는 글로벌 시장에 ‘지니안EDR’의 우수성을 알릴 수 있는 좋은 기회”라며 “확보한 글로벌 고객 대상으로 연동 가능성을 부각하여, 글로벌 EDR 시장에서 지니언스가 성공적으로 자리잡을 수 있도록 노력할 것”이라고 말했다.  \n  \n한편, 지니언스는 이번 ‘자이텍스 두바이 2024’에서 NAC, ZTNA(Zero Trust Network Access) 보안 솔루션도 함께 선보인다. 기존 고객 성공사례를 소개하고 라이브 데모를 시현하여 제품에 대한 접근성을 강화할 계획이다. 전시 관람객들은 원격•클라우드, 하이브리드 네트워크 환경 등 모든 접점에서 보안을 유지하고 원활하게 엑세스할 수 있는 기술을 확인할 수 있다.\n\n|  |\n|"}, {"title": "- 튀르키예 자동차 부품 제조 기업에 지니안 NAC 공급 - NAC 밴더와의 경쟁 통해 기술력 검증…가시성 ‘호평’  - 글로벌 시장 공략을 위한 새로운 발판…다양한 사업 기회 모색 - 취약 단말 접속 차단 및 IT•OT 자산 실시간 탐지•식별 가능", "date": "2024.09.30", "link": "https://www.genians.co.kr/pr-room/press/20240910", "category": "NAC", "body_html": "<p>지니언스가 튀르키예에서 첫 고객을 확보하며 글로벌 시장 공략에 박차를 가하고 있다.  </p>\n<p>사이버 보안 전문기업 지니언스는 튀르키예 자동차 부품 제조 기업 코스쿠노즈 홀딩(Coskunoz Holding)에 ‘지니안 NAC(Network Access Control)’ 솔루션을 공급했다고 10일 밝혔다.   </p>\n<p>코스쿠노즈 홀딩은 자동차, 기계 및 금속 가공 등 다양한 산업 분야에서 활동 중인 다국적 기업이다. 우수한 기술력을 바탕으로 글로벌 기업에 제품을 공급하며, 본사를 튀르키예에 두고 여러 나라에 자회사를 운영하고 있다.  </p>\n<p>최근 디지털 환경의 급속한 변화와 사물인터넷 기기의 확산, 중요 인프라 시스템의 복잡성 증가로 인해 사이버 위협이 고도화되고 있다. 비즈니스 운영을 지속적으로 확대 중인 코스쿠노즈 홀딩은 장비 제어 및 정보 보호에 대한 필요성 증가로 NAC 솔루션 도입을 결정하게 됐다.  </p>\n<p>‘지니안 NAC는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 강화할 수 있는 제품이다. 네트워크 구조 변경 없이도 작동하는 네트워크 센서를 통해 연결된 모든 기기의 정보를 자동으로 탐지, 식별, 분류할 수 있다.  </p>\n<p>특히 지니안NAC는 뛰어난 가시성으로, 글로벌 NAC 밴더와의 경쟁에서 우수한 성과를 거뒀다. 해당 솔루션의 DPI(Device Platform Intelligence) 기술은 네트워크에 연결된 IT 자산과 OT 자산을 실시간으로 탐지•식별하고 상세하게 분류할 수 있다. 코스쿠노즈 홀딩은 지니안 NAC도입으로 취약 단말의 접속을 원천 차단해 위협에 효과적으로 대응할 수 있게 됐다.  </p>\n<p>지니언스는 이번 튀르키예 첫 고객 확보를 계기로 글로벌 시장에서의 입지를 더욱 확대할 계획이다. 현재 지니언스는 27개국에 120곳 이상의 글로벌 고객사를 확보하고 있으며, 이후로도 다양한 사업 레퍼런스를 쌓아가고 있다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 “지난 20년간 지니언스는 NAC 솔루션을 통해 대기업과 중소기업 등 다양한 조직의 IT 및 OT 환경을 안전하게 보호해 왔다”며 “기업들의 글로벌 비즈니스 운영이 확대됨에 따라, 고객의 다양한 IT 환경에 유연하게 대응할 수 있는 지니언스의 솔루션에 대한 수요가 계속해서 증가할 것으로 기대된다”고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 튀르키예에서 첫 고객을 확보하며 글로벌 시장 공략에 박차를 가하고 있다.  \n  \n사이버 보안 전문기업 지니언스는 튀르키예 자동차 부품 제조 기업 코스쿠노즈 홀딩(Coskunoz Holding)에 ‘지니안 NAC(Network Access Control)’ 솔루션을 공급했다고 10일 밝혔다.   \n  \n코스쿠노즈 홀딩은 자동차, 기계 및 금속 가...", "full_text": "지니언스가 튀르키예에서 첫 고객을 확보하며 글로벌 시장 공략에 박차를 가하고 있다.  \n  \n사이버 보안 전문기업 지니언스는 튀르키예 자동차 부품 제조 기업 코스쿠노즈 홀딩(Coskunoz Holding)에 ‘지니안 NAC(Network Access Control)’ 솔루션을 공급했다고 10일 밝혔다.   \n  \n코스쿠노즈 홀딩은 자동차, 기계 및 금속 가공 등 다양한 산업 분야에서 활동 중인 다국적 기업이다. 우수한 기술력을 바탕으로 글로벌 기업에 제품을 공급하며, 본사를 튀르키예에 두고 여러 나라에 자회사를 운영하고 있다.  \n  \n최근 디지털 환경의 급속한 변화와 사물인터넷 기기의 확산, 중요 인프라 시스템의 복잡성 증가로 인해 사이버 위협이 고도화되고 있다. 비즈니스 운영을 지속적으로 확대 중인 코스쿠노즈 홀딩은 장비 제어 및 정보 보호에 대한 필요성 증가로 NAC 솔루션 도입을 결정하게 됐다.  \n  \n‘지니안 NAC는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 강화할 수 있는 제품이다. 네트워크 구조 변경 없이도 작동하는 네트워크 센서를 통해 연결된 모든 기기의 정보를 자동으로 탐지, 식별, 분류할 수 있다.  \n  \n특히 지니안NAC는 뛰어난 가시성으로, 글로벌 NAC 밴더와의 경쟁에서 우수한 성과를 거뒀다. 해당 솔루션의 DPI(Device Platform Intelligence) 기술은 네트워크에 연결된 IT 자산과 OT 자산을 실시간으로 탐지•식별하고 상세하게 분류할 수 있다. 코스쿠노즈 홀딩은 지니안 NAC도입으로 취약 단말의 접속을 원천 차단해 위협에 효과적으로 대응할 수 있게 됐다.  \n  \n지니언스는 이번 튀르키예 첫 고객 확보를 계기로 글로벌 시장에서의 입지를 더욱 확대할 계획이다. 현재 지니언스는 27개국에 120곳 이상의 글로벌 고객사를 확보하고 있으며, 이후로도 다양한 사업 레퍼런스를 쌓아가고 있다.  \n  \n김계연 지니언스 CTO•미국법인장은 “지난 20년간 지니언스는 NAC 솔루션을 통해 대기업과 중소기업 등 다양한 조직의 IT 및 OT 환경을 안전하게 보호해 왔다”며 “기업들의 글로벌 비즈니스 운영이 확대됨에 따라, 고객의 다양한 IT 환경에 유연하게 대응할 수 있는 지니언스의 솔루션에 대한 수요가 계속해서 증가할 것으로 기대된다”고 말했다.\n\n|  |\n|"}, {"title": "- 시장지배력, 기술력, 성장성•수익성, 재무 안정성 등에서 높은 점수  - 글로벌 기업으로서의 역량 강화를 위한 인력, 자금, 컨설팅 등 제공", "date": "2024.08.30", "link": "https://www.genians.co.kr/pr-room/press/20240830", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 한국거래소가 주관하는 ‘코스닥 라이징스타’에 2년 연속 선정됐다고 29일 밝혔다.  </p>\n<p>코스닥 라이징스타는 세계시장에서 독보적인 시장지배력을 보유한 코스닥 상장 법인 및 혁신 산업 분야에서 국내외 시장 지배력을 바탕으로 세계적인 기업으로 성장할 기업을 중•장기적으로 지원하는 제도다.   </p>\n<p>지니언스는 혁신 성장 품목인 사이버 보안 분야에서 네트워크 접근제어 솔루션 ‘지니안 NAC(Network Access Control)’를 출품했다. 시장지배력, 기술력, 성장성•수익성, 재무안정성 등 객관적인 평가 기준에서 높은 점수를 받아 선정됐다.   </p>\n<p>‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 구독 기반 클라우드 NAC를 포함해 구축형, 매니지드 서비스 등 고객의 다양한 IT 환경에서도 안정적이고 효율적인 보안 운영이 가능하다.   </p>\n<p>지니언스는 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며, 프로스트 &amp; 설리번 ‘글로벌 솔루션 마켓가이드’에 등재되는 등 글로벌 수준의 소프트웨어 기술력을 보유하고 있다.  </p>\n<p>국내에서 독보적인 시장 점유율 1위의 성공사례를 기반으로 해외 시장도 적극 공략 중이다. 금융, 의료, 방산, 항공, 유통 등 다양한 분야에 보안 제품을 공급 중이며, 현재까지 27개 국가에서 누적 120개의 글로벌 고객을 확보했다.   </p>\n<p>특히 회사는 특정 시장에만 집중하는 ‘로컬라이제이션(Localization)’이 아닌 다양한 환경에 유연하게 대처할 수 있는 ‘글로벌라이제이션(Globalization)’ 전략을 택함으로써, 레퍼런스를 지속적으로 확대하고 있다고 강조했다.  </p>\n<p>지니언스는 이번 코스닥 라이징스타 선정으로, 한국거래소로부터 글로벌 역량 강화를 위한 인력, 자금, 컨설팅 등의 다양한 지원을 패키지 형태로 제공받게 된다. 이를 기반으로 국내 및 글로벌 보안 시장에서의 영향력을 확대한다는 계획이다.  </p>\n<p>이동범 지니언스 대표이사는 “지니언스가 코스닥 라이징스타에 2년 연속 선정된 것은 독자적 기술력을 바탕으로 업계를 선도하는 기업으로 자리매김하기 위해 노력해 온 결과”라며 “지속적으로 증가하는 사이버 위협에 선제적으로 대응하기 위해 R&amp;D에 아낌없이 투자하여, 글로벌 시장에서의 영향력을 지속적으로 확대할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 한국거래소가 주관하는 ‘코스닥 라이징스타’에 2년 연속 선정됐다고 29일 밝혔다.  \n  \n코스닥 라이징스타는 세계시장에서 독보적인 시장지배력을 보유한 코스닥 상장 법인 및 혁신 산업 분야에서 국내외 시장 지배력을 바탕으로 세계적인 기업으로 성장할 기업을 중•장기적으로 지원하는 제도다.   \n ...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 한국거래소가 주관하는 ‘코스닥 라이징스타’에 2년 연속 선정됐다고 29일 밝혔다.  \n  \n코스닥 라이징스타는 세계시장에서 독보적인 시장지배력을 보유한 코스닥 상장 법인 및 혁신 산업 분야에서 국내외 시장 지배력을 바탕으로 세계적인 기업으로 성장할 기업을 중•장기적으로 지원하는 제도다.   \n  \n지니언스는 혁신 성장 품목인 사이버 보안 분야에서 네트워크 접근제어 솔루션 ‘지니안 NAC(Network Access Control)’를 출품했다. 시장지배력, 기술력, 성장성•수익성, 재무안정성 등 객관적인 평가 기준에서 높은 점수를 받아 선정됐다.   \n  \n‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 구독 기반 클라우드 NAC를 포함해 구축형, 매니지드 서비스 등 고객의 다양한 IT 환경에서도 안정적이고 효율적인 보안 운영이 가능하다.   \n  \n지니언스는 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며, 프로스트 & 설리번 ‘글로벌 솔루션 마켓가이드’에 등재되는 등 글로벌 수준의 소프트웨어 기술력을 보유하고 있다.  \n  \n국내에서 독보적인 시장 점유율 1위의 성공사례를 기반으로 해외 시장도 적극 공략 중이다. 금융, 의료, 방산, 항공, 유통 등 다양한 분야에 보안 제품을 공급 중이며, 현재까지 27개 국가에서 누적 120개의 글로벌 고객을 확보했다.   \n  \n특히 회사는 특정 시장에만 집중하는 ‘로컬라이제이션(Localization)’이 아닌 다양한 환경에 유연하게 대처할 수 있는 ‘글로벌라이제이션(Globalization)’ 전략을 택함으로써, 레퍼런스를 지속적으로 확대하고 있다고 강조했다.  \n  \n지니언스는 이번 코스닥 라이징스타 선정으로, 한국거래소로부터 글로벌 역량 강화를 위한 인력, 자금, 컨설팅 등의 다양한 지원을 패키지 형태로 제공받게 된다. 이를 기반으로 국내 및 글로벌 보안 시장에서의 영향력을 확대한다는 계획이다.  \n  \n이동범 지니언스 대표이사는 “지니언스가 코스닥 라이징스타에 2년 연속 선정된 것은 독자적 기술력을 바탕으로 업계를 선도하는 기업으로 자리매김하기 위해 노력해 온 결과”라며 “지속적으로 증가하는 사이버 위협에 선제적으로 대응하기 위해 R&D에 아낌없이 투자하여, 글로벌 시장에서의 영향력을 지속적으로 확대할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- 중동시장에 적합한 관리형 사이버보안 시스템 및 체계 개발…주관연구개발 기관으로 과제 수행 - 시큐레이어, 테이텀시큐리티, 강원대학교와 공동 연구…UAE 소재 사이버보안 기업과도 협업 - UAE 정부기관 및 사우디 항만시설 수요 기관으로 선정 - 지니언스, 27개 국가 120개 이상의 글로벌 고객 확보...보유 레퍼런스 기반 연구 개발 진행", "date": "2024.08.28", "link": "https://www.genians.co.kr/pr-room/press/20240828", "category": "비즈니스 & 성과", "body_html": "<p>최근 좋은 성과를 내고 있는 지니언스의 중동 사업에 청신호가 켜졌다.  </p>\n<p>사이버보안 전문 기업 지니언스(263860 대표 이동범)는 과학기술정보통신부가 지원하는 '사이버보안 국제협력기반기술개발' 국책과제의 주관기관으로 선정됐다고 28일 밝혔다.  </p>\n<p>'사이버보안 국제협력기반기술개발' 사업은 해외 시장 수요 기반의 사이버보안 기술 개발을 통해 국내 기업의 해외 진출을 촉진하는 국제협력 연구개발 지원을 목적으로 한다. 3개의 과제를 선정해 지원하며, 과제당 총 사업비는 38.6억 원(정부 지원금 29.7억 원, 민간부담금 8.91억 원)이다. 사업은 2024년 7월부터 2026년 12월까지 총 30개월간 진행된다.  </p>\n<p>지니언스는 이번 사업을 위해 컨소시엄을 구성하고, 주관 연구개발 기관으로 과제를 수행한다. 지니언스를 중심으로 시큐레이어(대표 전주호), 테이텀시큐리티(대표 양혁재), 강원대학교가 공동으로 연구 개발을 진행하며, UAE 소재 사이버보안 기업 'RAS인포텍(RAS Infotech)'과도 협업한다. 또한 아랍에미리트(UAE) 정부기관 및 사우디아라비아 항만시설이 수요 기업으로 참여한다.  </p>\n<p>지니언스는 이번 과제를 통해 중동 시장에 적합한 관리형 사이버보안 시스템 및 체계 개발에 나설 계획이다. 주요 목표는 ▲자사 NAC/ZTNA/EDR 솔루션 글로벌 시장 진출 강화 ▲SIEM, SOAR, Cloud 등 보안 운영 통합 플랫폼 개발 및 구축 ▲데이터 관리 규정을 준수하는 클라우드 서비스 활용 ▲필수 정보보안 인증 획득 ▲현지 맞춤형 서비스 및 위협 인텔리전스 제공 등이다.  </p>\n<p>회사 측은 기존 글로벌 고객의 레퍼런스를 바탕으로 중동 지역에 대한 철저한 분석을 거쳐, 보안 솔루션의 현지화를 목표로 한다고 설명했다. 지니언스는 NAC, EDR 등 국내 시장에서 검증된 경쟁력을 바탕으로 27개 국가에서 120개 이상의 글로벌 고객을 확보했으며, 중동에서는 40여 개 이상의 고객을 보유하고 있다.  </p>\n<p>사우디아라비아의 '비전 2030' 미래형 신도시, '네옴시티' 프로젝트 추진 등으로 중동 시장에서 보안에 대한 중요성은 지속적으로 커질 것으로 기대된다. 시장조사업체 마켓앤마켓에 따르면 중동 사이버보안 시장 규모는 오는 2028년까지 연평균 9.6% 성장해 총 234억 달러(한화 약 32조 2700억 원) 규모로 커질 전망이다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 \"이번 국책 과제는 지니언스가 중동 시장에서의 입지를 더욱 확고히 할 수 있는 좋은 기회\"라며 \"지니언스의 다양한 글로벌 사업 경험을 통해 중동 현지 맞춤형 사이버보안 솔루션을 개발하여, 글로벌 보안 선도 기업으로 발돋움할 것\"라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "최근 좋은 성과를 내고 있는 지니언스의 중동 사업에 청신호가 켜졌다.  \n  \n사이버보안 전문 기업 지니언스(263860 대표 이동범)는 과학기술정보통신부가 지원하는 '사이버보안 국제협력기반기술개발' 국책과제의 주관기관으로 선정됐다고 28일 밝혔다.  \n  \n'사이버보안 국제협력기반기술개발' 사업은 해외 시장 수요 기반의 사이버보안 기술 개발을 통해 국내 ...", "full_text": "최근 좋은 성과를 내고 있는 지니언스의 중동 사업에 청신호가 켜졌다.  \n  \n사이버보안 전문 기업 지니언스(263860 대표 이동범)는 과학기술정보통신부가 지원하는 '사이버보안 국제협력기반기술개발' 국책과제의 주관기관으로 선정됐다고 28일 밝혔다.  \n  \n'사이버보안 국제협력기반기술개발' 사업은 해외 시장 수요 기반의 사이버보안 기술 개발을 통해 국내 기업의 해외 진출을 촉진하는 국제협력 연구개발 지원을 목적으로 한다. 3개의 과제를 선정해 지원하며, 과제당 총 사업비는 38.6억 원(정부 지원금 29.7억 원, 민간부담금 8.91억 원)이다. 사업은 2024년 7월부터 2026년 12월까지 총 30개월간 진행된다.  \n  \n지니언스는 이번 사업을 위해 컨소시엄을 구성하고, 주관 연구개발 기관으로 과제를 수행한다. 지니언스를 중심으로 시큐레이어(대표 전주호), 테이텀시큐리티(대표 양혁재), 강원대학교가 공동으로 연구 개발을 진행하며, UAE 소재 사이버보안 기업 'RAS인포텍(RAS Infotech)'과도 협업한다. 또한 아랍에미리트(UAE) 정부기관 및 사우디아라비아 항만시설이 수요 기업으로 참여한다.  \n  \n지니언스는 이번 과제를 통해 중동 시장에 적합한 관리형 사이버보안 시스템 및 체계 개발에 나설 계획이다. 주요 목표는 ▲자사 NAC/ZTNA/EDR 솔루션 글로벌 시장 진출 강화 ▲SIEM, SOAR, Cloud 등 보안 운영 통합 플랫폼 개발 및 구축 ▲데이터 관리 규정을 준수하는 클라우드 서비스 활용 ▲필수 정보보안 인증 획득 ▲현지 맞춤형 서비스 및 위협 인텔리전스 제공 등이다.  \n  \n회사 측은 기존 글로벌 고객의 레퍼런스를 바탕으로 중동 지역에 대한 철저한 분석을 거쳐, 보안 솔루션의 현지화를 목표로 한다고 설명했다. 지니언스는 NAC, EDR 등 국내 시장에서 검증된 경쟁력을 바탕으로 27개 국가에서 120개 이상의 글로벌 고객을 확보했으며, 중동에서는 40여 개 이상의 고객을 보유하고 있다.  \n  \n사우디아라비아의 '비전 2030' 미래형 신도시, '네옴시티' 프로젝트 추진 등으로 중동 시장에서 보안에 대한 중요성은 지속적으로 커질 것으로 기대된다. 시장조사업체 마켓앤마켓에 따르면 중동 사이버보안 시장 규모는 오는 2028년까지 연평균 9.6% 성장해 총 234억 달러(한화 약 32조 2700억 원) 규모로 커질 전망이다.  \n  \n김계연 지니언스 CTO•미국법인장은 \"이번 국책 과제는 지니언스가 중동 시장에서의 입지를 더욱 확고히 할 수 있는 좋은 기회\"라며 \"지니언스의 다양한 글로벌 사업 경험을 통해 중동 현지 맞춤형 사이버보안 솔루션을 개발하여, 글로벌 보안 선도 기업으로 발돋움할 것\"라고 말했다.\n\n|  |\n|"}, {"title": "- ‘기회의 땅’ 아프리카 사이버 보안 시장 선점…글로벌 커버리지 확장 가속화 - 기술 검증 통해 아프리카서 경쟁력 인정받아….금융 분야 고객 다수 확보 - 글로벌 시장 확대를 위한 교두보 마련", "date": "2024.08.19", "link": "https://www.genians.co.kr/pr-room/press/20240819", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 미국과 중동에 이어 '기회의 땅'이라 불리는 아프리카에서도 좋은 성과를 기록하고 있다.  </p>\n<p>지니언스는 최근 케냐의 금융기관 2곳에 ‘지니안 NAC(Network Access Control)’를 공급했다고 19일 밝혔다. 지니언스는 2022년 아프리카 시장에 진출한 이후 총 6곳의 고객을 확보했으며, 고객 분야는 금융권을 포함해 교육기관, 건설기업 등으로 다양하다.  </p>\n<p>특히 지니언스의 솔루션은 케냐 저축신용협동조합(SACCO) 시장에서 주목받고 있으며, 이를 바탕으로 고객을 지속적으로 확대하고 있다. 케냐는 2018년 '컴퓨터 오용 및 사이버 범죄에 관한 법률(Kenya Computer Misuse and Cybercrimes Act)'을 발표하고, 금융 등 주요 인프라를 보호하기 위해 정교한 사이버 보안 정책을 추진하고 있다.  </p>\n<p>하지만 IT 환경의 복잡도가 증가하고 금융 등 중요 인프라를 타깃으로 정교한 사이버 공격이 증가함에 따라, 보다 진보된 보안 아키텍처로의 전환이 필수적이 됐다. 이러한 상황에서 네트워크의 가시성을 확보하여, 내부 네트워크를 종합적으로 보호하는 NAC의 수요가 증대했다.   </p>\n<p>지니언스의 ‘지니안 NAC’는 클라우드, 원격 작업, 애플리케이션까지 아우르는 확장성을 갖춰 복잡한 네트워크 환경에도 유연하게 대응할 수 있는 것이 강점이다. 또한 사용자와 단말기에 대한 인증 및 보안 검토 기능을 갖추고 있어, 상황에 맞는 접근 제어 정책을 유연하게 적용할 수 있다.  </p>\n<p>지니언스는 이번 아프리카 시장 진입이 글로벌 시장 공략에 긍정적인 영향을 미칠 것으로 기대하고 있다. 아프리카 시장에서의 성과를 바탕으로, 유럽, 북미 등 다양한 연계 기업들과 협력을 강화해 글로벌 영향력을 더욱 확대할 계획이다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 “아프리카는 디지털 전환이 가속화되고 있는 역동적인 시장”이라며 “아프리카 지역의 안전한 디지털 미래를 위한 토대를 제공해 글로벌 보안 커버리지를 더욱 확대할 것”이라고 말했다.  </p>\n<p>한편, 중동 및 아프리카 사이버 보안 시장은 지속적으로 성장 중이다. 글로벌 리서치 기관인 포춘 비즈니스 인사이트(Fortune Business Insights)는 중동 및 아프리카 사이버 보안 시장이 2023년부터 2030년까지 연평균 16.2% 성장할 것으로 전망했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 미국과 중동에 이어 '기회의 땅'이라 불리는 아프리카에서도 좋은 성과를 기록하고 있다.  \n  \n지니언스는 최근 케냐의 금융기관 2곳에 ‘지니안 NAC(Network Access Control)’를 공급했다고 19일 밝혔다. 지니언스는 2022년 아프리카 시장에 진출한 이후 총 6곳의 고객을 확보...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 미국과 중동에 이어 '기회의 땅'이라 불리는 아프리카에서도 좋은 성과를 기록하고 있다.  \n  \n지니언스는 최근 케냐의 금융기관 2곳에 ‘지니안 NAC(Network Access Control)’를 공급했다  계획이다. NAC 분야는 SSL-VPN, 제로트러스트 분야와 긴밀히 연계하여 수요를 발굴하고, EDR 분야는 ‘K-시큐리티 얼라이언스’,  ‘오픈(OPEN) XDR 통합보안 플랫폼’개발 등 보안 기업과의 협업을 통해 사업 저변을 확대할 방침이다.  </p>\n<p>이동범 지니언스 대표는 “안정적인 성장세를 이어가고 있는 NAC뿐만 아니라 EDR, 제로트러스트 각 분야의 성장이 질적으로도 고도화되고 있다”며 “글로벌 비즈니스 확대 노력과 맞물려 새로운 기회들이 지속적으로 창출되고 있다”고 밝혔다.  </p>\n<p>심의섭 NH투자증권 연구원은 “지니언스는 사이버 보안 펀드, 제로트러스트 실증 과제 등 국내 정부 정책 확대에 따른 수혜와 더불어 민간 기업들의 윈백 및 신규 도입으로 성장세가 확대될 것”으로 전망했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2024년 2분기 영업이익 18.6억 원을 기록하며, 전년 동기 대비 77% 증가했다고 1일 공시했다. 매출액과 당기순이익은 각각 118.9억 원, 21.6억 원으로, 각각 28%, 38% 상승했다.  \n  \n압도적인 시장 점유율 1위를 기록하고 있는 ‘NAC(Network Access Cont...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2024년 2분기 영업이익 18.6억 원을 기록하며, 전년 동기 대비 77% 증가했다고 1일 공시했다. 매출액과 당기순이익은 각각 118.9억 원, 21.6억 원으로, 각각 28%, 38% 상승했다.  \n  \n압도적인 시장 점유율 1위를 기록하고 있는 ‘NAC(Network Access Control)’는 전통적 강세인 공공 부문은 물론 금융 및 제조 등 민간 분야의 대기업군 수요 증가로 매출이 증가했다. 클라우드 NAC 부문은 누적 고객 180곳을 돌파하면서 비즈니스 커버리지를 중소기업(SMB) 영역까지 확대했다.  \n  \n지니언스의 신성장동력인 EDR(Endpoint Detection & Response) 사업도 순항 중이다. 글로벌 EDR 제품을 사용하던 기업을 윈백(Win Back, 자사 제품으로 교체) 하는데 성공했으며, 국내 굴지의 제조 대기업에 EDR을 잇따라 공급했다.  \n  \n제로트러스트 사업 고도화를 위해 SSL-VPN기업 퓨쳐텍정보통신을 인수하여, 제로트러스트 초기 시장에서의 입지를 확대했다.  \n  \n지니언스는 주요 고객의 수요 증가에 따른 매출 회복, 보안 산업 저변 확대를 위한 얼라이언스 확대 등을 통해 사업 고도화를 실현하고 안정적인 실적 성장을 지속한다는 계획이다. NAC 분야는 SSL-VPN, 제로트러스트 분야와 긴밀히 연계하여 수요를 발굴하고, EDR 분야는 ‘K-시큐리티 얼라이언스’,  ‘오픈(OPEN) XDR 통합보안 플랫폼’개발 등 보안 기업과의 협업을 통해 사업 저변을 확대할 방침이다.  \n  \n이동범 지니언스 대표는 “안정적인 성장세를 이어가고 있는 NAC뿐만 아니라 EDR, 제로트러스트 각 분야의 성장이 질적으로도 고도화되고 있다”며 “글로벌 비즈니스 확대 노력과 맞물려 새로운 기회들이 지속적으로 창출되고 있다”고 밝혔다.  \n  \n심의섭 NH투자증권 연구원은 “지니언스는 사이버 보안 펀드, 제로트러스트 실증 과제 등 국내 정부 정책 확대에 따른 수혜와 더불어 민간 기업들의 윈백 및 신규 도입으로 성장세가 확대될 것”으로 전망했다.\n\n|  |\n|"}, {"title": "- 국내 환경에 최적화된 제로트러스트 보안 모델 확산 도모 - 수산아이앤티, 퓨쳐텍정보통신과 컨소시엄 구축…에스트래픽 등 수요기관으로 참여 - 개방형 제로트러스트 모델을 실제 업무 환경에 구현하고 적정성 검증", "date": "2024.07.15", "link": "https://www.genians.co.kr/pr-room/press/20240715", "category": "ZTNA", "body_html": "<p>사이버 보안 전문 기업 지니언스는 과학기술정보통신부(이하 과기정통부)와 한국인터넷진흥원(KISA)이 발주한 ‘2024년 제로트러스트 도입 시범사업’을 수주했다고 15일 밝혔다.  </p>\n<p>이번 사업은 정부•공공기관 및 기업을 대상으로 국내 기업의 제로트러스트 솔루션 시범 도입을 지원하여, 국내 환경에 최적화된 제로트러스트 보안모델의 확산을 도모하는 것이 목표다. 정부 및 공공기관과 민간 2개 분야에서 4개 과제를 선정하고, 총 45억 원의 지원금을 지원한다. 각 과제당 최대 11.25억 원의 정부 지원금이 제공된다.  </p>\n<p>지니언스는 제로트러스트 요소 기술을 보유한 수산아이앤티•퓨쳐텍정보통신과 컨소시엄을 구성하여, 이번 시범사업을 추진한다. 수요기관인 에스트래픽 등에 제로트러스트 범용성을 실질적으로 검증한다.  </p>\n<p>지니언스 컨소시엄은 2024년 6월부터 11월까지 6개월간 사업을 진행하며, 개방형 제로트러스트 모델을 실제 업무 환경에 구현하고 적정성을 검증할 예정이다. 주요 목표는 ▲제로트러스트 기본 원칙을 준수한 보안 모델 설계 ▲서로 다른 IT 인프라 환경을 가진 수요 기업에 구축 및 운영을 통해 모델의 범용성 검증 ▲시범사업 산출물 공개를 통한 개방형 제로트러스트 생태계 확립 및 확산 등이다.  </p>\n<p>컨소시엄사 수산아이앤티는 시장 1위의 검증된 보안 솔루션을 정책시행지점(PEP)에 제공하고 제로트러스트 핵심인 IAM, PIP, PDP 등과 표준 프로토콜을 통해 연동하여 ZTNA 기반의 핵심 모듈을 구현한다. 또한, 기 운용 중인 솔루션과의 원활한 연계 기능을 담당한다.  </p>\n<p>지니언스는 이번 사업을 통해 제로트러스트 선도 기업으로 발돋움할 계획이다. 이미 회사는 국내 및 글로벌 제로트러스트 첫 고객을 확보에 성공하였으며, ‘제로트러스트 2.0 전략’을 발표하는 등 사업 의지를 적극적으로 보여주고 있다.  </p>\n<p>개방형 제로트러스트 모델을 통해 국내 대부분의 기업에서 제로트러스트를 채택하고, 모든 보안업체가 참여 가능한 제로트러스트 생태계 확립 및 확산에 기여할 것으로 기대된다.  </p>\n<p>이동범 지니언스 대표는 “국내 환경에 맞춘 개방형 제로트러스트 모델의 아키텍처 설계와 구축을 통해 제로트러스트 공급자와 수요자의 생태계를 확립하고 확산시키기를 기대한다”며 “개별 솔루션 수준이 아닌 핵심 요소 전반에 걸친 최적화 단계로 진화한 제로트러스트 보안 모델로 국가 사이버 안보 실현에 총력을 다할 것”이라고 전했다..  </p>\n<p>수산아이앤티 정은아 대표이사는 \"이번 협업을 통해 개방형 제로트러스트 보안 모델의 범용성을 검증하고, 성공적인 ZTNA 보안 모델 개발을 기대한다\"라며 \"다양한 기업들과의 협업을 통해 시장 경쟁력을 강화해 나갈 것\"이라고 말했다.  </p>\n<p>한편, 지니언스는 2022년 제로트러스트 솔루션 ‘지니안 ZTNA(Zero Trust Network Access)’를 출시했다. 지난해에는 제로트러스트 실증 과제도 참여했으며, 올해는 시범사업 주관 기업으로 사업을 추진할 계획이다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스는 과학기술정보통신부(이하 과기정통부)와 한국인터넷진흥원(KISA)이 발주한 ‘2024년 제로트러스트 도입 시범사업’을 수주했다고 15일 밝혔다.  \n  \n이번 사업은 정부•공공기관 및 기업을 대상으로 국내 기업의 제로트러스트 솔루션 시범 도입을 지원하여, 국내 환경에 최적화된 제로트러스트 보안모델의 확산을 도모하는 것이 목표...", "full_text": "사이버 보안 전문 기업 지니언스는 과학기술정보통신부(이하 과기정통부)와 한국인터넷진흥원(KISA)이 발주한 ‘2024년 제로트러스트 도입 시범사업’을 수주했다고 15일 밝혔다.  \n  \n이번 사업은 정부•공공기관 및 기업을 대상으로 국내 기업의 제로트러스트 솔루션 시범 도입을 지원하여, 국내 환경에 최적화된 제로트러스트 보안모델의 확산을 도모하는 것이 목표다. 정부 및 공공기관과 민간 2개 분야에서 4개 과제를 선정하고, 총 45억 원의 지원금을 지원한다. 각 과제당 최대 11.25억 원의 정부 지원금이 제공된다.  \n  \n지니언스는 제로트러스트 요소 기술을 보유한 수산아이앤티•퓨쳐텍정보통신과 컨소시엄을 구성하여, 이번 시범사업을 추진한다. 수요기관인 에스트래픽 등에 제로트러스트 범용성을 실질적으로 검증한다.  \n  \n지니언스 컨소시엄은 2024년 6월부터 11월까지 6개월간 사업을 진행하며, 개방형 제로트러스트 모델을 실제 업무 환경에 구현하고 적정성을 검증할 예정이다. 주요 목표는 ▲제로트러스트 기본 원칙을 준수한 보안 모델 설계 ▲서로 다른 IT 인프라 환경을 가진 수요 기업에 구축 및 운영을 통해 모델의 범용성 검증 ▲시범사업 산출물 공개를 통한 개방형 제로트러스트 생태계 확립 및 확산 등이다.  \n  \n컨소시엄사 수산아이앤티는 시장 1위의 검증된 보안 솔루션을 정책시행지점(PEP)에 제공하고 제로트러스트 핵심인 IAM, PIP, PDP 등과 표준 프로토콜을 통해 연동하여 ZTNA 기반의 핵심 모듈을 구현한다. 또한, 기 운용 중인 솔루션과의 원활한 연계 기능을 담당한다.  \n  \n지니언스는 이번 사업을 통해 제로트러스트 선도 기업으로 발돋움할 계획이다. 이미 회사는 국내 및 글로벌 제로트러스트 첫 고객을 확보에 성공하였으며, ‘제로트러스트 2.0 전략’을 발표하는 등 사업 의지를 적극적으로 보여주고 있다.  \n  \n개방형 제로트러스트 모델을 통해 국내 대부분의 기업에서 제로트러스트를 채택하고, 모든 보안업체가 참여 가능한 제로트러스트 생태계 확립 및 확산에 기여할 것으로 기대된다.  \n  \n이동범 지니언스 대표는 “국내 환경에 맞춘 개방형 제로트러스트 모델의 아키텍처 설계와 구축을 통해 제로트러스트 공급자와 수요자의 생태계를 확립하고 확산시키기를 기대한다”며 “개별 솔루션 수준이 아닌 핵심 요소 전반에 걸친 최적화 단계로 진화한 제로트러스트 보안 모델로 국가 사이버 안보 실현에 총력을 다할 것”이라고 전했다..  \n  \n수산아이앤티 정은아 대표이사는 \"이번 협업을 통해 개방형 제로트러스트 보안 모델의 범용성을 검증하고, 성공적인 ZTNA 보안 모델 개발을 기대한다\"라며 \"다양한 기업들과의 협업을 통해 시장 경쟁력을 강화해 나갈 것\"이라고 말했다.  \n  \n한편, 지니언스는 2022년 제로트러스트 솔루션 ‘지니안 ZTNA(Zero Trust Network Access)’를 출시했다. 지난해에는 제로트러스트 실증 과제도 참여했으며, 올해는 시범사업 주관 기업으로 사업을 추진할 계획이다.\n\n|  |\n|"}, {"title": "국내 최초 네트워크 접근제어 솔루션 개발 사용자 단말 위협하는 악성코드 탐지 ‘EDR’ 출시 미국·중동 등 글로벌 고객 100곳 이상 확보", "date": "2024.06.06", "link": "https://www.genians.co.kr/pr-room/press/20240606", "category": "NAC", "body_html": "<p>이동범 대표님의 인터뷰가 조선비즈에 보도되었습니다.  </p>\n<p>\"올해 글로벌 비즈니스 턴어라운드를 위해 글로벌 파트너사와 지역별 고객 분석 및 서비스를 개발하고, 아프리카와 유럽 등 다양한 국가에서 고객 범위를 넗히기 위한 영업 활동을 전개할 예정이다\"  </p>\n<p>이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.  </p>\n<p>기사 전문은 아래 링크를 참조하세요.</p>\n<p><a href=\"https://biz.chosun.com/it-science/ict/2024/06/06/NZP6YRWMUVB3ZDFTO47T4D4LEE/\">[사이버보안人] 이동범 지니언스 대표 “네트워크 접근제어 솔루션으로 美서 50개 이상 고객사 확보”</a></p>", "body_text": "이동범 대표님의 인터뷰가 조선비즈에 보도되었습니다.  \n  \n\"올해 글로벌 비즈니스 턴어라운드를 위해 글로벌 파트너사와 지역별 고객 분석 및 서비스를 개발하고, 아프리카와 유럽 등 다양한 국가에서 고객 범위를 넗히기 위한 영업 활동을 전개할 예정이다\"  \n  \n이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.  \n  \n기사 전문은 아래 링크를 ...", "full_text": "이동범 대표님의 인터뷰가 조선비즈에 보도되었습니다.  \n  \n\"올해 글로벌 비즈니스 턴어라운드를 위해 글로벌 파트너사와 지역별 고객 분석 및 서비스를 개발하고, 아프리카와 유럽 등 다양한 국가에서 고객 범위를 넗히기 위한 영업 활동을 전개할 예정이다\"  \n  \n이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.  \n  \n기사 전문은 아래 링크를 참조하세요.\n\n[[사이버보안人] 이동범 지니언스 대표 “네트워크 접근제어 솔루션으로 美서 50개 이상 고객사 확보”](https://biz.chosun.com/it-science/ict/2024/06/06/NZP6YRWMUVB3ZDFTO47T4D4LEE/)"}, {"title": "- 버그바운티 전문 플랫폼과 재계약…국내외 화이트해커 및 전문가로부터 양질의 취약점 수집 기대 - 버그바운티 해외 신고 비중 70% 육박...총 546 건의 신고와 105 건의 취약점 확인 후 조치", "date": "2024.05.21", "link": "https://www.genians.co.kr/pr-room/press/20240521", "category": "기타 뉴스", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 버그바운티 취약점 신고 방식을 일원화하여, 향후 글로벌 운영을 지속적으로 확대할 계획이라고 ??일 밝혔다.  </p>\n<p>‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여할 수 있다.  </p>\n<p>지니언스도 2022년 3월부터 네트워크 접근제어 솔루션(NAC), 클라우드 고객 관리 서비스(CSM)를 대상으로, 버그바운티 프로그램을 자체적으로 운영해 왔다. 이후로는 국내 버그바운티 전문 플랫폼 도입을 통해 제보 범위를 지니언스의 제품 및 서비스(홈페이지, Genian Device Platform Intelligence) 등으로 확대했다.  </p>\n<p>지니언스는 버그바운티를 통해 새로운 취약점이 보고되면 내부 분석을 통해 신속하게 해결한 후, 공격 위험도 등에 따라 홈페이지에 공지하고 고객사 패치를 진행하고 있다. 2022 년 3 월부터 지난해 말까지 총 546 건의 신고를 받았으며, 그중 105 건의 취약점을 확인해 조치했다. 특히 지니언스의 버그바운티 해외 신고 비중은 약 70%에 달하며 신고자 비율은 지속적으로 증가하는 추세다.  </p>\n<p>회사는 더욱 효율적인 취약점 수집을 위해 버그바운티 전문 플랫폼과 재계약을 체결했다. 지니언스는 버그바운티 전문 플랫폼과의 협업으로 제품 취약점에 대해 신속하게 대응할 수 있었으며, 자사 제품 기술력 및 인지도 향상에도 기여해 왔다고 설명했다.  </p>\n<p>특히 지니언스는 버그바운티 전문 플랫폼과 협업을 통해 취약점 신고 방식을 일원화하고, 더욱 다양한 국내외 화이트해커 및 전문가로부터 양질의 정보 수집하여 버그바운티 운영 범위를 글로벌로 지속적으로 확대할 계획이다.   </p>\n<p>회사는 기존 취약점 신고를 지니언스 자체 구글폼과 버그바운티 플랫폼을 통해서 함께 운영하였으나, 올해부터는 플랫폼 홈페이지 접수로 통합했다. 플랫폼 접수 양식은 필수 항목을 기입하지 않을 경우 신고가 제한되며, 이는 무의미한 정보로 인한 혼동을 방지하고 양질의 취약점 수집이 가능하게 한다.  </p>\n<p>김성철 지니언스 연구기획실 상무는 “버그바운티 프로그램을 통해 얻은 인사이트와 전문가들의 제안이 제품을 더욱 견고하게 만드는 데 큰 기여를 하고 있다\"며 \"버그바운티 신고 범위를 확대하기 위해 지속적으로 노력하고 있으며, 향후 취약점에 대한 신속한 대응 및 제품 고도화를 통해 보다 안전한 보안 환경을 제공할 것\"이라고 말했다.  </p>\n<p>한편, 페이스북, 구글, 마이크로소프트 등 주요 글로벌 기업들은 제품 보안 고도화를 위해 버그바운티 프로그램을 도입하고 있으며, 삼성전자, 현대자동차, 네이버 등 국내 기업들도 프로그램을 운영 중이다. 주요 글로벌 버그바운티 플랫폼으로는 해커원(HackerOne)과 버그크라우드(BugCrowd)가 있으며, 국내는 티오리(Theori), 파인더갭(FINDTheGAP), 엔키(ENKI) 등이 대표적이다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 버그바운티 취약점 신고 방식을 일원화하여, 향후 글로벌 운영을 지속적으로 확대할 계획이라고 ??일 밝혔다.  \n  \n‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 버그바운티 취약점 신고 방식을 일원화하여, 향후 글로벌 운영을 지속적으로 확대할 계획이라고 ??일 밝혔다.  \n  \n‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여할 수 있다.  \n  \n지니언스도 2022년 3월부터 네트워크 접근제어 솔루션(NAC), 클라우드 고객 관리 서비스(CSM)를 대상으로, 버그바운티 프로그램을 자체적으로 운영해 왔다. 이후로는 국내 버그바운티 전문 플랫폼 도입을 통해 제보 범위를 지니언스의 제품 및 서비스(홈페이지, Genian Device Platform Intelligence) 등으로 확대했다.  \n  \n지니언스는 버그바운티를 통해 새로운 취약점이 보고되면 내부 분석을 통해 신속하게 해결한 후, 공격 위험도 등에 따라 홈페이지에 공지하고 고객사 패치를 진행하고 있다. 2022 년 3 월부터 지난해 말까지 총 546 건의 신고를 받았으며, 그중 105 건의 취약점을 확인해 조치했다. 특히 지니언스의 버그바운티 해외 신고 비중은 약 70%에 달하며 신고자 비율은 지속적으로 증가하는 추세다.  \n  \n회사는 더욱 효율적인 취약점 수집을 위해 버그바운티 전문 플랫폼과 재계약을 체결했다. 지니언스는 버그바운티 전문 플랫폼과의 협업으로 제품 취약점에 대해 신속하게 대응할 수 있었으며, 자사 제품 기술력 및 인지도 향상에도 기여해 왔다고 설명했다.  \n  \n특히 지니언스는 버그바운티 전문 플랫폼과 협업을 통해 취약점 신고 방식을 일원화하고, 더욱 다양한 국내외 화이트해커 및 전문가로부터 양질의 정보 수집하여 버그바운티 운영 범위를 글로벌로 지속적으로 확대할 계획이다.   \n  \n회사는 기존 취약점 신고를 지니언스 자체 구글폼과 버그바운티 플랫폼을 통해서 함께 운영하였으나, 올해부터는 플랫폼 홈페이지 접수로 통합했다. 플랫폼 접수 양식은 필수 항목을 기입하지 않을 경우 신고가 제한되며, 이는 무의미한 정보로 인한 혼동을 방지하고 양질의 취약점 수집이 가능하게 한다.  \n  \n김성철 지니언스 연구기획실 상무는 “버그바운티 프로그램을 통해 얻은 인사이트와 전문가들의 제안이 제품을 더욱 견고하게 만드는 데 큰 기여를 하고 있다\"며 \"버그바운티 신고 범위를 확대하기 위해 지속적으로 노력하고 있으며, 향후 취약점에 대한 신속한 대응 및 제품 고도화를 통해 보다 안전한 보안 환경을 제공할 것\"이라고 말했다.  \n  \n한편, 페이스북, 구글, 마이크로소프트 등 주요 글로벌 기업들은 제품 보안 고도화를 위해 버그바운티 프로그램을 도입하고 있으며, 삼성전자, 현대자동차, 네이버 등 국내 기업들도 프로그램을 운영 중이다. 주요 글로벌 버그바운티 플랫폼으로는 해커원(HackerOne)과 버그크라우드(BugCrowd)가 있으며, 국내는 티오리(Theori), 파인더갭(FINDTheGAP), 엔키(ENKI) 등이 대표적이다.\n\n|  |\n|"}, {"title": "- 고객 성공 사례 및 제품 시현으로 제품 접근성 확대…다양한 사업 기회 발굴 - 지니안 ZTNA, 다양한 보안 제품과의 연동 협업 인터페이스 제공…복잡한 네트워크 환경 대응 - VPN 회사 인수 등 다양한 노력 통해 더욱 발전된 솔루션 선보일 것", "date": "2024.05.02", "link": "https://www.genians.co.kr/pr-room/press/20240502", "category": "ZTNA", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860 대표 이동범)가 2024년 5월 6일부터 9일까지 미국 샌프란시스코에서 개최되는 세계 최대 사이버 보안 전시회 'RSA 컨퍼런스 2024(이하 RSAC 2024)'에 참가한다고 2일 밝혔다.  </p>\n<p>‘RSAC 2024’는 매년 4만 명 이상의 참관객이 찾는 세계 최대 규모의 사이버 보안 전시회다. 지니언스는 2015년부터 10년 연속으로 RSA 컨퍼런스에 참가하고 있으며, 미국법인 주관으로 독립 부스를 운영한다.  </p>\n<p>지니언스는 '통합 보안 접근(Unified Secure Access)'이라는 주제로 부스를 운영하며, ▲트래픽/애플리케이션 가시성 및 제어 기능 ▲세분화된 원격 액세스 제어 ▲실시간 동적 접근 통제 ▲FIDO, Passkeys 지원으로 더 강력해진 인증 ▲일관된 통제 정책 등을 라이브 데모 형태로 제공한다. 이를 통해 관람객들은 원격, 클라우드, 하이브리드 네트워크 환경 등 모든 접점에서 안전하게 접근하고 보안을 유지하는 기술을 직접 확인할 수 있다.  </p>\n<p>지니언스는 이번 행사에서 제로 트러스트 솔루션 '지니안 ZTNA(Zero Trust Network Access)'의 성공 사례를 공유하고 직접 시현함으로써, 제품의 접근성과 이해도를 높일 계획이다.  </p>\n<p>‘지니안 ZTNA’는 설계 초기부터 제로 트러스트 사상이 적용되어 있는 지니언스의 대표 솔루션이다. IT 및 보안 환경에 최적화된 아키텍처를 통해 정보 접근을 효과적으로 통제하며, 다양한 데이터 보안 제품들과의 원활한 연동과 협력을 지원하는 인터페이스를 제공한다.   </p>\n<p>클라우드, 원격 작업, 애플리케이션까지 아우르는 확장성을 갖춰, 복잡한 네트워크 환경에도 유연하게 대응 가능하다. 또한 사용자와 단말기에 대한 인증 및 보안 검토 기능이 내장되어 있어, 상황에 맞는 적절한 접근 제어 정책을 마련할 수 있다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 “온프레미스 기반 고객사의 클라우드 전환과 IT에서 OT로의 확장 트렌드가 거세지고 있다\"며 \"지니언스는 이러한 고객의 전환과 확장에 적합한 서비스 포트폴리오를 통해 시장의 우위를 확고히 할 것\"이라고 밝혔다  </p>\n<p>한편, 지니언스는 RSA 컨퍼런스 외에도 'GISEC 2024', '블랙햇 MEA 2023' 등 중동 지역을 비롯한 다양한 해외 전시회에 참여하며, 글로벌 시장 공략에 박차를 가하고 있다. 또한 회사는 지난 4월 성공적인 제로 트러스트 구현을 위해 VPN 전문 기업 퓨쳐텍정보통신을 인수한 바 있으며, 제로 트러스트 구현 활성화를 위한 협의체 ‘ZETIA(ZEro Trust Initiative Alliance, 제티아)’에도 참여하고 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860 대표 이동범)가 2024년 5월 6일부터 9일까지 미국 샌프란시스코에서 개최되는 세계 최대 사이버 보안 전시회 'RSA 컨퍼런스 2024(이하 RSAC 2024)'에 참가한다고 2일 밝혔다.  \n  \n‘RSAC 2024’는 매년 4만 명 이상의 참관객이 찾는 세계 최대 규모의 사이버 보안 전시회다. 지니언스는 2...", "full_text": "사이버 보안 전문 기업 지니언스(263860 대표 이동범)가 2024년 5월 6일부터 9일까지 미국 샌프란시스코에서 개최되는 세계 최대 사이버 보안 전시회 'RSA 컨퍼런스 2024(이하 RSAC 2024)'에 참가한다고 2일 밝혔다.  \n  \n‘RSAC 2024’는 매년 4만 명 이상의 참관객이 찾는 세계 최대 규모의 사이버 보안 전시회다. 지니언스는 2015년부터 10년 연속으로 RSA 컨퍼런스에 참가하고 있으며, 미국법인 주관으로 독립 부스를 운영한다.  \n  \n지니언스는 '통합 보안 접근(Unified Secure Access)'이라는 주제로 부스를 운영하며, ▲트래픽/애플리케이션 가시성 및 제어 기능 ▲세분화된 원격 액세스 제어 ▲실시간 동적 접근 통제 ▲FIDO, Passkeys 지원으로 더 강력해진 인증 ▲일관된 통제 정책 등을 라이브 데모 형태로 제공한다. 이를 통해 관람객들은 원격, 클라우드, 하이브리드 네트워크 환경 등 모든 접점에서 안전하게 접근하고 보안을 유지하는 기술을 직접 확인할 수 있다.  \n  \n지니언스는 이번 행사에서 제로 트러스트 솔루션 '지니안 ZTNA(Zero Trust Network Access)'의 성공 사례를 공유하고 직접 시현함으로써, 제품의 접근성과 이해도를 높일 계획이다.  \n  \n‘지니안 ZTNA’는 설계 초기부터 제로 트러스트 사상이 적용되어 있는 지니언스의 대표 솔루션이다. IT 및 보안 환경에 최적화된 아키텍처를 통해 정보 접근을 효과적으로 통제하며, 다양한 데이터 보안 제품들과의 원활한 연동과 협력을 지원하는 인터페이스를 제공한다.   \n  \n클라우드, 원격 작업, 애플리케이션까지 아우르는 확장성을 갖춰, 복잡한 네트워크 환경에도 유연하게 대응 가능하다. 또한 사용자와 단말기에 대한 인증 및 보안 검토 기능이 내장되어 있어, 상황에 맞는 적절한 접근 제어 정책을 마련할 수 있다.  \n  \n김계연 지니언스 CTO•미국법인장은 “온프레미스 기반 고객사의 클라우드 전환과 IT에서 OT로의 확장 트렌드가 거세지고 있다\"며 \"지니언스는 이러한 고객의 전환과 확장에 적합한 서비스 포트폴리오를 통해 시장의 우위를 확고히 할 것\"이라고 밝혔다  \n  \n한편, 지니언스는 RSA 컨퍼런스 외에도 'GISEC 2024', '블랙햇 MEA 2023' 등 중동 지역을 비롯한 다양한 해외 전시회에 참여하며, 글로벌 시장 공략에 박차를 가하고 있다. 또한 회사는 지난 4월 성공적인 제로 트러스트 구현을 위해 VPN 전문 기업 퓨쳐텍정보통신을 인수한 바 있으며, 제로 트러스트 구현 활성화를 위한 협의체 ‘ZETIA(ZEro Trust Initiative Alliance, 제티아)’에도 참여하고 있다.\n\n|  |\n|"}, {"title": "- 고도화된 사이버 위협에 선제적 대응 목표로 EDR 솔루션 도입 - 객관적 평가 기준 통해 ‘지니안 EDR’ 선정…가시성, 통합관리 대응 체계 등에서 긍정적 평가", "date": "2024.04.23", "link": "https://www.genians.co.kr/pr-room/press/20240423", "category": "EDR", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860 대표 이동범)는 이화여자대학교 의료원(이대목동병원, 이대서울병원)에 EDR(Endpoint Detection &amp; Response) 솔루션을 공급했다고 23일 밝혔다.  </p>\n<p>최근 의료기관을 대상으로 한 해킹 공격이 매년 증가하는 추세다. 보건복지부, 한국사회보장정보원, 한국인터넷진흥원, 교육부 자료에 따르면 2020년 2월부터 2023년까지 3년간 의료기관에서 발생한 사이버 침해 사고는 74건에 달하는 것으로 나타났다.  </p>\n<p>이러한 사이버 위협은 내부적으로 막대한 피해를 입히는 데 그치지 않고, 환자들의 민감 정보가 유출될 우려가 있어 각별한 주의가 필요하다. 또한 AI, IoT, 빅데이터 등 디지털 기술이 의료 시스템에 도입되며, 수준 높은 보안에 대한 요구가 확대되고 있는 상황이다.  </p>\n<p>이화여자대학교 의료원은 환자들에게 더 안전한 의료 서비스를 제공하기 위해 지난해 지능형 의료서비스 프로젝트에 네트워크 보안 솔루션을 도입했으며, 올해는 고도화되고 있는 사이버 보안 위협에 대응하기 위해 EDR 솔루션 도입을 결정했다.  </p>\n<p>이화여자대학교 의료원은 적합한 제품을 선별하기 위해 다양한 EDR 제품을 검토하였으며, 그 결과 지니언스의 EDR 솔루션을 선택했다. 해당 제품은 ▲네트워크•로그•단말 전반에 걸친 위협 가시성 ▲사이버 위협에 대한 신속하고 효율적인 대응 체계 ▲악성코드와 이상행위의 통합 관리 등 여러 부분에서 좋은 평가를 받았다.   </p>\n<p>지니언스의 '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해, 위협의 탐지 및 분석, 대응 기능을 제공한다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지/예방하고, 사후 감사 증적이 가능하다.  </p>\n<p>이와 함께 ‘지니안 EDR’은 ▲이벤트 정보 수집 및 연동 ▲수집 정보 검색 ▲분석 정보 가시화 ▲최신 위협 인텔리전스 활용 ▲엔드포인트 위협 분석 ▲엔드포인트 추적관리 등의 기능도 제공한다. 단말 부하를 최소화한 에이전트, 수집된 데이터 기반 관리자 정의, 대시보드 제공 등을 통해 위협에 대해 효율적으로 대응할 수 있다. 또한 전문 안티 랜섬웨어 기능을 통해 신•변종 랜섬웨어에 대한 고도화된 대응도 가능하다.  </p>\n<p>현재 '지니안 EDR'은 2023년 공공조달시장 점유율 78%라는 압도적 1위를 기록하고 있으며, 60만 대 이상의 에이전트에 적용됐다. 2022년에는 국내외 EDR 제품 중 최초로 ‘국가정보원 보안적합성 검증제도’를 통과해 우수한 보안 수준도 입증한 바 있다. 지니언스는 금융 및 공공기관 등 다양한 환경에 적용된 '지니안 EDR'이 기술력과 안정성 측면에서도 좋은 평가를 받고 있다고 설명했다.  </p>\n<p>김준형 지니언스 엔드포인트보안사업본부 상무는 “이번 EDR 솔루션 공급으로 이화여자대학교 의료원 환자들에게 안전한 보안 환경을 제공할 수 있게 되어 기쁘다\"라며 \"지니안 EDR에 대한 문의가 지속적으로 들어오고 있으며, 향후 더 많은 고객을 확보하여 신뢰도 높은 국내 보안 환경을 조성에 힘쓸 것”이라고 전했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860 대표 이동범)는 이화여자대학교 의료원(이대목동병원, 이대서울병원)에 EDR(Endpoint Detection & Response) 솔루션을 공급했다고 23일 밝혔다.  \n  \n최근 의료기관을 대상으로 한 해킹 공격이 매년 증가하는 추세다. 보건복지부, 한국사회보장정보원, 한국인터넷진흥원, 교육부 자료에 따르면 2...", "full_text": "사이버 보안 전문 기업 지니언스(263860 대표 이동범)는 이화여자대학교 의료원(이대목동병원, 이대서울병원)에 EDR(Endpoint Detection & Response) 솔루션을 공급했다고 23일 밝혔다.  \n  \n최근 의료기관을 대상으로 한 해킹 공격이 매년 증가하는 추세다. 보건복지부, 한국사회보장정보원, 한국인터넷진흥원, 교육부 자료에 따르면 2020년 2월부터 2023년까지 3년간 의료기관에서 발생한 사이버 침해 사고는 74건에 달하는 것으로 나타났다.  \n  \n이러한 사이버 위협은 내부적으로 막대한 피해를 입히는 데 그치지 않고, 환자들의 민감 정보가 유출될 우려가 있어 각별한 주의가 필요하다. 또한 AI, IoT, 빅데이터 등 디지털 기술이 의료 시스템에 도입되며, 수준 높은 보안에 대한 요구가 확대되고 있는 상황이다.  \n  \n이화여자대학교 의료원은 환자들에게 더 안전한 의료 서비스를 제공하기 위해 지난해 지능형 의료서비스 프로젝트에 네트워크 보안 솔루션을 도입했으며, 올해는 고도화되고 있는 사이버 보안 위협에 대응하기 위해 EDR 솔루션 도입을 결정했다.  \n  \n이화여자대학교 의료원은 적합한 제품을 선별하기 위해 다양한 로 트러스트 구현을 위해, 지난 8일 퓨쳐텍정보통신의 지분 100%를 취득했다. 퓨쳐텍정보통신은 SSL VPN에 특화된 전문 기업이다. SSL VPN 기술은 원격접속을 위한 기반기술로 SDP(Software Defined Perimeter), ZTNA(Zero Trust Network Access) 등과 연동/통합되거나 발전되어 제로 트러스트 환경을 구현할 수 있다.   </p>\n<p>지니언스는 향후 퓨쳐텍정보통신의 강점을 활용하여 VPN 등 관련 시장에 진입하고, 더 나아가 자사 ZTNA 솔루션의 완성을 위해 프라이빗 액세스(Private Access) 및 인터넷 액세스(Internet Access) 분야 기술•제품개발을 추진한다는 계획이다.   </p>\n<p>이미 회사는 과거 레드스톤소프트 인수를 통해 EDR 2.0을 완성한 경험이 있으며, 이러한 성공의 DNA를 제로 트러스트 분야로 확대할 수 있다는 자신감을 보였다.   </p>\n<p>지니언스는 성공적인 제로 트러스트 2.0 시대 개막을 위해, 올해 세계 최대 보안 전시회인 ‘RSAC 2024’에서 원격 접속 및 연결 분야의 고도화된 보안 기능을 선보일 예정이다. 더불어 2차 제로 트러스트 실증 사업, 정부가 진행 예정인 MLS(다중계층보안) 관련 사업에도 적극 대응하여 제로 트러스트 시장의 입지를 강화할 계획이다.  </p>\n<p>이동범 지니언스 대표이사는 “고객의 문제 해결에 초점을 맞추는 제로 트러스트 전략의 핵심은 고객의 성공 사례를 만들어 이를 지속적으로 개선하고 보완하여 완성하는 것”이라며 “고객이 필요로 하는 적절한 솔루션을 지속적으로 제공함으로써 제로 트러스트 시장에서의 우위를 확고히 할 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 제로 트러스트 보안 아키텍처의 새로운 지평을 여는 ‘제로 트러스트 2.0 전략’을 발표했다.   \n  \n제로 트러스트는 \"항상 검증하고, 절대 신뢰하지 말라\"의 개념이다. 단순히 실제 제품을 의미하는 것이 아닌 프레임워크, 모델, 이니셔티브라고 할 수 있으며, 궁극적으로는 고객 문제 해결에 초점...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 제로 트러스트 보안 아키텍처의 새로운 지평을 여는 ‘제로 트러스트 2.0 전략’을 발표했다.   \n  \n제로 트러스트는 \"항상 검증하고, 절대 신뢰하지 말라\"의 개념이다. 단순히 실제 제품을 의미하는 것이 아닌 프레임워크, 모델, 이니셔티브라고 할 수 있으며, 궁극적으로는 고객 문제 해결에 초점을 맞추는 것을 목표로 한다.  \n  \n지니언스는 2022년 제로 트러스트 솔루션 '지니안 ZTNA(Zero Trust Network Access)'를 출시했다. 지난해에는 과학기술정보통신부 주관의 제로 트러스트 실증과제에 참여하고, 국내 및 글로벌 제로 트러스트 첫 고객을 확보하는 등 관련 시장에서 입지를 확대해 가고 있다.  \n  \n제로 트러스트 완성을 위한 고객의 니즈는 명확하다. 기존에 회사가 운영하던 보안 환경을 보호하면서, 운영 효율성을 향상시키고 더 나아가 강력한 보안을 실현하는 것이다. 고객마다 구현하고자 하는 프레임워크는 다를 수 있지만, 국내 환경에 적합하고 기존 보유한 솔루션과의 융합과 연동시키는 것이 무엇보다 중요하다.  \n  \n지니언스는 이러한 고객의 니즈를 충족시키기 위해 '제로 트러스트 2.0 전략'을 발표했다. 이 전략의 핵심은 ▶기 운영중인 대표 보안 솔루션과의 융합/통합 ▶더 강력한 보안 시너지 창출 ▶포괄적인 가시성과 인증을 기반으로 다양한 운영 환경 보호다.  \n  \n특히 회사는 성공적인 제로 트러스트 구현을 위해, 지난 8일 퓨쳐텍정보통신의 지분 100%를 취득했다. 퓨쳐텍정보통신은 SSL VPN에 특화된 전문 기업이다. SSL VPN 기술은 원격접속을 위한 기반기술로 SDP(Software Defined Perimeter), ZTNA(Zero Trust Network Access) 등과 연동/통합되거나 발전되어 제로 트러스트 환경을 구현할 수 있다.   \n  \n지니언스는 향후 퓨쳐텍정보통신의 강점을 활용하여 VPN 등 관련 시장에 진입하고, 더 나아가 자사 ZTNA 솔루션의 완성을 위해 프라이빗 액세스(Private Access) 및 인터넷 액세스(Internet Access) 분야 기술•제품개발을 추진한다는 계획이다.   \n  \n이미 회사는 과거 레드스톤소프트 인수를 통해 EDR 2.0을 완성한 경험이 있으며, 이러한 성공의 DNA를 제로 트러스트 분야로 확대할 수 있다는 자신감을 보였다.   \n  \n지니언스는 성공적인 제로 트러스트 2.0 시대 개막을 위해, 올해 세계 최대 보안 전시회인 ‘RSAC 2024’에서 원격 접속 및 연결 분야의 고도화된 보안 기능을 선보일 예정이다. 더불어 2차 제로 트러스트 실증 사업, 정부가 진행 예정인 MLS(다중계층보안) 관련 사업에도 적극 대응하여 제로 트러스트 시장의 입지를 강화할 계획이다.  \n  \n이동범 지니언스 대표이사는 “고객의 문제 해결에 초점을 맞추는 제로 트러스트 전략의 핵심은 고객의 성공 사례를 만들어 이를 지속적으로 개선하고 보완하여 완성하는 것”이라며 “고객이 필요로 하는 적절한 솔루션을 지속적으로 제공함으로써 제로 트러스트 시장에서의 우위를 확고히 할 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "- 지능화되고 고도화된 사이버 위협에 대한 예방과 선제 대응 목표 - 기술력, 안정성 등 객관적 평가기준을 통해 지니언스 EDR 선정", "date": "2024.03.29", "link": "https://www.genians.co.kr/pr-room/press/20240329", "category": "EDR", "body_html": "<p>지니언스가 신규 수주에 성공하며, EDR 시장에서의 영향력을 확대하고 있다.  </p>\n<p>사이버 보안 전문 기업 지니언스는 국내 에너지 기업 E1에 EDR(Endpoint Detection &amp; Response) 솔루션을 공급했다고 29일 밝혔다.  </p>\n<p>E1은 LPG 사업을 기반으로 최근 수소 및 블루 암모니아, 전기차 충전, 태양광 발전 사업 등 친환경 에너지 기업으로 도약하고 있다. 올해는 무재해 40년이라는 기록을 달성하였으며, 더욱 안전한 작업 환경 조성을 위해 IoT, 빅데이터, AI 등 디지털 기술도 적극 활용 중이다.   </p>\n<p>E1은 이러한 디지털 환경에 대응하기 위해 사이버 보안 역량을 강화하고 있다. 업계 최초로 ‘정보보호 및 개인정보보호 관리체계인증(ISMS-P)’을 획득하였으며, 비즈니스 연속성 및 안정성 확보를 위해 EDR 솔루션 도입도 결정했다.  </p>\n<p>▲ 네트워크•로그•단말 전반에 걸친 위협 가시성 확보 ▲ 랜섬웨어 및 중요 정보 탈취•시스템 중단 공격과 같은 치명적 위협을 조기에 탐지하고 차단 및 복구가 가능한 시스템 구축 등을 목표로 선정해 다양한 EDR 제품을 면밀히 검토했으며, 그 결과 E1은 지니언스의 EDR솔루션을 채택했다.  </p>\n<p>지니언스의 EDR 솔루션 '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공한다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지/예방하고, 사후 감사 증적이 가능하다.  </p>\n<p>▲이벤트 정보 수집 및 연동 ▲수집 정보 검색 ▲분석 정보 가시화 ▲최신 위협 인텔리전스 활용 ▲엔드포인트 위협 분석 ▲엔드포인트 추적관리 등의 기능도 제공한다. 단말 부하를 최소화한 에이전트, 수집된 데이터 기반 관리자 정의, 대시보드 제공 등을 통해 위협에 대한 효율적인 대응이 가능하다는 특징이 있다. 특화된 안티 랜섬웨어 기술을 통해 신•변종 랜섬웨어에 대한 자동 탐지 및 차단•복원 기능도 제공한다.  </p>\n<p>또한 ‘지니안 EDR’은 금융 및 공공기관 등 다양한 환경에 도입돼, 기술력과 안정성 측면에서도 좋은 평가를 받았다. 해당 솔루션은 2023년 공공조달 시장 점유율 78%라는 압도적인 1위를 기록했으며, 현재 60만 대 이상의 에이전트에 적용됐다. 2022년에는 국내외 EDR 제품 중 최초로 ‘국가정보원 보안적합성 검증제도’를 통과해 우수한 보안 수준도 입증한 바 있다.  </p>\n<p>최근 APT, 랜섬웨어 등 사이버 위협이 고도화되며, 신속한 분석 및 대응으로 안전한 보안 환경을 제공하는 EDR 제품에 대한 수요가 증가하고 있다. 글로벌 시장조사 전문기관 AMR은 전 세계 EDR 시장 규모가 2021년 19억 달러(약 2조 5천억 원)로, 2022년부터 2031년까지 연평균 25.3%씩 성장해 2031년에는 183억 달러(약 24조 5천억 원)에 이를 것으로 전망했다.  </p>\n<p>김준형 지니언스 엔드포인트보안사업본부 상무는 “지니안EDR은 보안이 중요한 기업, 금융사, 대형 공공기관 등 다수 고객사에 활용되고 있는 검증된 제품이다“라며 ”이번 공급을 통해 더욱 다양한 산업 레퍼런스를 확보할 수 있게 되었으며, 이를 기회 삼아 성장하는 EDR 시장에서의 입지를 더욱 공고히 할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 신규 수주에 성공하며, EDR 시장에서의 영향력을 확대하고 있다.  \n  \n사이버 보안 전문 기업 지니언스는 국내 에너지 기업 E1에 EDR(Endpoint Detection & Response) 솔루션을 공급했다고 29일 밝혔다.  \n  \nE1은 LPG 사업을 기반으로 최근 수소 및 블루 암모니아, 전기차 충전, 태양광 발전 사업 등 친환경 에...", "full_text": "지니언스가 신규 수주에 성공하며, EDR 시장에서의 영향력을 확대하고 있다.  \n  \n사이버 보안 전문 기업 지니언스는 국내 에너지 기업 E1에 EDR(Endpoint Detection & Response) 솔루션을 공급했다고 29일 밝혔다.  \n  \nE1은 LPG 사업을 기반으로 최근 수소 및 블루 암모니아, 전기차 충전, 태양광 발전 사업 등 친환경 에너지 기업으로 도약하고 있다. 올해는 무재해 40년이라는 기록을 달성하였으며, 더욱 안전한 작업 환경 조성을 위해 IoT, 빅데이터, AI 등 디지털 기술도 적극 활용 중이다.   \n  \nE1은 이러한 디지털 환경에 대응하기 위해 사이버 보안 역량을 강화하고 있다. 업계 최초로 ‘정보보호 및 개인정보보호 관리체계인증(ISMS-P)’을 획득하였으며, 비즈니스 연속성 및 안정성 확보를 위해 EDR 솔루션 도입도 결정했다.  \n  \n▲ 네트워크•로그•단말 전반에 걸친 위협 가시성 확보 ▲ 랜섬웨어 및 중요 정보 탈취•시스템 중단 공격과 같은 치명적 위협을 조기에 탐지하고 차단 및 복구가 가능한 시스템 구축 등을 목표로 선정해 다양한 EDR 제품을 면밀히 검토했으며, 그 결과 E1은 지니언스의 EDR솔루션을 채택했다.  \n  \n지니언스의 EDR 솔루션 '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공한다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지/예방하고, 사후 감사 증적이 가능하다.  \n  \n▲이벤트 정보 수집 및 연동 ▲수집 정보 검색 ▲분석 정보 가시화 ▲최신 위협 인텔리전스 활용 ▲엔드포인트 위협 분석 ▲엔드포인트 추적관리 등의 기능도 제공한다. 단말 부하를 최소화한 에이전트, 수집된 데이터 기반 관리자 정의, 대시보드 제공 등을 통해 위협에 대한 효율적인 대응이 가능하다는 특징이 있다. 특화된 안티 랜섬웨어 기술을 통해 신•변종 랜섬웨어에 대한 자동 탐지 및 차단•복원 기능도 제공한다.  \n  \n또한 ‘지니안 EDR’은 금융 및 공공기관 등 다양한 환경에 도입돼, 기술력과 안정성 측면에서도 좋은 평가를 받았다. 해당 솔루션은 2023년 공공조달 시장 점유율 78%라는 압도적인 1위를 기록했으며, 현재 60만 대 이상의 에이전트에 적용됐다. 2022년에는 국내외 EDR 제품 중 최초로 ‘국가정보원 보안적합성 검증제도’를 통과해 우수한 보안 수준도 입증한 바 있다.  \n  \n최근 APT, 랜섬웨어 등 사이버 위협이 고도화되며, 신속한 분석 및 대응으로 안전한 보안 환경을 제공하는 EDR 제품에 대한 수요가 증가하고 있다. 글로벌 시장조사 전문기관 AMR은 전 세계 EDR 시장 규모가 2021년 19억 달러(약 2조 5천억 원)로, 2022년부터 2031년까지 연평균 25.3%씩 성장해 2031년에는 183억 달러(약 24조 5천억 원)에 이를 것으로 전망했다.  \n  \n김준형 지니언스 엔드포인트보안사업본부 상무는 “지니안EDR은 보안이 중요한 기업, 금융사, 대형 공공기관 등 다수 고객사에 활용되고 있는 검증된 제품이다“라며 ”이번 공급을 통해 더욱 다양한 산업 레퍼런스를 확보할 수 있게 되었으며, 이를 기회 삼아 성장하는 EDR 시장에서의 입지를 더욱 공고히 할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- 주정부 기관 포함 금융, 의료, 방산, 항공, 유통 등 다양한 분야에 공급…글로벌 경쟁력 입증 - 글로벌 시장 진출 확대 가속화…국내 정보보호 산업 발전에도 기여", "date": "2024.03.12", "link": "https://www.genians.co.kr/pr-room/press/20240312", "category": "비즈니스 & 성과", "body_html": "<p>지니언스가 글로벌 시장에서 성장을 이어가고 있다.  </p>\n<p>사이버 보안 전문 기업 지니언스는 최근 미국•중동•남미•동남아 지역에 네트워크 보안 솔루션 ‘지니안 NAC(Network Access Control)’를 잇따라 공급했다고 12일 밝혔다. 주정부 기관 포함 금융, 의료, 방산, 항공, 유통 등 고객 분야도 다양하다.  </p>\n<p>양적인 성장뿐이 아니다. 글로벌 가구 유통 기업은 과거 온프레미스(구축형) 형태의 NAC를 도입해 활용 중이었으나, 전체 매장으로 확대 적용하는 과정에서 클라우드 기반 구독형 모델로 전환했다. 또한 필리핀의 에너지 기업은 2020년 1차 도입 후 추가로 노드를 증설한 바 있으며, 말레이시아 유틸리티 기업도 경쟁사의 NAC를 ‘지니언스 NAC’로 윈백했다.  </p>\n<p>재택•원격 근무 확산 등으로 IT환경이 복잡해지면서, '클라우드 NAC'에 대한 관심은 더욱 높아졌다. 지니언스는 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB)부터 다국적 기업까지 다양한 글로벌 고객층에 구독형 모델 ‘클라우드 NAC’를 제공하며 좋은 평가를 받고 있다.   </p>\n<p>기존 고객들로부터의 지속적인 제품 수요 증가 또한 지니언스의 글로벌 사업 성장을 뒷받침하고 있다. 일부 고객사는 지니언스 솔루션을 시범 적용하여 검증하고, 이후 추가 도입을 결정했다. 회사 측은 이는 지니언스 솔루션의 우수성과 높은 만족도를 보여주는 지표라고 설명했다.  </p>\n<p>지니언스는 이번 수주를 통해 올해 글로벌 비즈니스의 턴어라운드 목표에 한발 더 다가섰다. 현재 지니언스 글로벌 고객은 100곳을 넘어섰으며, ▲딜로이트 그룹을 포함한 전 세계 주요 글로벌 파트너와 협업 ▲고도화된 클라우드 서비스 제공 ▲주요 국가에서 시행되는 사이버 보안 전시회 참가 등을 통해 글로벌 시장에서 입지를 한층 더 강화하고 있다.   </p>\n<p>최근 정부는 사이버보안 모태펀드, 정보보호산업 경쟁력 강화 등 국내 보안 기업들의 성장 및 해외 진출을 적극 지원하고 있다. 보안 기업들의 스케일업과 더불어 기업 간 협업 환경이 마련될 것으로 기대되며, 지니언스도 이러한 환경에 맞춰 국내 기업들과의 협업 기회를 모색하여 글로벌 경쟁력을 확대할 방침이다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 “해외 기업들로부터 지속적인 제품 문의가 이어지고 있으며, 최근 잠재력이 높은 중동 지역 고객 추가 확보에도 성공했다”며 “정부 정책과의 시너지로 더 많은 사업 기회를 발굴하여 글로벌 정보보호 시장에서 입지를 다질 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 우수한 보안 기술력을 기반으로 국내 시장에서 성장세를 이어가고 있다. NAC, EDR, ZTNA 등 주력 제품의 시장 점유율을 지속적으로 확대하고 있으며, 지난해 사상 최대 매출을 기록하며 19 년 연속 흑자 달성에도 성공했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 글로벌 시장에서 성장을 이어가고 있다.  \n  \n사이버 보안 전문 기업 지니언스는 최근 미국•중동•남미•동남아 지역에 네트워크 보안 솔루션 ‘지니안 NAC(Network Access Control)’를 잇따라 공급했다고 12일 밝혔다. 주정부 기관 포함 금융, 의료, 방산, 항공, 유통 등 고객 분야도 다양하다.  \n  \n양적인 성장뿐이 아니다....", "full_text": "지니언스가 글로벌 시장에서 성장을 이어가고 있다.  \n  \n사이버 보안 전문 기업 지니언스는 최근 미국•중동•남미•동남아 지역에 네트워크 보안 솔루션 ‘지니안 NAC(Network Access Control)’를 잇따라 공급했다고 12일 밝혔다. 주정부 기관 포함 금융, 의료, 방산, 항공, 유통 등 고객 분야도 다양하다.  \n  \n양적인 성장뿐이 아니다. 글로벌 가구 유통 기업은 과거 온프레미스(구축형) 형태의 NAC를 도입해 활용 중이었으나, 전체 매장으로 확대 적용하는 과정에서 클라우드 기반 구독형 모델로 전환했다. 또한 필리핀의 에너지 기업은 2020년 1차 도입 후 추가로 노드를 증설한 바 있으며, 말레이시아 유틸리티 기업도 경쟁사의 NAC를 ‘지니언스 NAC’로 윈백했다.  \n  \n재택•원격 근무 확산 등으로 IT환경이 복잡해지면서, '클라우드 NAC'에 대한 관심은 더욱 높아졌다. 지니언스는 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB)부터 다국적 기업까지 다양한 글로벌 고객층에 구독형 모델 ‘클라우드 NAC’를 제공하며 좋은 평가를 받고 있다.   \n  \n기존 고객들로부터의 지속적인 제품 수요 증가 또한 지니언스의 글로벌 사업 성장을 뒷받침하고 있다. 일부 고객사는 지니언스 솔루션을 시범 적용하여 검증하고, 이후 추가 도입을 결정했다. 회사 측은 이는 지니언스 솔루션의 우수성과 높은 만족도를 보여주는 지표라고 설명했다.  \n  \n지니언스는 이번 수주를 통해 올해 글로벌 비즈니스의 턴어라운드 목표에 한발 더 다가섰다. 현재 지니언스 글로벌 고객은 100곳을 넘어섰으며, ▲딜로이트 그룹을 포함한 전 세계 주요 글로벌 파트너와 협업 ▲고도화된 클라우드 서비스 제공 ▲주요 국가에서 시행되는 사이버 보안 전시회 참가 등을 통해 글로벌 시장에서 입지를 한층 더 강화하고 있다.   \n  \n최근 정부는 사이버보안 모태펀드, 정보보호산업 경쟁력 강화 등 국내 보안 기업들의 성장 및 해외 진출을 적극 지원하고 있다. 보안 기업들의 스케일업과 더불어 기업 간 협업 환경이 마련될 것으로 기대되며, 지니언스도 이러한 환경에 맞춰 국내 기업들과의 협업 기회를 모색하여 글로벌 경쟁력을 확대할 방침이다.  \n  \n김계연 지니언스 CTO•미국법인장은 “해외 기업들로부터 지속적인 제품 문의가 이어지고 있으며, 최근 잠재력이 높은 중동 지역 고객 추가 확보에도 성공했다”며 “정부 정책과의 시너지로 더 많은 사업 기회를 발굴하여 글로벌 정보보호 시장에서 입지를 다질 것”이라고 말했다.  \n  \n한편, 지니언스는 우수한 보안 기술력을 기반으로 국내 시장에서 성장세를 이어가고 있다. NAC, EDR, ZTNA 등 주력 제품의 시장 점유율을 지속적으로 확대하고 있으며, 지난해 사상 최대 매출을 기록하며 19 년 연속 흑자 달성에도 성공했다.\n\n|  |\n|"}, {"title": "- 2023년 매출액 429억 원으로 전년 比 11.5% 상승…19년 연속 흑자 기록  - NAC의 안정적 매출 증가와 EDR 사업 호조로 실적 확대 - 사이버 안보 정부 정책 수혜 및 글로벌 비즈니스로 퀀텀 점프 기대", "date": "2024.03.06", "link": "https://www.genians.co.kr/pr-room/press/20240220", "category": "NAC", "body_html": "<p>지니언스가 지난해 역대 최대 매출을 기록하며, 19년 연속 흑자에 성공했다  </p>\n<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2023년 매출액 429억 원을 기록하며, 전년 대비 11.5% 증가했다고 20일 공시를 통해 밝혔다. 영업이익과 당기순이익은 각각 65억 원, 62억 원이다.  </p>\n<p>지니언스는 ‘NAC(Network Access Control)’의 안정적인 매출 성장세에 힘입어 호실적을 기록했다. 공공, 금융 등 전통적인 강세 시장에서 독보적인 시장 점유율 1위를 지속함은 물론 대기업에서 중소기업까지 비즈니스 커버리지를 확대한 것도 하나의 성과다.  </p>\n<p>‘EDR(Endpoint Detection &amp; Response)’ 사업 역시 순항 중이다. 지니언스는 정부부처 및 공사 공단에 제품을 공급 중이며, 공공 조달 시장에서 78%의 압도적 시장 점유율 1위를 기록했다. 또한 대형 은행을 필두로 통신, 서비스 등 다양한 업종으로 고객의 폭을 넓히며, 민간 부문도 적극 공략하고 있다.  </p>\n<p>차세대 성장 동력인 ‘제로 트러스트’ 부문에서도 좋은 성과를 얻고 있다. 지니언스는 지난해 과학기술정보통신부가 주관하는 제로 트러스트 실증 과제에 컨소시엄으로 참여하고, 자체 솔루션으로 첫 고객을 확보했다.  </p>\n<p>최근 정부는 국가사이버안보전략 아래 다양한 지원 정책을 수립하고 예산을 편성하는 등 정보보호 산업 육성 및 경쟁력 강화에 적극 나서고 있다. 사이버 보안 펀드 조성, 제로 트러스트 신보안체계 확산, 산업 경쟁력 강화를 위한 제휴 등이 활발해질 것으로 예상되며 지니언스 역시 정부 정책의 수혜를 입을 것으로 기대를 모으고 있다.<br />\n<br />\n또한, 지니언스는 올해 글로벌 비즈니스에 초점을 맞춰, 매출 성장세를 이어갈 방침이다. 회사는 지난해 글로벌 고객 100곳 돌파에 성공하였으며, 특히 중동 시장에서 괄목할 만한 성과를 거뒀다. 이후 글로벌 파트너사와 지역별 고객 분석 및 서비스를 개발하고, 아프리카, 유럽 등 다양한 국가에서 고객 범위를 넓히기 위한 적극적인 영업 활동도 전개 중이다.  </p>\n<p>심의섭 NH투자증권 연구원은 \"올해에도 지니언스는 공공 부문에서 압도적인 시장 점유율을 바탕으로 민간 비즈니스 커버리지 확대를 지속함과 동시에 중동, 동남아, 미국 등 글로벌 사업 성과 또한 높여갈 것\"이라고 전망했다.  </p>\n<p>이동범 지니언스 대표는 “NAC의 안정적인 매출과 EDR 사업의 가파른 성장세로 역대 최대 매출을 달성하게 됐다“며 ”정부 정책 등 변화하는 환경에 맞춰 글로벌 비즈니스 역량을 확대해, 퀀텀 점프의 원년이 되도록 노력할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 지난해 역대 최대 매출을 기록하며, 19년 연속 흑자에 성공했다  \n  \n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2023년 매출액 429억 원을 기록하며, 전년 대비 11.5% 증가했다고 20일 공시를 통해 밝혔다. 영업이익과 당기순이익은 각각 65억 원, 62억 원이다.  \n  \n지니언스는 ‘NAC(Network Acce...", "full_text": "지니언스가 지난해 역대 최대 매출을 기록하며, 19년 연속 흑자에 성공했다  \n  \n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 2023년 매출액 429억 원을 기록하며, 전년 대비 11.5% 증가했다고 20일 공시를 통해 밝혔다. 영업이익과 당기순이익은 각각 65억 원, 62억 원이다.  \n  \n지니언스는 ‘NAC(Network Access Control)’의 안정적인 매출 성장세에 힘입어 호실적을 기록했다. 공공, 금융 등 전통적인 강세 시장에서 독보적인 시장 점유율 1위를 지속함은 물론 대기업에서 중소기업까지 비즈니스 커버리지를 방향을 모색하는 등 파트너와의 상생 협력 및 동반 성장을 위해 노력할 계획이다.  </p>\n<p>지니언스 이동범 대표는 “파트너 여러분들의 관심과 협력 덕분에 다양한 보안 환경에서 빠르게 대처하여 좋은 성과를 얻을 수 있었다\"며 \"제로 트러스트, 클라우드 등 올 한해 국내 보안 산업의 큰 변화가 예상되며, 이 중심에서 지니언스가 파트너사분들과 함께 선도적인 역할을 수행할 수 있도록 더욱 노력할 것\"이라고 전했다.  </p>\n<p>한편, 지니언스는 우수한 보안 기술력을 기반으로 성장세를 이어가고 있다. NAC, EDR, ZTNA 등 주력 제품의 시장 점유율을 지속적으로 확대하고 있으며, 지난해 사상 최대 매출을 기록하며 19년 연속 흑자 달성에도 성공했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 파트너사와의 상생 협력 및 동반성장을 위해 ‘2024년 지니언스 파트너데이’를 개최한다고 22일 밝혔다.  \n  \n'2024년 지니언스 파트너데이'는 지니언스가 파트너사와 지난 한 해의 성과를 돌아보고, 올해 중점 추진사항 및 향후 비전을 공유하는 자리다. 2월 22일부터 23일까지 2일간 진행...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 파트너사와의 상생 협력 및 동반성장을 위해 ‘2024년 지니언스 파트너데이’를 개최한다고 22일 밝혔다.  \n  \n'2024년 지니언스 파트너데이'는 지니언스가 파트너사와 지난 한 해의 성과를 돌아보고, 올해 중점 추진사항 및 향후 비전을 공유하는 자리다. 2월 22일부터 23일까지 2일간 진행되며 대신정보통신, 론스텍을 비롯한 57여 개의 파트너사가 참석할 예정이다.  \n  \n지니언스 이동범 대표의 개회사를 시작으로, 각 사업 부서장들이 연사에 나서 2024년 시장 전망 및 전략을 소개한다. 특히 제로 트러스트, 클라우드 보안 등 최신 보안 트렌드를 분석하고, 이러한 환경에 효율적으로 대처할 수 있는 통합적인 보안 접근 방식을 제시할 계획이다.  \n  \n본 행사는 △각 사업별 소개 및 현황 공유 △지니언스 시큐리티 센터(GSC) 소개 △지니안 ZTNA(Zero Trust Network Access) 개발 방향 제시 등 다양한 주제로 진행된다. 또한 지니언스가 투자한 클라우드 전문기업 클라이온의 노유변 부사장도 무대에 올라, 향후 협업 방향 및 전략을 공유할 방침이다.  \n  \n한 해 동안 파트너사들이 성사시킨 고객 우수 사례를 소개하고, 이를 시상하는 자리도 마련됐다. 회사 측은 이번 행사를 통해 다양한 서비스 현장에 대한 의견을 청취하고 발전 방향을 모색하는 등 파트너와의 상생 협력 및 동반 성장을 위해 노력할 계획이다.  \n  \n지니언스 이동범 대표는 “파트너 여러분들의 관심과 협력 덕분에 다양한 보안 환경에서 빠르게 대처하여 좋은 성과를 얻을 수 있었다\"며 \"제로 트러스트, 클라우드 등 올 한해 국내 보안 산업의 큰 변화가 예상되며, 이 중심에서 지니언스가 파트너사분들과 함께 선도적인 역할을 수행할 수 있도록 더욱 노력할 것\"이라고 전했다.  \n  \n한편, 지니언스는 우수한 보안 기술력을 기반으로 성장세를 이어가고 있다. NAC, EDR, ZTNA 등 주력 제품의 시장 점유율을 지속적으로 확대하고 있으며, 지난해 사상 최대 매출을 기록하며 19년 연속 흑자 달성에도 성공했다.\n\n|  |\n|"}, {"title": "- 글로벌 비즈니스 전환점 마련...글로벌 경기 침체 불구 지속 성장 전망- UAE, 사우디 등 중동 지역 누적 고객 40개 넘어서 - 클라우드 NAC 도입 증가세…공공기관•국방•금융•의료 등 다양한 분야에 공급", "date": "2024.01.10", "link": "https://www.genians.co.kr/pr-room/press/20240110", "category": "NAC", "body_html": "<p>지니언스가 글로벌 비즈니스에서 턴어라운드 기회를 맞고 있다.   </p>\n<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 자사 보안 솔루션 'NAC(Network Access Control)'의 글로벌 누적 고객이 100곳을 돌파했다고 9일 밝혔다. 특히 최근 전 세계 경제 성장의 핵심이 되고 있는 중동 지역의 성장세가 가장 가파른 것으로 집계됐다.   </p>\n<p>지니언스의 중동 지역 신규 고객은 2022년 2곳에 그쳤으나, 지난해 17곳으로 대폭 성장했다. 중동  지역 누적 고객은 40개를 넘어섰으며, 전체 글로벌 고객 수의 38%를 점유하며 최다 수출처로 급 부상했다.  </p>\n<p>중동 지역의 다양한 산업분야에서 디지털 변환과 혁신이 가속화되고 있다. 지정학적 특성상 사이버 보안이 국가 안보와 기업의 핵심 전략으로 부상하고 있으며, 산업 및 핵심 인프라에 대한 사이버 위협 증가로 보안 시장도 가파르게 성장하고 있다.   </p>\n<p>지니언스는 전 세계 33개국의 41개 파트너를 확보하고, 글로벌 기술력이 검증된 ‘클라우드 NAC’를 기반으로 글로벌 시장을 공략하고 있다.  ‘클라우드 NAC’는 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT 전체 환경을 보다 효과적으로 보호할 수 있는 솔루션이다.   </p>\n<p>사용한 만큼만 지불하는 서브스크립션(Subscription) 모델로, 서비스 이용자는 노드수에 따라 월과금 형태로 비용 지불이 가능하다. 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB)부터 공공기관까지 다양한 글로벌 고객층에 좋은 평가를 받고 있다.  </p>\n<p>지니언스는 글로벌 파트너사와 현지 맞춤 서비스 제공하고 보안 콘퍼런스 및 로드쇼 활동을 통해 제품 접근성을 높여왔으며, 이러한 노력이 고객 확보에 긍정적인 영향을 준 것으로 분석했다.   </p>\n<p>김계연 지니언스 CTO•미국법인장은 “중동시장에서 빠르고 견고한 성장을 발판으로, 연계시장인 아프리카와 유럽시장에서의 성장동력을 마련하고 있다”며 “UAE의 AI, Cloud computing 업체들과의 협업으로 제품의 고도화도 이루어내어, 중동 및 글로벌 시장에서 확고한 경쟁력을 갖춰 나갈 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 글로벌 비즈니스에서 턴어라운드 기회를 맞고 있다.   \n  \n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 자사 보안 솔루션 'NAC(Network Access Control)'의 글로벌 누적 고객이 100곳을 돌파했다고 9일 밝혔다. 특히 최근 전 세계 경제 성장의 핵심이 되고 있는 중동 지역의 성장세가 가장 가파른 것으로 집계...", "full_text": "지니언스가 글로벌 비즈니스에서 턴어라운드 기회를 맞고 있다.   \n  \n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 자사 보안 솔루션 'NAC(Network Access Control)'의 글로벌 누적 고객이 100곳을 돌파했다고 9일 밝혔다. 특히 최근 전 세계 경제 성장의 핵심이 되고 있는 중동 지역의 성장세가 가장 가파른 것으로 집계됐다.   \n  \n지니언스의 중동 지역 신규 고객은 2022년 2곳에 그쳤으나, 지난해 17곳으로 대폭 성장했다. 중동  지역 누적 고객은 40개를 넘어섰으며, 전체 글로벌 고객 수의 38%를 점유하며 최다 수출처로 급 부상했다.  \n  \n중동 지역의 다양한 산업분야에서 디지털 변환과 혁신이 가속화되고 있다. 지정학적 특성상 사이버 보안이 국가 안보와 기업의 핵심 전략으로 부상하고 있으며, 산업 및 핵심 인프라에 대한 사이버 위협 증가로 보안 시장도 가파르게 성장하고 있다.   \n  \n지니언스는 전 세계 33개국의 41개 파트너를 확보하고, 글로벌 기술력이 검증된 ‘클라우드 NAC’를 기반으로 글로벌 시장을 공략하고 있다.  ‘클라우드 NAC’는 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT 전체 환경을 보다 효과적으로 보호할 수 있는 솔루션이다.   \n  \n사용한 만큼만 지불하는 서브스크립션(Subscription) 모델로, 서비스 이용자는 노드수에 따라 월과금 형태로 비용 지불이 가능하다. 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB)부터 공공기관까지 다양한 글로벌 고객층에 좋은 평가를 받고 있다.  \n  \n지니언스는 글로벌 파트너사와 현지 맞춤 서비스 제공하고 보안 콘퍼런스 및 로드쇼 활동을 통해 제품 접근성을 높여왔으며, 이러한 노력이 고객 확보에 긍정적인 영향을 준 것으로 분석했다.   \n  \n  \n김계연 지니언스 CTO•미국법인장은 “중동시장에서 빠르고 견고한 성장을 발판으로, 연계시장인 아프리카와 유럽시장에서의 성장동력을 마련하고 있다”며 “UAE의 AI, Cloud computing 업체들과의 협업으로 제품의 고도화도 이루어내어, 중동 및 글로벌 시장에서 확고한 경쟁력을 갖춰 나갈 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "- 클라우드 기반 NAC 설치부터 운영까지 원스톱으로 제공", "date": "2023.12.05", "link": "https://www.genians.co.kr/pr-room/press/20231205", "category": "NAC", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 ‘클라우드 NAC 매니지드 서비스 센터’를 발족하고 시장 확대에 나섰다.  </p>\n<p>'클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)'는 보안솔루션 NAC의 설치부터 운영까지 전과정을 원스톱으로 제공하는 서비스다. 사용한 만큼만 지불하는 서브 스크립션(Subscription) 모델로, 서비스 사용자는 노드수에 따라 월과금 형태로 비용 지불이 가능하다.  </p>\n<p>지니언스는 평소 보안에 관심이 많으나, 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB), 스타트업을 위해 해당 서비스를 제공하게 됐다고 설명했다. 특히 보안 전문 기업이 직접 제공하는 서비스를 합리적인 가격에 이용할 수 있다는 점에서, 보안 관리 인원이 적은 기업에서 많은 호응을 얻을 것으로 예상된다.  </p>\n<p>회사 측은 이번 서비스 센터 발족을 시작으로 고객 범위를 확대하여, 더 많은 사용자에게 만족도 높은 서비스를 제공할 방침이다. 지니언스는 이번 서비스 제공이 실적에도 긍정적인 영향을 줄 것으로 예측하고 있다.  </p>\n<p>세계적인 시장조사 기관인 프로스트 &amp; 설리번 자료에 따르면 글로벌 NAC 시장은 초기 하드웨어와 소프트웨어 일체형으로 시장이 형성됐지만, 향후에는 매니지드 서비스, NAC as SaaS 등 서비스 영역의 시장 성장률이 가장 높을 것으로 전망했다.  </p>\n<p>지니언스 ‘클라우드 NAC’는 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT 전체 환경을 보다 효과적으로 보호할 수 있는 솔루션이다. 클라우드 기반의 SECaaS(Security as a Service) 서비스로 국내 보안업계 최초로 클라우드 보안 표준 인증(CSAP) 인증을 획득했다  </p>\n<p>또한, 단말의 일반 정보는 물론 확장 정보와 취약점 정보를 제공하여, 생명주기 관리(Lifecycle Management)까지 업무 영역을 확대할 수도 있다. 일반 IT 환경은 물론 공장, 설비 등의 OT 환경에도 적용이 가능하다는 점에서 관련 시장에서 좋은 평가를 받고 있다.  </p>\n<p>강한서 지니언스 DX사업본부장은 “글로벌 시장에서 검증받은 기술력과 부담 없는 월 서비스 비용으로 고객이 대폭 증가하고 있다”며 “매니지드 서비스를 통해 국내 중소기업의 보안성을 강화하여, 고도화되는 사이버 위협을 선제적으로 예방하고 대응하는 서비스 강화에 총력을 기울이겠다”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 ‘클라우드 NAC 매니지드 서비스 센터’를 발족하고 시장 확대에 나섰다.  \n  \n'클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)'는 보안솔루션 NAC의 설치부터 운영까지 전과정을 원스톱으로 제공하는 서비스다. 사용한 만큼만 지불하는 서브 스크립션(Subscri...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 ‘클라우드 NAC 매니지드 서비스 센터’를 발족하고 시장 확대에 나섰다.  \n  \n'클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)'는 보안솔루션 NAC의 설치부터 운영까지 전과정을 원스톱으로 제공하는 서비스다. 사용한 만큼만 지불하는 서브 스크립션(Subscription) 모델로, 서비스 사용자는 노드수에 따라 월과금 형태로 비용 지불이 가능하다.  \n  \n지니언스는 평소 보안에 관심이 많으나, 초기 도입 비용 및 관리에 어려움을 겪는 중소기업(SMB), 스타트업을 위해 해당 서비스를 제공하게 됐다고 설명했다. 특히 보안 전문 기업이 직접 제공하는 서비스를 합리적인 가격에 이용할 수 있다는 점에서, 보안 관리 인원이 적은 기업에서 많은 호응을 얻을 것으로 예상된다.  \n  \n회사 측은 이번 서비스 센터 발족을 시작으로 고객 범위를 확대하여, 더 많은 사용자에게 만족도 높은 서비스를 제공할 방침이다. 지니언스는 이번 서비스 제공이 실적에도 긍정적인 영향을 줄 것으로 예측하고 있다.  \n  \n세계적인 시장조사 기관인 프로스트 & 설리번 자료에 따르면 글로벌 NAC 시장은 초기 하드웨어와 소프트웨어 일체형으로 시장이 형성됐지만, 향후에는 매니지드 서비스, NAC as SaaS 등 서비스 영역의 시장 성장률이 가장 높을 것으로 전망했다.  \n  \n지니언스 ‘클라우드 NAC’는 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT 전체 환경을 보다 효과적으로 보호할 수 있는 솔루션이다. 클라우드 기반의 SECaaS(Security as a Service) 서비스로 국내 보안업계 최초로 클라우드 보안 표준 인증(CSAP) 인증을 획득했다  \n  \n또한, 단말의 일반 정보는 물론 확장 정보와 취약점 정보를 제공하여, 생명주기 관리(Lifecycle Management)까지 업무 영역을 확대할 수도 있다. 일반 IT 환경은 물론 공장, 설비 등의 OT 환경에도 적용이 가능하다는 점에서 관련 시장에서 좋은 평가를 받고 있다.  \n  \n강한서 지니언스 DX사업본부장은 “글로벌 시장에서 검증받은 기술력과 부담 없는 월 서비스 비용으로 고객이 대폭 증가하고 있다”며 “매니지드 서비스를 통해 국내 중소기업의 보안성을 강화하여, 고도화되는 사이버 위협을 선제적으로 예방하고 대응하는 서비스 강화에 총력을 기울이겠다”고 밝혔다.\n\n|  |\n|"}, {"title": "- 자사 솔루션 제품을 통한 수입 대체 효과 실현…국내 소프트웨어 산업 성장 기여", "date": "2023.11.10", "link": "https://www.genians.co.kr/pr-room/press/20231110", "category": "기타 뉴스", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표이사 이동범)는 서울 엘타워 그레이스홀에서 열린 '2023 글로벌 상용SW명품대전’에서 상용SW(소프트웨어) 부문 '공공부문발주자협의회 회장상'을 수상했다고 10일 밝혔다.  </p>\n<p>‘글로벌 상용SW명품대전’은 한국상용소프트웨어협회, 공공부문발주자협의회, 전자신문이 공동 주최하고 과학기술정보통신부와 정보통신산업진흥원, 한국지능정보사회진흥원이 후원하는 행사다. 우수한 품질의 소프트웨어 및 제품으로 국내 소프트웨어 산업 발전에 기여한 기업을 포상한다.  </p>\n<p>지니언스는 네트워크 접근 솔루션 ‘지니안 NAC’를 출품했다. 이 제품은 국내 조달 부문 70% 이상의 시장 점유율로 독보적 1위를 기록하고 있으며 2,400여 개 기업과 기관을 고객으로 보유하고 있다. 금번 평가에서는 시장 지배력, 기술력, 재무안정성 등에서 높은 점수를 받았다.  </p>\n<p>‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로, 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류가 가능하다.  </p>\n<p>최근 회사는 NAC를 태국 에너지 관련 공공기관에 공급하는 등 글로벌 시장에서의 영향력도 확대하고 있다. 글로벌 시장 조사기관 가트너가 발표한 '2023년 1분기 전 세계 엔터프라이즈 네트워크 장비 보고서'에 따르면, NAC 분야에서 지니언스의 솔루션이 글로벌 시장 점유율 4위를 기록한 바 있다.  </p>\n<p>지니언스 이동석 부사장은 “당사는 외산 제품과의 경쟁에서도 우수성을 인정받아, 국내 NAC 1위 기업으로 자리매김하게 됐다\"며 \"당사 제품을 통해 수입 대체 효과 실현하고 매출 확대를 이어가는 등 국내 사이버 보안 소프트웨어 산업의 성장에 적극 기여할 방침이며, 향후 글로벌 시장에서도 선전할 수 있도록 노력할 것\"이라고 전했다.  </p>\n<p>한편, ‘글로벌 상용SW명품대전’에는 전 산업 분야의 트렌드를 이끄는 우수한 소프트웨어 제품을 소개하고, 최신 기술 동향을 공유하는 자리가 마련됐다. 중앙부처, 공공기관, 금융 등 다양한 분야 정보 관계자가 행사에 참석한다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표이사 이동범)는 서울 엘타워 그레이스홀에서 열린 '2023 글로벌 상용SW명품대전’에서 상용SW(소프트웨어) 부문 '공공부문발주자협의회 회장상'을 수상했다고 10일 밝혔다.  \n  \n‘글로벌 상용SW명품대전’은 한국상용소프트웨어협회, 공공부문발주자협의회, 전자신문이 공동 주최하고 과학기술정보통신부와 정보통신...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표이사 이동범)는 서울 엘타워 그레이스홀에서 열린 '2023 글로벌 상용SW명품대전’에서 상용SW(소프트웨어) 부문 '공공부문발주자협의회 회장상'을 수상했다고 10일 밝혔다.  \n  \n‘글로벌 상용SW명품대전’은 한국상용소프트웨어협회, 공공부문발주자협의회, 전자신문이 공동 주최하고 과학기술정보통신부와 정보통신산업진흥원, 한국지능정보사회진흥원이 후원하는 행사다. 우수한 품질의 소프트웨어 및 제품으로 국내 소프트웨어 산업 발전에 기여한 기업을 포상한다.  \n  \n지니언스는 네트워크 접근 솔루션 ‘지니안 NAC’를 출품했다. 이 제품은 국내 조달 부문 70% 이상의 시장 점유율로 독보적 1위를 기록하고 있으며 2,400여 개 기업과 기관을 고객으로 보유하고 있다. 금번 평가에서는 시장 지배력, 기술력, 재무안정성 등에서 높은 점수를 받았다.  \n  \n‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로, 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류가 가능하다.  \n  \n최근 회사는 NAC를 태국 에너지 관련 공공기관에 공급하는 등 글로벌 시장에서의 영향력도 확대하고 있다. 글로벌 시장 조사기관 가트너가 발표한 '2023년 1분기 전 세계 엔터프라이즈 네트워크 장비 보고서'에 따르면, NAC 분야에서 지니언스의 솔루션이 글로벌 시장 점유율 4위를 기록한 바 있다.  \n  \n지니언스 이동석 부사장은 “당사는 외산 제품과의 경쟁에서도 우수성을 인정받아, 국내 NAC 1위 기업으로 자리매김하게 됐다\"며 \"당사 제품을 통해 수입 대체 효과 실현하고 매출 확대를 이어가는 등 국내 사이버 보안 소프트웨어 산업의 성장에 적극 기여할 방침이며, 향후 글로벌 시장에서도 선전할 수 있도록 노력할 것\"이라고 전했다.  \n  \n한편, ‘글로벌 상용SW명품대전’에는 전 산업 분야의 트렌드를 이끄는 우수한 소프트웨어 제품을 소개하고, 최신 기술 동향을 공유하는 자리가 마련됐다. 중앙부처, 공공기관, 금융 등 다양한 분야 정보 관계자가 행사에 참석한다.\n\n|  |\n|"}, {"title": "NAC 최강자 지니언스, 내년부턴 '제로트러스트'로 '퀀텀 점프'", "date": "2023.10.25", "link": "https://www.genians.co.kr/pr-room/press/20231025", "category": "NAC", "body_html": "<p>이동범 지니언스 대표님이 뉴스핌 유튜브 채널 'IR핌'에 출연했습니다. <br />\nNAC, EDR 사업을 비롯하여 신사업, 글로벌 사업 계획, 실적 전망, M&amp;A 등 다양한 내용이 언급되었습니다.</p>", "body_text": "이동범 지니언스 대표님이 뉴스핌 유튜브 채널 'IR핌'에 출연했습니다.   \nNAC, EDR 사업을 비롯하여 신사업, 글로벌 사업 계획, 실적 전망, M&A 등 다양한 내용이 언급되었습니다....", "full_text": "이동범 지니언스 대표님이 뉴스핌 유튜브 채널 'IR핌'에 출연했습니다.   \nNAC, EDR 사업을 비롯하여 신사업, 글로벌 사업 계획, 실적 전망, M&A 등 다양한 내용이 언급되었습니다."}, {"title": "- 국가 사이버 안보 위협에 적극 대응...공공 서비스 보호를 통해 대국민 안전에 만전 - 국가 핵심 기반 시설, 중앙 정부에서 지자체까지 EDR 수요 확대 일로 - 자체 개발한 순수 국산 기술력으로 글로벌 기업에 경쟁 우위 선점", "date": "2023.10.24", "link": "https://www.genians.co.kr/pr-room/press/20231024", "category": "EDR", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 공공 EDR 시장의 바로미터인 조달 시장에서 2023 년 3Q 누적 기준 86%의 점유율로 압도적인 1 위를 기록했다고 밝혔다. 누적 고객수는 160곳을 돌파해 국내 최다 고객을 보유하고 있다.  </p>\n<p>지난해 주요 정부 부처의 EDR 도입 이후 올해 지방자치단체로의 확산, 공공기관의 EDR 도입이 증가하면서 점유율 높였다. 또한 제1금융권의 의미 있는 고객을 지속적으로 확보하고 증권, 보험 등 관련 영역으로 고객을 확장하는 등 민간부문에서의 입지도 확대해 나가고 있다.  </p>\n<p>최근 정부를 비롯해 각 공공기관들은 새로운 형태의 사이버 위협에 선제적으로 대응하고, 세계적인 수준의 사이버 공격 방어 역량을 갖추기 위해 노력하고 있다. 지니언스는 글로벌 기업과의 대등한 기술력, 국내 네트워크 및 단말 환경의 높은 이해를 기반으로 국가 사이버 안보 위협에 공동 대응하고 있으며 대 국민 안전에 만전을 기하고 있다.  </p>\n<p>국가정보원이 올해 7월까지 집계한 '우리나라 공공부문 대상 국제 해킹 공격 건수'는 약 151만 건이다. 하루 평균 공격 건수로는 지난 10년 이래 가장 높은 수치로, 지난해와 비교하면 26.9% 늘어났다. 공공부문 대상 해킹이 외교ᆞ안보 현안 및 첨단 기술과 밀접하게 연계되어 있다는 점에서, 국민들의 불안감은 높아지는 추세다.  </p>\n<p>단순히 해킹뿐만 아니다. APT(지능형 지속 위협) 및 랜섬웨어 등 고도화된 사이버 위협도 기하급수적으로 확산되고 있다. 이처럼 악성코드를 활용한 공격은 단순한 보안 위협 수준을 넘어, 실질적이고 심각한 경제적 손실을 초래하기도 한다. 다만 이러한 지능화된 APT, 랜섬웨어 등은 전통적인 보안 솔루션을 통해 탐지하고 대응하기 어렵다는 한계가 있다.  </p>\n<p>지니언스의 EDR 솔루션 '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공하는 솔루션이다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지/예방하고, 사후 감사 증적이 가능하다.  </p>\n<p>지니언스는 고도화된 랜섬웨어에 대응하기 위해 EDR 솔루션에 안티 랜섬웨어 기능을 탑재했으며, 지난해 국내 EDR 제품 중 최초로 국가정보원 보안기능확인서를 획득했다. 경쟁 제품보다 한층 높은 보안 수준과 기술을 고객에게 제공할 수 있게 됐다.   </p>\n<p>김준형 지니언스 엔드포인트보안사업본부 상무는 “엔드포인트를 대상으로 위협이 공격이 더욱 정교해지고 있다”며 “범 정부 차원에서 사이버 위협에 대한 정책•제도 개선에 나서고 있고 공공기관이 EDR 도입을 적극 검토하고 있는 만큼 본격적인 시장 성장이 기대된다”고 전했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 공공 EDR 시장의 바로미터인 조달 시장에서 2023 년 3Q 누적 기준 86%의 점유율로 압도적인 1 위를 기록했다고 밝혔다. 누적 고객수는 160곳을 돌파해 국내 최다 고객을 보유하고 있다.  \n  \n지난해 주요 정부 부처의 EDR 도입 이후 올해 지방자치단체로의 확산, 공공기관의 EDR 도...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 공공 EDR 시장의 바로미터인 조달 시장에서 2023 년 3Q 누적 기준 86%의 점유율로 압도적인 1 위를 기록했다고 밝혔다. 누적 고객수는 160곳을 돌파해 국내 최다 고객을 보유하고 있다.  \n  \n지난해 주요 정부 부처의 EDR 도입 이후 올해 지방자치단체로의 확산, 공공기관의 EDR 도입이 증가하면서 점유율 높였다. 또한 제1금융권의 의미 있는 고객을 지속적으로 확보하고 증권, 보험 등 관련 영역으로 고객을 확장하는 등 민간부문에서의 입지도 확대해 나가고 있다.  \n  \n최근 정부를 비롯해 각 공공기관들은 새로운 형태의 사이버 위협에 선제적으로 대응하고, 세계적인 수준의 사이버 공격 방어 역량을 갖추기 위해 노력하고 있다. 지니언스는 글로벌 기업과의 대등한 기술력, 국내 네트워크 및 단말 환경의 높은 이해를 기반으로 국가 사이버 안보 위협에 공동 대응하고 있으며 대 국민 안전에 만전을 기하고 있다.  \n  \n국가정보원이 올해 7월까지 집계한 '우리나라 공공부문 대상 국제 해킹 공격 건수'는 약 151만 건이다. 하루 평균 공격 건수로는 지난 10년 이래 가장 높은 수치로, 지난해와 비교하면 26.9% 늘어났다. 공공부문 대상 해킹이 외교ᆞ안보 현안 및 첨단 기술과 밀접하게 연계되어 있다는 점에서, 국민들의 불안감은 높아지는 추세다.  \n  \n단순히 해킹뿐만 아니다. APT(지능형 지속 위협) 및 랜섬웨어 등 고도화된 사이버 위협도 기하급수적으로 확산되고 있다. 이처럼 악성코드를 활용한 공격은 단순한 보안 위협 수준을 넘어, 실질적이고 심각한 경제적 손실을 초래하기도 한다. 다만 이러한 지능화된 APT, 랜섬웨어 등은 전통적인 보안 솔루션을 통해 탐지하고 대응하기 어렵다는 한계가 있다.  \n  \n지니언스의 EDR 솔루션 '지니안 EDR(Genian EDR)'은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공하는 솔루션이다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지/예방하고, 사후 감사 증적이 가능하다.  \n  \n지니언스는 고도화된 랜섬웨어에 대응하기 위해 EDR 솔루션에 안티 랜섬웨어 기능을 탑재했으며, 지난해 국내 EDR 제품 중 최초로 국가정보원 보안기능확인서를 획득했다. 경쟁 제품보다 한층 높은 보안 수준과 기술을 고객에게 제공할 수 있게 됐다.   \n  \n김준형 지니언스 엔드포인트보안사업본부 상무는 “엔드포인트를 대상으로 위협이 공격이 더욱 정교해지고 있다”며 “범 정부 차원에서 사이버 위협에 대한 정책•제도 개선에 나서고 있고 공공기관이 EDR 도입을 적극 검토하고 있는 만큼 본격적인 시장 성장이 기대된다”고 전했다.\n\n|  |\n|"}, {"title": "- 사이버 위협 증가 등 보안 패러다임 전환으로 주도권 경쟁 가속화 - 정부, 정보보호 산업 정책적 지원 마련...글로벌 보안 강국으로 도약 기대", "date": "2023.10.04", "link": "https://www.genians.co.kr/pr-room/press/20231004", "category": "비즈니스 & 성과", "body_html": "<p>이동범 대표님의 보안칼럼이 전자신문에 게재되었습니다.</p>\n<p>\"정보보호산업의 글로벌 도약을 위한 정책적 지원은 준비됐다. 사이버보안 펀드를 통해 기업은 안정적인 기술 개발의 기회를 얻고, 이를 계기로 민간의 투자는 활성화되며 선순환을 그릴 것이다. 세계적 변화에 발맞춘 정책적 지원을 기반으로 우리나라도 글로벌 정보보호 산업 강국으로 도약하며, 국내 첫 보안 유니콘을 배출하기를 기대한다\"</p>\n<p>이동범 대표님은 국내 보안 시장에 대한 현황과 글로벌 성장성에 대한 의견을 위와 같이 밝혔습니다.</p>\n<p>기사 전문은 아래 링크를 참조하세요.</p>\n<p><a href=\"https://www.etnews.com/20231003000032\">[보안칼럼]준비된 K-시큐리티 시장, 이제 글로벌로 도약할 때</a></p>", "body_text": "이동범 대표님의 보안칼럼이 전자신문에 게재되었습니다.\n\n\"정보보호산업의 글로벌 도약을 위한 정책적 지원은 준비됐다. 사이버보안 펀드를 통해 기업은 안정적인 기술 개발의 기회를 얻고, 이를 계기로 민간의 투자는 활성화되며 선순환을 그릴 것이다. 세계적 변화에 발맞춘 정책적 지원을 기반으로 우리나라도 글로벌 정보보호 산업 강국으로 도약하며, 국내 첫 보안 유니...", "full_text": "이동범 대표님의 보안칼럼이 전자신문에 게재되었습니다.\n\n\"정보보호산업의 글로벌 도약을 위한 정책적 지원은 준비됐다. 사이버보안 펀드를 통해 기업은 안정적인 기술 개발의 기회를 얻고, 이를 계기로 민간의 투자는 활성화되며 선순환을 그릴 것이다. 세계적 변화에 발맞춘 정책적 지원을 기반으로 우리나라도 글로벌 정보보호 산업 강국으로 도약하며, 국내 첫 보안 유니콘을 배출하기를 기대한다\"\n\n이동범 대표님은 국내 보안 시장에 대한 현황과 글로벌 성장성에 대한 의견을 위와 같이 밝혔습니다.\n\n기사 전문은 아래 링크를 참조하세요.\n\n[[보안칼럼]준비된 K-시큐리티 시장, 이제 글로벌로 도약할 때](https://www.etnews.com/20231003000032)"}, {"title": "- 정부, 韓 기업 해외 진출 돕는 정보보호산업 글로벌 경쟁력 확보 전략 발표...지니언스 점유율 확장 '기대'", "date": "2023.09.14", "link": "https://www.genians.co.kr/pr-room/press/20230914", "category": "비즈니스 & 성과", "body_html": "<p>지니언스가 글로벌 시장에서 영향력을 확대하고 있다.  </p>\n<p>글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 태국 에너지 관련 공공기관에 네트워크 접근제어(Network Access Control, 이하 NAC) 솔루션을 공급했다고 14일 밝혔다. 회사 측은 이번 계약을 통해 글로벌 시장에서 NAC 제품 경쟁력을 다시 한번 입증하게 됐다.  </p>\n<p>지니언스 ‘NAC 솔루션’은 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로, 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류가 가능하다. 최근 재택근무 확산으로 네트워크 보안에 대한 관심이 증가하고 있는 가운데, 효율적인 네트워크 보안 관리가 가능한 NAC에 대한 수요 역시 커지는 추세다  </p>\n<p>지니언스는 태국 에너지 관련 공공기관이 위치한 총 77곳의 지사에 NAC를 공급한다. 해당 기관은 에너지의 올바른 유통을 위한 다양한 사업을 추진 중이며, 이와 관련한 여러 행정 업무도 담당하고 있다. 에너지 유통을 위한 장비 제어 및 정보 보호에 대한 필요성 증가로, NAC 시장에서 인정받고 있는 지니언스의 솔루션 도입을 결정하게 됐다.  </p>\n<p>회사 측은 이번 공급 계약을 기점으로 해외시장 공략에 박차를 가할 방침이다. 특히 지니언스는 현지 파트너사와의 긴밀한 협업으로 고객 맞춤형 서비스를 제공하는 등 공간적 제약을 극복하기 위해 노력하고 있다. 또한 미국 현지 법인을 통해 해외 고객사 유입을 위한 적극적인 영업활동도 전개하고 있다.  </p>\n<p>지난 5일 정부가 발표한 '정보보호산업의 글로벌 경쟁력 확보 전략'으로 국내 보안 기업들의 적극적인 해외 시장 진출이 예상된다. 이번 수주를 통해 해외 시장에서 경쟁력을 인정받은 지니언스 솔루션 역시 많은 관심을 받을 것으로 기대된다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 \"글로벌 시장에서 보안에 대한 중요성이 높아지고 있는 가운데, 당사의 NAC 솔루션 제품을 태국 공공기관에 성공적으로 공급하며 글로벌 경쟁력을 다시 한번 입증하게 됐다\"며 \"기존 고객들과의 긴밀한 관계 유지는 물론, 신규 고객 확보를 위한 적극적인 영업활동을 통해 글로벌 보안 기업으로 나아갈 것\"이라고 전했다.  </p>\n<p>한편, 글로벌 시장 조사기관 가트너가 최근 발표한 '2023년 1분기 전 세계 엔터프라이즈 네트워크 장비 보고서'에 따르면 NAC 분야에서 지니언스의 솔루션이 시장 점유율 4위를 기록했다. 지니언스가 가트너 보고서에 등재된 것은 이번이 10번째이며 지난 9분기 동안 시장 점유율 4위를 고수했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 글로벌 시장에서 영향력을 확대하고 있다.  \n  \n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 태국 에너지 관련 공공기관에 네트워크 접근제어(Network Access Control, 이하 NAC) 솔루션을 공급했다고 14일 밝혔다. 회사 측은 이번 계약을 통해 글로벌 시장에서 NAC 제품 경쟁력을 다시 한번 입증하게...", "full_text": "지니언스가 글로벌 시장에서 영향력을 확대하고 있다.  \n  \n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 태국 에너지 관련 공공기관에 네트워크 접근제어(Network Access Control, 이하 NAC) 솔루션을 공급했다고 14일 밝혔다. 회사 측은 이번 계약을 통해 글로벌 시장에서 NAC 제품 경쟁력을 다시 한번 입증하게 됐다.  \n  \n지니언스 ‘NAC 솔루션’은 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안 관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로, 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류가 가능하다. 최근 재택근무 확산으로 네트워크 보안에 대한 관심이 증가하고 있는 가운데, 효율적인 네트워크 보안 관리가 가능한 NAC에 대한 수요 역시 커지는 추세다  \n  \n지니언스는 태국 에너지 관련 공공기관이 위치한 총 77곳의 지사에 NAC를 공급한다. 해당 기관은 에너지의 올바른 유통을 위한 다양한 사업을 추진 중이며, 이와 관련한 여러 행정 업무도 담당하고 있다. 에너지 유통을 위한 장비 제어 및 정보 보호에 대한 필요성 증가로, NAC 시장에서 인정받고 있는 지니언스의 솔루션 도입을 결정하게 됐다.  \n  \n회사 측은 이번 공급 계약을 기점으로 해외시장 공략에 박차를 가할 방침이다. 특히 지니언스는 현지 파트너사와의 긴밀한 협업으로 고객 맞춤형 서비스를 제공하는 등 공간적 제약을 극복하기 위해 노력하고 있다. 또한 미국 현지 법인을 통해 해외 고객사 유입을 위한 적극적인 영업활동도 전개하고 있다.  \n  \n지난 5일 정부가 발표한 '정보보호산업의 글로벌 경쟁력 확보 전략'으로 국내 보안 기업들의 적극적인 해외 시장 진출이 예상된다. 이번 수주를 통해 해외 시장에서 경쟁력을 인정받은 지니언스 솔루션 역시 많은 관심을 받을 것으로 기대된다.  \n  \n김계연 지니언스 CTO•미국법인장은 \"글로벌 시장에서 보안에 대한 중요성이 높아지고 있는 가운데, 당사의 NAC 솔루션 제품을 태국 공공기관에 성공적으로 공급하며 글로벌 경쟁력을 다시 한 동적이고 끊임없이 진화하는 네트워크 환경을 보다 효율적으로 보호하는 NAC 기반 제로 트러스트 네트워크 접속(ZTNA) 솔루션 ‘지니안 ZTNA’를 선보인다. 이 제품은 모든 것을 지속적으로 검증하고 대응한다는 원칙을 기본으로 한다. 다양한 네트워크 환경과 연결지점을 보호하며 지속적인 검증 과정을 거쳐 비즈니스의 연속성을 확보해 준다.  </p>\n<p>7월 말레이시아를 시작으로 8월 인도네시아, 9월 태국에서 개최된다. 파트너 교육 및 행사를 통해 지니언스 기술력과 고객 지원 능력을 배가시켜 궁극적으로 고객의 만족도를 극대화한다는 계획이다.  </p>\n<p>지니언스 김계연 CTO·미국법인장은 “아태지역 보안 시장이 클라우드 바람을 타고 급속히 성장하고 있다”며 “태국 및 말레이시아의 대규모 공공사업 수주를 목표로 성과를 거둬들일 수 있도록 총력을 기울이겠다”고 밝혔다. </p>\n<p><img alt=\"사진 1\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EC%82%AC%EC%A7%84%201.jpg?width=6016&amp;height=4512&amp;name=%EC%82%AC%EC%A7%84%201.jpg\" /><br />\n&lt;사진 1&gt; 지니언스는 7월 말레이시아를 시작으로 ‘2023년 지니언스 아태지역 로드쇼를<br />\n개최한다고 밝혔다. (사진은 2023년 RSAC 행사 모습)</p>\n<p><img alt=\"ztna_logo\" src=\"https://www.genians.co.kr/hs-fs/hubfs/ztna_logo.png?width=313&amp;height=42&amp;name=ztna_logo.png\" /><br />\n&lt;사진 2&gt; 지니언스 제로 트러스트 솔루션 ‘지니안 ZTNA’</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 아시아·태평양 지역의 고객과 파트너를 위한 ‘2023 지니언스 로드쇼’를 개최한다고 밝혔다.  \n  \n팬더믹과 글로벌 경제의 어려움에도 불구하고 지니언스는 지난 몇 년간 전 세계 파트너 및 고객과 긴밀히 협력하여 성장해 왔다. 2016년 미국 법인을 설립한 이래 34개국 38개의 글로벌 파트너를...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 아시아·태평양 지역의 고객과 파트너를 위한 ‘2023 지니언스 로드쇼’를 개최한다고 밝혔다.  \n  \n팬더믹과 글로벌 경제의 어려움에도 불구하고 지니언스는 지난 몇 년간 전 세계 파트너 및 고객과 긴밀히 협력하여 성장해 왔다. 2016년 미국 법인을 설립한 이래 34개국 38개의 글로벌 파트너를 확보하며 시장을 개척하고 있다.  \n  \n현재 지니언스의 아태지역 비즈니스는 태국, 말레이시아, 인도네시아 등 6개국의 7개 파트너를 통해 NAC 솔루션을 공급하고 있다. 지난 2018년 진출 후 현재까지 기업, 공공, 금융 등 다양한 산업군에 28개의 고객사를 확보했다.   \n  \n이번 로드쇼에서는 역동적이고 끊임없이 진화하는 네트워크 환경을 보다 효율적으로 보호하는 NAC 기반 제로 트러스트 네트워크 접속(ZTNA) 솔루션 ‘지니안 ZTNA’를 선보인다. 이 제품은 모든 것을 지속적으로 검증하고 대응한다는 원칙을 기본으로 한다. 다양한 네트워크 환경과 연결지점을 보호하며 지속적인 검증 과정을 거쳐 비즈니스의 연속성을 확보해 준다.  \n  \n7월 말레이시아를 시작으로 8월 인도네시아, 9월 태국에서 개최된다. 파트너 교육 및 행사를 통해 지니언스 기술력과 고객 지원 능력을 배가시켜 궁극적으로 고객의 만족도를 극대화한다는 계획이다.  \n  \n지니언스 김계연 CTO·미국법인장은 “아태지역 보안 시장이 클라우드 바람을 타고 급속히 성장하고 있다”며 “태국 및 말레이시아의 대규모 공공사업 수주를 목표로 성과를 거둬들일 수 있도록 총력을 기울이겠다”고 밝혔다. \n\n![사진 1](https://www.genians.co.kr/hs-fs/hubfs/%EC%82%AC%EC%A7%84%201.jpg?width=6016&height=4512&name=%EC%82%AC%EC%A7%84%201.jpg)  \n<사진 1> 지니언스는 7월 말레이시아를 시작으로 ‘2023년 지니언스 아태지역 로드쇼를  \n개최한다고 밝혔다. (사진은 2023년 RSAC 행사 모습)\n\n   \n![ztna_logo](https://www.genians.co.kr/hs-fs/hubfs/ztna_logo.png?width=313&height=42&name=ztna_logo.png)  \n<사진 2> 지니언스 제로 트러스트 솔루션 ‘지니안 ZTNA’\n\n|  |\n|"}, {"title": "이동범 대표이사 프로필 사진", "date": "2023.07.24", "link": "https://www.genians.co.kr/pr-room/press/20230724", "category": "기타 뉴스", "body_html": "<p>이동범 대표님의 국내 보안산업에 대한 인터뷰가 매일경제에 보도되었습니다.  </p>\n<p>\"정보보호(사이버보안) 전 분야에 걸쳐 자국 고유 솔루션을 개발할 수 있는 국가는 미국, 이스라엘, 한국으로 전 세계 3개국밖에 없습니다. 문제는 한국 업체가 우수한 역량에도 불구하고 부족한 투자, 세세한 국내 규제 때문에 뻗어나가고 있지 못한다는 점입니다. 이제는 바뀌어야 할 때입니다.\"</p>\n<p>국내 보안산업의 현주소에 대해 이동범 대표님은 위와 같이 의견을 밝혔습니다.  </p>\n<p>이에 국내 보안업계가 한 단계 더 업그레이드 되기 위해선 보안 신기술에 맞는 규제 마련과 투자 확대가 필요하다는 점도 강조했습니다.  </p>\n<p>기사 전문은 아래 링크를 참조하세요.<br />\n<a href=\"https://www.mk.co.kr/news/it/10792061\">\"사이버보안 산업 키우려면 … 세세한 열거식 규제 없애야\"</a></p>", "body_text": "이동범 대표님의 국내 보안산업에 대한 인터뷰가 매일경제에 보도되었습니다.  \n  \n \"정보보호(사이버보안) 전 분야에 걸쳐 자국 고유 솔루션을 개발할 수 있는 국가는 미국, 이스라엘, 한국으로 전 세계 3개국밖에 없습니다. 문제는 한국 업체가 우수한 역량에도 불구하고 부족한 투자, 세세한 국내 규제 때문에 뻗어나가고 있지 못한다는 점입니다. 이제는 바뀌어야...", "full_text": "이동범 대표님의 국내 보안산업에 대한 인터뷰가 매일경제에 보도되었습니다.  \n  \n \"정보보호(사이버보안) 전 분야에 걸쳐 자국 고유 솔루션을 개발할 수 있는 국가는 미국, 이스라엘, 한국으로 전 세계 3개국밖에 없습니다. 문제는 한국 업체가 우수한 역량에도 불구하고 부족한 투자, 세세한 국내 규제 때문에 뻗어나가고 있지 못한다는 점입니다. 이제는 바뀌어야 할 때입니다.\"\n\n국내 보안산업의 현주소에 대해 이동범 대표님은 위와 같이 의견을 밝혔습니다.  \n  \n이에 국내 보안업계가 한 단계 더 업그레이드 되기 위해선 보안 신기술에 맞는 규제 마련과 투자 확대가 필요하다는 점도 강조했습니다.  \n  \n기사 전문은 아래 링크를 참조하세요.  \n[\"사이버보안 산업 키우려면 … 세세한 열거식 규제 없애야\"](https://www.mk.co.kr/news/it/10792061)"}, {"title": "지니언스, 광주광역시에 EDR 솔루션 공급", "date": "2023.07.11", "link": "https://www.genians.co.kr/pr-room/press/20230711", "category": "EDR", "body_html": "<h3>- 엔드포인트 위협에 대한 가시성 극대화로 공공 서비스 안정성 강화</h3>\n<h3>- PC에서 발생하는 모든 위협 행위를 탐지하고 선제적 대응 대응</h3>\n<h3>- 관제시스템과의 원활한 연동으로 위협 전반을 가시화하고 통제</h3>\n<h3></h3>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 광주광역시 EDR(Endpoint Detection &amp; Respons) : 단말기반 지능형 위협 탐지 및 대응 솔루션) 구축 사업을 수주했다고 밝혔다. 지난해 공공 조달 시장에서 84%라는 압도적인 시장점유율 1위를 기록한 지니언스는 중앙정부에서 지방자치단체까지 고객을 지속적으로 확보함으로써 EDR 시장의 리더십을 확고히 하고 있다.</p>\n<p>광주광역시는 고도화되는 사이버 위협을 사전에 예방하고 역량을 강화하는데 아낌 없이 투자하고있다. 인공지능 등 신기술을 도입해 사이버 안전에 대한 종합 대응 체계를 구성해 나가고 있으며 실전과 같은 모의 훈련을 통해 최고 수준의 정보보안 대응 능력을 실현하고 있다.</p>\n<p>광주광역시는 사이버침해대응센터를 통해 사이버 위협을 선제적으로 탐지하고 차단하고 있다. 최고 수준의 보안관제 서비스를 제공하고 있지만 랜섬웨어, APT 등 지능형 위협의 증가에 따른 PC(이하 엔드포인트)에서 발생하는 보안 위협을 빠르게 탐지해 대응하고자 EDR 솔루션 도입에 착수 했다.</p>\n<p>지능화된 사이버 위협에 신속하고 효율적인 대응 체계 마련, 네트워크·로그·단말 전반에 걸친 위협의 가시성 확보, 악성코드와 이상행위의 통합관리 등을 핵심 과제로 선정했다. 또한, 보안관제 시스템이 연동한 EDR 이벤트를 다른 시스템 이벤트와 연계분석 해 전체 보안 가시성을 확보할 수 있는지도 솔루션 선택의 주요 고려사항이었다.</p>\n<p>다양한 EDR 제품을 면밀히 검토한 결과 선정된 제품은 지니언스의 EDR 솔루션이다. ‘지니안 EDR(Genian EDR)’은 단말의 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지, 분석, 대응 솔루션이다. 단말에서 발생하는 주요 행위를 모니터링하고 실시간 저장 후 분석함에 따라 지능형 위협 등을 사전에 탐지·예방하고, 사후 감사 증적이 가능하다.  </p>\n<p>‘지니안 EDR’은 ▶이벤트 정보 수집 및 연동 ▶수집정보 검색 ▶분석정보 가시화 ▶최신 위협 인텔리전스 활용 ▶엔드포인트위협 분석 ▶엔드포인트 추적관리가 가능하다. 지속 확장 가능한 가시성을 제공한다. 단말 부하를 최소화한 에이전트, 수집된 데이터 기반 관리자 정의, 대시보드 제공 등이 주요 특징이다.</p>\n<p>광주광역시는 정교한 PC 행위 분석으로 지능형 공격을 엔드포인트단에서 방어함은 물론, 엔드포인트에서 발생하는 다양한 이벤트와 로그를 SIEM, SOAR와 연동하여 보안 관제 서비스가 한층 고도화 될 것으로 기대하고 있다. 이를 통해 보다 안전한 행정 서비스 제공에 만전을 기한다는 방침이다.</p>\n<p>김준형 지니언스 엔드포인트보안사업본부 상무는 “PC 등 엔드포인트를 대상으로 한 위협과 공격이 더욱 정교해 지고 있다”며 “검증된 단말 안정성, 글로벌 수준의 위협 탐지 역량, 국내 환경에 최적화된 기술을 강점으로 광주광역시의 안전한 공공 서비스 체계 마련에 지원을 아끼지 않겠다”고 밝혔다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hubfs/image-png.png\" /></p>\n<p>&lt;그림 1&gt; 지니언스의 EDR 솔루션의 위협 모니터링 화면과 공격 스토리 라인 대시보드</p>\n<p>|  |\n|</p>", "body_text": "### - 엔드포인트 위협에 대한 가시성 극대화로 공공 서비스 안정성 강화\n\n### - PC에서 발생하는 모든 위협 행위를 탐지하고 선제적 대응 대응\n\n### - 관제시스템과의 원활한 연동으로 위협 전반을 가시화하고 통제\n\n### \n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 광주광역시 EDR(Endpoint Detection & Res...", "full_text": "### - 엔드포인트 위협에 대한 가시성 극대화로 공공 서비스 안정성 강화\n\n### - PC에서 발생하는 모든 위협 행위를 탐지하고 선제적 대응 대응\n\n### - 관제시스템과의 원활한 연동으로 위협 전반을 가시화하고 통제\n\n### \n\n 력을 바탕으로 성장하는 기업을 중·장기적으로 지원하는 제도이다.  </p>\n<p>지니언스는 혁신 성장 품목인 사이버 보안 분야에서 네트워크 접근제어 솔루션 ‘지니안 NAC’를 출품했다. 시장지배력, 기술력, 성장성·수익성, 재무안정성 등 객관적인 평가 기준에서 높은 점수를 받았다.    </p>\n<p>‘지니안 NAC’는 구독 기반 클라우드 NAC를 포함해 구축형, 매니지드 서비스 등 고객의 다양한 IT 환경에서도 안정적이고 효율적인 보안 운영이 가능하다. 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며 글로벌 NAC 시장점유율 TOP 5안에 랭크돼 있다.  </p>\n<p>금번 선정에 따라 지니언스는 글로벌 기업으로서의 역량 강화를 위해 인력, 자금, 컨설팅 등의 지원을 패키지 형태로 제공 받게 된다.   </p>\n<p>이동범 지니언스 대표는 “전 세계적으로 사이버 위협이 고조되는 상황에서 국내 순수 독자 기술로 개발한 보안 솔루션이 인정 받게 되어 기쁘다’며 “글로벌 시장 개척은 물론 ESG 경영을 통해  코스닥 시장에서 사랑받는 기업이 될 수 있도록 노력하겠다”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "### - 시장지배력, 기술력, 성장성·수익성, 재무안정성에서 높은 점수\n\n### - 글로벌 기업으로서의 역량 강화를 위한 인력, 자금, 컨설팅 등 지원\n\n### - 지속 가능 경영 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 한국거래소 주관 2023년 코스닥 라이징스타 기업으로 선정됐다고 발표했다.   \n  \n코스닥 라이징스타는 ...", "full_text": "### - 시장지배력, 기술력, 성장성·수익성, 재무안정성에서 높은 점수\n\n### - 글로벌 기업으로서의 역량 강화를 위한 인력, 자금, 컨설팅 등 지원\n\n### - 지속 가능 경영 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 한국거래소 주관 2023년 코스닥 라이징스타 기업으로 선정됐다고 발표했다.   \n  \n코스닥 라이징스타는 세계시장에서 독보적인 시장 지배력을 보유한 코스닥 상장법인 및 혁신 산업 분야에서 국내 시장 지배력을 바탕으로 성장하는 기업을 중·장기적으로 지원하는 제도이다.  \n  \n지니언스는 혁신 성장 품목인 사이버 보안 분야에서 네트워크 접근제어 솔루션 ‘지니안 NAC’를 출품했다. 시장지배력, 기술력, 성장성·수익성, 재무안정성 등 객관적인 평가 기준에서 높은 점수를 받았다.    \n  \n‘지니안 NAC’는 구독 기반 클라우드 NAC를 포함해 구축형, 매니지드 서비스 등 고객의 다양한 IT 환경에서도 안정적이고 효율적인 보안 운영이 가능하다. 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며 글로벌 NAC 시장점유율 TOP 5안에 랭크돼 있다.  \n  \n금번 선정에 따라 지니언스는 글로벌 기업으로서의 역량 강화를 위해 인력, 자금, 컨설팅 등의 지원을 패키지 형태로 제공 받게 된다.   \n  \n이동범 지니언스 대표는 “전 세계적으로 사이버 위협이 고조되는 상황에서 국내 순수 독자 기술로 개발한 보안 솔루션이 인정 받게 되어 기쁘다’며 “글로벌 시장 개척은 물론 ESG 경영을 통해  코스닥 시장에서 사랑받는 기업이 될 수 있도록 노력하겠다”고 밝혔다.\n\n|  |\n|"}, {"title": "[대한민국 명품 SaaS] 지니언스, 클라우드 NAC 솔루션 ‘지니안 클라우드 NAC’", "date": "2023.07.05", "link": "https://www.genians.co.kr/pr-room/press/20230705", "category": "NAC", "body_html": "<p>Genian Cloud NAC에 관한 강한서 지니언스 DX사업본부장님의 인터뷰가 전자신문에 보도되었습니다.</p>\n<p>Genian Cloud NAC는 클라우드, 사물인터넷(IoT), 엣지 컴퓨팅 환경에서 네트워크 가시성을
