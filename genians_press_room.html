AC는 네트워크에 접속하는 사용자와 기기를 식별•인증하고, 접근을 통제하는 보안 솔루션이다. 접속 주체와 단말 현황을 실시간으로 확인•제어할 수 있으며, 유•무선 환경과 글로벌 네트워크 구조에서도 유연하게 적용할 수 있도록 설계됐다.  </p>\n<p>지니언스는 이번 싱가포르 첫 고객사 확보를 계기로, 싱가포르를 포함한 아시아•태평양(APAC) 지역 공략을 확대할 계획이다. 현재 싱가포르, 태국, 말레이시아, 인도네시아 등에서 협력 파트너를 확보하고 있으며, 이번 레퍼런스가 향후 APAC 고객 확대에 긍정적인 역할을 할 것으로 기대하고 있다. 고객사의 모회사가 보유한 다양한 계열사와의 추가 협력 가능성도 중장기적으로 검토할 방침이다.  </p>\n<p>이번 사례는 글로벌 고객을 대상으로 한 기술 콘텐츠와 온라인 접근 전략이 실제 도입으로 이어진 사례라는 점에서도 의미가 있다. 고객사는 검색과 기술 자료, 체험 테스트를 통해 제품을 검토한 뒤 지니언스에 직접 문의했다. 지니언스는 글로벌 고객을 대상으로 한 기술 콘텐츠 발굴과 디지털 채널을 통한 접근성 강화에도 더욱 박차를 가할 계획이다.  </p>\n<p>나세일 지니언스 해외사업본부 상무는 “이번 싱가포르 첫 고객 확보는 APAC 시장 확대를 위한 중요한 출발점”이라며 “글로벌 사업 환경에서도 안정적으로 적용 가능한 NAC 경쟁력을 바탕으로, 해외 레퍼런스를 지속적으로 확대해 나갈 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "### - 글로벌 전자부품 제조사에 NAC 공급…업무•외부 네트워크 분리로 보안 운영 체계 강화 - 구조 변경 없이 적용 가능한 NAC로 운영 부담 최소화…연동성•기술 지원 체계 높은 평가 - 해외 거점 순차 적용…글로벌 레퍼런스 확대 기대\n\n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 싱가포르 소재 글로벌 전자부품 제조사에 네트워크 접근 ...", "full_text": "### - 글로벌 전자부품 제조사에 NAC 공급…업무•외부 네트워크 분리로 보안 운영 체계 강화 - 구조 변경 없이 적용 가능한 NAC로 운영 부담 최소화…연동성•기술 지원 체계 높은 평가 - 해외 거점 순차 적용…글로벌 레퍼런스 확대 기대\n\n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 싱가포르 소재 글로벌 전자부품 제조사에 네트워크 접근 제어 솔루션 ‘지니안 NAC(Network Access Control)’를 공급하며 현지 첫 고객사를 확보했다고 26일 밝혔다.  \n  \n지니언스의 NAC를 도입한 고객사는 싱가포르에 본사를 둔 전자부품 제조사다. 데이터통신, 통신, 자동차 등 다양한 산업 분야를 대상으로 글로벌 시장에 제품을 공급하며, 전 세계 여러 지역에 사업 거점을 두고 있다. 지니언스는 싱가포르 본사 데이터센터에 정책 서버를 구축한 뒤 인도, 일본, 북미, 유럽 등 해외 거점으로 적용 범위를 순차 확대할 계획이다.  \n  \n고객사는 글로벌 사업 환경에서 업무용 네트워크와 외부 네트워크를 명확히 분리하고, 접속 기기와 사용자 보안 상태를 일관되게 관리할 수 있는 체계가 필요해 지니언스의 NAC를 도입했다. 복잡한 글로벌 네트워크 환경에서도 디바이스 인증과 보안 기준 충족 여부를 안정적으로 확인할 수 있다는 점이 긍정적인 평가를 받았다.  \n  \n추가적인 네트워크 구조 변경 없이 적용할 수 있고, 글로벌 기술 지원 조직을 통한 신속한 대응이 가능하다는 점도 주요 도입 요인으로 작용했다. 기존에 사용 중인 다양한 보안•IT 솔루션과의 연동성이 높은 점 역시 장점으로 꼽혔다.  \n  \n지니안 NAC는 네트워크에 접속하는 사용자와 기기를 식별•인증하고, 접근을 통제하는 보안 솔루션이다. 접속 주체와 단말 현황을 실시간으로 확인•제어할 수 있으며, 유•무선 환경과 글로벌 네트워크 구조에서도 유연하게 적용할 수 있도록 설계됐다.  \n  \n지니언스는 이번 싱가포르 첫 고객사 확보를 계기로, 싱가포르를 포함한 아시아•태평양(APAC) 지역 공략을 확대할 계획이다. 현재 싱가포르, 태국, 말레이시아, 인도네시아 등에서 협력 파트너를 확보하고 있으며, 이번 레퍼런스가 향후 APAC 고객 확대에 긍정적인 역할을 할 것으로 기대하고 있다. 고객사의 모회사가 보유한 다양한 계열사와의 추가 협력 가능성도 중장기적으로 검토할 방침이다.  \n  \n이번 사례는 글로벌 고객을 대상으로 한 기술 콘텐츠와 온라인 접근 전략이 실제 도입으로 이어진 사례라는 점에서도 의미가 있다. 고객사는 검색과 기술 자료, 체험 테스트를 통해 제품을 검토한 뒤 지니언스에 직접 문의했다. 지니언스는 글로벌 고객을 대상으로 한 기술 콘텐츠 발굴과 디지털 채널을 통한 접근성 강화에도 더욱 박차를 가할 계획이다.  \n  \n나세일 지니언스 해외사업본부 상무는 “이번 싱가포르 첫 고객 확보는 APAC 시장 확대를 위한 중요한 출발점”이라며 “글로벌 사업 환경에서도 안정적으로 적용 가능한 NAC 경쟁력을 바탕으로, 해외 레퍼런스를 지속적으로 확대해 나갈 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- NAC·CSM 등 일부 제품에서 전사 제품·서비스로 대상 확대…”보안 사각지대 해소” - 글로벌 동일 적용…보상 체계 지속 확대 - VDP·CVD 연계한 취약점 관리 체계 고도화", "date": "2026.02.09", "link": "https://www.genians.co.kr/pr-room/press/20260209", "category": "NAC", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 보안 사각지대를 해소하고, 사이버 위협에 선제적으로 대응하기 위한 ‘버그바운티(Bug Bounty) 프로그램’을 전 제품·서비스로 확대 운영한다고 9일 밝혔다.  </p>\n<p>‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여할 수 있다.  </p>\n<p>구글, 애플, 아마존 등 글로벌 IT 기업들도 자사 제품과 서비스의 취약점 발굴 및 보안 강화를 위해 버그바운티 프로그램을 적극 운영 중이다. 지난해 국내에서도 대형 해킹 사고가 잇따르며 버그바운티의 필요성이 재조명된 가운데, 지니언스는 네이버, 카카오, 삼성SDS, LG전자 등과 함께 버그바운티를 독립적으로 프로그램을 운영하는 우수 기업 사례로 손꼽히고 있다.  </p>\n<p>최근에는 취약점 공개 프로그램(VDP, Vulnerability Disclosure Policy), 협력적 취약점 공개(CVD, Coordinated Vulnerability Disclosure), 버그바운티를 연계한 취약점 관리 체계가 보안 업계 전반으로 확산되고 있다. VDP를 통해 취약점 신고 창구와 원칙을 명확히 하고, CVD 절차에 따라 발견·신고·조정·패치·공개를 체계적으로 관리하며, 버그바운티를 통해 화이트해커의 참여와 보상을 연계하는 방식이 주요 흐름으로 부각되고 있다. 지니언스는 이러한 흐름에 맞춰 취약점 접수부터 처리, 보상까지 전사 차원의 체계를 지속적으로 강화해 나갈 계획이다.  </p>\n<p>지니언스는 국내 보안 업계 최초로 자체적인 버그바운티 제도를 시행했다. 2022년 3월부터 지난해 말까지 총 827건의 취약점 신고가 접수됐으며, 잠재된 보안 취약점에 선제적으로 대응하여 고객에게 신뢰성 있고 보다 안전한 서비스를 제공하고 있다.  </p>\n<p>지니언스 버그바운티 적용 대상은 그동안 네트워크 접근제어 솔루션(NAC)과 클라우드 고객 관리 서비스(CSM)에 한정되어 있었으나, 앞으로는 지니언스가 관리하는 모든 제품과 서비스 전반으로 확대 적용된다. 제3자 호스팅 서비스 및 솔루션은 범위에서 제외되며 해당 정책은 국내뿐만 아니라 글로벌 환경에도 동일하게 적용된다.  </p>\n<p>이동범 지니언스 대표는 “이번 버그바운티 확대 운영은 단순한 제도 변경이 아니라, 실제 위협을 보다 폭넓게 수용하고 보안 책임 범위를 명확히 하겠다는 의지의 표현”이라며 “앞으로도 국내외 보안 커뮤니티와의 협력을 강화해 제품과 서비스의 보안 수준을 지속적으로 고도화해 나갈 것”이라고 말했다.  </p>\n<p>한편, 지니언스는 정보보호 공시에 대한 필요성이 본격적으로 부각되기 이전부터, 보안 전문 기업으로서의 책임감과 선도적 자세를 바탕으로 자율 공시를 결정했다. 회사는 제도적 요구에 앞서 스스로 기준을 높이는 보안 운영 원칙을 유지하며, 버그바운티 프로그램 등을 통해 제품과 서비스 전반에 걸친 신뢰 확보에 주력하고 있다.</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 보안 사각지대를 해소하고, 사이버 위협에 선제적으로 대응하기 위한 ‘버그바운티(Bug Bounty) 프로그램’을 전 제품·서비스로 확대 운영한다고 9일 밝혔다.  \n  \n‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 보안 사각지대를 해소하고, 사이버 위협에 선제적으로 대응하기 위한 ‘버그바운티(Bug Bounty) 프로그램’을 전 제품·서비스로 확대 운영한다고 9일 밝혔다.  \n  \n‘버그바운티(Bug Bounty)’는 소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여할 수 있다.  \n  \n구글, 애플, 아마존 등 글로벌 IT 기업들도 자사 제품과 서비스의 취약점 발굴 및 보안 강화를 위해 버그바운티 프로그램을 적극 운영 중이다. 지난해 국내에서도 대형 해킹 사고가 잇따르며 버그바운티의 필요성이 재조명된 가운데, 지니언스는 네이버, 카카오, 삼성SDS, LG전자 등과 함께 버그바운티를 독립적으로 프로그램을 운영하는 우수 기업 사례로 손꼽히고 있다.  \n  \n최근에는 취약점 공개 프로그램(VDP, Vulnerability Disclosure Policy), 협력적 취약점 공개(CVD, Coordinated Vulnerability Disclosure), 버그바운티를 연계한 취약점 관리 체계가 보안 업계 전반으로 확산되고 있다. VDP를 통해 취약점 신고 창구와 원칙을 명확히 하고, CVD 절차에 따라 발견·신고·조정·패치·공개를 체계적으로 관리하며, 버그바운티를 통해 화이트해커의 참여와 보상을 연계하는 방식이 주요 흐름으로 부각되고 있다. 지니언스는 이러한 흐름에 맞춰 취약점 접수부터 처리, 보상까지 전사 차원의 체계를 지속적으로 강화해 나갈 계획이다.  \n  \n지니언스는 국내 보안 업계 최초로 자체적인 버그바운티 제도를 시행했다. 2022년 3월부터 지난해 말까지 총 827건의 취약점 신고가 접수됐으며, 잠재된 보안 취약점에 선제적으로 대응하여 고객에게 신뢰성 있고 보다 안전한 서비스를 제공하고 있다.  \n  \n지니언스 버그바운티 적용 대상은 그동안 네트워크 접근제어 솔루션(NAC)과 클라우드 고객 관리 서비스(CSM)에 한정되어 있었으나, 앞으로는 지니언스가 관리하는 모든 제품과 서비스 전반으로 확대 적용된다. 제3자 호스팅 서비스 및 솔루션은 범위에서 제외되며 해당 정책은 국내뿐만 아니라 글로벌 환경에도 동일하게 적용된다.  \n  \n이동범 지니언스 대표는 “이번 버그바운티 확대 운영은 단순한 제도 변경이 아니라, 실제 위협을 보다 폭넓게 수용하고 보안 책임 범위를 명확히 하겠다는 의지의 표현”이라며 “앞으로도 국내외 보안 커뮤니티와의 협력을 강화해 제품과 서비스의 보안 수준을 지속적으로 고도화해 나갈 것”이라고 말했다.  \n  \n한편, 지니언스는 정보보호 공시에 대한 필요성이 본격적으로 부각되기 이전부터, 보안 전문 기업으로서의 책임감과 선도적 자세를 바탕으로 자율 공시를 결정했다. 회사는 제도적 요구에 앞서 스스로 기준을 높이는 보안 운영 원칙을 유지하며, 버그바운티 프로그램 등을 통해 제품과 서비스 전반에 걸친 신뢰 확보에 주력하고 있다."}, {"title": "- VPN•VLAN 기반 세대간 망분리 보안 솔루션 동시 제공 - 신축•구축 단지 모두 적용 가능…단지 환경별 최적 구성 지원 - 공동주택 홈네트워크 보안 강화 요구에 대응…운영 효율과 서비스 연속성까지 고려", "date": "2026.01.29", "link": "https://www.genians.co.kr/pr-room/press/20260129", "category": "기타 뉴스", "body_html": "<p>사이버 보안 전문기업 지니언스는 홈네트워크 세대간 망분리 보안 솔루션 ‘지니안 홈(Genian Home)’을 정식 출시했다고 29일 밝혔다. ‘지니안 홈’은 안전하고 신뢰할 수 있는 주거 네트워크 환경 구현을 목표로, VPN과 VLAN 기반 세대간 망분리 보안 솔루션을 제공한다.  </p>\n<p>2021년 ‘월패드 해킹’ 이슈를 계기로 공동주택 보안의 중요성이 본격적으로 부각되면서, 정부는 홈네트워크 보안 강화를 위한 제도적 정비를 이어오고 있다. 신축 공동주택을 중심으로 세대 간 망분리 적용이 의무화 됐으며, 구축 단지를 포함한 공동주택 전반의 보안 관리 기준도 강화되고 있다.  </p>\n<p>다만 단지별 환경과 여건에 따라 보안 수준에 격차가 발생하고 있어, 이를 보완할 현실적인 대안에 대한 요구가 지속적으로 제기되고 있다. 현재 신축 단지에 한정되어 있는 의무화 적용 범위를 구축 단지까지 확대해야 한다는 요구가 증가하고 있다.  </p>\n<p>홈네트워크는 한 번의 침해로 다수 세대에 영향을 미칠 수 있는 구조적 특성을 가지고 있다. 특히 세대 간 네트워크가 분리되지 않은 환경에서는 인가되지 않은 단말을 통한 비인가 접근이나 정보 유출의 위험이 확대될 수 있다. 최근 스마트홈 기기 확산으로 네트워크 접점도 증가했지만, 관리 주체도 비전문 인력에 의존하는 경우가 많아 체계적인 보안 운영이 쉽지 않은 상황이다.  </p>\n<p>지니언스가 이번에 출시한 ‘지니안 홈’은 이러한 공동주택 환경을 고려해 설계된 세대간 망분리 보안 솔루션이다. 아파트 단지 내에서 세대별 네트워크를 논리적으로 분리해 불필요한 통신을 최소화한다. 단말 간 직접 통신이나 비인가 단말 접근을 통제함으로써 홈네트워크 전반의 보안 수준을 높이는 데 초점을 맞췄다.  </p>\n<p>기존 인프라의 변경 없이 구축이 가능하며, 신축 단지는 물론 구축 단지에도 적용할 수 있다. 단지 특성과 운영 환경에 따라 VPN(가상사설망)과 VLAN(가상근거리통신망) 기반 기술을 선택적으로 적용할 수 있도록 구성했다.  </p>\n<p>지니안 홈의 ‘VPN’은 세대별 암호화 통신과 세대 간 접근 제어 정책을 적용한다. 홈네트워크 필수 서비스 외 불필요한 통신을 통제하고 세대 간 직접 통신 및 비인가 단말의 접근을 차단함으로써 보안성을 강화한다.  </p>\n<p>장비 상태와 단말 접속 현황을 한눈에 확인할 수 있는 ‘대시보드 기반 모니터링 기능’을 제공해 관리 효율성을 높였다. CC인증(EAL4)과 시험성적서를 취득하였으며, 정부 고시 및 가이드라인도 충족해 신뢰도를 확보했다.  </p>\n<p>지니안 홈의 ‘VLAN’은 세대별로 독립적인 VLAN 환경에 네트워크 접근제어 기술을 결합했다. 홈네트워크 필수 서비스를 제외한 세대 간 통신을 원천적으로 차단하고 비인가 단말의 네트워크 접속을 통제한다. 홈네트워크 운영에 필요한 필수 서비스 중심으로 보안 정책을 설계할 수 있어, 보안성과 운영 편의성을 동시에 고려했다.  </p>\n<p>중앙집중형 관리 구조를 통해 대규모 장비 교체나 세대별 추가 공사 부담을 제거했다. 관리자가 단말 현황과 상태를 직관적으로 확인할 수 있는 대시보드 기반 관리 기능을 제공해 이상 징후를 신속하게 파악하고 대응할 수 있도록 지원한다. CC인증(EAL2)과 시험성적서도 보유하고 있다.  </p>\n<p>이동범 지니언스 대표는 “공동주택 홈네트워크 보안은 단순한 편의 기능을 넘어 입주민의 안전과 직결되는 중요한 영역”이라며 “지니언스가 오랜 기간 축적해 온 네트워크 접근 통제 기술과 보안 운영 경험을 바탕으로, 현장에 적용 가능한 실질적인 대안을 제시하고자 했다”고 말했다. 이어 “지니안 홈을 통해 보다 안전한 주거 네트워크 환경을 구현하는 데 기여하겠다”고 덧붙였다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 홈네트워크 세대간 망분리 보안 솔루션 ‘지니안 홈(Genian Home)’을 정식 출시했다고 29일 밝혔다. ‘지니안 홈’은 안전하고 신뢰할 수 있는 주거 네트워크 환경 구현을 목표로, VPN과 VLAN 기반 세대간 망분리 보안 솔루션을 제공한다.  \n  \n2021년 ‘월패드 해킹’ 이슈를 계기로 공동주택 보안의 중요성이 본...", "full_text": "사이버 보안 전문기업 지니언스는 홈네트워크 세대간 망분리 보안 솔루션 ‘지니안 홈(Genian Home)’을 정식 출시했다고 29일 밝혔다. ‘지니안 홈’은 안전하고 신뢰할 수 있는 주거 네트워크 환경 구현을 목표로, VPN과 VLAN 기반 세대간 망분리 보안 솔루션을 제공한다.  \n  \n2021년 ‘월패드 해킹’ 이슈를 계기로 공동주택 보안의 중요성이 본격적으로 부각되면서, 정부는 홈네트워크 보안 강화를 위한 제도적 정비를 이어오고 있다. 신축 공동주택을 중심으로 세대 간 망분리 적용이 의무화 됐으며, 구축 단지를 포함한 공동주택 전반의 보안 관리 기준도 강화되고 있다.  \n  \n다만 단지별 환경과 여건에 따라 보안 수준에 격차가 발생하고 있어, 이를 보완할 현실적인 대안에 대한 요구가 지속적으로 제기되고 있다. 현재 신축 단지에 한정되어 있는 의무화 적용 범위를 구축 단지까지 확대해야 한다는 요구가 증가하고 있다.  \n  \n홈네트워크는 한 번의 침해로 다수 세대에 영향을 미칠 수 있는 구조적 특성을 가지고 있다. 특히 세대 간 네트워크가 분리되지 않은 환경에서는 인가되지 않은 단말을 통한 비인가 접근이나 정보 유출의 위험이 확대될 수 있다. 최근 스마트홈 기기 확산으로 네트워크 접점도 증가했지만, 관리 주체도 비전문 인력에 의존하는 경우가 많아 체계적인 보안 운영이 쉽지 않은 상황이다.  \n  \n지니언스가 이번에 출시한 ‘지니안 홈’은 이러한 공동주택 환경을 고려해 설계된 세대간 망분리 보안 솔루션이다. 아파트 단지 내에서 세대별 네트워크를 논리적으로 분리해 불필요한 통신을 최소화한다. 단말 간 직접 통신이나 비인가 단말 접근을 통제함으로써 홈네트워크 전반의 보안 수준을 높이는 데 초점을 맞췄다.  \n  \n기존 인프라의 변경 없이 구축이 가능하며, 신축 단지는 물론 구축 단지에도 적용할 수 있다. 단지 특성과 운영 환경에 따라 VPN(가상사설망)과 VLAN(가상근거리통신망) 기반 기술을 선택적으로 적용할 수 있도록 구성했다.  \n  \n지니안 홈의 ‘VPN’은 세대별 암호화 통신과 세대 간 접근 제어 정책을 적용한다. 홈네트워크 필수 서비스 외 불필요한 통신을 통제하고 세대 간 직접 통신 및 비인가 단말의 접근을 차단함으로써 보안성을 강화한다.  \n  \n장비 상태와 단말 접속 현황을 한눈에 확인할 수 있는 ‘대시보드 기반 모니터링 기능’을 제공해 관리 효율성을 높였다. CC인증(EAL4)과 시험성적서를 취득하였으며, 정부 고시 및 가이드라인도 충족해 신뢰도를 확보했다.  \n  \n지니안 홈의 ‘VLAN’은 세대별로 독립적인 VLAN 환경에 네트워크 접근제어 기술을 결합했다. 홈네트워크 필수 서비스를 제외한 세대 간 통신을 원천적으로 차단하고 비인가 단말의 네트워크 접속을 통제한다. 홈네트워크 운영에 필요한 필수 서비스 중심으로 보안 정책을 설계할 수 있어, 보안성과 운영 편의성을 동시에 고려했다.  \n  \n중앙집중형 관리 구조를 통해 대규모 장비 교체나 세대별 추가 공사 부담을 제거했다. 관리자가 단말 현황과 상태를 직관적으로 확인할 수 있는 대시보드 기반 관리 기능을 제공해 이상 징후를 신속하게 파악하고 대응할 수 있도록 지원한다. CC인증(EAL2)과 시험성적서도 보유하고 있다.  \n  \n이동범 지니언스 대표는 “공동주택 홈네트워크 보안은 단순한 편의 기능을 넘어 입주민의 안전과 직결되는 중요한 영역”이라며 “지니언스가 오랜 기간 축적해 온 네트워크 접근 통제 기술과 보안 운영 경험을 바탕으로, 현장에 적용 가능한 실질적인 대안을 제시하고자 했다”고 말했다. 이어 “지니안 홈을 통해 보다 안전한 주거 네트워크 환경을 구현하는 데 기여하겠다”고 덧붙였다.\n\n|  |\n|"}, {"title": "- “중동 넘어 아프리카까지” MEA 최대 규모 국제 보안 컨퍼런스 공식 부스 참가 - 파키스탄 금융권•사우디 SI•국가기관 등 핵심 고객 상담…중동•아프리카 시장 확장 기반 강화 - NAC–EDR–ZTNA 기반 전사적 보안 체계 제시…글로벌 180여 고객이 검증한 기술력 강조", "date": "2025.12.08", "link": "https://www.genians.co.kr/pr-room/press/20251208", "category": "NAC", "body_html": "<p>지니언스가 3대 보안 솔루션을 전면 배치하며 중동•아프리카 시장 공략에 속도를 내고 있다.  </p>\n<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 12월 2일부터 4일까지 사우디아라비아 리야드에서 개최된 ‘블랙햇 MEA(Black Hat Middle East and Africa, MEA) 2025’에 공식 부스로 참가해 전시를 성황리에 마무리했다고 8일 밝혔다.  </p>\n<p>‘블랙햇 MEA’는 전 세계 수백 개의 보안 기업과 전문가가 참여하는 MEA 지역 최대 규모의 국제 보안 컨퍼런스로, 최신 보안 기술과 공격 트렌드를 공유하는 글로벌 행사다. 지니언스는 이번 전시에서 ▲NAC ▲Genian Insights E(EDR) ▲ZTNA 등 핵심 솔루션을 중심으로 온프레미스•클라우드 환경 전반에 대응하는 통합 보안 전략을 선보였다.  </p>\n<p>특히 글로벌 180여 고객 환경에서 검증된 기술력과 구축 경험을 기반으로 중동 공공•엔터프라이즈 고객에 최적화된 보안 체계를 제시하며 높은 관심을 받았다. 행사 기간 동안 총 30건의 비즈니스 상담이 이뤄졌으며, 파키스탄 금융권•사우디 주요 SI•국가기관 등 핵심 고객이 부스를 직접 찾아 데모 요청과 추가 미팅으로 이어지면서 향후 사업 확대의 가능성을 확실히 확인하는 자리로 마무리됐다.  </p>\n<p>지니언스는 ‘SHINE 이니셔티브(한–중동 디지털 협력 전략)’ 및 ‘사우디 비전 2030’과 연계해, 그동안의 중동•아프리카 협업 경험과 현지 프로젝트 사례도 공유했다. 국책 과제 및 현지 파트너십을 기반으로 MEA 지역 기관•기업과 다양한 협력 경험을 축적해 왔으며, 단순한 솔루션 공급을 넘어서 현지 디지털 전환 수요에 부합하는 실질적 보안 모델을 제공해 왔다는 점을 강조했다.  </p>\n<p>지니언스는 이번 전시를 계기로 중동 및 아프리카 전역에서의 사업 확장을 더욱 가속화할 계획이다. 특히 ▲현지•국제 파트너 협력 강화 ▲NAC• Insights E•ZTNA 경쟁력 부각 ▲지역별 프로젝트 기회 발굴 ▲케냐•탄자니아•나이지리아•모로코 등 주요 아프리카 국가와의 접점 확대 등을 목표로 다양한 네트워킹 활동을 진행할 계획이다.  </p>\n<p>글로벌 시장조사기관 모도르 인텔리전스(Modor Intelligence)에 따르면 중동•아프리카(MEA) 사이버 보안 시장은 2025년 약 32억 7,000만 달러(USD)에서 2030년 58억 7,000만 달러로 성장하며, 연평균 12.4%의 높은 증가세를 보일 것으로 전망된다. 금융•보험•공공, 의료, IT•통신, 에너지 등 주요 산업군에서 보안 수요가 확대되고 있으며, 클라우드 전환 가속화 등이 시장 성장에 기여하고 있다.  </p>\n<p>나세일 지니언스 해외사업본부 이사는 “국책 과제 및 파트너 협력을 기반으로 중동•아프리카 시장에서 고객 접점을 꾸준히 넓혀 왔다”며 “SHINE 이니셔티브, 사우디 비전 2030이 지향하는 디지털 전환 흐름 속에서, 지니언스의 보안 솔루션이 실질적인 가치를 제공할 수 있도록 더욱 노력할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 3대 보안 솔루션을 전면 배치하며 중동•아프리카 시장 공략에 속도를 내고 있다.  \n  \n사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 12월 2일부터 4일까지 사우디아라비아 리야드에서 개최된 ‘블랙햇 MEA(Black Hat Middle East and Africa, MEA) 2025’에 공식 부스로 참가해 전시를 성황리에 마무리...", "full_text": "지니언스가 3대 보안 솔루션을 전면 배치하며 중동•아프리카 시장 공략에 속도를 내고 있다.  \n  \n사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 12월 2일부터 4일까지 사우디아라비아 리야드에서 개최된 ‘블랙햇 MEA(Black Hat Middle East and Africa, MEA) 2025’에 공식 부스로 참가해 전시를 성황리에 마무리했다고 8일 밝혔다.  \n  \n‘블랙햇 MEA’는 전 세계 수백 개의 보안 기업과 전문가가 참여하는 MEA 지역 최대 규모의 국제 보안 컨퍼런스로, 최신 보안 기술과 공격 트렌드를 공유하는 글로벌 행사다. 지니언스는 이번 전시에서 ▲NAC ▲Genian Insights E(EDR) ▲ZTNA 등 핵심 솔루션을 중심으로 온프레미스•클라우드 환경 전반에 대응하는 통합 보안 전략을 선보였다.  \n  \n특히 글로벌 180여 고객 환경에서 검증된 기술력과 구축 경험을 기반으로 중동 공공•엔터프라이즈 고객에 최적화된 보안 체계를 제시하며 높은 관심을 받았다. 행사 기간 동안 총 30건의 비즈니스 상담이 이뤄졌으며, 파키스탄 금융권•사우디 주요 SI•국가기관 등 핵심 고객이 부스를 직접 찾아 데모 요청과 추가 미팅으로 이어지면서 향후 사업 확대의 가능성을 확실히 확인하는 자리로 마무리됐다.  \n  \n지니언스는 ‘SHINE 이니셔티브(한–중동 디지털 협력 전략)’ 및 ‘사우디 비전 2030’과 연계해, 그동안의 중동•아프리카 협업 경험과 현지 프로젝트 사례도 공유했다. 국책 과제 및 현지 파트너십을 기반으로 MEA 지역 기관•기업과 다양한 협력 경험을 축적해 왔으며, 단순한 솔루션 공급을 넘어서 현지 디지털 전환 수요에 부합하는 실질적 보안 모델을 제공해 왔다는 점을 강조했다.  \n  \n지니언스는 이번 전시를 계기로 중동 및 아프리카 전역에서의 사업 확장을 더욱 가속화할 계획이다. 특히 ▲현지•국제 파트너 협력 강화 ▲NAC• Insights E•ZTNA 경쟁력 부각 ▲지역별 프로젝트 기회 발굴 ▲케냐•탄자니아•나이지리아•모로코 등 주요 아프리카 국가와의 접점 확대 등을 목표로 다양한 네트워킹 활동을 진행할 계획이다.  \n  \n글로벌 시장조사기관 모도르 인텔리전스(Modor Intelligence)에 따르면 중동•아프리카(MEA) 사이버 보안 시장은 2025년 약 32억 7,000만 달러(USD)에서 2030년 58억 7,000만 달러로 성장하며, 연평균 12.4%의 높은 증가세를 보일 것으로 전망된다. 금융•보험•공공, 의료, IT•통신, 에너지 등 주요 산업군에서 보안 수요가 확대되고 있으며, 클라우드 전환 가속화 등이 시장 성장에 기여하고 있다.  \n  \n나세일 지니언스 해외사업본부 이사는 “국책 과제 및 파트너 협력을 기반으로 중동•아프리카 시장에서 고객 접점을 꾸준히 넓혀 왔다”며 “SHINE 이니셔티브, 사우디 비전 2030이 지향하는 디지털 전환 흐름 속에서, 지니언스의 보안 솔루션이 실질적인 가치를 제공할 수 있도록 더욱 노력할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- 직원 중심 경영 철학 반영…임직원과 함께 성장하는 조직문화 강화 - 유연근무 100% 활용·연차 소진율 98% 등 높은 실천 수준 평가 - 휴가·자율근무·출산·육아 지원 등 전방위적 워라밸 정책 운영", "date": "2025.12.01", "link": "https://www.genians.co.kr/pr-room/press/20251201", "category": "수상 & 인증", "body_html": "<p>사이버 보안 전문기업 지니언스는 고용노동부가 주관하는 ‘2025년 대한민국 일·생활 균형 우수기업’에 선정됐다고 1일 밝혔다.<br />\n<br />\n‘2025년 대한민국 일·생활 균형 우수기업’은 유연근무, 근로시간 단축, 연차 사용 활성화, 일·육아 병행 지원 등 근로자의 일·생활 균형 실천에 모범을 보인 기업을 선정하는 제도다. 올해는 총 183개 기업이 선정됐으며, 인증 기업은 ▲정기 근로감독 면제 ▲정부지원사업 우대 ▲금융·금리 혜택 ▲연구인력 지원 등 다양한 혜택을 받을 수 있다.<br />\n<br />\n이번 평가는 서면 심사와 현장 실사를 거쳐 진행됐으며, 지니언스는 유연근무 제도의 안정적 운영, 높은 휴가 사용률, 직원 의견 반영 기반의 조직문화 개선 노력 등에서 높은 평가를 받았다.<br />\n<br />\n지니언스는 재택·원격근무제와 시차출퇴근제를 포함한 유연근무제를 전 직원이 100% 활용하고 있다. 부서 특성과 업무 상황에 맞춰 시차출퇴근제를 자율적으로 조정할 수 있으며, 자녀가 있는 직원이 등·하원 및 병원 진료 등 돌봄 시간을 유연하게 조율할 수 있도록 배려하고 있다.<br />\n<br />\n지니언스는 최근 몇 년간 연차 소진율 95% 이상을 유지하고 있으며, 지난해에는 약 98%의 소진율을 기록했다. 구글 캘린더 일정 등록만으로 연차 사용이 가능해 사유 작성이나 승인 부담 없이 자유롭게 휴가를 사용할 수 있는 환경을 구축했다. 올해 8월부터는 반반차 제도도 도입해 개인 일정에 맞춘 세분화된 휴가 사용이 가능해졌다.<br />\n<br />\n직원의 가정생활 지원을 위해 남녀 구분 없이 육아휴직을 적극 장려하고 있으며, 매월 세 번째 금요일은 오전만 근무하는 ‘패밀리 데이’ 제도도 운영하고 있다. 매년 어린이날에는 미성년 자녀를 둔 직원에게 상품권을 제공하는 등 맞춤형 가족친화 복지 프로그램을 지속적으로 확대하고 있다.<br />\n<br />\n지니언스는 정기 만족도 조사와 노사협의회 제도를 통해 직원들이 실질적으로 원하는 실효성 있는 복지를 확대하고 있다.<br />\n<br />\n이동범 지니언스 대표는 “직원과 함께 성장한다는 마음으로 업무 환경을 꾸준히 개선해 왔다”며 “이번 선정이 임직원의 근무 만족도는 물론, 기업 이미지 제고와 우수 인재 확보에도 긍정적 선순환을 가져올 것이라 기대한다”고 말했다.<br />\n<br />\n한편, 지니언스는 ▲가족친화인증기업 ▲청년친화강소기업 ▲기술혁신형중소기업 등 다양한 정부 인증을 획득하며 사람 중심의 조직문화 확산에 앞장서고 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 고용노동부가 주관하는 ‘2025년 대한민국 일·생활 균형 우수기업’에 선정됐다고 1일 밝혔다.  \n   \n‘2025년 대한민국 일·생활 균형 우수기업’은 유연근무, 근로시간 단축, 연차 사용 활성화, 일·육아 병행 지원 등 근로자의 일·생활 균형 실천에 모범을 보인 기업을 선정하는 제도다. 올해는 총 183개 기업이 선정됐으...", "full_text": "사이버 보안 전문기업 지니언스는 고용노동부가 주관하는 ‘2025년 대한민국 일·생활 균형 우수기업’에 선정됐다고 1일 밝혔다.  \n   \n‘2025년 대한민국 일·생활 균형 우수기업’은 유연근무, 근로시간 단축, 연차 사용 활성화, 일·육아 병행 지원 등 근로자의 일·생활 균형 실천에 모범을 보인 기업을 선정하는 제도다. 올해는 총 183개 기업이 선정됐으며, 인증 기업은 ▲정기 근로감독 면제 ▲정부지원사업 우대 ▲금융·금리 혜택 ▲연구인력 지원 등 다양한 혜택을 받을 수 있다.  \n   \n이번 평가는 서면 심사와 현장 실사를 거쳐 진행됐으며, 지니언스는 유연근무 제도의 안정적 운영, 높은 휴가 사용률, 직원 의견 반영 기반의 조직문화 개선 노력 등에서 높은 평가를 받았다.  \n   \n지니언스는 재택·원격근무제와 시차출퇴근제를 포함한 유연근무제를 전 직원이 100% 활용하고 있다. 부서 특성과 업무 상황에 맞춰 시차출퇴근제를 자율적으로 조정할 수 있으며, 자녀가 있는 직원이 등·하원 및 병원 진료 등 돌봄 시간을 유연하게 조율할 수 있도록 배려하고 있다.  \n   \n지니언스는 최근 몇 년간 연차 소진율 95% 이상을 유지하고 있으며, 지난해에는 약 98%의 소진율을 기록했다. 구글 캘린더 일정 등록만으로 연차 사용이 가능해 사유 작성이나 승인 부담 없이 자유롭게 휴가를 사용할 수 있는 환경을 구축했다. 올해 8월부터는 반반차 제도도 도입해 개인 일정에 맞춘 세분화된 휴가 사용이 가능해졌다.  \n   \n직원의 가정생활 지원을 위해 남녀 구분 없이 육아휴직을 적극 장려하고 있으며, 매월 세 번째 금요일은 오전만 근무하는 ‘패밀리 데이’ 제도도 운영하고 있다. 매년 어린이날에는 미성년 자녀를 둔 직원에게 상품권을 제공하는 등 맞춤형 가족친화 복지 프로그램을 지속적으로 확대하고 있다.  \n   \n지니언스는 정기 만족도 조사와 노사협의회 제도를 통해 직원들이 실질적으로 원하는 실효성 있는 복지를 확대하고 있다.  \n   \n이동범 지니언스 대표는 “직원과 함께 성장한다는 마음으로 업무 환경을 꾸준히 개선해 왔다”며 “이번 선정이 임직원의 근무 만족도는 물론, 기업 이미지 제고와 우수 인재 확보에도 긍정적 선순환을 가져올 것이라 기대한다”고 말했다.  \n   \n한편, 지니언스는 ▲가족친화인증기업 ▲청년친화강소기업 ▲기술혁신형중소기업 등 다양한 정부 인증을 획득하며 사람 중심의 조직문화 확산에 앞장서고 있다.\n\n|  |\n|"}, {"title": "- 네트워크에서 엔드포인트까지의 통합 보안 플랫폼 전략 소개 - 파일리스 렌섬웨어 대응 방안 ‘주목’", "date": "2025.11.25", "link": "https://www.genians.co.kr/pr-room/press/20251125", "category": "EDR", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 인도네시아 현지 파트너사 ‘피티 프로스페라 아스윈드라 테크놀로지(PT PROSPERA ASWINDRA TEKNOLOGI, 이하PTA)’와 함께 ‘지니언스 파트너 앤 솔루션 데이 2025(Genians Partner &amp; Solution Day 2025)’를 성공적으로 개최했다고 밝혔다.  </p>\n<p>이번 행사는 11월 11일부터 12일까지 인도네시아 자카르타 애슐리 호텔에서 열렸다. 11일에는 파트너 세션, 12일에는 고객 세션이 각각 진행됐으며, 비즈니스 협력 강화와 기술 교류, 공동 성장 전략을 등 다양한 프로그램이 마련됐다. 지니언스는 ▲NAC ▲Insights E ▲ZTNA 등 핵심 솔루션을 중심으로 한 통합 보안 전략과 현지 보안 컴플라이언스 대응 방안을 공유했다.  </p>\n<p>이번 행사에서 지니언스는 ‘파일리스(Fileless) 기반 랜섬웨어 공격 대응 방안’을 주제로, NAC(Network Access Control)의 역할을 중점적으로 소개했다. 랜섬웨어가 공격 확산을 위해 횡적 이동(Lateral Movement)을 수행한다는 점에 주목해, NAC의 ‘최소 권한 접근 제어’ 기능이 감염 단말의 네트워크 이동을 차단하거나 지연시킬 수 있다는 점을 강조했다.  </p>\n<p>또한 NAC 단독 대응을 넘어 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E(Genian Insights E)’와의 연계 시나리오도 선보였다. 두 솔루션을 함께 활용하면 EDR(Endpoint Detection &amp; Response)에서 탐지한 위협 정보를 기반으로 NAC가 즉각적인 네트워크 격리를 수행할 수 있으며, 네트워크부터 엔드포인트까지 아우르는 통합 가시성과 대응력을 확보할 수 있다.  </p>\n<p>‘지니안 인사이츠 E’는 EDR을 기반으로 백신(AV), 안티랜섬웨어(Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 올인원(All-in-One) 단말 보안 플랫폼이다.  </p>\n<p>지니언스는 ‘지니안 ZTNA(Zero Trust Network Access)’를 통한 제로트러스트 구현 전략과 ‘지니안 NAC’을 활용한 실제 고객 사례도 함께 소개했다. 또한 ‘지니안 인사이츠 E’의 통합 보안 관리 데모 세션을 통해 참석자들이 엔드포인트와 네트워크를 연계한 보안 운영 환경을 직접 체험할 수 있도록 했다.  </p>\n<p>나세일 지니언스 해외사업본부 이사는 “이번 행사를 통해 인도네시아를 비롯한 아태지역 시장 공략을 위한 중요한 발판을 마련했다”며 “현지 파트너와 함께 지속 가능한 사이버 보안 역량을 강화하고, NAC–Insights E–ZTNA 통합 전략을 기반으로 시장 확산에 박차를 가할 것”고 전했다.  </p>\n<p>지니언스는 인도네시아를 비롯해 태국, 말레이시아 등 주요 아태 지역에서 영역을 지속적으로 확대하고 있다. 지난 7월 말레이시아 푸트라자야에서 열린 ‘사이데스(CYDES) 2025’, 8월 인도네시아 자카르타의 ‘DTI-CX 2025’에 이어, 이번 행사를 통해 동남아 시장 내 입지를 더욱 공고히 했다.  </p>\n<p>특히 지니안 NAC는 온프레미스와 클라우드 방식을 모두 지원해 다양한 고객 환경에 유연하게 대응할 수 있으며, 최근 제조업 중심의 인도네시아 시장에서 신규 수주 성과를 달성하는 등 가시적인 성과를 거두고 있다.  </p>\n<p>한편, 현지 파트너사 PTA는 2017년 설립된 IT 보안 전문 유통사로, 파트너 중심의 협력 모델과 실행력을 바탕으로 인도네시아 보안 생태계 발전을 선도하고 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 인도네시아 현지 파트너사 ‘피티 프로스페라 아스윈드라 테크놀로지(PT PROSPERA ASWINDRA TEKNOLOGI, 이하PTA)’와 함께 ‘지니언스 파트너 앤 솔루션 데이 2025(Genians Partner & Solution Day 2025)’를 성공적으로 개최했다고 밝혔다.  \n  \n이...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 인도네시아 현지 파트너사 ‘피티 프로스페라 아스윈드라 테크놀로지(PT PROSPERA ASWINDRA TEKNOLOGI, 이하PTA)’와 함께 ‘지니언스 파트너 앤 솔루션 데이 2025(Genians Partner & Solution Day 2025)’를 성공적으로 개최했다고 밝혔다.  \n  \n이번 행사는 11월 11일부터 12일까지 인도네시아 자카르타 애슐리 호텔에서 열렸다. 11일에는 파트너 세션, 12일에는 고객 세션이 각각 진행됐으며, 비즈니스 협력 강화와 기술 교류, 공동 성장 전략을 등 다양한 프로그램이 마련됐다. 지니언스는 ▲NAC ▲Insights E ▲ZTNA 등 핵심 솔루션을 중심으로 한 통합 보안 전략과 현지 보안 컴플라이언스 대응 방안을 공유했다.  \n  \n이번 행사에서 지니언스는 ‘파일리스(Fileless) 기반 랜섬웨어 공격 대응 방안’을 주제로, NAC(Network Access Control)의 역할을 중점적으로 소개했다. 랜섬웨어가 공격 확산을 위해 횡적 이동(Lateral Movement)을 수행한다는 점에 주목해, NAC의 ‘최소 권한 접근 제어’ 기능이 감염 단말의 네트워크 이동을 차단하거나 지연시킬 수 있다는 점을 강조했다.  \n  \n또한 NAC 단독 대응을 넘어 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E(Genian Insights E)’와의 연계 시나리오도 선보였다. 두 솔루션을 함께 활용하면 EDR(Endpoint Detection & Response)에서 탐지한 위협 정보를 기반으로 NAC가 즉각적인 네트워크 격리를 수행할 수 있으며, 네트워크부터 엔드포인트까지 아우르는 통합 가시성과 대응력을 확보할 수 있다.  \n  \n‘지니안 인사이츠 E’는 EDR을 기반으로 백신(AV), 안티랜섬웨어(Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 올인원(All-in-One) 단말 보안 플랫폼이다.  \n  \n지니언스는 ‘지니안 ZTNA(Zero Trust Network Access)’를 통한 제로트러스트 구현 전략과 ‘지니안 NAC’을 활용한 실제 고객 사례도 함께 소개했다. 또한 ‘지니안 인사이츠 E’의 통합 보안 관리 데모 세션을 통해 참석자들이 엔드포인트와 네트워크를 연계한 보안 운영 환경을 직접 체험할 수 있도록 했다.  \n  \n나세일 지니언스 해외사업본부 이사는 “이번 행사를 통해 인도네시아를 비롯한 아태지역 시장 공략을 위한 중요한 발판을 마련했다”며 “현지 파트너와 함께 지속 가능한 사이버 보안 역량을 강화하고, NAC–Insights E–ZTNA 통합 전략을 기반으로 시장 확산에 박차를 가할 것”고 전했다.  \n  \n지니언스는 인도네시아를 비롯해 태국, 말레이시아 등 주요 아태 지역에서 영역을 지속적으로 확대하고 있다. 지난 7월 말레이시아 푸트라자야에서 열린 ‘사이데스(CYDES) 2025’, 8월 인도네시아 자카르타의 ‘DTI-CX 2025’에 이어, 이번 행사를 통해 동남아 시장 내 입지를 더욱 공고히 했다.  \n  \n특히 지니안 NAC는 온프레미스와 클라우드 방식을 모두 지원해 다양한 고객 환경에 유연하게 대응할 수 있으며, 최근 제조업 중심의 인도네시아 시장에서 신규 수주 성과를 달성하는 등 가시적인 성과를 거두고 있다.  \n  \n한편, 현지 파트너사 PTA는 2017년 설립된 IT 보안 전문 유통사로, 파트너 중심의 협력 모델과 실행력을 바탕으로 인도네시아 보안 생태계 발전을 선도하고 있다.\n\n|  |\n|"}, {"title": "- 잇따른 해킹 사고로 보안 중요성 확대…정부 정책 강화 등 기대감 반영 - 유안타증권 후원 “역대 최다 기업 참가”…투자자와 기술적 역량과 시장 잠재력 소통 - 기업가치 제고 및 보안 산업 레벨업 목표", "date": "2025.11.18", "link": "https://www.genians.co.kr/pr-room/press/20251118", "category": "기타 뉴스", "body_html": "<p>국내 주요 사이버 보안 12개사가 기업가치 제고와 투자자 소통 확대를 위해 공동 기업설명회(IR)를 개최한다고 밝혔다. 글로벌 시장 대비 저평가 문제를 겪어온 국내 보안 업계가 자본시장의 인식을 개선하고, 최근 고조되는 사이버 위협과 정부의 강력한 사이버 보안 정책을 발판 삼아 K-보안의 진정한 가치를 입증하겠다는 취지다.  </p>\n<p>이번 공동설명회는 라온시큐어, 모니터랩, 슈프리마, 신시웨이, 엑스게이트, 인스피언, 지니언스, 파수, 헥토이노베이션, 휴네시온, ICTK, SGA솔루션즈 등 12개사가 참여하는 역대 최다 규모의 행사로, 유안타증권이 후원한다. 행사는 11월 24일(월) 여의도 앵커원 유안타증권 본사에서 진행될 예정이다.  </p>\n<p>전 세계적으로 사이버 위협이 고도화되며, 미국 등 주요국에서는 보안 기업의 기술력과 미래 성장 가치를 높게 평가하고 있다. 유니콘 기업이 속속 등장하고 있으며, 글로벌 보안 기업들의 시가총액도 가파르게 상승하고 있다. 반면 한국은 자국의 독자적인 보안 기술을 보유한 몇 안 되는 국가임에도, 뛰어난 기술력과 성장 잠재력에 비해 상대적으로 낮은 시장 평가를 받고 있는 상황이다.  </p>\n<p>이에 주요 보안 기업들은 개별적인 성과를 넘어, 산업 전반의 가치를 함께 높여야 한다는 공감대를 형성했다. 2024년부터 투자자들에게 보안 산업 전반의 성장 가능성과 각 기업의 핵심 경쟁력을 조명할 수 있는 공동 기업 설명회를 정례화해 운영하고 있다.  </p>\n<p>이번 설명회에서 참여 기업들은 국내외 기관투자자를 대상으로 사이버 보안 산업의 최신 동향과 핵심 비즈니스 모델, 기술 경쟁력 및 성장 전략 등을 직접 소개할 예정이다. 특히 최근 잇따른 대형 해킹 사고와 함께 지난 10월 정부가 발표한 ‘범부처 정보보호 종합대책’의 영향 및 산업 전반의 변화 방향에 대해서도 심도 있는 논의가 이뤄질 전망이다.  </p>\n<p>권명준 유안타증권 연구원은 \"반복되는 보안 이슈 속에서 저평가되었던 국내 보안 기업들의 실제 가치와 성장 잠재력을 투자자들에게 효과적으로 전달하는 것이 이번 설명회의 목적\"이라며 \"보안 산업 전반의 신뢰를 제고하고, 자본시장이 K-보안의 가치를 재발견하는 계기가 될 것\"이라고 말했다.  </p>\n<p>보안 업계 관계자는 \"개별 기업의 성장을 넘어 산업 전체가 함께 성장해야 한다는 공감대가 이번 공동 IR의 원동력\"이라며 \"지속적인 자본시장과의 소통을 통해 한국 보안 산업이 글로벌 시장에서도 당당히 경쟁할 수 있는 투자 환경을 만들어 나갈 것\"이라고 포부를 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "국내 주요 사이버 보안 12개사가 기업가치 제고와 투자자 소통 확대를 위해 공동 기업설명회(IR)를 개최한다고 밝혔다. 글로벌 시장 대비 저평가 문제를 겪어온 국내 보안 업계가 자본시장의 인식을 개선하고, 최근 고조되는 사이버 위협과 정부의 강력한 사이버 보안 정책을 발판 삼아 K-보안의 진정한 가치를 입증하겠다는 취지다.  \n  \n이번 공동설명회는 라온시...", "full_text": "국내 주요 사이버 보안 12개사가 기업가치 제고와 투자자 소통 확대를 위해 공동 기업설명회(IR)를 개최한다고 밝혔다. 글로벌 시장 대비 저평가 문제를 겪어온 국내 보안 업계가 자본시장의 인식을 개선하고, 최근 고조되는 사이버 위협과 정부의 강력한 사이버 보안 정책을 발판 삼아 K-보안의 진정한 가치를 입증하겠다는 취지다.  \n  \n이번 공동설명회는 라온시큐어, 모니터랩, 슈프리마, 신시웨이, 엑스게이트, 인스피언, 지니언스, 파수, 헥토이노베이션, 휴네시온, ICTK, SGA솔루션즈 등 12개사가 참여하는 역대 최다 규모의 행사로, 유안타증권이 후원한다. 행사는 11월 24일(월) 여의도 앵커원 유안타증권 본사에서 진행될 예정이다.  \n  \n전 세계적으로 사이버 위협이 고도화되며, 미국 등 주요국에서는 보안 기업의 기술력과 미래 성장 가치를 높게 평가하고 있다. 유니콘 기업이 속속 등장하고 있으며, 글로벌 보안 기업들의 시가총액도 가파르게 상승하고 있다. 반면 한국은 자국의 독자적인 보안 기술을 보유한 몇 안 되는 국가임에도, 뛰어난 기술력과 성장 잠재력에 비해 상대적으로 낮은 시장 평가를 받고 있는 상황이다.  \n  \n이에 주요 보안 기업들은 개별적인 성과를 넘어, 산업 전반의 가치를 함께 높여야 한다는 공감대를 형성했다. 2024년부터 투자자들에게 보안 산업 전반의 성장 가능성과 각 기업의 핵심 경쟁력을 조명할 수 있는 공동 기업 설명회를 정례화해 운영하고 있다.  \n  \n이번 설명회에서 참여 기업들은 국내외 기관투자자를 대상으로 사이버 보안 산업의 최신 동향과 핵심 비즈니스 모델, 기술 경쟁력 및 성장 전략 등을 직접 소개할 예정이다. 특히 최근 잇따른 대형 해킹 사고와 함께 지난 10월 정부가 발표한 ‘범부처 정보보호 종합대책’의 영향 및 산업 전반의 변화 방향에 대해서도 심도 있는 논의가 이뤄질 전망이다.  \n  \n   \n권명준 유안타증권 연구원은 \"반복되는 보안 이슈 속에서 저평가되었던 국내 보안 기업들의 실제 가치와 성장 잠재력을 투자자들에게 효과적으로 전달하는 것이 이번 설명회의 목적\"이라며 \"보안 산업 전반의 신뢰를 제고하고, 자본시장이 K-보안의 가치를 재발견하는 계기가 될 것\"이라고 말했다.  \n  \n보안 업계 관계자는 \"개별 기업의 성장을 넘어 산업 전체가 함께 성장해야 한다는 공감대가 이번 공동 IR의 원동력\"이라며 \"지속적인 자본시장과의 소통을 통해 한국 보안 산업이 글로벌 시장에서도 당당히 경쟁할 수 있는 투자 환경을 만들어 나갈 것\"이라고 포부를 밝혔다.\n\n|  |\n|"}, {"title": "- 중동 주요 기관 및 파트너사와 협력•PoC 논의 진행… 신규 시장 진출 기반 마련 - 지난해 ‘자이텍스 두바이 2024’서 EDR 첫 공개…사우디 공공기관 첫 고객 확보 등 비즈니스 기반 꾸준히 강화 - 중동 국책과제•UAE 사무소 기반으로 현지화 가속… 3대 솔루션 중심의 통합 보안 전략 강화", "date": "2025.10.20", "link": "https://www.genians.co.kr/pr-room/press/20251020", "category": "EDR", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 지난 10월 13일부터 17일까지 아랍에미리트(UAE) 두바이에서 열린 중동 최대 ICT 전시회 ‘자이텍스 두바이 2025(GITEX DUBAI 2025)’를 성황리에 마무리했다고 20일 밝혔다.  </p>\n<p>지니언스는 이번 전시에서 ▲NAC(Network Access Control), ▲EDR(Endpoint Detection and Response) ▲ZTNA(Zero Trust Network Access) 등 3대 핵심 솔루션을 중심으로 통합 보안 전략을 선보였다. 정부기관, 핀테크, 헬스케어, 통신, 모빌리티 등 다양한 산업군의 고객을 대상으로 실질적인 보안 구축 방안을 제시하고, 현지 파트너와의 협력 기회도 한층 확대했다.   </p>\n<p>특히 중동 공공기관 관계자들과의 미팅에서 NAC 솔루션에 대한 높은 관심이 확인됐다. 지니언스의 중동 헬스케어 분야 적용 사례에 깊은 인상을 보였으며, 자국 내 의료기관 및 정부 네트워크 환경에 NAC를 적용하는 방안과 함께 PoC(기술검증) 추진에 대해 논의했다.  </p>\n<p>중동 및 아프리카의 보안 솔루션 업체들과의 미팅을 통해 지니언스 솔루션을 소개하고, 신규 고객사 유치를 위한 파트너 발굴에 나섰다. 기존 파트너사들과는 기술 지원, 영업 역량 강화, 공동 마케팅 추진 등 협력 체계 고도화 방안도 논의했다.  </p>\n<p>이번 ‘자이텍스 두바이 2025’는 지니언스가 지난해에 이어 2년 연속 참가한 전시회다. 회사는 지난해 같은 행사에서 EDR을 글로벌 시장에 첫 공개하며, 중동 시장 공략의 새로운 발판을 마련했다. 특히 온프레미스로 제공되는 지니언스의 EDR 솔루션은 자체 보안 체계를 선호하는 중동 시장 특성에 부합해 높은 관심을 받았다.  </p>\n<p>지니언스는 EDR 첫 공개 이후 현지 파트너십을 확대하고 사우디아라비아 공공기관에 EDR을 공급하는 등 중동 지역에서의 비즈니스 기반을 꾸준히 강화해 왔다. 중동 국책과제 주관기관으로 선정돼 협력사와 함께 공동 연구•수출 활동을 이어가고 있으며, UAE 두바이 신규 사무소 개설 및 주재원 상주를 통해 현지 시장 조사•영업•마케팅을 적극 추진하며, 사업 기반을 넓혀가고 있다.  </p>\n<p>나세일 지니언스 해외사업본부 이사는 “지난해 GITEX에서 EDR을 처음 공개한 이후, 적극적인 영업 활동을 통해 사우디아라비아 고객을 확보하는 성과를 얻었다”며 “올해 역시 중동 시장 확장의 중요한 전환점이 될 것으로 기대하며, 앞으로도 현지 고객 맞춤형 보안 환경을 제공해 입지를 더욱 공고히 하겠다”고 말했다.  </p>\n<p>한편, 지니언스는 자이텍스에 이어 하반기에는 ‘Black Hat MEA 2025(리야드)’ 등 주요 보안 행사에도 연이어 참가해 중동 및 인접 시장에서의 존재감을 더욱 강화할 계획이다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 지난 10월 13일부터 17일까지 아랍에미리트(UAE) 두바이에서 열린 중동 최대 ICT 전시회 ‘자이텍스 두바이 2025(GITEX DUBAI 2025)’를 성황리에 마무리했다고 20일 밝혔다.  \n  \n지니언스는 이번 전시에서 ▲NAC(Network Access Control), ▲EDR(En...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)는 지난 10월 13일부터 17일까지 아랍에미리트(UAE) 두바이에서 열린 중동 최대 ICT 전시회 ‘자이텍스 두바이 2025(GITEX DUBAI 2025)’를 성황리에 마무리했다고 20일 밝혔다.  \n  \n지니언스는 이번 전시에서 ▲NAC(Network Access Control), ▲EDR(Endpoint Detection and Response) ▲ZTNA(Zero Trust Network Access) 등 3대 핵심 솔루션을 중심으로 통합 보안 전략을 선보였다. 정부기관, 핀테크, 헬스케어, 통신, 모빌리티 등 다양한 산업군의 고객을 대상으로 실질적인 보안 구축 방안을 제시하고, 현지 파트너와의 협력 기회도 한층 확대했다.   \n  \n특히 중동 공공기관 관계자들과의 미팅에서 NAC 솔루션에 대한 높은 관심이 확인됐다. 지니언스의 중동 헬스케어 분야 적용 사례에 깊은 인상을 보였으며, 자국 내 의료기관 및 정부 네트워크 환경에 NAC를 적용하는 방안과 함께 PoC(기술검증) 추진에 대해 논의했다.  \n  \n중동 및 아프리카의 보안 솔루션 업체들과의 미팅을 통해 지니언스 솔루션을 소개하고, 신규 고객사 유치를 위한 파트너 발굴에 나섰다. 기존 파트너사들과는 기술 지원, 영업 역량 강화, 공동 마케팅 추진 등 협력 체계 고도화 방안도 논의했다.  \n  \n이번 ‘자이텍스 두바이 2025’는 지니언스가 지난해에 이어 2년 연속 참가한 전시회다. 회사는 지난해 같은 행사에서 EDR을 글로벌 시장에 첫 공개하며, 중동 시장 공략의 새로운 발판을 마련했다. 특히 온프레미스로 제공되는 지니언스의 EDR 솔루션은 자체 보안 체계를 선호하는 중동 시장 특성에 부합해 높은 관심을 받았다.  \n  \n지니언스는 EDR 첫 공개 이후 현지 파트너십을 확대하고 사우디아라비아 공공기관에 EDR을 공급하는 등 중동 지역에서의 비즈니스 기반을 꾸준히 강화해 왔다. 중동 국책과제 주관기관으로 선정돼 협력사와 함께 공동 연구•수출 활동을 이어가고 있으며, UAE 두바이 신규 사무소 개설 및 주재원 상주를 통해 현지 시장 조사•영업•마케팅을 적극 추진하며, 사업 기반을 넓혀가고 있다.  \n  \n나세일 지니언스 해외사업본부 이사는 “지난해 GITEX에서 EDR을 처음 공개한 이후, 적극적인 영업 활동을 통해 사우디아라비아 고객을 확보하는 성과를 얻었다”며 “올해 역시 중동 시장 확장의 중요한 전환점이 될 것으로 기대하며, 앞으로도 현지 고객 맞춤형 보안 환경을 제공해 입지를 더욱 공고히 하겠다”고 말했다.  \n  \n한편, 지니언스는 자이텍스에 이어 하반기에는 ‘Black Hat MEA 2025(리야드)’ 등 주요 보안 행사에도 연이어 참가해 중동 및 인접 시장에서의 존재감을 더욱 강화할 계획이다.\n\n|  |\n|"}, {"title": "– 에티버스 전국 단위 유통망과 체계적 파트너 지원 프로그램 활용해 시장 점유율 확대 – 국내 EDR 1위 기술력 기반의 ‘안티 바이러스’로 신속한 위협 차단 및 안전한 보안 환경 제공 – EDR•NAC 연동 통한 위협 가시성 확보…엔드포인트부터 네트워크까지 일원화된 대응 가능", "date": "2025.10.01", "link": "https://www.genians.co.kr/pr-room/press/20251001", "category": "NAC", "body_html": "<p>사이버 보안 전문기업 지니언스는 보안 유통 전문 기업 에티버스와 새롭게 개발한 ‘안티 바이러스(Anti-Virus)’ 솔루션에 대한 총판 계약을 체결했다고 1일 밝혔다.  </p>\n<p>이번 계약으로 양사는 공공•민간 시장을 대상으로 지니언스의 안티 바이러스 솔루션 공급을 확대할 계획이다. 에티버스가 보유한 파트너 지원 프로그램과 전국 단위 유통망을 활용해 본격적인 시장 공략에 나선다는 방침이다.  </p>\n<p>에티버스는 클라우드, 보안, AI 등 글로벌 벤더 솔루션의 국내 공식 총판 및 시스템 통합 서비스를 제공하며, 기업 및 공공기관의 디지털 전환을 주도하고 있다. 최근 실시간 데이터•AI•클라우드•보안 등의 기술 영역 다각화로 혁신성을 강화하고 있다.  </p>\n<p>에티버스는 지니언스의 핵심 솔루션을 국내 시장에 더욱 폭넓게 공급하고, 다양한 산업군 고객을 대상으로 보안 강화 캠페인을 전개할 예정이다. 특히 최근 고도화되는 중요 서버 공격, 지능형 공격, 랜섬웨어, 내부자 위협에 대비해 통합적인 보안 운영을 지원할 수 있는 지니언스의 기술력과 에티버스의 유통•영업 역량 결합에 대한 시너지 효과가 기대된다.  </p>\n<p>지니언스의 안티 바이러스 솔루션은 국내 EDR 1위 기술력을 기반으로 개발된 제품으로, 시그니처 기반 악성코드 탐지와 자동 치료 기능을 제공한다. ‘로그 수집 및 분석 기능’을 통해 ▲침입 경로 ▲공격자 행위 ▲사고 원인 등을 직관적으로 파악할 수 있어, 고객은 보다 신속하고 효율적인 보안 운영이 가능하다.  </p>\n<p>에티버스는 이번 총판 계약을 통해 안티 바이러스뿐 아니라 EDR(Endpoint Detection &amp; Response)•NAC(Network Access Control) 제품의 판매도 병행한다. 제품 간 연동으로 확보되는 보안 가시성과 운영 효율성을 강점으로 내세워 시장 확대에 나설 계획이다.  </p>\n<p>고객이 ‘안티 바이러스’와 EDR을 함께 도입할 경우, 알려진 악성코드는 안티 바이러스로 즉시 차단하고, 알려지지 않은 고도화된 공격은 EDR이 탐지•분석•대응하는 다층 방어 체계를 구축할 수 있다. NAC를 함께 도입하면 ▲위협의 IP•플랫폼•사용자 정보 ▲실시간 네트워크 접속 현황 등을 통합 관리 화면에서 한눈에 확인할 수 있어, 엔드포인트부터 네트워크까지 이어지는 일원화된 보안 운영 환경을 구현할 수 있다.  </p>\n<p>이동범 지니언스 대표는 “에티버스의 폭넓은 유통 네트워크와 파트너 지원 역량이 지니언스의 안티 바이러스 시장 안착에 큰 힘이 될 것”이라며 “EDR•NAC과 연계한 통합 보안 전략을 통해 고객에게 더 직관적이고 효율적인 보안 운영 환경을 제공하겠다”고 말했다.  </p>\n<p>김범수 에티버스 대표는 “지니언스의 검증된 기술과 에티버스의 유통•지원 역량이 결합해 국내 보안 시장에서의 큰 가치를 창출할 것”이라며 “파트너사와 동반 성장을 통한 고객 만족도를 높이고 사업경쟁력을 강화하겠다”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 보안 유통 전문 기업 에티버스와 새롭게 개발한 ‘안티 바이러스(Anti-Virus)’ 솔루션에 대한 총판 계약을 체결했다고 1일 밝혔다.  \n  \n이번 계약으로 양사는 공공•민간 시장을 대상으로 지니언스의 안티 바이러스 솔루션 공급을 확대할 계획이다. 에티버스가 보유한 파트너 지원 프로그램과 전국 단위 유통망을 활용해 본격적...", "full_text": "사이버 보안 전문기업 지니언스는 보안 유통 전문 기업 에티버스와 새롭게 개발한 ‘안티 바이러스(Anti-Virus)’ 솔루션에 대한 총판 계약을 체결했다고 1일 밝혔다.  \n  \n이번 계약으로 양사는 공공•민간 시장을 대상으로 지니언스의 안티 바이러스 솔루션 공급을 확대할 계획이다. 에티버스가 보유한 파트너 지원 프로그램과 전국 단위 유통망을 활용해 본격적인 시장 공략에 나선다는 방침이다.  \n  \n에티버스는 클라우드, 보안, AI 등 글로벌 벤더 솔루션의 국내 공식 총판 및 시스템 통합 서비스를 제공하며, 기업 및 공공기관의 디지털 전환을 주도하고 있다. 최근 실시간 데이터•AI•클라우드•보안 등의 기술 영역 다각화로 혁신성을 강화하고 있다.  \n  \n에티버스는 지니언스의 핵심 솔루션을 국내 시장에 더욱 폭넓게 공급하고, 다양한 산업군 고객을 대상으로 보안 강화 캠페인을 전개할 예정이다. 특히 최근 고도화되는 중요 서버 공격, 지능형 공격, 랜섬웨어, 내부자 위협에 대비해 통합적인 보안 운영을 지원할 수 있는 지니언스의 기술력과 에티버스의 유통•영업 역량 결합에 대한 시너지 효과가 기대된다.  \n  \n지니언스의 안티 바이러스 솔루션은 국내 EDR 1위 기술력을 기반으로 개발된 제품으로, 시그니처 기반 악성코드 탐지와 자동 치료 기능을 제공한다. ‘로그 수집 및 분석 기능’을 통해 ▲침입 경로 ▲공격자 행위 ▲사고 원인 등을 직관적으로 파악할 수 있어, 고객은 보다 신속하고 효율적인 보안 운영이 가능하다.  \n  \n에티버스는 이번 총판 계약을 통해 안티 바이러스뿐 아니라 EDR(Endpoint Detection & Response)•NAC(Network Access Control) 제품의 판매도 병행한다. 제품 간 연동으로 확보되는 보안 가시성과 운영 효율성을 강점으로 내세워 시장 확대에 나설 계획이다.  \n  \n고객이 ‘안티 바이러스’와 EDR을 함께 도입할 경우, 알려진 악성코드는 안티 바이러스로 즉시 차단하고, 알려지지 않은 고도화된 공격은 EDR이 탐지•분석•대응하는 다층 방어 체계를 구축할 수 있다. NAC를 함께 도입하면 ▲위협의 IP•플랫폼•사용자 정보 ▲실시간 네트워크 접속 현황 등을 통합 관리 화면에서 한눈에 확인할 수 있어, 엔드포인트부터 네트워크까지 이어지는 일원화된 보안 운영 환경을 구현할 수 있다.  \n  \n이동범 지니언스 대표는 “에티버스의 폭넓은 유통 네트워크와 파트너 지원 역량이 지니언스의 안티 바이러스 시장 안착에 큰 힘이 될 것”이라며 “EDR•NAC과 연계한 통합 보안 전략을 통해 고객에게 더 직관적이고 효율적인 보안 운영 환경을 제공하겠다”고 말했다.  \n  \n김범수 에티버스 대표는 “지니언스의 검증된 기술과 에티버스의 유통•지원 역량이 결합해 국내 보안 시장에서의 큰 가치를 창출할 것”이라며 “파트너사와 동반 성장을 통한 고객 만족도를 높이고 사업경쟁력을 강화하겠다”고 밝혔다.\n\n|  |\n|"}, {"title": "- 이동범 대표, 글로벌 영토 확장 - 대형 파트너사와 점유율 확대 - 인도 등 신시장 개척 노력도 - 올인원 단말 보안 플랫폼 출격", "date": "2025.09.28", "link": "https://www.genians.co.kr/pr-room/press/20250928", "category": "비즈니스 & 성과", "body_html": "<p>한국경제에 이동범 대표님의 인터뷰가 보도되었습니다.<br />\n\"미국 사이버 보안 시장을 공략해 3년 내 글로벌 네트워크 접근 제어(NAC) 업계의 빅2가 되겠습니다.\"</p>\n<p>이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.<br />\n기사 전문은 아래 링크 참조 부탁드리겠습니다.</p>\n<p><a href=\"https://n.news.naver.com/mnews/article/015/0005191127?sid=101\">지니언스 \"美 공략 강화…사이버보안 빅2 될 것\"</a></p>", "body_text": "한국경제에 이동범 대표님의 인터뷰가 보도되었습니다.  \n\"미국 사이버 보안 시장을 공략해 3년 내 글로벌 네트워크 접근 제어(NAC) 업계의 빅2가 되겠습니다.\"\n\n이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.  \n기사 전문은 아래 링크 참조 부탁드리겠습니다.\n\n[지니언스 \"美 공략 강화…사이버보안 빅2 될 것\"](https://n.news...", "full_text": "한국경제에 이동범 대표님의 인터뷰가 보도되었습니다.  \n\"미국 사이버 보안 시장을 공략해 3년 내 글로벌 네트워크 접근 제어(NAC) 업계의 빅2가 되겠습니다.\"\n\n이동범 대표님은 이번 인터뷰에서 이와 같이 의견을 밝혔습니다.  \n기사 전문은 아래 링크 참조 부탁드리겠습니다.\n\n[지니언스 \"美 공략 강화…사이버보안 빅2 될 것\"](https://n.news.naver.com/mnews/article/015/0005191127?sid=101)"}, {"title": "- 투명하고 지속적인 IR 활동, 투자자와의 신뢰 구축으로 높은 평가 - 대표이사·CTO 등 경영진의 적극적인 참여로 중장기 성장 비전 제시 - 시가총액 143% 성장…업계 최고 상승률로 IR 활동 성과 입증", "date": "2025.09.26", "link": "https://www.genians.co.kr/pr-room/press/20250926", "category": "수상 & 인증", "body_html": "<p>사이버 보안 전문기업 지니언스가 26일 서울 여의도 한국거래소에서 개최된 ‘2025 한국IR대상’에서 코스닥 시장 기업 부문 IR우수기업으로 선정됐다고 밝혔다.<br />\n<br />\n‘한국IR대상’은 한국거래소 산하 한국IR협의회가 주관하는 행사로, 기업・주주・투자자의 공동이익과 증권시장 발전에 기여한 우수 기업과 임직원을 선정해 시상한다.<br />\n<br />\n기관투자자의 추천과 평가 등 광범위한 의견 수렴 및 심사 절차를 거쳐 선정된 후보기업 중에서, 각계 전문가로 구성된 한국IR대상 선정위원회가 유가증권시장과 코스닥시장 각각에서 10개 우수기업을 선정한다.<br />\n<br />\n이번 수상은 지니언스가 투명하고 지속적인 IR 활동으로 투자자와의 신뢰를 구축하고, 기업 가치 제고에 기여한 점을 높이 평가 받은 결과다. 지니언스는 IR 활동의 핵심 키워드를 공정성에 기반한 ‘신뢰성·적극성·전문성’으로 설정하고 ▲투자자의 목소리를 IR활동에 반영 ▲CEO Invest Day 정례화 ▲투자자 타깃별 맞춤형 설명회 ▲온라인 IR 채널 고도화 등의 활동을 통해 투자자와의 소통을 강화해 왔다.<br />\n<br />\n지니언스 IR 활동의 또 다른 강점은 경영진의 적극적인 참여다. 대표이사와 CTO를 비롯한 주요 임원들이 국내외 투자자와 직접 만나 사업 전략과 비전을 설명하며, 투자자들에게 재무성과뿐 아니라 회사의 중장기 성장 로드맵과 글로벌 확장 전략에 대한 신뢰를 제공했다<br />\n<br />\n오프라인 IR 행사뿐 아니라 한국거래소 주관 온라인 IR, 증권사 온라인 플랫폼, 유튜브, 증권 방송 등 다양한 채널을 적극 활용해 기관투자자뿐 아니라 개인투자자에게도 공평하고 신속한 정보를 제공하고 있다.<br />\n<br />\n이러한 결과로 지니언스의 2025년 상반기 기준 시가총액은 전년 동기 대비 143% 성장해, 동종 사이버 보안 업계에서 가장 높은 상승률을 기록했다. 증권사 리포트 발간 및 기업설명회 공시 건수도 업계 1위를 달리고 있으며, ‘국내 사이버 보안 기업 공동설명회’도 직접 기획·주관해 산업 전반의 성장과 투자 저변 확대에 기여했다.<br />\n<br />\n이동범 지니언스 대표는 “코스닥 라이징스타 3년 연속 선정에 이어 이번 수상으로 IR 활동과 성장성을 동시에 인정받게 되어 의미가 크다”며 “투자자와의 신뢰를 기반으로 글로벌 시장 확대와 기술 혁신을 가속화해, 기업 가치와 장기 성장을 함께 실현하겠다”고 말했다.<br />\n<br />\n한편, 지니언스는 올해 ‘코스닥 라이징스타’에 3년 연속 선정되며 성장성과 글로벌 확장성을 동시에 입증했다. 이번 한국IR대상 수상과 함께 IR·재무적 성과를 모두 인정받으며, 균형 잡힌 성장 스토리를 완성하게 됐다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스가 26일 서울 여의도 한국거래소에서 개최된 ‘2025 한국IR대상’에서 코스닥 시장 기업 부문 IR우수기업으로 선정됐다고 밝혔다.  \n   \n‘한국IR대상’은 한국거래소 산하 한국IR협의회가 주관하는 행사로, 기업・주주・투자자의 공동이익과 증권시장 발전에 기여한 우수 기업과 임직원을 선정해 시상한다.  \n   \n기관투자자의 추...", "full_text": "사이버 보안 전문기업 지니언스가 26일 서울 여의도 한국거래소에서 개최된 ‘2025 한국IR대상’에서 코스닥 시장 기업 부문 IR우수기업으로 선정됐다고 밝혔다.  \n   \n‘한국IR대상’은 한국거래소 산하 한국IR협의회가 주관하는 행사로, 기업・주주・투자자의 공동이익과 증권시장 발전에 기여한 우수 기업과 임직원을 선정해 시상한다.  \n   \n기관투자자의 추천과 평가 등 광범위한 의견 수렴 및 심사 절차를 거쳐 선정된 후보기업 중에서, 각계 전문가로 구성된 한국IR대상 선정위원회가 유가증권시장과 코스닥시장 각각에서 10개 우수기업을 선정한다.  \n   \n이번 수상은 지니언스가 투명하고 지속적인 IR 활동으로 투자자와의 신뢰를 구축하고, 기업 가치 제고에 기여한 점을 높이 평가 받은 결과다. 지니언스는 IR 활동의 핵심 키워드를 공정성에 기반한 ‘신뢰성·적극성·전문성’으로 설정하고 ▲투자자의 목소리를 IR활동에 반영 ▲CEO Invest Day 정례화 ▲투자자 타깃별 맞춤형 설명회 ▲온라인 IR 채널 고도화 등의 활동을 통해 투자자와의 소통을 강화해 왔다.  \n   \n지니언스 IR 활동의 또 다른 강점은 경영진의 적극적인 참여다. 대표이사와 CTO를 비롯한 주요 임원들이 국내외 투자자와 직접 만나 사업 전략과 비전을 설명하며, 투자자들에게 재무성과뿐 아니라 회사의 중장기 성장 로드맵과 글로벌 확장 전략에 대한 신뢰를 제공했다  \n   \n오프라인 IR 행사뿐 아니라 한국거래소 주관 온라인 IR, 증권사 온라인 플랫폼, 유튜브, 증권 방송 등 다양한 채널을 적극 활용해 기관투자자뿐 아니라 개인투자자에게도 공평하고 신속한 정보를 제공하고 있다.  \n   \n이러한 결과로 지니언스의 2025년 상반기 기준 시가총액은 전년 동기 대비 143% 성장해, 동종 사이버 보안 업계에서 가장 높은 상승률을 기록했다. 증권사 리포트 발간 및 기업설명회 공시 건수도 업계 1위를 달리고 있으며, ‘국내 사이버 보안 기업 공동설명회’도 직접 기획·주관해 산업 전반의 성장과 투자 저변 확대에 기여했다.  \n   \n이동범 지니언스 대표는 “코스닥 라이징스타 3년 연속 선정에 이어 이번 수상으로 IR 활동과 성장성을 동시에 인정받게 되어 의미가 크다”며 “투자자와의 신뢰를 기반으로 글로벌 시장 확대와 기술 혁신을 가속화해, 기업 가치와 장기 성장을 함께 실현하겠다”고 말했다.  \n   \n한편, 지니언스는 올해 ‘코스닥 라이징스타’에 3년 연속 선정되며 성장성과 글로벌 확장성을 동시에 입증했다. 이번 한국IR대상 수상과 함께 IR·재무적 성과를 모두 인정받으며, 균형 잡힌 성장 스토리를 완성하게 됐다.\n\n|  |\n|"}, {"title": "– 국내 EDR 1위 기술력으로 개발한 백신…\"기존 플랫폼에 완전히 통합\" – AV•EDR•안티랜섬웨어•매체제어 통합한 '지니안 인사이츠 E 3.0' 선봬 – 글로벌 보안 트렌드 맞춰 플랫폼 전환 가속…선택형 에디션으로 기업 맞춤형 대응 가능 – “복잡한 보안 환경을 하나로”…단일 콘솔 기반, 탐지부터 대응까지 전 주기 보호", "date": "2025.08.19", "link": "https://www.genians.co.kr/pr-room/press/20250819", "category": "EDR", "body_html": "<p>사이버 보안 전문기업 지니언스는 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E 3.0(Genian Insights E 3.0)’을 출시했다고 19일 밝혔다.  </p>\n<p>‘지니안 인사이츠 E 3.0’은 지니언스의 주력 솔루션인 EDR(Endpoint Detection and Response)을 기반으로, 차세대 백신(AV, Anti-Virus)과 안티랜섬웨어(AR, Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 올인원(All-in-One) 단말 보안 플랫폼이다.  </p>\n<p>이번 버전의 핵심은 지니언스가 ‘국내 EDR 1위’ 기술력으로 개발한 백신의 탑재다. 지니언스의 백신은 단순한 탐지를 넘어, EDR의 모니터링 및 분석기능과 유기적으로 연동되도록 설계됐다.  </p>\n<p>백신으로 악성 코드를 신속 차단하는 동시에, 알려지지 않은 고도화된 위협에 대해서는 EDR이 탐지•분석•대응까지 수행하는 입체적 보안 체계를 구현한다. 백신은 사전 탐지, EDR은 사후 대응을 맡아 사고 대응 속도, 자동화 수준, 위협 가시성 모두를 향상시키는 구조다.  </p>\n<p>지니언스의 백신은 단독으로 사용하는 경우에도, EDR의 로그 수집 및 분석 기능을 연동해 위협에 대한 포괄적인 가시성을 제공한다. 단순한 악성코드 탐지를 넘어, 침입 경로와 사고 원인 추적 정보를 가시성 있게 제공해 차별성을 뒀다. 고객들은 백신 기능만 선택해 도입하더라도 수준 높은 대응력을 확보할 수 있다.  </p>\n<p>‘단일 콘솔 기반의 통합 운영 환경’을 제공한다는 점에서도 경쟁력을 갖췄다. 백신, EDR, 안티랜섬웨어, 매체제어 등 모든 기능을 하나의 콘솔에서 일괄 설정 및 관리할 수 있으며, 다양한 대시보드 시각화, 정밀한 위협 분석, 단말 정책 준수 여부 확인 기능 등을 통해 높은 가시성과 운영 효율성을 제공한다.  </p>\n<p>이외에도 ▲매체제어(USB 저장장치에 대한 읽기•쓰기•사용•차단 권한 설정) ▲안티랜섬웨어(실시간 백업•탐지•대응•복원 지원) 등의 기능을 통해 보안 위협에 선제적으로 대응할 수 있다.   </p>\n<p>기존 제품과의 시너지 효과도 기대된다. 특히 ‘지니안 NAC’를 이미 도입한 기관•기업이 이번 백신을 함께 적용하면 ▲탐지한 위협의 침입 경로와 사고 원인 추적 ▲IP 위치•플랫폼 정보 ▲사용자 정보 등을 관리 화면에서 실시간으로 간편하게 확인할 수 있다. 이를 통해 고객은 네트워크부터 엔드포인트까지 아우르는 통합 가시성과 대응력을 확보할 수 있다.  </p>\n<p>이번 플랫폼 출시는 글로벌 보안 시장의 통합화 흐름에 대응하기 위한 전략의 일환이다. 그동안 국내 시장에서는 백신과 EDR을 개별적으로 운용해왔으나, 글로벌 트렌드는 이를 통합한 단일 플랫폼 중심으로 전환되고 있다. 실제 기업 보안 환경도 여러 보안 솔루션이 중첩 적용되며 관리 복잡성이 증가하고 있고, 이에 따라 고객들은 점점 더 통합된 보안 솔루션을 요구하고 있다.  </p>\n<p>지니언스는 이번 백신 기능 탑재를 계기로 서버 보안 시장으로의 확장도 본격화할 방침이다. 최근 대형 보안 사고가 이어지며 단말 및 서버에 대한 통합 보안 요구가 증가하는 가운데, 지니언스는 백신 기능을 별도 옵션으로 제공하고, 합리적인 가격 정책으로 시장 저변 확대에 나설 방침이다.  </p>\n<p>이동범 지니언스 대표는 “이번 ‘지니안 인사이츠 E 3.0’은 단순한 기능 추가를 넘어, 복잡한 보안 환경을 하나의 플랫폼에서 통합 관리할 수 있도록 한 전략적 제품”이라며 “단일 콘솔 기반의 통합 보안 운영, 백신–EDR 연계 분석, 모니터링까지 가능한 구조를 통해 고객의 보안 운영 효율성과 완성도를 동시에 높일 수 있을 것으로 기대한다”고 말했다.  </p>\n<p>한편, 지니언스는 지난해 EDR 솔루션을 글로벌 시장에 첫 선보였으며, 이번 플랫폼 출시를 계기로 글로벌 통합 보안 시장 공략을 더욱 본격화할 방침이다.  </p>\n<p>‘지니안 인사이츠 E 3.0’은 ▲백신 ▲EDR ▲MDR(Managed Detection and Response) 세 가지 에디션 중 선택 도입이 가능하며, 안티랜섬웨어 및 매체제어 기능도 옵션으로 제공되어 기업의 보안 환경과 요구 수준에 맞춘 유연한 구성이 가능하다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E 3.0(Genian Insights E 3.0)’을 출시했다고 19일 밝혔다.  \n  \n‘지니안 인사이츠 E 3.0’은 지니언스의 주력 솔루션인 EDR(Endpoint Detection and Response)을 기반으로, 차세대 백신(AV, Anti-Virus)과 안티랜섬웨어(A...", "full_text": "사이버 보안 전문기업 지니언스는 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E 3.0(Genian Insights E 3.0)’을 출시했다고 19일 밝혔다.  \n  \n‘지니안 인사이츠 E 3.0’은 지니언스의 주력 솔루션인 EDR(Endpoint Detection and Response)을 기반으로, 차세대 백신(AV, Anti-Virus)과 안티랜섬웨어(AR, Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 올인원(All-in-One) 단말 보안 플랫폼이다.  \n  \n이번 버전의 핵심은 지니언스가 ‘국내 EDR 1위’ 기술력으로 개발한 백신의 탑재다. 지니언스의 백신은 단순한 탐지를 넘어, EDR의 모니터링 및 분석기능과 유기적으로 연동되도록 설계됐다.  \n  \n백신으로 악성 코드를 신속 차단하는 동시에, 알려지지 않은 고도화된 위협에 대해서는 EDR이 탐지•분석•대응까지 수행하는 입체적 보안 체계를 구현한다. 백신은 사전 탐지, EDR은 사후 대응을 맡아 사고 대응 속도, 자동화 수준, 위협 가시성 모두를 향상시키는 구조다.  \n  \n지니언스의 백신은 단독으로 사용하는 경우에도, EDR의 로그 수집 및 분석 기능을 연동해 위협에 대한 포괄적인 가시성을 제공한다. 단순한 악성코드 탐지를 넘어, 침입 경로와 사고 원인 추적 정보를 가시성 있게 제공해 차별성을 뒀다. 고객들은 백신 기능만 선택해 도입하더라도 수준 높은 대응력을 확보할 수 있다.  \n  \n‘단일 콘솔 기반의 통합 운영 환경’을 제공한다는 점에서도 경쟁력을 갖췄다. 백신, EDR, 안티랜섬웨어, 매체제어 등 모든 기능을 하나의 콘솔에서 일괄 설정 및 관리할 수 있으며, 다양한 대시보드 시각화, 정밀한 위협 분석, 단말 정책 준수 여부 확인 기능 등을 통해 높은 가시성과 운영 효율성을 제공한다.  \n  \n이외에도 ▲매체제어(USB 저장장치에 대한 읽기•쓰기•사용•차단 권한 설정) ▲안티랜섬웨어(실시간 백업•탐지•대응•복원 지원) 등의 기능을 통해 보안 위협에 선제적으로 대응할 수 있다.   \n  \n기존 제품과의 시너지 효과도 기대된다. 특히 ‘지니안 NAC’를 이미 도입한 기관•기업이 이번 백신을 함께 적용하면 ▲탐지한 위협의 침입 경로와 사고 원인 추적 ▲IP 위치•플랫폼 정보 ▲사용자 정보 등을 관리 화면에서 실시간으로 간편하게 확인할 수 있다. 이를 통해 고객은 네트워크부터 엔드포인트까지 아우르는 통합 가시성과 대응력을 확보할 수 있다.  \n  \n이번 플랫폼 출시는 글로벌 보안 시장의 통합화 흐름에 대응하기 위한 전략의 일환이다. 그동안 국내 시장에서는 백신과 EDR을 개별적으로 운용해왔으나, 글로벌 트렌드는 이를 통합한 단일 플랫폼 중심으로 전환되고 있다. 실제 기업 보안 환경도 여러 보안 솔루션이 중첩 적용되며 관리 복잡성이 증가하고 있고, 이에 따라 고객들은 점점 더 통합된 보안 솔루션을 요구하고 있다.  \n  \n지니언스는 이번 백신 기능 탑재를 계기로 서버 보안 시장으로의 확장도 본격화할 방침이다. 최근 대형 보안 사고가 이어지며 단말 및 서버에 대한 통합 보안 요구가 증가하는 가운데, 지니언스는 백신 기능을 별도 옵션으로 제공하고, 합리적인 가격 정책으로 시장 저변 확대에 나설 방침이다.  \n  \n이동범 지니언스 대표는 “이번 ‘지니안 인사이츠 E 3.0’은 단순한 기능 추가를 넘어, 복잡한 보안 환경을 하나의 플랫폼에서 통합 관리할 수 있도록 한 전략적 제품”이라며 “단일 콘솔 기반의 통합 보안 운영, 백신–EDR 연계 분석, 모니터링까지 가능한 구조를 통해 고객의 보안 운영 효율성과 완성도를 동시에 높일 수 있을 것으로 기대한다”고 말했다.  \n  \n한편, 지니언스는 지난해 EDR 솔루션을 글로벌 시장에 첫 선보였으며, 이번 플랫폼 출시를 계기로 글로벌 통합 보안 시장 공략을 더욱 본격화할 방침이다.  \n  \n‘지니안 인사이츠 E 3.0’은 ▲백신 ▲EDR ▲MDR(Managed Detection and Response) 세 가지 에디션 중 선택 도입이 가능하며, 안티랜섬웨어 및 매체제어 기능도 옵션으로 제공되어 기업의 보안 환경과 요구 수준에 맞춘 유연한 구성이 가능하다.\n\n|  |\n|"}, {"title": "- 시장 지배력•기술력•성장성•수익성•재무안정성 등에서 높은 평가 - 글로벌 기업으로서의 역량 강화를 위해 인력, 자금, 컨설팅 등 지원  - 올해 첫 목표주가 제시…자본시장에서도 지니언스 ‘주목’", "date": "2025.08.08", "link": "https://www.genians.co.kr/pr-room/press/20250808", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문기업 지니언스는 한국거래소가 주관하는 ‘2025 코스닥 라이징스타’에 3년 연속 선정됐다고 8일 밝혔다.  </p>\n<p>‘코스닥 라이징스타’는 글로벌 성장 가능성과 기술혁신 역량, 재무 안정성을 두루 갖춘 코스닥 상장사를 중장기적으로 육성하기 위한 제도다. 지니언스는 2023년, 2024년에 이어 2025년에도 3년 연속 이름을 올리며, 지속적인 성장성과 자본시장 내 신뢰도를 입증했다.  </p>\n<p>지니언스는 현재 전 세계 30여 개국, 150개 이상의 고객사를 확보하고 있다. 글로벌 가구 유통기업과 나스닥 상장사를 포함해 공공•금융•의료•방산 등 다양한 산업군으로 고객 기반을 확대 중이다. 2005년 설립 이후 20년 연속 흑자를 기록하고 있으며, 연평균 매출 성장률은 23.9%에 달한다.  </p>\n<p>지니언스는 급성장하는 글로벌 사이버 보안 시장에서, 상대적으로 저평가된 한국 보안 기업 중 실적이 꾸준히 성장하는 거의 유일한 기업으로 평가 받고 있다. 사이버 보안 기업 중 처음으로 목표주가가 제시되는 등 자본시장에서도 지니언스를 주목하고 있다.  </p>\n<p>지니언스는 혁신 성장 품목인 사이버 보안 분야에서 네트워크 접근제어 솔루션 ‘지니안 NAC(Network Access Control)’를 출품해 선정됐다. 2024년 기준 국내 공공 시장 점유율 74.6%로 독보적인 1위를 기록하고 있으며, 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’에 3년 연속 등재되는 등 글로벌 경쟁력도 갖추고 있다.  </p>\n<p>지니언스의 도전은 여기서 멈추지 않는다. 지니언스는 EDR(Endpoint Detection &amp; Response)과 ZTNA(Zero Trust Network Access) 등 차세대 보안 솔루션으로 사업 포트폴리오를 확장하고 있다.   올해 상반기에는 글로벌 EDR 고객 확보에도 성공하며, NAC•ZTNA•EDR 등 핵심 3대 보안 솔루션 모두가 해외 시장에서 가시적인 성과를 거두고 있다.  </p>\n<p>지니언스의 성장세는 자본시장에서도 긍정적으로 반영되고 있다. LS증권은 2025년 사이버 보안 업계 최초로 지니언스를 커버리지하며 목표주가를 제시했다. 국내외 해킹 사고 증가, 정부 규제 강화, 민간 부문 보안 투자 확대 등을 지니언스의 성장 잠재력으로 평가했다.  </p>\n<p>지니언스는 이번 코스닥 라이징스타 선정으로 한국거래소로부터 글로벌 성장 역량 강화를 위한 인력, 자금, 컨설팅 등 전방위적인 지원을 제공받게 된다. 지니언스는 국내 시장 내 1위 지위를 더욱 공고히 하는 한편, 글로벌 보안 기업으로의 도약을 가속화할 방침이다.  </p>\n<p>이동범 지니언스 대표이사는 “3년 연속 코스닥 라이징스타 선정은 기술 중심 사이버 보안 기업으로서의 글로벌 가능성과 지속 성장성을 동시에 입증한 결과”라며 “기술 혁신과 글로벌 시장 확대를 통해 고객과 투자자, 사회로부터 신뢰받는 기업이 되겠다”고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 한국거래소가 주관하는 ‘2025 코스닥 라이징스타’에 3년 연속 선정됐다고 8일 밝혔다.  \n  \n‘코스닥 라이징스타’는 글로벌 성장 가능성과 기술혁신 역량, 재무 안정성을 두루 갖춘 코스닥 상장사를 중장기적으로 육성하기 위한 제도다. 지니언스는 2023년, 2024년에 이어 2025년에도 3년 연속 이름을 올리며, 지속적인...", "full_text": "사이버 보안 전문기업 지니언스는 한국거래소가 주관하는 ‘2025 코스닥 라이징스타’에 3년 연속 선정됐다고 8일 밝혔다.  \n  \n‘코스닥 라이징스타’는 글로벌 성장 가능성과 기술혁신 역량, 재무 안정성을 두루 갖춘 코스닥 상장사를 중장기적으로 육성하기 위한 제도다. 지니언스는 2023년, 2024년에 이어 2025년에도 3년 연속 이름을 올리며, 지속적인 성장성과 자본시장 내 신뢰도를 입증했다.  \n  \n지니언스는 현재 전 세계 30여 개국, 150개 이상의 고객사를 확보하고 있다. 글로벌 가구 유통기업과 나스닥 상장사를 포함해 공공•금융•의료•방산 등 다양한 산업군으로 고객 기반을 확대 중이다. 2005년 설립 이후 20년 연속 흑자를 기록하고 있으며, 연평균 매출 성 관계자들과 다수의 현장 미팅 및 기술 상담을 진행했으며, NAC뿐 아니라 EDR에 대한 높은 관심도 확인할 수 있었다. 현지 기관들의 요구사항을 청취하고, 실제 시장 니즈와 경쟁 벤더 도입 현황을 면밀히 파악하는 기회를 확보했다.  </p>\n<p>지니언스는 미국・중동 시장을 중심으로 글로벌 행보를 확대하고 있으며, 아태(APAC) 시장 역시 오랜 기간 공을 들여온 전략적 지역이다. 2018년 아태 진출 이후 싱가포르, 태국, 말레이시아, 인도네시아 등지에서 공공•금융•민간 등 다양한 고객층을 확보해왔으며, 태국 에너지 공공기관 77개 지사 등 다수의 고객사를 통해 기술 신뢰성과 레퍼런스를 쌓아왔다.  </p>\n<p>아태 지역 내 로드쇼, 현지 파트너사 협업, 공동 마케팅 활동도 꾸준히 전개하며 제품 접근성과 브랜드 인지도를 확장해왔다. 또한 해외사업팀을 해외사업본부로 확대 개편하고, 미국 법인과 역할을 명확히 분리해 아태, 중동, 유럽, 아프리카 등 권역별 맞춤형 시장 전략을 동시 병행하고 있다. 현재 지니언스의 글로벌 고객은 약 150개사에 달하며, 이 중 20%가 아태지역에 포진해 있다.  </p>\n<p>나세일 지니언스 해외사업본부 이사는 “최근 중동 성과가 주목받고 있으며, 아태 지역도 지니언스가 일찍부터 공들여온 핵심 시장 중 하나”라며 “이번 행사는 제품의 공급 기회를 다방면에서 확인할 수 있었던 좋은 기회로, 향후 이를 발판삼아 장기 전략 수립에 나서며 아태지역 중심 생태계를 지속 확대할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(대표 이동범, 263860)는 지난 7월 1일부터 3일까지 말레이시아 푸트라자야 국제컨벤션센터(PICC)에서 열린 ‘사이데스 2025(CYDES 2025)’를 성공적으로 마무리하며, 아태 지역 공공시장 확대를 위한 전략적 행보를 이어가고 있다고 4일 밝혔다.  \n  \n‘사이데스(CYDES)’는 말레이시아 정부 산하 국가안보위원...", "full_text": "사이버 보안 전문기업 지니언스(대표 이동범, 263860)는 지난 7월 1일부터 3일까지 말레이시아 푸트라자야 국제컨벤션센터(PICC)에서 열린 ‘사이데스 2025(CYDES 2025)’를 성공적으로 마무리하며, 아태 지역 공공시장 확대를 위한 전략적 행보를 이어가고 있다고 4일 밝혔다.  \n  \n‘사이데스(CYDES)’는 말레이시아 정부 산하 국가안보위원회(NSC, National Security Council)가 주관하는 사이버 보안 행사다. 아태지역 사이버 보안 협력의 중심 플랫폼으로 자리잡고 있으며, 사이버 보안 전략과 규정(Compliance)에 대한 논의와 트렌드를 살펴볼 수 있는 자리다.   \n  \n특히 개최지인 푸트라자야는 말레이시아 정부 기관들이 밀집한 행정 수도로, 국내의 세종시와 유사한 성격을 가진 도시다. 이번 행사에는 현지 공공기관의 IT 리더들이 대거 참석했으며, 한국 기업 중에서는 지니언스가 유일하게 참가해 주목을 받았다.  \n  \n지니언스는 이번 행사에서 ▲NAC(Network Access Control) ▲ZTNA(Zero Trust Network Access) ▲EDR(Endpoint Detection & Response) 등 주요 보안 솔루션을 선보였다. 푸트라자야 내 주요 공공기관의 IT 관계자들과 다수의 현장 미팅 및 기술 상담을 진행했으며, NAC뿐 아니라 EDR에 대한 높은 관심도 확인할 수 있었다. 현지 기관들의 요구사항을 청취하고, 실제 시장 니즈와 경쟁 벤더 도입 현황을 면밀히 파악하는 기회를 확보했다.  \n  \n지니언스는 미국・중동 시장을 중심으로 글로벌 행보를 확대하고 있으며, 아태(APAC) 시장 역시 오랜 기간 공을 들여온 전략적 지역이다. 2018년 아태 진출 이후 싱가포르, 태국, 말레이시아, 인도네시아 등지에서 공공•금융•민간 등 다양한 고객층을 확보해왔으며, 태국 에너지 공공기관 77개 지사 등 다수의 고객사를 통해 기술 신뢰성과 레퍼런스를 쌓아왔다.  \n  \n아태 지역 내 로드쇼, 현지 파트너사 협업, 공동 마케팅 활동도 꾸준히 전개하며 제품 접근성과 브랜드 인지도를 확장해왔다. 또한 해외사업팀을 해외사업본부로 확대 개편하고, 미국 법인과 역할을 명확히 분리해 아태, 중동, 유럽, 아프리카 등 권역별 맞춤형 시장 전략을 동시 병행하고 있다. 현재 지니언스의 글로벌 고객은 약 150개사에 달하며, 이 중 20%가 아태지역에 포진해 있다.  \n  \n나세일 지니언스 해외사업본부 이사는 “최근 중동 성과가 주목받고 있으며, 아태 지역도 지니언스가 일찍부터 공들여온 핵심 시장 중 하나”라며 “이번 행사는 제품의 공급 기회를 다방면에서 확인할 수 있었던 좋은 기회로, 향후 이를 발판삼아 장기 전략 수립에 나서며 아태지역 중심 생태계를 지속 확대할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- “사이버 안보는 국가 과제”…정보보호 투자와 인력 구성 투명 공개 - 보안 전문 기업으로 책임감과 선도적 자세로 자율 공시 결정 - 지속적 보안 투자•내부 점검 통해 침해사고 예방 체계 강화…버그바운티 운영 등 기술 대응도", "date": "2025.06.27", "link": "https://www.genians.co.kr/pr-room/press/20250627", "category": "기타 뉴스", "body_html": "<p>사이버 보안 전문기업 지니언스(대표 이동범, 263860)가 AI 확산과 디지털 전환 가속화로 부각된 사이버 보안의 중요성에 선제 대응하기 위해, 정보보호 공시를 자율적으로 시행한다고 27일 밝혔다.  </p>\n<p>‘정보보호 공시 제도’는 기업이 정보보호 투자 현황, 전담 인력, 보안 인증 등을 자율 또는 의무적으로 공개해 보안 수준을 외부에 투명하게 알릴 수 있도록 한 제도다. 지니언스는 의무 공시 대상 기업은 아니지만, 보안 전문 기업으로서의 책임감과 선도적 자세로 자율 공시를 결정했다. 국가 사이버 안보에 기여함과 동시에 보안 업계의 투명성 강화에 기여하겠다는 의지다.   </p>\n<p>최근 AI 기술 확산과 디지털 전환이 빠르게 진행되며, 정보보호 투자 확대 및 전문 인력 확보는 기업 경쟁력의 핵심 요소로 부상하고 있다. 특히 새 정부는 ‘국가 핵심 인프라 및 개인정보보호를 위한 사이버보안 강화’를 공약으로 제시하고, 정보보호 공시제도 강화를 주요 과제로 언급한 바 있다. 과학기술정보통신부가 국정기획위원회에 건의한 ‘정보보호제도 개선안’에 따르면, 공시 의무 대상을 기존 매출액 3,000억 원 이상 기업에서 전 상장사로 확대하는 방안도 논의됐다.  </p>\n<p>지니언스는 이번 자율 공시를 통해, 정보보호에 대한 체계적인 투자 현황과 전문 인력 구성 정보를 대외적으로 투명하게 공개했다. 전체 정보기술 부문 투자액 중 약 13%에 달하는 금액을 정보보호 부문에 투자했으며, 정보보호 전담 인력은 전체의 12%에 달한다.  </p>\n<p>다양한 정보보호 활동을 병행하며 보안 체계도 고도화하고 있다. ▲개인정보 내부관리계획 수립 ▲내부 보안 규정 및 지침 11종 제•개정 ▲한국인터넷진흥원(KISA)의 해킹메일 시나리오 기반 침해사고 대응 훈련 실시 등을 통해 전사적 보안 대응 체계를 정비하고 있다.  </p>\n<p>특히 자사 제품을 대상으로 한 버그바운티(Bug Bounty) 프로그램 운영을 통해 실제 위협 기반의 취약점 점검을 진행하고 있으며, 보안 제품의 완성도와 신뢰성을 지속적으로 강화하고 있다. 정보보호 업무 전반에 대한 내부 감사 및 직무 교육, 월간 시큐어코딩 및 취약점 점검 활동 등을 통해 침해사고 예방 역량도 체계적으로 확보해 나가고 있다.  </p>\n<p>이러한 노력으로 지니언스는 국내외에서 정보보호 역량을 공식적으로 인정받아 다양한 관련 인증도 획득했다. ▲ISO/IEC 27001:2013(국제표준 정보보호 관리체계) ▲CSAP(공공 클라우드 보안 인증) ▲CC인증(공통평가기준, 제품명: Genian ZTNA V6.0 SP1) 등을 보유하고 있다.  </p>\n<p>이동범 지니언스 대표는 “지니언스는 개발 단계에서부터 정보보호 전략 및 정책을 수립하고, 보안 문화 정착 및 대응 역량 고도화에도 힘쓰고 있다”며 “지니언스는 자율 공시를 통해 보안의 투명성과 신뢰를 높이고, 지속적인 투자로 국가 사이버 안보에 기여하겠다”고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(대표 이동범, 263860)가 AI 확산과 디지털 전환 가속화로 부각된 사이버 보안의 중요성에 선제 대응하기 위해, 정보보호 공시를 자율적으로 시행한다고 27일 밝혔다.  \n  \n‘정보보호 공시 제도’는 기업이 정보보호 투자 현황, 전담 인력, 보안 인증 등을 자율 또는 의무적으로 공개해 보안 수준을 외부에 투명하게 알릴 수 ...", "full_text": "사이버 보안 전문기업 지니언스(대표 이동범, 263860)가 AI 확산과 디지털 전환 가속화로 부각된 사이버 보안의 중요성에 선제 대응하기 위해, 정보보호 공시를 자율적으로 시행한다고 27일 밝혔다.  \n  \n‘정보보호 공시 제도’는 기업이 정보보호 투자 현황, 전담 인력, 보안 인증 등을 자율 또는 의무적으로 공개해 보안 수준을 외부에 투명하게 알릴 수 있도록 한 제도다. 지니언스는 의무 공시 대상 기업은 아니지만, 보안 전문 기업으로서의 책임감과 선도적 자세로 자율 공시를 결정했다. 국가 사이버 안보에 기여함과 동시에 보안 업계의 투명성 강화에 기여하겠다는 의지다.   \n  \n최근 AI 기술 확산과 디지털 전환이 빠르게 진행되며, 정보보호 투자 확대 및 전문 인력 확보는 기업 경쟁력의 핵심 요소로 부상하고 있다. 특히 새 정부는 ‘국가 핵심 인프라 및 개인정보보호를 위한 사이버보안 강화’를 공약으로 제시하고, 정보보호 공시제도 강화를 주요 과제로 언급한 바 있다. 과학기술정보통신부가 국정기획위원회에 건의한 ‘정보보호제도 개선안’에 따르면, 공시 의무 대상을 기존 매출액 3,000억 원 이상 기업에서 전 상장사로 확대하는 방안도 논의됐다.  \n  \n지니언스는 이번 자율 공시를 통해, 정보보호에 대한 체계적인 투자 현황과 전문 인력 구성 정보를 대외적으로 투명하게 공개했다. 전체 정보기술 부문 투자액 중 약 13%에 달하는 금액을 정보보호 부문에 투자했으며, 정보보호 전담 인력은 전체의 12%에 달한다.  \n  \n다양한 정보보호 활동을 병행하며 보안 체계도 고도화하고 있다. ▲개인정보 내부관리계획 수립 ▲내부 보안 규정 및 지침 11종 제•개정 ▲한국인터넷진흥원(KISA)의 해킹메일 시나리오 기반 침해사고 대응 훈련 실시 등을 통해 전사적 보안 대응 체계를 정비하고 있다.  \n  \n특히 자사 제품을 대상으로 한 버그바운티(Bug Bounty) 프로그램 운영을 통해 실제 위협 기반의 취약점 점검을 진행하고 있으며, 보안 제품의 완성도와 신뢰성을 지속적으로 강화하고 있다. 정보보호 업무 전반에 대한 내부 감사 및 직무 교육, 월간 시큐어코딩 및 취약점 점검 활동 등을 통해 침해사고 예방 역량도 체계적으로 확보해 나가고 있다.  \n  \n이러한 노력으로 지니언스는 국내외에서 정보보호 역량을 공식적으로 인정받아 다양한 관련 인증도 획득했다. ▲ISO/IEC 27001:2013(국제표준 정보보호 관리체계) ▲CSAP(공공 클라우드 보안 인증) ▲CC인증(공통평가기준, 제품명: Genian ZTNA V6.0 SP1) 등을 보유하고 있다.  \n  \n이동범 지니언스 대표는 “지니언스는 개발 단계에서부터 정보보호 전략 및 정책을 수립하고, 보안 문화 정착 및 대응 역량 고도화에도 힘쓰고 있다”며 “지니언스는 자율 공시를 통해 보안의 투명성과 신뢰를 높이고, 지속적인 투자로 국가 사이버 안보에 기여하겠다”고 말했다.\n\n|  |\n|"}, {"title": "- AI 시대, 고조되는 사이버 위협 속 사이버 보안 산업의 중요성 부각 - 글로벌 대비 저평가 해소 및 공정한 기업가치 형성의 마중물 역할 - 유안타증권 후원…국내외 기관투자자 대상으로 비즈니스모델, 기술력, 성장전략 소개", "date": "2025.06.19", "link": "https://www.genians.co.kr/pr-room/press/20250619", "category": "AI & Cloud", "body_html": "<p>국내 사이버 보안 기업들이 2년 연속 공동 기업설명회(IR)를 개최하며, 보안 산업의 가치 제고와 투자자와의 소통 확대에 나선다. 글로벌 보안 시장 대비 상대적으로 저평가된 현실을 극복하고 공정한 기업 가치를 형성 하겠다는 취지다.  </p>\n<p>라온시큐어, 슈프리마, 엑스게이트, 지니언스, 파수, 한싹, 헥토이노베이션, 휴네시온, SGA솔루션즈 9개사는 6월 26일(목) 여의도 앵커원에서 국내 기관 투자자 및 프라이빗뱅커(PB)를 대상으로 ‘2025 상반기 사이버 보안 콥데이(Corporate Day)’를 공동 개최한다고 19일 밝혔다.  </p>\n<p>이번 설명회에 참여하는 9개사는 사이버 보안의 최신 트렌드를 포함한 비즈니스 모델, 경쟁력, 성장전략을 국내외 기관투자자에게 직접 소개한다. 최근 해킹 이슈 등으로 사이버 보안에 대한 투자자의 관심이 증대되는 상황에서 투자자들과의 질의 응답 시간도 마련돼 실질적인 소통의 장이 될 전망이다.  </p>\n<p>전 세계적으로 사이버 위협이 고조되면서 글로벌 보안 시장은 폭발적인 성장세를 보이고 있다. 미국 등 주요국에서는 사이버 보안 기업의 기술력과 미래 성장 가치를 높이 평가하며, 기업가치도 크게 형성되는 추세다. 반면 국내 사이버 보안 기업들은 기술력과 성장 잠재력에 비해 상대적으로 낮은 시장 평가를 받아왔다.  </p>\n<p>실제로 자국의 독자적인 보안 기술을 보유한 국가는 많지 않으며, 한국의 보안 기술력은 글로벌 수준에 뒤처지지 않는다. 세계적으로 보안 시장이 성장하고 유니콘 보안 기업들이 속속 등장하고 있으나, 한국 보안 기업들은 여전히 저평가되어 있는 실정이다.  </p>\n<p>다행히 최근 보안 산업을 둘러싼 환경은 우호적으로 변화하고 있다. 국내 기업들의 보안 투자 확대와 솔루션에 대한 관심이 증가하면서, 관련 기업들의 주가도 연초 대비 상승세를 보이고 있다. 정부 역시 사이버 위협 대응 체계 강화와 종합적인 안전관리 대책 마련 등 정책적으로 산업을 뒷받침하고 있으며, 하반기에는 ‘AI 시대 사이버 보안 전략’ 발표도 예정돼 있어, 산업 전반에 긍정적 영향을 미칠 것으로 기대된다.  </p>\n<p>권명준 유안타증권 연구원은 “국내 보안 기업의 저평가 현실을 극복하고, 기업의 실제 가치와 성장 잠재력을 투자자들에게 효과적으로 전달하는 것이 이번 설명회의 목적”이라며 “투자자들이 국내 보안 기업들이 가진 기술적 역량과 미래 성장 동력을 명확히 파악하는 계기가 될 것”이라고 말했다.  </p>\n<p>보안 업계 관계자 역시 “공동 기업설명회는 보안 산업의 본질적 가치를 자본시장에 알릴 수 있는 중요한 계기”라며 “정기적인 공동 개최를 통해 산업 전반의 저변 확대와 투자 기반 마련에 기여할 수 있을 것”이라고 전했다.</p>\n<p>|  |\n|</p>", "body_text": "국내 사이버 보안 기업들이 2년 연속 공동 기업설명회(IR)를 개최하며, 보안 산업의 가치 제고와 투자자와의 소통 확대에 나선다. 글로벌 보안 시장 대비 상대적으로 저평가된 현실을 극복하고 공정한 기업 가치를 형성 하겠다는 취지다.  \n  \n라온시큐어, 슈프리마, 엑스게이트, 지니언스, 파수, 한싹, 헥토이노베이션, 휴네시온, SGA솔루션즈 9개사는 6월 ...", "full_text": "국내 사이버 보안 기업들이 2년 연속 공동 기업설명회(IR)를 개최하며, 보안 산업의 가치 제고와 투자자와의 소통 확대에 나선다. 글로벌 보안 시장 대비 상대적으로 저평가된 현실을 극복하고 공정한 기업 가치를 형성 하겠다는 취지다.  \n  \n라온시큐어, 슈프리마, 엑스게이트, 지니언스, 파수, 한싹, 헥토이노베이션, 휴네시온, SGA솔루션즈 9개사는 6월 26일(목) 여의도 앵커원에서 국내 기관 투자자 및 프라이빗뱅커(PB)를 대상으로 ‘2025 상반기 사이버 보안 콥데이(Corporate Day)’를 공동 위해 힘쓰고 있다  </p>\n<p>지니언스의 위협 분석 보고서는 실제 현장에서 포착된 다양한 위협 흐름과 특이 동향, 공격 기법 등을 바탕으로 구성된다. 실제 보안 실무 경험이 풍부한 번역 전문가가 작업을 진행해 보고서의 전달력을 높였다. 또한 지니언스는 보안 위협에 대한 인식 제고와 정보 접근성 향상을 위해, 위협 분석 보고서를 누구나 자유롭게 열람할 수 있도록 무상으로 제공한다.  </p>\n<p>이민상 지니언스 엔드포인트연구실 상무는 “보안 위협은 국경을 넘나들며 확산되고 있으며, 이에 대한 대응 역시 국경을 초월한 협력이 필요하다”며 “지니언스의 위협 분석 보고서가 글로벌 보안 전문가들에게도 의미 있는 자료가 되길 바란다”고 전했다.  </p>\n<p>한편 위협 분석 보고서 영문판은 앞으로 매월 국문판과 함께 발간되며, 지니언스 공식 홈페이지를 통해 확인 가능하다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스는 국내외 사이버 위협 분석 역량을 집대성한 영문판 ‘위협 분석 보고서(Threat Intelligence Report)’를 정식 발간하며, 글로벌 사이버 보안 시장에서의 입지를 강화한다고 12일 밝혔다.  \n  \n지니언스는 그동안 한글로 제공되던 위협 분석 보고서를 영문으로도 발간함으로써, 한국의 최신 사이버 위협 인텔리전스를...", "full_text": "사이버 보안 전문기업 지니언스는 국내외 사이버 위협 분석 역량을 집대성한 영문판 ‘위협 분석 보고서(Threat Intelligence Report)’를 정식 발간하며, 글로벌 사이버 보안 시장에서의 입지를 강화한다고 12일 밝혔다.  \n  \n지니언스는 그동안 한글로 제공되던 위협 분석 보고서를 영문으로도 발간함으로써, 한국의 최신 사이버 위협 인텔리전스를 전 세계 보안 전문가에게 보다 효과적으로 전달할 수 있게 됐다.  \n  \n이번 영문판 발간은 AI를 활용한 고도화된 공격 등 글로벌 차원의 사이버 위협에 선제적으로 대응하고, 국제 보안 커뮤니티와의 정보 공유를 확대하는 데 중요한 계기가 될 것으로 기대된다. 나아가 전 세계적인 위협을 사전에 예방하고, 국가•기업•기관의 보안 전략 수립에도 실질적인 기반이 될 전망이다.  \n  \n보고서를 작성하는 '지니언스 시큐리티 센터(Genians Security Center 이하 GSC)'는 우수한 보안 분석 및 정보 수집 능력을 보유한 전문 인력으로 구성되어 있어, 매월 발간되는 리포트는 신뢰도 높은 자료로 평가받고 있다. 더 나아가 '지니안 EDR(Endpoint Detection & Response)' 제품과의 연계를 통해, 고객에게 고도화된 제품 및 보안 서비스를 제공할 수 있는 환경을 조성하기 위해 힘쓰고 있다  \n  \n지니언스의 위협 분석 보고서는 실제 현장에서 포착된 다양한 위협 흐름과 특이 동향, 공격 기법 등을 바탕으로 구성된다. 실제 보안 실무 경험이 풍부한 번역 전문가가 작업을 진행해 보고서의 전달력을 높였다. 또한 지니언스는 보안 위협에 대한 인식 제고와 정보 접근성 향상을 위해, 위협 분석 보고서를 누구나 자유롭게 열람할 수 있도록 무상으로 제공한다.  \n  \n이민상 지니언스 엔드포인트연구실 상무는 “보안 위협은 국경을 넘나들며 확산되고 있으며, 이에 대한 대응 역시 국경을 초월한 협력이 필요하다”며 “지니언스의 위협 분석 보고서가 글로벌 보안 전문가들에게도 의미 있는 자료가 되길 바란다”고 전했다.  \n  \n한편 위협 분석 보고서 영문판은 앞으로 매월 국문판과 함께 발간되며, 지니언스 공식 홈페이지를 통해 확인 가능하다.\n\n|  |\n|"}, {"title": "- 사우디 공공기관을 EDR 글로벌 첫 고객으로 확보…중동 지역 잇단 러브콜 - 온프레미스 기반·자체 개발 강점 내세워 파트너 및 고객 저변 확대 - 중동 국책과제 공동 개발사 ‘시큐레이어’와 공동 부스 운영…현지화 전략 가속", "date": "2025.04.29", "link": "https://www.genians.co.kr/pr-room/press/20250429", "category": "EDR", "body_html": "<p>사이버 보안 전문 기업 지니언스가 중동 사이버 보안 시장 공략에 속도를 낸다.<br />\n<br />\n지니언스가 오는 5월 6일부터 5월 8일(현지 기준)까지 두바이 월드 트레이드센터(DWTC)에서 열리는 ‘GISEC Global 2025’에 참가한다고 29일 밝혔다.<br />\n<br />\nGISEC(Gulf Information Security Expo &amp; Conference, 걸프 정보 보안 전시회)은 중동 지역을 대표하는 정보보안 전시회로, 지난해에는 160여 개국에서 약 2만5천 명이 참관한 글로벌 행사다. 특히 UAE 사이버 보안 위원회(Cyber Security Council)가 직접 주관하는 행사로, 산업적·정책적 중요도가 높다.<br />\n<br />\n지니언스는 이번 전시회에서 ▲NAC(Network Access Control) ▲ZTNA(Zero Trust Network Access) ▲EDR(Endpoint Detection &amp; Response) 등 핵심 보안 솔루션 3종을 선보인다. 특히 지난해 ‘자이텍스(GITEX)’에서 중동 고객을 대상으로 처음 공개한 EDR은 올해 초 사우디아라비아 공공기관을 첫 고객으로 확보하며, 글로벌 시장 진출의 신호탄을 쏘아 올렸다.<br />\n<br />\n지니언스는 이번 전시를 기점으로 현지 파트너십 확대와 고객 저변 확장에 더욱 박차를 가할 계획이다. 중동은 빠른 경제 성장과 디지털 전환 가속화로 사이버 보안 수요가 급증하고 있으며, 한국 보안 기술에 대한 신뢰도도 높은 편이다. 현재 지니언스의 글로벌 고객 중 중동 비중은 40% 이상을 차지한다.<br />\n<br />\n또한 중동은 자체 보안 환경 구축에 대한 수요가 높은 지역이다. 지니언스의 온프레미스 기반 EDR 솔루션은 이러한 요구에 부합하는 제품으로, 클라우드 중심의 글로벌 EDR 시장에서 강력한 경쟁 요소로 작용할 전망이다.<br />\n<br />\n지니언스는 이번 전시에서 시큐레이어(대표 전주호)와 공동 부스를 운영한다. 양사는 ‘중동 맞춤형 관리형 보안 시스템 개발’을 목표로 국책 과제를 공동 수행 중이며, 이번 전시를 통해 신규 파트너 및 고객 확보에 나서는 한편, 향후 현지 특화 제품을 기반으로 시장 확대를 본격화할 계획이다.<br />\n<br />\n나세일 지니언스 해외사업본부장은 “중동은 자체 보안 인프라를 직접 구축하려는 수요가 높은 시장으로, 지니언스의 온프레미스 기반 EDR은 이러한 요구에 부합하는 솔루션”이라며 “올해 초 첫 글로벌 EDR 고객을 중동에서 확보한 데 이어, 이번 전시를 통해 파트너십을 강화하고 시장 영향력을 더욱 확대해 나갈 것”이라고 말했다.<br />\n<br />\n한편, 지니언스는 ‘중동 시장에 적합한 관리형 사이버보안 시스템 및 체계 개발’을 위한 국책과제를 수행 중이다. 지난 10월에는 UAE 두바이에 현지 사무소도 개설하며 사업 기반을 다졌다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스가 중동 사이버 보안 시장 공략에 속도를 낸다.  \n   \n지니언스가 오는 5월 6일부터 5월 8일(현지 기준)까지 두바이 월드 트레이드센터(DWTC)에서 열리는 ‘GISEC Global 2025’에 참가한다고 29일 밝혔다.  \n   \nGISEC(Gulf Information Security Expo & Conference,...", "full_text": "사이버 보안 전문 기업 지니언스가 중동 사이버 보안 시장 공략에 속도를 낸다.  \n   \n지니언스가 오는 5월 6일부터 5월 8일(현지 기준)까지 두바이 월드 트레이드센터(DWTC)에서 열리는 ‘GISEC Global 2025’에 참가한다고 29일 밝혔다.  \n   \nGISEC(Gulf Information Security Expo & Conference, 걸프 정보 보안 전시회)은 중동 지역을 대표하는 정보보안 전시회로, 지난해에는 160여 개국에서 약 2만5천 명이 참관한 글로벌 행사다. 특히 UAE 사이버 보안 위원회(Cyber Security Council)가 직접 주관하는 행사로, 산업적·정책적 중요도가 높다.  \n   \n지니언스는 이번 전시회에서 ▲NAC(Network Access Control) ▲ZTNA(Zero Trust Network Access) ▲EDR(Endpoint Detection & Response) 등 핵심 보안 솔루션 3종을 선보인다. 특히 지난해 ‘자이텍스(GITEX)’에서 중동 고객을 대상으로 처음 공개한 EDR은 올해 초 사우디아라비아 공공기관을 첫 고객으로 확보하며, 글로벌 시장 진출의 신호탄을 쏘아 올렸다.  \n   \n지니언스는 이번 전시를 기점으로 현지 파트너십 확대와 고객 저변 확장에 더욱 박차를 가할 계획이다. 중동은 빠른 경제 성장과 디지털 전환 가속화로 사이버 보안 수요가 급증하고 있으며, 한국 보안 기술에 대한 신뢰도도 높은 편이다. 현재 지니언스의 글로벌 고객 중 중동 비중은 40% 이상을 차지한다.  \n   \n또한 중동은 자체 보안 환경 구축에 대한 수요가 높은 지역이다. 지니언스의 온프레미스 기반 EDR 솔루션은 이러한 요구에 부합하는 제품으로, 클라우드 중심의 글로벌 EDR 시장에서 강력한 경쟁 요소로 작용할 전망이다.  \n   \n지니언스는 이번 전시에서 시큐레이어(대표 전주호)와 공동 부스를 운영한다. 양사는 ‘중동 맞춤형 관리형 보안 시스템 개발’을 목표로 국책 과제를 공동 수행 중이며, 이번 전시를 통해 신규 파트너 및 고객 확보에 나서는 한편, 향후 현지 특화 제품을 기반으로 시장 확대를 본격화할 계획이다.  \n   \n나세일 지니언스 해외사업본부장은 “중동은 자체 보안 인프라를 직접 구축하려는 수요가 높은 시장으로, 지니언스의 온프레미스 기반 EDR은 이러한 요구에 부합하는 솔루션”이라며 “올해 초 첫 글로벌 EDR 고객을 중동에서 확보한 데 이어, 이번 전시를 통해 파트너십을 강화하고 시장 영향력을 더욱 확대해 나갈 것”이라고 말했다.  \n   \n한편, 지니언스는 ‘중동 시장에 적합한 관리형 사이버보안 시스템 및 체계 개발’을 위한 국책과제를 수행 중이다. 지난 10월에는 UAE 두바이에 현지 사무소도 개설하며 사업 기반을 다졌다.\n\n|  |\n|"}, {"title": "- 온프레미스 기반 지니안 EDR, 자체 구축 수요 적극 대응 기대…“통합 보안 플랫폼” 방향 제시 - ‘Zero Network Changes’, ‘Zero Integration’, ‘Own Your Protection’ 핵심 메시지 제시…“네트워크 변경 없이 실질적인 보안 실현” - 글로벌 보안 벤더 협업 사례 및 고객 경험 공유…생태계 확장성과 기술 경쟁력 부각", "date": "2025.04.22", "link": "https://www.genians.co.kr/pr-room/press/20250422", "category": "EDR", "body_html": "<p>사이버 보안 전문 기업 지니언스가 오는 4월 28일부터 5월 1일(현지 기준)까지 미국 샌프란시스코 모스콘 센터에서 열리는 세계 최대 규모 사이버 보안 전시회 ‘RSA 컨퍼런스 2025(이하 RSAC 2025)’에 11년 연속으로 참가한다고 22일 밝혔다.<br />\n<br />\nRSAC는 전 세계 보안 전문가들이 한자리에 모이는 글로벌 행사로, 지난해에는 4만 1천 명이 넘는 참가자가 참석했다. 최신 기술과 트렌드를 한눈에 조망할 수 있는 ‘보안 업계의 CES’로도 불린다. 올해 주제는 ‘Many Voices. One Community(다양한 목소리, 하나의 커뮤니티)’로, 각기 다른 관점을 지닌 보안 전문가들이 협력과 혁신을 통해 하나의 공동체를 만들어가는 과정을 강조한다.<br />\n<br />\n지니언스는 이번 전시에서 ▲NAC(Network Access Control) ▲ZTNA(Zero Trust Network Access) ▲EDR(Endpoint Detection &amp; Response) 등 주요 보안 솔루션을 선보인다. 제품 시연과 함께 고객 성공 사례도 소개해, 솔루션의 실용성과 이해도를 높이는 데 집중한다. 참관객들은 네트워크, 엔드포인트 등 다양한 접점에서 어떻게 안전한 보안 환경을 구현할 수 있는지 직접 체험할 수 있다.<br />\n<br />\n특히 지난해 글로벌 시장에 첫 공개된 ‘지니안 EDR’은 온프레미스(구축형) 기반의 엔드포인트 보안 솔루션으로, 자체 보안 인프라 구축을 희망하는 기업 고객의 수요에 부합하는 경쟁력을 갖췄다. 클라우드 기반 EDR 제품이 주를 이루는 글로벌 시장에서, 온프레미스 기반이라는 차별점은 지니언스의 강력한 경쟁 요소로 작용할 전망이다.<br />\n<br />\n지니언스는 단일 기능 중심이 아닌 모듈화된 구조를 통해 엔드포인트 보안 기능을 확장하고 있으며, ‘MDR(Managed Detection and Response)’ 서비스도 제공하고 있다. 회사는 이러한 기술적 기반을 바탕으로 ‘통합 보안 플랫폼’으로 진화를 적극 추진 중이다.<br />\n<br />\n지니언스의 NAC는 네트워크에 연결된 모든 단말을 실시간으로 식별하고 제어할 수 있는 솔루션이다. 우수한 가시성과 세밀한 접근 제어 기능을 제공하며, 온프레미스·클라우드 등 다양한 환경에 유연하게 적용할 수 있다. ZTNA는 IT 및 보안 환경에 최적화된 아키텍처를 통해 정보 접근을 효과적으로 통제하며, 다양한 데이터 보안 제품들과의 원활한 연동과 협력을 지원하는 인터페이스를 제공한다. <br />\n<br />\n지니언스는 ▲Zero Network Changes ▲Zero Integration ▲Own Your Protection을 핵심 메시지로 내세운다. 네트워크 변경이나 복잡한 통합 없이도 효과적인 보안이 가능하다는 점을 강조해 고객의 도입 부담을 줄이고 실질적인 보안 가치를 전달할 계획이다.<br />\n<br />\n‘Stronger Together with’라는 테마 아래 글로벌 협력 벤더들과의 연동 사례도 함께 소개하며, 보안 생태계 확장 가능성을 부각할 계획이다. 특히 스마트 제조 환경을 위한 AI 기반 네트워크 서비스(NaaS) 기업 라멘(RAMEN Inc.)과의 파트너십 사례를 통해, AI 기술을 활용한 보안 대응 가능성에 대한 관심과 전략적 방향성도 함께 제시할 예정이다.<br />\n<br />\n김계연 지니언스 CTO·미국법인장은 “지니언스는 네트워크, 엔드포인트까지 등 다양한 영역을 아우르는 보안을 실현해 나가고 있다”며 “이번 RSAC 2025를 통해 글로벌 시장을 겨냥한 기술과 전략을 펼쳐나갈 계획”이라고 전했다.<br />\n<br />\n한편, 지니언스는 RSAC를 비롯한 다양한 글로벌 보안 전시에 참가하며 해외 시장 확대에 적극 나서고 있다. 지난해 중동 최대 IT 전시회 자이텍스에서는 EDR을 처음 선보이며 주력 제품 3가지를 모두 글로벌 무대에 올리는데 성공했다. 현재 지니언스는 주정부 기관, 금융, 의료, 방산, 항공, 유통 등 다양한 산업군에서 글로벌 고객을 확보하고 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스가 오는 4월 28일부터 5월 1일(현지 기준)까지 미국 샌프란시스코 모스콘 센터에서 열리는 세계 최대 규모 사이버 보안 전시회 ‘RSA 컨퍼런스 2025(이하 RSAC 2025)’에 11년 연속으로 참가한다고 22일 밝혔다.  \n   \nRSAC는 전 세계 보안 전문가들이 한자리에 모이는 글로벌 행사로, 지난해에는 4만 1천 ...", "full_text": "사이버 보안 전문 기업 지니언스가 오는 4월 28일부터 5월 1일(현지 기준)까지 미국 샌프란시스코 모스콘 센터에서 열리는 세계 최대 규모 사이버 보안 전시회 ‘RSA 컨퍼런스 2025(이하 RSAC 2025)’에 11년 연속으로 참가한다고 22일 밝혔다.  \n   \nRSAC는 전 세계 보안 전문가들이 한자리에 모이는 글로벌 행사로, 지난해에는 4만 1천 명이 넘는 참가자가 참석했다. 최신 기술과 트렌드를 한눈에 조망할 수 있는 ‘보안 업계의 CES’로도 불린다. 올해 주제는 ‘Many Voices. One Community(다양한 목소리, 하나의 커뮤니티)’로, 각기 다른 관점을 지닌 보안 전문가들이 협력과 혁신을 통해 하나의 공동체를 만들어가는 과정을 강조한다.  \n   \n지니언스는 이번 전시에서 ▲NAC(Network Access Control) ▲ZTNA(Zero Trust Network Access) ▲EDR(Endpoint Detection & Response) 등 주요 보안 솔루션을 선보인다. 제품 시연과 함께 고객 성공 사례도 소개해, 솔루션의 실용성과 이해도를 높이는 데 집중한다. 참관객들은 네트워크, 엔드포인트 등 다양한 접점에서 어떻게 안전한 보안 환경을 구현할 수 있는지 직접 체험할 수 있다.  \n   \n특히 지난해 글로벌 시장에 첫 공개된 ‘지니안 EDR’은 온프레미스(구축형) 기반의 엔드포인트 보안 솔루션으로, 자체 보안 인프라 구축을 희망하는 기업 고객의 수요에 부합하는 경쟁력을 갖췄다. 클라우드 기반 EDR 제품이 주를 이루는 글로벌 시장에서, 온프레미스 기반이라는 차별점은 지니언스의 강력한 경쟁 요소로 작용할 전망이다.  \n   \n지니언스는 단일 기능 중심이 아닌 모듈화된 구조를 통해 엔드포인트 보안 기능을 확장하고 있으며, ‘MDR(Managed Detection and Response)’ 서비스도 제공하고 있다. 회사는 이러한 기술적 기반을 바탕으로 ‘통합 보안 플랫폼’으로 진화를 적극 추진 중이다.  \n   \n지니언스의 NAC는 네트워크에 연결된 모든 단말을 실시간으로 식별하고 제어할 수 있는 솔루션이다. 우수한 가시성과 세밀한 접근 제어 기능을 제공하며, 온프레미스·클라우드 등 다양한 환경에 유연하게 적용할 수 있다. ZTNA는 IT 및 보안 환경에 최적화된 아키텍처를 통해 정보 접근을 효과적으로 통제하며, 다양한 데이터 보안 제품들과의 원활한 연동과 협력을 지원하는 인터페이스를 제공한다.   \n   \n지니언스는 ▲Zero Network Changes ▲Zero Integration ▲Own Your Protection을 핵심 메시지로 내세운다. 네트워크 변경이나 복잡한 통합 없이도 효과적인 보안이 가능하다는 점을 강조해 고객의 도입 부담을 줄이고 실질적인 보안 가치를 전달할 계획이다.  \n   \n‘Stronger Together with’라는 테마 아래 글로벌 협력 벤더들과의 연동 사례도 함께 소개하며, 보안 생태계 확장 가능성을 부각할 계획이다. 특히 스마트 제조 환경을 위한 AI 기반 네트워크 서비스(NaaS) 기업 라멘(RAMEN Inc.)과의 파트너십 사례를 통해, AI 기술을 활용한 보안 대응 가능성에 대한 관심과 전략적 방향성도 함께 제시할 예정이다.  \n   \n김계연 지니언스 CTO·미국법인장은 “지니언스는 네트워크, 엔드포인트까지 등 다양한 영역을 아우르는 보안을 실현해 나가고 있다”며 “이번 RSAC 2025를 통해 글로벌 시장을 겨냥한 기술과 전략을 펼쳐나갈 계획”이라고 전했다.  \n   \n한편, 지니언스는 RSAC를 비롯한 다양한 글로벌 보안 전시에 참가하며 해외 시장 확대에 적극 나서고 있다. 지난해 중동 최대 IT 전시회 자이텍스에서는 EDR을 처음 선보이며 주력 제품 3가지를 모두 글로벌 무대에 올리는데 성공했다. 현재 지니언스는 주정부 기관, 금융, 의료, 방산, 항공, 유통 등 다양한 산업군에서 글로벌 고객을 확보하고 있다.\n\n|  |\n|"}, {"title": "- 글로벌 선도 보안기업 밀집한 인도 벵갈루루에 설립, 글로벌 기술 허브 구축 완료 - 글로벌 성장 기회 포착으로 선제적 시장 대응 및 글로벌 시장 확대  - 7조 인도 사이버 보안 시장 진출 본격 추진", "date": "2025.03.25", "link": "https://www.genians.co.kr/pr-room/press/20250325", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 글로벌 성장 전략의 일환으로 인도 벵갈루루에 ‘글로벌 기술지원센터’를 개소하고 본격적인 운영에 나선다고 25일 밝혔다.  </p>\n<p>지니언스의 ‘글로벌 기술지원 센터는’ 급성장하는 글로벌 보안 시장에 선제적으로 진출하여 고객 니즈를 파악하고, 최적화된 맞춤형 서비스를 제공하여 글로벌 성장기회를 포착하고 대응하는 것이 1차적인 목표이다.   </p>\n<p>지니언스는 미국을 필두로 아태지역 및 중동을 거쳐 최근 유럽 및 아프리카까지 고객을 확보하는 등 글로벌 비즈니스에서 가시적인 성과를 내고 있다. 글로벌 파트너십 확장 및 글로벌 기술 협력 강화 등으로 글로벌 시장 경쟁력을 꾸준히 넓혀가고 있다.  </p>\n<p>글로벌 기술지원센터가 위치한 벵갈루루(Bengaluru)는 인도의 실리콘밸리로 불리며, 글로벌 보안 선도 기업인 팔로알토네트웍스, 포티넷, 시스코 등을 비롯해 수많은 글로벌 IT 기업과 스타트업, 연구시설이 밀집한 기술 혁신 허브다. 지니언스는 이곳에서 우수한 엔지니어 인재를 확보하고, 체계적인 트레이닝을 통해 전문성을 강화해 신속하고 효과적인 글로벌 기술 지원 서비스를 제공할 계획이다.  </p>\n<p>이번 인도 기술지원센터 개소를 통해 지니언스는 한국•미국•인도 3개국 기술지원센터 체계를 완성하며, 글로벌 기술 지원 체제를 완비했다. 인도 기술지원센터는 중동•유럽•아프리카 지역을 대상으로 기술 지원 허브 역할을 수행한다.  </p>\n<p>지니언스는 인도 기술지원센터 운영 경험을 바탕으로, 향후 인도 보안 시장 진출도 적극 모색할 계획이다. 인도는 급성장하는 IT 산업과 함께 사이버 보안 수요가 급증하는 시장이다. 회사는 기술 지원센터 운영을 통해 현지 고객의 요구사항을 직접 파악하며, 시장 공략 전략을 마련할 방침이다.  </p>\n<p>대한무역투자진흥공사(KOTRA)에 따르면, 인도의 사이버 보안 산업은 2024년부터 2029년까지 연평균 13% 성장해, 2029년에는 시장 규모가 53억 달러(약 7조 7,804억 원)에 이를 것으로 전망된다.  </p>\n<p>이동범 지니언스 대표이사는 “이번 글로벌 기술지원센터 개소는 지니언스의 글로벌 비즈니스 확장을 위한 중요한 전환점”이라며 “글로벌 시장에 대한 선제적 대응을 통해 새로운 시장 개척에 총력을 다할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 글로벌 성장 전략의 일환으로 인도 벵갈루루에 ‘글로벌 기술지원센터’를 개소하고 본격적인 운영에 나선다고 25일 밝혔다.  \n  \n지니언스의 ‘글로벌 기술지원 센터는’ 급성장하는 글로벌 보안 시장에 선제적으로 진출하여 고객 니즈를 파악하고, 최적화된 맞춤형 서비스를 제공하여 글로벌 성장기회를 포착하...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 글로벌 성장 전략의 일환으로 인도 벵갈루루에 ‘글로벌 기술지원센터’를 개소하고 본격적인 운영에 나선다고 25일 밝혔다.  \n  \n지니언스의 ‘글로벌 기술지원 센터는’ 급성장하는 글로벌 보안 시장에 선제적으로 진출하여 고객 니즈를 파악하고, 최적화된 맞춤형 서비스를 제공하여 글로벌 성장기회를 포착하고 대응하는 것이 1차적인 목표이다.   \n  \n지니언스는 미국을 필두로 아태지역 및 중동을 거쳐 최근 유럽 및 아프리카까지 고객을 확보하는 등 글로벌 비즈니스에서 가시적인 성과를 내고 있다. 글로벌 파트너십 확장 및 글로벌 기술 협력 강화 등으로 글로벌 시장 경쟁력을 꾸준히 넓혀가고 있다.  \n  \n글로벌 기술지원센터가 위치한 벵갈루루(Bengaluru)는 인도의 실리콘밸리로 불리며, 글로벌 보안 선도 기업인 팔로알토네트웍스, 포티넷, 시스코 등을 비롯해 수많은 글로벌 IT 기업과 스타트업, 연구시설이 밀집한 기술 혁신 허브다. 지니언스는 이곳에서 우수한 엔지니어 인재를 확보하고, 체계적인 트레이닝을 통해 전문성을 강화해 신속하고 효과적인 글로벌 기술 지원 서비스를 제공할 계획이다.  인공지능 책임자(CAIO : Chief AI Officer)를 임명하고, 미국법인에서는 AI 트랜스포메이션을 주도할 ‘프로덕트 매니저(Product Manager, PM)’를 모집한다고 밝혔다.  </p>\n<p>지니언스는 비즈니스 목표에 맞춰 AI 전략을 개발하고 제품 및 조직, 프로세스 전반을 AI로 혁신하는 ‘AI 트랜스포메이션’을 차세대 핵심 전략으로 삼았다. 차세대 AI 기술 접목으로 사이버 보안의 패러다임을 혁신하고 새로운 성장 동력을 확보하겠다는 취지다.   </p>\n<p>지니언스는 우선 최고 인공지능 책임자(CAIO) 임명을 통해 AI를 조직 전반에 내재화 시켜 비즈니스 전략과 AI 이니셔티브를 확보한다는 계획이다. 전사적인 운용 효율성 개선, 고객 경험 향상, 새로운 수익원 창출 등 AI의 가치를 더할 수 있는 기회를 파악하는 것이 포함된다.   </p>\n<p>미국법인에서는 AI 기반 보안 솔루션 혁신을 주도하고 AI 트랜스포메이션을 이끌어갈 ‘프로덕트 매니저를 모집 중에 있다. 이번에 채용하는 프로덕트 매니저는 AI 기술 전문성을 바탕으로 ▶NAC, ZTNA, EDR 제품 로드맵 개발 및 실행 ▶AI 기반 위협 탐지 및 자동 정책 적용으로 제로 트러스트 보안 강화 ▶AI 엔지니어, 소프트웨어 개발자, 보안 전문가와 협력하여 혁신적인 AI 보안 기능 개발 등이 주요 업무이다.  </p>\n<p>자격요건은 AI•데이터과학•사이버보안•클라우드 기반 SaaS에 대한 이해, 데이터 기반의 분석 및 문제 해결 능력, 파이썬(Python) 등의 기본적인 코딩 능력 등이다. 경력 있는 프로덕트 매니저뿐만 아니라 주니어 엔지니어, 인턴도 지원이 가능하다. 지니언스 미국법인 소재의 실리콘밸리에서 근무하게 되며 능력 및 상황에 따른 비자 지원도 가능하다.  </p>\n<p>전형은 서류전형과 면접전형 2단계로 진행되며 접수기간은 3월 23일(월)까지 이다. 이 기간 중 지니언스 채용 홈페이지와 이메일을 통해 지원 가능하다.<br />\n채용 후에는 지니언스의 AI 기반 보안 솔루션 혁신을 이끌어갈 핵심 인력으로 활동하게 된다. 또한, B2B SaaS 모델로의 성공적인 전환을 가속화하고 사이버 보안 분야에서 실질적인 AI 적용을 경험할 수 있게 된다.  </p>\n<p>지니언스는 창립 이래 20여 년간 지속적인 혁신을 가속화해 왔다. 네트워크 보안 솔루션인 NAC(Network Access Control)의 성공에 안주하지 않고 머신러닝(ML)과 인공지능(AI)를 활용해 엔드포인트를 보호하는 EDR(Endpoint Detection &amp; Response)를 개발했다.   </p>\n<p>차세대 보안 패러다임인 제로트러스트도 마찬가지이다. 국내에 생소한 개념이었던 2022년 선제적으로 ‘지니안 ZTNA’를 출시하며 지난해 글로벌 제로트러스트 고객 10곳을 확보함은 물론 AI 결합을 통해 강력한 보안 아키텍처 적용에 박차를 가하고 있다.   </p>\n<p>김계연 지니언스 CTO•미국법인장은 “AI의 핵심은 데이터이다. 지니언스는 지난 20년간 전 세계 3,000개 이상 고객사를 지원하며 축적한 방대한 데이터와 실전 Use Case에 AI 기술을 접목하여 사이버 보안의 새로운 지평을 열 것이다”라며 “이러한 전략적 자산을 활용해 기존 보안 솔루션의 정밀도를 높이고, AI기반 연구 역량도 대폭 확장해 나갈 것”이라고 덧붙였다.  </p>\n<p>한편, 지니언스는. 2016년 미국법인 설립, 2024년 10월 아랍에미리트 두바이에 중동 사무소를 개설했으며 인도 뱅갈루루에 글로벌 고객 지원센터의 공식 오픈을 앞두고 있다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 기업 지니언스가 인공지능(AI) 기술 내재화 및 융합을 통해 AI 기반 보안 소프트웨어 기업으로의 혁신을 본격 추진한다. 이를 위해 최고 인공지능 책임자(CAIO : Chief AI Officer)를 임명하고, 미국법인에서는 AI 트랜스포메이션을 주도할 ‘프로덕트 매니저(Product Manager, PM)’를 모집한다고 밝혔다.  \n  \n지니...", "full_text": "사이버 보안 기업 지니언스가 인공지능(AI) 기술 내재화 및 융합을 통해 AI 기반 보안 소프트웨어 기업으로의 혁신을 본격 추진한다. 이를 위해 최고 인공지능 책임자(CAIO : Chief AI Officer)를 임명하고, 미국법인에서는 AI 트랜스포메이션을 주도할 ‘프로덕트 매니저(Product Manager, PM)’를 모집한다고 밝혔다.  \n  \n지니언스는 비즈니스 목표에 맞춰 AI 전략을 개발하고 제품 및 조직, 프로세스 전반을 AI로 혁신하는 ‘AI 트랜스포메이션’을 차세대 핵심 전략으로 삼았다. 차세대 AI 기술 접목으로 사이버 보안의 패러다임을 혁신하고 새로운 성장 동력을 확보하겠다는 취지다.   \n  \n지니언스는 우선 최고 인공지능 책임자(CAIO) 임명을 통해 AI를 조직 전반에 내재화 시켜 비즈니스 전략과 AI 이니셔티브를 확보한다는 계획이다. 전사적인 운용 효율성 개선, 고객 경험 향상, 새로운 수익원 창출 등 AI의 가치를 더할 수 있는 기회를 파악하는 것이 포함된다.   \n  \n미국법인에서는 AI 기반 보안 솔루션 혁신을 주도하고 AI 트랜스포메이션을 이끌어갈 ‘프로덕트 매니저를 모집 중에 있다. 이번에 채용하는 프로덕트 매니저는 AI 기술 전문성을 바탕으로 ▶NAC, ZTNA, EDR 제품 로드맵 개발 및 실행 ▶AI 기반 위협 탐지 및 자동 정책 적용으로 제로 트러스트 보안 강화 ▶AI 엔지니어, 소프트웨어 개발자, 보안 전문가와 협력하여 혁신적인 AI 보안 기능 개발 등이 주요 업무이다.  \n  \n자격요건은 AI•데이터과학•사이버보안•클라우드 기반 SaaS에 대한 이해, 데이터 기반의 분석 및 문제 해결 능력, 파이썬(Python) 등의 기본적인 코딩 능력 등이다. 경력 있는 프로덕트 매니저뿐만 아니라 주니어 엔지니어, 인턴도 지원이 가능하다. 지니언스 미국법인 소재의 실리콘밸리에서 근무하게 되며 능력 및 상황에 따른 비자 지원도 가능하다.  \n  \n전형은 서류전형과 면접전형 2단계로 진행되며 접수기간은 3월 23일(월)까지 이다. 이 기간 중 지니언스 채용 홈페이지와 이메일을 통해 지원 가능하다.  \n채용 후에는 지니언스의 AI 기반 보안 솔루션 혁신을 이끌어갈 핵심 인력으로 활동하게 된다. 또한, B2B SaaS 모델로의 성공적인 전환을 가속화하고 사이버 보안 분야에서 실질적인 AI 적용을 경험할 수 있게 된다.  \n  \n지니언스는 창립 이래 20여 년간 지속적인 혁신을 가속화해 왔다. 네트워크 보안 솔루션인 NAC(Network Access Control)의 성공에 안주하지 않고 머신러닝(ML)과 인공지능(AI)를 활용해 엔드포인트를 보호하는 EDR(Endpoint Detection & Response)를 개발했다.   \n  \n차세대 보안 패러다임인 제로트러스트도 마찬가지이다. 국내에 생소한 개념이었던 2022년 선제적으로 ‘지니안 ZTNA’를 출시하며 지난해 글로벌 제로트러스트 고객 10곳을 확보함은 물론 AI 결합을 통해 강력한 보안 아키텍처 적용에 박차를 가하고 있다.   \n  \n김계연 지니언스 CTO•미국법인장은 “AI의 핵심은 데이터이다. 지니언스는 지난 20년간 전 세계 3,000개 이상 고객사를 지원하며 축적한 방대한 데이터와 실전 Use Case에 AI 기술을 접목하여 사이버 보안의 새로운 지평을 열 것이다”라며 “이러한 전략적 자산을 활용해 기존 보안 솔루션의 정밀도를 높이고, AI기반 연구 역량도 대폭 확장해 나갈 것”이라고 덧붙였다.  \n  \n한편, 지니언스는. 2016년 미국법인 설립, 2024년 10월 아랍에미리트 두바이에 중동 사무소를 개설했으며 인도 뱅갈루루에 글로벌 고객 지원센터의 공식 오픈을 앞두고 있다.\n\n|  |\n|"}, {"title": "- 단말 이상행위 및 랜섬웨어 탐지•대응 등 기존 백신 한계 뛰어넘어 - 보안 전담 인력이 부족한 중소기업에 최적화된 서비스 제공 - ‘국내 1위’ 지니안 EDR 기술력으로 강력한 보안 환경 제공", "date": "2025.02.27", "link": "https://www.genians.co.kr/pr-room/press/20250227", "category": "EDR", "body_html": "<p>지니언스가 ‘MDR(Managed Detection and Response)’ 서비스를 통해 SMB(중소기업) 시장을 정조준한다.  </p>\n<p>사이버 보안 기업 지니언스는 EDR(Endpoint Detection and Response) 솔루션의 운영 및 관리 효율성을 극대화한 ‘지니안 MDR’ 서비스를 출시했다고 27일 밝혔다.  </p>\n<p>최근 사이버 위협이 정교해지고 지능화되면서 보안의 중요성이 높아지고 있지만, 중소기업들은 보안 전문 인력 부족과 운영 부담으로 인해 효과적인 대응에 어려움을 겪고 있다. 지니안 MDR 서비스는 이러한 문제를 해결하여, 중소기업도 안전한 IT 환경을 구축할 수 있도록 지원한다.  </p>\n<p>‘지니안 MDR’은 지니안 EDR에 기반한 관리형 탐지 및 대응 서비스다. 단말에 대한 지속적인 모니터링과 상시 정보 수집을 통해 위협을 탐지하고, 분석/대응 등 동일한 기능을 서비스로 제공한다. 전문적인 보안 노하우와 최신 위협 인텔리전스를 기반으로 지니언스가 고객의 보안 환경을 직접 운영•관리한다.  </p>\n<p>지능형 위협 탐지 및 신속한 대응을 통해 보안 사고 발생 가능성을 최소화하고, 정밀 분석 및 맞춤형 리포트를 통해 기업의 보안 관리 효율성을 극대화한다. 클라우드 및 온프레미스(구축형) 환경을 모두 지원해 다양한 내부 보안 정책과 요구사항에도 유연하게 대응할 수 있다.  </p>\n<p>또한 보안 인력이 부족한 기업도 지니언스의 서비스를 통해 운영 부담을 줄일 수 있으며, 최신 위협 인텔리전스를 반영해 새로운 사이버 공격에도 효과적으로 대응할 수 있다. 악성코드 감염이나 침해 사고 발생 시, 사내 침투 경로나 확산 상황, 대응 결과 등을 확인할 수 있는 전문 분석 서비스도 함께 제공한다.  </p>\n<p>권진욱 지니언스 서비스사업부 이사는 “많은 기업들이 MDR 서비스 도입을 통해 보안 위협에 대한 대응력을 강화하고, 보안 운영의 효율성을 극대화할 수 있을 것”이라며 “보안 전문가 확보가 어려운 중소기업들이 추가 인력 채용 없이도 전문적인 보안 환경을 구축할 수 있도록 서비스를 지속적으로 확대해 나갈 계획”이라고 말했다.  </p>\n<p>한편, ‘지니언스 MDR’ 서비스는 우수한 보안 전문 인력으로 구성된 ‘지니언스 시큐리티 센터(Genians Security Center, 이하 GSC)’를 중심으로 운영된다. GSC는 다양한 고객 레퍼런스를 통해 수집한 최신 위협 인텔리전스를 기반으로 정교한 탐지•대응•분석 서비스를 제공하며, 기업의 보안 역량 강화를 적극 지원할 계획이다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 ‘MDR(Managed Detection and Response)’ 서비스를 통해 SMB(중소기업) 시장을 정조준한다.  \n  \n사이버 보안 기업 지니언스는 EDR(Endpoint Detection and Response) 솔루션의 운영 및 관리 효율성을 극대화한 ‘지니안 MDR’ 서비스를 출시했다고 27일 밝혔다.  \n  \n최근 사이버 위협이 ...", "full_text": "지니언스가 ‘MDR(Managed Detection and Response)’ 서비스를 통해 SMB(중소기업) 시장을 정조준한다.  \n  \n사이버 보안 기업 지니언스는 EDR(Endpoint Detection and Response) 솔루션의 운영 및 관리 효율성을 극대화한 ‘지니안 MDR’ 서비스를 출시했다고 27일 밝혔다.  \n  \n최근 사이버 위협이 정교해지고 지능화되면서 보안의 중요성이 높아지고 있지만, 중소기업들은 보안 전문 인력 부족과 운영 부담으로 인해 효과적인 대응에 어려움을 겪고 있다. 지니안 MDR 서비스는 이러한 문제를 해결하여, 중소기업도 안전한 IT 환경을 구축할 수 있도록 지원한다.  \n  \n‘지니안 MDR’은 지니안 EDR에 기반한 관리형 탐지 및 대응 서비스다. 단말에 대한 지속적인 모니터링과 상시 정보 수집을 통해 위협을 탐지하고, 분석/대응 등 동일한 기능을 서비스로 제공한다. 전문적인 보안 노하우와 최신 위협 인텔리전스를 기반으로 지니언스가 고객의 보안 환경을 직접 운영•관리한다.  \n  \n지능형 위협 탐지 및 신속한 대응을 통해 보안 사고 발생 가능성을 최소화하고, 정밀 분석 및 맞춤형 리포트를 통해 기업의 보안 관리 효율성을 극대화한다. 클라우드 및 온프레미스(구축형) 환경을 모두 지원해 다양한 내부 보안 정책과 요구사항에도 유연하게 대응할 수 있다.  \n  \n또한 보안 인력이 부족한 기업도 지니언스의 서비스를 통해 운영 부담을 줄일 수 있으며, 최신 위협 인텔리전스를 반영해 새로운 사이버 공격에도 효과적으로 대응할 수 있다. 악성코드 감염이나 침해 사고 발생 시, 사내 침투 경로나 확산 상황, 대응 결과 등을 확인할 수 있는 전문 분석 서비스도 함께 제공한다.  \n  \n권진욱 지니언스 서비스사업부 이사는 “많은 기업들이 MDR 서비스 도입을 통해 보안 위협에 대한 대응력을 강화하고, 보안 운영의 효율성을 극대화할 수 있을 것”이라며 “보안 전문가 확보가 어려운 중소기업들이 추가 인력 채용 없이도 전문적인 보안 환경을 구축할 수 있도록 서비스를 지속적으로 확대해 나갈 계획”이라고 말했다.  \n  \n한편, ‘지니언스 MDR’ 서비스는 우수한 보안 전문 인력으로 구성된 ‘지니언스 시큐리티 센터(Genians Security Center, 이하 GSC)’를 중심으로 운영된다. GSC는 다양한 고객 레퍼런스를 통해 수집한 최신 위협 인텔리전스를 기반으로 정교한 탐지•대응•분석 서비스를 제공하며, 기업의 보안 역량 강화를 적극 지원할 계획이다.\n\n|  |\n|"}, {"title": "- 2024년 연결 매출액 496억 원, 영업이익 98억 원으로 전년比 각각 15.7%, 52.2% 증가…당기순이익도 74.6% 오른 109억 원 - 20년 연속 흑자 행진…NAC·EDR·제로트러스트 3대 핵심사업 고른 성장 - 국내 넘어 글로벌 시장에서도 가시적 성과…27개국 143개 고객 확보", "date": "2025.02.19", "link": "https://www.genians.co.kr/pr-room/press/20250219", "category": "NAC", "body_html": "<p>지니언스가 지난해 사상 최대 실적을 기록하며 20년 연속 흑자에 성공했다.  </p>\n<p>사이버 보안 전문 기업 지니언스는 2024년 연결기준 영업이익 98억 원을 기록하며, 전년 대비 52.2% 성장했다고 19일 공시했다. 매출액과 당기순이익 역시 각각 15.7%, 74.6% 증가한 496억 원, 109억 원이다  </p>\n<p>NAC•EDR•제로트러스트 3대 핵심 사업 고른 성장세를 이어갔으며, 국내를 넘어 글로벌 시장에서도   27개국 143곳(누적 기준)의 고객을 확보해 가시적인 성과를 기록했다.   </p>\n<p>지니언스의 캐시카우인 NAC(Network Access Control)는 공공 부문을 넘어 대기업 등 민간 시장에서 신규 수요를 확대하며 실적 상승을 견인했다. NAC의 설치부터 운영까지 전 과정을 원스톱으로 제공하는 ‘클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)’는 중소기업 고객들로부터 높은 호응을 얻었다.   </p>\n<p>EDR(Endpoint Detection &amp; Response) 사업 역시 견조한 성장세를 보였다. 사이버 위협이 고도화됨에 따라 기업 및 기관들의 보안 강화 움직임이 활발해졌으며, 지자체•공공기관 중심으로 EDR 수요가 증가했다. 기존 금융권 및 대기업 고객들의 추가 도입도 확대됐다. 최근 지니언스의 EDR 누적 고객은 200곳을 돌파했으며, 민간과 공공 시장을 균형 있게 공략하며 안정적인 성장을 지속하고 있다.   </p>\n<p>제로트러스트 사업에서도 의미 있는 성과를 거두고 있다. 지니언스는 퓨쳐텍정보통신 인수, 제로트러스트 도입 시범 사업 등을 통해 사업 고도화를 지속해왔다. 최근에는 해외에서 제로트러스트 고객사 10곳을 확보하며 레퍼런스를 확보하는 등 관련 시장에서 입지를 더욱 확대하고 있다.  </p>\n<p>글로벌 시장에서도 가시적인 성과를 기록하고 있다. 지니언스는 지난해 중동 IT 전시회에서 EDR을 처음 선보이며, NAC•EDR•ZTNA 3대 핵심 보안 솔루션을 글로벌 무대에 성공적으로 공개했다. 또한 글로벌 시장 공략을 강화하기 위해 해외사업본부와 미국 법인의 역할을 세분화하며 조직 체계를 정비했다. 그 결과, 지니언스는 전 세계 27개국 140개 이상의 고객을 확보하는 데 성공했으며, 해외 사업 매출도 증가했다.  </p>\n<p>이동범 지니언스 대표이사는 “NAC•EDR•제로트러스트 주요 사업의 고른 성장 덕분에 지니언스가 역대 최고 실적을 기록했다”며 “국내 시장에서의 안정적인 성장과 함께 글로벌 시장에서도 점유율을 지속 확대해 연속 흑자 행진을 이어갈 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 지난해 사상 최대 실적을 기록하며 20년 연속 흑자에 성공했다.  \n  \n사이버 보안 전문 기업 지니언스는 2024년 연결기준 영업이익 98억 원을 기록하며, 전년 대비 52.2% 성장했다고 19일 공시했다. 매출액과 당기순이익 역시 각각 15.7%, 74.6% 증가한 496억 원, 109억 원이다  \n  \nNAC•EDR•제로트러스트 3대 핵심 ...", "full_text": "지니언스가 지난해 사상 최대 실적을 기록하며 20년 연속 흑자에 성공했다.  \n  \n사이버 보안 전문 기업 지니언스는 2024년 연결기준 영업이익 98억 원을 기록하며, 전년 대비 52.2% 성장했다고 19일 공시했다. 매출액과 당기순이익 역시 각각 15.7%, 74.6% 증가한 496억 원, 109억 원이다  \n  \nNAC•EDR•제로트러스트 3대 핵심 사업 고른 성장세를 이어갔으며, 국내를 넘어 글로벌 시장에서도   27개국 143곳(누적 기준)의 고객을 확보해 가시적인 성과를 기록했다.   \n  \n지니언스의 캐시카우인 NAC(Network Access Control)는 공공 부문을 넘어 대기업 등 민간 시장에서 신규 수요를 확대하며 실적 상승을 견인했다. NAC의 설치부터 운영까지 전 과정을 원스톱으로 제공하는 ‘클라우드 NAC 매니지드 서비스(Cloud NAC Managed Service)’는 중소기업 고객들로부터 높은 호응을 얻었다.   \n  \nEDR(Endpoint Detection & Response) 사업 역시 견조한 성장세를 보였다. 사이버 위협이 고도화됨에 따라 기업 및 기관들의 보안 강화 움직임이 활발해졌으며, 지자체•공공기관 중심으로 EDR 수요가 증가했다. 기존 금융권 및 대기업 고객들의 추가 도입도 확대됐다. 최근 지니언스의 EDR 누적 고객은 200곳을 돌파했으며, 민간과 공공 시장을 균형 있게 공략하며 안정적인 성장을 지속하고 있다.   \n  \n제로트러스트 사업에서도 의미 있는 성과를 거두고 있다. 지니언스는 퓨쳐텍정보통신 인수, 제로트러스트 도입 시범 사업 등을 통해 사업 고도화를 지속해왔다. 최근에는 해외에서 제로트러스트 고객사 10곳을 확보하며 레퍼런스를 확보하는 등 관련 시장에서 입지를 더욱 확대하고 있다.  \n  \n글로벌 시장에서도 가시적인 성과를 기록하고 있다. 지니언스는 지난해 중동 IT 전시회에서 EDR을 처음 선보이며, NAC•EDR•ZTNA 3대 핵심 보안 솔루션을 글로벌 무대에 성공적으로 공개했다. 또한 글로벌 시장 공략을 강화하기 위해 해외사업본부와 미국 법인의 역할을 세분화하며 조직 체계를 정비했다. 그 결과, 지니언스는 전 세계 27개국 140개 이상의 고객을 확보하는 데 성공했으며, 해외 사업 매출도 증가했다.  \n  \n이동범 지니언스 대표이사는 “NAC•EDR•제로트러스트 주요 사업의 고른 성장 덕분에 지니언스가 역대 최고 실적을 기록했다”며 “국내 시장에서의 안정적인 성장과 함께 글로벌 시장에서도 점유율을 지속 확대해 연속 흑자 행진을 이어갈 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- 중동 최대 IT 전시회서 미래 기술 및 글로벌 사이버 보안 성공 사례 공유 - 네이버클라우드와 MOU 체결…사우디 시장 공략 위한 비즈니스 협력 관계 구축  - 글로벌 고객 비중 중동 ‘최다’...중동 성공 바탕으로 유럽 및 아프리카까지 확대", "date": "2025.02.11", "link": "https://www.genians.co.kr/pr-room/press/20250211", "category": "AI & Cloud", "body_html": "<p>사이버 보안 기업 지니언스(263860, 대표 이동범)는 2025년 2월 9일부터 12일까지 사우디아라비아 리야드에서 개최되는 AI 등 미래기술 중심 글로벌 IT 전시회 ‘LEAP 2025’에 참가했다고 11일 밝혔다.  </p>\n<p>‘LEAP 2025’는 사우디아라비아 통신정보기술부(MCIT)가 주최하는 중동 최대 IT 전시회로, 올해 ‘기술의 미래(THE FUTURE OF TECH)’라는 주제로 개최됐다. 구글, IBM 등 1,800여 개의 ICT 및 테크 기업이 참가했다.  </p>\n<p>지니언스는 과학기술정보통신부와 한국정보보호산업협회(KISIA)가 운영하는 한국관에 참여해, 국내 9개 기업과 함께 각각의 부스를 운영한다. 이번 전시회에서 지니언스는 ▲지니안 ZTNA(Zero Trust Network Access) ▲ 지니안 NAC(Network Access Control) ▲지니안 EDR(Endpoint Detection &amp; Response) 총 3가지의 보안 솔루션을 선보이며, 각 제품의 성공 사례와 시연을 통해 솔루션의 강점을 효과적으로 전달할 예정이다.  </p>\n<p>지니언스는 2024년 말 기준 143개의 글로벌 고객을 확보했으며, 이중 중동 고객 비중은 40%이다. 중동 시장은 국내와 유사한 문화적 배경과 IT 시스템 관리 방식을 갖추고 있어, 한국 보안 솔루션에 대한 선호도가 높은 것으로 평가된다. 지니언스를 비롯한 한국 기업의 진출이 증가하고 있다.  </p>\n<p>특히, 지니언스는 지난해 ‘중동시장에 최적화된 관리형 사이버보안 시스템 개발’ 국책 과제를 수주했다. 현지 수요기업과 협업을 통해 NAC, ZTNA, EDR뿐만 아니라 SIEM, SOAR와 같은 유연한 솔루션을 결합하여 중동 시장에서의 포트폴리오를 지속적으로 확대하고 있다.  </p>\n<p>나세일 지니언스 해외사업본부장은 “UAE 사무소 개설 이후, IT 보안 전시회 등에 참가하며 중동 지역 고객과의 접점을 넓혀가고 있다”며 “지니언스 제품을 기반으로 현지 맞춤형 보안 솔루션을 개발 및 공급하여, 중동 시장에서의 입지를 더욱 넓히기 위해 노력할 것\"이라고 말했다.  </p>\n<p>한편, 지니언스는 이번 ‘LEAP 2025‘에서 네이버클라우드와 업무 협약(MOU)을 체결했다. 회사는 이번 협약을 통해, 사우디아라비아 공략을 목표로 ▲사우디 디지털 산업기술 및 제도 등 사업환경생태계 전반에 관한 정보교류 ▲비즈니스 네트워크 확장을 위한 정보교류 및 상호협력 ▲사우디 시장 규제 제도 준수를 위한 교류협력 등을 추진할 계획이다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 기업 지니언스(263860, 대표 이동범)는 2025년 2월 9일부터 12일까지 사우디아라비아 리야드에서 개최되는 AI 등 미래기술 중심 글로벌 IT 전시회 ‘LEAP 2025’에 참가했다고 11일 밝혔다.  \n  \n‘LEAP 2025’는 사우디아라비아 통신정보기술부(MCIT)가 주최하는 중동 최대 IT 전시회로, 올해 ‘기술의 미래(THE F...", "full_text": "사이버 보안 기업 지니언스(263860, 대표 이동범)는 2025년 2월 9일부터 12일까지 사우디아라비아 리야드에서 개최되는 AI 등 미래기술 중심 글로벌 IT 전시회 ‘LEAP 2025’에 참가했다고 11일 밝혔다.  \n  \n‘LEAP 2025’는 다. 안티 랜섬웨어 기술을 통해 신•변종 랜섬웨어에 대한 자동 탐지 및 차단, 복원 기능을 제공하며, 윈도우, 리눅스, 맥 등 다양한 OS 환경도 지원한다.  </p>\n<p>지니언스는 꾸준한 기능 업데이트와 기술 개선을 통해 EDR을 고도화해 왔으며, 이러한 노력이 200곳 이상의 고객 확보로 이어졌다고 설명했다. 최근 회사는 K-시큐리티 얼라이언스와 오픈 XDR 통합보안 플랫폼을 통해 보안 생태계를 확장하여, 더욱 고도화된 보안 제품을 개발하기 위해 협력을 강화하고 있다.  </p>\n<p>또한 지니언스는 고객의 요구를 반영한 서비스 확대에도 집중하고 있다. ‘지니언스 시큐리티 센터(Genians Security Center, 이하 GSC)’는 EDR을 통해 수집된 위협 정보를 기반으로 한 ‘위협 인텔리전스 보고서’를 제공해, 고객이 잠재적인 위협을 사전에 파악하고 대비할 수 있도록 지원한다  </p>\n<p>이동범 지니언스 대표는 “지니안 EDR은 과거 고객과 함께 발전하는 솔루션으로 평가받았고, 현재는 글로벌 고객이 먼저 찾는 솔루션이 되었다”며 “이번 200곳 돌파를 계기로 더욱 고도화되는 사이버 위협에 대응하는 진화된 솔루션을 제공하고, 글로벌 시장에서도 기술력을 인정받을 수 있도록 노력할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "사이버 보안 기업 지니언스(263860, 대표 이동범)는 ‘지니안 EDR(Endpoint Detection & Response)’의 누적 고객이 200곳을 돌파했다고 23일 밝혔다.  \n  \n지니언스는 ‘지니안 EDR'을 국내 최초로 개발한 이후, 민간과 공공 분야를 균형 있게 아우르며 성장해 왔다. 중앙부처, 지자체, 대기업 등 다양한 산업군에 제품을 공...", "full_text": "사이버 보안 기업 지니언스(263860, 대표 이동범)는 ‘지니안 EDR(Endpoint Detection & Response)’의 누적 고객이 200곳을 돌파했다고 23일 밝혔다.  \n  \n지니언스는 ‘지니안 EDR'을 국내 최초로 개발한 이후, 민간과 공공 분야를 균형 있게 아우르며 성장해 왔다. 중앙부처, 지자체, 대기업 등 다양한 산업군에 제품을 공급했으며, 최근에는 중동 및 유럽 헬스케어 그룹에 PoC(기술 검증)를 추진하며 글로벌 시장에서도 입지를 넓히고 있다.  \n  \n전 세계적으로 APT(지능형 지속 위협) 공격과 랜섬웨어 피해가 확대됨 따라 신속한 위협 탐지와 대응이 가능한 EDR 솔루션에 대한 수요가 증가하고 있다. 글로벌 시장조사 전문기관 AMR에 따르면, 전 세계 EDR 시장 규모가 2022년부터 2031년까지 연평균 25.3%씩 성장해 2031년에는 183억 달러(약 26조 3천억 원)에 이를 것으로 전망된다.  \n  \n‘지니안 EDR’은 국내외 제품 중 최초로 ‘국가정보원 보안적합성 검증제도’를 통과한 보안 솔루션으로, 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공한다. 안티 랜섬웨어 기술을 통해 신•변종 랜섬웨어에 대한 자동 탐지 및 차단, 복원 기능을 제공하며, 윈도우, 리눅스, 맥 등 다양한 OS 환경도 지원한다.  \n  \n지니언스는 꾸준한 기능 업데이트와 기술 개선을 통해 EDR을 고도화해 왔으며, 이러한 노력이 200곳 이상의 고객 확보로 이어졌다고 설명했다. 최근 회사는 K-시큐리티 얼라이언스와 오픈 XDR 통합보안 플랫폼을 통해 보안 생태계를 확장하여, 더욱 고도화된 보안 제품을 개발하기 위해 협력을 강화하고 있다.  \n  \n또한 지니언스는 고객의 요구를 반영한 서비스 확대에도 집중하고 있다. ‘지니언스 시큐리티 센터(Genians Security Center, 이하 GSC)’는 EDR을 통해 수집된 위협 정보를 기반으로 한 ‘위협 인텔리전스 보고서’를 제공해, 고객이 잠재적인 위협을 사전에 파악하고 대비할 수 있도록 지원한다  \n  \n이동범 지니언스 대표는 “지니안 EDR은 과거 고객과 함께 발전하는 솔루션으로 평가받았고, 현재는 글로벌 고객이 먼저 찾는 솔루션이 되었다”며 “이번 200곳 돌파를 계기로 더욱 고도화되는 사이버 위협에 대응하는 진화된 솔루션을 제공하고, 글로벌 시장에서도 기술력을 인정받을 수 있도록 노력할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "- 북미, 중미, 남미, 중동에서 글로벌 제로트러스트 고객 10여곳 확보 - 항공우주 및 방위산업, 금융, 정부기관, 철강, 건설 등 산업별 대표 레퍼런스 확보  - 글로벌 성공사례 기반으로 국내 제로 트러스트 시장 공략 박차", "date": "2025.01.08", "link": "https://www.genians.co.kr/pr-room/press/20250108", "category": "ZTNA", "body_html": "<p>지니언스가 글로벌 제로트러스트 시장에서 가시적인 성과를 기록하면서, 국내 시장 활성화에 적극 나서고 있다.   </p>\n<p>사이버 보안 기업 지니언스는 제로트러스트 보안 솔루션 ‘지니안 ZTNA(Zero Trust Network Access)’를 글로벌 철강기업, 미국의 금융기관, 중미 정부기관, 남미 대형 건설기업 및 금융기관, 북미 항공우주 및 방위산업기업에 잇따라 공급했다고 8일 밝혔다.  </p>\n<p>포춘 500대 기업에 속하는 ‘글로벌 철강기업’은 급변하는 업무 환경에 대응하기 위해 새로운 보안 아키텍처가 필요했으며, 지니언스를 포함해 글로벌 제로트러스트 기업과의 경쟁을 통해, 클라우드 기반의 세분화된 정책과 인증으로 보안 수준 강화에 강점이 있는 ‘지니안 ZTNA’를 선택했다.   </p>\n<p>‘미국의 크레딧 유니온(Credit Union, 신용조합)’ 역시 급변하는 IT 환경 속에서 보안 요구 사항을 충족하기 위해 지니언스의 ZTNA 솔루션 도입을 결정했다. 원격 근무 환경에서 보안 과제를 효과적으로 해결할 수 있다는 점이 솔루션 도입의 주요 요인으로 작용했다.  </p>\n<p>‘중미 국가의 한 정부기관’은 기존에 사용하던 지니언스의 NAC(Network Access Control) 솔루션을 ZTNA로 전환했다. 이 기관은 NAC를 통해 네트워크 가시성을 확보한 후, 제로트러스트 원칙에 따른 강력한 접근 제어를 실현하기 위해 ‘지니안 ZTNA’를 채택했다.  </p>\n<p>이외에도 ‘지니안 ZTNA’는 남미의 대형 건설기업, 금융기관 등 다양한 산업군에서 채택되며 고객들의 보안 수준을 고도화하고 있다. 최근에는 북미의 항공우주 및 방위산업사가 민감한 국방 데이터를 보호하기 위해 온프레미스 기반 ZTNA를 도입하기도 했다.  </p>\n<p>‘지니안 ZTNA‘는 IT와 보안 환경에 최적화된 아키텍처로, 정보 통제 기능을 강화한 제로 트러스트 솔루션이다. △원격 사용자 보안 접속 △SaaS 및 클라우드 접근 통제 △세분화된 정책(Micro Segmentation) △FIDO, Passkeys 지원으로 강화된 인증 △트래픽 및 애플리케이션 가시성 및 제어 기능 △IP 모빌리티(이동이 자유로운 지정 IP 사용) 등을 지원한다.  </p>\n<p>2021년부터 제로트러스트는 글로벌 보안 업계의 주요 화두로 떠오르며 빠르게 성장해 왔으며, 지니언스도 이러한 성장에 발맞춰 글로벌 제로트러스트 고객을 확보하는 데 성공했다. 최근 국내에서도 ‘제로트러스트 가이드라인 2.0’ 발표와 ‘실증 및 도입 시범사업’ 전개 등으로 제로트러스트 시장의 성장이 가속화되고 있으며, 글로벌 고객 확보에 성공하며 경쟁력을 입증한 지니언스가 국내 제로트러스트 시장에서 유리한 고지를 점할 것으로 전망된다.  </p>\n<p>김계연 지니언스 CTO•미국법인장은 “글로벌 시장에서의 잇따른 수주로 제로트러스트 사업이 가시적인 성과를 내고 있다”며 “다양한 산업군과 지역에서 축적한 글로벌 레퍼런스를 기반으로, 국내외 시장에서 제로트러스트 솔루션의 확산과 정착에 기여하여 선도적인 보안 기업으로 자리매김할 것”이라고 말했다.</p>\n<p>|  |\n|</p>", "body_text": "지니언스가 글로벌 제로트러스트 시장에서 가시적인 성과를 기록하면서, 국내 시장 활성화에 적극 나서고 있다.   \n  \n사이버 보안 기업 지니언스는 제로트러스트 보안 솔루션 ‘지니안 ZTNA(Zero Trust Network Access)’를 글로벌 철강기업, 미국의 금융기관, 중미 정부기관, 남미 대형 건설기업 및 금융기관, 북미 항공우주 및 방위산업기업에...", "full_text": "지니언스가 글로벌 제로트러스트 시장에서 가시적인 성과를 기록하면서, 국내 시장 활성화에 적극 나서고 있다.   \n  \n사이버 보안 기업 지니언스는 제로트러스트 보안 솔루션 ‘지니안 ZTNA(Zero Trust Network Access)’를 글로벌 철강기업, 미국의 금융기관, 중미 정부기관, 남미 대형 건설기업 및 금융기관, 북미 항공우주 및 방위산업기업에 잇따라 공급했다고 8일 밝혔다.  \n  \n포춘 500대 기업에 속하는 ‘글로벌 철강기업’은 급변하는 업무 환경에 대응하기 위해 새로운 보안 아키텍처가 필요했으며, 지니언스를 포함해 글로벌 제로트러스트 기업과의 경쟁을 통해, 클라우드 기반의 세분화된 정책과 인증으로 보안 수준 강화에 강점이 있는 ‘지니안 ZTNA’를 선택했다.   \n  \n‘미국의 크레딧 유니온(Credit Union, 신용조합)’ 역시 급변하는 IT 환경 속에서 보안 요구 사항을 충족하기 위해 지니언스의 ZTNA 솔루션 도입을 결정했다. 원격 근무 환경에서 보안 과제를 효과적으로 해결할 수 있다는 점이 솔루션 도입의 주요 요인으로 작용했다.  \n  \n‘중미 국가의 한 정부기관’은 기존에 사용하던 지니언스의 NAC(Network Access Control) 솔루션을 ZTNA로 전환했다. 이 기관은 NAC를 통해 네트워크 가시성을 확보한 후, 제로트러스트 원칙에 따른 강력한 접근 제어를 실현하기 위해 ‘지니안 ZTNA’를 채택했다.  \n  \n이외에도 ‘지니안 ZTNA’는 남미의 대형 건설기업, 금융기관 등 다양한 산업군에서 채택되며 고객들의 보안 수준을 고도화하고 있다. 최근에는 북미의 항공우주 및 방위산업사가 민감한 국방 데이터를 보호하기 위해 온프레미스 기반 ZTNA를 도입하기도 했다.  \n  \n‘지니안 ZTNA‘는 IT와 보안 환경에 최적화된 아키텍처로, 정보 통제 기능을 강화한 제로 트러스트 솔루션이다. △원격 사용자 보안 접속 △SaaS 및 클라우드 접근 통제 △세분화된 정책(Micro Segmentation) △FIDO, Passkeys 지원으로 강화된 인증 △트래픽 및 애플리케이션 가시성 및 제어 기능 △IP 모빌리티(이동이 자유로운 지정 IP 사용) 등을 지원한다.  \n  \n2021년부터 제로트러스트는 글로벌 보안 업계의 주요 화두로 떠오르며 빠르게 성장해 왔으며, 지니언스도 이러한 성장에 발맞춰 글로벌 제로트러스트 고객을 확보하는 데 성공했다. 최근 국내에서도 ‘제로트러스트 가이드라인 2.0’ 발표와 ‘실증 및 도입 시범사업’ 전개 등으로 제로트러스트 시장의 성장이 가속화되고 있으며, 글로벌 고객 확보에 성공하며 경쟁력을 입증한 지니언스가 국내 제로트러스트 시장에서 유리한 고지를 점할 것으로 전망된다.  \n  \n김계연 지니언스 CTO•미국법인장은 “글로벌 시장에서의 잇따른 수주로 제로트러스트 사업이 가시적인 성과를 내고 있다”며 “다양한 산업군과 지역에서 축적한 글로벌 레퍼런스를 기반으로, 국내외 시장에서 제로트러스트 솔루션의 확산과 정착에 기여하여 선도적인 보안 기업으로 자리매김할 것”이라고 말했다.\n\n|  |\n|"}, {"title": "NAC 등 네트워크 보안 강자로 20돌…이젠 '글로벌 보안 플랫폼' 기업으로 도약 기술력 있는 기업 인수합병도 모색…성과 내고 있는 미국·중동서 사업 가속", "date": "2025.01.07", "link": "https://www.genians.co.kr/pr-room/press/20250107", "category": "NAC", "body_html": "<p>이동범 대표님의 인터뷰가 뉴시스에 보도되었습니다.</p>\n<p>\"지난 20년 국내서 흑자를 내면서 지속적인 성장을 하는 모습을
