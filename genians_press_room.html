Blog_Media/I_E-350x260-1-3.jpg?width=350&height=260&name=I_E-350x260-1-3.jpg)"}, {"title": "지니언스, NAC 솔루션 아마존웹서비스(AWS) 마켓플레이스에 등록", "date": "2020.10.08", "link": "https://www.genians.co.kr/pr-room/press/nac-aws", "category": "NAC", "body_html": "<ul>\n<li>클라우드 기반 서비스형태로 비즈니스 유연성 및 민첩성 확보  </li>\n<li>구글, MS 애저 마켓플레이스로 확대 예정  </li>\n<li>클라우드・ IOT· 엣지 컴퓨팅 환경에서 네트워크 가시성 확보로 사이버 보안 강화</li>\n</ul>\n<p><img alt=\"NAC 솔루션 아마존웹서비스\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-NAC-on-AWS.png?width=1200&amp;height=630&amp;name=Genian-NAC-on-AWS.png\" />통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 최근 차세대 네트워크 접근 제어 솔루션 ‘ 지니안 NAC’를 아마존웹서비스(AWS) 마켓플레이스에 등록했다고 밝혔다. 이에 따라, AWS를 사용하는 고객, 파트너 및 잠재 고객은 지니언스의 NAC 솔루션을 신속하게 테스트하고 쉽게 비즈니스를 확장하여 서비스를 최적화 할 수 있다.</p>\n<p>클라우드 기반 서비스 형태로 출시된 ‘Genian NAC Policy Server On AWS’는 지니안 NAC의 정책서버를 AWS 에서 구동 하고, 네트워크단에 위치한 센서와 연결 하면 바로 설치 및 운영이 이루어진다. 최대 300개의 장치의 가시성을 파악할 수 있는 무료 버전과 엔터프라이즈 기능이 포함된 30일의 평가 라이선스가 제공된다.</p>\n<p>금번 AWS 마켓플레이스 등록은 비즈니스 환경변화와 보안의 새로운 패러다임을 적극 리드하려는 지니언스 글로벌 전략의 일환이다. 코로나 19로 인한 언택트 환경이 대두되면서 IT 인프라의 클라우드가 가속화되고 기업 IT 환경의 변화에 따른 보안의 안정성과 유연한 확장성이 그 어느 때 보다 중요해 진 것이다.</p>\n<p>지니언스는 기존 구축형, 매니지스 서비스, 클라우드 환경 등 고객의 다양한 IT환경에서도 안정적이고 효율적인 보안 운영이 가능한 솔루션과 서비스 포트폴리오를 완성했다. 이에 따라, 고객은의 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보하게 된다.</p>\n<p>김계연 지니언스 CTO/미국법인장은 “진보된 네트워크 가시성 기술, 클라우드 기반의 유연성과 확장성을 고객 스스로 경험할 수 있는 폭이 넓어졌다”며 “ AWS를 시작으로, Google, Microsoft Azure 마켓플레이스로도 확대해 나갈 것이다”고 밝혔다.</p>\n<p>이동범 지니언스 대표이사는 “2005년 NAC가 국내에 첫 소개된 이후 급변하는 IT 환경에 맞게 진화하며 고객과 함께 성장하였다”며 “이번 AWS 플랫폼 등록을 통해 차세대 NAC 시장의 리더십을 공고히 하고 다양한 보안 위협 문제로 어려움을 겪고 있는 고객, 파트너사들을 지원하면서 이 어려운 시기를 함께 이겨나가는데 총력을 다하겠다”고 덧붙였다.</p>", "body_text": "- 클라우드 기반 서비스형태로 비즈니스 유연성 및 민첩성 확보  \n - 구글, MS 애저 마켓플레이스로 확대 예정  \n - 클라우드・ IOT· 엣지 컴퓨팅 환경에서 네트워크 가시성 확보로 사이버 보안 강화\n\n![NAC 솔루션 아마존웹서비스](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-...", "full_text": "- 클라우드 기반 서비스형태로 비즈니스 유연성 및 민첩성 확보  \n - 구글, MS 애저 마켓플레이스로 확대 예정  \n - 클라우드・ IOT· 엣지 컴퓨팅 환경에서 네트워크 가시성 확보로 사이버 보안 강화\n\n![NAC 솔루션 아마존웹서비스](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-NAC-on-AWS.png?width=1200&height=630&name=Genian-NAC-on-AWS.png)통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 최근 차세대 네트워크 접근 제어 솔루션 ‘ 지니안 NAC’를 아마존웹서비스(AWS) 마켓플레이스에 등록했다고 밝혔다. 이에 따라, AWS를 사용하는 고객, 파트너 및 잠재 고객은 지니언스의 NAC 솔루션을 신속하게 테스트하고 쉽게 비즈니스를 확장하여 서비스를 최적화 할 수 있다.\n\n클라우드 기반 서비스 형태로 출시된 ‘Genian NAC Policy Server On AWS’는 지니안 NAC의 정책서버를 AWS 에서 구동 하고, 네트워크단에 위치한 센서와 연결 하면 바로 설치 및 운영이 이루어진다. 최대 300개의 장치의 가시성을 파악할 수 있는 무료 버전과 엔터프라이즈 기능이 포함된 30일의 평가 라이선스가 제공된다.\n\n금번 AWS 마켓플레이스 등록은 비즈니스 환경변화와 보안의 새로운 패러다임을 적극 리드하려는 지니언스 글로벌 전략의 일환이다. 코로나 19로 인한 언택트 환경이 대두되면서 IT 인프라의 클라우드가 가속화되고 기업 IT 환경의 변화에 따른 보안의 안정성과 유연한 확장성이 그 어느 때 보다 중요해 진 것이다.\n\n지니언스는 기존 구축형, 매니지스 서비스, 클라우드 환경 등 고객의 다양한 IT환경에서도 안정적이고 효율적인 보안 운영이 가능한 솔루션과 서비스 포트폴리오를 완성했다. 이에 따라, 고객은의 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보하게 된다.\n\n김계연 지니언스 CTO/미국법인장은 “진보된 네트워크 가시성 기술, 클라우드 기반의 유연성과 확장성을 고객 스스로 경험할 수 있는 폭이 넓어졌다”며 “ AWS를 시작으로, Google, Microsoft Azure 마켓플레이스로도 확대해 나갈 것이다”고 밝혔다.\n\n이동범 지니언스 대표이사는 “2005년 NAC가 국내에 첫 소개된 이후 급변하는 IT 환경에 맞게 진화하며 고객과 함께 성장하였다”며 “이번 AWS 플랫폼 등록을 통해 차세대 NAC 시장의 리더십을 공고히 하고 다양한 보안 위협 문제로 어려움을 겪고 있는 고객, 파트너사들을 지원하면서 이 어려운 시기를 함께 이겨나가는데 총력을 다하겠다”고 덧붙였다."}, {"title": "**- 글로벌 기술 경쟁력 재 입증…특화된 ‘단말 탐지 및 식별 기술(DPI) 각광**", "date": "2020.09.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-가트너-선정-차세대-nac-대표-기업", "category": "비즈니스 & 성과", "body_html": "<p><strong>- 국내 NAC 기업 중 유일 등재, 2018년 이후 지속적으로 대표 기업 선정</strong></p>\n<p><strong>- IoT・ OT· 클라우드・ 디지털 트랜스포메이션 가속화에 따라 NAC 재조명</strong></p>\n<p>지니언스(263860, 대표이사 이동범)가 글로벌 IT 시장 조사 및 컨설팅 기업 가트너가 발표한 ‘2020 네트워크 접근제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 지난 2018년 국내 NAC 벤더 최초 및 유일하게 선정된 후 올해에는 IoT시대 차세대 네트워크 접근제어의 대표 기업으로 다시 한번 선정됐다.</p>\n<p>가트너 보고서에 따르면 최근 NAC 도입은 제로 트러스트 네트워크 보안 전략의 일환과 NAC의 다양한 기능 보다 네트워크의 가시성에 기반한 본연의 기능이 더욱 중요하다고 밝혔다. 기업환경 변화에 따라 레거시에서 클라우드까지 이기종 네트워크 환경에서 모든 종류의 액세스 활동을 볼 수 있는 능력이 있어야 한다는 것이다.</p>\n<p>특히 이 보고서는 지니언스가 보유하고 있는 DPI (Device Platform Intelligence) 기술에 주목했다. DPI는 네트워크에 연결된 모든 IT 및 OT 기기에 대한 Contextual 정보를 제공하는 인텔리전스 기술이다. 디바이스 핑거프린팅 정보, 보안 관리 및 운영을 위한 확장정보(EOS, EOL, 제조사 정보 등), 위협(취약성) 정보를 통합적으로 제공한다. , 지니안 NAC뿐아니라 다른 보안 제품들에게 네트워크단의 고도화된 가시성 정보를 제공함으로써, 단말로부터 야기될 수 있는 위험(Risk)을 종합적으로 효과적으로 관리할 수 있다.</p>\n<p>지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 국내 NAC 시장 1위 제품으로 2019년 조달 기준으로 전체 시장의 72%를 점유하고 있을 정도로 시장 지배력이 높다.</p>\n<p>DPI와 연계를 통해 변화하는 네트워크환경에 대응 할 수 있는 보안정책 수립이 가능하다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.  고객사의 니즈에 따라, 온프레미스, 클라우드기반의 구독형 서비스, MSSP들을 위한 NAC as a Service 로 제공이 가능하다.</p>\n<p>김계연 지니언스 CTO/미국법인장은 ““지니언스가 DPI 기술을 바탕으로 네트워크 가시성에 대한 패러다임을 변화시키고 있다 해도 과언이 아니다”며 ““세계 유수의 컨설팅 기관에서 기술력을 입증 받은 만큼 국내 NAC 1등을 넘어 글로벌 시장에도 의미 있는 획을 긋겠다”는 포부를 피력했다.</p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020092208575370314\">[머니투데이] 지니언스, 가트너 '차세대 NAC 대표 기업' 선정</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/09/975883/\">[매일경제] 지니언스, 가트너 선정 <code>차세대 NAC</code> 대표 기업</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=02004086625902744&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 가트너 발표 <code>차세대 NAC</code> 대표 기업으로 선정돼</a></p>\n<p><a href=\"http://news.heraldcorp.com/view.php?ud=20200922000712\">[해럴드경제] 지니언스, 가트너 '네트워크 접근제어 마켓가이드' 대표기업 선정</a></p>\n<p><a href=\"https://www.etnews.com/20200922000005\">[전자신문] 가트너 '2020 마켓가이드' 대표 기업 선정</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=150988\">[데이터넷] 지니언스, ‘가트너 보고서’ NAC 대표 기업 선정</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020092202109931820002&amp;ref=naver\">[디지털타임스] 지니언스, 가트너 선정 <code>2020 NAC 마켓가이드</code> 대표 기업</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=113989\">[데일리시큐] 지니언스, 가트너 선정 ‘차세대 NAC’ 대표 기업…국내 넘어 해외로</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/09/22/2020092200989.html\">[IT조선] 지니언스, 가트너 NAC 대표 기업 선정</a></p>\n<p><a href=\"http://www.inews24.com/view/1301358\">[아이뉴스24] 지니언스, 가트너 네트워크 접근제어 대표 기업 선정</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=91340&amp;kind=\">[보안뉴스] 지니언스, 가트너 선정 ‘차세대 NAC’ 대표 기업</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=247944\">[디지털투데이] 지니언스, 가트너 보고서에서 차세대 NAC 대표 기업으로 선정</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=202138\">[디지털데일리] 지니언스, 가트너 선정 '차세대 NAC' 대표 기업 선정</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=43963\">[아이티비즈] 지니언스, 가트너 ‘차세대 NAC’ 대표 기업으로 선정</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=210266\">[CCTV뉴스] 가트너, 차세대 NAC 대표 기업으로 ‘지니언스’ 선정</a></p>", "body_text": "**- 국내 NAC 기업 중 유일 등재, 2018년 이후 지속적으로 대표 기업 선정**\n\n**- IoT・ OT· 클라우드・ 디지털 트랜스포메이션 가속화에 따라 NAC 재조명**\n\n지니언스(263860, 대표이사 이동범)가 글로벌 IT 시장 조사 및 컨설팅 기업 가트너가 발표한 ‘2020 네트워크 접근제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 지난...", "full_text": "**- 국내 NAC 기업 중 유일 등재, 2018년 이후 지속적으로 대표 기업 선정**\n\n**- IoT・ OT· 클라우드・ 디지털 트랜스포메이션 가속화에 따라 NAC 재조명**\n\n지니언스(263860, 대표이사 이동범)가 글로벌 IT 시장 조사 및 컨설팅 기업 가트너가 발표한 ‘2020 네트워크 접근제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 지난 2018년 국내 NAC 벤더 최초 및 유일하게 선정된 후 올해에는 IoT시대 차세대 네트워크 접근제어의 대표 기업으로 다시 한번 선정됐다.\n\n가트너 보고서에 따르면 최근 NAC 도입은 제로 트러스트 네트워크 보안 전략의 일환과 NAC의 다양한 기능 보다 네트워크의 가시성에 기반한 본연의 기능이 더욱 중요하다고 밝혔다. 기업환경 변화에 따라 레거시에서 클라우드까지 이기종 네트워크 환경에서 모든 종류의 액세스 활동을 볼 수 있는 능력이 있어야 한다는 것이다.\n\n특히 이 보고서는 지니언스가 보유하고 있는 DPI (Device Platform Intelligence) 기술에 주목했다. DPI는 네트워크에 연결된 모든 IT 및 OT 기기에 대한 Contextual 정보를 제공하는 인텔리전스 기술이다. 디바이스 핑거프린팅 정보, 보안 관리 및 운영을 위한 확장정보(EOS, EOL, 제조사 정보 등), 위협(취약성) 정보를 통합적으로 제공한다. , 지니안 NAC뿐아니라 다른 보안 제품들에게 네트워크단의 고도화된 가시성 정보를 제공함으로써, 단말로부터 야기될 수 있는 위험(Risk)을 종합적으로 효과적으로 관리할 수 있다.\n\n지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 국내 NAC 시장 1위 제품으로 2019년 조달 기준으로 전체 시장의 72%를 점유하고 있을 정도로 시장 지배력이 높다.\n\nDPI와 연계를 통해 변화하는 네트워크환경에 대응 할 수 있는 보안정책 수립이 가능하다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.  고객사의 니즈에 따라, 온프레미스, 클라우드기반의 구독형 서비스, MSSP들을 위한 NAC as a Service 로 제공이 가능하다.\n\n김계연 지니언스 CTO/미국법인장은 ““지니언스가 DPI 기술을 바탕으로 네트워크 가시성에 대한 패러다임을 변화시키고 있다 해도 과언이 아니다”며 ““세계 유수의 컨설팅 기관에서 기술력을 입증 받은 만큼 국내 NAC 1등을 넘어 글로벌 시장에도 의미 있는 획을 긋겠다”는 포부를 피력했다.\n\n[[머니투데이] 지니언스, 가트너 '차세대 NAC 대표 기업' 선정](https://news.mt.co.kr/mtview.php?no=2020092208575370314)\n\n[[매일경제] 지니언스, 가트너 선정 `차세대 NAC` 대표 기업](https://www.mk.co.kr/news/stock/view/2020/09/975883/)\n\n[[이데일리] 지니언스, 가트너 발표 `차세대 NAC` 대표 기업으로 선정돼](https://www.edaily.co.kr/news/read?newsId=02004086625902744&mediaCodeNo=257&OutLnkChk=Y)\n\n[[해럴드경제] 지니언스, 가트너 '네트워크 접근제어 마켓가이드' 대표기업 선정](http://news.heraldcorp.com/view.php?ud=20200922000712)\n\n[[전자신문] 가트너 '2020 마켓가이드' 대표 기업 선정](https://www.etnews.com/20200922000005)\n\n[[데이터넷] 지니언스, ‘가트너 보고서’ NAC 대표 기업 선정](http://www.datanet.co.kr/news/articleView.html?idxno=150988)\n\n[[디지털타임스] 지니언스, 가트너 선정 `2020 NAC 마켓가이드` 대표 기업](http://www.dt.co.kr/contents.html?article_no=2020092202109931820002&ref=naver)\n\n[[데일리시큐] 지니언스, 가트너 선정 ‘차세대 NAC’ 대표 기업…국내 넘어 해외로](https://www.dailysecu.com/news/articleView.html?idxno=113989)\n\n[[IT조선] 지니언스, 가트너 NAC 대표 기업 선정](http://it.chosun.com/site/data/html_dir/2020/09/22/2020092200989.html)\n\n[[아이뉴스24] 지니언스, 가트너 네트워크 접근제어 대표 기업 선정](http://www.inews24.com/view/1301358)\n\n[[보안뉴스] 지니언스, 가트너 선정 ‘차세대 NAC’ 대표 기업](https://www.boannews.com/media/view.asp?idx=91340&kind=)\n\n[[디지털투데이] 지니언스, 가트너 보고서에서 차세대 NAC 대표 기업으로 선정](http://www.digitaltoday.co.kr/news/articleView.html?idxno=247944)\n\n[[디지털데일리] 지니언스, 가트너 선정 '차세대 NAC' 대표 기업 선정](http://www.ddaily.co.kr/news/article/?no=202138)\n\n[[아이티비즈] 지니언스, 가트너 ‘차세대 NAC’ 대표 기업으로 선정](http://www.it-b.co.kr/news/articleView.html?idxno=43963)\n\n[[CCTV뉴스] 가트너, 차세대 NAC 대표 기업으로 ‘지니언스’ 선정](http://www.cctvnews.co.kr/news/articleView.html?idxno=210266)"}, {"title": "지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보", "date": "2020.09.11", "link": "https://www.genians.co.kr/pr-room/press/지니언스-비대면-방식으로-아태지역-5개국10여개-고", "category": "기타 뉴스", "body_html": "<p><strong>- 파트너 발굴, 수주, 기술지원까지 온라인 원스톱으로 동남아 5개국 10여개 고객 확보</strong></p>\n<p><strong>- 해외 파트너 교육 주 1회 웨비나 실시, 정부 지원 사업 적극 참여</strong></p>\n<p><strong>- 코로나 19 이휴 뉴노멀 시대 적극 리딩, 올해 최대 규모 해외 사업 수주</strong></p>\n<p>통합 보안 플랫폼 기업 지니언스(263806, 대표 이동범)가 코로나19 이후 언택트 환경에서도 아태지역 5개국, 10여개 기업(관)에 ‘지니안 NAC’를 공급했다고 밝혔다. 특히, 대만과 스리랑카는 과거 파트너 및 고객이 전무한 상태에서 비대면방식인 온라인으로 파트너를 모집하고 고객까지 확보하는 성과를 기록했다.</p>\n<p>지니언스는 코로나19 초기부터 아태지역의 전통적인 비즈니스 방식을 전면 탈피했다. 오프라인으로 이뤄지는 세미나, 출장 등을 전면 재 검토 하고 파트너 모집, 계약, 수주, 기술지원 등 업무를 온라인으로 시스템화 했다. 해외 파트너 기술교육은 주 1회 웨비나로 진행했으며 교육, 데모 시연 등 온라인 영상 콘텐츠 제작의 질을 높였다.</p>\n<p>파수, 넷앤드, 소만사 등 국내 보안 분야별 1위 기업과 함께 아태지역 파트너사 30개를 대상으로 온라인 공동 마케팅 행사인 <code>Korea No.1 Security Solutions Webinar</code>를 개최했으며 KISA 주관의 정보보안・물리보안 기업맞춤형 수출지원사업, 한국/인도네시아 온라인 비즈니스 상담회에도 적극 참가해 뉴노멀시대 대비했다. 이 결과로 지니언스는 태국 생명보험회사, 인도네시아 MRO기업 및 보험회사, 대만 기계정밀회사, 필리핀 국가 소유 전력망 공급 기업에 ‘지니안 NAC’를 공급했다.</p>\n<p>특히 필리핀 고객의 경우 한국전력공사와 유사한 기업으로 올해 아태지역의 사업 규모 중 최대이다. 이 기업은 필리핀의 전력의 생산에서 공급 등 국가 전반의 에너지 산업을 담당한다. 전력망 운영 및 유지보수, 에너지 전송 시스템 운영 및 개발에 필요한 모든 IP 단말의 관리(IPAM)를 위해 필리핀 전역에 위치한 100여개 지사(Branch)에 ‘지니안 NAC’를 구축, 운영할 계획이다.</p>\n<p>지니언스는 현지 파트너와 함께 ‘지니안 NAC’가 IPAM에서 한발 나아가 MAC과 IP뿐 아니라 사용자까지 식별, 인증, 통제가 가능한 보안성을 강점으로 사업 수주에 성공했다. 국내 1,600여개 고객사 확보, 가트너 및 프로스트 앤 설리번 보고서 등재, 안정적이면서도 체계적인 온/오프라인 기술지원 부문에서도 높은 점수를 받았다. 수주 전 과정이 온라인형태로 진행됐다.</p>\n<p>‘지니언 NAC’는 네트워크에 접속하는 사용자나 다양한 기기를 식별, 인증, 통제 함으로써 네트워크를 보호하고 위협을 통제할 수 있는 보안 제품이다. IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence) /기존 인프라의 추가 설정 없이 자동으로 신속한 설치/ 다 계층 동적 제어/  노드 그룹핑 제로 트러스트/ 타 보안 솔루션과의 연동/  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 장점이 있다.</p>\n<p>한형권 지니언스 해외사업부 이사는 “지니언스 NAC 제품의 우수성은 기본이고 해외까지 온라인으로 기술지원 하는 체계는 다른 보안벤더와 다른 차별적 강점이다”며 “언택트 환경에서도 꾸준한 성과를 낼 수 있도록 온라인 비즈니스를 한층 강화하겠다”고 밝혔다.</p>\n<p>[그림] 지니언스 NAC 솔루션 개념도  </p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%E1%84%80%E1%85%B3%E1%84%85%E1%85%B5%E1%86%B7-1-%E1%84%8C%E1%85%B5%E1%84%82%E1%85%B5%E1%84%8B%E1%85%A5%E1%86%AB%E1%84%89%E1%85%B3-NAC-%E1%84%89%E1%85%A9%E1%86%AF%E1%84%85%E1%85%AE%E1%84%89%E1%85%A7%E1%86%AB-%E1%84%80%E1%85%A2%E1%84%82%E1%85%A7%E1%86%B7%E1%84%83%E1%85%A9-3.png?width=900&amp;height=919&amp;name=%E1%84%80%E1%85%B3%E1%84%85%E1%85%B5%E1%86%B7-1-%E1%84%8C%E1%85%B5%E1%84%82%E1%85%B5%E1%84%8B%E1%85%A5%E1%86%AB%E1%84%89%E1%85%B3-NAC-%E1%84%89%E1%85%A9%E1%86%AF%E1%84%85%E1%85%AE%E1%84%89%E1%85%A7%E1%86%AB-%E1%84%80%E1%85%A2%E1%84%82%E1%85%A7%E1%86%B7%E1%84%83%E1%85%A9-3.png\" /></p>\n<p><a href=\"https://news.g-enews.com/ko-kr/news/article/news_all/2020091108155433921aef83fcde_1/article.html?md=20200911081858_R\">[글로벌이코노믹]지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"http://www.ceoscoredaily.com/news/article.html?no=73114\">[CEO스코어데일리] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=247177\">[디지털투데이] 지니언스, 비대면 마케팅으로 해외서도 보안 제품 고객 다수 확보</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=150583\">[데이터넷] 지니언스, 아태지역 10여개 기관·기업에 솔루션 공급</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=43669\">[아이티비즈] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"http://www.inews24.com/view/1298436\">[아이뉴스24] 지니언스, 아·태지역 5개국 10여개 고객에 NAC 공급</a></p>\n<p><a href=\"https://zdnet.co.kr/view/?no=20200911105200\">[지디넷] 지니언스, 5개국서 NAC 고객사 10곳 확보</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/164165\">[IT WORLD] 지니언스, 비대면 방식으로 아태지역 5개국·10여 개 고객 확보</a></p>\n<p><a href=\"http://www.ciokorea.com/news/164170\">[CIO] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"https://www.etnews.com/20200911000077\">[전자신문] 비대면 비즈니스로 아태 5개국서 고객 확보..필리핀 전력망에 NAC 구축</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=91108&amp;kind=\">[보안뉴스] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=209427\">[CCTV뉴스] 지니언스, 비대면 영업으로 아태지역 사업 확장</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=201593\">[디지털데일리] 영업활동도 비대면으로··· 지니언스, 온라인 비즈니스로 5개국 10여개 고객 확보</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020091302109931820001&amp;ref=naver\">[디지털타임스] 지니언스, 아태지역 5개국·10여개 고객 확보</a></p>\n<p><a href=\"https://byline.network/2020/09/13-101/\">[바이라인네트워크] 지니언스 “보안 제품 해외 수출도 비대면 방식으로</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=102555\">[IT DAILY] 지니언스, 비대면 방식으로 아태 5개국·10여 곳 고객 확보</a></p>", "body_text": "**- 파트너 발굴, 수주, 기술지원까지 온라인 원스톱으로 동남아 5개국 10여개 고객 확보**\n\n**- 해외 파트너 교육 주 1회 웨비나 실시, 정부 지원 사업 적극 참여**\n\n**- 코로나 19 이휴 뉴노멀 시대 적극 리딩, 올해 최대 규모 해외 사업 수주**\n\n통합 보안 플랫폼 기업 지니언스(263806, 대표 이동범)가 코로나19 이후 언택트 환경에...", "full_text": "**- 파트너 발굴, 수주, 기술지원까지 온라인 원스톱으로 동남아 5개국 10여개 고객 확보**\n\n**- 해외 파트너 교육 주 1회 웨비나 실시, 정부 지원 사업 적극 참여**\n\n**- 코로나 19 이휴 뉴노멀 시대 적극 리딩, 올해 최대 규모 해외 사업 수주**\n\n통합 보안 플랫폼 기업 지니언스(263806, 대표 이동범)가 코로나19 이후 언택트 환경에서도 아태지역 5개국, 10여개 기업(관)에 ‘지니안 NAC’를 공급했다고 밝혔다. 특히, 대만과 스리랑카는 과거 파트너 및 고객이 전무한 상태에서 비대면방식인 온라인으로 파트너를 모집하고 고객까지 확보하는 성과를 기록했다.\n\n지니언스는 코로나19 초기부터 아태지역의 전통적인 비즈니스 방식을 전면 탈피했다. 오프라인으로 이뤄지는 세미나, 출장 등을 전면 재 검토 하고 파트너 모집, 계약, 수주, 기술지원 등 업무를 온라인으로 시스템화 했다. 해외 파트너 기술교육은 주 1회 웨비나로 진행했으며 교육, 데모 시연 등 온라인 영상 콘텐츠 제작의 질을 높였다.\n\n파수, 넷앤드, 소만사 등 국내 보안 분야별 1위 기업과 함께 아태지역 파트너사 30개를 대상으로 온라인 공동 마케팅 행사인 `Korea No.1 Security Solutions Webinar`를 개최했으며 KISA 주관의 정보보안・물리보안 기업맞춤형 수출지원사업, 한국/인도네시아 온라인 비즈니스 상담회에도 적극 참가해 뉴노멀시대 대비했다. 이 결과로 지니언스는 태국 생명보험회사, 인도네시아 MRO기업 및 보험회사, 대만 기계정밀회사, 필리핀 국가 소유 전력망 공급 기업에 ‘지니안 NAC’를 공급했다.\n\n특히 필리핀 고객의 경우 한국전력공사와 유사한 기업으로 올해 아태지역의 사업 규모 중 최대이다. 이 기업은 필리핀의 전력의 생산에서 공급 등 국가 전반의 에너지 산업을 담당한다. 전력망 운영 및 유지보수, 에너지 전송 시스템 운영 및 개발에 필요한 모든 IP 단말의 관리(IPAM)를 위해 필리핀 전역에 위치한 100여개 지사(Branch)에 ‘지니안 NAC’를 구축, 운영할 계획이다.\n\n지니언스는 현지 파트너와 함께 ‘지니안 NAC’가 IPAM에서 한발 나아가 MAC과 IP뿐 아니라 사용자까지 식별, 인증, 통제가 가능한 보안성을 강점으로 사업 수주에 성공했다. 국내 1,600여개 고객사 확보, 가트너 및 프로스트 앤 설리번 보고서 등재, 안정적이면서도 체계적인 온/오프라인 기술지원 부문에서도 높은 점수를 받았다. 수주 전 과정이 온라인형태로 진행됐다.\n\n‘지니언 NAC’는 네트워크에 접속하는 사용자나 다양한 기기를 식별, 인증, 통제 함으로써 네트워크를 보호하고 위협을 통제할 수 있는 보안 제품이다. IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence) /기존 인프라의 추가 설정 없이 자동으로 신속한 설치/ 다 계층 동적 제어/  노드 그룹핑 제로 트러스트/ 타 보안 솔루션과의 연동/  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 장점이 있다.\n\n한형권 지니언스 해외사업부 이사는 “지니언스 NAC 제품의 우수성은 기본이고 해외까지 온라인으로 기술지원 하는 체계는 다른 보안벤더와 다른 차별적 강점이다”며 “언택트 환경에서도 꾸준한 성과를 낼 수 있도록 온라인 비즈니스를 한층 강화하겠다”고 밝혔다.\n\n [그림] 지니언스 NAC 솔루션 개념도  \n  \n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%E1%84%80%E1%85%B3%E1%84%85%E1%85%B5%E1%86%B7-1-%E1%84%8C%E1%85%B5%E1%84%82%E1%85%B5%E1%84%8B%E1%85%A5%E1%86%AB%E1%84%89%E1%85%B3-NAC-%E1%84%89%E1%85%A9%E1%86%AF%E1%84%85%E1%85%AE%E1%84%89%E1%85%A7%E1%86%AB-%E1%84%80%E1%85%A2%E1%84%82%E1%85%A7%E1%86%B7%E1%84%83%E1%85%A9-3.png?width=900&height=919&name=%E1%84%80%E1%85%B3%E1%84%85%E1%85%B5%E1%86%B7-1-%E1%84%8C%E1%85%B5%E1%84%82%E1%85%B5%E1%84%8B%E1%85%A5%E1%86%AB%E1%84%89%E1%85%B3-NAC-%E1%84%89%E1%85%A9%E1%86%AF%E1%84%85%E1%85%AE%E1%84%89%E1%85%A7%E1%86%AB-%E1%84%80%E1%85%A2%E1%84%82%E1%85%A7%E1%86%B7%E1%84%83%E1%85%A9-3.png)\n\n[[글로벌이코노믹]지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보](https://news.g-enews.com/ko-kr/news/article/news_all/2020091108155433921aef83fcde_1/article.html?md=20200911081858_R)\n\n[[CEO스코어데일리] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보](http://www.ceoscoredaily.com/news/article.html?no=73114)\n\n[[디지털투데이] 지니언스, 비대면 마케팅으로 해외서도 보안 제품 고객 다수 확보](http://www.digitaltoday.co.kr/news/articleView.html?idxno=247177)\n\n[[데이터넷] 지니언스, 아태지역 10여개 기관·기업에 솔루션 공급](http://www.datanet.co.kr/news/articleView.html?idxno=150583)\n\n[[아이티비즈] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보](http://www.it-b.co.kr/news/articleView.html?idxno=43669)\n\n[[아이뉴스24] 지니언스, 아·태지역 5개국 10여개 고객에 NAC 공급](http://www.inews24.com/view/1298436)\n\n[[지디넷] 지니언스, 5개국서 NAC 고객사 10곳 확보](https://zdnet.co.kr/view/?no=20200911105200)\n\n[[IT WORLD] 지니언스, 비대면 방식으로 아태지역 5개국·10여 개 고객 확보](http://www.itworld.co.kr/news/164165)\n\n[[CIO] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보](http://www.ciokorea.com/news/164170)\n\n[[전자신문] 비대면 비즈니스로 아태 5개국서 고객 확보..필리핀 전력망에 NAC 구축](https://www.etnews.com/20200911000077)\n\n[[보안뉴스] 지니언스, 비대면 방식으로 아태지역 5개국·10여개 고객 확보](https://www.boannews.com/media/view.asp?idx=91108&kind=)\n\n[[CCTV뉴스] 지니언스, 비대면 영업으로 아태지역 사업 확장](http://www.cctvnews.co.kr/news/articleView.html?idxno=209427)\n\n[[디지털데일리] 영업활동도 비대면으로··· 지니언스, 온라인 비즈니스로 5개국 10여개 고객 확보](http://www.ddaily.co.kr/news/article/?no=201593)\n\n[[디지털타임스] 지니언스, 아태지역 5개국·10여개 고객 확보](http://www.dt.co.kr/contents.html?article_no=2020091302109931820001&ref=naver)\n\n[[바이라인네트워크] 지니언스 “보안 제품 해외 수출도 비대면 방식으로](https://byline.network/2020/09/13-101/)\n\n[[IT DAILY] 지니언스, 비대면 방식으로 아태 5개국·10여 곳 고객 확보](http://www.itdaily.kr/news/articleView.html?idxno=102555)"}, {"title": "지니언스, 에스지앤과 언택트 시대 'K-사이버 방역' 비즈니스 협력", "date": "2020.08.26", "link": "https://www.genians.co.kr/pr-room/press/지니언스-에스지앤과-언택트-시대-k-사이버-방역-2", "category": "기타 뉴스", "body_html": "<p><strong>- 정보보안 진단 솔루션 / SSL VPN 상호 연동 및 공동 마케팅 진행</strong></p>\n<p><strong>- 원격 비대면 근무환경에서 강력한 보안 체계 마련</strong></p>\n<p><strong>- 향후 NAC 및 EDR까지 확대 적용</strong></p>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 언택트 환경의 보안 수준 진단 및 보안 체계 고도화 비즈니스에 적극 나서고 있다. 원격·재택근무는 외부로부터 기업 내부의 네트워크에 접속하는 특성상 사용자 인증, 네트워크 및 PC 등 단말의 보안 점검 포인트가 증가하게 된다. 따라서 보안 전문가가 내부 네트워크를 집중 관리하는 방식 보다 사용자 보안이 더욱 강조된다.</p>\n<p>그동안 지니언스는 정보보안 수준 진단 및 평가 솔루션 ‘지니안 GPI’로 PC 및 노트북 사용자의 보안수준에 대한 능동적이고 지속적인 보고/조치 체계를 제공했다. 기업 보안 의식과 수준을 향상시켜 APT, 개인정보유출사고 등 대규모 보안사고를 예방했다.</p>\n<p>‘포스트 코로나’시대 언택트 환경에서 통합된 강력한 보안 수준이 요구됨에 따라 지니언스는 에스지앤(대표 강현모)과 보안 솔루션 연동과 공동 마케팅 추진을 골자로 MOU를 체결했다. ‘지니안 GPI’와 에스지앤의 ‘SecureGuard VPN’의 연동을 통해 단말의 보안성이 확보된 경우에만 기업 내부 네트워크에 접속 할 수 있는 원격·비대면 근무 환경(or 재택근무를)을 위한 강력한 보안 솔루션을 선보이게 된다.</p>\n<p>에스지앤의 ‘SecureGuard VPN’은 원격접속자가 내부 시스템으로 접속하기 위해 안전한 보안 경로를 제공해 주는 VPN 전용 네트워크 보안 솔루션이다. 보안 기능, 인증 기능, 관리 감시 기능과 함께 관리포인트 감소, 비용 절감, 높은 보안성이 강점이다.</p>\n<p>양사는 원격 및 비대면 업무의 중요성이 커지는 기업 및 금융권의 콜센터를 1차 타깃으로 공동 영업을 추진할 계획이며 공공기관 상담 센터 등으로 비즈니스 영역을 확대한다는 방침이다. 향후 고객의 니즈를 반영하여 NAC(Network Access Control)와 EDR(Endpoint Detection &amp; Response)로의 확대 적용도 계획 중이다.</p>\n<p>NAC와 EDR은 포스트 코로나 시대에 각광 받고 있다. NAC를 통해 기업 내부 네트워크에 대한 접근을 통제하고 패치와 필수 소프트웨어의 운영 등을 강제화 하여 강력한 보안 정책 유지할 수 있다. EDR로는 백신을 뛰어 넘는 단말 보안 수준을 유지할 수 있다. 특히, 단말 가시성(Endpoint Visibility)은 재택근무시 보안을 보다 고도화 할 수 있으며 중요한 문서 데이터 의 생성 및 이동경로 등을 파악하여 유출 등을 사전에 예방하고 대응할 수 있다.</p>\n<p>이동범 지니언스 대표는 “디지털 전환 및 언택트 환경은 보안 점검 포인트를 증가시키고 특성에 따라 차별화된 보안을 요구 한다”며 “ 에스지앤과의 협력을 통해 강력한 보안을 고객에게 제공하여 사용자 입장에서는 언제, 어디서나, 안전하게 서비스를 이용할 수 있도록 정보보안의 패러다임을 변화 시키는 것이 필요하다”고 밝혔다.</p>\n<p>강현모 에스지앤 대표는 “코로나19로 인한 원격 및 비대면 업무가 증가하면서 SSL-VPN은 안전한 사내망 접속을 위한 필수 솔루션으로 자리잡았다“며 “SecureGuard VPN과 지니안 GPI의 연동을 통해 재택근무자의 안전한 사내 네트워크 접속 뿐 아니라 접속 단말의 안전성까지 보장할 수 있게 되었다” 고 밝혔다.</p>\n<p>한편, 언택트 환경에 보안의 중요성이 급 부상하면서 국내 정보보안업계간 협력이 지속적으로 이뤄지고 있다. 에스지엔과 라온시큐어는 원격 접속 시스템 구축에 공동 협력하는 제휴 관계를 체결했다. 각 사가 보유한 SSL VPN, 2차 인증솔루션을 우선적으로 공동 제안하는 것을 골자로 기술 및 마케팅 협력을 지속적으로 강화한다는 방침이다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%97%90%EC%8A%A4%EC%A7%80%EC%95%A4-mou.jpg?width=1920&amp;height=1280&amp;name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%97%90%EC%8A%A4%EC%A7%80%EC%95%A4-mou.jpg\" /></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=245648\">[디지털투데이] 지니언스, 에스지앤과 원격 근무 환경 보안 솔루션 협력</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020082602109931820002&amp;ref=naver\">[디지텉타임스] 지니언스-에스지앤, 원격 근무 환경 보안 체계 마련 MOU</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=149964\">[데이터넷] 지니언스·SGN, 재택근무 보안 솔루션 제공</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=43260\">[아이티비즈]지니언스-에스지앤, 언택트 시대 ‘K-사이버 방역’ 비즈니스 협력</a></p>\n<p><a href=\"http://www.inews24.com/view/1293627\">[아이뉴스24] 지니언스-에스지앤, 원격근무 시대 보안사업 MOU</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=90697&amp;kind=\">[보안뉴스] 지니언스, 에스지앤과 언택트 시대 ‘K-사이버 방역’ 비즈니스 협력</a></p>\n<p><a href=\"https://www.etnews.com/20200826000194\">[전자신문] 지니언스, 에스지앤과 솔루션 연동…\"원격근무 보안 강화\"</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=112764\">[데일리시큐] 지니언스-에스지앤, 보안 솔루션 연동과 공동 마케팅 추진 위한 MOU 체결</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=208358\">[CCTV뉴스] 지니언스-에스지앤, ‘K-사이버 방역’ 비즈니스 협력</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=200723\">[디지털데일리] 지니언스-에스지앤, 언택트 시대 ‘K-사이버 방역’ 비즈니스 위해 맞손</a></p>\n<p><a href=\"https://byline.network/2020/08/26-105/\">[바이라인네트워크] 지니언스, 에스지앤 SSL VPN 연동해 원격·비대면 근무환경 보안 제공</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=102424\">[아이티데일리] 지니언스, 에스지앤과 ‘K-사이버 방역’ 비즈니스 협력</a></p>", "body_text": "**- 정보보안 진단 솔루션 / SSL VPN 상호 연동 및 공동 마케팅 진행**\n\n**- 원격 비대면 근무환경에서 강력한 보안 체계 마련**\n\n**- 향후 NAC 및 EDR까지 확대 적용**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 언택트 환경의 보안 수준 진단 및 보안 체계 고도화 비즈니스에 적극 나서고 있다. 원격·재택근무는 외...", "full_text": "**- 정보보안 진단 솔루션 / SSL VPN 상호 연동 및 공동 마케팅 진행**\n\n**- 원격 비대면 근무환경에서 강력한 보안 체계 마련**\n\n**- 향후 NAC 및 EDR까지 확대 적용**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)가 언택트 환경의 보안 수준 진단 및 보안 체계 고도화 비즈니스에 적극 나서고 있다. 원격·재택근무는 외부로부터 기업 내부의 네트워크에 접속하는 특성상 사용자 인증, 네트워크 및 PC 등 단말의 보안 점검 포인트가 증가하게 된다. 따라서 보안 전문가가 내부 네트워크를 집중 관리하는 방식 보다 사용자 보안이 더욱 강조된다.\n\n그동안 지니언스는 정보보안 수준 진단 및 평가 솔루션 ‘지니안 GPI’로 PC 및 노트북 사용자의 보안수준에 대한 능동적이고 지속적인 보고/조치 체계를 제공했다. 기업 보안 의식과 수준을 향상시켜 APT, 개인정보유출사고 등 대규모 보안사고를 예방했다.\n\n‘포스트 코로나’시대 언택트 환경에서 통합된 강력한 보안 수준이 요구됨에 따라 지니언스는 에스지앤(대표 강현모)과 보안 솔루션 연동과 공동 마케팅 추진을 골자로 MOU를 체결했다. ‘지니안 GPI’와 에스지앤의 ‘SecureGuard VPN’의 연동을 통해 단말의 보안성이 확보된 경우에만 기업 내부 네트워크에 접속 할 수 있는 원격·비대면 근무 환경(or 재택근무를)을 위한 강력한 보안 솔루션을 선보이게 된다.\n\n에스지앤의 ‘SecureGuard VPN’은 원격접속자가 내부 시스템으로 접속하기 위해 안전한 보안 경로를 제공해 주는 VPN 전용 네트워크 보안 솔루션이다. 보안 기능, 인증 기능, 관리 감시 기능과 함께 관리포인트 감소, 비용 절감, 높은 보안성이 강점이다.\n\n양사는 원격 및 비대면 업무의 중요성이 커지는 기업 및 금융권의 콜센터를 1차 타깃으로 공동 영업을 추진할 계획이며 공공기관 상담 센터 등으로 비즈니스 영역을 확대한다는 방침이다. 향후 고객의 니즈를 반영하여 NAC(Network Access Control)와 EDR(Endpoint Detection & Response)로의 확대 적용도 계획 중이다.\n\nNAC와 EDR은 포스트 코로나 시대에 각광 받고 있다. NAC를 통해 기업 내부 네트워크에 대한 접근을 통제하고 패치와 필수 소프트웨어의 운영 등을 강제화 하여 강력한 보안 정책 유지할 수 있다. EDR로는 백신을 뛰어 넘는 단말 보안 수준을 유지할 수 있다. 특히, 단말 가시성(Endpoint Visibility)은 재택근무시 보안을 보다 고도화 할 수 있으며 중요한 문서 데이터 의 생성 및 이동경로 등을 파악하여 유출 등을 사전에 예방하고 대응할 수 있다.\n\n이동범 지니언스 대표는 “디지털 전환 및 언택트 환경은 보안 점검 포인트를 증가시키고 특성에 따라 차별화된 보안을 요구 한다”며 “ 에스지앤과의 협력을 통해 강력한 보안을 고객에게 제공하여 사용자 입장에서는 언제, 어디서나, 안전하게 서비스를 이용할 수 있도록 정보보안의 패러다임을 변화 시키는 것이 필요하다”고 밝혔다.\n\n강현모 에스지앤 대표는 “코로나19로 인한 원격 및 비대면 업무가 증가하면서 SSL-VPN은 안전한 사내망 접속을 위한 필수 솔루션으로 자리잡았다“며 “SecureGuard VPN과 지니안 GPI의 연동을 통해 재택근무자의 안전한 사내 네트워크 접속 뿐 아니라 접속 단말의 안전성까지 보장할 수 있게 되었다” 고 밝혔다.\n\n한편, 언택트 환경에 보안의 중요성이 급 부상하면서 국내 정보보안업계간 협력이 지속적으로 이뤄지고 있다. 에스지엔과 라온시큐어는 원격 접속 시스템 구축에 공동 협력하는 제휴 관계를 체결했다. 각 사가 보유한 SSL VPN, 2차 인증솔루션을 우선적으로 공동 제안하는 것을 골자로 기술 및 마케팅 협력을 지속적으로 강화한다는 방침이다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%97%90%EC%8A%A4%EC%A7%80%EC%95%A4-mou.jpg?width=1920&height=1280&name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%97%90%EC%8A%A4%EC%A7%80%EC%95%A4-mou.jpg)\n\n[[디지털투데이] 지니언스, 에스지앤과 원격 근무 환경 보안 솔루션 협력](http://www.digitaltoday.co.kr/news/articleView.html?idxno=245648)\n\n[[디지텉타임스] 지니언스-에스지앤, 원격 근무 환경 보안 체계 마련 MOU](http://www.dt.co.kr/contents.html?article_no=2020082602109931820002&ref=naver)\n\n[[데이터넷] 지니언스·SGN, 재택근무 보안 솔루션 제공](http://www.datanet.co.kr/news/articleView.html?idxno=149964)\n\n[[아이티비즈]지니언스-에스지앤, 언택트 시대 ‘K-사이버 방역’ 비즈니스 협력](http://www.it-b.co.kr/news/articleView.html?idxno=43260)\n\n[[아이뉴스24] 지니언스-에스지앤, 원격근무 시대 보안사업 MOU](http://www.inews24.com/view/1293627)\n\n[[보안뉴스] 지니언스, 에스지앤과 언택트 시대 ‘K-사이버 방역’ 비즈니스 협력](https://www.boannews.com/media/view.asp?idx=90697&kind=)\n\n[[전자신문] 지니언스, 에스지앤과 솔루션 연동…\"원격근무 보안 강화\"](https://www.etnews.com/20200826000194)\n\n[[데일리시큐] 지니언스-에스지앤, 보안 솔루션 연동과 공동 마케팅 추진 위한 MOU 체결](https://www.dailysecu.com/news/articleView.html?idxno=112764)\n\n[[CCTV뉴스] 지니언스-에스지앤, ‘K-사이버 방역’ 비즈니스 협력](http://www.cctvnews.co.kr/news/articleView.html?idxno=208358)\n\n[[디지털데일리] 지니언스-에스지앤, 언택트 시대 ‘K-사이버 방역’ 비즈니스 위해 맞손](http://www.ddaily.co.kr/news/article/?no=200723)\n\n[[바이라인네트워크] 지니언스, 에스지앤 SSL VPN 연동해 원격·비대면 근무환경 보안 제공](https://byline.network/2020/08/26-105/)\n\n[[아이티데일리] 지니언스, 에스지앤과 ‘K-사이버 방역’ 비즈니스 협력](http://www.itdaily.kr/news/articleView.html?idxno=102424)"}, {"title": "지니언스, 글로벌 정보보호 경영시스템 인증..SW개발에서 공급까지 공급망 보안 강화", "date": "2020.08.06", "link": "https://www.genians.co.kr/pr-room/press/지니언스-글로벌-정보보호-경영시스템-인증sw개발", "category": "비즈니스 & 성과", "body_html": "<p><strong>- 정보의 기밀성/무결성/가용성 보존, 비즈니스 신뢰도 향상</strong></p>\n<p><strong>- 조직내부 정보보호 역량 강화로 대고객 신뢰도 향상 및 경쟁력 강화</strong></p>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 IT자산 및 조직에 대한 안정성 및 신뢰성을 향상시키고 정보보호관리를 체계적이고 지속적으로 유지하기 위해 글로벌 정보보호 경영시스템(Information security management systems) ‘ISO 27001’인증을 획득했다고 밝혔다.</p>\n<p>‘ISO 27001’은 국제표준화 기구(ISO)에서 제정한 정보보호경영 시스템 국제 표준인증으로 정보 보호 분야에서 가장 권위 있는 인증 가운데 하나다. 비즈니스 목표를 달성하기 위해 조직의 정보보호관리 체계를 수립하고 지속적인 개선하는 체계적인 방법론으로 정보보호 관리 및 통제분야의 14개 영역과 114개 통제항목에 대한 엄격한 심사과정을 통과해야 한다. 이를 통해 기업은 조직 내부의 정보보호인식 제고와 정보보호 역량을 강화하게 되어 궁극적으로 대 고객 신뢰도 향상 및 기업 가치 상승의 효과를 누릴 수 있다.</p>\n<p>특히, 최근에는 불특정 다수의 사용자를 노린 공급망공격(Supply Chain Attack)에 대한 사이버 위협이 고조되고 있다. 소프트웨어나 하드웨어를 변조하는 공격형태가 대표적으로 특정 솔루션 업데이트 서버 침투, 정상 파일을 변조하여 업데이트 파일을 유포하는 위협이 IoT분야까지 확장되고 있다. 이는 더 이상 사이버 보안의 위협이 최종 사용자인 기업이나 기관에만 있는 것이 아니라 IT제품이나 서비스를 개발하는 벤더를 포함한 제조, 유통의 공급망 전 분야의 보안 강화가 절대적으로 요구된다.</p>\n<p>지니언스는 ‘ISO 27001’ 인증을 통해 공급망 공격 위협 요소를 비즈니스 초기부터 제거하고 고객에게 한 차원 높은 정보보안 체계를 제공함으로써 비즈니스 신뢰도를 높일 것으로 기대하고 있다. 지니언스의 NAC, EDR 솔루션을 도입하는 기업이나 기관이 다양한 엔드포인트와 각종 애플리케이션 및 업데이트가 수시로 배포되는 과정에 발생할 수 있는 사이버 위협을 제조단에서 원천적으로 봉쇄할 수 있는 기틀을 마련했다는 평을 듣고 있다.</p>\n<p>사실상 공급망 공격의 위협은 화두가 되고 있지만 이 위협을 제거하기 위한 노력은 다소 부진하다. 주요 기관에 SW 공급한 기업이나 협력사 해킹을 통해 사용자가 피해를 보는 사례가 증가했지만 보안 위협에 대한 대응은 미온적이었다. 이에 따라, 제품이나 서비스를 제공하는 모든 업체들이 안전하게 관리하지 않으면 제조 단계에서 해킹 프로그램이나 스파이칩을 넣을 가능성은 언제 열려있다.</p>\n<p>지니언스 이동범 대표는 “지난 20여년간 국내에 발생한 대형 사이버 테러는 SW공급망 공격 이었다”며 “지니언스의 글로벌 정보보호경영인증은 지니언스 내부의 정보보호 체계가 최종 사용자의 공급망까지 자연스레 스며들어 다양한 사이버 위협을 원천적으로 제거할 수 있는 기틀을 마련했다”는 점에서 1차적인 의의가 있다고 밝혔다. 또한, 그는 “정보보호관리체계의 고도화로 대 고객 신뢰도 향상 및 경쟁력 강화를 통해 통합 보안 플랫폼 업체로의 위상을 더욱 강화하겠다고” 덧붙였다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EA%B5%AD%EC%A0%9C-%ED%91%9C%EC%A4%80-%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8-%EC%9D%B8%EC%A6%9D-ISO-27001%EC%9D%84-%EC%B7%A8%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.jpg?width=980&amp;height=773&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EA%B5%AD%EC%A0%9C-%ED%91%9C%EC%A4%80-%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8-%EC%9D%B8%EC%A6%9D-ISO-27001%EC%9D%84-%EC%B7%A8%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.jpg\" /></p>\n<p><a href=\"http://www.newspim.com/news/view/20200806000088\">[뉴스핌] 지니언스, 글로벌 정보보호경영시스템 'ISO 27001' 인증 획득</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020080609205850230\">[머니투데이] 지니언스, 글로벌정보보호 경영시스템 ISO 인증 획득</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/08/806526/\">[매일경제] 지니언스, 글로벌 정보보호 경영시스템 인증 획득</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=03230806625864696&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 글로벌 정보보호 경영시스템 인증 획득</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=243891\">[디지털투데이] 지니언스, 글로벌 정보보호 경영시스템 인증 획득</a></p>\n<p><a href=\"http://www.inews24.com/view/1288245\">[아이뉴스24] 지니언스, 정보보호 경영시스템 'ISO 27001' 인증 획득</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=42798\">[아이티비즈] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO 27001’인증 획득</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020080602109931820003&amp;ref=naver\">[디지털타임스] 지니언스, 글로벌 정보보호경영시스템 인증…공급망 보안 강화</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=149252\">[데이터넷] 지니언스, ISO 27001 인증 획득</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=102235\">[ITDAILY] 지니언스, 글로벌 정보보호 경영시스템 인증</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=199674\">[디지털데일리] 지니언스, 글로벌 정보보호 경영시스템 인증··· 공급망 보안 강화</a></p>\n<p><a href=\"https://zdnet.co.kr/view/?no=20200806111504\">[지디넷] 지니언스, 글로벌 정보보호 경영시스템 인증 획득</a></p>\n<p><a href=\"https://www.etnews.com/20200806000169\">[전자신문] 지니언스, ISO 27001 인증 획득…\"공급망 보안 강화\"</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=112120\">[데일리시큐] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO 27001’ 인증 획득</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=207266\">[CCTV뉴스] 지니언스, 글로벌 정보보호경영시스템 인증 획득</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=90316&amp;kind=\">[보안뉴스] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO27001’ 획득</a></p>", "body_text": "**- 정보의 기밀성/무결성/가용성 보존, 비즈니스 신뢰도 향상**\n\n**- 조직내부 정보보호 역량 강화로 대고객 신뢰도 향상 및 경쟁력 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 IT자산 및 조직에 대한 안정성 및 신뢰성을 향상시키고 정보보호관리를 체계적이고 지속적으로 유지하기 위해 글로벌 정보보호 경영시스템(Inform...", "full_text": "**- 정보의 기밀성/무결성/가용성 보존, 비즈니스 신뢰도 향상**\n\n**- 조직내부 정보보호 역량 강화로 대고객 신뢰도 향상 및 경쟁력 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)는 IT자산 및 조직에 대한 안정성 및 신뢰성을 향상시키고 정보보호관리를 체계적이고 지속적으로 유지하기 위해 글로벌 정보보호 경영시스템(Information security management systems) ‘ISO 27001’인증을 획득했다고 밝혔다.\n\n‘ISO 27001’은 국제표준화 기구(ISO)에서 제정한 정보보호경영 시스템 국제 표준인증으로 정보 보호 분야에서 가장 권위 있는 인증 가운데 하나다. 비즈니스 목표를 달성하기 위해 조직의 정보보호관리 체계를 수립하고 지속적인 개선하는 체계적인 방법론으로 정보보호 관리 및 통제분야의 14개 영역과 114개 통제항목에 대한 엄격한 심사과정을 통과해야 한다. 이를 통해 기업은 조직 내부의 정보보호인식 제고와 정보보호 역량을 강화하게 되어 궁극적으로 대 고객 신뢰도 향상 및 기업 가치 상승의 효과를 누릴 수 있다.\n\n특히, 최근에는 불특정 다수의 사용자를 노린 공급망공격(Supply Chain Attack)에 대한 사이버 위협이 고조되고 있다. 소프트웨어나 하드웨어를 변조하는 공격형태가 대표적으로 특정 솔루션 업데이트 서버 침투, 정상 파일을 변조하여 업데이트 파일을 유포하는 위협이 IoT분야까지 확장되고 있다. 이는 더 이상 사이버 보안의 위협이 최종 사용자인 기업이나 기관에만 있는 것이 아니라 IT제품이나 서비스를 개발하는 벤더를 포함한 제조, 유통의 공급망 전 분야의 보안 강화가 절대적으로 요구된다.\n\n지니언스는 ‘ISO 27001’ 인증을 통해 공급망 공격 위협 요소를 비즈니스 초기부터 제거하고 고객에게 한 차원 높은 정보보안 체계를 제공함으로써 비즈니스 신뢰도를 높일 것으로 기대하고 있다. 지니언스의 NAC, EDR 솔루션을 도입하는 기업이나 기관이 다양한 엔드포인트와 각종 애플리케이션 및 업데이트가 수시로 배포되는 과정에 발생할 수 있는 사이버 위협을 제조단에서 원천적으로 봉쇄할 수 있는 기틀을 마련했다는 평을 듣고 있다.\n\n사실상 공급망 공격의 위협은 화두가 되고 있지만 이 위협을 제거하기 위한 노력은 다소 부진하다. 주요 기관에 SW 공급한 기업이나 협력사 해킹을 통해 사용자가 피해를 보는 사례가 증가했지만 보안 위협에 대한 대응은 미온적이었다. 이에 따라, 제품이나 서비스를 제공하는 모든 업체들이 안전하게 관리하지 않으면 제조 단계에서 해킹 프로그램이나 스파이칩을 넣을 가능성은 언제 열려있다.\n\n지니언스 이동범 대표는 “지난 20여년간 국내에 발생한 대형 사이버 테러는 SW공급망 공격 이었다”며 “지니언스의 글로벌 정보보호경영인증은 지니언스 내부의 정보보호 체계가 최종 사용자의 공급망까지 자연스레 스며들어 다양한 사이버 위협을 원천적으로 제거할 수 있는 기틀을 마련했다”는 점에서 1차적인 의의가 있다고 밝혔다. 또한, 그는 “정보보호관리체계의 고도화로 대 고객 신뢰도 향상 및 경쟁력 강화를 통해 통합 보안 플랫폼 업체로의 위상을 더욱 강화하겠다고” 덧붙였다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EA%B5%AD%EC%A0%9C-%ED%91%9C%EC%A4%80-%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8-%EC%9D%B8%EC%A6%9D-ISO-27001%EC%9D%84-%EC%B7%A8%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.jpg?width=980&height=773&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EA%B5%AD%EC%A0%9C-%ED%91%9C%EC%A4%80-%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8-%EC%9D%B8%EC%A6%9D-ISO-27001%EC%9D%84-%EC%B7%A8%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.jpg)\n\n[[뉴스핌] 지니언스, 글로벌 정보보호경영시스템 'ISO 27001' 인증 획득](http://www.newspim.com/news/view/20200806000088)\n\n[[머니투데이] 지니언스, 글로벌정보보호 경영시스템 ISO 인증 획득](https://news.mt.co.kr/mtview.php?no=2020080609205850230)\n\n[[매일경제] 지니언스, 글로벌 정보보호 경영시스템 인증 획득](https://www.mk.co.kr/news/stock/view/2020/08/806526/)\n\n[[이데일리] 지니언스, 글로벌 정보보호 경영시스템 인증 획득](https://www.edaily.co.kr/news/read?newsId=03230806625864696&mediaCodeNo=257&OutLnkChk=Y)\n\n[[디지털투데이] 지니언스, 글로벌 정보보호 경영시스템 인증 획득](http://www.digitaltoday.co.kr/news/articleView.html?idxno=243891)\n\n[[아이뉴스24] 지니언스, 정보보호 경영시스템 'ISO 27001' 인증 획득](http://www.inews24.com/view/1288245)\n\n[[아이티비즈] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO 27001’인증 획득](http://www.it-b.co.kr/news/articleView.html?idxno=42798)\n\n[[디지털타임스] 지니언스, 글로벌 정보보호경영시스템 인증…공급망 보안 강화](http://www.dt.co.kr/contents.html?article_no=2020080602109931820003&ref=naver)\n\n[[데이터넷] 지니언스, ISO 27001 인증 획득](http://www.datanet.co.kr/news/articleView.html?idxno=149252)\n\n[[ITDAILY] 지니언스, 글로벌 정보보호 경영시스템 인증](http://www.itdaily.kr/news/articleView.html?idxno=102235)\n\n[[디지털데일리] 지니언스, 글로벌 정보보호 경영시스템 인증··· 공급망 보안 강화](http://www.ddaily.co.kr/news/article/?no=199674)\n\n[[지디넷] 지니언스, 글로벌 정보보호 경영시스템 인증 획득](https://zdnet.co.kr/view/?no=20200806111504)\n\n[[전자신문] 지니언스, ISO 27001 인증 획득…\"공급망 보안 강화\"](https://www.etnews.com/20200806000169)\n\n[[데일리시큐] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO 27001’ 인증 획득](https://www.dailysecu.com/news/articleView.html?idxno=112120)\n\n[[CCTV뉴스] 지니언스, 글로벌 정보보호경영시스템 인증 획득](http://www.cctvnews.co.kr/news/articleView.html?idxno=207266)\n\n[[보안뉴스] 지니언스, 글로벌 정보보호 경영시스템 ‘ISO27001’ 획득](https://www.boannews.com/media/view.asp?idx=90316&kind=)"}, {"title": "지니언스, NH농협은행 EDR 본 사업 수주…금융권 최대 규모", "date": "2020.08.04", "link": "https://www.genians.co.kr/pr-room/press/nh-edr", "category": "EDR", "body_html": "<p><strong>지니언스, NH농협은행 EDR 본 사업 수주...금융권 최대 규모</strong></p>\n<h3><strong>- 시범사업 성공적 마무리, 본 사업으로 본격적인 프로젝트 진행</strong></h3>\n<h3><strong>- 보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화</strong></h3>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 NH농협은행의 ‘단말 이상행위 탐지 및 대응 솔루션 도입’의 시범사업을 성공적으로 완료하고 확장 사업을 수주 했다고 밝혔다. 국내 최대인 10만대 규모로 진행되는 NH농협은행의 EDR 본 사업은 지난해 시범사업을 거쳐 올해 1차 확대 사업 등 단계적으로 추진 되고 있다.</p>\n<p>지니언스는 지난해 4,500여대 규모의 시범사업에 EDR 솔루션을 공급했으며 SK인포섹은 주 사업자로 EDR 솔루션 구축 및 시스템 연계, 솔루션 최적화 및 커스트마이징을 기반으로 시스템 운영 안정화를 담당했다.</p>\n<p>NH농협은행은 기존 안티바이러스 솔루션의 한계 극복, 단말의 다양한 정보 수집을 통한 가시성 확보, 단말의 이상행위 대응 및 확산 방지, 단말 침해 사고에 대한 빠른 조사 및 대응, 최신 기술을 이용한 보안 강화를 목표로 EDR(Endpoint Detection &amp; Response : 단말기반 지능형 위협 탐지 및 대응) 솔루션을 도입을 추진해 왔다.</p>\n<p>NH농협은행의 EDR 사업은 단말 보안 수준을 획기적으로 증대시키기 위한 대규모 사업이다. 국내 은행권 최초 이며 최신 보안 기술을 적극적으로 내재화 시키는 고도화된 프로젝트이다. 시범사업 당시는 물론 본 사업 추진 과정에서도 타은행과 비교할 수 없을 정도로 보안을 혁신의 우선순위로 두고 있다.</p>\n<p>NH농협은행이 도입한 EDR 솔루션은 지니언스의 ‘지니안 인사이츠 E’ 이다. 이 제품은 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.</p>\n<p>특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.</p>\n<p>이동범 지니언스 대표이사는 “최근 보안 시장은 공격의 고도화, 지능형 위협의 증대에 따라 안티바이러스를 회피해서 공격하는 다양한 형태가 존재 한다”며 “지니언스는 2017년 국내 최초로 EDR 솔루션을 개발하여 기술을 축적해 왔다”며 “국내 EDR 시장에서의 다양한 ‘최초’의 타이틀을 ‘최고’로 변화시켜 국내 기업(관)의 보안을 한층 고도화 하는데 일익을 담당할 것”이라고 덧붙였다.</p>\n<p><strong>&lt;그림 1&gt; 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전 대시보드 - 악성코드와 이상행위가 통합되어 모든 위협을 관리할 수 있는 통합 모니터링 화면</strong><img alt=\"‘지니안 인사이츠 E’ 2.0 버전 대시보드\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-30-54-87-AM.jpg?width=1718&amp;height=893&amp;name=1-Jul-22-2022-03-30-54-87-AM.jpg\" /></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01498966625863712&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, NH농협은행 EDR 본 사업 수주…금융권 최대 규모</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/08/790515/\">[매일경제]지니언스, NH농협은행 EDR 본 사업 수주…금융권 최대 규모</a></p>\n<p><a href=\"https://view.asiae.co.kr/article/2020080308271697792\">[아시아경제] 지니언스, NH농협은행 EDR 사업 수주…금융권 최대 규모</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020080309050745427\">[머니투데이] 지니언스, NH농협 PC 10만대에 EDR 공급…'금융권 최대 규모</a></p>\n<p><a href=\"http://www.ceoscoredaily.com/news/article.html?no=72023\">[CEO스코어데일리] 지니언스, NH농협은행 EDR 본 사업 수주…금융권 ‘최대’ 규모</a></p>\n<p><a href=\"http://inthenews.co.kr/article-62107/\">[인더뉴스] 지니언스, NH농협은행 EDR 본 사업 수주…“금융권 최대 규모”</a></p>\n<p><a href=\"http://www.newspim.com/news/view/20200803000279\">[뉴스핌] 지니언스, NH농협 EDR 사업 수주</a></p>\n<p><a href=\"https://www.news1.kr/articles/?4014530\">[뉴스 1] 지니언스, NH농협 PC 10만대에 EDR 도입…\"금융권 최대 규모\"</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=199439\">[디지털데일리] 지니언스, NH농협은행 EDR 본 사업 수주··· 금융권 최대 규모</a></p>\n<p><a href=\"https://zdnet.co.kr/view/?no=20200803083903\">[지디넷코리아] 지니언스, 올해도 NH농협 EDR 사업 수주</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020080302109931820001&amp;ref=naver\">[디지털타임스] 지니언스, NH농협은행 EDR 본사업 수주…금융권 최대 규모</a></p>\n<p><a href=\"http://www.inews24.com/view/1287118\">[아이뉴스24] 지니언스, 10만대 규모 NH농협은행 EDR 사업 수주</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=42687\">[아이티비즈] 지니언스, NH농협은행 EDR 확장 사업 수주</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=102179\">[IT DAILY] 지니언스, NH농협은행 EDR 확장 사업 수주</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=243503\">[디지털투데이] 지니언스, NH농협은행 EDR 프로젝트 수주...10만대 규모</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=149106\">[데이터넷] 지니언스, NH농협 EDR 확장 사업 수주</a></p>\n<p><a href=\"https://www.techm.kr/news/articleView.html?idxno=73957\">[테크엠] 지니언스, NH농협 10만대 규모 'EDR 사업' 수주</a></p>\n<p><a href=\"https://www.etnews.com/20200803000163\">[전자신문] 지니언스, NH농협은행에 10만대 규모 EDR 공급</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=207020\">[CCTV뉴스] 지니언스, NH농협은행 EDR 본 사업 수주</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=90245&amp;kind=\">[보안뉴스] 지니언스, NH농협은행 EDR 본 사업 수주... 금융권 최대 규모</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=111966\">[데일리시큐] 지니언스, NH농협은행 EDR 10만대 규모 본 사업 수주</a></p>\n<p><a href=\"https://byline.network/2020/08/3-71/\">[바이라인네트워크] NH농협은행, 10만대 대상 EDR 구축 본격화…지니언스 EDR로 구축</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/159441\">[ITWORLD] 지니언스, NH농협은행 EDR 확장 사업 수주</a></p>", "body_text": "**지니언스, NH농협은행 EDR 본 사업 수주...금융권 최대 규모**\n\n### **- 시범사업 성공적 마무리, 본 사업으로 본격적인 프로젝트 진행**\n\n### **- 보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 NH농협은행의 ‘단말 이상행위 탐지 및 대응 솔루션 도...", "full_text": "**지니언스, NH농협은행 EDR 본 사업 수주...금융권 최대 규모**\n\n### **- 시범사업 성공적 마무리, 본 사업으로 본격적인 프로젝트 진행**\n\n### **- 보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 NH농협은행의 ‘단말 이상행위 탐지 및 대응 솔루션 도입’의 시범사업을 성공적으로 완료하고 확장 사업을 수주 했다고 밝혔다. 국내 최대인 10만대 규모로 진행되는 NH농협은행의 EDR 본 사업은 지난해 시범사업을 거쳐 올해 1차 확대 사업 등 단계적으로 추진 되고 있다.\n\n지니언스는 지난해 4,500여대 규모의 시범사업에 EDR 솔루션을 공급했으며 SK인포섹은 주 사업자로 EDR 솔루션 구축 및 시스템 연계, 솔루션 최적화 및 커스트마이징을 기반으로 시스템 운영 안정화를 담당했다.\n\nNH농협은행은 기존 안티바이러스 솔루션의 한계 극복, 단말의 다양한 정보 수집을 통한 가시성 확보, 단말의 이상행위 대응 및 확산 방지, 단말 침해 사고에 대한 빠른 조사 및 대응, 최신 기술을 이용한 보안 강화를 목표로 EDR(Endpoint Detection & Response : 단말기반 지능형 위협 탐지 및 대응) 솔루션을 도입을 추진해 왔다.\n\nNH농협은행의 EDR 사업은 단말 보안 수준을 획기적으로 증대시키기 위한 대규모 사업이다. 국내 은행권 최초 이며 최신 보안 기술을 적극적으로 내재화 시키는 고도화된 프로젝트이다. 시범사업 당시는 물론 본 사업 추진 과정에서도 타은행과 비교할 수 없을 정도로 보안을 혁신의 우선순위로 두고 있다.\n\nNH농협은행이 도입한 EDR 솔루션은 지니언스의 ‘지니안 인사이츠 E’ 이다. 이 제품은 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\n특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\n이동범 지니언스 대표이사는 “최근 보안 시장은 공격의 고도화, 지능형 위협의 증대에 따라 안티바이러스를 회피해서 공격하는 다양한 형태가 존재 한다”며 “지니언스는 2017년 국내 최초로 EDR 솔루션을 개발하여 기술을 축적해 왔다”며 “국내 EDR 시장에서의 다양한 ‘최초’의 타이틀을 ‘최고’로 변화시켜 국내 기업(관)의 보안을 한층 고도화 하는데 일익을 담당할 것”이라고 덧붙였다.\n\n**<그림 1> 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전 대시보드 - 악성코드와 이상행위가 통합되어 모든 위협을 관리할 수 있는 통합 모니터링 화면**![‘지니안 인사이츠 E’ 2.0 버전 대시보드](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-30-54-87-AM.jpg?width=1718&height=893&name=1-Jul-22-2022-03-30-54-87-AM.jpg)\n\n[[이데일리] 지니언스, NH농협은행 EDR 본 사업 수주…금융권 최대 규모](https://www.edaily.co.kr/news/read?newsId=01498966625863712&mediaCodeNo=257&OutLnkChk=Y)\n\n[[매일경제]지니언스, NH농협은행 EDR 본 사업 수주…금융권 최대 규모](https://www.mk.co.kr/news/stock/view/2020/08/790515/)\n\n[[아시아경제] 지니언스, NH농협은행 EDR 사업 수주…금융권 최대 규모](https://view.asiae.co.kr/article/2020080308271697792)\n\n[[머니투데이] 지니언스, NH농협 PC 10만대에 EDR 공급…'금융권 최대 규모](htt co.kr/pr-room/press/지니언스-디딤365와-클라우드-비즈니스-전략적-파트", "category": "AI & Cloud", "body_html": "<h3>- 디지털 트랜스포메이션 시대, 고객을 위한 최적화된 클라우드 서비스 제공</h3>\n<h3>- 비용절감, 운용효율증대, 보안 서비스 강화</h3>\n<p>지니언스(263860, 대표 이동범)가 멀티 클라우드 서비스 전문 기업 디딤365(대표 장민호)와 전략적 제휴 관계를 체결했다고 밝혔다. 코로나 이후 디지털 트랜스포메이션이 활발해 지고 있는 상황에서 클라우드 비즈니스 활성화를 위해 상호 협력하는 것이 주요 골자다.</p>\n<p>국내 클라우드 시장은 핵심 비즈니스까지 클라우드에서 운영하는 사례가 증가하면서 서비스의 안정성은 충분히 검증됐다. 하지만 고객의 전체 IT 환경은 온프레미스, 멀티 클라우드 등 복잡해지고 다양화 됐으며 전통적인 보안 경계가 사라지고 새로운 보안 위협에 직면했다.</p>\n<p>또한, 클라우드는 비용절감, 효율적 운영, 새로운 보안 위협, 전문 인력 부재 등의 이슈로 실제 운영에는 많은 어려움이 있다. 클라우드 환경을 효과적으로 관리하기 위해 사용량에 대한 모니터링과 실시간 분석, 보안 위협 및 장애에 대비하고, 전문적인 관리를 위한 관리도구도 필요하다.</p>\n<p>이번 제휴는 지니언스의 클라우드 네트워크 보안 솔루션과 디딤365의 클라우드 서비스를 접목해 클라우드가 필요하지만 비용효율성과 보안 이슈로 도입을 주저하는 기업들에게 최적화된 클라우드 서비스 환경을 제공하는 것이다.</p>\n<p>디딤365는 초기 막대한 보안 투자가 부담스러운 SMB기업에게 월 과금 형태로 사용한 만큼 지불하는 가능한 클라우드 기반 보안서비스(SECaaS)를 제공할 예정이며, 지니언스는 클라우드 기반 차세대 NAC 서비스인 '클라우드 NAC'에 디딤 365의 클라우드 노하우를 적용하여 더욱 안정적이며 최적화된 클라우드 기반 보안 서비스 환경을 제공할 수 있게 되었다.</p>\n<p>양사는 금번 제휴를 필두로 지니언스 NAC의 솔루션과 연계된 클라우드 매니지드 서비스 비즈니스, EDR 솔루션을 통한 클라우드 보안 서비스 영역까지 협력 범위를 확대한다는 방침이다.</p>\n<p>이동범 지니언스 대표는 “디딤365와의 협력을 통해 클라우드 환경에서도 체계적이고 일관적이며 중단 없이 비즈니스를 수행하고 보호할 수 있는 최적화된 환경을 제공할 수 있게 됐다”며 “디지털 트랜스포메이션 시대에 고객을 위한 새로운 가치를 창출하는 데 적극 협력하겠다”고 밝혔다.</p>\n<p>장민호 디딤365 대표는 “현재 고도화되는 보안 위협 속에서 클라우드를 도입하려는 기업들에게는 클라우드 환경에 최적화된 보안서비스가 필요한 시점”이라며 “지니언스와 사업협력을 통해 클라우드 운영 비용과 보안 이슈로 도입을 망설이는 기업들에게 안정적인 클라우드 서비스 환경을 제공하겠다”고 말했다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%98%91%EC%95%BD%EC%8B%9D-%EC%82%AC%EC%A7%84.jpg?width=1920&amp;height=1280&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%98%91%EC%95%BD%EC%8B%9D-%EC%82%AC%EC%A7%84.jpg\" /></p>\n<p><a href=\"https://www.fnnews.com/news/202007100809298939\">[파이낸셜뉴스] 지니언스, 디딤356와 클라우드 비즈니스 전략적 파트너십 체결</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/07/706972/\">[매일경제] 지니언스, 디딤365와 <code>클라우드 비즈니스</code> 전략적 파트너십 체결</a></p>\n<p><a ILY] 지니언스, 디딤356와 ‘클라우드 비즈니스’ 파트너십 체결</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020071202109931820002&amp;ref=naver\">[디지털타임스] 지니언스, 디딤356와 클라우드 비즈니스 전략적 파트너십 체결</a></p>", "body_text": "### - 디지털 트랜스포메이션 시대, 고객을 위한 최적화된 클라우드 서비스 제공\n\n### - 비용절감, 운용효율증대, 보안 서비스 강화\n\n지니언스(263860, 대표 이동범)가 멀티 클라우드 서비스 전문 기업 디딤365(대표 장민호)와 전략적 제휴 관계를 체결했다고 밝혔다. 코로나 이후 디지털 트랜스포메이션이 활발해 지고 있는 상황에서 클라우드 비즈니스 ...", "full_text": "### - 디지털 트랜스포메이션 시대, 고객을 위한 최적화된 클라우드 서비스 제공\n\n### - 비용절감, 운용효율증대, 보안 서비스 강화\n\n지니언스(263860, 대표 이동범)가 멀티 클라우드 서비스 전문 기업 디딤365(대표 장민호)와 전략적 제휴 관계를 체결했다고 밝혔다. 코로나 이후 디지털 트랜스포메이션이 활발해 지고 있는 상황에서 클라우드 비즈니스 활성화를 위해 상호 협력하는 것이 주요 골자다.\n\n국내 클라우드 시장은 핵심 비즈니스까지 클라우드에서 운영하는 사례가 증가하면서 서비스의 안정성은 충분히 검증됐다. 하지만 고객의 전체 IT 환경은 온프레미스, 멀티 클라우드 등 복잡해지고 다양화 됐으며 전통적인 보안 경계가 사라지고 새로운 보안 위협에 직면했다.\n\n또한, 클라우드는 비용절감, 효율적 운영, 새로운 보안 위협, 전문 인력 부재 등의 이슈로 실제 운영에는 많은 어려움이 있다. 클라우드 환경을 효과적으로 관리하기 위해 사용량에 대한 모니터링과 실시간 분석, 보안 위협 및 장애에 대비하고, 전문적인 관리를 위한 관리도구도 필요하다.\n\n이번 제휴는 지니언스의 클라우드 네트워크 보안 솔루션과 디딤365의 클라우드 서비스를 접목해 클라우드가 필요하지만 비용효율성과 보안 이슈로 도입을 주저하는 기업들에게 최적화된 클라우드 서비스 환경을 제공하는 것이다.\n\n디딤365는 초기 막대한 보안 투자가 부담스러운 SMB기업에게 월 과금 형태로 사용한 만큼 지불하는 가능한 클라우드 기반 보안서비스(SECaaS)를 제공할 예정이며, 지니언스는 클라우드 기반 차세대 NAC 서비스인 '클라우드 NAC'에 디딤 365의 클라우드 노하우를 적용하여 더욱 안정적이며 최적화된 클라우드 기반 보안 서비스 환경을 제공할 수 있게 되었다.\n\n양사는 금번 제휴를 필두로 지니언스 NAC의 솔루션과 연계된 클라우드 매니지드 서비스 비즈니스, EDR 솔루션을 통한 클라우드 보안 서비스 영역까지 협력 범위를 확대한다는 방침이다.\n\n이동범 지니언스 대표는 “디딤365와의 협력을 통해 클라우드 환경에서도 체계적이고 일관적이며 중단 없이 비즈니스를 수행하고 보호할 수 있는 최적화된 환경을 제공할 수 있게 됐다”며 “디지털 트랜스포메이션 시대에 고객을 위한 새로운 가치를 창출하는 데 적극 협력하겠다”고 밝혔다.\n\n장민호 디딤365 대표는 “현재 고도화되는 보안 위협 속에서 클라우드를 도입하려는 기업들에게는 클라우드 환경에 최적화된 보안서비스가 필요한 시점”이라며 “지니언스와 사업협력을 통해 클라우드 운영 비용과 보안 이슈로 도입을 망설이는 기업들에게 안정적인 클라우드 서비스 환경을 제공하겠다”고 말했다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%98%91%EC%95%BD%EC%8B%9D-%EC%82%AC%EC%A7%84.jpg?width=1920&height=1280&name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%98%91%EC%95%BD%EC%8B%9D-%EC%82%AC%EC%A /www.dt.co.kr/contents.html?article_no=2020071202109931820002&ref=naver)"}, {"title": "코로나에 주목받는 NAC·EDR… 지니언스, 시장선점 `박차`", "date": "2020.07.05", "link": "https://www.genians.co.kr/pr-room/press/코로나에-주목받는-nacedr-지니언스-시장선점-박차", "category": "NAC", "body_html": "<p>지니언스의 NAC와 EDR 솔루션이 코로나 이후 언택트 환경에서 주목 받는 다는 내용이 기사화 되었습니다. 원격 및 재택 환경에서 보안 수준 강화가 필수적인 만큼 단말을 보호하고 악성 코드 및 이상행위를 탐지 하고 대응하는 거이 어느 때 보다 중요한 환경이 되었습니다. 기사 전문은 아래 링크를 참고해 주시기 바랍니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-4.jpg?width=577&amp;height=334&amp;name=%EC%BA%A1%EC%B2%98-4.jpg\" /><br />\n<a href=\"http://www.dt.co.kr/contents.html?article_no=2020070602101031820001\">[디지털타임스] 코로나에 주목받는 NAC·EDR… 지니언스, 시장선점 <code>박차</code></a></p>", "body_text": "지니언스의 NAC와 EDR 솔루션이 코로나 이후 언택트 환경에서 주목 받는 다는 내용이 기사화 되었습니다. 원격 및 재택 환경에서 보안 수준 강화가 필수적인 만큼 단말을 보호하고 악성 코드 및 이상행위를 탐지 하고 대응하는 거이 어느 때 보다 중요한 환경이 되었습니다. 기사 전문은 아래 링크를 참고해 주시기 바랍니다.\n\n![](https://www.geni...", "full_text": "지니언스의 NAC와 EDR 솔루션이 코로나 이후 언택트 환경에서 주목 받는 다는 내용이 기사화 되었습니다. 원격 및 재택 환경에서 보안 수준 강화가 필수적인 만큼 단말을 보호하고 악성 코드 및 이상행위를 탐지 하고 대응하는 거이 어느 때 보다 중요한 환경이 되었습니다. 기사 전문은 아래 링크를 참고해 주시기 바랍니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-4.jpg?width=577&height=334&name=%EC%BA%A1%EC%B2%98-4.jpg)  \n [[디지털타임스] 코로나에 주목받는 NAC·EDR… 지니언스, 시장선점 `박차`](http://www.dt.co.kr/contents.html?article_no=2020070602101031820001)"}, {"title": "지니언스, 보다 안전한 세상을 꿈꾸는 ‘사이버 보안’의 수호신", "date": "2020.07.01", "link": "https://www.genians.co.kr/pr-room/press/지니언스-보다-안전한-세상을-꿈꾸는-사이버-보안", "category": "기타 뉴스", "body_html": "<p>지니언스 사명의 의미와 유래 입니다. 파이낸셜 뉴스에 기고한 내용으로 지니언스에 뜻이 궁금하셨던 분들께 도움을 드리고자 작성하였습니다.</p>\n<p>[기발한 사명이야기- 지니언스]  보다 안전한 세상을 꿈꾸는 ‘사이버 보안’의 수호신</p>\n<p>천재(Genius)의 어원은 라틴어 ‘Genius Loci’로 땅을 지키는 수호신이다. 고대 로마에서 천재는 안내자나 수호신을 의미했다. 신이 재능을 내려주는 것으로 생각하여 천재를 보통사람과는 다른 존재로 신격화 했다.</p>\n<p>‘지니언스(GENIANS)’는 비범한 재능을 가진 전문가들이 모여 ‘네트워크의 수호신’이 되겠다는 의미를 담고 있다. 정보보안 분야를 핵심사업으로 보다 안전한 세상을 꿈꾸며 대가가 되거나, 미지의 영역을 개척하면서 위대한 업적을 남기겠다는 것이다.</p>\n<p>천재라는 용어는 어떤 영역에서든지 우월한 능력을 가지고 있는 사람을 지칭할 수 있다. 하지만 지니언스는 재능을 과시하지는 않고 땀과 열정을 가지고 개인이 창조성을 발휘하는 ‘장(場, Place)’이 되는 회사를 추구하고 있다.</p>\n<p>각 개인은 해당 분야의 최고 전문가가 되기 위해 끊임 없는 열정으로 자기 계발에 정진하며, 각 개인의 전문가 역량을 인정하고 격려하며 존중한다. 전문가적인 서비스로 고객 만족을 위해 노력하며 전문가적 소양으로 투명하고 윤리적인 회사를 표방하고 있다.</p>\n<p>지니언스의 CI는 자물쇠와 디지털코드를 결합한 형태로 ‘G’는 IT 정보자산에 대한 가치를 인식하고 안전하게 보호하는 지니언스의 핵심 가치를 시각화했다. 연결된 선은 기업과 고객을 연결하여 함께 행복한 미래를 창조하는 지니언스의 기업문화를 나타내고 있다.</p>\n<p>2005년 창업이래 15년간 지속적인 흑자를 기록하고 있으며 ‘네트워크 접근 제어 솔루션(NAC)’에서 부동의 시장점유율 1위, 신규 사업인 단말 이상행위 탐지 및 대응 솔루션(EDR) 분야에서도 글로벌 기업과의 동등한 기술력으로 시장을 발빠르게 선점하고 있다.</p>\n<p>코로나 사태로 기업(관)의 반 강제적인 디지털 전환(Digital Transformation)이 급속히 진행 중이다. 업무의 형태도, 업무수행의 장소도, 업무를 수행하는 방법도 언택트 환경으로 달라지고 있다. 원격 및 재택 근무는 보안 수준 강화가 필수적이다. 결국에는 사람과 네트워크에 접속하는 단말에 대한 보안이 중요하다. NAC와 EDR이 각광받는 이유이다</p>\n<p>NAC를 통해 접근을 통제하고 패치와 필수 소프트웨어의 운영 등을 강제화 하여 강력한 보안 정책 유지할 수 있다. EDR로는 백신을 뛰어 넘는 단말 보안 수준을 유지할 있으며 특히 단말 가시성(Endpoint Visibility)은 필요시 재택근무자의 활동 내용을 상세히 확인할 수 있다. 중요한 문서 데이터 의 생성 및 이동경로 등을 파악하여 유출 등을 사전에 예방하고 대응할 수 있다.</p>\n<p>한국판 뉴딜 프로젝트는 디지털인프라 구축, 비대면 산업육성, SOC 디지털화로 전 분야에 보안이 강조되고 있다. 또한, SW산업진흥법 개정으로 상용 소프트웨어를 서비스 형태로 이용하는 계약에 예산을 우선 편성하도록 명문화 함에 따라 서비스형소프트웨어(SaaS) 시장의 대폭적인 성장이 예상되고 있다.</p>\n<p>지니언스는 최근 미국 등 글로벌 시장에서 검증된 클라우드 기반 차세대 NAC 서비스를 국내에 출시했다. 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델로 보안에 관심이 많지만 초기 도입 비용 및 관리 이슈로 사용하지 못한 중소기업(SMB)이나 기관에 적합하다.</p>\n<p>지니언스의 궁극적 목표는 글로벌 보안 소프트웨어회사로 발돋움 하는 것이다. 2016년 보스턴에 미국법인을 설립하고 30여개국 40여개의파트 트너를 확보했다. 올해부터는 열매를 맺어 국가 경제에 이바지 하는 글로벌 보안 소프트웨어로의 위상을 확고히 한다는 방침이다.  </p>\n<p><a href=\"https://www.fnnews.com/news/202006301716124356\">[파이낸셜뉴스] 안전한 세상 꿈꾸는 '네트워크의 수호신' [기발한 사명 이야기]</a></p>", "body_text": "지니언스 사명의 의미와 유래 입니다. 파이낸셜 뉴스에 기고한 내용으로 지니언스에 뜻이 궁금하셨던 분들께 도움을 드리고자 작성하였습니다.\n\n[기발한 사명이야기- 지니언스]  보다 안전한 세상을 꿈꾸는 ‘사이버 보안’의 수호신\n\n천재(Genius)의 어원은 라틴어 ‘Genius Loci’로 땅을 지키는 수호신이다. 고대 로마에서 천재는 안내자나 수호신을 의미했...", "full_text": "지니언스 사명의 의미와 유래 입니다. 파이낸셜 뉴스에 기고한 내용으로 지니언스에 뜻이 궁금하셨던 분들께 도움을 드리고자 작성하였 업 정보 공유, 영업 및 마케팅 활성화 공동 진행</strong></p>\n<p><strong>-브랜드 강화 및 신규 영업기회 확대</strong></p>\n<p>국내 보안 솔루션 영역별 1위 기업이 모여 아태지역 공동 마케팅을 진행한다. 지니언스(263806, 대표 이동범), 파수(150900, 대표 조규곤), 넷앤드(대표 신호철), 소만사(대표 김대환)는 코로나19 사태 이후 비즈니스 환경 변화에 선제적으로 대응하기 위해 ‘Korea No.1 Security Solutions Webinar’를 개최한다고 밝혔다.</p>\n<p>금번 공동 마케팅은 해외 비즈니스 정보 교류를 시작으로 아태지역에 한국의 #1 보안 솔루션을 소개하고 고객 경험을 공유하는 것이 골자다. 코로나19 사태 이후 전통적인 글로벌 시장 진출 방식인 대면 미팅, 출장, 대형 세미나 등이 현실적으로 불가능해 지고 협업 없이는 시장의 파이를 키울 수 없기 때문에 보안업계가 손을 맞잡은 것이다.</p>\n<p>특히, 참여기업은 국내 보안 분야별 시장점유율 1위 기업으로 솔루션 영역이 겹치지 않아 시너지 효과가 가능하다. 이미 아태지역에 파트너 보유 및 매출의 성과를 기록하고 있다는 점에서 비즈니스의 실질적인 협력이 가능한 이상적인 모델로 평가 받고 있다.</p>\n<p>이번 행사는 6월 2일(화) 14시부터 각 사의 아태지역 파트너사 30여개를 대상으로 진행되며 파수의 DRM 솔루션, 지니언스 NAC 솔루션, 넷엔드 IAM 솔루션, 소만사의 DLP 솔루션이 차례로 선보이게 된다. 온라인 웨비나 형태의 첫 협력 사례를 발판으로 향후에는 그 대상을 고객까지 확장하고 솔루션의 통합 제안 등 다양한 마케팅 활동의 접목이 가능 할 것으로 예상하고 있다.</p>\n<p>참여 기업 4사는 “아태지역 시장 확대를 위해 국내 보안 영역별 솔루션 1위 기업이 뭉친 것이 일차적인 의의가 있다”며 “글로벌 시장 개척의 한계를 극복하는 협력 모델로 변화・발전시켜 코로나 선진국에 이어 보안 산업의 선진국 임을 전 세계에 알리는데 총력을 다하겠다”고 밝혔다.</p>\n<p><strong><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/01-Genians_CI.png?width=1287&amp;height=295&amp;name=01-Genians_CI.png\" /></strong></p>", "body_text": "**- 코로나 이후 변화된 환경에 맞게 선제적인 비즈니스 협력 추진**\n\n**- 아태지역 사업 정보 공유, 영업 및 마케팅 활성화 공동 진행**\n\n**-브랜드 강화 및 신규 영업기회 확대**\n\n국내 보안 솔루션 영역별 1위 기업이 모여 아태지역 공동 마케팅을 진행한다. 지니언스(263806, 대표 이동범), 파수(150900, 대표 조규곤), 넷앤드(대표 ...", "full_text": "**- 코로나 이후 변화된 환경에 맞게 선제적인 비즈니스 협력 추진**\n\n**- 아태지역 사업 정보 공유, 영업 및 마케팅 활성화 공동 진행**\n\n**-브랜드 강화 및 신규 영업기회 확대**\n\n국내 보안 솔루션 영역별 1위 기업이 모여 아태지역 공동 마케팅을 진행한다. 지니언스(263806, 대표 이동범), 파수(150900, 대표 조규곤), 넷앤드(대표 신호철), 소만사(대표 김대환)는 코로나19 사태 이후 비즈니스 환경 변화에 선제적으로 대응하기 위해 ‘Korea No.1 Security Solutions Webinar’를 개최한다고 밝혔다.\n\n금번 공동 마케팅은 해외 비즈니스 정보 교류를 시작으로 아태지역에 한국의 #1 보안 솔루션을 소개하고 고객 경험을 공유하는 것이 골자다. 코로나19 사태 이후 전통적인 글로벌 시장 진출 방식인 대면 미팅, 출장, 대형 세미나 등이 현실적으로 불가능해 지고 협업 없이는 시장의 파이를 키울 수 없기 때문에 보안업계가 손을 맞잡은 것이다.\n\n특히, 참여기업은 국내 보안 분야별 시장점유율 1위 기업으로 솔루션 영역이 겹치 5년간 평균 10.4% 성장 전망</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=109140\">[데일리시큐] 전 세계 NAC 시장, 향후 5년간 연평균 10.4% 성장…22억달러 규모</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/05/28/2020052800348.html\">[IT조선] 글로벌 NAC 시장 규모 연평균 10.4%↑…2024년 2조원 전망</a></p>", "body_text": "**- 클라우드・BYOD · IoT가 시장 견인, 고성장 제품군으로 분류**  \n **- 제로 트러스트 네트워크 보안의 핵심 기술로 각광**  \n   \n 전 세계 NAC 시장이 향후 5년간 연평균 10.4% 성장하여 2024년에는 22억달러에 이를 것으로 전망됐다. 세계적인 시장조사기관인 프로스트 앤 설리번이 최근 발간한 ‘글로벌 NAC 리포트’에 따르면 ...", "full_text": "**- 클라우드・BYOD · IoT가 시장 견인, 고성장 제품군으로 분류**  \n **- 제로 트러스트 네트워크 보안의 핵심 기술로 각광**  \n   \n 전 세계 NAC 시장이 향후 5년간 연평균 10.4% 성장하여 2024년에는 22억달러에 이를 것으로 전망됐다. 세계적인 시장조사기관인 프로스트 앤 설리번이 최근 발간한 ‘글로벌 NAC 리포트’에 따르면 NAC 어플라이언스, NAC 서비스, NAC As a Service를 포함한 2019년 전 세계 NAC 시장은 2018년 보다 16.1% 증가한 13.5억달러의 규모를 기록했다.\n\n2020년의 경우 코로나 19사태로 인해 2분기와 3분기의 성장이 다소 둔화할 것으로 예측했지만 4분기에 성장이 재개하여 2024년까지 고성장을 지속할 것으로 전망했다. IoT의 성장, BYOD 시대의 도래, 모빌리티의 증가, 원격 근무, 클라우드로의 디지털 트랜스포메이션이 시장 성장을 견인할 것으로 예측했다.\n\n또한, 멀웨어와 각종 사이버 공격의 증가도 기업(관)의 NAC 투자를 증가시키는 요인으로 분석했다. 네트워크에 어떤 종류의 단말이 존재하는지, 현재 어떤 상태인지, 어떤 활동을 하고 있는지에 대한 향상된 가시성(Visibility)확보를 통해 각종 위협에 대응하고 보안 관리를 완성하는 것이 중요하다는 것이다.\n\n벤더별로 살펴보면 2019년 기준 시스코, 포어스카우트, 아루바가 글로벌 NAC시장의 68%를 점유하고 있으며 아태지역에서는 지니언스가 유일하게 본 보고서에 등재가 됐다. 지니언스는 국내 NAC 시장의 절대 강자로 조달 시장의 72%를 점유하고 있다.\n\n메이저 보안 벤더들은 보유 솔루션에 NAC를 통합하고 있으며 독립적인 NAC 벤더들은 써드파티에 연동하거나 통합하는 작업에 적극적이다. 특히, 이번 보고서는 NAC를 제로트러스트 보안의 기본 기술로 NAC가 다양한 네트워크 및 보안인프라를 자동화 하고 통합하여 ZTN을 달성하는 핵심 역할이라고 강조했다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-%EC%A0%84-%EC%84%B8%EA%B3%84-NAC-%EC%8B%9C%EC%9E%A5-%EA%B7%9C%EB%AA%A8-%EB%B0%8F-%EC%A0%84%EB%A7%9D_Global.jpg?width=887&height=532&name=%EA%B7%B8%EB%A6%BC-%EC%A0%84-%EC%84%B8%EA%B3%84-NAC-%EC%8B%9C%EC%9E%A5-%EA%B7%9C%EB%AA%A8-%EB%B0%8F-%EC%A0%84%EB%A7%9D_Global.jpg)\n\n[[이데일리] \"글로벌 NAC시장 고성장 지속…연평균 성장률 10.4%](https://www.edaily.co.kr/news/read?newsId=01820406625773184&mediaCodeNo=257&OutLnkChk=Y /strong>  </p>\n<p>전염성이 강한 바이러스에 감염된 환자로부터 대다수의 건강한 사람을 보호해야 하는 경우 어떻게 대처해야 할까? 아마도 지구상에 이 질문에 대한 답을 모르는 사람은 없을 것이다. 그것은 바로 ‘격리(Quarantine)’ 를 통해 감염의 확산 가능성을 차단하는 것이다. 이후 감염 환자의 조기 발견을 위한 대대적인 진단, 역학 조사를 통해 감염원을 추적하여 대응하게 된다. 생각해 보면 최근의 코로나 사태에 대한 국가수준의 대응 방법과 유사하다.</p>\n<p>기업(관)의 정보보안 영역도 비슷한 문제에 직면해 있다. 네트워크에 존재하는 많은 단말(PC, 서버 등)은 안전하게 보호되고 있지만 일부는 취약점을 보유하고 있으며 만약 이로 인해 몇몇의 시스템만 감염되더라도 전체 네트워크로 감염이 확산될 수 있다. 과거 우리는 방화벽(Firewall) 등을 이용하여 네트워크를 구분(Separate)하는 방법으로 이러한 위협에 대응하였다. 그러나 재택근무 환경(WFH)의 확대 및 개인 소유의 스마트폰, 태블릿, 웨어러블 등 다양한 기기들이 기업(관) 네트워크에 연결되면서(BYOD) 기존의 대응방법은 큰 도전을 받고 있다.</p>\n<p>이에 대한 해결책이 바로 ‘강제격리(Forced-Quarantine)’ 이다. 다행히도 단말을 격리할 수 있는 기술은 이미 존재한다. 기업(관)은 새로운 위협과 보안 취약점에 대응하기 위해 격리를 위한 새로운 제품을 구입할 필요가 없다. 이미 도입한 보안 솔루션을 연동하거나 통합하는 절차만 진행하면 된다. 단말의 취약성 및 감염 여부는 취약점 스캐너(Vulnerability Assessment &amp; Management) 등을 통해 확인이 가능하고 강제 격리 역시 널리 사용 중인 NAC(Network Access Control) 등을 통해 가능하다.</p>\n<p>검사(테스트)의 대상과 범위를 확대하는 것으로 감염의 위협을 줄일 수 있다. 코로나 대응의 경우를 보자. 증상 미 발현자의 경우도 검사를 통하여 보균자를 찾아 미리 격리시키는 것으로 피해를 예방할 수 있다. 취약점 스캐너뿐 아니라 안티바이러스(AV), 패치관리(PMS) 등 단말의 취약성을 관리할 수 있는 솔루션은 다양하다. 이러한 제품간의 연동과 협업을 통하여 사전 검사와 강제 격리가 가능하다. 이미 NAC는 앞에서 설명한 이러한 보안 제품과 연동 되어 있으며 SOAR 등 새로운 연동의 요구는 지속적으로 발생하고 있다.</p>\n<p>사이버 보안은 최초의 컴퓨터 바이러스(Virus)부터 최근의 랜섬웨어(ransomware)까지 실제 세계에서 발생하는 현상에서 그 개념과 아이디어를 차용해 왔다. 생물학적 바이러스의 생성, 전파 원리가 컴퓨터 바이러스와 유사한 것이다. 이는 실제 세계의 방어 메커니즘으로 위협에 대응하는 방법을 배울 수 있다는 것을 의미한다. 컴퓨터는 사회적 거리두기를 할 수 없지만 보안 위협을 테스트하고 탐지하고, 자동으로 격리하도록 할 수는 있다.</p>\n<p>코로나 사태로 기업(관)의 반 강제적인 디지털 전환(Digital Transformation)이 급속히 진행 중이다. 업무의 형태도, 업무수행의 장소도, 업무를 수행하는 방법도 모두 달라지고 있다. 급변하는 상황에서 가시성 확보에 기반한 식별, 인증, 통제는 필수적이다. 어떻게 해야 할지 두려워하지 말자. 지금 실제 세계에서 벌어지고 있는 코로나 사태에 국가와 국민이 어떻게 대응하고 있는지를 잘 살펴보자. 어쩌면 그것이 사이버 환경에서 우리가 적용해야 하는 가장 효율적인 방법인지도 모른다.</p>", "body_text": "이동범 지니언스 대표가 '코로나19 사태에서 배운 사이버 보안'이라는 주제로 전자신문에 기고한 내용 전문 입니다.\n\n\n**생물학적 바이러스와 컴퓨터 바이러스 속성의 유사점 많아**  \n **‘강제격리(Forced-Quarantine’로 엔터프라이즈 보안 향상 가능**  \n   \n 전염성이 강한 바이러스에 감염된 환자로부터 대다수의 건강한 사람을 보호해야 하...", "full_text": "이동범 프로스트-앤-설리번-글로벌-마켓", "category": "NAC", "body_html": "<p><strong>- 글로벌 NAC 벤더와 대등한 기술력 입증, 아태지역에서 유일하게 등재</strong><br />\n<strong>- IoT, OT, 클라우드, 디지털 트랜스포메이션 가속화에 따라 NAC 재조명</strong><br />\n<strong>- 2019년 ~ 2024년까지 향후 5년간 연평균 4% 성장한 22억달러 시장규모 형성</strong></p>\n<p>지니언스(263860, 대표이사 이동범)의 네트워크 접근 제어 솔루션 ‘지니안 NAC’가 세계적인 시장 조사 및 컨설팅 기업 ‘프로스트 앤 설리번(Frost &amp; Sullivan)’이 발표한 ‘글로벌 NAC 솔루션 마켓 리포트’에 등재 됐다. ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 솔루션이다. 국내 NAC 시장 1위 제품으로 2019년 조달 기준으로 전체 시장의 72%를 점유하고 있을 정도로 시장 지배력이 높다.  </p>\n<p>프로스트 앤 설리번은 IoT의 확산, IT와 OT의 융합, 클라우드로의 디지털 트랜스포메이션이 가속화에 됨에 따라 NAC가 새롭게 조명되고 시장이 빠르게 성장하고 있다고 밝혔다. 전 세계 NAC 시장은 2019년부터 향후 5년간 연평균 10.4% 성장하여 2024에는 22억달러의 시장 규모를 형성할 것으로 전망했다.</p>\n<p>반면, 802.1X 배포의 복잡성, 다양한 IoT 장비의 급증, 솔루션 비용 증가가 네트워크를 안전하게 보호하기 위해 NAC 솔루션을 도입하려는 기업에게 가장 큰 장애물이라고 지적했다. 이를 극복하기 위해 무중단 네트워크 감지 기술, 상호운용성, 온프레미스 및 클라우드를 통한 유연한 배포가 필요하다고 밝혔다.</p>\n<p>토미 마씨미니(Tony Massimini) 프로스트 앤 설리번 시니어 애널리스트는 ‘지니언스는 NAC 선도기업으로 기존 인프라의 변경이나 중단 없이 안정적으로 솔루션을 배포하고 운영할 수 있는 특징이 있다’고 밝혔다. 김계연 지니언스 미국법인장은 “전통적 접근방식으로는 더 이상 IoT 시대의 요구를 충족하기 어렵다”며 “지니언스는 클라우드 기술을 활용해 엔터프라이즈급 NAC 제품을 성공적으로 리노베이트 했다”고 밝혔다.</p>\n<p>프로스트 앤 설리번은 지니언스 NAC 제품의 주요 특장점으로 IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence) 기존 인프라의 추가 설정 없이 자동으로 신속한 설치 다 계층 동적 제어  노드 그룹핑 제로 트러스트 타 보안 솔루션과의 연동  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 유연성을 손꼽았다.</p>\n<p>아태지역에서 NAC 벤더로 등재된 기업은 지니언스가 유일하다. 지니언스는 세계적인 조사기관에 NAC가 등재됨에 따라 글로벌 비즈니스에도 탄력을 받을 것으로 기대하고 있다. 글로벌 NAC 벤더와 대등한 기술력을 인정받게 됨으로써 북미 지역에 클라우드 기반으로 구독(Subscription)형 서비스가 증가할 것으로 예상하고 있으며 아태지역의 경우 파트너 확충과 기존 고객사 윈백을 통해 성과를 창출한다는 방침이다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-NAC-%EC%86%94%EB%A3%A8%EC%85%98-%EA%B0%9C%EB%85%90%EB%8F%84.png?width=900&amp;height=919&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-NAC-%EC%86%94%EB%A3%A8%EC%85%98-%EA%B0%9C%EB%85%90%EB%8F%84.png\ </p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=101156\">[컴퓨터월드]지니언스 ‘지니안 NAC’, 프로스트 앤 설리번 글로벌 마켓 리포트 등재</a></p>", "body_text": "**- 글로벌 NAC 벤더와 대등한 기술력 입증, 아태지역에서 유일하게 등재**  \n**- IoT, OT, 클라우드, 디지털 트랜스포메이션 가속화에 따라 NAC 재조명**  \n**- 2019년 ~ 2024년까지 향후 5년간 연평균 4% 성장한 22억달러 시장규모 형성**\n\n지니언스(263860, 대표이사 이동범)의 네트워크 접근 제어 솔루션 ‘지니안 NAC...", "full_text": "**- 글로벌 NAC 벤더와 대등한 기술력 입증, 아태지역에서 유일하게 등재**  \n**- IoT, OT, 클라우드, 디지털 트랜스포메이션 가속화에 따라 NAC 재조명**  \n**- 2019년 ~ 2024년까지 향후 5년간 연평균 4% 성장한 22억달러 시장규모 형성**\n\n지니언스(263860, 대표이사 이동범)의 네트워크 접근 제어 솔루션 ‘지니안 NAC’가 세계적인 시장 조사 및 컨설팅 기업 ‘프로스트 앤 설리번(Frost & Sullivan)’이 발표한 ‘글로벌 NAC 솔루션 마켓 리포트’에 등재 됐다. ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 솔루션이다. 국내 NAC 시장 1위 제품으로 2019년 조달 기준으로 전체 시장의 72%를 점유하고 있을 정도로 시장 지배력이 높다.  \n  \n프로스트 앤 설리번은 IoT의 확산, IT와 OT의 융합, 클라우드로의 디지털 트랜스포메이션이 가속화에 됨에 따라 NAC가 새롭게 조명되고 시장이 빠르게 성장하고 있다고 밝혔다. 전 세계 NAC 시장은 2019년부터 향후 5년간 연평균 10.4% 성장하여 2024에는 22억달러의 시장 규모를 형성할 것으로 전망했다.\n\n반면, 802.1X 배포의 복잡성, 다양한 IoT 장비의 급증, 솔루션 비용 증가가 네트워크를 안전하게 보호하기 위해 NAC 솔루션을 도입하려는 기업에게 가장 큰 장애물이라고 지적했다. 이를 극복하기 위해 무중단 네트워크 감지 기술, 상호운용성, 온프레미스 및 클라우드를 통한 유연한 배포가 필요하다고 밝혔다.\n\n토미 마씨미니(Tony Massimini) 프로스트 앤 설리번 시니어 애널리스트는 ‘지니언스는 NAC 선도기업으로 기존 인프라의 변경이나 중단 없이 안정적으로 솔루션을 배포하고 운영할 수 있는 특징이 있다’고 밝혔다. 김계연 지니언스 미국법인장은 “전통적 접근방식으로는 더 이상 IoT 시대의 요구를 충족하기 어렵다”며 “지니언스는 클라우드 기술을 활용해 엔터프라이즈급 NAC 제품을 성공적으로 리노베이트 했다”고 밝혔다.\n\n프로스트 앤 설리번은 지니언스 NAC 제품의 주요 특장점으로 IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence) 기존 인프라의 추가 설정 없이 자동으로 신속한 설치 다 계층 동적 제어  노드 그룹핑 제로 트러스트 타 보안 솔루션과의 연동  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 유연성을 손꼽았다.\n\n아태지역에서 NAC 벤더로 등재된 기업은 지니언스가 유일하다. 지니언스는 세계적인 조사기관에 NAC가 등재됨에 따라 글로벌 비즈니스에도 탄력을 받을 것으로 기대하고 있다. 글로벌 NAC 벤더와 대등한 기술력을 인정받게 됨으로써 북미 지역에 클라우드 기반으로 구독(Subscription)형 서비스가 증가할 것으로 예상하고 있으며 아태지역의 경우 파트너 확충과 기존 고객사 윈백을 통해 성과를 창출한다는 방침이다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-NA idxno=101156)"}, {"title": "[CEO 인터뷰] 코로나19 위기일수록 전 산업 보안 강화 필요", "date": "2020.05.18", "link": "https://www.genians.co.kr/pr-room/press/ceo-인터뷰-코로나19-위기일수록-전-산업-보안-강화-필요", "category": "기타 뉴스", "body_html": "<p>지니언스 1분기 실적이 5월15일(금)에 공시되었고 실적 관련 내용이 기사화 되었습니다. 실적 특성 및 성장요인은 아래와 같습니다.</p>\n<p>-  과거의 시즈널 이펙트를 타파하고 40%라는 고성장을 기록</p>\n<p>-  2019년 하반기부터 솔루션 사전 제안 및 고객 컨설팅을 통해 1분기 수요 증가</p>\n<p>-  NAC, EDR 등 사업 전 부분의 기술력이 국내 경쟁사 대비 월등하고 글로벌 기업과도 대등</p>\n<ul>\n<li>코로나 19로 인한 원격/재택 근무에 따른 보안 수준 강화로 NAC 및 EDR 도입 증가</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-1.jpg?width=569&amp;height=166&amp;name=%EC%BA%A1%EC%B2%98-1.jpg\" /></p>\n<p><a href=\"https://www.etnews.com/20200518000111\">[전자신문] 지니언스, 매출 40% 증가…\"NAC 호조에 EDR 시장 선점\"</a></p>", "body_text": "지니언스 1분기 실적이 5월15일(금)에 공시되었고 실적 관련 내용이 기사화 되었습니다. 실적 특성 및 성장요인은 아래와 같습니다.\n\n-  과거의 시즈널 이펙트를 타파하고 40%라는 고성장을 기록\n\n-  2019년 하반기부터 솔루션 사전 제안 및 고객 컨설팅을 통해 1분기 수요 증가\n\n-  NAC, EDR 등 사업 전 부분의 기술력이 국내 경쟁사 대비 월등...", "full_text": "지니언스 1분기 실적이 5월15일(금)에 공시되었고 실적 관련 내용이 기사화 되었습니다. 실적 특성 및 성장요인은 아래와 같습니다.\n\n-  과거의 시즈널 이펙트를 타파하고 40%라는 고성장을 기록\n\n-  2019년 하반기부터 솔루션 사전 제안 및 고객 컨설팅을 통해 1분기 수요 증가\n\n-  NAC, EDR 등 사업 전 부분의 기술력이 국내 경쟁사 대비 월등하고 글로벌 기업과도 대등\n\n- 코로나 19로 인한 원격/재택 근무에 따른 보안 수준 강화로 NAC 및 EDR 도입 증가\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-1.jpg?width=569&height=166&name=%EC%BA%A1%EC%B2%98-1.jpg)\n\n[[전자신문] 지니언스, 매출 40% 증가…\"NAC 호조에 EDR 시장 선점\"](https://www.etnews.com/20200518000111)"}, {"title": "[CEO 인터뷰] 코로나19 위기일수록 전 산업 보안 강화 필요", "date": "2020.05.18", "link": "https://www.genians.co.kr/pr-room/press/지니언스-매출-40-증가nac-호조에-edr-시장-선점", "category": "기타 뉴스", "body_html": "<p>이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 보안 뉴스와 단독 인터뷰를 진행하였습니다. 보안 산업의 건전한 발전과 스타트업 육성 등 다양한 산업 진흥책을 피력하였습니다. 기사 전문은 아래 링크를 참고 부탁드립니다.</p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=88163&amp;kind=\">[보안뉴스] KISIA 이동범 회장 “코로나19 위기일수록 전 산업
