니다. EDR의 특성상 기술지원이 필수적인 상황에서 코로나로 인한 글로벌 기업들의 기술지원이 원활하지 않아 국내 기업의 선호가 높아졌다는 내용입니다. 특히, 지니언스는 1분기에 9곳의 EDR 신규 고객을 확보하였으며 2분기 금융권 시장에서도 선전할 것으로 기대되고 있...", "full_text": "지난  1분기 EDR 시장에서 지니언스 등 국내 업체가 우위를 점했다는 내용이 기사화 되었습니다. EDR의 특성상 기술지원이 필수적인 상황에서 코로나로 인한 글로벌 기업들의 기술지원이 원활하지 않아 국내 기업의 선호가 높아졌다는 내용입니다. 특히, 지니언스는 1분기에 9곳의 EDR 신규 고객을 확보하였으며 2분기 금융권 시장에서도 선전할 것으로 기대되고 있습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/I_E-Jul-22-2022-03-30-40-02-AM.jpg?width=2362&height=2362&name=I_E-Jul-22-2022-03-30-40-02-AM.jpg)\n\n[[CEO스코어데일리] 해외업체 빠진 1분기 EDR 시장, 안랩·지니언스 등 국내 기업 우세](http://www.ceoscoredaily.com/news/article.html?no=69157)"}, {"title": "[CEO 기고] 제로 트러스트 네트워크 보안 시대…언택트 환경에서 보안 산업 ‘재조명’", "date": "2020.04.28", "link": "https://www.genians.co.kr/pr-room/press/ceo-기고-제로-트러스트-네트워크-보안-시대언택트", "category": "기타 뉴스", "body_html": "<p>이동범 지니언스 대표가 '코로나 이후 정보보호 변화와 방향성'대해 데일리시큐에 기고하였습니다.  아래는 기고 전문 및 기사 내용 링크 입니다.</p>\n<p><strong>제로 트러스트 네트워크 보안 시대…언택트 환경에서 보안 산업 ‘재조명’</strong></p>\n<p><strong>이동범 지니언스 대표</strong>  </p>\n<p>아이러니 하게도 코로나19 사태는 재택근무, 원격교육을 촉발시켰으며 디지털 트랜스포메이션을 기업뿐 아니라 전 사회로 확산시켰다. 코로나19 사태로 인한 경기 침체는 우려되지만 우리 사회의 업무 환경이나 사무 환경은 언택트 환경으로 급속도로 전환될 전망이다. 언택트 환경은 무엇보다도 보안이 중요하게 된다. 화상회의 솔루션 ‘줌(Zoom)’의 보안 이슈가 단적인 사례다. 사용자도 단말도 데이터도 절대 신뢰와 안전을 보증할 수 없는 상황에서 피해가 급속도로 퍼지고 있다. 하루 2억명이 원격 접속 하면서 보안 취약점이 속속 드러나 전 세계 해커들의 놀이터가 되고 있는 것이다. 물론, 발 빠른 패치 제공 및 문제 해결로 초기보다는 보안성이 계속 향상되고 있다.  ‘줌’ 보안 이슈는 언택트 환경에서 보안은 예전보다 훨씬 중요하다는 것을 방증하고 있으며 보안 산업은 다시 크게 부상할 것으로 예상된다.</p>\n<p>지금까지 우리는 IT 환경을 안전하고 신뢰될 수 있는 내부와, 위험하고 신뢰할 수 없는 외부로 구분했다. 보안의 기본은 외부에서 내부로 가해지는 위협을 차단하는 방어위주의 전략이었다. 이제 한계에 도달했다. IT 인프라와 데이터는 내부에만 머무르지 않는다. 물리적 경계는 의미가 없으며 시간의 제약도 사라졌다. 사용자도 단말도 데이터도 절대 신뢰와 안전을 보증할 수 없는 Anytime, Anywhere, AnyDevice 의 시대로 빠르게 바뀌고 있다. 이러한 변화 속에서 과거 IP 기반(영역기반)의 보안 모델은 힘을 잃어 가고 있다. 여전이 일부 영역에는 의미가 있겠으나 전체 IT 환경을 위한 보안 모델로는 부적합 할 수 밖에 없다.</p>\n<p>바야흐로 ZTNA(Zero Trust Network Access)를 실현해야 한다. IP 중심의 접근 통제가 아닌 데이터/서비스 중심의 접근 중심이 강조되는 시기이다. 이번 코로나19 사태로 우리 사회의 업무 환경에 대한 변화가 불가피하다. 변화를 받아들이는 가운데 낡은 보안 모델을 다시 돌아보자. 새롭고 미래 환경에 대응할 수 있는 더 생산적이고, 더 신뢰할 수 있는 보안 체계로 이전하는 계기가 되었으면 하는 바램이다.</p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=108232\">[데일리시큐] [코로나19 이후, 정보보호 변화와 방향성] 보안기업 대표 13인의 생각들</a></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1-1.jpg?width=836&amp;height=1170&amp;name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1-1.jpg\" /></p>", "body_text": "이동범 지니언스 대표가 '코로나 이후 정보보호 변화와 방향성'대해 데일리시큐에 기고하였습니다.  아래는 기고 전문 및 기사 내용 링크 입니다.\n\n**제로 트러스트 네트워크 보안 시대…언택트 환경에서 보안 산업 ‘재조명’**\n\n**이동범 지니언스 대표**  \n   \n 아이러니 하게도 코로나19 사태는 재택근무, 원격교육을 촉발시켰으며 디지털 트랜스포메이션을 ...", "full_text": "이동범 지니언스 대표가 '코로나 이후 정보보호 변화와 방향성'대해 데일리시큐에 기고하였습니다.  아래는 기고 전문 및 기사 내용 링크 입니다.\n\n**제로 트러스트 네트워크 보안 시대…언택트 환경에서 보안 산업 ‘재조명’**\n\n**이동범 지니언스 대표**  \n   \n 아이러니 하게도 코로나19 사태는 재택근무, 원격교육을 촉발시켰으며 디지털 트랜스포메이션을 기업뿐 아니라 전 사회로 확산시켰다. 코로나19 사태로 인한 경기 침체는 우려되지만 우리 사회의 업무 환경이나 사무 환경은 언택트 환경으로 급속도로 전환될 전망이다. 언택트 환경은 무엇보다도 보안이 중요하게 된다. 화상회의 솔루션 ‘줌(Zoom)’의 보안 이슈가 단적인 사례다. 사용자도 단말도 데이터도 절대 신뢰와 안전을 보증할 수 없는 상황에서 피해가 급속도로 퍼지고 있다. 하루 2억명이 원격 접속 하면서 보안 취약점이 속속 드러나 전 세계 해커들의 놀이터가 되고 있는 것이다. 물론, 발 빠른 패치 제공 및 문제 해결로 초기보다는 보안성이 계속 향상되고 있다.  ‘줌’ 보안 이슈는 언택트 환경에서 보안은 예전보다 훨씬 중요하다는 것을 방증하고 있으며 보안 산업은 다시 크게 부상할 것으로 예상된다.\n\n지금까지 우리는 IT 환경을 안전하고 신뢰될 수 있는 내부와, 위험하고 신뢰할 수 없는 외부로 구분했다. 보안의 기본은 외부에서 내부로 가해지는 위협을 차단하는 방어위주의 전략이었다. 이제 한계에 도달했다. IT 인프라와 데이터는 내부에만 머무르지 않는다. 물리적 경계는 의미가 없으며 시간의 제약도 사라졌다. 사용자도 단말도 데이터도 절대 신뢰와 안전을 보증할 수 없는 Anytime, Anywhere, AnyDevice 의 시대로 빠르게 바뀌고 있다. 이러한 변화 속에서 과거 IP 기반(영역기반)의 보안 모델은 힘을 잃어 가고 있다. 여전이 일부 영역에는 의미가 있겠으나 전체 IT 환경을 위한 보안 모델로는 부적합 할 수 밖에 없다.\n\n바야흐로 ZTNA(Zero Trust Network Access)를 실현해야 한다. IP 중심의 접근 통제가 아닌 데이터/서비스 중심의 접근 중심이 강조되는 시기이다. 이번 코로나19 사태로 우리 사회의 업무 환경에 대한 변화가 불가피하다. 변화를 받아들이는 가운데 낡은 보안 모델을 다시 돌아보자. 새롭고 미래 환경에 대응할 수 있는 더 생산적이고, 더 신뢰할 수 있는 보안 체계로 이전하는 계기가 되었으면 하는 바램이다.\n\n[[데일리시큐] [코로나19 이후, 정보보호 변화와 방향성] 보안기업 대표 13인의 생각들](https://www.dailysecu.com/news/articleView.html?idxno=108232)\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1-1.jpg?width=836&height=1170&name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1-1.jpg)"}, {"title": "[CEO 기고] 미래 환경 대응 가능한 생산적인 보안 체계 필수", "date": "2020.04.14", "link": "https://www.genians.co.kr/pr-room/press/ceo-기고-미래-환경-대응-가능한-생산적인-보안-체계-필", "category": "기타 뉴스", "body_html": "<p>이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 보안 산업 발전 방향에 대해 네트워크타임즈 4월호 기고를 하였습니다. ZTNA 등 환경 변화에 맞춘 새로운 보안체계를 마련해야 한다는 내용을 중심으로 데이터 / 서비스 중심 제로 트러스트 모델을 강조하였으며 국내 보안 정책 모델의 한계인 영역중심을 타파하자는 의견을 피력하였습니다.</p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=144743\"><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1.jpg?width=667&amp;height=934&amp;name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1.jpg\" /></a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=144743\">[데이터넷] “미래 환경 대응 가능한 생산적인 보안 체계 필수”</a></p>", "body_text": "이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 보안 산업 발전 방향에 대해 네트워크타임즈 4월호 기고를 하였습니다. ZTNA 등 환경 변화에 맞춘 새로운 보안체계를 마련해야 한다는 내용을 중심으로 데이터 / 서비스 중심 제로 트러스트 모델을 강조하였으며 국내 보안 정책 모델의 한계인 영역중심을 타파하자는 의견을 피력하였습니다.\n\n[!...", "full_text": "이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 보안 산업 발전 방향에 대해 네트워크타임즈 4월호 기고를 하였습니다. ZTNA 등 환경 변화에 맞춘 새로운 보안체계를 마련해야 한다는 내용을 중심으로 데이터 / 서비스 중심 제로 트러스트 모델을 강조하였으며 국내 보안 정책 모델의 한계인 영역중심을 타파하자는 의견을 피력하였습니다.\n\n[![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1.jpg?width=667&height=934&name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-2-scaled-1.jpg)](http://www.datanet.co.kr/news/articleView.html?idxno=144743)\n\n[[데이터넷] “미래 환경 대응 가능한 생산적인 보안 체계 필수”](http://www.datanet.co.kr/news/articleView.html?idxno=144743)"}, {"title": "지니언스, 하이트진로에 EDR솔루션 공급…악성코드・이상행위 통합관리", "date": "2020.04.14", "link": "https://www.genians.co.kr/pr-room/press/지니언스-하이트진로에-edr솔루션-공급악성코드-", "category": "EDR", "body_html": "<p><strong>지니언스, 하이트진로에 EDR솔루션 공급…악성코드・이상행위 통합관리</strong>  </p>\n<p>단말의 가시성을 확보하여 지능화된 공격에 자동대응<br />\n보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화</p>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 하이트진로에 EDR 솔루션을 공급했다고 밝혔다. 지난해 국내 최대 규모인 NH농협을 비롯해 산업별 대표 기업(관)의 EDR 사업을 석권한 지니언스는 올해도 전통적인 산업영역에서 포털 기업까지 사업을 수주하면서 EDR 시장의 리더십을 확고히 하고 있다.</p>\n<p>하이트진로는 ‘국내 1위를 넘어 더 넓은 세계로’라는 슬로건 아래 국내 시장뿐 아니라 글로벌 사업 다각화에도 역점을 두고 있다. 본사, 지점, 공장, 계열사를 넘어 해외법인까지 비즈니스 포인트가 넓고 다양한 시스템이 도입된 만큼 네트워크 및 엔드포인트 보안에 대한 중요성이 어느 때 보다 높아졌다.</p>\n<p>하이트진로는 네트워크에 연결되는 단말의 증가와 변종을 포함한 랜섬웨어 고도화된 위협의 탐지 및 빠른 대응을 위해 다양한 솔루션을 검토했다. 실시간으로 단말 이벤트를 수집하고 분석하여 악성코드를 탐지하고 단말 행위 분석을 통한 정보유출 방지 모니터링 시스템 구축까지 사업 범위를 설정했다.</p>\n<p>[그림] 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전 대시보드 - 악성코드와 이상행위가 통합되어 모든 위협을 관리할 수 있는 통합 모니터링 화면</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-26-48-43-AM.jpg?width=1718&amp;height=893&amp;name=1-Jul-22-2022-03-26-48-43-AM.jpg\" />2019년부터 POC 보다 한 단계 높은 인수 테스트 수준의 솔루션 성능 및 안정성 검증을 수행했다. 최종적으로 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’가 선택됐다. 이 제품은 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있다. 안티바이러스의 한계를 뛰어넘는 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.</p>\n<p>특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.</p>\n<p>하이트진로는 본사 사업장, 공장 및 지점, 물류센터 전체를 대상으로 EDR 솔루션을 도입했으며 기존 네트워크의 구성 변경 및 서비스 중단 없이 구현했다. 기존 단말(PC)에 설치되어 운영중인 Agent(업무 SW포함)와 충돌 없이 구현되고 보안 관제 운영 및 관리를 한눈에 모니터링 될 수 있도록 설계됐다.</p>\n<p>테스트 항목을 설정하고, 사전 시범 운영, 보안정책 적용을 통해 한지의 오차도 없이 시스템이 구축됐다. 2020년 1월 시작하여 2개월만인 2020년 3월 성공적으로 EDR 시스템 구축이 완료됐다. 보안 위협의 최신 기술이 적용된 만큼 악성코드의 유입과 감염뿐 아니라 취약점을 위용한 내부 확산을 탐지하고, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응할 수 있는 체계가 마련됐다.</p>\n<p>보안관리자 관점에서는 내부 자산의 가시성 확보, 내부 업무 환경 보안 강화, 사이버 공격에 대한 대응 능력 향상, 보안관리 업무의 효율성 제고 효과를 기대하고 있다.</p>\n<p>이동범 지니언스 대표는 “국내 최초로 메이저 업그레이드 된 ‘지니안 인사이츠 E V2’는 악성코드와 이상행위가 통합되어 손쉬운 관리 및 통합 모니터링이 강화됐다”며 “고객의 보안(관제)의 범위를 네트워크에서 엔드포인트까지 확장하여 글로벌 기업과의 대등한 기술력이 기반해 더 안전한 세상을 만드는데 총력을 다하겠다”고 밝혔다.</p>\n<p><a href=\"http://inthenews.co.kr/article-44967/\">[인더뉴스] 지니언스, 하이트진로에 EDR솔루션 공급…“악성코드·이상행위 통합관리”</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01600646625735792&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 하이트진로에 EDR 솔루션 공급…악성코드 등 통합관리</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/04/384596/\">[매일경제] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.newspim.com/news/view/20200413000063\">[뉴스핌] 지니언스, 하이트진로에 EDR솔루션 공급</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1882866\">[이투데이] 지니언스, 하이트진로에 EDR솔루션 공급</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020041308412232368\">[머니투데이] 지니언스, 하이트진로에 EDR 공급…\"악성코드·이상행위 관리\"</a></p>\n<p><a href=\"https://www.news1.kr/articles/?3905046\">[뉴스1] 지니언스, 하이트진로에 EDR 솔루션 공급…\"악성코드 관리\"</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=144683\">[데이터넷] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020041302109931032004&amp;ref=naver\">[디지털타임스] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=39736\">[아이티비즈] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=107792\">[데일리시큐] 지니언스, 하이트진로에 EDR솔루션 공급 완료…60여 개 EDR 고객 확보</a></p>\n<p><a href=\"https://www.etnews.com/20200413000129\">[전자신문] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=194194\">[디지털데일리] 지니언스, 하이트진로에 EDR 공급··· “가시성 확보로 공격에 자동대응”</a></p>\n<p><a href=\"https://www.zdnet.co.kr/view/?no=20200413101635\">[지디넷] 지니언스, 하이트진로에 EDR 공급</a></p>\n<p><a href=\"http://www.inews24.com/view/1257386\">[아이뉴스24] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://itbiznews.com/news/newsview.php?ncode=1065571116184152\">[IT비즈뉴스] 지니언스, 하이트진로 ‘IT인프라’ 확장 프로젝트에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/04/13/2020041301838.html\">[IT조선] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.ciokorea.com/news/149901\">[CIO KOREA] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/149900\">[ITWORLD] 지니언스, 하이트진로에 EDR 솔루션 공급</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=87557&amp;kind=\">[보안뉴스] 지니언스, 하이트진로에 EDR솔루션 공급... 악성코드·이상행위 통합관리</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=100708\">[IT DAILY]지니언스, 하이트진로에 ‘지니안 인사이츠E’ 공급</a></p>", "body_text": "**지니언스, 하이트진로에 EDR솔루션 공급…악성코드・이상행위 통합관리**  \n  \n단말의 가시성을 확보하여 지능화된 공격에 자동대응  \n보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 하이트진로에 EDR 솔루션을 공급했다고 밝혔다. 지난해 국내 최대 규모인 NH농협을 비롯해...", "full_text": "**지니언스, 하이트진로에 EDR솔루션 공급…악성코드・이상행위 통합관리**  \n  \n단말의 가시성을 확보하여 지능화된 공격에 자동대응  \n보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 하이트진로에 EDR 솔루션을 공급했다고 밝혔다. 지난해 국내 최대 규모인 NH농협을 비롯해 산업별 대표 기업(관)의 EDR 사업을 석권한 지니언스는 올해도 전통적인 산업영역에서 포털 기업까지 사업을 수주하면서 EDR 시장의 리더십을 확고히 하고 있다.\n\n하이트진로는 ‘국내 1위를 넘어 더 넓은 세계로’라는 슬로건 아래 국내 시장뿐 아니라 글로벌 사업 다각화에도 역점을 두고 있다. 본사, 지점, 공장, 계열사를 넘어 해외법인까지 비즈니스 포인트가 넓고 다양한 시스템이 도입된 만큼 네트워크 및 엔드포인트 보안에 대한 중요성이 어느 때 보다 높아졌다.\n\n하이트진로는 네트워크에 연결되는 단말의 증가와 변종을 포함한 랜섬웨어 고도화된 위협의 탐지 및 빠른 대응을 위해 다양한 솔루션을 검토했다. 실시간으로 단말 이벤트를 수집하고 분석하여 악성코드를 탐지하고 단말 행위 분석을 통한 정보유출 방지 모니터링 시스템 구축까지 사업 범위를 설정했다.\n\n[그림] 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전 대시보드 - 악성코드와 이상행위가 통합되어 모든 위협을 관리할 수 있는 통합 모니터링 화면\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-26-48-43-AM.jpg?width=1718&height=893&name=1-Jul-22-2022-03-26-48-43-AM.jpg)2019년부터 POC 보다 한 단계 높은 인수 테스트 수준의 솔루션 성능 및 안정성 검증을 수행했다. 최종적으로 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’가 선택됐다. 이 제품은 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있다. 안티바이러스의 한계를 뛰어넘는 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\n특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\n하이트진로는 본사 사업장, 공장 및 지점, 물류센터 전체를 대상으로 EDR 솔루션을 도입했으며 기존 네트워크의 구성 변경 및 서비스 중단 없이 구현했다. 기존 단말(PC)에 설치되어 운영중인 Agent(업무 SW포함)와 충돌 없이 구현되고 보안 관제 운영 및 관리를 한눈에 모니터링 될 수 있도록 설계됐다.\n\n테스트 항목을 설정하고, 사전 시범 운영, 보안정책 적용을 통해 한지의 오차도 없이 시스템이 구축됐다. 2020년 1월 시작하여 2개월만인 2020년 3월 성공적으로 EDR 시스템 구축이 완료됐다. 보안 위협의 최신 기술이 적용된 만큼 악성코드의 유입과 감염뿐 아니라 취약점을 위용한 내부 확산을 탐지하고, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응할 수 있는 체계가 마련됐다.\n\n보안관리자 관점에서는 내부 자산의 가시성 확보, 내부 업무 환경 보안 강화, 사이버 공격에 대한 대응 능력 향상, 보안관리 업무의 효율성 제고 효과를 기대하고 있다.\n\n이동범 지니언스 대표는 “국내 최초로 메이저 업그레이드 된 ‘지니안 인사이츠 E V2’는 악성코드와 이상행위가 통합되어 손쉬운 관리 및 통합 모니터링이 강화됐다”며 “고객의 보안(관제)의 범위를 네트워크에서 엔드포인트까지 확장하여 글로벌 기업과의 대등한 기술력이 기반해 더 안전한 세상을 만드는데 총력을 다하겠다”고 밝혔다.\n\n[[인더뉴스] 지니언스, 하이트진로에 EDR솔루션 공급…“악성코드·이상행위 통합관리”](http://inthenews.co.kr/article-44967/)\n\n[[이데일리] 지니언스, 하이트진로에 EDR 솔루션 공급…악성코드 등 통합관리](https://www.edaily.co.kr/news/read?newsId=01600646625735792&mediaCodeNo=257&OutLnkChk=Y)\n\n[[매일경제] 지니언스, 하이트진로에 EDR 솔루션 공급](https://www.mk.co.kr/news/stock/view/2020/04/384596/)\n\n[[뉴스핌] 지니언스, 하이트진로에 EDR솔루션 공급](http://www.newspim.com/news/view/20200413000063)\n\n[[이투데이] 지니언스, 하이트진로에 EDR솔루션 공급](http://www.etoday.co.kr/news/view/1882866)\n\n[[머니투데이] 지니언스, 하이트진로에 EDR 공급…\"악성코드·이상행위 관리\"](https://news.mt.co.kr/mtview.php?no=2020041308412232368)\n\n[[뉴스1] 지니언스, 하이트진로에 EDR 솔루션 공급…\"악성코드 관리\"](https://www.news1.kr/articles/?3905046)\n\n[[데이터넷] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.datanet.co.kr/news/articleView.html?idxno=144683)\n\n[[디지털타임스] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.dt.co.kr/contents.html?article_no=2020041302109931032004&ref=naver)\n\n[[아이티비즈] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.it-b.co.kr/news/articleView.html?idxno=39736)\n\n[[데일리시큐] 지니언스, 하이트진로에 EDR솔루션 공급 완료…60여 개 EDR 고객 확보](https://www.dailysecu.com/news/articleView.html?idxno=107792)\n\n[[전자신문] 지니언스, 하이트진로에 EDR 솔루션 공급](https://www.etnews.com/20200413000129)\n\n[[디지털데일리] 지니언스, 하이트진로에 EDR 공급··· “가시성 확보로 공격에 자동대응”](http://www.ddaily.co.kr/news/article/?no=194194)\n\n[[지디넷] 지니언스, 하이트진로에 EDR 공급](https://www.zdnet.co.kr/view/?no=20200413101635)\n\n[[아이뉴스24] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.inews24.com/view/1257386)\n\n[[IT비즈뉴스] 지니언스, 하이트진로 ‘IT인프라’ 확장 프로젝트에 EDR 솔루션 공급](http://itbiznews.com/news/newsview.php?ncode=1065571116184152)\n\n[[IT조선] 지니언스, 하이트진로에 EDR 솔루션 공급](http://it.chosun.com/site/data/html_dir/2020/04/13/2020041301838.html)\n\n[[CIO KOREA] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.ciokorea.com/news/149901)\n\n[[ITWORLD] 지니언스, 하이트진로에 EDR 솔루션 공급](http://www.itworld.co.kr/news/149900)\n\n[[보안뉴스] 지니언스, 하이트진로에 EDR솔루션 공급... 악성코드·이상행위 통합관리](https://www.boannews.com/media/view.asp?idx=87557&kind=)\n\n[[IT DAILY]지니언스, 하이트진로에 ‘지니안 인사이츠E’ 공급](http://www.itdaily.kr/news/articleView.html?idxno=100708)"}, {"title": "제로 트러스트 시대, '망분리' \"변화 필요하다\"", "date": "2020.03.31", "link": "https://www.genians.co.kr/pr-room/press/제로-트러스트-시대-망분리-변화-필요하다", "category": "기타 뉴스", "body_html": "<p>글로벌 정보보안 트렌드에 대해 이동범 지니언스 대표의 온라인 세미나의 발표 내용이 기사화 되었습니다.</p>\n<p>이동범 지니언스 대표는 “글로벌 보안 시장은 제로 트러스트 네트워크 액세스(ZTNA)를 향하고 있다. 전통적인 영역 기반 보안 정책으로 설계된 국내 공공·금융기관의 망분리 정책은 근본적인 변화가 필요하다.”고 밝혔으며 \"글로벌 보안 시장은 매우 빠른 속도로 변화하고 있는데, 국내 보안 시장은 이러한 변화를 따라가지 못한다. 국내 보안 솔루션은 사일로화 되어 통합·연동이 어렵고 경쟁력이 약하다. 국내 보안 솔루션의 경쟁력 확보를 위한 에코 시스템을 구축해야 한다”고 강조하였습니다.</p>\n<p><strong>[사이버 디펜드 매트릭스]</strong></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=144256\"><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/CDM.jpg?width=832&amp;height=443&amp;name=CDM.jpg\" /></a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=144256\">[기사원문보기- 데이터넷] “제로 트러스트 시대, ‘망분리’ 변화 필요하다”</a></p>\n<p><a href=\"https://youtu.be/h8cPksOMbJc\">[온라인 발표 영상 바로 보기] 국내외 정보보안 트렌드</a></p>", "body_text": "글로벌 정보보안 트렌드에 대해 이동범 지니언스 대표의 온라인 세미나의 발표 내용이 기사화 되었습니다.\n\n이동범 지니언스 대표는 “글로벌 보안 시장은 제로 트러스트 네트워크 액세스(ZTNA)를 향하고 있다. 전통적인 영역 기반 보안 정책으로 설계된 국내 공공·금융기관의 망분리 정책은 근본적인 변화가 필요하다.”고 밝혔으며 \"글로벌 보안 시장은 매우 빠른 속도...", "full_text": "글로벌 정보보안 트렌드에 대해 이동범 지니언스 대표의 온라인 세미나의 발표 내용이 기사화 되었습니다.\n\n이동범 지니언스 대표는 “글로벌 보안 시장은 제로 트러스트 네트워크 액세스(ZTNA)를 향하고 있다. 전통적인 영역 기반 보안 정책으로 설계된 국내 공공·금융기관의 망분리 정책은 근본적인 변화가 필요하다.”고 밝혔으며 \"글로벌 보안 시장은 매우 빠른 속도로 변화하고 있는데, 국내 보안 시장은 이러한 변화를 따라가지 못한다. 국내 보안 솔루션은 사일로화 되어 통합·연동이 어렵고 경쟁력이 약하다. 국내 보안 솔루션의 경쟁력 확보를 위한 에코 시스템을 구축해야 한다”고 강조하였습니다.\n\n**[사이버 디펜드 매트릭스]**\n\n[![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/CDM.jpg?width=832&height=443&name=CDM.jpg)](http://www.datanet.co.kr/news/articleView.html?idxno=144256)\n\n[[기사원문보기- 데이터넷] “제로 트러스트 시대, ‘망분리’ 변화 필요하다”](http://www.datanet.co.kr/news/articleView.html?idxno=144256)\n\n[[온라인 발표 영상 바로 보기] 국내외 정보보안 트렌드](https://youtu.be/h8cPksOMbJc)"}, {"title": "국내·외 정보보호 산업 이슈 및 트렌드", "date": "2020.03.26", "link": "https://www.genians.co.kr/pr-room/press/국내외-정보보호-산업-이슈-및-트렌드", "category": "기타 뉴스", "body_html": "<p>과학기술정보통신부와 한국인터넷진흥원과 함께한 '국내·외 정보보호 산업 이슈 및 트렌드' 영상입니다.<br />\n 이동범 지니언스 대표가 한국정보보호산업을 대표하여 세계 최대 보안전시회 'RSA Conference 2020'의 주요 이슈 및 최신 동향을 온라인으로 준비했습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-2.jpg?width=1190&amp;height=670&amp;name=%EC%BA%A1%EC%B2%98-2.jpg\" /></p>\n<p><a href=\"https://youtu.be/h8cPksOMbJc\">https://youtu.be/h8cPksOMbJc</a></p>", "body_text": "과학기술정보통신부와 한국인터넷진흥원과 함께한 '국내·외 정보보호 산업 이슈 및 트렌드' 영상입니다.  \n 이동범 지니언스 대표가 한국정보보호산업을 대표하여 세계 최대 보안전시회 'RSA Conference 2020'의 주요 이슈 및 최신 동향을 온라인으로 준비했습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Import...", "full_text": "과학기술정보통신부와 한국인터넷진흥원과 함께한 '국내·외 정보보호 산업 이슈 및 트렌드' 영상입니다.  \n 이동범 지니언스 대표가 한국정보보호산업을 대표하여 세계 최대 보안전시회 'RSA Conference 2020'의 주요 이슈 및 최신 동향을 온라인으로 준비했습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-2.jpg?width=1190&height=670&name=%EC%BA%A1%EC%B2%98-2.jpg)\n\n<https://youtu.be/h8cPksOMbJc>"}, {"title": "지니언스, 원격근무 정보보안 가이드라인 발표", "date": "2020.03.16", "link": "https://www.genians.co.kr/pr-room/press/지니언스-원격근무-정보보안-가이드라인-발표", "category": "기타 뉴스", "body_html": "<p>최근 코로나바이러스감염증-19(COVID-19)로 인하여 많은 기업(관)에서 재택 및 원격근무를 시행하고 있습니다.</p>\n<p>바이러스의 감염 및 확산 방지를 위한 금번 조치는 전통적인 업무 환경의 대대적인 변화를 이끌고 있습니다.</p>\n<p>집이나 회사에서도 보안 걱정 없이 근무하는 것이 화두가 되면서 각 기업들은 정보보안의 새로운 체계나 정책을 만들어 보안을 한층 강화하고 있습니다.</p>\n<p>정보보안 전문기업 지니언스(263860, 대표이사 이동범)는 재택근무 환경에서 사용자와 보안관리자에게 필요한 정보보안 가이드라인 10선을 발표하였습니다.</p>\n<p>이기종 단말, 그리고 다양한 통신방법으로 업무가 수행되어야 하는 시점에서 사용자와 관리자의 대응 방법을 일목요연하게 제시하였습니다.</p>\n<p>|  |  |  |\n|</p>", "body_text": "최근 코로나바이러스감염증-19(COVID-19)로 인하여 많은 기업(관)에서 재택 및 원격근무를 시행하고 있습니다.\n\n바이러스의 감염 및 확산 방지를 위한 금번 조치는 전통적인 업무 환경의 대대적인 변화를 이끌고 있습니다.\n\n집이나 회사에서도 보안 걱정 없이 근무하는 것이 화두가 되면서 각 기업들은 정보보안의 새로운 체계나 정책을 만들어 보안을 한층 강화하...", "full_text": "최근 코로나바이러스감염증-19(COVID-19)로 인하여 많은 기업(관)에서 재택 및 원격근무를 시행하고 있습니다.\n\n바이러스의 감염 및 확산 방지를 위한 금번 조치는 전통적인 업무 환경의 대대적인 변화를 이끌고 있습니다.\n\n집이나 회사에서도 보안 걱정 없이 근무하는 것이 화두가 되면서 각 기업들은 정보보안의 새로운 체계나 정책을 만들어 보안을 한층 강화하고 있습니다.\n\n정보보안 전문기업 지니언스(263860, 대표이사 이동범)는 재택근무 환경에서 사용자와 보안관리자에게 필요한 정보보안 가이드라인 10선을 발표하였습니다.\n\n이기종 단말, 그리고 다양한 통신방법으로 업무가 수행되어야 하는 시점에서 사용자와 관리자의 대응 방법을 일목요연하게 제시하였습니다.\n\n|  |  |  |\n|"}, {"title": "지니언스, 국내 'EDR' 북미는 '클라우드' 기반 NAC…투트랙 공략", "date": "2020.03.12", "link": "https://www.genians.co.kr/pr-room/press/지니언스-국내-edr-북미는-클라우드-기반-nac투트랙", "category": "NAC", "body_html": "<p>지니언스 신성장동력 사업인 EDR과 글로벌 비즈니스에 대한 내용이 언론에 보도되었습니다.<br />\n 지니언스는 2005년 창립이래 15년간 27%의 매출 성장률(CAGR)과 15년 동안 연속  흑자를 기록하고 있습니다.<br />\n NAC 시장의 절대 우위를 바탕으로 올해에는 제 2 도약을 위해  국내에서는 ‘EDR’ 중심으로, 북미시장에서는 '클라우드' 기반의 NAC를 공략하며 사업을 전개해 나갈 계획입니다.</p>\n<p><strong>[지니언스, 성장 포트폴리오]</strong></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-3.jpg?width=577&amp;height=334&amp;name=%EC%BA%A1%EC%B2%98-3.jpg\" />  </p>\n<p><a href=\"http://www.ceoscoredaily.com/news/article.html?no=67170\">[CEO스코어데일리] 지니언스, 국내 'EDR' 북미는 '클라우드' 기반 NAC…투트랙 공략</a></p>", "body_text": "지니언스 신성장동력 사업인 EDR과 글로벌 비즈니스에 대한 내용이 언론에 보도되었습니다.  \n 지니언스는 2005년 창립이래 15년간 27%의 매출 성장률(CAGR)과 15년 동안 연속  흑자를 기록하고 있습니다.  \n NAC 시장의 절대 우위를 바탕으로 올해에는 제 2 도약을 위해  국내에서는 ‘EDR’ 중심으로, 북미시장에서는 '클라우드' 기반의 NAC...", "full_text": "지니언스 신성장동력 사업인 EDR과 글로벌 비즈니스에 대한 내용이 언론에 보도되었습니다.  \n 지니언스는 2005년 창립이래 15년간 27%의 매출 성장률(CAGR)과 15년 동안 연속  흑자를 기록하고 있습니다.  \n NAC 시장의 절대 우위를 바탕으로 올해에는 제 2 도약을 위해  국내에서는 ‘EDR’ 중심으로, 북미시장에서는 '클라우드' 기반의 NAC를 공략하며 사업을 전개해 나갈 계획입니다.\n\n**[지니언스, 성장 포트폴리오]**\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98-3.jpg?width=577&height=334&name=%EC%BA%A1%EC%B2%98-3.jpg)  \n   \n [[CEO스코어데일리] 지니언스, 국내 'EDR' 북미는 '클라우드' 기반 NAC…투트랙 공략](http://www.ceoscoredaily.com/news/article.html?no=67170)"}, {"title": "지니언스, 글로벌 비즈니스 탄력 받는다.", "date": "2020.03.06", "link": "https://www.genians.co.kr/pr-room/press/지니언스-글로벌-비즈니스-탄력-받는다", "category": "비즈니스 & 성과", "body_html": "<ul>\n<li><strong>클라우드 네트워크 관리 1위 기업 ‘인포블록스(Inforblox)’와 기술 제휴</strong></li>\n<li><strong>독보적인 단말 탐지 및 식별기술(DPI)에 사용자 편의성 증대로 파트너 문의 잇따라</strong></li>\n<li><strong>남미, 캐나다, 인도에 신규 고객 및 파트너 확보</strong></li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/87567797_2851658984896847_8955533727337807872_o.jpg?width=770&amp;height=432&amp;name=87567797_2851658984896847_8955533727337807872_o.jpg\" /></p>\n<p>글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)의 글로벌 비즈니스가 탄력을 받고 있다. 지난해 하반기 미주・중동·유럽에 클라우드 기반 차세대 NAC를 공급한 이래 최근 기술제휴, 경쟁사 윈백, 파트너 문의가 대폭 증가하고 있는 것이다</p>\n<p>지니언스는 최근 클라우드 네트워크 관리 선두기업인 ‘인포블록스(Infoblox)’와 전략적 기술 제휴를 체결했다. 차세대 IT 보안 운영을 자동화하고 네트워크 자산을 안전하게 보호하는 것을 골자다. 지니언스의 IT/OT에 특화된 단말 식별 및 탐지 기술인 DPI(Device Platform Intelligence)를 인포블록스의 DDI 및 보안솔루션에 접목해 네트워크 에지단에서 사이버 보안을 극대화 한다는 것이다. 인포블록스는 전 세계 DDI(DNS, DHCP, IP 주소 관리) 시장 점유율 50%가 넘는 1위 기업으로 포춘 500대 기업 중 350개 기업을 포함해 8,000개 고객을 확보하고 있다.</p>\n<p>지니언스와 인포블록스는 ‘RSA 2020’ 기간 동안 공동으로 DPI기술이 접목된 클라우드 기반 차세대 NAC에 대한 고객사례와 데모 시연을 통해 업체로부터 많은 호평을 받았다. IoT 시대에 NAC에 대한 필요성과 당위성을 제시함으로써 많은 보안 벤더들이 네트워크와 앤드포인트의 가시성을 높이는 기능을 고도화 하기 위한 기술 파트너십 문의가 잇따랐다.</p>\n<p>특히, 지니언스는 뉴욕에 본사를 둔 A금융기관 캐나다 온타리오주의 지방자치단체의 성공사례를 선보이며 고객들을 통해 보다 개선된 서비스를 제안함으로써 많은 관심을 받았다. 신규로 캐나다 온타리오주의 다른 지방자치단체, 남미의 고객을 확보했으며 인도지역 파트너와 NDA 체결을 눈앞에 두고 있다.</p>\n<p>그동안 미국을 비롯한 글로벌 시장에서 NAC는 설치 및 유지보수가 어렵다는 견해가 있었다. 하지만 지니언스의 클라우드 기반 차세대 NAC는 손쉽게 고객이 체험하고 온라인으로 기술 지원을 받게 되는 환경이다. 지니언스는 미국법인 웹사이트(<a href=\"http://www.genians.com/\">www.genians.com</a>) 를 통해 무료/평가판과 온라인 지원을 제공하고 있으며 ‘RSA 2020’ 이후 가입자가 200%이상 증가하는 등 파트너사와 잠재 고객이 대폭 증가하는 추세를 기록하고 있다.</p>\n<p>김계연 지니언스 미국법인장은 “DPI 기술의 우수성이 세계 유수의 보안 서비스 기업으로부터 인정을 받았다”며 “클라우드 기반 차세대 NAC는 지니언스만 개발하는 것이 아니라 고객사와 파트너가 함께 진화하는 커뮤니케이션 플랫폼으로 자리 잡고 있어 2020년을 기점으로 다양한 고객 사례들이 나올 것”이라고 밝혔다.</p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/03/236214/\">[매일경제] 지니언스, 클라우드 네트워크 관리 1위 기업 인포블록스와 기술 제휴</a></p>\n<p><a href=\"https://www.fnnews.com/news/202003060813061312\">[파이낸셜뉴스] 지니언스, DDI 1위 업체 '인포블록스'와 기술 제휴.. 글로벌 사업 탄력</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1866394\">[이투데이]지니언스 “기술제휴ㆍ파트너 문의 등 증가…글로벌 비즈니스 탄력”</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01695766625700696&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리]지니언스, 인포블록스와 기술제휴…\"글로벌 고객사 확대\"</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020030609224861941\">[머니투데이] 지니언스, 인포블록스와 기술 제휴…\"글로벌 시장 공략\"</a></p>\n<p><a href=\"http://www.seoulfn.com/news/articleView.html?idxno=374464\">[서울파이낸스]지니언스, DDI 1위 업체 '인포블록스'와 기술 제휴···글로벌 사업 탄력</a></p>\n<p><a href=\"http://www.newsprime.co.kr/news/article/?no=496092\">[프라임경제] 지니언스, 클라우드 네트워크 기업 '인포블록스'와 기술 제휴</a></p>\n<p><a href=\"http://www.inews24.com/view/1248017\">[아이뉴스24] 지니언스·인포블록스, 네트워크 엣지 보안 기술 '협력'</a></p>\n<p><a href=\"http://www.bloter.net/archives/373584\">[블로터] 지니언스, 인포블록스와 네트워크 엣지 보안 협력</a></p>\n<p><a href=\"https://www.etnews.com/20200306000021\">[전자신문] 지니언스, 인포블록스와 네트워크 에지 보안 협력</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=143204\">[데이터넷] 지니언스·인포블록스, 글로벌 보안 시장 협공 박차</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=86820&amp;kind=\">[보안뉴스] 지니언스, 글로벌 비즈니스 탄력 받는다</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=38793\">[아이티비즈] 지니언스-인포블록스, 네트워크 에지 사이버 보안 분야 협력</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/03/06/2020030601397.html\">[IT조선] 지니언스·인포블록스 \"네트워크 보안성 높인다\"</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=106788\">[데일리시큐] 지니언스, 클라우드 네트워크 관리 1위 ‘인포블록스’와 기술제휴…글로벌 비즈니스 탄력</a></p>\n<p><a href=\"http://www.zdnet.co.kr/view/?no=20200306133143\">[지디넷] 지니언스, 인포블록스에 DPI 기술 제공</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=100219\">[ITDAILY] 지니언스, 인포블록스와 기술 제휴 등 글로벌 비즈니스 탄력</a></p>", "body_text": "* **클라우드 네트워크 관리 1위 기업 ‘인포블록스(Inforblox)’와 기술 제휴**\n* **독보적인 단말 탐지 및 식별기술(DPI)에 사용자 편의성 증대로 파트너 문의 잇따라**\n* **남미, 캐나다, 인도에 신규 고객 및 파트너 확보**\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media...", "full_text": "* **클라우드 네트워크 관리 1위 기업 ‘인포블록스(Inforblox)’와 기술 제휴**\n* **독보적인 단말 탐지 및 식별기술(DPI)에 사용자 편의성 증대로 파트너 문의 잇따라**\n* **남미, 캐나다, 인도에 신규 고객 및 파트너 확보**\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/87567797_2851658984896847_8955533727337807872_o.jpg?width=770&height=432&name=87567797_2851658984896847_8955533727337807872_o.jpg)\n\n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)의 글로벌 비즈니스가 탄력을 받고 있다. 지난해 하반기 미주・중동·유럽에 클라우드 기반 차세대 NAC를 공급한 이래 최근 기술제휴, 경쟁사 윈백, 파트너 문의가 대폭 증가하고 있는 것이다\n\n지니언스는 최근 클라우드 네트워크 관리 선두기업인 ‘인포블록스(Infoblox)’와 전략적 기술 제휴를 체결했다. 차세대 IT 보안 운영을 자동화하고 네트워크 자산을 안전하게 보호하는 것을 골자다. 지니언스의 IT/OT에 특화된 단말 식별 및 탐지 기술인 DPI(Device Platform Intelligence)를 인포블록스의 DDI 및 보안솔루션에 접목해 네트워크 에지단에서 사이버 보안을 극대화 한다는 것이다. 인포블록스는 전 세계 DDI(DNS, DHCP, IP 주소 관리) 시장 점유율 50%가 넘는 1위 기업으로 포춘 500대 기업 중 350개 기업을 포함해 8,000개 고객을 확보하고 있다.\n\n지니언스와 인포블록스는 ‘RSA 2020’ 기간 동안 공동으로 DPI기술이 접목된 클라우드 기반 차세대 NAC에 대한 고객사례와 데모 시연을 통해 업체로부터 많은 호평을 받았다. IoT 시대에 NAC에 대한 필요성과 당위성을 제시함으로써 많은 보안 벤더들이 네트워크와 앤드포인트의 가시성을 높이는 기능을 고도화 하기 위한 기술 파트너십 문의가 잇따랐다.\n\n특히, 지니언스는 뉴욕에 본사를 둔 A금융기관 캐나다 온타리오주의 지방자치단체의 성공사례를 선보이며 고객들을 통해 보다 개선된 서비스를 제안함으로써 많은 관심을 받았다. 신규로 캐나다 온타리오주의 다른 지방자치단체, 남미의 고객을 확보했으며 인도지역 파트너와 NDA 체결을 눈앞에 두고 있다.\n\n그동안 미국을 비롯한 글로벌 시장에서 NAC는 설치 및 유지보수가 어렵다는 견해가 있었다. 하지만 지니언스의 클라우드 기반 차세대 NAC는 손쉽게 고객이 체험하고 온라인으로 기술 지원을 받게 되는 환경이다. 지니언스는 미국법인 웹사이트([www.genians.com](http://www.genians.com/)) 를 통해 무료/평가판과 온라인 지원을 제공하고 있으며 ‘RSA 2020’ 이후 가입자가 200%이상 증가하는 등 파트너사와 잠재 고객이 대폭 증가하는 추세를 기록하고 있다.\n\n김계연 지니언스 미국법인장은 “DPI 기술의 우수성이 세계 유수의 보안 서비스 기업으로부터 인정을 받았다”며 “클라우드 기반 차세대 NAC는 지니언스만 개발하는 것이 아니라 고객사와 파트너가 함께 진화하는 커뮤니케이션 플랫폼으로 자리 잡고 있어 2020년을 기점으로 다양한 고객 사례들이 나올 것”이라고 밝혔다.\n\n[[매일경제] 지니언스, 클라우드 네트워크 관리 1위 기업 인포블록스와 기술 제휴](https://www.mk.co.kr/news/stock/view/2020/03/236214/)\n\n[[파이낸셜뉴스] 지니언스, DDI 1위 업체 '인포블록스'와 기술 제휴.. 글로벌 사업 탄력](https://www.fnnews.com/news/202003060813061312)\n\n[[이투데이]지니언스 “기술제휴ㆍ파트너 문의 등 증가…글로벌 비즈니스 탄력”](http://www.etoday.co.kr/news/view/1866394)\n\n[[이데일리]지니언스, 인포블록스와 기술제휴…\"글로벌 고객사 확대\"](https://www.edaily.co.kr/news/read?newsId=01695766625700696&mediaCodeNo=257&OutLnkChk=Y)\n\n[[머니투데이] 지니언스, 인포블록스와 기술 제휴…\"글로벌 시장 공략\"](https://news.mt.co.kr/mtview.php?no=2020030609224861941)\n\n[[서울파이낸스]지니언스, DDI 1위 업체 '인포블록스'와 기술 제휴···글로벌 사업 탄력](http://www.seoulfn.com/news/articleView.html?idxno=374464)\n\n[[프라임경제] 지니언스, 클라우드 네트워크 기업 '인포블록스'와 기술 제휴](http://www.newsprime.co.kr/news/article/?no=496092)\n\n[[아이뉴스24] 지니언스·인포블록스, 네트워크 엣지 보안 기술 '협력'](http://www.inews24.com/view/1248017)\n\n[[블로터] 지니언스, 인포블록스와 네트워크 엣지 보안 협력](http://www.bloter.net/archives/373584)\n\n[[전자신문] 지니언스, 인포블록스와 네트워크 에지 보안 협력](https://www.etnews.com/20200306000021)\n\n[[데이터넷] 지니언스·인포블록스, 글로벌 보안 시장 협공 박차](http://www.datanet.co.kr/news/articleView.html?idxno=143204)\n\n[[보안뉴스] 지니언스, 글로벌 비즈니스 탄력 받는다](https://www.boannews.com/media/view.asp?idx=86820&kind=)\n\n[[아이티비즈] 지니언스-인포블록스, 네트워크 에지 사이버 보안 분야 협력](http://www.it-b.co.kr/news/articleView.html?idxno=38793)\n\n[[IT조선] 지니언스·인포블록스 \"네트워크 보안성 높인다\"](http://it.chosun.com/site/data/html_dir/2020/03/06/2020030601397.html)\n\n[[데일리시큐] 지니언스, 클라우드 네트워크 관리 1위 ‘인포블록스’와 기술제휴…글로벌 비즈니스 탄력](https://www.dailysecu.com/news/articleView.html?idxno=106788)\n\n[[지디넷] 지니언스, 인포블록스에 DPI 기술 제공](http://www.zdnet.co.kr/view/?no=20200306133143)\n\n[[ITDAILY] 지니언스, 인포블록스와 기술 제휴 등 글로벌 비즈니스 탄력](http://www.itdaily.kr/news/articleView.html?idxno=100219)"}, {"title": "첨단 사이버 방역 'EDR'...알려지지 않은 공격까지 잡아낸다.", "date": "2020.03.06", "link": "https://www.genians.co.kr/pr-room/press/첨단-사이버-방역-edr-알려지지-않은-공격까지-잡아낸", "category": "EDR", "body_html": "<p>사이버 보안에서 차세대 방역체계로 EDR(Endpoint Detection and Response)이 주목받고 있다는 기사가 게재되었습니다.</p>\n<p>안티바이러스와 EDR의 특징이 소개되었으며 최근 코로나 사태에 빚대어 미지의 공격 방어, 잠복 기관도 바루 추적할 수 있는 차세대 보안기술로 소개되었습니다.</p>\n<p>지니언스가 대표 벤더로 가장 먼저 소개되었으며 올해 시장도 매우 긍정적으로 바라 보았습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.jpg?width=560&amp;height=236&amp;name=%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.jpg\" /></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020022817141780893\">[머니투데이]알려지지 않은 공격까지 잡아낸다\"…첨단 사이버 방역 'EDR</a></p>", "body_text": "사이버 보안에서 차세대 방역체계로 EDR(Endpoint Detection and Response)이 주목받고 있다는 기사가 게재되었습니다.\n\n안티바이러스와 EDR의 특징이 소개되었으며 최근 코로나 사태에 빚대어 미지의 공격 방어, 잠복 기관도 바루 추적할 수 있는 차세대 보안기술로 소개되었습니다.\n\n지니언스가 대표 벤더로 가장 먼저 소개되었으며 올해 시장... 등 고도화된 위협을 방어하기 위해서는  \n 이런 솔루션이 필요하다의 트렌드에서 올해는 클라우드, IoT 등 복잡하게 급변하는 IT 인프라를 시큐어하게 매니저먼트 할 수 있는  \n 기업들이 많이 참가했다\"고 밝혔습니다.  전체적인 통합관리, 복잡한 환경을 시큐어 하게 통합관리 해 준다는 트렌드에 대해 설명하였습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/image_from_ios-1-scaled-1.jpg?width=850&height=637&name=image_from_ios-1-scaled-1.jpg)\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/image_from_ios-scaled-1.jpg?width=849&height=637&name=image_from_ios-scaled-1.jpg)\n\n[[데일리시큐] [RSAC 2020] 이동범 회장 “해외 진출, 세일즈 파트너보다 테크니컬 파트너 먼저 찾아야](https://www.dailysecu.com/news/articleView.html?idxno=106687)"}, {"title": "[RSAC 2020] 지니언스 “클라우드 기반 차세대 NAC로 미국 공공 영업 확대”", "date": "2020.02.26", "link": "https://www.genians.co.kr/pr-room/press/rsac-2020-지니언스-클라우드-기반-차세대-nac로-미국-공공", "category": "NAC", "body_html": "<p>글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2020년 2월24일부터 28일까지 샌프란시스코에서<br />\n 개최되는 세계 최대 보안 전시회 ‘RSA 2020’에 참가합니다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는<br />\n 전 세계 보안 전문가 및 기업이 참여하여 차세대 보안의 기술과 미래를 조망합니다.</p>\n<p>지니언스가 선보이는 ‘클라우드 기반 차세대 NAC’는 클라우드・IOT・엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여<br />\n IT전체 환경을 보다 효과적으로 보호할 수 있습니다. 특화된 단말 식별 및 탐지 기술인 ‘DPI (Device Platform Intelligence)’를 통해<br />\n 네트워크에 연결된 IT자산을 실시간으로 탐지하여 식별하고 상세하게 분류하며 보안관리 및 운영을 위한 확장정보와 위협(취약성)정보를 추가로 제공합니다.</p>\n<p>김계연 지니언스 미국법인장은 “고객들이 클라우드 기반 NAC를 스스로 경험하고 구현할 수 있는 환경이 완료됐다”며<br />\n 진보된 네트워크 가시성 기술, 클라우드 기반의 유연성과 확장성, 자동화된 NAC as a Service의 경쟁 우위를 통해 글로벌 시장을 적극 공략할 것”이라고 밝혔습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/image_from_ios-scaled-1-1.jpg?width=804&amp;height=603&amp;name=image_from_ios-scaled-1-1.jpg\" /></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/87567797_2851658984896847_8955533727337807872_o-1.jpg?width=801&amp;height=449&amp;name=87567797_2851658984896847_8955533727337807872_o-1.jpg\" /></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=86636&amp;kind=\">[보안뉴스] [RSAC 2020] 지니언스 “클라우드 기반 차세대 NAC로 미국 공공 영업 확대”</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1859385\">[이투데이]지니언스, 최대 보안 전시회 RSA 2020 참가</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01781046625672488&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, <code>RSA 2020</code> 참가…클라우드 기반 차세대 NAC 소개</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=38354\">[아이티비즈]지니언스, 세계 보안 전시회 ‘RSA 2020’ 참가</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020022008582922763\">[머니투데이]지니언스, 차세대 NAC로 미국 소비자 만난다</a></p>\n<p><a href=\"http://www.inews24.com/view/1244097\">[아이뉴스24] 시큐아이·지니언스, 'RSAC 2020' 발걸음…해외 시장 공략</a></p>\n<p><a href=\"http://www.newsprime.co.kr/news/article/?no=494081\">[프라임경제]지니언스, 세계 최대 보안 전시회 'RSA 2020' 참가…글로벌 시장 공략</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=86512&amp;kind=\">[보안뉴스]지니언스, 미국에서 개최되는 보안 전시회 ‘RSA 2020’ 참가</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/144454\">[ITWORLD]지니언스, RSA 2020서 “IoT와 클라우드 시대의 새로운 보안 대처 방안 제시</a></p>\n<p><a href=\"http://www.seoulfn.com/news/articleView.html?idxno=372552\">[서울파이낸스]지니언스, 세계 최대 보안 전시회 'RSA 2020' 참가</a></p>\n<p><a href=\"http://www.ciokorea.com/news/144456\">[CIO코리아]지니언스, RSA 2020서 'IoT와 클라우드 시대의 보안 대처 방안' 제시</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/02/20/2020022002873.html\">[IT조선] 지니언스, 클라우드 기반 NAC로 'RSA2020' 향한다</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=192075\">[디지털데일리]지니언스, RSA 2020에서 차세대 NAC 선보인다</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=106625\">[데일리시큐]지니언스, 세계 최대 보안 전시회 ‘RSA 2020’ 참가</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=160347\">[CCTV뉴스]지니언스, 세계 최대 보안 전시회 ‘RSA 2020’ 참가</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=99995\">[ITDAILY] 시큐아이·지니언스, ‘RSA 2020’ 참가해 글로벌 공략 본격화</a></p>\n<p><a href=\"http://news.heraldcorp.com/view.php?ud=20200221000728\">[해럴드경제] 韓보안기업, RSA 컨퍼런스서 K-Security 알린다</a></p>", "body_text": "글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2020년 2월24일부터 28일까지 샌프란시스코에서  \n 개최되는 세계 최대 보안 전시회 ‘RSA 2020’에 참가합니다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는  \n 전 세계 보안 전문가 및 기업이 참여하여 차세대 보안의 기술과 미래를 조망합니다.\n\n지니언스가 선보이는 ...", "full_text": "글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2020년 2월24일부터 28일까지 샌프란시스코에서  \n 개최되는 세계 최대 보안 전시회 ‘RSA 2020’에 참가합니다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는  \n 전 세계 보안 전문가 및 기업이 참여하여 차세대 보안의 기술과 미래를 조망합니다.\n\n지니언스가 선보이는 ‘클라우드 기반 차세대 NAC’는 클라우드・IOT・엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여  \n IT전체 환경을 보다 효과적으로 보호할 수 있습니다. 특화된 단말 식별 및 탐지 기술인 ‘DPI (Device Platform Intelligence)’를 통해  \n 네트워크에 연결된 IT자산을 실시간으로 탐지하여 식별하고 상세하게 분류하며 보안관리 및 운영을 위한 확장정보와 위협(취약성)정보를 추가로 제공합니다.\n\n김계연 지니언스 미국법인장은 “고객들이 클라우드 기반 NAC를 스스로 경험하고 구현할 수 있는 환경이 완료됐다”며  \n 진보된 네트워크 가시성 기술, 클라우드 기반의 유연성과 확장성, 자동화된 NAC as a Service의 경쟁 우위를 통해 글로벌 시장을 적극 공략할 것”이라고 밝혔습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/image_from_ios-scaled-1-1.jpg?width=804&height=603&name=image_from_ios-scaled-1-1.jpg)\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/87567797_2851658984896847_8955533727337807872_o-1.jpg?width=801&height=449&name=87567797_2851658984896847_8955533727337807872_o-1.jpg)\n\n[[보안뉴스] [RSAC 2020] 지니언스 “클라우드 기반 차세대 NAC로 미국 공공 영업 확대”](https://www.boannews.com/media/view.asp?idx=86636&kind=)\n\n[[이투데이]지니언스, 최대 보안 전시회 RSA 2020 참가](http://www.etoday.co.kr/news/view/1859385)\n\n[[이데일리] 지니언스, `RSA 2020` 참가…클라우드 기반 차세대 NAC 소개](https://www.edaily.co.kr/news/read?newsId=01781046625672488&mediaCodeNo=257&OutLnkChk=Y)\n\n[[아이티비즈]지니언스, 세계 보안 전시회 ‘RSA 2020’ 참가](http://www.it-b.co.kr/news/articleView.html?idxno=38354)\n\n[[머니투데이]지니언스, 차세대 NAC로 미국 소비자 만난다](https://news.mt.co.kr/mtview.php?no=2020022008582922763)\n\n[[아이뉴스24] 시큐아이·지니언스, 'RSAC 2020' 발걸음…해외 시장 공략](http://www.inews24.com/view/1244097)\n\n[[프라임경제]지니언스, 세계 최대 보안 전시회 'RSA 2020' 참가…글로벌 시장 공략](http://www.newsprime.co.kr/news/article/?no=494081)\n\n[[보안뉴스]지니언스, 미국에서 개최되는 보안 전시회 ‘RSA 2020’ 참가](https://www.boannews.com/media/view.asp?idx=86512&kind=)\n\n[[ITWORLD]지니언스, RSA 2020서 “IoT와 클라우드 시대의 새로운 보안 대처 방안 제시](http://www.itworld.co.kr/news/144454)\n\n[[서울파이낸스]지니언스, 세계 최대 보안 전시회 'RSA 2020' 참가](http://www.seoulfn.com/news/articleView.html?idxno=372552)\n\n[[CIO코리아]지니언스, RSA 2020서 'IoT와 클라우드 시대의 보안 대처 방안' 제시](http://www.ciokorea.com/news/144456)\n\n[[IT조선] 지니언스, 클라우드 기반 NAC로 'RSA2020' 향한다](http://it.chosun.com/site/data/html_dir/2020/02/20/2020022002873.html)\n\n[[디지털데일리]지니언스, RSA 2020에서 차세대 NAC 선보인다](http://www.ddaily.co.kr/news/article/?no=192075)\n\n[[데일리시큐]지니언스, 세계 최대 보안 전시회 ‘RSA 2020’ 참가](https://www.dailysecu.com/news/articleView.html?idxno=106625)\n\n[[CCTV뉴스]지니언스, 세계 최대 보안 전시회 ‘RSA 2020’ 참가](http://www.cctvnews.co.kr/news/articleView.html?idxno=160347)\n\n[[ITDAILY] 시큐아이·지니언스, ‘RSA 2020’ 참가해 글로벌 공략 본격화](http://www.itdaily.kr/news/articleView.html?idxno=99995)\n\n[[해럴드경제] 韓보안기업, RSA 컨퍼런스서 K-Security 알린다](http://news.heraldcorp.com/view.php?ud=20200221000728)"}, {"title": "KISIA 이동범호 출범…\"기업 해외진출 힘 싣는다\"", "date": "2020.02.19", "link": "https://www.genians.co.kr/pr-room/press/kisia-이동범호-출범기업-해외진출-힘-싣는다", "category": "기타 뉴스", "body_html": "<p>정보보호산업의 건전한 발전과 국가산업 전반의 정보보호 수준 향상을 목표로 설립된<br />\n한국정보보호산업협회(KISIA : Korea Information Security Industry Association)는 19일 여의도 켄싱턴 호텔에서 정기총회를 개최하고<br />\n2020년 주요 사업 계획 및 신임 회장단을 선출하였습니다.</p>\n<p>이번 총회에서는 지니언스 이동범 대표가 협회장으로 선출됐습니다. 올해 창립 21주년은 맞이한 KISIA는 국내 보안 산업의 불모지에서 초석을 다졌다는 평가를 받고 있습니다.<br />\n지난 1998년 초대 ISK 김성 대표에 이어 시큐어소프트 김홍선 대표, 안철수연구소 안철수 대표, 시큐아이닷컴 오경수 대표 등 국내 보안 업계를 이끈 1세대<br />\n주역들이 대거 회장직을 역임하였습니다.</p>\n<p>제 15대 협회장으로 선임된 이동범 대표는 보안 1.5세대로 방화벽으로 출발해 VPN, NAC, EDR 분야까지 보안의 새로운 시장을 개척해 왔습니다.<br />\n현실에 안주하지 않고 끊임 없는 기술 개발과 도전으로 보안업계의 프론티어로 정평이 나 있습니다.<br />\nKISIA 수석 부회장 시절에는 정보보안산업전문위원회 위원장으로 ‘시큐리티 스타트업’을 발굴하고 투자하는 활동을 적극적으로 추진해 왔습니다.</p>\n<p>이동범 신임회장은 정보보안 산업의 건전한 생태계 조성을 최우선 목표로 삼고 보안SW의 및 유지보수 제값 받기, 글로벌 시장 개척,  스타트업 발굴 및 육성,  협회 회원사 문호 개방 및 참여 확대에 주력한다는 계획 입니다. 정부와 업계간 긴밀한 소통 창구를 마련하여 산업 육성 및 규제 완화 부문에도 회원사와 공동으로 목소리를 낸다는 방침입니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/DSC02887-1-scaled-1.jpg?width=783&amp;height=521&amp;name=DSC02887-1-scaled-1.jpg\" /></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%ED%96%89%EC%82%AC%EC%9E%A5-%EC%A0%84%EC%B2%B4-%EC%82%AC%EC%A7%842-scaled-1.jpg?width=783&amp;height=522&amp;name=%ED%96%89%EC%82%AC%EC%9E%A5-%EC%A0%84%EC%B2%B4-%EC%82%AC%EC%A7%842-scaled-1.jpg\" /></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=106610\">[데일리시큐]KISIA 제15대 회장 이동범 지니언스 대표 “스타트업 육성과 해외진출에 협회 역량 집중”</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020021917434221593\">[머니투데이]이동범 KISIA협회장 \"물리보안·스타트업으로 교류 확대\"</a></p>\n<p><a href=\"http://news1.kr/articles/?3847234\">[뉴스1] 이동범 KISIA 신임 협회장 \"스타트업 지원…기업애로 해결 주력\"</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=142627\">[데이터넷]이동범 KISIA 신임 회장 “스타트업 육성·융복합 강화로 보안산업 활성화”</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=04316486625672160&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리]이동범 KISIA 회장 \"협회 문호 개방하고, 해외진출도 적극 지원</a></p>\n<p><a href=\"https://www.etnews.com/20200219000177\">[전자신문]KISIA 이동범호 출범…\"기업 해외진출 힘 싣는다\"</a></p>\n<p><a href=\"http://www.zdnet.co.kr/view/?no=20200219181031\">[지디넷]KISIA, 보안 산업 전반으로 문호 개방\"</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=86492&amp;kind=\">[보안뉴스]이동범 지니언스 대표, 한국정보보호산업협회 15대 회장으로 선출</a></p>\n<p><a href=\"http://www.inews24.com/view/1244049\">[아이뉴스24] 이동범 KISIA \"스타트업부터 물리·융합보안까지 지원 강화\"</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=160328\">[CCTV뉴스] KISIA, 정보보호 스타트업 해외 진출 적극 지원</a></p>\n<p><a href=\"https://byline.network/2020/02/19-97/\">[바이라인네트워크] KISIA, 이동범 신임 회장 체제 출범</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2020/02/20/2020022000592.html\">[IT조선]이동범 제15대 정보보호산업협회장 \"韓 보안업계 외연 넓혀 해외 진출 돕겠다</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=192071\">[디지털데일리] 이동범 KISIA 신임 회장 “보안산업 대표 조직으로 거듭날 것”</a></p>", "body_text": "정보보호산업의 건전한 발전과 국가산업 전반의 정보보호 수준 향상을 목표로 설립된  \n한국정보보호산업협회(KISIA : Korea Information Security Industry Association)는 19일 여의도 켄싱턴 호텔에서 정기총회를 개최하고  \n2020년 주요 사업 계획 및 신임 회장단을 선출하였습니다.\n\n이번 총회에서는 지니언스 이동범 대...", "full_text": "정보보호산업의 건전한 발전과 국가산업 전반의 정보보호 수준 향상을 목표로 설립된  \n한국정보보호산업협회(KISIA : Korea Information Security Industry Association)는 19일 여의도 켄싱턴 호텔에서 정기총회를 개최하고  \n2020년 주요 사업 계획 및 신임 회장단을 선출하였습니다.\n\n이번 총회에서는 지니언스 이동범 대표가 협회장으로 선출됐습니다. 올해 창립 21주년은 맞이한 KISIA는 국내 보안 산업의 불모지에서 초석을 다졌다는 평가를 받고 있습니다.  \n지난 1998년 초대 ISK 김성 대표에 이어 시큐어소프트 김홍선 대표, 안철수연구소 안철수 대표, 시큐아이닷컴 오경수 대표 등 국내 보안 업계를 이끈 1세대  \n주역들이 대거 회장직을 역임하였습니다.\n\n제 15대 협회장으로 선임된 이동범 대표는 보안 1.5세대로 방화벽으로 출발해 VPN, NAC, EDR 분야까지 보안의 새로운 시장을 개척해 왔습니다.  \n현실에 안주하지 않고 끊임 없는 기술 개발과 도전으로 보안업계의 프론티어로 정평이 나 있습니다.  \nKISIA 수석 부회장 시절에는 정보보안산업전문위원회 위원장으로 ‘시큐리티 스타트업’을 발굴하고 투자하는 활동을 적극적으로 추진해 왔습니다.\n\n이동범 신임회장은 정보보안 산업의 건전한 생태계 조성을 최우선 목표로 삼고 보안SW의 및 유지보수 제값 받기, 글로벌 시장 개척,  스타트업 발굴 및 육성,  협회 회원사 문호 개방 및 참여 확대에 주력한다는 계획 입니다. 정부와 업계간 긴밀한 소통 창구를 마련하여 산업 육성 및 규제 완화 부문에도 회원사와 공동으로 목소리를 낸다는 방침입니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/DSC02887-1-scaled-1.jpg?width=783&height=521&name=DSC02887-1-scaled-1.jpg)\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%ED%96%89%EC%82%AC%EC%9E%A5-%EC%A0%84%EC%B2%B4-%EC%82%AC%EC%A7%842-scaled-1.jpg?width=783&height=522&name=%ED%96%89%EC%82%AC%EC%9E%A5-%EC%A0%84%EC%B2%B4-%EC%82%AC%EC%A7%842-scaled-1.jpg)\n\n[[데일리시큐]KISIA 제15대 회장 이동범 지니언스 대표 “스타트업 육성과 해외진출에 협회 역량 집중”](https://www.dailysecu.com/news/articleView.html?idxno=106610)\n\n[[머니투데이]이동범 KISIA협회장 \"물리보안·스타트업으로 교류 확대\"](https://news.mt.co.kr/mtview.php?no=2020021917434221593)\n\n[[뉴스1] 이동범 KISIA 신임 협회장 \"스타트업 지원…기업애로 해결 주력\"](http://news1.kr/articles/?3847234)\n\n[[데이터넷]이동범 KISIA 신임 회장 “스타트업 육성·융복합 강화로 보안산업 활성화”](http://www.datanet.co.kr/news/articleView.html?idxno=142627)\n\n[[이데일리]이동범 KISIA 회장 \"협회 문호 개방하고, 해외진출도 적극 지원](https://www.edaily.co.kr/news/read?newsId=04316486625672160&mediaCodeNo=257&OutLnkChk=Y)\n\n[[전자신문]KISIA 이동범호 출범…\"기업 해외진출 힘 싣는다\"](https://www.etnews.com/20200219000177)\n\n[[지디넷]KISIA, 보안 산업 전반으로 문호 개방\"](http://www.zdnet.co.kr/view/?no=20200219181031)\n\n[[보안뉴스]이동범 지니언스 대표, 한국정보보호산업협회 15대 회장으로 선출](https://www.boannews.com/media/view.asp?idx=86492&kind=)\n\n[[아이뉴스24] 이동범 KISIA \"스타트업부터 물리·융합보안까지 지원 강화\"](http://www.inews24.com/view/1244049)\n\n[[CCTV뉴스] KISIA, 정보보호 스타트업 해외 진출 적극 지원](http://www.cctvnews.co.kr/news/articleView.html?idxno=160328)\n\n[[바이라인네트워크] KISIA, 이동범 신임 회장 체제 출범](https://byline.network/2020/02/19-97/)\n\n[[IT조선]이동범 제15대 정보보호산업협회장 \"韓 보안업계 외연 넓혀 해외 진출 돕겠다](http://it.chosun.com/site/data/html_dir/2020/02/20/2020022000592.html)\n\n[[디지털데일리] 이동범 KISIA 신임 회장 “보안산업 대표 조직으로 거듭날 것”](http://www.ddaily.co.kr/news/article/?no=192071)"}, {"title": "이동범 지니언스 대표 \"올해 EDR 각광…시장선점 주력\"", "date": "2020.02.12", "link": "https://www.genians.co.kr/pr-room/press/이동범-지니언스-대표-올해-edr-각광시장선점-주력", "category": "EDR", "body_html": "<p>지니언스 이동범 대표이사가 2020 국내 보안시장의 키워드로 EDR·클라우드·OT를 피력하며 EDR시장 선점에 주력하겠다는 내용이 기사화 되었습니다.<br />\n IT 관리자 조사에서도 올해 EDR을 보안 솔루션 도입 1순위로 선택하는 등 EDR 시장이 개화되고 있는 가운데 지니언스의 활약을 기대해 주시기 바랍니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC3-e1581550345480.jpg?width=421&amp;height=655&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC3-e1581550345480.jpg\" /></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=03781846625669864&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 이동범 지니언스 대표 \"올해 EDR 각광…시장선점 주력\"</a></p>", "body_text": "지니언스 이동범 대표이사가 2020 국내 보안시장의 키워드로 EDR·클라우드·OT를 피력하며 EDR시장 선점에 주력하겠다는 내용이 기사화 되었습니다.  \n IT 관리자 조사에서도 올해 EDR을 보안 솔루션 도입 1순위로 선택하는 등 EDR 시장이 개화되고 있는 가운데 지니언스의 활약을 기대해 주시기 바랍니다.\n\n![](https://www.genians.c...", "full_text": "지니언스 이동범 대표이사가 2020 국내 보안시장의 키워드로 EDR·클라우드·OT를 피력하며 EDR시장 선점에 주력하겠다는 내용이 기사화 되었습니다.  \n IT 관리자 조사에서도 올해 EDR을 보안 솔루션 도입 1순위로 선택하는 등 EDR 시장이 개화되고 있는 가운데 지니언스의 활약을 기대해 주시기 바랍니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC3-e1581550345480.jpg?width=421&height=655&name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%A3%BC-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC3-e1581550345480.jpg)\n\n[[이데일리] 이동범 지니언스 대표 \"올해 EDR 각광…시장선점 주력\"](https://www.edaily.co.kr/news/read?newsId=03781846625669864&mediaCodeNo=257&OutLnkChk=Y)"}, {"title": "[보안 따라잡기]⑥`신종 코로나` 확산 공포…IT 바이러스는 EDR로 차단", "date": "2020.02.12", "link": "https://www.genians.co.kr/pr-room/press/보안-따라잡기신종-코로나-확산-공포it-바이러스", "category": "EDR", "body_html": "<p>엔드포인트 보안 강화 요구로 차세대 보안 솔루션 EDR이 각광을 받고 있다는 기사가 게재되었습니다.<br />\n EDR은 지난해 부터 금융 /공공 기관을 중심으로 도입이 확산되고 있으며 지니언스는 국내 최초 개발, 국내 최초 조달 등록,<br />\n 국내 최다 고객 확보로 시장을 발빠르게 선점하고 있습니다. 지니언스의 EDR 시장에서의 활약을 기대해 주시기 바랍니다.</p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01544886625668552&amp;mediaCodeNo=257&amp;OutLnkChk=Y\"><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-26-48-43-AM.jpg?width=1718&amp;height=893&amp;name=1-Jul-22-2022-03-26-48-43-AM.jpg\" />[이데일리] [보안 따라잡기]⑥<code>신종 코로나</code> 확산 공포…IT 바이러스는 EDR로 차단</a></p>", "body_text": "엔드포인트 보안 강화 요구로 차세대 보안 솔루션 EDR이 각광을 받고 있다는 기사가 게재되었습니다.  \n EDR은 지난해 부터 금융 /공공 기관을 중심으로 도입이 확산되고 있으며 지니언스는 국내 최초 개발, 국내 최초 조달 등록,  \n 국내 최다 고객 확보로 시장을 발빠르게 선점하고 있습니다. 지니언스의 EDR 시장에서의 활약을 기대해 주시기 바랍니다.\n\n...", "full_text": "엔드포인트 보안 강화 요구로 차세대 보안 솔루션 EDR이 각광을 받고 있다는 기사가 게재되었습니다.  \n EDR은 지난해 부터 금융 /공공 기관을 중심으로 도입이 확산되고 있으며 지니언스는 국내 최초 개발, 국내 최초 조달 등록,  \n 국내 최다 고객 확보로 시장을 발빠르게 선점하고 있습니다. 지니언스의 EDR 시장에서의 활약을 기대해 주시기 바랍니다.\n\n[![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/1-Jul-22-2022-03-26-48-43-AM.jpg?width=1718&height=893&name=1-Jul-22-2022-03-2 ans.co.kr/hs-fs/hubfs/Imported_Blog_Media/CTO.jpg?width=512&amp;height=512&amp;name=CTO.jpg\" /></p>\n<p>지니언스의 글로벌 시장 도전에 아낌 없는 격려를 부탁 드립니다.</p>\n<p><a href=\"http://www.bloter.net/archives/369124\">[블로터] 미국 보안 사업 4년차 지니언스, 왜 영업 보다 마케팅 강조하나</a></p>", "body_text": "김계연 지니언스 미국법인장이 글로벌 비즈니스에 대한 소회를 밝혔습니다.  \n 사업의 질 측면에서 결실을 맺고 있고 고객들이 지니언스의 클라우드 NAC를 스스로 찾아서 바로 사용할 수 있게 하는 환경을 제공하는데 주력하고 있다고 밝혔습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/CTO...", "full_text": "김계연 지니언스 미국법인장이 글로벌 비즈니스에 대한 소회를 밝혔습니다.  \n 사업의 질 측면에서 결실을 맺고 있고 고객들이 지니언스의 클라우드 NAC를 스스로 찾아서 바로 사용할 수 있게 하는 환경을 제공하는데 주력하고 있다고 밝혔습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/CTO.jpg?width=512&height=512&name=CTO.jpg)\n\n지니언스의 글로벌 시장 도전에 아낌 없는 격려를 부탁 드립니다.\n\n[[블로터] 미국 보안 사업 4년차 지니언스, 왜 영업 보다 마케팅 강조하나](http://www.bloter.net/archives/369124)"}, {"title": "지니언스, EDR로 차세대 보안의 새로운 시대 연다", "date": "2020.01.15", "link": "https://www.genians.co.kr/pr-room/press/지니언스-edr로-차세대-보안의-새로운-시대-연다", "category": "EDR", "body_html": "<p>EDR 시장을 선도해온 지니언스(263860, 대표이사 이동범)가 메이저 업그레이드된 독자 개발 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전을 출시하며 IoT·5G・AI 시대의 차세대 보안 시대를 활짝 열 전략을 발표하였습니다.</p>\n<p>글로벌 기업과의 대등한 기술력, 국내 네트워크 및 단말환경의 높은 이해, 고객사와 함께 제품의 발전 방향을 같이 하는 맞춤형 표준 기술 개발로 2020년 차세대 보안 환경의 비즈니스 혁신을 견인하겠다는 것입니다.</p>\n<p>국내외 EDR의 다양한 경쟁사가 증가하고 있지만 지니언스는 이미 글로벌 벤더와의 경쟁에서 승리하고 국내 최다 고객을 보유한 만큼 기술력에서 한발 앞서나가고 있다는 평을 듣고 있습니다. 지니언스의 EDR 솔루션인 ‘지니안 인사이츠 E ‘의 2.0 버전은 알려지거나 알려지지 않은 위협 탐지 포트폴리오를 한 단계 고도화하고 악성코드와 이상행위의 탐지가 통합되어 고객의 편의성 확대, 궁극적으로 사용자와 함께 확장하여 발전하는 솔루션으로 시장을 적극 공략한다는 계획입니다.</p>\n<p>이동범 지니언스 대표이사는 “NAC, EDR, 클라우드, OT 보안의 4개 축을 동력으로 삼아 글로벌 시장에서도 인정받는 보안 기업으로 성장할 것” 이라고 밝혔습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20200116_2.jpg?width=960&amp;height=720&amp;name=20200116_2.jpg\" /></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/01/49874/\">[매일경제] 지니언스 \"EDR로 차세대 보안 새로운 시대 열 것\"</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=03  방향을 같이 하는 맞춤...", "full_text": "EDR 시장을 선도해온 지니언스(263860, 대표이사 이동범)가 메이저 업그레이드된 독자 개발 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전을 출시하며 IoT·5G・AI 시대의 차세대 보안 시대를 활짝 열 전략을 발표하였습니다.\n\n글로벌 기업과의 대등한 기술력, 국내 네트워크 및 단말환경의 높은 이해, 고객사와 함께 제품의 발전 방향을 같이 하는 맞춤형 표준 기술 개발로 2020년 차세대 보안 환경의 비즈니스 혁신을 견인하겠다는 것입니다.\n\n국내외 EDR의 다양한 경쟁사가 증가하고 있지만 지니언스는 이미 글로벌 벤더와의 경쟁에서 승리하고 국내 최다 고객을 보유한 만큼 기술력에서 한발 앞서나가고 있다는 평을 듣고 있습니다. 지니언스의 EDR 솔루션인 ‘지니안 인사이츠 E ‘의 2.0 버전은 알려지거나 알려지지 않은 위협 탐지 포트폴리오를 한 단계 고도화하고 악성코드와 이상행위의 탐지가 통합되어 고객의 편의성 확대, 궁극적으로 사용자와 함께 확장하여 발전하는 솔루션으로 시장을 적극 공략한다는 계획입니다.\n\n이동범 지니언스 대표이사는 “NAC, EDR, 클라우드, OT 보안의 4개 축을 동력으로 삼아 글로벌 시장에서도 인정받는 보안 기업으로 성장할 것” 이라고 밝혔습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20200116_2.jpg?width=960&height=720&name=20200116_2.jpg)\n\n[[매일경제] 지니언스 \"EDR로 차세대 보안 새로운 시대 열 것\"](https://www.mk.co.kr/news/stock/view/2020/01/49874/)\n\n[[이데일리] 지니언스 \"백신 대체하는 EDR, 시장 선점 박차\"](https://www.edaily.co.kr/news/read?newsId=03398086625638048&mediaCodeNo=257&OutLnkChk=Y)\n\n[[이데일리] 지니언스 \"올해 글로벌 통합 보안 플랫폼 기업 원년](https://www.edaily.co.kr/news/read?newsId=03516166625638048&mediaCodeNo=257&OutLnkChk=Y)\n\n[[이투데이] 이동범 지니언스 대표 “EDR 사업 성장 궤도…클라우드ㆍOT 시장 진출 계획”](http://www.etoday.co.kr/news/view/1845447)\n\n[[뉴스핌] 지니언스 \"사이버공격? 블랙박스처럼 낱낱이 감시\"](http://www.newspim.com/news/view/20200115000644)\n\n[[머니투데이] \"알려지지 않은 공격도 잡아낸다\" …지니언스 \"EDR 주도하겠다](https://news.mt.co.kr/mtview.php?no=2020011511235816002)\n\n[\"](https://news.mt.co.kr/mtview.php?no=2020011511235816002)[[IT조선]지니언스, EDR 딛고 클라우드・OT까지…\"글로벌 보안 브랜드로 향한다](http://it.chosun.com/site/data/html_dir/2020/01/15/2020011502857.html)\n\n[[디지털타임스] 지니언스, EDR로 차세대 성장 동력 확보...제 2의 도약 발판](http://www.dt.co.kr/contents.html?article_no=2020011502109931032006&ref=naver)\n\n[[아이뉴스 24] 지니언스, 단말 보안 사업으로 제2도약 노린다](http://www.inews24.com/view/1235989)\n\n[[데이터넷] 지니언스, 클라우드·OT 보안 시장 진출 선언](http://www.datanet.co.kr/news/articleView.html?idxno=141545)\n\n[[지디넷] EDR 시장 개척한 지니언스, '클라우드·OT' 공략 예고](http://www.zdnet.co.kr/view/?no=20200115155928)\n\n[[아이티비즈] 지니언스 \"새로운 EDR 솔루션 퉁해 차세대 보안 시대 열겠다\"](http://www.it-b.co.kr/news/articleView.html?idxno=37228)\n\n[[디지털데일리]지니언스, EDR시장 주도권 강화··신제품 공개·“IoT, 5G, AI 적극 대응”](http://www.ddaily.co.kr/news/article/?no=190672)\n\n[[바이라인네트워크] 지니언스 “EDR 동력으로 통합 보안 플랫폼 기업 도약…다음은 클라우드·OT](https://byline.network/2020/01/15-64/)\n\n[[IT DAILY] 지니언스 “NAC·EDR 기반으로 클라우드·OT 분야 공략한다”](http://www.itdaily.kr/news/articleView.html?idxno=99437)"}, {"title": "지니언스, ‘지니안 인사이츠 E’ 2.0 버전 출시", "date": "2020.01.15", "link": "https://www.genians.co.kr/pr-room/press/지니언스-지니안-인사이츠-e-2-0-버전-출시", "category": "기타 뉴스", "body_html": "<p>국내 최초로 EDR (Endpoint Detection &amp; Response : 단말기반 지능형 위협 탐지 및 대응) 솔루션을 선보이며 시장을 선도해온 지니언스(263860, 대표이사 이동범)가 메이저 업그레이드된 독자 개발 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전을 출시 하였습니다.</p>\n<p>메이저 업그레이드 된 ‘지니안 인사이츠 E’ 2.0 버전은 EDR을 통해 기대하는 고객의 요구사항을 적극 반영한 것이 특징입니다. 분석을 위한 충분한 가시성 제공, 위협 관리의 편의성 증대, 모니터링의 고도화, 자동화 대응 등 기술 요소와 사용자의 편의성 증대가 이뤄졌습니다.</p>\n<p>이민상 지니언스 엔드포인트 보안연구개발실 상무는 “악성코드와 이상행위 탐지가 통합되고 손쉬운 관리 및 통합 모니터링이 강화되고 알려진 위협과 알려지지 않은 위협의 탐지 포트폴리오의 관리 기반이 완성됐다”며 “지니안 인사이츠 E는 앞으로도 고객과 함께 확장 발전하는 솔루션이 될 것” 이라고 밝혔습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20200116.png?width=1718&amp;height=893&amp;name=20200116.png\" /></p>\n<p><a href=\"http://www.etnews.com/20200115000209\">[전자신문] 지니언스, '지니안 인사이츠 E' 2.0 버전 출시</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=97784\">[데일리시큐] 지니언스, EDR 2.0 출시…글로벌 통합보안 플랫폼 기업으로</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/141734\">[ITworld] 지니언스, ‘지니안 인사이츠 E’ 2.0 버전 출시</a></p>\n<p><a href=\"http://news.heraldcorp.com/view.php?ud=20200115000640\">[해럴드경제] 차세대 EDR 솔루션 ‘지니안 2.0’… 지니언스, ‘제2도약’ 준비한다</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=157563\">[CCTV뉴스] 지니언스, EDR 솔루션 2.0 버전으로 4차 산업혁명 보안 시장 선점</a></p>", "body_text": "국내 최초로 EDR (Endpoint Detection & Response : 단말기반 지능형 위협 탐지 및 대응) 솔루션을 선보이며 시장을 선도해온 지니언스(263860, 대표이사 이동범)가 메이저 업그레이드된 독자 개발 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전을 출시 하였습니다.\n\n메이저 업그레이드 된 ‘지니안 인사이츠 E’ 2.0 버전은 ED...", "full_text": "국내 최초로 EDR (Endpoint Detection & Response : 단말기반 지능형 위협 탐지 및 대응) 솔루션을 선보이며 시장을 선도해온 지니언스(263860, 대표이사 이동범)가 메이저 업그레이드된 독자 개발 EDR 솔루션 ‘지니안 인사이츠 E’ 2.0 버전을 출시 하였습니다.\n\n메이저 업그레이드 된 ‘지니안 인사이츠 E’ 2.0 버전은 EDR을 통해 기대하는 고객의 요구사항을 적극 반영한 것이 특징입니다. 분석을 위한 충분한 가시성 제공, 위협 관리의 편의성 증대, 모니터링의 고도화, 자동화 대응 등 기술 요소와 사용자의 편의성 증대가 이뤄졌습니다.\n\n이민상 지니언스 엔드포인트 보안연구개발실 상무는 “악성코드와 이상행위 탐지가 통합되고 손쉬운 관리 및 통합 모니터링이 강화되고 알려진 위협과 알려지지 않은 위협의 탐지 포트폴리오의 관리 기반이 완성됐다”며 “지니안 인사이츠 E는 앞으로도 고객과 함께 확장 발전하는 솔루션이 될 것” 이라고 밝혔습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20200116.png?width=1718&height=893&name=20200116.png)\n\n[[전자신문] 지니언스, '지니안 인사이츠 E' 2.0 버전 출시](http://www.etnews.com/20200115000209)\n\n[[데일리시큐] 지니언스, EDR 2.0 출시…글로벌 통합보안 플랫폼 기업으로](https://www.dailysecu.com/news/articleView.html?idxno=97784)\n\n[[ITworld] 지니언스, ‘지니안 인사이츠 E’ 2.0 버전 출시](http://www.itworld.co.kr/news/141734)\n\n[[해럴드경제] 차세대 EDR 솔루션 ‘지니안 2.0’… 지니언스, ‘제2도약’ 준비한다](http://news.heraldcorp.com/view.php?ud=20200115000640)\n\n[[CCTV뉴스] 지니언스, EDR 솔루션 2.0 버전으로 4차 산업혁명 보안 시장 선점](http://www.cctvnews.co.kr/news/articleView.html?idxno=157563)"}, {"title": "지니언스, 한국도로공사 EDR 사업 수주", "date": "2020.01.08", "link": "https://www.genians.co.kr/pr-room/press/지니언스-한국도로공사-edr-사업-수주", "category": "EDR", "body_html": "<p>지니언스(263860, 대표이사 이동범)가 한국도로공사의 EDR (Endpoint Detection &amp; Response : 단말기반 지능형 위협 탐지 및 대응) 구축 사업을 수주하였습니다. 지니언스는 지난해 국내 최대 규모의 NH농협은행 EDR 사업 수주에 이어 공공기관의 대표 레퍼런스까지 확보하면서 EDR 초기 시장을 발빠르게 선점하고  있습니다.</p>\n<p>한국도로공사는 EDR 도입을 통해 주요 시스템에 접속하는 단말에 대한 무결성을 확보하여 대국민 서비스 질이 향상될 것으로 기대하고 있습니다. 또한, 신・변종의 악성코드에 대한 선제적 대응체계를 마련하여 대내외 연계시스템의 안정성을 확보하고 관제 범위를 단말까지 확대하여 사이버 위협에 탐지/대응의 차세대 보안 역량이 대폭 강화되는 효과를 거둬들인 다는 계획입니다.</p>\n<p>지니언스 이동범 대표이사는 “최근 보안 시장은 공격의 고도화, 지능형 위협의 증대에 따라 안티바이러스를 회피해서 공격하는 다양한 형태가 존재 한다”며 “지니언스의 EDR 솔루션은 검증된 단말안정성, 글로벌 수준의 위협탐지 역량, 국내 환경에 최적화된 기술력을 강점으로 EDR 초기 시장을 발 빠르게 선점하고 있다.”고 밝혔습니다.</p>\n<p><a h ww.genians.co.kr/pr-room/press/지니언스-edr-시장서-점유율-확대-기대", "category": "EDR", "body_html": "<p>지니언스가 EDR 시장 규모 성장으로 수혜를 입을 것이라는 하나금융투자의 보고서가 발표되었습니다.</p>\n<p>안주원 하나금융투자 연구원은 NH농협은행의 EDR 사업 수주로 지니언스가 EDR 사업에서의 성장이 기대된다고 분석하였습니다. 지니언스의 EDR은 기존 안티바이러스 제품들의 탐지율인 63.3% 보다 높은 99.47%로 우수한 악성코드 탐지율을 보유하고 있고 NAC 대비 높은 마진율로 외형성장을 견인할 것이라고 분석하였습니다.</p>\n<p>또한, 전통적인 기반 산업인 NAC 부분에서도 국내 IoT, 클라우드, 운영기술(OT) 환경의 확산과 통합 보안 플랫폼 역할로 NAC 시장을 견인하고 있어 지니언스의 꾸준한 성장이 기대된다”고 덧붙였습니다.</p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1834960\">[이투데이] 지니언스 EDR 시장서 점유율 확대 기대- 하나금융</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2019/12/1054541/?a=1\">[매일경제] [Hot-Line] \"지니언스, 네트워크 접근제어 절대 강자\"</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01459606622719504&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 통합 보안플랫폼으로 NAC 시장 견인-하나</a></p>\n<p><a href=\"http://www.nspna.com/news/?mode=view&amp;newsid=400091\">[NSP통신] 지니언스, NAC 시장 견인…꾸준한 성장 기대</a></p>\n<p><a href=\"http://www.inews24.com/view/1229638\">[아이뉴스24] [I-리포트] 지니언스, EDR 점유율 확대…네트워크 접근제어 유망-하나</a></p>\n<p><a href=\"https://view.asiae.co.kr/article/2019121710560328617\">[아시아경제] [특징주]지니언스, 15억달러 EDR 시장 선점…악성코드 탐지율 99.5% '재평가</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=02945446622719504&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리][특징주]지니언스, 보안솔루션 시장 성장 기대에 '강세'</a></p>\n<p><a href=\"http://www.newspim.com/news/view/20191217000150\">[뉴스핌] [리포트 브리핑]지니언스, '재조명이 필요한 네트워크 보안 플랫폼!'</a></p>", "body_text": "지니언스가 EDR 시장 규모 성장으로 수혜를 입을 것이라는 하나금융투자의 보고서가 발표되었습니다.\n\n안주원 하나금융투자 연구원은 NH농협은행의 EDR 사업 수주로 지니언스가 EDR 사업에서의 성장이 기대된다고 분석하였습니다. 지니언스의 EDR은 기존 안티바이러스 제품들의 탐지율인 63.3% 보다 높은 99.47%로 우수한 악성코드 탐지율을 보유하고 있고 N...", "full_text": "지니언스가 EDR 시장 규모 성장으로 수혜를 입을 것이라는 하나금융투자의 보고서가 발표되었습니다.\n\n안주원 하나금융투자 연구원은 NH농협은행의 EDR 사업 수주로 지니언스가 EDR 사업에서의 성장이 기대된다고 분석하였습니다. 지니언스의 EDR은 기존 안티바이러스 제품들의 탐지율인 63.3% 보다 높은 99.47%로 우수한 악성코드 탐지율을 보유하고 있고 NAC 대비 높은 마진율로 외형성장을 견인할 것이라고 분석하였습니다.\n\n또한, 전통적인 기반 산업인 NAC 부분에서도 국내 IoT, 클라우드, 운영기술(OT) 환경의 확산과 통합 보안 플랫폼 역할로 NAC 시장을 견인하고 있어 지니언스의 꾸준한 성장이 기대된다”고 덧붙였습니다.\n\n[[이투데이] 지니언스 EDR 시장서 점유율 확대 기대- 하나금융](http://www.etoday.co.kr/news/view/1834960)\n\n[[매일경제] [Hot-Line] \"지니언스, 네트워크 접근제어 절대 강자\"](https://www.mk.co.kr/news/stock/view/2019/12/1054541/?a=1)\n\n[[이데일리] 지니언스, 통합 보안플랫폼으로 NAC 시장 견인-하나](https://www.edaily.co.kr/news/read?newsId=01459606622719504&mediaCodeNo=257&OutLnkChk=Y)\n\n[[NSP통신] 지니언스, NAC 시장 견인…꾸준한 성장 기대](http://www.nspna.com/news/?mode=view&newsid=400091)\n\n[[아이뉴스24] [I-리포트] 지니언스, EDR 점유율 확대…네트워크 접근제어 유망-하나](http://www.inews24.com/view/1229638)\n\n[[아시아경제] [특징주]지니언스, 15억달러 EDR 시장 선점…악성코드 탐지율 99.5% '재평가](https://view.asiae.co.kr/article/2019121710560328617)\n\n[[이데일리][특징주]지니언스, 보안솔루션 시장 성장 기대에 '강세'](https://www.edaily.co.kr/news/read?newsId=02945446622719504&mediaCodeNo=257&OutLnkChk=Y)\n\n[[뉴스핌] [리포트 브리핑]지니언스, '재조명이 필요한 네트워크 보안 플랫폼!'](http://www.newspim.com/news/view/20191217000150)"}, {"title": "지니언스, 우정사업본부에 국내 최대 규모 NAC 공급", "date": "2019.12.11", "link": "https://www.genians.co.kr/pr-room/press/지니언스-우정사업본부에-국내-최대-규모-nac-공급", "category": "NAC", "body_html": "<p><strong>- 총 22억원 사업규모…4대 연기금 모두 석권 등 NAC 시장 절대 강자 위상 지속</strong><br />\n<strong>- 네트워크 가시성 확보로 효율적인 통합 운영 및 관리 체계 마련</strong><br />\n<strong>- 연동 방식의 표준화를 통해 구축의 유연성 확보</strong></p>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 총 22 억원 규모의 우정사업본부 차세대 기반망 서비스 구축 사업의 NA C 공급사업자로 선정됐다고 밝혔다. 금번 사업은 단일 공급으로는 국내 최대 규모로 지니언스는 NAC 사업의 절대강자임을 다시 한번 확인했다. 특히,  지니언스는 올해 국민연금 NAC 고도화 구축 사업 수주를 통해 국내4대 연기금에 모두 '지니안 NAC’ 를 공급하여 국내 대형 NAC 사업 모두를 석권하는 쾌거를 기록했다.</p>\n<p>우정사업본부의 차세대 기반망 서비스 구축 사업은 우정사업본부의 미래 4차산업을 대비하고 현업의 편의성 제고를 목표로 추진되며 차세대 기반망의 무중단 보장, 속도향상, 효율성 증대가 세부 과제이다.</p>\n<p>우정사업본부의 차세대 기반망의 규모와 범위가 큰 만큼 NAC 도입과 운영도 주요 이슈였다. 최신 ICT 트렌드를 반영하여, 다양한 단말, IoT 기기 등의 대규모 노드들을 효율적으로 통제할 수 있는 차세대 NAC가 필요했으며, 자동화되어 편리성이 증대된 IP 주소관리 시스템, 엔드포인트단에서 발생하는 네트워크의 다양한 식별・인증의 고도화가 요구됐다. 또한 기존 NAC와 연동된 다양한 시스템의 표준화는 물론 모든 사용자의 단말 및 사용 현황을 정보센터에서 일괄적으로 관리할 수 있는 기능이 필요했다.</p>\n<p>사업규모가 크고 대국민 서비스와 직결된 서비스인 만큼 국내 사업자 선정 과정도 치열했다. 국내 대형 통신사 모두 제안에 참여했다. NAC 부문에서는 CC 인증, 핫-스왑의 고가용성 지원, 각 청의 데이터 정보센터 통합, NAC 를 통한 보안 체계 확립, IT 자산의 식별 및 연동 지원 등이 필수적으로 요구됐다.</p>\n<p>수만 노드 이상의 대규모 아키텍처 적용 가능 여부, NAC/IP 정책과 로그 활용 방안 네트워크 장애시 백업회선을 통한 접근 통제 방안 등 모든 고객요구사항을 수용하는 유일한 솔루션으로 지니안 NAC 가 모든 통신사에서 제안을 했으며, 객관적인 기술평가(BMT)와 공정한 제안평가를 거쳐 최종적으로 지니언스의 NAC 솔루션이 우정사업본부에 공급이 됐다.</p>\n<p>‘지니안 NAC'는 네트워크 접근 제어 솔루션 시장 점유율 국내 1위 제품으로 이미 국내 및 해외에서 검증이 완료된 제품이다. 단말 플랫폼 인텔리전스 기반 IT/OT 플랫폼 정보를 제공하며 IoT, 클라우드 등 새로운 고객 업무 환경을 지원한다. 애플리케이션과 악성코드 감염 여부까지 관리하는 통합 네트워크 보안 플랫폼으로 IoT, 5G 시대를 선도하는 솔루션으로 새롭게 재조명 되고 있다.</p>\n<p>이동범 지니언스 대표이사는 \"지니언스가 보유한 NAC 구축 경험과 노하우를 총집대성하여 우정사업본부 시스템 구축을 성공적으로 완료하여 안으로는 국가 경쟁력 강화에 기여하고 밖으로는 대 국민 서비스 향상에 일익을 담당하겠다\" 며 \"NAC 1등 기업이지만 현실에 안주하지 않고 IT 트렌드를 선도하여 국내 뿐 아니라 해외 비즈니스에서 총력을 기울일 것\" 이라고 밝혔다.</p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=02361606622717536&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급</a></p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2019121113050071985\">[머니투데이] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급</a></p>\n<p><a href=\"http://biz.newdaily.co.kr/site/data/html/2019/12/11/2019121100138.html\">[뉴데일리경제] 지니언스, 우정사업본부에 22억 규모 NAC 공급</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1832943\">[이투데이] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급</a></p>\n<p><a href=\"http://www.seoulfn.com/news/articleView.html?idxno=365348\">[서울파이낸스] 지니언스, 우정사업본부에 22억원 규모 NAC 공급</a></p>\n<p><a href=\"http://news.heraldcorp.com/view.php?ud=20191211000764\">[해럴드경제] 지니언스 우본 NAC 공급 사업자 선정</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=152144\">[CCTV뉴스] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2019121102109931032007&amp;ref=naver\">[디지털타임스] 지니언스, 우정사업본부에 22억원 규모 NAC공급</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=140258\">[데이터넷] 지니언스, 우정사업본부 22억 규모 NAC 사업 수주</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=85418\">[데일리시큐]지니언스, 우정사업본부 기반망 서비스 구축사업 NAC 공급사업자로 선정</a></p>\n<p><a href=\"http://www.etnews.com/20191211000100\">[전자신문] 지니언스, 우정사업본부에 22억원 규모 NAC 공급</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=98816\">[아이티데일리] 지니언스, 우정사업본부에 NAC 솔루션 공급</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/139072\">[IDG] 지니언스, 우정사업본부의 NAC 공급업체로 선정</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=36238\">[아이티비즈] 지니언스, 우정사업본부에 22억 규모 NAC 공급</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=85130&amp;kind=\">[보안뉴스] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=85939\">[데일리시큐] 엔키’ 대표 “철저히 해커 관점에서 보안점검</a></p>\n<p><a href=\"https://byline.network/2019/12/12-69/\">[바이라인네트워크] 지니언스, 우정사업본부에 22억 규모 NAC 공급</a></p>", "body_text": "**- 총 22억원 사업규모…4대 연기금 모두 석권 등 NAC 시장 절대 강자 위상 지속**  \n **- 네트워크 가시성 확보로 효율적인 통합 운영 및 관리 체계 마련**  \n **- 연동 방식의 표준화를 통해 구축의 유연성 확보**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 총 22 억원 규모의 우정사업본부 차세대 기반망 서비스 ...", "full_text": "**- 총 22억원 사업규모…4대 연기금 모두 석권 등 NAC 시장 절대 강자 위상 지속**  \n **- 네트워크 가시성 확보로 효율적인 통합 운영 및 관리 체계 마련**  \n **- 연동 방식의 표준화를 통해 구축의 유연성 확보**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 총 22 억원 규모의 우정사업본부 차세대 기반망 서비스 구축 사업의 NA C 공급사업자로 선정됐다고 밝혔다. 금번 사업은 단일 공급으로는 국내 최대 규모로 지니언스는 NAC 사업의 절대강자임을 다시 한번 확인했다. 특히,  지니언스는 올해 국민연금 NAC 고도화 구축 사업 수주를 통해 국내4대 연기금에 모두 '지니안 NAC’ 를 공급하여 국내 대형 NAC 사업 모두를 석권하는 쾌거를 기록했다.\n\n우정사업본부의 차세대 기반망 서비스 구축 사업은 우정사업본부의 미래 4차산업을 대비하고 현업의 편의성 제고를 목표로 추진되며 차세대 기반망의 무중단 보장, 속도향상, 효율성 증대가 세부 과제이다.\n\n우정사업본부의 차세대 기반망의 규모와 범위가 큰 만큼 NAC 도입과 운영도 주요 이슈였다. 최신 ICT 트렌드를 반영하여, 다양한 단말, IoT 기기 등의 대규모 노드들을 효율적으로 통제할 수 있는 차세대 NAC가 필요했으며, 자동화되어 편리성이 증대된 IP 주소관리 시스템, 엔드포인트단에서 발생하는 네트워크의 다양한 식별・인증의 고도화가 요구됐다. 또한 기존 NAC와 연동된 다양한 시스템의 표준화는 물론 모든 사용자의 단말 및 사용 현황을 정보센터에서 일괄적으로 관리할 수 있는 기능이 필요했다.\n\n사업규모가 크고 대국민 서비스와 직결된 서비스인 만큼 국내 사업자 선정 과정도 치열했다. 국내 대형 통신사 모두 제안에 참여했다. NAC 부문에서는 CC 인증, 핫-스왑의 고가용성 지원, 각 청의 데이터 정보센터 통합, NAC 를 통한 보안 체계 확립, IT 자산의 식별 및 연동 지원 등이 필수적으로 요구됐다.\n\n수만 노드 이상의 대규모 아키텍처 적용 가능 여부, NAC/IP 정책과 로그 활용 방안 네트워크 장애시 백업회선을 통한 접근 통제 방안 등 모든 고객요구사항을 수용하는 유일한 솔루션으로 지니안 NAC 가 모든 통신사에서 제안을 했으며, 객관적인 기술평가(BMT)와 공정한 제안평가를 거쳐 최종적으로 지니언스의 NAC 솔루션이 우정사업본부에 공급이 됐다.\n\n‘지니안 NAC'는 네트워크 접근 제어 솔루션 시장 점유율 국내 1위 제품으로 이미 국내 및 해외에서 검증이 완료된 제품이다. 단말 플랫폼 인텔리전스 기반 IT/OT 플랫폼 정보를 제공하며 IoT, 클라우드 등 새로운 고객 업무 환경을 지원한다. 애플리케이션과 악성코드 감염 여부까지 관리하는 통합 네트워크 보안 플랫폼으로 IoT, 5G 시대를 선도하는 솔루션으로 새롭게 재조명 되고 있다.\n\n이동범 지니언스 대표이사는 \"지니언스가 보유한 NAC 구축 경험과 노하우를 총집대성하여 우정사업본부 시스템 구축을 성공적으로 완료하여 안으로는 국가 경쟁력 강화에 기여하고 밖으로는 대 국민 서비스 향상에 일익을 담당하겠다\" 며 \"NAC 1등 기업이지만 현실에 안주하지 않고 IT 트렌드를 선도하여 국내 뿐 아니라 해외 비즈니스에서 총력을 기울일 것\" 이라고 밝혔다.\n\n[[이데일리] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급](https://www.edaily.co.kr/news/read?newsId=02361606622717536&mediaCodeNo=257&OutLnkChk=Y)\n\n[[머니투데이] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급](https://news.mt.co.kr/mtview.php?no=2019121113050071985)\n\n[[뉴데일리경제] 지니언스, 우정사업본부에 22억 규모 NAC 공급](http://biz.newdaily.co.kr/site/data/html/2019/12/11/2019121100138.html)\n\n[[이투데이] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급](http://www.etoday.co.kr/news/view/1832943)\n\n[[서울파이낸스] 지니언스, 우정사업본부에 22억원 규모 NAC 공급](http://www.seoulfn.com/news/articleView.html?idxno=365348)\n\n[[해럴드경제] 지니언스 우본 NAC 공급 사업자 선정](http://news.heraldcorp.com/view.php?ud=20191211000764)\n\n[[CCTV뉴스] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급](http://www.cctvnews.co.kr/news/articleView.html?idxno=152144)\n\n[[디지털타임스] 지니언스, 우정사업본부에 22억원 규모 NAC공급](http://www.dt.co.kr/contents.html?article_no=2019121102109931032007&ref=naver)\n\n[[데이터넷] 지니언스, 우정사업본부 22억 규모 NAC 사업 수주](http://www.datanet.co.kr/news/articleView.html?idxno=140258)\n\n[[데일리시큐]지니언스, 우정사업본부 기반망 서비스 구축사업 NAC 공급사업자로 선정](https://www.dailysecu.com/news/articleView.html?idxno=85418)\n\n[[전자신문] 지니언스, 우정사업본부에 22억원 규모 NAC 공급](http://www.etnews.com/20191211000100)\n\n[[아이티데일리] 지니언스, 우정사업본부에 NAC 솔루션 공급](http://www.itdaily.kr/news/articleView.html?idxno=98816)\n\n[[IDG] 지니언스, 우정사업본부의 NAC 공급업체로 선정](http://www.itworld.co.kr/news/139072)\n\n[[아이티비즈] 지니언스, 우정사업본부에 22억 규모 NAC 공급](http://www.it-b.co.kr/news/articleView.html?idxno=36238)\n\n[[보안뉴스] 지니언스, 우정사업본부에 국내 최대 규모 NAC 공급](https://www.boannews.com/media/view.asp?idx=85130&kind=)\n\n[[데일리시큐] 엔키’ 대표 “철저히 해커 관점에서 보안점검](https://www.dailysecu.com/news/articleView.html?idxno=85939)\n\n[[바이라인네트워크] 지니언스, 우정사업본부에 22억 규모 NAC 공급](https://byline.network/2019/12/12-69/)"}, {"title": "지니언스 미국법인, 미주・유럽・중동에 클라우드 기반 차세대 NAC 공급", "date": "2019.11.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-미국법인-미주-유럽-중동에-클라우드", "category": "NAC", "body_html": "<ul>\n<li><strong>글로벌 기술 경쟁력 검증 완료…해외 성과 원년의 해로 자리매김</strong></li>\n<li><strong>클라우드 기반 NAC 제공으로 IT・OT・IoT환경에 최적화</strong></li>\n<li><strong>온라인 서비스 비즈니스 모델로 투자 비용 감소 및 사용자 편의성 대폭 증가</strong></li>\n</ul>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 미국을 비롯해 유럽, 중동에 클라우드 기반 차세대 NAC를 잇따라 공급하며 글로벌 비즈니스에서 성과를 기록하고 있다. 특히, ‘지니안 NAC’가 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT전체 환경을 보다 효과적으로 보호할 수 있는 솔루션으로 각광을 받으면서 글로벌 고객의 선택이 넓어진 것이다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/3.jpg?width=344&amp;height=256&amp;name=3.jpg\" /></p>\n<p>지니언스는 NAC 경쟁사가 많고 IT 분야를 선도하고 있는 미국에 NAC를 첫 공급하고 유럽과 중동까지 글로벌 레퍼런스를 확보한 만큼 향후 전 세계 지역에서 클라우드 기반 NAC의 도입이 크게 증가할 것으로 기대하고 있다.</p>\n<p>뉴욕에 본사를 둔 금융기관 A사는 급변하는 금융 IT 환경에 대응하고 네트워크에 존재하는 다양한 단말의 가시성 확보와 보안정책 준수를 목표로 지니언스 제품을 선택했다. 클라우드 기반으로 소프트웨어를 이용한 가치만큼 지불하는 서브스크립션(Subscription) 방식과 단말의 잠재적인 보안 위협을 빠르고 정확하게 해결하는 부분에서 높은 점수를 받았다.</p>\n<p>캐나다 온타리오주에 위치한 B지방자치단체는 전 IT망에 근본적인 사이버 보안의 토대를 만들고 확대하기 위해 지니언스 솔루션을 도입했다. 특히, 이 지자체는 지니언스 글로벌 웹사이트(Genians.com)에서 제공하는 체험버전을 시작으로 지니언스가 제공하는 각종 온라인 서비스를 경험 후 구독(Subscribe) 방식으로 도입했다. 기존 환경의 변화 없이 바로 도입하여 적용할 수 있다는 장점이 최종 구매로 이어졌다.</p>\n<p>유럽시장에서는 전 세계에 지사를 둔 네덜란드 기업 C사가 지니언스 제품의 체험 버전을 통해 제품의 우수성을 신속하게 확인하여 채택하였으며 중동의 D 보험사는 글로벌 NAC 제품과의 테스트를 통해 지니언스 제품의 손쉬운 설치와 유지보수, 체계적인 제품 기능 확장 부문의 우수성을 인정해 제품을 도입했다.</p>\n<p>특히, 고객들은 지니언스의 IoT와 클라우드 시대 보안 위협에 대응하는 ‘지니안 NAC’가 단말의 일반정보 및 확장정보는 물론 가시성의 확대를 통해 단말에서 발생할 수 있는 사이버 위협에 종합적이면서 효과적으로 관리될 수 있다는 측면에서 높은 점수를 줬다.</p>\n<p>지니언스의 글로벌 도전기는 지난 2016년으로 거슬러 올라간다. 미국법인 설립초기 미국 현지 시장에 맞는 제품을 만드는데 집중하였으며 경쟁사 및 철저한 시장분석을 통해 클라우드 기반의 NAC를 통해 SMB 시장을 타깃으로 비즈니스 영역을 설정했다.  제품 판매에서 기술지원까지 모두 온라인상에서 지원하여 국내 기업들의 해외 진출의 어려움 중 하나인 현지 파트너를 통한 제품 판매망을 구축하고 오프라인으로 기술 지원하는 관습을 철저히 배제 한 것이다.</p>\n<p>김계연 지니언스 미국법인장은 “철저히 현지 고객 중심으로 온라인 서비스에 초점을 맞추고 각 국가 및 산업군의 NAC 니즈에 신속하게 대응하고 있다”며 “클라우드, IoT 등 IT 환경 변화에 따라 다양한 단말의 증가로 관리의 어려움과 관리되지 않은 단말의 잠재적인 보안 위협에 신속하게 대응하고 해결하여 글로벌 비즈니스 성장에 가속도를 내겠다”고 밝혔다.</p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2019112109062568367\">[머니투데이] 지니언스 \"미국·유럽·중동서 고객 확보, NAC 시장 확대\"</a></p>\n<p><a href=\"http://www.newsprime.co.kr/news/article/?no=484045\">[프라임경제] 지니언스 미국법인, 해외 주요 지역에 '클라우드 기반 차세대 NAC' 공급</a></p>\n<p><a href=\"http://www.newspim.com/news/view/20191121000354\">[뉴스핌] 지니언스 미국법인, 미주・유럽・중동에 클라우드 기반 차세대 NAC공급</a></p>\n<p><a href=\"http://biz.newdaily.co.kr/site/data/html/2019/11/21/2019112100141.html\">[뉴데일리경제] 지니언스 美 법인, 미주・유럽・중동에 클라우드 NAC 공급</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/view/1824915\">[이투데이] 지니언스 미국 법인, 클라우드 기반 차세대 NAC 글로벌 공급</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01584246622688016&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 美·유럽·중동에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2019/11/967567/\">[매일경제] 지니언스 美법인, 클라우드 기반 차세대 NAC 글로벌 공급</a></p>\n<p><a href=\"http://www.etnews.com/20191121000038\">[전자신문] 지니언스, 미국·유럽·중동에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=98371\">[IT DAILY] 지니언스, 미국·유럽·중동에 클라우드 기반 NAC 공급</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/137150\">[IT WORLD] 지니언스, 미주·유럽·중동에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=80736\">[데일리시큐] 지니언스 미국법인, 미주-유럽-중동에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2019/11/21/2019112101199.html\">[IT조선] 지니언스 \"NAC로 미・유럽・중동 트리플 성과 기록\"</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=188590\">[디지털데일리]지니언스, 미국 등 해외에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"http://www.inews24.com/view/1223824\">[아이뉴스24] 지니언스, 미주·유럽·중동에 클라우드 NAC 솔루션 공급</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=35546\">[아이티비즈] 지니언스 미국법인, 미주ㆍ유럽ㆍ중동에 클라우드 기반 차세대 NAC공급</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=139478\">[데이터넷] 지니언스, 클라우드 차세대 NAC 해외 성과 올려</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2019112102109931032004&amp;ref=naver\">[디지털타임스] 지니언스, 미주/유럽/중동에 클라우드 기반 차세대 NAC 공급</a></p>\n<p><a href=\"http://www.zdnet.co.kr/view/?no=20191122142654\">[지디넷] 지니언스, 미국·유럽·중동에 클라우드 NAC 공급</a></p>", "body_text": "* **글로벌 기술 경쟁력 검증 완료…해외 성과 원년의 해로 자리매김**\n* **클라우드 기반 NAC 제공으로 IT・OT・IoT환경에 최적화**\n* **온라인 서비스 비즈니스 모델로 투자 비용 감소 및 사용자 편의성 대폭 증가**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 미국을 비롯해 유럽, 중동에 클라우드 기반 차세대 NAC를 ...", "full_text": "* **글로벌 기술 경쟁력 검증 완료…해외 성과 원년의 해로 자리매김**\n* **클라우드 기반 NAC 제공으로 IT・OT・IoT환경에 최적화**\n* **온라인 서비스 비즈니스 모델로 투자 비용 감소 및 사용자 편의성 대폭 증가**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 미국을 비롯해 유럽, 중동에 클라우드 기반 차세대 NAC를 잇따라 공급하며 글로벌 비즈니스에서 성과를 기록하고 있다. 특히, ‘지니안 NAC’가 클라우드, IOT, 엣지 컴퓨팅 환경에서 네트워크 가시성을 확보하여 IT전체 환경을 보다 효과적으로 보호할 수 있는 솔루션으로 각광을 받으면서 글로벌 고객의 선택이 넓어진 것이다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/3.jpg?width=344&height=256&name=3.jpg)\n\n지니언스는 NAC 경쟁사가 많고 IT 분야를 선도하고 있는 미국에 NAC를 첫 공급하고 유럽과 중동까지 글로벌 레퍼런스를 확보한 만큼 향후 전 세계 지역에서 클라우드 기반 NAC의 도입이 크게 증가할 것으로 기대하고 있다.\n\n뉴욕에 본사를 둔 금융기관 A사는 급변하는 금융 IT 환경에 대응하고 네트워크에 존재하는 다양한 단말의 가시성 확보와 보안정책 준수를 목표로 지니언스 제품을 선택했다. 클라우드 기반으로 소프트웨어를 이용한 가치만큼 지불하는 서브스크립션(Subscription) 방식과 단말의 잠재적인 보안 위협을 빠르고 정확하게 해결하는 부분에서 높은 점수를 받았다.\n\n캐나다 온타리오주에 위치한 B지방자치단체는 전 IT망에 근본적인 사이버 보안의 토대를 만들고 확대하기 위해 지니언스 솔루션을 도입했다. 특히, 이 지자체는 지니언스 글로벌 웹사이트(Genians.com)에서 제공하는 체험버전을 시작으로 지니언스가 제공하는 각종 온라인 서비스를 경험 후 구독(Subscribe) 방식으로 도입했다. 기존 환경의 변화 없이 바로 도입하여 적용할 수 있다는 장점이 최종 구매로 이어졌다.\n\n유럽시장에서는 전 세계에 지사를 둔 네덜란드 기업 C사가 지니언스 제품의 체험 버전을 통해 제품의 우수성을 신속하게 확인하여 채택하였으며 중동의 D 보험사는 글로벌 NAC 제품과의 테스트를 통해 지니언스 제품의 손쉬운 설치와 유지보수, 체계적인 제품 기능 확장 부문의 우수성을 인정해 제품을 도입했다.\n\n특히, 고객들은 지니언스의 IoT와 클라우드 시대 보안 위협에 대응하는 ‘지니안 NAC’가 단말의 일반정보 및 확장정보는 물론 가시성의 확대를 통해 단말에서 발생할 수 있는 사이버 위협에 종합적이면서 효과적으로 관리될 수 있다는 측면에서 높은 점수를 줬다.\n\n지니언스의 글로벌 도전기는 지난 2016년으로 거슬러 올라간다. 미국법인 설립초기 미국 현지 시장에 맞는 제품을 만드는데 집중하였으며 경쟁사 및 철저한 시장분석을 통해 클라우드 기반의 NAC를 통해 SMB 시장을 타깃으로 비즈니스 영역을 설정했다.  제품 판매에서 기술지원까지 모두 온라인상에서 지원하여 국내 기업들의 해외 진출의 어려움 중 하나인 현지 파트너를 통한 제품 판매망을 구축하고 오프라인으로 기술 지원하는 관습을 철저히 배제 한 것이다.\n\n김계연 지니언스 미국법인장은 “철저히 현지 고객 중심으로 온라인 서비스에 초점을 맞추고 각 국가 및 산업군의 NAC 니즈에 신속하게 대응하고 있다”며 “클라우드, IoT 등 IT 환경 변화에 따라 다양한 단말의 증가로 관리의 어려움과 관리되지 않은 단말의 잠재적인 보안 위협에 신속하게 대응하고 해결하여 글로벌 비즈니스 성장에 가속도를 내겠다”고 밝혔다.\n\n[[머니투데이] 지니언스 \"미국·유럽·중동서 고객 확보, NAC 시장 확대\"](https://news.mt.co.kr/mtview.php?no=2019112109062568367)\n\n[[프라임경제] 지니언스 미국법인, 해외 주요 지역에 '클라우드 기반 차세대 NAC' 공급](http://www.newsprime.co.kr/news/article/?no=484045)\n\n[[뉴스핌] 지니언스 미국법인, 미주・유럽・중동에 클라우드 기반 차세대 NAC공급](http://www.newspim.com/news/view/20191121000354)\n\n[[뉴데일리경제] 지니언스 美 법인, 미주・유럽・중동에 클라우드 NAC 공급](http://biz.newdaily.co.kr/site/data/html/2019/11/21/2019112100141.html)\n\n[[이투데이] 지니언스 미국 법인, 클라우드 기반 차세대 NAC 글로벌 공급](http://www.etoday.co.kr/news/view/1824915)\n\n[[이데일리] 지니언스, 美·유럽·중동에 클라우드 기반 차세대 NAC 공급](https://www.edaily.co.kr/news/read?newsId=01584246622688016&mediaCodeNo=257&OutLnkChk=Y)\n\n[[매일경제] 지니언스 美법인, 클라우드 기반 차세대 NAC 글로벌 공급](https://www.mk.co.kr/news/stock/view/2019/11/967567/)\n\n[[전자신문] 지니언스, 미국·유럽·중동에 클라우드 기반 차세대 NAC 공급](http://www.etnews.com/20191121000038)\n\n[[IT DAILY] 지니언스, 미국·유럽·중동에 클라우드 기반 NAC 공급](http://www.itdaily.kr/news/articleView.html?idxno=98371)\n\n[[IT WORLD] 지니언스, 미주·유럽·중동에 클라우드 기반 차세대 NAC 공급](http://www.itworld.co.kr/news/137150)\n\n[[데일리시큐] 지니언스 미국법인, 미주-유럽-중동에 클라우드 기반 차세대 NAC 공급](https://www.dailysecu.com/news/articleView.html?idxno=80736)\n\n[[IT조선] 지니언스 \"NAC로 미・유럽・중동 트리플 성과 기록\"](http://it.chosun.com/site/data/html_dir/2019/11/21/2019112101199.html)\n\n[[디지털데일리
