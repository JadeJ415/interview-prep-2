<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genians Press Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #0ea5e9;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.4);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            outline: none;
            width: 100%;
            max-width: 300px;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        select, button {
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            background: white;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        select:hover, button:hover {
            border-color: var(--primary-light);
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
        }
        
        button:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(255,255,255,0.6);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-muted);
        }

        .tag.active {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
            box-shadow: 0 2px 10px rgba(59,130,246,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-light);
        }

        .card-category {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
            color: var(--primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .card-snippet {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.5;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* List View Styles */
        .grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .grid.list-view .card {
            flex-direction: row;
            align-items: center;
            padding: 15px 25px;
        }

        .grid.list-view .card-category {
            flex: 0 0 120px;
            margin-bottom: 0;
        }

        .grid.list-view .card-title {
            flex: 2;
            margin-bottom: 0;
            -webkit-line-clamp: 1;
            padding-right: 20px;
        }

        .grid.list-view .card-snippet {
            flex: 3;
            margin-bottom: 0;
            -webkit-line-clamp: 1;
            padding-right: 20px;
        }

        .grid.list-view .card-date {
            flex: 0 0 100px;
            margin-bottom: 0;
            text-align: right;
        }
        
        .view-btn {
            background: white;
            color: var(--text-muted);
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .view-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .view-btn:hover:not(.active) {
            background: #f1f5f9;
        }
        
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title-wrapper {
            padding-right: 20px;
        }
        
        .modal-category {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            line-height: 1.3;
        }
        
        .modal-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .close-btn {
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #e2e8f0;
            color: var(--text-dark);
        }

        .modal-body {
            padding: 30px;
            font-size: 1rem;
            line-height: 1.7;
            color: #334155;
        }
        
        .modal-body h1, .modal-body h2, .modal-body h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: var(--text-dark);
        }
        
        .modal-body p {
            margin-bottom: 1em;
        }
        
        .modal-body ul {
            margin-bottom: 1em;
            padding-left: 20px;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
            text-align: right;
            border-radius: 0 0 20px 20px;
        }
        
        .btn-link {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        .btn-link:hover {
            background: var(--primary-light);
        }

        /* Controls Grouping */
        .controls-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .controls-row > * {
            flex: 1;
        }

        .view-btn-group {
            display: flex;
            gap: 5px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 10px;
        }
        
        .view-btn-group .view-btn {
            border: none;
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px;
            }
            .header-title {
                font-size: 1.5rem;
            }
            .header-content {
                flex-direction: column;
                gap: 10px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .controls-row {
                flex-direction: row;
            }
            input[type="text"] {
                max-width: none;
            }
            .category-tags {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 5px;
            }
            .category-tags::-webkit-scrollbar {
                height: 4px;
            }
            .category-tags::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            .tag {
                flex-shrink: 0;
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            main {
                padding: 15px 10px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 15px;
            }
            .grid.list-view .card {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 15px;
            }
            .grid.list-view .card-snippet, .grid.list-view .card-title {
                padding-right: 0;
            }
            .grid.list-view .card-category, .grid.list-view .card-date {
                flex: auto;
                text-align: left;
            }
            .modal-content {
                height: 100%;
                max-height: 100%;
                border-radius: 0;
                transform: none;
            }
            .modal-header {
                padding: 15px;
            }
            .modal-title {
                font-size: 1.2rem;
            }
            .modal-body {
                padding: 15px;
                font-size: 0.95rem;
            }
            .modal-footer {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title">Genians Press Room</div>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="검색어를 입력하세요">
                <div class="controls-row">
                    <select id="searchScope">
                        <option value="title_content">제목+내용</option>
                        <option value="title">제목만</option>
                    </select>
                    <select id="sortSelect">
                        <option value="desc">최신순</option>
                        <option value="asc">오래된순</option>
                    </select>
                </div>
                <div class="view-btn-group">
                    <button id="btnGrid" class="view-btn active">격자형</button>
                    <button id="btnList" class="view-btn">리스트형</button>
                </div>
            </div>
            <div class="category-tags" id="categoryTags">
                <!-- Tags will be injected here -->
            </div>
        </div>
    </header>

    <main>
        <div class="grid" id="articleGrid">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrapper">
                    <span class="modal-category" id="modalCategory">Category</span>
                    <h2 class="modal-title" id="modalTitle">Article Title</h2>
                    <div class="modal-date" id="modalDate">Date</div>
                </div>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content injected here -->
            </div>
            <div class="modal-footer">
                <a href="#" target="_blank" class="btn-link" id="modalLink">원문 보기</a>
            </div>
        </div>
    </div>

    <script>
        const articles = [{"title": "지니언스, 지능화된 AI 사이버 위협에 ‘보안 취약점 신고 포상제’로 선제 대응", "date": "2026.06.29", "link": "https://www.genians.co.kr/pr-room/press/20260629", "category": "AI & Cloud", "body_html": "<ul>\n<li>\n<h3>국내 보안 기업 최초 독자 운영 성과, 상반기 총 103건 접수하며 보안 사각지대 해소</h3>\n</li>\n<li>\n<h3>국제 표준 가이드 ‘CVD/VDP’ 준수, 조치 및 내용의 투명한 공개까지 프로세스 체계화</h3>\n</li>\n<li>\n<h3>글로벌 제보 창구 상시 가동 및 깃허브(Github)·CVE ID 연계로 전 세계 보안 생태계 기여</h3>\n</li>\n</ul>\n<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 2026년 상반기 자사의 ‘보안 취약점 신고 포상제’를 운영한 결과, 취약점 접수 건수가 전년 동기 대비 약 129%, 지급 포상금은 약 1,046% 증가했다고 밝혔다.</p>\n<p>이 같은 성장세는 AI 기술 대중화와 고위험 취약점 출현이 맞물린 결과다. AI 기술이 급격히 발전하면서 화이트해커들의 AI 활용도 역시 크게 높아졌다. 특히 AI를 활용해 보안 취약점을 자동으로 찾아내는 탐지 활동이 새로운 트렌드로 자리매김 하고 있다.</p>\n<p>보안 취약점 신고 포상제(이하 버그 바운티)는 소프트웨어나 웹 서비스의 보안 약점을 찾아낸 화이트해커에게 포상금을 지급하는 제도다. 최근 AI를 악용한 초고속·대규모의 지능화된 AI 위협이 일상화되면서 기존 사후 조치 중심의 정보보안 체계는 근본적인 한계에 도달했다는  평가다.</p>\n<p>단일 보안 사고가 대형 재난으로 비화되는 것을 막고 위협을 선제적으로 찾아 제거하는 능동형 상시 예방 체계로의 패러다임 전환이 시급하다. 이에 따라 보안 취약점 신고·조치·공개 제도가 필수적으로 요구되고 있다.</p>\n<p>구글·애플·아마존 등 글로벌 IT 기업들도 적극적으로 버그 바운티 프로그램을 운영하고 있다. 지니언스는 KISA가 운영중인 소프트웨어 신규 취약점 신고 포상제도의 공동운영사로 참여한 이래 지난 2022년 국내 보안 업계 최초로 독자적인 버그 바운티 프로그램을 시행했다. .</p>\n<p>최근 글로벌 주요 국가에서는 버그 바운티를 취약점 제보 정책(VDP) 및 협력적 취약점 공개(CVD)와 연계한 보안 취약점 통합 관리 체계가 핵심 트렌드로 자리 잡았다. 지니언스는 이러한 국제 표준 가이드를 철저히 준수하며 업계 트렌드를 리딩하고 있다.</p>\n<p>지니언스는VDP와 CVD 절차에 화이트해커의 참여와 보상을 연계하는 방식을 선제적으로 채택했다. 단순 조치에 그치지 않고 개별 제품의 공식 채널로 조치 완료된 취약점 상세 내용을 투명하게 공지한다. 이를 통해 고객사가 취약점 노출 위험 없이 신속하고 안전하게 업데이트를 진행하도록 지원하고 있다.</p>\n<p>지니언스는 올 2월부터  버그 바운티 프로그램을 전 제품·서비스로 확대 운영하고 있으며 국문 및 영문 공식 페이지를 통해 전 세계 화이트 해커의 제보를 상시 접수 하고 있다. 특히, 전사 보안 리서치 서비스와 글로벌 커뮤니티 플랫폼을 연계하여, 제품 취약점을 보다 체계적이고 광범위하게 관리 및 전파하고 있다.</p>\n<p>그 일환으로 지니언스는 글로벌 오픈소스 플랫폼인 깃허브(Github)의 '보안 권고(Security Advisories)' 기능을 활용해 보안 권고 조치를 시행하고 있다. 발견된 취약점에 대해 국제 표준인 CVE ID를 발급받아 제품의 신뢰성과 신속한 조치 현황을 투명하게 공개하고 있다.</p>\n<p>김계연 지니언스 CTO·미국법인장은 “버그 바운티 프로그램운영 결과는 단순히 취약점을 발견한 성과를 넘어, AI 시대의 고도화된 위협에 선제적으로 대응할 수 있는 지니언스만의 독자적인 방어 역량을 입증한 것”이라며 “향후 자체 버그 바운티를 글로벌 기준의 CVD/VDP 체계로 더욱 확고히 하여 전 세계 고객에게 신뢰성 있는 제품을 제공하고, 글로벌 보안 생태계의 건강한 발전을 선도하겠다”고 강조했다.</p>\n<p><strong>[용어설명]</strong></p>\n<ul>\n<li><strong>보안 취약점 신고 포상제 (버그 바운티, Bug Bounty))</strong></li>\n</ul>\n<p>소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여.</p>\n<ul>\n<li><strong>VDP (Vulnerability Disclosure Policy, 취약점 제보 정책)</strong></li>\n</ul>\n<p>외부 보안 전문가들이 시스템의 보안 약점을 안전하고 합법적으로 신고할 수 있도록 마련된 공식 소통 창구이자 정책. 기업이나 기관이 화이트해커의 취약점 탐색을 위해 허용하는 해킹 범위, 신고 절차, 공개 시기 등을 명시하여 외부에 선제적으로 공개.</p>\n<ul>\n<li><strong>CVD (Coordinated Vulnerability Disclosure, 협력적 취약점 공개)</strong></li>\n</ul>\n<p>발견된 취약점이 악용되지 않도록 패치가 완료될 때까지 보안 전문가와 기업이 상호 비밀을 유지하며 긴밀하게 협력하는 관리 프로세스. 취약점의 발굴과 신고, 조정, 패치, 최종 외부에 공개하기까지의 일련의 과정을 체계적으로 조율하고 대응하는 상호 협력 체계</p>", "body_text": "* ### 국내 보안 기업 최초 독자 운영 성과, 상반기 총 103건 접수하며 보안 사각지대 해소\n* ### 국제 표준 가이드 ‘CVD/VDP’ 준수, 조치 및 내용의 투명한 공개까지 프로세스 체계화\n* ### 글로벌 제보 창구 상시 가동 및 깃허브(Github)·CVE ID 연계로 전 세계 보안 생태계 기여\n\n사이버 보안 전문기업 지니언스(263860, ...", "full_text": "* ### 국내 보안 기업 최초 독자 운영 성과, 상반기 총 103건 접수하며 보안 사각지대 해소\n* ### 국제 표준 가이드 ‘CVD/VDP’ 준수, 조치 및 내용의 투명한 공개까지 프로세스 체계화\n* ### 글로벌 제보 창구 상시 가동 및 깃허브(Github)·CVE ID 연계로 전 세계 보안 생태계 기여\n\n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 2026년 상반기 자사의 ‘보안 취약점 신고 포상제’를 운영한 결과, 취약점 접수 건수가 전년 동기 대비 약 129%, 지급 포상금은 약 1,046% 증가했다고 밝혔다.\n\n이 같은 성장세는 AI 기술 대중화와 고위험 취약점 출현이 맞물린 결과다. AI 기술이 급격히 발전하면서 화이트해커들의 AI 활용도 역시 크게 높아졌다. 특히 AI를 활용해 보안 취약점을 자동으로 찾아내는 탐지 활동이 새로운 트렌드로 자리매김 하고 있다.\n\n보안 취약점 신고 포상제(이하 버그 바운티)는 소프트웨어나 웹 서비스의 보안 약점을 찾아낸 화이트해커에게 포상금을 지급하는 제도다. 최근 AI를 악용한 초고속·대규모의 지능화된 AI 위협이 일상화되면서 기존 사후 조치 중심의 정보보안 체계는 근본적인 한계에 도달했다는  평가다.\n\n단일 보안 사고가 대형 재난으로 비화되는 것을 막고 위협을 선제적으로 찾아 제거하는 능동형 상시 예방 체계로의 패러다임 전환이 시급하다. 이에 따라 보안 취약점 신고·조치·공개 제도가 필수적으로 요구되고 있다.\n\n구글·애플·아마존 등 글로벌 IT 기업들도 적극적으로 버그 바운티 프로그램을 운영하고 있다. 지니언스는 KISA가 운영중인 소프트웨어 신규 취약점 신고 포상제도의 공동운영사로 참여한 이래 지난 2022년 국내 보안 업계 최초로 독자적인 버그 바운티 프로그램을 시행했다. .\n\n최근 글로벌 주요 국가에서는 버그 바운티를 취약점 제보 정책(VDP) 및 협력적 취약점 공개(CVD)와 연계한 보안 취약점 통합 관리 체계가 핵심 트렌드로 자리 잡았다. 지니언스는 이러한 국제 표준 가이드를 철저히 준수하며 업계 트렌드를 리딩하고 있다.\n\n지니언스는VDP와 CVD 절차에 화이트해커의 참여와 보상을 연계하는 방식을 선제적으로 채택했다. 단순 조치에 그치지 않고 개별 제품의 공식 채널로 조치 완료된 취약점 상세 내용을 투명하게 공지한다. 이를 통해 고객사가 취약점 노출 위험 없이 신속하고 안전하게 업데이트를 진행하도록 지원하고 있다.\n\n지니언스는 올 2월부터  버그 바운티 프로그램을 전 제품·서비스로 확대 운영하고 있으며 국문 및 영문 공식 페이지를 통해 전 세계 화이트 해커의 제보를 상시 접수 하고 있다. 특히, 전사 보안 리서치 서비스와 글로벌 커뮤니티 플랫폼을 연계하여, 제품 취약점을 보다 체계적이고 광범위하게 관리 및 전파하고 있다.\n\n그 일환으로 지니언스는 글로벌 오픈소스 플랫폼인 깃허브(Github)의 '보안 권고(Security Advisories)' 기능을 활용해 보안 권고 조치를 시행하고 있다. 발견된 취약점에 대해 국제 표준인 CVE ID를 발급받아 제품의 신뢰성과 신속한 조치 현황을 투명하게 공개하고 있다.\n\n김계연 지니언스 CTO·미국법인장은 “버그 바운티 프로그램운영 결과는 단순히 취약점을 발견한 성과를 넘어, AI 시대의 고도화된 위협에 선제적으로 대응할 수 있는 지니언스만의 독자적인 방어 역량을 입증한 것”이라며 “향후 자체 버그 바운티를 글로벌 기준의 CVD/VDP 체계로 더욱 확고히 하여 전 세계 고객에게 신뢰성 있는 제품을 제공하고, 글로벌 보안 생태계의 건강한 발전을 선도하겠다”고 강조했다.\n\n**[용어설명]**\n\n* **보안 취약점 신고 포상제 (버그 바운티, Bug Bounty))**\n\n소프트웨어나 웹 서비스의 취약점을 발견해 신고하는 사람에게 포상금을 지급하는 제도. 보안 취약점을 악용하는 사이버 공격을 사전에 차단하는 동시에, 화이트해커 등 차세대 보안 전문가 양성에도 기여.\n\n* **VDP (Vulnerability Disclosure Policy, 취약점 제보 정책)**\n\n외부 보안 전문가들이 시스템의 보안 약점을 안전하고 합법적으로 신고할 수 있도록 마련된 공식 소통 창구이자 정책. 기업이나 기관이 화이트해커의 취약점 탐색을 위해 허용하는 해킹 범위, 신고 절차, 공개 시기 등을 명시하여 외부에 선제적으로 공개.\n\n* **CVD (Coordinated Vulnerability Disclosure, 협력적 취약점 공개)**\n\n발견된 취약점이 악용되지 않도록 패치가 완료될 때까지 보안 전문가와 기업이 상호 비밀을 유지하며 긴밀하게 협력하는 관리 프로세스. 취약점의 발굴과 신고, 조정, 패치, 최종 외부에 공개하기까지의 일련의 과정을 체계적으로 조율하고 대응하는 상호 협력 체계"}, {"title": "[전자신문 기고] 정보보안 전문가, 언제 유망해 지나?", "date": "2026.06.22", "link": "https://www.genians.co.kr/pr-room/press/20260622", "category": "기타 뉴스", "body_html": "<p>지난 해 통신사, 금융사 해킹 사고가 세상을 들썩이게 했다. 사람들은 분노했고 최고경영자는 카메라 앞에서 연신 고개를 숙였다. 관심이 잦아들 무렵 최고로 잘 나간다는 예능 TV 프로그램에 정보보안 업체 대표가 출연했다. 그는 사고에 대해 여러 사실과 전문가로서의 견해를 밝혔다. 대부분 공감 되었지만 아닌 것도 있었다. 그런데 마지막 즈음에 격하게 공감되는 한마디를 던졌다.</p>\n<p>“예전부터 유망직업 조사에는 항상 정보보안 전문가가 포함되어 있었습니다. 그런데 도대체 언제 유망해 지는 겁니까? “</p>\n<p>필자 역시 궁금했다. 정보보안 전문가, 오래전부터 유망하다 했다. 각종 직업 전망 조사에서 늘 상위권이었다. 그런데 이상하다. 남들은 유망하다는데 정작 몸 담고 있는 이들은 그렇게 느끼지 못하는 듯 하다. 필자도 업계에 몸담은 지 20년이 훌쩍 넘었다. 그동안 기술은 발전하고 시장도 커졌다. 하지만 누군가 내게 “그래서 정보보안 전문가라는 직업이 유망합니까?” 라고 묻는다면 선뜻 그렇다고 답하기 어렵다. 적어도 아직까지는 그렇다.</p>\n<p>왜 그럴까? 두 가지 문제라고 생각한다. 첫째 보안업계를 대하는 태도다. 흔히들 보안을 AI 등 산업 유지를 위한 핵심 기술이라고 한다. 다만 중요성이 충분히 인식되지 않았기 때문이라고 한다. 정확히 말하자. 중요성을 몰라서 가 아니라 중요하다고 말은 했지만 실제 대우는 달랐기 때문이다. 기업은 보안을 전략이라고 말하면서도 여전히 비용으로 생각한다. 공공기관도 예외는 아니다. 사고 전에는 투자에 인색하고 사고 후에는 단기 처방에 집중한다. 평소에는 가장 싼 가격을 찾다가 사고가 터진 뒤 에야 가장 강력한 대책을 찾는다. (최근에 로펌이 보안시장에서 대우 받는 이유가 아닐까 싶다.) 이러니 산업의 외형은 커져도 전문성의 값은 제대로 매겨지지 않는다.</p>\n<p>둘째. 보안업계 내부의 노력이다. 시장의 요구와 전문가 역량 사이의 불일치라고 생각한다. 고객은 사업을 이해하면서 기술을 알고 위험을 숫자로 설명하며 경영진을 설득할 수 있는 보안 전문가를 원했다. 그러나 업계는 오랫동안 기술 그 자체에 머무는 데 익숙했다. 취약점 하나를 더 찾고 기능 하나를 더 구현하고 솔루션을 능숙하게 다루는 인력만 키웠다. 그 기술을 어떻게 비즈니스 언어로 나타낼 것인가에 대해서는 상대적으로 둔감했다. 보안은 늘 중요했지만 보안 전문가가 늘 중요한 위치에 있었던 것은 아닌 이유다.</p>\n<p>그렇다고 보안전문가의 미래를 비관할 필요는 없다. 어쩌면 지금이 유망해 지기 위한 마지막이자 가장 좋은 때 일지도 모른다. AI가 등장하면서 상황이 바뀌고 있다. 공격자는 AI로 더 빠르게 취약점을 찾고 더 정교한 공격이 가능하다. 방어자도 AI를 통해 더 빠르고 정확하게 이상 징후를 찾고 반복 업무를 자동화할 수 있다. 문제는 도구의 등장이 아니다. 도구를 이해하고 통제하며 조직의 체계 안에 심는 역할을 누가 할 것인가에 달렸다. 그 자리를 정보보안 전문가가 차지하지 못한다면 이번에도 ‘유망’ 이라는 말은 또 몇 년 뒤의 약속으로 미뤄질 것이다.</p>\n<p>이를 위해 정보보안 전문가는 세 가지 역할을 가져야 한다. 첫째, 통역사다. 기술자에 머물지 말고 위험을 번역할 수 있어야 한다. 위협을 기술 용어로만 설명해서는 안 된다. 매출, 고객, 평판, 규제와 어떤 관계가 있는지 설명할 수 있어야 한다. 둘째, 설계자다. 생성형 AI 사용을 예를 들어보자. 단순히 금지할 것인가 허용할 것인가의 문제가 아니다. 보안 정책을 고려해 어디까지 허용하고 어떤 데이터를 쓰게 하며 어떤 기록을 남길 것인지 설계할 수 있어야 한다. 셋째, 지휘자다. 반복 업무는 AI에게 넘기되 최종 판단과 책임의 기준은 여전히 사람이 쥐고 있어야 한다.</p>\n<p>필요한 역량도 분명해졌다. 보안 기술은 기본이다. 데이터와 AI 시스템에 대한 이해, 클라우드와 개발 환경에 대한 감각이 필요하다. 더 나아가 규제와 거버넌스를 읽는 힘, 그리고 경영진과 현업을 설득하는 커뮤니케이션 능력까지 갖추었다면 인재(人才)가 아닐 수 없다. 예전처럼 한 우물만 깊게 파서는 버티기 어려운 시대가 왔다. 기술, 정책, 사업을 잇는 연결 능력이 없으면 전문가라는 이름은 남아도 역할은 줄어들 수밖에 없다.</p>\n<p>정보보안 전문가가 유망하지 않았던 이유는 단순히 남들이, 사회가 몰랐기 때문만은 아니다. 시장도 준비가 덜 되어 있었고 우리도 기대만큼 충분히 변하지 못했다. 둘 다의 문제였다. 다만 지금은 다르다. AI는 보안을 더 어렵게 만들지만 동시에 보안 전문가의 자리를 더 선명하게 만든다. 이 기회를 살리지 못하면 또다시 “정보보안 전문가는 유망합니다”라는 말만 남을지 모른다.</p>", "body_text": "지난 해 통신사, 금융사 해킹 사고가 세상을 들썩이게 했다. 사람들은 분노했고 최고경영자는 카메라 앞에서 연신 고개를 숙였다. 관심이 잦아들 무렵 최고로 잘 나간다는 예능 TV 프로그램에 정보보안 업체 대표가 출연했다. 그는 사고에 대해 여러 사실과 전문가로서의 견해를 밝혔다. 대부분 공감 되었지만 아닌 것도 있었다. 그런데 마지막 즈음에 격하게 공감되는 ...", "full_text": "지난 해 통신사, 금융사 해킹 사고가 세상을 들썩이게 했다. 사람들은 분노했고 최고경영자는 카메라 앞에서 연신 고개를 숙였다. 관심이 잦아들 무렵 최고로 잘 나간다는 예능 TV 프로그램에 정보보안 업체 대표가 출연했다. 그는 사고에 대해 여러 사실과 전문가로서의 견해를 밝혔다. 대부분 공감 되었지만 아닌 것도 있었다. 그런데 마지막 즈음에 격하게 공감되는 한마디를 던졌다.\n\n“예전부터 유망직업 조사에는 항상 정보보안 전문가가 포함되어 있었습니다. 그런데 도대체 언제 유망해 지는 겁니까? “\n\n필자 역시 궁금했다. 정보보안 전문가, 오래전부터 유망하다 했다. 각종 직업 전망 조사에서 늘 상위권이었다. 그런데 이상하다. 남들은 유망하다는데 정작 몸 담고 있는 이들은 그렇게 느끼지 못하는 듯 하다. 필자도 업계에 몸담은 지 20년이 훌쩍 넘었다. 그동안 기술은 발전하고 시장도 커졌다. 하지만 누군가 내게 “그래서 정보보안 전문가라는 직업이 유망합니까?” 라고 묻는다면 선뜻 그렇다고 답하기 어렵다. 적어도 아직까지는 그렇다.\n\n왜 그럴까? 두 가지 문제라고 생각한다. 첫째 보안업계를 대하는 태도다. 흔히들 보안을 AI 등 산업 유지를 위한 핵심 기술이라고 한다. 다만 중요성이 충분히 인식되지 않았기 때문이라고 한다. 정확히 말하자. 중요성을 몰라서 가 아니라 중요하다고 말은 했지만 실제 대우는 달랐기 때문이다. 기업은 보안을 전략이라고 말하면서도 여전히 비용으로 생각한다. 공공기관도 예외는 아니다. 사고 전에는 투자에 인색하고 사고 후에는 단기 처방에 집중한다. 평소에는 가장 싼 가격을 찾다가 사고가 터진 뒤 에야 가장 강력한 대책을 찾는다. (최근에 로펌이 보안시장에서 대우 받는 이유가 아닐까 싶다.) 이러니 산업의 외형은 커져도 전문성의 값은 제대로 매겨지지 않는다.\n\n둘째. 보안업계 내부의 노력이다. 시장의 요구와 전문가 역량 사이의 불일치라고 생각한다. 고객은 사업을 이해하면서 기술을 알고 위험을 숫자로 설명하며 경영진을 설득할 수 있는 보안 전문가를 원했다. 그러나 업계는 오랫동안 기술 그 자체에 머무는 데 익숙했다. 취약점 하나를 더 찾고 기능 하나를 더 구현하고 솔루션을 능숙하게 다루는 인력만 키웠다. 그 기술을 어떻게 비즈니스 언어로 나타낼 것인가에 대해서는 상대적으로 둔감했다. 보안은 늘 중요했지만 보안 전문가가 늘 중요한 위치에 있었던 것은 아닌 이유다.\n\n그렇다고 보안전문가의 미래를 비관할 필요는 없다. 어쩌면 지금이 유망해 지기 위한 마지막이자 가장 좋은 때 일지도 모른다. AI가 등장하면서 상황이 바뀌고 있다. 공격자는 AI로 더 빠르게 취약점을 찾고 더 정교한 공격이 가능하다. 방어자도 AI를 통해 더 빠르고 정확하게 이상 징후를 찾고 반복 업무를 자동화할 수 있다. 문제는 도구의 등장이 아니다. 도구를 이해하고 통제하며 조직의 체계 안에 심는 역할을 누가 할 것인가에 달렸다. 그 자리를 정보보안 전문가가 차지하지 못한다면 이번에도 ‘유망’ 이라는 말은 또 몇 년 뒤의 약속으로 미뤄질 것이다.\n\n이를 위해 정보보안 전문가는 세 가지 역할을 가져야 한다. 첫째, 통역사다. 기술자에 머물지 말고 위험을 번역할 수 있어야 한다. 위협을 기술 용어로만 설명해서는 안 된다. 매출, 고객, 평판, 규제와 어떤 관계가 있는지 설명할 수 있어야 한다. 둘째, 설계자다. 생성형 AI 사용을 예를 들어보자. 단순히 금지할 것인가 허용할 것인가의 문제가 아니다. 보안 정책을 고려해 어디까지 허용하고 어떤 데이터를 쓰게 하며 어떤 기록을 남길 것인지 설계할 수 있어야 한다. 셋째, 지휘자다. 반복 업무는 AI에게 넘기되 최종 판단과 책임의 기준은 여전히 사람이 쥐고 있어야 한다.\n\n필요한 역량도 분명해졌다. 보안 기술은 기본이다. 데이터와 AI 시스템에 대한 이해, 클라우드와 개발 환경에 대한 감각이 필요하다. 더 나아가 규제와 거버넌스를 읽는 힘, 그리고 경영진과 현업을 설득하는 커뮤니케이션 능력까지 갖추었다면 인재(人才)가 아닐 수 없다. 예전처럼 한 우물만 깊게 파서는 버티기 어려운 시대가 왔다. 기술, 정책, 사업을 잇는 연결 능력이 없으면 전문가라는 이름은 남아도 역할은 줄어들 수밖에 없다.\n\n정보보안 전문가가 유망하지 않았던 이유는 단순히 남들이, 사회가 몰랐기 때문만은 아니다. 시장도 준비가 덜 되어 있었고 우리도 기대만큼 충분히 변하지 못했다. 둘 다의 문제였다. 다만 지금은 다르다. AI는 보안을 더 어렵게 만들지만 동시에 보안 전문가의 자리를 더 선명하게 만든다. 이 기회를 살리지 못하면 또다시 “정보보안 전문가는 유망합니다”라는 말만 남을지 모른다."}, {"title": "지니언스 EDR 솔루션, 글로벌 인증 획득… AI 기반 통합 보안으로 세계 시장 정조준", "date": "2026.06.17", "link": "https://www.genians.co.kr/pr-room/press/20260617", "category": "EDR", "body_html": "<ul>\n<li>\n<h3>글로벌 검증 테스트에서 뛰어난 위협 탐지 가시성 및 AI 해석 역량 입증</h3>\n</li>\n<li>\n<h3>전 세계 9개 솔루션 인증, 국내 기업으로는 지니언스 유일</h3>\n</li>\n<li>\n<h3>자율형 AI 해킹 시대 겨냥, 백신·안티랜섬웨어 결합한 실전적 엔드포인트 해법 제시</h3>\n</li>\n</ul>\n<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 글로벌 보안 제품 성능 평가 기관인 ‘AV-Comparatives’에서 실시한 ‘2026 EDR 탐지 검증 테스트’에서 최종 인증을 획득하며 글로벌 수준의 기술력을 다시 한번 입증했다고 밝혔다.</p>\n<p>지니언스가 획득한 AV-Comparatives 인증은 전 세계 유수의 글로벌 보안 벤더들이 참여해 기술력을 겨루는 공신력 있는 검증 무대다. 특히, 올해 테스트는 실제 최신 공격 트렌드를 반영한 총 14단계의 가상 해킹 공격을 보안 프로그램이 얼마나 정확하게 찾아내고 추적하는지 평가한다.</p>\n<p>최종 인증을 획득하기 위해서는 고도화된 전체 공격 체인 중 최소 3분의 2 이상의 단계에서 단절 없는 탐지 가시성을 증명해야 하며, 서로 다른 인프라에서 발생하는 격리된 이벤트를 유기적으로 연계하는 ‘맥락화(Contextualization)’ 역량을 입증해야 한다.</p>\n<p>또한, 정상적인 시스템 관리 행위를 위협으로 오인하는 총 5가지의 오탐(Signal-to-Noise) 시나리오 중 무분별한 경고 알림의 발생을 3개 이하의 시나리오로 철저히 통제해내는 신뢰성을 동시에 만족해야 한다.</p>\n<p>지니언스는 이번 테스트에서 최신 APT 공격 시나리오 전 과정에 걸쳐 탁월한 가시성과 행위 상관관계 분석 역량을 인정받았다. 특히, 차단 위주의 단순 사전 방어를 넘어 이미 방어망을 뚫고 들어온 지능형 위협을 사후에 정밀 탐지하고 역추적하는 EDR 본연의 목적에 가장 부합하는 실전 솔루션임을 증명했다. 이번 검증에서 최종 인증을 통과한 전 세계 9개 솔루션 중 국내 기업으로는 지니언스가 유일하다.</p>\n<p>아울러 플랫폼에 탑재된 AI 보안 기능도 큰 주목을 받았다. 지니안 EDR은 머신러닝 탐지 엔진을 기반으로 위협의 유형과 분류, 유사도 점수 등을 직관적인 그래픽 대시보드로 시각화하여 제공한다.</p>\n<p>지니언스는 AI를 단일 기능이나 단기적인 기술 트렌드로 적용하기보다, 보안 운영 전반의 복잡성을 줄이고 운영 효율성을 높이는 방향으로 단계적 적용을 추진하고 있다. 사용자, 디바이스, 네트워크, 애플리케이션, 데이터 등 분산된 보안 정보를 통합하여 '보안의 맥락(Context)'을 이해하는 플랫폼을 지향하며, AI는 이 복잡한 정보를 연결하고 해석하는 핵심 역할을 담당한다.</p>\n<p>이민상 지니언스 보안솔루션연구소 전무는 “스스로 실시간 공격 시나리오를 설계하는 지능형 자율 AI 해킹 시대에는 '언제든 단말이 뚫릴 수 있다'는 현실적 전제하에 사후 탐지와 빠른 가시성 확보 중심으로 방어 체계를 재구축해야 한다”며, “EDR, 백신(AV), 안티랜섬웨어(AR), 매체제어 기능이 완벽히 융합된 ‘지니안 인사이츠 E 3.0’ 플랫폼의 글로벌 인증 획득과 차별화된 AI 기술력을 모멘텀 삼아 글로벌 엔드포인트 보안 시장 확장에 박차를 가하겠다”고 밝혔다.</p>\n<p><img alt=\"엠블럼\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EC%97%A0%EB%B8%94%EB%9F%BC.png?width=143&amp;height=215&amp;name=%EC%97%A0%EB%B8%94%EB%9F%BC.png\" /></p>\n<p>[그림] 지니언스 EDR 솔루션이 통과한 글로벌 ‘2026 EDR 탐지 검증 테스트’ 공식 인증 엠블럼</p>", "body_text": "* ### 글로벌 검증 테스트에서 뛰어난 위협 탐지 가시성 및 AI 해석 역량 입증\n* ### 전 세계 9개 솔루션 인증, 국내 기업으로는 지니언스 유일\n* ### 자율형 AI 해킹 시대 겨냥, 백신·안티랜섬웨어 결합한 실전적 엔드포인트 해법 제시\n\n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 글로벌 보안 제품 성능 평가 기관인 ‘AV-C...", "full_text": "* ### 글로벌 검증 테스트에서 뛰어난 위협 탐지 가시성 및 AI 해석 역량 입증\n* ### 전 세계 9개 솔루션 인증, 국내 기업으로는 지니언스 유일\n* ### 자율형 AI 해킹 시대 겨냥, 백신·안티랜섬웨어 결합한 실전적 엔드포인트 해법 제시\n\n사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 글로벌 보안 제품 성능 평가 기관인 ‘AV-Comparatives’에서 실시한 ‘2026 EDR 탐지 검증 테스트’에서 최종 인증을 획득하며 글로벌 수준의 기술력을 다시 한번 입증했다고 밝혔다.\n\n지니언스가 획득한 AV-Comparatives 인증은 전 세계 유수의 글로벌 보안 벤더들이 참여해 기술력을 겨루는 공신력 있는 검증 무대다. 특히, 올해 테스트는 실제 최신 공격 트렌드를 반영한 총 14단계의 가상 해킹 공격을 보안 프로그램이 얼마나 정확하게 찾아내고 추적하는지 평가한다.\n\n최종 인증을 획득하기 위해서는 고도화된 전체 공격 체인 중 최소 3분의 2 이상의 단계에서 단절 없는 탐지 가시성을 증명해야 하며, 서로 다른 인프라에서 발생하는 격리된 이벤트를 유기적으로 연계하는 ‘맥락화(Contextualization)’ 역량을 입증해야 한다.\n\n또한, 정상적인 시스템 관리 행위를 위협으로 오인하는 총 5가지의 오탐(Signal-to-Noise) 시나리오 중 무분별한 경고 알림의 발생을 3개 이하의 시나리오로 철저히 통제해내는 신뢰성을 동시에 만족해야 한다.\n\n지니언스는 이번 테스트에서 최신 APT 공격 시나리오 전 과정에 걸쳐 탁월한 가시성과 행위 상관관계 분석 역량을 인정받았다. 특히, 차단 위주의 단순 사전 방어를 넘어 이미 방어망을 뚫고 들어온 지능형 위협을 사후에 정밀 탐지하고 역추적하는 EDR 본연의 목적에 가장 부합하는 실전 솔루션임을 증명했다. 이번 검증에서 최종 인증을 통과한 전 세계 9개 솔루션 중 국내 기업으로는 지니언스가 유일하다.\n\n아울러 플랫폼에 탑재된 AI 보안 기능도 큰 주목을 받았다. 지니안 EDR은 머신러닝 탐지 엔진을 기반으로 위협의 유형과 분류, 유사도 점수 등을 직관적인 그래픽 대시보드로 시각화하여 제공한다.\n\n지니언스는 AI를 단일 기능이나 단기적인 기술 트렌드로 적용하기보다, 보안 운영 전반의 복잡성을 줄이고 운영 효율성을 높이는 방향으로 단계적 적용을 추진하고 있다. 사용자, 디바이스, 네트워크, 애플리케이션, 데이터 등 분산된 보안 정보를 통합하여 '보안의 맥락(Context)'을 이해하는 플랫폼을 지향하며, AI는 이 복잡한 정보를 연결하고 해석하는 핵심 역할을 담당한다.\n\n이민상 지니언스 보안솔루션연구소 전무는 “스스로 실시간 공격 시나리오를 설계하는 지능형 자율 AI 해킹 시대에는 '언제든 단말이 뚫릴 수 있다'는 현실적 전제하에 사후 탐지와 빠른 가시성 확보 중심으로 방어 체계를 재구축해야 한다”며, “EDR, 백신(AV), 안티랜섬웨어(AR), 매체제어 기능이 완벽히 융합된 ‘지니안 인사이츠 E 3.0’ 플랫폼의 글로벌 인증 획득과 차별화된 AI 기술력을 모멘텀 삼아 글로벌 엔드포인트 보안 시장 확장에 박차를 가하겠다”고 밝혔다.\n\n![엠블럼](https://www.genians.co.kr/hs-fs/hubfs/%EC%97%A0%EB%B8%94%EB%9F%BC.png?width=143&height=215&name=%EC%97%A0%EB%B8%94%EB%9F%BC.png)\n\n[그림] 지니언스 EDR 솔루션이 통과한 글로벌 ‘2026 EDR 탐지 검증 테스트’ 공식 인증 엠블럼"}, {"title": "- 글로벌 양자 보안 커버리지 확대, K-보안 위상 확고히 할 것", "date": "2026.05.26", "link": "https://www.genians.co.kr/pr-room/press/20260526", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 양자 컴퓨팅 시대를 대비한 차세대 양자 보안 원천 기술을 개발하고 포스트 퀀텀 시대의 프런티어가 되기 위한 본격적인 행보에 돌입했다고 밝혔다.</p>\n<p>지니언스는 제로트러스트 3.0 전략의 일환으로 양자 컴퓨팅 시대의 해킹 위협을 원천 차단하는 ‘양자 보안 게이트웨이(Quantum Security Gateway)’의 핵심 기술 개발이 최종 검증 단계에 진입했다고 밝혔다. 지니언스는 이번 R&amp;D로 글로벌 톱티어와 경쟁할 수 있는 독자적인 ‘양자 보안’ 기술력을 확보해 향후 폭발적으로 성장할 양자 보안 시장에서 강력한 지배력을 확보한다는 계획이다.</p>\n<p>양자 컴퓨터는 기존 슈퍼컴퓨터가 수백 년 걸릴 암호 해독을 단 몇 초 만에 해결할 수 있는 강력한 성능을 지녔다. 이는 현재 전 세계 금융, 국방, 행정 시스템에서 사용하는 암호 알고리즘이 무력화될 수 있음을 의미한다. 글로벌 IT시장 조사 기업 테크나비오(Technavio)에 따르면 글로벌 양자 내성 암호(PQC) 시장은 2025년부터 연평균 43.4%가 넘는 가파른 성장세를 기록해 2030년 34억2천만달러(한화 약 4조 7천억원)의 규모로 이를 것으로 예측된다.</p>\n<p>지니언스가 개발중인 ‘양자 보안 게이트웨이’의 핵심은 차세대 제로트러스트 3.0 전략을 완성하기 위한 최우선 과제로 독자적인 양자 암호 체계를 전격 도입했다는 점이다. 기존 ZTNA 솔루션 체계 위에 양자내성암호(PQC) 최신 기술을 반영하고, 암호 키의 전 수명 주기를 안전하게 통제하는 고성능 키 관리 시스템(KMS)을 내장해 완벽한 복합 보안 구조를 구현한 것이 특징이다.</p>\n<p>양자내성암호(PQC) 와 키관리(KMS)를 동시에 내재화하여 결합한 게이트웨이 설계는 고도의 보안 전문성을 필요로 하며, 이는 지니언스의 기술력이 글로벌 표준에 도달했음을 의미한다. 자율주행, AI, 클라우드 등 양자 보안이 필수적인 차세대 산업군으로 사업 영역을 확장할 수는 발판을 마련할 것으로 예상된다.</p>\n<p>지니언스는 기존 암호체계를 무력화하는 양자 컴퓨팅 위협으로부터 고객의 자산을 완벽하게 보호하고 기존 레거시 시스템을 보유한 기업들이 양자 보안 환경으로 안정적으로 연착륙 할 수 있도록 돕는다는 방침이다.</p>\n<p>이동범 지니언스 대표는 “양자 컴퓨팅 위협으로부터 고객의 자산을 완벽하게 보호하는 기술력을 확보하여 국가 사이버 안보에 기여하고 그 핵심 자산으로 글로벌 시장까지 커버지리를 확대해 K-보안의 위상을 더욱 확고히 하겠다”고 밝혔다.</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 양자 컴퓨팅 시대를 대비한 차세대 양자 보안 원천 기술을 개발하고 포스트 퀀텀 시대의 프런티어가 되기 위한 본격적인 행보에 돌입했다고 밝혔다.\n\n지니언스는 제로트러스트 3.0 전략의 일환으로 양자 컴퓨팅 시대의 해킹 위협을 원천 차단하는 ‘양자 보안 게이트웨이(Quantum Security Ga...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 양자 컴퓨팅 시대를 대비한 차세대 양자 보안 원천 기술을 개발하고 포스트 퀀텀 시대의 프런티어가 되기 위한 본격적인 행보에 돌입했다고 밝혔다.\n\n지니언스는 제로트러스트 3.0 전략의 일환으로 양자 컴퓨팅 시대의 해킹 위협을 원천 차단하는 ‘양자 보안 게이트웨이(Quantum Security Gateway)’의 핵심 기술 개발이 최종 검증 단계에 진입했다고 밝혔다. 지니언스는 이번 R&D로 글로벌 톱티어와 경쟁할 수 있는 독자적인 ‘양자 보안’ 기술력을 확보해 향후 폭발적으로 성장할 양자 보안 시장에서 강력한 지배력을 확보한다는 계획이다.\n\n양자 컴퓨터는 기존 슈퍼컴퓨터가 수백 년 걸릴 암호 해독을 단 몇 초 만에 해결할 수 있는 강력한 성능을 지녔다. 이는 현재 전 세계 금융, 국방, 행정 시스템에서 사용하는 암호 알고리즘이 무력화될 수 있음을 의미한다. 글로벌 IT시장 조사 기업 테크나비오(Technavio)에 따르면 글로벌 양자 내성 암호(PQC) 시장은 2025년부터 연평균 43.4%가 넘는 가파른 성장세를 기록해 2030년 34억2천만달러(한화 약 4조 7천억원)의 규모로 이를 것으로 예측된다.\n\n지니언스가 개발중인 ‘양자 보안 게이트웨이’의 핵심은 차세대 제로트러스트 3.0 전략을 완성하기 위한 최우선 과제로 독자적인 양자 암호 체계를 전격 도입했다는 점이다. 기존 ZTNA 솔루션 체계 위에 양자내성암호(PQC) 최신 기술을 반영하고, 암호 키의 전 수명 주기를 안전하게 통제하는 고성능 키 관리 시스템(KMS)을 내장해 완벽한 복합 보안 구조를 구현한 것이 특징이다.\n\n양자내성암호(PQC) 와 키관리(KMS)를 동시에 내재화하여 결합한 게이트웨이 설계는 고도의 보안 전문성을 필요로 하며, 이는 지니언스의 기술력이 글로벌 표준에 도달했음을 의미한다. 자율주행, AI, 클라우드 등 양자 보안이 필수적인 차세대 산업군으로 사업 영역을 확장할 수는 발판을 마련할 것으로 예상된다.\n\n지니언스는 기존 암호체계를 무력화하는 양자 컴퓨팅 위협으로부터 고객의 자산을 완벽하게 보호하고 기존 레거시 시스템을 보유한 기업들이 양자 보안 환경으로 안정적으로 연착륙 할 수 있도록 돕는다는 방침이다.\n\n이동범 지니언스 대표는 “양자 컴퓨팅 위협으로부터 고객의 자산을 완벽하게 보호하는 기술력을 확보하여 국가 사이버 안보에 기여하고 그 핵심 자산으로 글로벌 시장까지 커버지리를 확대해 K-보안의 위상을 더욱 확고히 하겠다”고 밝혔다."}, {"title": "- 본격적인 ‘턴 어라운드’ 돌입…AI 보안 위협 및 정부 규제 강화로 하반기 성장 기대감 고조", "date": "2026.05.15", "link": "https://www.genians.co.kr/pr-room/press/20260515", "category": "AI & Cloud", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 1분기 사상 최대 실적을 기록하며 본격적인 ‘어닝 서프라이즈’를 달성했다.</p>\n<p>지니언스는 2026년 연결 기준 1분기 매출액이 전년 동기 대비 25.5% 증가한 117.4억 원을 기록했다고 밝혔다. 같은 기간 영업이익은 17.4억 원을 기록하며 전년 동기 대비 무려 47배 이상 급증했다. 1분기 전통적인 비수기임에도 수익성을 대폭 개선하며 본격적인 턴 어라운드 국면에 진입했다는 평가다.</p>\n<p>지니언스의 이번 호실적은 NAC(네트워크 접근 제어)와 EDR(엔드포인트 탐지 및 대응) 등 기존 주력 사업의 견고한 성장과 클라우드 NAC, MDR(매니지드 탐지 및 대응) 등 서비스 비즈니스의 확장이 견인했다.</p>\n<p>또한, 차세대 성장동력인 제로 트러스트와 올 1분기 출시한 홈네트워크 세대간 망분리 보안 솔루션 ‘지니안 홈(Genian Home)’도 의미 있는 고객을 확보하면서 향후 미래 전망을 밝게 하고 있다.</p>\n<p>최근 보안 업계의 최대 화두인 AI ‘미토스(Mythos) 이슈와 관련해서도 지니언스에게는 성장의 기회가 될 것으로 분석됐다. 독립리서치사 밸류파인더 리포트에 따르면 미토스 충격으로 EDR 시장이 이전 보다 가파르게 성장할 것으로 전망하며 지니언스가 AI보안 시대의 구조적 성장주, 밸류에이션 재 평가 구간에 진입했다고 분석했다.</p>\n<p>지니언스는 견조한 실적 성장을 바탕으로 기업 가치 제고에도 적극적으로 나섰다. 글로벌 스탠더드에 걸맞은 주주환원정책으로 배당성향을 20~25% 수준을 유지함은 물론 글로벌 시장 매출 확대, 서비스 및 매니지드 보안 사업 확대를 기반으로 안정적인 수익구조 확립을 포함한 기업 가치 제고 계획을 발표한 바 있다.</p>\n<p>지니언스는 하반기에도 강력한 성장 모멘텀을 이어갈 전망이다. AI 기반의 사이버 공격 가속화로 인해 NAC, EDR, ZTNA를 결합한 지니언스의 통합 방어 체계 수요가 더욱 커질 것으로 기대된다. 또한, 해킹 사고 시 과징금을 매출액의 10%로 상향하는 개인정보보호법 개정 등 정부의 규제 강화 정책과 AI 보안 인프라 투자 확대가 지니언스에게 새로운 기회가 될 것으로 보고 있다.</p>\n<p>이동범 지니언스 대표는 “AI 시대의 도래는 보안 기업의 옥석 가리기를 가속화하고 있으며, 지니언스는 독보적인 기술력과 실질적인 재무 성과로 그 가치를 입증하는 유일한 기업”이라며, “턴어라운드에 성공한 1분기의 기세를 몰아 AI 위협 대응과 글로벌 확장을 통해 하반기에도 성장을 이어갈 것”이라고 강조했다.</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 1분기 사상 최대 실적을 기록하며 본격적인 ‘어닝 서프라이즈’를 달성했다.\n\n지니언스는 2026년 연결 기준 1분기 매출액이 전년 동기 대비 25.5% 증가한 117.4억 원을 기록했다고 밝혔다. 같은 기간 영업이익은 17.4억 원을 기록하며 전년 동기 대비 무려 47배 이상 급증했다. 1분기 ...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 1분기 사상 최대 실적을 기록하며 본격적인 ‘어닝 서프라이즈’를 달성했다.\n\n지니언스는 2026년 연결 기준 1분기 매출액이 전년 동기 대비 25.5% 증가한 117.4억 원을 기록했다고 밝혔다. 같은 기간 영업이익은 17.4억 원을 기록하며 전년 동기 대비 무려 47배 이상 급증했다. 1분기 전통적인 비수기임에도 수익성을 대폭 개선하며 본격적인 턴 어라운드 국면에 진입했다는 평가다.\n\n지니언스의 이번 호실적은 NAC(네트워크 접근 제어)와 EDR(엔드포인트 탐지 및 대응) 등 기존 주력 사업의 견고한 성장과 클라우드 NAC, MDR(매니지드 탐지 및 대응) 등 서비스 비즈니스의 확장이 견인했다.\n\n또한, 차세대 성장동력인 제로 트러스트와 올 1분기 출시한 홈네트워크 세대간 망분리 보안 솔루션 ‘지니안 홈(Genian Home)’도 의미 있는 고객을 확보하면서 향후 미래 전망을 밝게 하고 있다.\n\n최근 보안 업계의 최대 화두인 AI ‘미토스(Mythos) 이슈와 관련해서도 지니언스에게는 성장의 기회가 될 것으로 분석됐다. 독립리서치사 밸류파인더 리포트에 따르면 미토스 충격으로 EDR 시장이 이전 보다 가파르게 성장할 것으로 전망하며 지니언스가 AI보안 시대의 구조적 성장주, 밸류에이션 재 평가 구간에 진입했다고 분석했다.\n\n지니언스는 견조한 실적 성장을 바탕으로 기업 가치 제고에도 적극적으로 나섰다. 글로벌 스탠더드에 걸맞은 주주환원정책으로 배당성향을 20~25% 수준을 유지함은 물론 글로벌 시장 매출 확대, 서비스 및 매니지드 보안 사업 확대를 기반으로 안정적인 수익구조 확립을 포함한 기업 가치 제고 계획을 발표한 바 있다.\n\n지니언스는 하반기에도 강력한 성장 모멘텀을 이어갈 전망이다. AI 기반의 사이버 공격 가속화로 인해 NAC, EDR, ZTNA를 결합한 지니언스의 통합 방어 체계 수요가 더욱 커질 것으로 기대된다. 또한, 해킹 사고 시 과징금을 매출액의 10%로 상향하는 개인정보보호법 개정 등 정부의 규제 강화 정책과 AI 보안 인프라 투자 확대가 지니언스에게 새로운 기회가 될 것으로 보고 있다.\n\n이동범 지니언스 대표는 “AI 시대의 도래는 보안 기업의 옥석 가리기를 가속화하고 있으며, 지니언스는 독보적인 기술력과 실질적인 재무 성과로 그 가치를 입증하는 유일한 기업”이라며, “턴어라운드에 성공한 1분기의 기세를 몰아 AI 위협 대응과 글로벌 확장을 통해 하반기에도 성장을 이어갈 것”이라고 강조했다."}, {"title": "- EDR 개화기부터 AI 보안시대까지 독보적 1위 수성 - 200여 국내외 최다 레퍼런스 확보, 75만 에이전트가 검증한 안정성 - 차세대백신·안티랜섬웨어 결합한 통합 엔드포인트 보안 플랫폼 전략으로 AI 해킹 차단의 '실전적 해법' 제시", "date": "2026.04.28", "link": "https://www.genians.co.kr/pr-room/press/20260428", "category": "EDR", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 공공 조달 시장에서 7년 연속 시장점유율 1위를 기록했다고 밝혔다.</p>\n<p>2025년 조달청 나라장터 기준 46%의 점유율로 시장 1위를 수성한 지니언스는 2019년 EDR 시장 개화기부터 현재의 AI 보안 시대에 이르기까지, 급변하는 사이버 위협 속에서도 굳건한 기술 리더십과 두터운 고객 신뢰를 입증했다.</p>\n<p>지니언스는 국내 최초로 EDR을 개발한 이래 공공기관의 보안 가시성 확보와 지능형 위협 대응 분야를 선도하고 있다. 국내외 제품 최초로 국가정보원 보안기능확인서를 획득해 공공기관의 높은 보안 요구사항을 충족했다. 국가 행정망과 주요 기반 시설을 보호함으로써 국가 사이버 안보에도 적극 기여하고 있다는 평가다.</p>\n<p>지니언스의 EDR 솔루션은 중앙부처, 지자체, 금융권, 대형 제조사 등 까다로운 환경에서 75만대 이상의 에이전트가 실제 적용되어 성능을 검증 받았다. 200곳이 넘는 국내 최다 레퍼런스 통해 검증된 안정성은 물론, 단일 콘솔 기반의 통합 보안 플랫폼 역량을 앞세워EDR 대표 기업으로 평가 받고 있다.</p>\n<p>최근 앤스로픽의 AI 모델 ‘미토스(Mythos)’의 등장으로 지능형 AI 공격에 대응하기 위해 앤드포인트의 이상행위를 실시간으로 감시하고 의심 파일을 탐지해 내는EDR의 역할이 그 어느 때 보다 중요해 지고 있다.</p>\n<p>미국 워싱턴DC에서 열린 국제통화기금(IMF)·세계은행(WB) 회의에 참석한 각국 주요 정부 및 금융관계자 들도 AI를 활용한 사이버 위협을 주요 의제로 다뤘다. 국내도 정부 주재 대책회의와 함께 금감원에서는 미토스 대응을 위한 보안 강화 전략으로 금융기관 EDR 점검을 언급한 바 있다.</p>\n<p>지니언스의 EDR 솔루션은 엔드포인트에서 발생하는 행위를 지속적으로 모니터링하여 위협을 탐지/분석 및 대응하는 보안 기술이다. 해킹 시도부터 파악하여 대응할 수 있으며, 해킹 사고 이후에도 전체 행위를 확인할 수 있다. 머신러닝 엔진과 AI 기반 CTI서비스의 유기적 연동을 통해 알려지지 않은 악성코드까지 탐지하고 대응이 가능하다.</p>\n<p>여기에 EDR과 함께 지난해 새롭게 선보인 차세대 백신(AV, Anti-Virus)과 안티랜섬웨어(AR, Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 지니언스의 통합 엔드포인트 보안 플랫폼 전략은 AI 시대의 가장 실전적인 해법으로 주목받고 있다.</p>\n<p>이동범 지니언스 대표는 “미토스(Mythos)와 같이 AI가 자율적으로 공격 시나리오를 설계하는 시대에는 '언제든 닥칠 수 있는 현실'이라는 전제하에 방어 체계를 재점검해야 한다’며 “지니언스는 7년 연속 공공 시장 1위를 달성한 EDR 기술력에 AI 기반 자동화 대응 체계를 접목해, 지능형 공격을 실시간으로 식별하고 즉각 차단하는 가장 진보된 엔드포인트 보안 플랫폼을 제공하겠다”고 밝혔다.</p>\n<p><img alt=\"지니언스의 통합 엔드포인트 보안 플랫폼 ‘지니안 인사이츠 E’\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%9D%98%20%ED%86%B5%ED%95%A9%20%EC%97%94%EB%93%9C%ED%8F%AC%EC%9D%B8%ED%8A%B8%20%EB%B3%B4%EC%95%88%20%ED%94%8C%EB%9E%AB%ED%8F%BC%20%E2%80%98%EC%A7%80%EB%8B%88%EC%95%88%20%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0%20E%E2%80%99.png?width=930&amp;height=420&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%9D%98%20%ED%86%B5%ED%95%A9%20%EC%97%94%EB%93%9C%ED%8F%AC%EC%9D%B8%ED%8A%B8%20%EB%B3%B4%EC%95%88%20%ED%94%8C%EB%9E%AB%ED%8F%BC%20%E2%80%98%EC%A7%80%EB%8B%88%EC%95%88%20%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0%20E%E2%80%99.png\" /></p>\n<p>[그림] 지니언스의 통합 엔드포인트 보안 플랫폼 ‘지니안 인사이츠 E’</p>\n<p><strong>* 용어설명</strong></p>\n<p>EDR(Endpoint Detection &amp; Response) : 엔드포인트 지능형 위협 탐지 및 대응 솔루션</p>\n<ul>\n<li>PC 및 서버 등 네트워크 끝단(Endpoint)의 행위를 상시 모니터링하여 랜섬웨어, APT 공격 등 지능형 위협을 실시간 탐지하고, 원인 분석 및 대응(차단·복구)을 지원하는 보안 솔루션</li>\n<li>악성코드 유입과 감염뿐 아니라 취약점을 위용한 내부 확산을 탐지하고, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응할 수 있는 보안 솔루션</li>\n</ul>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 공공 조달 시장에서 7년 연속 시장점유율 1위를 기록했다고 밝혔다.\n\n2025년 조달청 나라장터 기준 46%의 점유율로 시장 1위를 수성한 지니언스는 2019년 EDR 시장 개화기부터 현재의 AI 보안 시대에 이르기까지, 급변하는 사이버 위협 속에서도 굳건한 기술 리더십과 두터운 고객 신...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 공공 조달 시장에서 7년 연속 시장점유율 1위를 기록했다고 밝혔다.\n\n2025년 조달청 나라장터 기준 46%의 점유율로 시장 1위를 수성한 지니언스는 2019년 EDR 시장 개화기부터 현재의 AI 보안 시대에 이르기까지, 급변하는 사이버 위협 속에서도 굳건한 기술 리더십과 두터운 고객 신뢰를 입증했다.\n\n지니언스는 국내 최초로 EDR을 개발한 이래 공공기관의 보안 가시성 확보와 지능형 위협 대응 분야를 선도하고 있다. 국내외 제품 최초로 국가정보원 보안기능확인서를 획득해 공공기관의 높은 보안 요구사항을 충족했다. 국가 행정망과 주요 기반 시설을 보호함으로써 국가 사이버 안보에도 적극 기여하고 있다는 평가다.\n\n지니언스의 EDR 솔루션은 중앙부처, 지자체, 금융권, 대형 제조사 등 까다로운 환경에서 75만대 이상의 에이전트가 실제 적용되어 성능을 검증 받았다. 200곳이 넘는 국내 최다 레퍼런스 통해 검증된 안정성은 물론, 단일 콘솔 기반의 통합 보안 플랫폼 역량을 앞세워EDR 대표 기업으로 평가 받고 있다.\n\n최근 앤스로픽의 AI 모델 ‘미토스(Mythos)’의 등장으로 지능형 AI 공격에 대응하기 위해 앤드포인트의 이상행위를 실시간으로 감시하고 의심 파일을 탐지해 내는EDR의 역할이 그 어느 때 보다 중요해 지고 있다.\n\n미국 워싱턴DC에서 열린 국제통화기금(IMF)·세계은행(WB) 회의에 참석한 각국 주요 정부 및 금융관계자 들도 AI를 활용한 사이버 위협을 주요 의제로 다뤘다. 국내도 정부 주재 대책회의와 함께 금감원에서는 미토스 대응을 위한 보안 강화 전략으로 금융기관 EDR 점검을 언급한 바 있다.\n\n지니언스의 EDR 솔루션은 엔드포인트에서 발생하는 행위를 지속적으로 모니터링하여 위협을 탐지/분석 및 대응하는 보안 기술이다. 해킹 시도부터 파악하여 대응할 수 있으며, 해킹 사고 이후에도 전체 행위를 확인할 수 있다. 머신러닝 엔진과 AI 기반 CTI서비스의 유기적 연동을 통해 알려지지 않은 악성코드까지 탐지하고 대응이 가능하다.\n\n여기에 EDR과 함께 지난해 새롭게 선보인 차세대 백신(AV, Anti-Virus)과 안티랜섬웨어(AR, Anti-Ransomware), 매체제어(Device Control) 기능을 통합한 지니언스의 통합 엔드포인트 보안 플랫폼 전략은 AI 시대의 가장 실전적인 해법으로 주목받고 있다.\n\n이동범 지니언스 대표는 “미토스(Mythos)와 같이 AI가 자율적으로 공격 시나리오를 설계하는 시대에는 '언제든 닥칠 수 있는 현실'이라는 전제하에 방어 체계를 재점검해야 한다’며 “지니언스는 7년 연속 공공 시장 1위를 달성한 EDR 기술력에 AI 기반 자동화 대응 체계를 접목해, 지능형 공격을 실시간으로 식별하고 즉각 차단하는 가장 진보된 엔드포인트 보안 플랫폼을 제공하겠다”고 밝혔다.\n\n![지니언스의 통합 엔드포인트 보안 플랫폼 ‘지니안 인사이츠 E’](https://www.genians.co.kr/hs-fs/hubfs/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%9D%98%20%ED%86%B5%ED%95%A9%20%EC%97%94%EB%93%9C%ED%8F%AC%EC%9D%B8%ED%8A%B8%20%EB%B3%B4%EC%95%88%20%ED%94%8C%EB%9E%AB%ED%8F%BC%20%E2%80%98%EC%A7%80%EB%8B%88%EC%95%88%20%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0%20E%E2%80%99.png?width=930&height=420&name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EC%9D%98%20%ED%86%B5%ED%95%A9%20%EC%97%94%EB%93%9C%ED%8F%AC%EC%9D%B8%ED%8A%B8%20%EB%B3%B4%EC%95%88%20%ED%94%8C%EB%9E%AB%ED%8F%BC%20%E2%80%98%EC%A7%80%EB%8B%88%EC%95%88%20%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0%20E%E2%80%99.png)\n\n[그림] 지니언스의 통합 엔드포인트 보안 플랫폼 ‘지니안 인사이츠 E’\n\n**\\* 용어설명**\n\nEDR(Endpoint Detection & Response) : 엔드포인트 지능형 위협 탐지 및 대응 솔루션\n\n* PC 및 서버 등 네트워크 끝단(Endpoint)의 행위를 상시 모니터링하여 랜섬웨어, APT 공격 등 지능형 위협을 실시간 탐지하고, 원인 분석 및 대응(차단·복구)을 지원하는 보안 솔루션\n* 악성코드 유입과 감염뿐 아니라 취약점을 위용한 내부 확산을 탐지하고, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응할 수 있는 보안 솔루션"}, {"title": "- 북미·중동·APAC 지역 고른 성장세…36개국·81개 파트너 기반 해외 공략 가속화 - NAC에서 제로트러스트로 성공적 전환 및 클라우드 구독 모델 안착 - 글로벌 원스톱 서비스 체계 구축…AI 기술 고도화로 글로벌 시장 선점 목표", "date": "2026.04.07", "link": "https://www.genians.co.kr/pr-room/press/20260407", "category": "NAC", "body_html": "<p>지니언스가 해외 시장을 중심으로 고객 기반을 빠르게 확장하며, ‘K-보안’의 글로벌 확산을 본격화하고 있다.  </p>\n<p>글로벌 사이버 보안 선도 기업 지니언스(263860, 대표 이동범)가 글로벌 누적 고객 200곳을 돌파하며 글로벌 시장에서의 영향력을 지속적으로 확대하고 있다고 밝혔다. NAC에서 제로트러스트로의 성공적인 전환과 클라우드 기반 구독 모델의 안착이 주요 성장 동력으로 작용했다.  </p>\n<p>현재 지니언스의 해외 매출은 미국 시장 비중이 가장 높고, 중동 지역이 전략적 요충지로 급부상하고 있다. 또한 싱가포르를 포함한 아시아·태평양(APAC) 지역에서도 신규 고객을 잇달아 확보하며 특정 국가에 편중되지 않은 균형 잡힌 포트폴리오를 구축했다.  </p>\n<p>이 같은 성과는 글로벌 밀착형 지원 체계가 뒷받침되었기에 가능했다. 지니언스는 지난해 인도 벵갈루루에 글로벌 기술지원센터(GTSC)를 설립했으며, 미국 법인 및 UAE 사무소와의 유기적인 협업을 통해 제품 판매부터 기술 지원까지 아우르는 ‘글로벌 원스톱 서비스’ 체계를 완성했다. 글로벌 고객의 요구사항에 실시간으로 대응하며 만족도를 극대화하고 있다.  </p>\n<p>이러한 전방위적 지원 체계는 지니언스 솔루션이 다양한 산업 군과 복잡한 글로벌 비즈니스 환경에서도 실질적인 보안 효용성을 입증하는 밑거름이 됐다. 특히 다양한 국가에서 안정적인 운영 사례가 축적됨에 따라, 제품에 대한 대외적 신뢰도가 높아진 점이 신규 고객 확대에 결정적인 영향을 미치고 있다는 평가다.  </p>\n<p>사업 조직과 마케팅 전략의 변화도 주효했다. 지니언스는 해외사업본부장 영입 이후 글로벌 시장을 세분화하여 공략을 본격화했으며, 주요 보안 전시회 및 컨퍼런스에 지속적으로 참가해 브랜드 인지도를 높여왔다. 특히 기술 콘텐츠 중심의 온라인 마케팅을 강화해, 글로벌 고객이 직접 제품을 검토하고 기술 문의를 하는 '인바운드' 영업 사례가 크게 늘어난 점도 고무적이다.  </p>\n<p>지니언스는 향후 AI 등 최신 보안 트렌드에 발맞춰 기술 고도화에 집중할 방침이다. AI 적용 범위를 단계적으로 확대해 제품 기능을 강화하고 보안 운영의 효율성을 높임으로써, 전 세계 고객들의 보안 관리 부담을 획기적으로 줄여나갈 계획이다.  </p>\n<p>나세일 지니언스 해외사업본부 상무는 “글로벌 고객 200곳 확보는 지니언스의 기술력과 글로벌 운영 전략이 시너지를 낸 결과”라며 “지역별 시장 특성에 맞춘 차별화된 전략과 강력한 파트너십을 바탕으로 글로벌 보안 시장에서의 입지를 더욱 공고히 하겠다”고 강조했다.</p>", "body_text": "지니언스가 해외 시장을 중심으로 고객 기반을 빠르게 확장하며, ‘K-보안’의 글로벌 확산을 본격화하고 있다.  \n  \n글로벌 사이버 보안 선도 기업 지니언스(263860, 대표 이동범)가 글로벌 누적 고객 200곳을 돌파하며 글로벌 시장에서의 영향력을 지속적으로 확대하고 있다고 밝혔다. NAC에서 제로트러스트로의 성공적인 전환과 클라우드 기반 구독 모델의 ...", "full_text": "지니언스가 해외 시장을 중심으로 고객 기반을 빠르게 확장하며, ‘K-보안’의 글로벌 확산을 본격화하고 있다.  \n  \n글로벌 사이버 보안 선도 기업 지니언스(263860, 대표 이동범)가 글로벌 누적 고객 200곳을 돌파하며 글로벌 시장에서의 영향력을 지속적으로 확대하고 있다고 밝혔다. NAC에서 제로트러스트로의 성공적인 전환과 클라우드 기반 구독 모델의 안착이 주요 성장 동력으로 작용했다.  \n  \n현재 지니언스의 해외 매출은 미국 시장 비중이 가장 높고, 중동 지역이 전략적 요충지로 급부상하고 있다. 또한 싱가포르를 포함한 아시아·태평양(APAC) 지역에서도 신규 고객을 잇달아 확보하며 특정 국가에 편중되지 않은 균형 잡힌 포트폴리오를 구축했다.  \n  \n이 같은 성과는 글로벌 밀착형 지원 체계가 뒷받침되었기에 가능했다. 지니언스는 지난해 인도 벵갈루루에 글 기업들의 이목을 집중시키기 위한 전략이다.  </p>\n<p>지니언스는 보안 정책이 실제 접속과 실행 시점에서 얼마나 빠르고 즉각적으로 작동하는가에 초점을 맞췄다. 이를 통해 보안을 단순한 ‘비용’이나 ‘관리 체계’가 아닌, 글로벌 비즈니스를 지속 가능하게 만들고 기업의 매출을 보호하는 강력한 ‘실행 인프라’로 재정의하여 글로벌 참관객들의 이목을 사로잡을 계획이다.  </p>\n<p>김계연 지니언스 CTO·미국법인장은 “지니언스가 12년 연속 세계 최대 보안 행사인 RSAC에 참가하며 글로벌 공략을 할 수 있었던 것은 21년간 축적해 온 탄탄한 기술력과 다양한 레퍼런스 덕분”이라며 “접속부터 세션, 실행 구간까지 아우르는 지니언스의 통합 보안 인프라를 글로벌 고객에게 선보일 것”이라고 말했다.</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 오는 3월 23일부터 26일(현지 시각)까지 미국 샌프란시스코 모스콘 센터에서 열리는 세계 최대 규모 사이버 보안 전시회 ‘RSA 컨퍼런스 2026(이하 RSAC 2026)’에 참가한다고 20일 밝혔다.  \n  \n‘보안 업계의 CES’로 불리는 RSAC는 전 세계 보안 전문가들이 모여 최신 기술...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)는 오는 3월 23일부터 26일(현지 시각)까지 미국 샌프란시스코 모스콘 센터에서 열리는 세계 최대 규모 사이버 보안 전시회 ‘RSA 컨퍼런스 2026(이하 RSAC 2026)’에 참가한다고 20일 밝혔다.  \n  \n‘보안 업계의 CES’로 불리는 RSAC는 전 세계 보안 전문가들이 모여 최신 기술과 트렌드를 공유하는 글로벌 행사다. 지난해에는 4만 명 이상의 참관객이 행사장을 찾았다. 지니언스는 12년 연속 참가를 통해 글로벌 시장에서 자사의 보안 기술력을 꾸준히 알려왔다.  \n  \n지니언스는 이번 행사에서 ▲NAC(네트워크 접근 제어) ▲ZTNA(제로 트러스트 네트워크 액세스) ▲Insights E(단말 보안) 등 핵심 보안 솔루션 3종을 선보인다. 특히 올해는 개별 제품 소개를 넘어 접속(NAC), 세션(ZTNA), 실행(Insights E) 구간을 하나의 흐름으로 연결하는 ‘통합 보안 인프라’ 구조를 강조할 계획이다.  \n  \n전시 부스에서는 방문객들이 접속 시점부터 세션 유지, 단말 실행 단계까지 보안 통제가 어떻게 이루어지는지 직관적으로 확인할 수 있도록 제품 시연과 다양한 고객 사례를 소개한다. 접속 통제가 필요한 환경에는 NAC, 원격 및 내부 접근 제어에는 ZTNA, 단말 실행 통제에는 Insights E를 적용하는 방식으로 각 보안 단계의 역할을 명확히 제시한다. 이를 통해 기업 환경에 맞춘 유연한 보안 확장 구조를 보여줄 예정이다.  \n  \n지니언스는 이번 전시의 핵심 키워드로 ‘컴플라이언스 벨로시티(Compliance Velocity)’를 전면에 내세운다. 최근 글로벌 규제 요구사항과 감사 기준이 강화되고 있지만, 기존의 정책 및 문서 중심 보안 체계로는 현장에서 즉각적인 실행이 어렵다는 기업들의 이목을 집중시키기 위한 전략이다.  \n  \n지니언스는 보안 정책이 실제 접속과 실행 시점에서 얼마나 빠르고 즉각적으로 작동하는가에 초점을 맞췄다. 이를 통해 보안을 단순한 ‘비용’이나 ‘관리 체계’가 아닌, 글로벌 비즈니스를 지속 가능하게 만들고 기업의 매출을 보호하는 강력한 ‘실행 인프라’로 재정의하여 글로벌 참관객들의 이목을 사로잡을 계획이다.  \n  \n김계연 지니언스 CTO·미국법인장은 “지니언스가 12년 연속 세계 최대 보안 행사인 RSAC에 참가하며 글로벌 공략을 할 수 있었던 것은 21년간 축적해 온 탄탄한 기술력과 다양한 레퍼런스 덕분”이라며 “접속부터 세션, 실행 구간까지 아우르는 지니언스의 통합 보안 인프라를 글로벌 고객에게 선보일 것”이라고 말했다."}, {"title": "- ‘지니안 인사이츠 E’ 기반 EPP 시장 확대 및 MDR 서비스 협력 로드맵 공유 - 서비스 중심 조직 개편 후 첫 행보...파트너 상생 위한 서비스 상품화 전략 발표", "date": "2026.03.05", "link": "https://www.genians.co.kr/pr-room/press/20260305", "category": "비즈니스 & 성과", "body_html": "<p>사이버 보안 전문기업 지니언스(263860, 대표이사 이동범)가 지난 2월 25일부터 26일까지 양일간 파트너사와의 동반성장을 위한 ‘2026 지니언스 파트너데이’를 개최했다고 밝혔다.  </p>\n<p>이번 행사에는 대신정보통신, 론스텍, 에티버스, SK쉴더스 등 주요 총판 및 51개 파트너사가 참석했다. 지니언스는 이 자리에서 지난해 성과를 돌아보고, 2026년 전략 방향 중 ▲EPP(Endpoint Protection Platform) 시장으로의 사업 영역 확장 ▲서비스 사업(MDR) 본격화를 달성하기 위한 구체적인 파트너 협력 방안을 제시했다.  </p>\n<p>올해 행사의 핵심 축 중 하나는 차세대 통합 단말 보안 플랫폼 ‘지니안 인사이츠 E(Genian Insight E)’다. 지니언스는 지난해 EDR 기술력을 기반으로 안티바이러스(AV), 안티랜섬웨어, 매체제어 기능을 단일 에이전트에 통합한 EPP 솔루션을 선보이며 주목을 받았다.  </p>\n<p>이번 세션에서는 기존 EDR 고객층을 넘어 EPP 시장 전반으로 영역을 확장하기 위한 전략적 논의가 진행됐다. 지니언스는 파트너사들과 함께 ‘지니안 인사이츠 E’를 통해 고객의 보안 관리 효율성을 극대화하고, 단순 솔루션 공급을 넘어선 ‘통합 단말 보안 환경’ 구축 방안을 공유하며 EPP 시장 안착을 위한 목표를 공유했다.  </p>\n<p>지니언스는 올해를 ‘서비스 사업 도약의 원년’으로 삼고, 연초 서비스 사업 강화를 목표로 대대적인 조직 개편을 단행했다. 이번 파트너데이에서는 지난해 출시한 MDR(Managed Detection and Response) 서비스의 성과를 공유하고, 파트너사와 수익을 공유할 수 있는 구체적인 서비스 상품화 전략을 공개했다.  </p>\n<p>특히 지니언스는 파트너사가 서비스 공급의 핵심 주체로 참여할 수 있도록 ▲역할 분담 최적화 ▲기술 지원 고도화 등 실질적인 협업 모델을 제시했다. 이는 제품 경쟁력에 전문적인 보안 서비스 역량을 결합해 시장 대응력을 한 차원 높이겠다는 전략이다.  </p>\n<p>이 외에도 지니언스는 파트너 정책 세션을 통해 생태계 지원 방향을 명확히 하고 현장의 의견을 청취했다. 지난 한 해 우수한 성과를 거둔 파트너사를 선정하는 시상식도 진행되며 상생의 의미를 더했다.  </p>\n<p>이동범 지니언스 대표는 “올해 파트너데이는 기존 제품 중심의 사업에서 한 단계 나아가, EPP 플랫폼과 서비스 사업이라는 새로운 성장 동력을 파트너사들과 공유하는 뜻깊은 자리였다”며 “조직 개편을 통해 서비스 역량을 결집한 만큼, 파트너사와 긴밀히 협력해 지속 가능한 보안 생태계를 만들어 가겠다”고 말했다.</p>", "body_text": "사이버 보안 전문기업 지니언스(263860, 대표이사 이동범)가 지난 2월 25일부터 26일까지 양일간 파트너사와의 동반성장을 위한 ‘2026 지니언스 파트너데이’를 개최했다고 밝혔다.  \n  \n이번 행사에는 대신정보통신, 론스텍, 에티버스, SK쉴더스 등 주요 총판 및 51개 파트너사가 참석했다. 지니언스는 이 자리에서 지난해 성과를 돌아보고, 2026년...", "full_text": "사이버 보안 전문기업 지니언스(263860, 대표이사 이동범)가 지난 2월 25일부터 26일까지 양일간 파트너사와의 동반성장을 위한 ‘2026 지니언스 파트너데이’를 개최했다고 밝혔다.  \n  \n이번 행사에는 대신정보통신, 론스텍, 에티버스, SK쉴더스 등 주요 총판 및 51개 파트너사가 참석했다. 지니언스는 이 자리에서 지난해 성과를 돌아보고, 2026년 전략 방향 중 ▲EPP(Endpoint Protection Platform) 시장으로의 사업 영역 확장 ▲서비스 사업(MDR) 본격화를 달성하기 위한 구
