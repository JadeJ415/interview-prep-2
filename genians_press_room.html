입지 강화", "date": "2021.07.14", "link": "https://www.genians.co.kr/pr-room/press/20210715_edr", "category": "기타 뉴스", "body_html": "<p>통합 보안 플랫폼 기업 지니언스가 광주은행 EDR 구축 사업을 수주했다고 밝혔다. 2020년 국내 최다 EDR 고객을 확보한 지니언스는 은행・생명보험·손해보험 등 시장 영향력이 있는 다양한 금융권 고객을 지속적으로 확보함으로써 EDR 시장의 리더십을 확고히 하고 있다.</p>\n<p>1968년 설립된 광주은행(은행장 송종욱)은 최고의 수익성과 안정성을 겸비한 광주·전남의 대표은행이다. 한국산업 브랜드파워 지방은행 4년 연속 1위를 기록하고 있으며 이익 실현을 넘어 지역 상생 발전을 추구하는 ESG 경영을 실천하고 있다.</p>\n<p>광주은행은 2016년 차세대 전산시스템 오픈을 시작으로 디지털혁신 금융을 선도해 왔다. 2019년 국내 은행권 최초로 인터넷·웹·모바일뱅킹 서비스에 대한 정보보호 및 개인정보보호 관리체계(ISMS-P) 인증을 받았다. 지난해에는 Covid-19 이후 금융권 최초 재택근무 보안 시스템을 구축하는 등 디지털 트랜스포메이션을 발빠르게 추진했다.</p>\n<p>광주은행은 비즈니스의 특성상 개인정보와 금융거래정보 등 방대하고 중요한 정보를 다루는 만큼 그 어느 산업보다 보안이 강조되었고 선도적으로 보안 위협에 대응하는 서비스 체계를 확보해 왔다. 최근 전 세계적으로 고도화된 해킹 기술과 피싱 등 사회공학적기법을 결합한 APT 공격은 회사의 중요 정보 자산이 유출되거나 손실될 위협이 크다.</p>\n<p>광주은행은 랜섬웨어, AI와 결합한 신종·변종 악성코드의 증가 등 고도화되고 지능화된 다양한 위협에 대한 효율적인 대응 체계 마련에 착수 했다. 보안 위협에 대란 차단 격리 대응 강화 및 가시성 확보, 악성코드와 이상행위의의 통합 관리를 주요 과제로 삼고 EDR 솔루션 도입을 추진했다.</p>\n<p>위협 탐지 대응 체계, 안정화, 호환성 등 EDR 솔루션의 면밀한 검토를 거쳐 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’를 선택했다. 이 제품은 악성코드 유입과 감염, 취약점을 이용한 내부 확산 탐지, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응하는 인텔리전스 보안 솔루션이다. 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.</p>\n<p>특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.</p>\n<p><img alt=\"지니언스 EDR\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&amp;height=320&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg\" /></p>\n<p>광주은행은 현재 활용중인 ‘지니안 NAC’ 솔루션과의 연동을 통해 별도 에이전트 설치 없이 기존 환경 변화를 최소화 하면서 시스템을 구축한다는 방침이다. EDR 솔루션 도입을 통해 내・외부 위협 탐지 및 대응, 정보 유출 등 단말 보안이 도화 될 것으로 기대하고 있으며 보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지를 한층 강화한다는 전략이다.</p>\n<p>이동범 지니언스 대표이사는 “최근 보안 시장은 공격의 고도화, 지능형 위협의 증대에 따라 안티바이러스를 회피해서 공격하는 다양한 형태가 존재 한다”며 “지니언스의 EDR 솔루션은 검증된 단말안정성, 글로벌 수준의 위협탐지 역량, 국내 환경에 최적화된 기술력을 강점으로 광주은행의 안전한 비즈니스 환경 구축에 일익을 담당할 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스가 광주은행 EDR 구축 사업을 수주했다고 밝혔다. 2020년 국내 최다 EDR 고객을 확보한 지니언스는 은행・생명보험·손해보험 등 시장 영향력이 있는 다양한 금융권 고객을 지속적으로 확보함으로써 EDR 시장의 리더십을 확고히 하고 있다.\n\n1968년 설립된 광주은행(은행장 송종욱)은 최고의 수익성과 안정성을 겸비한 광주·전남...", "full_text": "통합 보안 플랫폼 기업 지니언스가 광주은행 EDR 구축 사업을 수주했다고 밝혔다. 2020년 국내 최다 EDR 고객을 확보한 지니언스는 은행・생명보험·손해보험 등 시장 영향력이 있는 다양한 금융권 고객을 지속적으로 확보함으로써 EDR 시장의 리더십을 확고히 하고 있다.\n\n1968년 설립된 광주은행(은행장 송종욱)은 최고의 수익성과 안정성을 겸비한 광주·전남의 대표은행이다. 한국산업 브랜드파워 지방은행 4년 연속 1위를 기록하고 있으며 이익 실현을 넘어 지역 상생 발전을 추구하는 ESG 경영을 실천하고 있다.\n\n광주은행은 2016년 차세대 전산시스템 오픈을 시작으로 디지털혁신 금융을 선도해 왔다. 2019년 국내 은행권 최초로 인터넷·웹·모바일뱅킹 서비스에 대한 정보보호 및 개인정보보호 관리체계(ISMS-P) 인증을 받았다. 지난해에는 Covid-19 이후 금융권 최초 재택근무 보안 시스템을 구축하는 등 디지털 트랜스포메이션을 발빠르게 추진했다.\n\n광주은행은 비즈니스의 특성상 개인정보와 금융거래정보 등 방대하고 중요한 정보를 다루는 만큼 그 어느 산업보다 보안이 강조되었고 선도적으로 보안 위협에 대응하는 서비스 체계를 확보해 왔다. 최근 전 세계적으로 고도화된 해킹 기술과 피싱 등 사회공학적기법을 결합한 APT 공격은 회사의 중요 정보 자산이 유출되거나 손실될 위협이 크다.\n\n광주은행은 랜섬웨어, AI와 결합한 신종·변종 악성코드의 증가 등 고도화되고 지능화된 다양한 위협에 대한 효율적인 대응 체계 마련에 착수 했다. 보안 위협에 대란 차단 격리 대응 강화 및 가시성 확보, 악성코드와 이상행위의의 통합 관리를 주요 과제로 삼고 EDR 솔루션 도입을 추진했다.\n\n위협 탐지 대응 체계, 안정화, 호환성 등 EDR 솔루션의 면밀한 검토를 거쳐 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’를 선택했다. 이 제품은 악성코드 유입과 감염, 취약점을 이용한 내부 확산 탐지, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응하는 인텔리전스 보안 솔루션이다. 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\n특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\n![지니언스 EDR](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&height=320&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg)\n\n광주은행은 현재 활용중인 ‘지니안 NAC’ 솔루션과의 연동을 통해 별도 에이전트 설치 없이 기존 환경 변화를 최소화 하면서 시스템을 구축한다는 방침이다. EDR 솔루션 도입을 통해 내・외부 위협 탐지 및 대응, 정보 유출 등 단말 보안이 도화 될 것으로 기대하고 있으며 보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지를 한층 강화한다는 전략이다.\n\n이동범 지니언스 대표이사는 “최근 보안 시장은 공격의 고도화, 지능형 위협의 증대에 따라 안티바이러스를 회피해서 공격하는 다양한 형태가 존재 한다”며 “지니언스의 EDR 솔루션은 검증된 단말안정성, 글로벌 수준의 위협탐지 역량, 국내 환경에 최적화된 기술력을 강점으로 광주은행의 안전한 비즈니스 환경 구축에 일익을 담당할 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "지니언스, 차세대 NAC '국가대표' 글로벌 기술력 인정 정보보안 리더십 굳힌다", "date": "2021.06.25", "link": "https://www.genians.co.kr/pr-room/press/20210625_nextnac", "category": "NAC", "body_html": "<h3>NAC 연구개발 투자/안정적 매출, 국내 시장 점유율 72%로 독보적 1위</h3>\n<h3>EDR 솔루션 개발...랜섬웨어 대응, 작년 신규 고객사 26곳 성장가도</h3>\n<p>전자신문 상장기업분석 코너에 지니언스가 소개되었습니다. 독자 개발 NAC 솔루션 경쟁력 최고, 누적 고객사 1600여곳을 국내 최다인 것이 강점으로 분석되었으며 국내외 대형 해킹 등으로 사이버 보안이 주목되는 가운데 EDR을 선점하고 있다는 내용입니다. 원문은 아래 링크를 참고 해 주시기 바랍니다.</p>\n<p><a href=\"https://www.etnews.com/20210624000125\">[전자신문-상장기업분석] 지니언스, 차세대 보안 솔루션으로 제 2의 도약</a></p>", "body_text": "### NAC 연구개발 투자/안정적 매출, 국내 시장 점유율 72%로 독보적 1위\n\n### EDR 솔루션 개발...랜섬웨어 대응, 작년 신규 고객사 26곳 성장가도\n\n전자신문 상장기업분석 코너에 지니언스가 소개되었습니다. 독자 개발 NAC 솔루션 경쟁력 최고, 누적 고객사 1600여곳을 국내 최다인 것이 강점으로 분석되었으며 국내외 대형 해킹 등으로 사이버...", "full_text": "### NAC 연구개발 투자/안정적 매출, 국내 시장 점유율 72%로 독보적 1위\n\n### EDR 솔루션 개발...랜섬웨어 대응, 작년 신규 고객사 26곳 성장가도\n\n전자신문 상장기업분석 코너에 지니언스가 소개되었습니다. 독자 개발 NAC 솔루션 경쟁력 최고, 누적 고객사 1600여곳을 국내 최다인 것이 강점으로 분석되었으며 국내외 대형 해킹 등으로 사이버 보안이 주목되는 가운데 EDR을 선점하고 있다는 내용입니다. 원문은 아래 링크를 참고 해 주시기 바랍니다.\n\n[[전자신문-상장기업분석] 지니언스, 차세대 보안 솔루션으로 제 2의 도약](https://www.etnews.com/20210624000125)"}, {"title": "제로 트러스트 NAC 기반으로 SASE 등 차세대 정보 보안 솔루션 개발 박차", "date": "2021.06.17", "link": "https://www.genians.co.kr/pr-room/press/gatnernac", "category": "NAC", "body_html": "<h3></h3>\n<p>지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 발표한 ‘2021 네트워크 접근 제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 2018년 국내 유일이자 최초로 등재된 이래 3회 연속 선정이 되면서 글로벌 기술 경쟁력을 다시 한번 입증하는 계기가 됐다.</p>\n<p>가트너에 따르면 NAC는 내부 정보 보호 체계 수립, 기업 내부 인프라에 접근하는 사용자의 단말에 대한 가시성 확보를 통해 기업의 자산과 사용자를 지속적으로 보호해왔다. 네트워크 환경에 참여하는 IoT·OT 등의 다양한 단말의 증가에 다른 보안 요구 사항의 강화로 NAC의 역할 및 시장이 확장되고 있다고 설명했다. 또한, 가트너는 NAC의 확장 기술로 ZTNA(Zero Trust Network Access)를 언급하며 클라우드 및 재택 등 분산된 IT 환경에서 차세대 보안모델로 NAC가 역할을 할 수 있을 것으로 전망했다.</p>\n<p><img alt=\"가트너 NAC\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%E2%80%98%EA%B0%80%ED%8A%B8%EB%84%88-NAC-%EB%A7%88%EC%BC%93%EA%B0%80%EC%9D%B4%EB%93%9C-%EB%8C%80%ED%91%9C-%EA%B8%B0%EC%97%85%EC%97%90-3%EB%85%84-%EC%97%B0%EC%86%8D-%EC%84%A0%EC%A0%95%EB%90%90%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_-1024x536.png?width=1024&amp;height=536&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%E2%80%98%EA%B0%80%ED%8A%B8%EB%84%88-NAC-%EB%A7%88%EC%BC%93%EA%B0%80%EC%9D%B4%EB%93%9C-%EB%8C%80%ED%91%9C-%EA%B8%B0%EC%97%85%EC%97%90-3%EB%85%84-%EC%97%B0%EC%86%8D-%EC%84%A0%EC%A0%95%EB%90%90%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_-1024x536.png\" /></p>\n<p>지니언스의 NAC 솔루션은 글로벌 기술 경쟁력을 기반으로 지속적인 발전을 해왔다. 특허 받은 DPI 기술을 통해  네트워크 가시성을 고도화한 차세대 NAC를 출시했으며 최근에는 제로 트러스트 보안 모델에 기반한 ‘제로 트러스트 NAC’를 선보였다.</p>\n<p>‘지니안 제로 트러스트 NAC’는 모든 것을 지속적으로 검증하고 적절하게 대응한다는 원칙에서 시작한다.  네트워크에 연결되는 기본 단말기(PC, 노트북, 스마트폰 등)뿐 아니라, IP주소를 사용하는 모든 기기, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽까지 연결되는 모든 지점과 흐름을 지속적으로 확인·검증·분류하고 그 결과에 따라 정책에 입각한 자동화 대응을 실시한다</p>\n<p>네트워크에 연결되는 대상인 PC나 노트북 등의 단말뿐 아니라, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽까지 지속적으로 확인・검증하고 그 결과에 따라 자동화된 대응을 제공한다.</p>\n<p>단일 UI를 통한 제로트러스트 정책과 구성요소 관리(Provisioning)▶ NAC와 VPN이 통합된 에이전트 ▶ ZT-NAC 게이트웨이 ▶네트워크 트래픽 분석(NTA) ▶네트워크 탐지 및 대응 (NDR) ▶엔드포인트 탐지 및 대응(EDR) 등의 특장점을 제공한다.</p>\n<p>모든 노드의 검증과 대응이 가능하며. 클라우드를 통해 진화하는 원격·재택 근무 환경을 보호하고 ‘제로 트러스트 NAC’를 활용하여 가까운 미래에 SASE 아키텍처로까지 발전시킬 수 있다.</p>\n<p>김계연 CTO/미국법인장은 “지니안 제로 트러스트 NAC는 재택과 클라우드로 대표되는 변화된 IT 환경에서 적용과 보안을 만족시킬 수 있는 완전히 새로운 NAC이다”며 “복잡 다단해진 네트워크 경계에서의 보안성 확보를 단일 사이버 보안 플랫폼으로 통합하여 제공할 수 있다”고 밝혔다. 또한 그는 “가트너 마켓가이드에 3회 선정된 만큼 기술력은 글로벌 상위 기업과도 뒤지지 않는다”며 “국내뿐 아니라 글로벌 시장 개척에도 총력을 다하겠다”고 덧붙였다.</p>\n<p>|  |\n|</p>", "body_text": "### \n\n지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 발표한 ‘2021 네트워크 접근 제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 2018년 국내 유일이자 최초로 등재된 이래 3회 연속 선정이 되면서 글로벌 기술 경쟁력을 다시 한번 입증하는 계기가 됐다.\n\n가트너에 따르면 NAC는 내부 정보 보호 체계...", "full_text": "### \n\n지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 발표한 ‘2021 네트워크 접근 제어 마켓가이드’의 대표 기업으로 선정됐다고 밝혔다. 2018년 국내 유일이자 최초로 등재된 이래 3회 연속 선정이 되면서 글로벌 기술 경쟁력을 다시 한번 입증하는 계기가 됐다.\n\n가트너에 따르면 NAC는 내부 정보 보호 체계 수립, 기업 내부 인프라에 접근하는 사용자의 단말에 대한 가시성 확보를 통해 기업의 자산과 사용자를 지속적으로 보호해왔다. 네트워크 환경에 참여하는 IoT·OT 등의 다양한 단말의 증가에 다른 보안 요구 사항의 강화로 NAC의 역할 및 시장이 확장되고 있다고 설명했다. 또한, 가트너는 NAC의 확장 기술로 ZTNA(Zero Trust Network Access)를 언급하며 클라우드 및 재택 등 분산된 IT 환경에서 차세대 보안모델로 NAC가 역할을 할 수 있을 것으로 전망했다.\n\n![가트너 NAC](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%E2%80%98%EA%B0%80%ED%8A%B8%EB%84%88-NAC-%EB%A7%88%EC%BC%93%EA%B0%80%EC%9D%B4%EB%93%9C-%EB%8C%80%ED%91%9C-%EA%B8%B0%EC%97%85%EC%97%90-3%EB%85%84-%EC%97%B0%EC%86%8D-%EC%84%A0%EC%A0%95%EB%90%90%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_-1024x536.png?width=1024&height=536&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%E2%80%98%EA%B0%80%ED%8A%B8%EB%84%88-NAC-%EB%A7%88%EC%BC%93%EA%B0%80%EC%9D%B4%EB%93%9C-%EB%8C%80%ED%91%9C-%EA%B8%B0%EC%97%85%EC%97%90-3%EB%85%84-%EC%97%B0%EC%86%8D-%EC%84%A0%EC%A0%95%EB%90%90%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_-1024x536.png)\n\n지니언스의 NAC 솔루션은 글로벌 기술 경쟁력을 기반으로 지속적인 발전을 해왔다. 특허 받은 DPI 기술을 통해  네트워크 가시성을 고도화한 차세대 NAC를 출시했으며 최근에는 제로 트러스트 보안 모델에 기반한 ‘제로 트러스트 NAC’를 선보였다.\n\n‘지니안 제로 트러스트 NAC’는 모든 것을 지속적으로 검증하고 적절하게 대응한다는 원칙에서 시작한다.  네트워크에 연결되는 기본 단말기(PC, 노트북, 스마트폰 등)뿐 아니라, IP주소를 사용하는 모든 기기, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽까지 연결되는 모든 지점과 흐름을 지속적으로 확인·검증·분류하고 그 결과에 따라 정책에 입각한 자동화 대응을 실시한다\n\n네트워크에 연결되는 대상인 PC나 노트북 등의 단말뿐 아니라, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽까지 지속적으로 확인・검증하고 그 결과에 따라 자동화된 대응을 제공한다.\n\n단일 UI를 통한 제로트러스트 정책과 구성요소 관리(Provisioning)▶ NAC와 VPN이 통합된 에이전트 ▶ ZT-NAC 게이트웨이 ▶네트워크 트래픽 분석(NTA) ▶네트워크 탐지 및 대응 (NDR) ▶엔드포인트 탐지 및 대응(EDR) 등의 특장점을 제공한다.\n\n모든 노드의 검증과 대응이 가능하며. 클라우드를 통해 진화하는 원격·재택 근무 환경을 보호하고 ‘제로 트러스트 NAC’를 활용하여 가까운 미래에 SASE 아키텍처로까지 발전시킬 수 있다.\n\n김계연 CTO/미국법인장은 “지니안 제로 트러스트 NAC는 재택과 클라우드로 대표되는 변화된 IT 환경에서 적용과 보안을 만족시킬 수 있는 완전히 새로운 NAC이다”며 “복잡 다단해진 네트워크 경계에서의 보안성 확보를 단일 사이버 보안 플랫폼으로 통합하여 제공할 수 있다”고 밝혔다. 또한 그는 “가트너 마켓가이드에 3회 선정된 만큼 기술력은 글로벌 상위 기업과도 뒤지지 않는다”며 “국내뿐 아니라 글로벌 시장 개척에도 총력을 다하겠다”고 덧붙였다.\n\n|  |\n|"}, {"title": "IoT·클라우드 시대 보안 위협의 새로운 대처 방안인 '제로 트러스트 NAC' 제시 제로 트러스트 보안 모델 복잡성 해소 SASE 등 차세대 보안 기술 확보 총력", "date": "2021.05.13", "link": "https://www.genians.co.kr/pr-room/press/제로-트러스트-nac", "category": "NAC", "body_html": "<p>글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2021년 5월18일부터 21일까지(한국시간 기준) 개최되는 세계 최대 보안 전시회 ‘RSAC 2021’에 참가한다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는 ’Resilience(회복력)’를 주제로 전 세계 보안 시장을 리딩하는 기업과 전문가들이 참가하여 차세대 보안의 기술과 미래를 조망한다.</p>\n<p>‘RSAC 2021’은 Covid-19 이후 실리콘밸리에서 진행하는 첫 온라인 대규모 행사로 200여개의 세션, 19개의 키노트, 세계 유수의 보안기업 90개사가 참여한다. 지니언스는 7년 연속 참여하고 있으며  ‘Trust Your People. Genians Will Verify’를 슬로건으로 ‘IoT・ 클라우드 시대 보안 위협에 대한 차세대 보안 기술인 ‘제로 트러스트 NAC’를 선보인다.</p>\n<p>제로 트러스트 보안의 원칙은 ‘아무 것도 신뢰하지 않는다’에서 출발했다. Covid-19 이후 재택근무 및 원격 교육으로 촉발된 디지털 트랜스포메이션이 전 사회로 확산되면서 사용자도 단말도 데이터도 절대 신뢰와 안전을 보장할 수 없는 상황에서 지속적으로 사용자와 다양한 장치를 검증하는 것이다. 클라우드 및 재택 등 분산된 IT 환경을 위한 차세대 보안 모델로 각광을 받고 있다.</p>\n<p>제로 트러스트 보안 모델의 핵심은 노드(node)를 지속적으로 확인・검증하고 그 결과에 따라 자동화된 적절한 대응을 제공하는 것이다. 노드는 일반적으로 단말을 의미하지만 제로 트러스트 모델에서는 보다 그 의미가 더 확장된다. 네트워크에 연결되는 대상인 PC나 노트북 등의 단말뿐 아니라, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽 등이 모두 노드에 해당되는 것이다.</p>\n<p><img alt=\"지니언스 RSAC 제로 트러스트 NAC\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/rsac.png?width=590&amp;height=600&amp;name=rsac.png\" /></p>\n<p>제로 트러스트는 클라우드・IOT・엣지 컴퓨팅 등 다양한 접속 환경에서 다양한 장치를 보호해야 하기 때문에 복잡하고 구현이 어려울 수 있지만 ‘지니안 NAC’의 네트워크 엣지 보안, DPI 기술을 통한 네트워크 가시성 확보로 보다 쉽게 구현이 가능하다. ‘지니안 제로 트러스트 NAC’는 모든 노드의 검증과 적절한 대응이 가능하다. 또한, 클라우드를 통해 진화하는 원격·재택 근무 환경을 보호하고 ‘제로 트러스트 NAC’를 활용하여 가까운 미래에 SASE 아키텍처로까지 발전시킬 수 있다.</p>\n<p>김계연 CTO/미국법인장은 “제로 트러스트 NAC는 지니언스의 제품이 글로벌 표준 NAC가 되는 근간이 될 것이다”며 “ “클라우드, 재택근무 및 5G와 같은 다양한 네트워크 환경과 연결 지점을 보호하며 지속적인 검증 과정으로 제로 트러스트 모델에 기반한 SASE와 같은 차세대 정보 보안 기술력을 완비하는데 총력을 다할 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2021년 5월18일부터 21일까지(한국시간 기준) 개최되는 세계 최대 보안 전시회 ‘RSAC 2021’에 참가한다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는 ’Resilience(회복력)’를 주제로 전 세계 보안 시장을 리딩하는 기업과 전문가들이 참가하여 차세대 보안의 기...", "full_text": "글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2021년 5월18일부터 21일까지(한국시간 기준) 개최되는 세계 최대 보안 전시회 ‘RSAC 2021’에 참가한다. 정보보안 분야 최고의 권위를 자랑하는 금번 전시회는 ’Resilience(회복력)’를 주제로 전 세계 보안 시장을 리딩하는 기업과 전문가들이 참가하여 차세대 보안의 기술과 미래를 조망한다.\n\n‘RSAC 2021’은 Covid-19 이후 실리콘밸리에서 진행하는 첫 온라인 대규모 행사로 200여개의 세션, 19개의 키노트, 세계 유수의 보안기업 90개사가 참여한다. 지니언스는 7년 연속 참여하고 있으며  ‘Trust Your People. Genians Will Verify’를 슬로건으로 ‘IoT・ 클라우드 시대 보안 위협에 대한 차세대 보안 기술인 ‘제로 트러스트 NAC’를 선보인다.\n\n제로 트러스트 보안의 원칙은 ‘아무 것도 신뢰하지 않는다’에서 출발했다. Covid-19 이후 재택근무 및 원격 교육으로 촉발된 디지털 트랜스포메이션이 전 사회로 확산되면서 사용자도 단말도 데이터도 절대 신뢰와 안전을 보장할 수 없는 상황에서 지속적으로 사용자와 다양한 장치를 검증하는 것이다. 클라우드 및 재택 등 분산된 IT 환경을 위한 차세대 보안 모델로 각광을 받고 있다.\n\n제로 트러스트 보안 모델의 핵심은 노드(node)를 지속적으로 확인・검증하고 그 결과에 따라 자동화된 적절한 대응을 제공하는 것이다. 노드는 일반적으로 단말을 의미하지만 제로 트러스트 모델에서는 보다 그 의미가 더 확장된다. 네트워크에 연결되는 대상인 PC나 노트북 등의 단말뿐 아니라, 사용자, 네트워크 인터페이스, 포트, 응용프로그램, 네트워크 트래픽 등이 모두 노드에 해당되는 것이다.\n\n![지니언스 RSAC 제로 트러스트 NAC](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/rsac.png?width=590&height=600&name=rsac.png)\n\n제로 트러스트는 클라우드・IOT・엣지 컴퓨팅 등 다양한 접속 환경에서 다양한 장치를 보호해야 하기 때문에 복잡하고 구현이 어려울 수 있지만 ‘지니안 NAC’의 네트워크 엣지 보안, DPI 기술을 통한 네트워크 가시성 확보로 보다 쉽게 구현이 가능하다. ‘지니안 제로 트러스트 NAC’는 모든 노드의 검증과 적절한 대응이 가능하다. 또한, 클라우드를 통해 진화하는 원격·재택 근무 환경을 보호하고 ‘제로 트러스트 NAC’를 활용하여 가까운 미래에 SASE 아키텍처로까지 발전시킬 수 있다.\n\n김계연 CTO/미국법인장은 “제로 트러스트 NAC는 지니언스의 제품이 글로벌 표준 NAC가 되는 근간이 될 것이다”며 “ “클라우드, 재택근무 및 5G와 같은 다양한 네트워크 환경과 연결 지점을 보호하며 지속적인 검증 과정으로 제로 트러스트 모델에 기반한 SASE와 같은 차세대 정보 보안 기술력을 완비하는데 총력을 다할 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "글로벌 상위 벤더와의 경쟁에서 승리, 글로벌 기술력 다시 한번 입증", "date": "2021.04.20", "link": "https://www.genians.co.kr/pr-room/press/nise-2", "category": "비즈니스 & 성과", "body_html": "<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 이스라엘 종합건설사 AZ Marketing에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 금번 수주는 글로벌 상위NAC 벤더와의 치열한 경쟁에서 승리한 것과 세계적인 정보보안 강국인 이스라엘에 국내 독자 개발한 네트워크 보안 제품을 수출했다는 점에서 큰 의미가 있다.</p>\n<p>이스라엘은 정치적 특수성으로 정부 주도로 정보보안 시장이 성장해 왔다. 보안 생태계 구축으로 사이버 보안 산업의 세계 최강으로 평가 받는다. 전 세계 보안 시장에서 미국에 이어 두번째로 큰 시장이며 세계 400대 사이버 보안 기업 중 이스라엘 기업은 42개사로 이 역시 미국에 이어 세계 2위 이다.</p>\n<p>AZ Marketing은 이스라엘의 민간 건설에서부터 공항, 철도 등 인프라 등 국가 프로젝트를 수행하는 종합 건설사 이다. 건설업의 특성상 설계도, 견적서 등 기업 내부의 중요한 자산을 보호하고 안전하게 사용하는 것은 무엇보다 중요하다. 본사・지점·현장 등의 원격지에서 접속하는 다양한 단말에 대한 고도화된 가시성 정보를 토대로 단말로부터 야기될 수 있는 위험(Risk)을 종합적이면서 효과적으로 관리하는 것 자체가 하나의 경쟁 우위 요소이다.</p>\n<p>AZ Marketing은 NAC 솔루션을 도입함에 있어 제품의 구조, 기능, UI 등을 면밀히 검토했다. 지니언스를 포함해 글로벌 상위권 벤더의 제품을 꼼꼼히 살폈다. 구축형·매니지드 서비스・클라우드 등 고객의 환경에 적합한 서비스 포트폴리오 제공, 제품의 손쉬운 설치와 유지보수, 고객 중심의 UI, IT・OT에 특화된 단말 식별 및 탐지 부분에서 지니언스가 높은 점수를 받았다.</p>\n<p>지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.</p>\n<p>지니언스는 NAC 분야 가트너 차세대 대표 기업 선정, 프로스트 &amp; 설리번 ‘글로벌 솔루션 마켓 리포트’ 등재로  글로벌 시장에서 이미 기술력을 인정 받았다. 아마존 웹 서비스(AWS) 마켓플레이스 등록을 완료하여 구축형, 매니지드 서비스, 클라우드 등 고객의 다양한 IT환경에 안정적이고 효율적인 보안 운영이 가능한 솔루션과 서비스 포트폴리오 제공한다. 고객은 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보할 수 있다.</p>\n<p>김계연 지니언스 CTO/미국법인장은 “사이버 보안 산업 자체가 국가 기반산업인 이스라엘에 지니언스의 차세대 NAC기술과 차별화된 구독 서비스를 강점으로 성공적인 데뷔를 했다”며”  “미국·유럽・중동에 이어 이스라엘까지 레퍼런스를 확충해 나감에 있어 제품의 투명성과 손쉬운 서비스 접근성에서 고객에게 좋은 평가를 받고 있다”고 밝혔다. 또한 그는 “차세대 NAC의 우수한 기술력을 바탕으로 지니안 NAC가 글로벌 표준이 될 수 있도록 최선의 노력을 다하겠다”고 덧붙였다.</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 이스라엘 종합건설사 AZ Marketing에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 금번 수주는 글로벌 상위NAC 벤더와의 치열한 경쟁에서 승리한 것과 세계적인 정보보안 강국인 이스라엘에 국내 독자 개발한 네트워크 보안 제품을 수출했다는 점에서 큰 의미가 있다.\n\n...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 이스라엘 종합건설사 AZ Marketing에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 금번 수주는 글로벌 상위NAC 벤더와의 치열한 경쟁에서 승리한 것과 세계적인 정보보안 강국인 이스라엘에 국내 독자 개발한 네트워크 보안 제품을 수출했다는 점에서 큰 의미가 있다.\n\n이스라엘은 정치적 특수성으로 정부 주도로 정보보안 시장이 성장해 왔다. 보안 생태계 구축으로 사이버 보안 산업의 세계 최강으로 평가 받는다. 전 세계 보안 시장에서 미국에 이어 두번째로 큰 시장이며 세계 400대 사이버 보안 기업 중 이스라엘 기업은 42개사로 이 역시 미국에 이어 세계 2위 이다.\n\nAZ Marketing은 이스라엘의 민간 건설에서부터 공항, 철도 등 인프라 등 국가 프로젝트를 수행하는 종합 건설사 이다. 건설업의 특성상 설계도, 견적서 등 기업 내부의 중요한 자산을 보호하고 안전하게 사용하는 것은 무엇보다 중요하다. 본사・지점·현장 등의 원격지에서 접속하는 다양한 단말에 대한 고도화된 가시성 정보를 토대로 단말로부터 야기될 수 있는 위험(Risk)을 종합적이면서 효과적으로 관리하는 것 자체가 하나의 경쟁 우위 요소이다.\n\nAZ Marketing은 NAC 솔루션을 도입함에 있어 제품의 구조, 기능, UI 등을 면밀히 검토했다. 지니언스를 포함해 글로벌 상위권 벤더의 제품을 꼼꼼히 살폈다. 구축형·매니지드 서비스・클라우드 등 고객의 환경에 적합한 서비스 포트폴리오 제공, 제품의 손쉬운 설치와 유지보수, 고객 중심의 UI, IT・OT에 특화된 단말 식별 및 탐지 부분에서 지니언스가 높은 점수를 받았다.\n\n지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.\n\n지니언스는 NAC 분야 가트너 차세대 대표 기업 선정, 프로스트 & 설리번 ‘글로벌 솔루션 마켓 리포트’ 등재로  글로벌 시장에서 이미 기술력을 인정 받았다. 아마존 웹 서비스(AWS) 마켓플레이스 등록을 완료하여 구축형, 매니지드 서비스, 클라우드 등 고객의 다양한 IT환경에 안정적이고 효율적인 보안 운영이 가능한 솔루션과 서비스 포트폴리오 제공한다. 고객은 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보할 수 있다.\n\n김계연 지니언스 CTO/미국법인장은 “사이버 보안 산업 자체가 국가 기반산업인 이스라엘에 지니언스의 차세대 NAC기술과 차별화된 구독 서비스를 강점으로 성공적인 데뷔를 했다”며”  “미국·유럽・중동에 이어 이스라엘까지 레퍼런스를 확충해 나감에 있어 제품의 투명성과 손쉬운 서비스 접근성에서 고객에게 좋은 평가를 받고 있다”고 밝혔다. 또한 그는 “차세대 NAC의 우수한 기술력을 바탕으로 지니안 NAC가 글로벌 표준이 될 수 있도록 최선의 노력을 다하겠다”고 덧붙였다.\n\n|  |\n|"}, {"title": "Industry 4.0 /스마트팩토리화에 따른 사이버 위협에 대한 산업 안전 보호 IT·OT 융합 보안 솔루션 공동 개발로 국내・외 OT 보안 시장 개척", "date": "2021.03.15", "link": "https://www.genians.co.kr/pr-room/press/20210316otal", "category": "기타 뉴스", "body_html": "<p>지니언스(263860, 대표 이동범)가 스마트팩토리 솔루션 전문 기업 타이아(대표 진이진 이성미)와 산업용 OT보안 솔루션 개발 협력 및 시장 개척을 골자로 업무협약(MOU)를 체결했다고 밝혔다.</p>\n<p>최근 Industry 4.0과 스마트팩토리화에 따라 산업 내부 시스템이 외부로 연결되면서 OT보안에 대한 중요성이 매우 커지고 있다. 연속 공정의 라인상에서 어느 한 설비의 침해와 오류는 전체 생산에 영향을 주며 이는 대규모 불량, 생산차질은 물론 기업 신뢰도의 하락으로 이어질 수 있기 때문이다.</p>\n<p>IBM산하 연구소인 IBM-X Force 발표에 의하면 2019년 OT ICS 표적 공격은 2000% 증가하고 있으며 사이버 위협에 의한 경영 손실 및 설비 손상으로 에너지 &amp; 유틸리티 분야의 손해는 매년 평균13.2백만달러에 이른다고 발표한 바 있다.</p>\n<p>데이터 보호에 중점을 둔 IT보안과 달리 OT보안의 목표는 가용성 보장과 산업 안전이다. 지니언스는 업계 최고 수준의 NAC와 EDR을 공급하고 있다. 이들 보안 플랫폼을 근간으로 OT 보안 요소기술들을 모듈화하고 IT/OT 융합 보안 솔루션, AI를 활용한 클라우드 보안 서비스 등의 로드맵을 통해 OT보안 시장을 적극 개척하고 있다.</p>\n<p>타이아는 다년간 국내외 대형 제조업의 산업정보시스템을 구축해 온 경험과 함께 공장의 설비 관리, 생산, 품질, 센서 데이터의 수집 등 스마트팩토리 통합 솔루션을 보유하고 있다. 4차산업혁명 시대를 맞아 IIoT와 AI 기술을 융합해 스마트 제조를 실현해 하고 있다.</p>\n<p>양사는 금번 제휴에 따라▶ 국・내외 OT 보안시장 발굴 ▶지니언스의 보안솔루션과 타이아 산업용 솔루션의 연동 개발 ▶제품의 상호 공급 및 활성화를 위한 공동사업을 수행한다는 계획이다.</p>\n<p>국내 IT 보안 기업들이 OT 보안 솔루션 개발을 준비하고 있는 가운데, 현재 국내 시장은 해외 유명 OT 보안업체들간의 각축장이 되어가고 있다. OT 보안은 그 특성상 영역별 전문업체간 협력이 절대적이며 IT 보안 전문기업인 지니언스와 제조현장 운영기술 전문업체인 타이아간 사업협력이 의미가 있으며, 이를 통해 빠르게 OT 보안 솔루션을 개발해 시장에 진입할 수 있을 것으로 전망된다.</p>\n<p>안동희 지니언스 OT 보안담당 전문위원은 “이번 전문업체간 제휴를 통해 양사 고객사 대상 OT 보안 솔루션 서비스라는 측면에서 시너지를 기대할 수 있다”며 “스마트팩토리와 주요 산업 인프라 보호의 당면과제를 양사 협력으로 적극 수행해 나가겠다”고 밝혔다.</p>\n<p>진이진 타이아 대표이사는 “중요 제조 설비를 대상으로 스마트팩토리 사업을 수행하면서 OT 제어망에 대한 고객사의 보안 요구가 있어왔으나 이에 대한 솔루션 대응이 부족했던 것이 현실이었다”며 “보안 전문기업 지니언스와의 협력으로 공동시범사업과 함께 향후 국/내외 고객사 OT 보안 서비스에 만전을 기하겠다”고 밝혔다.</p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01535046628983976&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 타이아와 OT보안 사업 협력…\"국내외 시장 개척\"</a></p>\n<p><a href=\"https://www.fnnews.com/news/202103160848585566\">[파이낸셜뉴스] 지니언스-타이아, OT보안 사업 협력</a></p>\n<p><a href=\"http://www.newsprime.co.kr/news/article/?no=536891\">[프라임경제] 지니언스, 타이아와 OT 보안 사업 협력 MOU</a></p>\n<p><a href=\"https://view.asiae.co.kr/article/2021031708495102419\">[아시아경제] 지니언스, 타이아와 OT 보안 사업 협력 MOU</a></p>\n<p><a href=\"https://news.g-enews.com/ko-kr/news/article/news_all/2021031609293443291aef83fcde_1/article.html?md=20210316093111_R\">[글로벌이코노믹] 지니언스, 타이아와 OT 보안 사업 협력 MOU 체결</a></p>\n<p><a href=\"http://www.ceoscoredaily.com/news/article.html?no=79720\">[CEO스코어데일리] 지니언스, 타이아와 OT 보안 사업 협력 MOU 체결</a></p>\n<p><a href=\"https://www.etnews.com/20210316000023\">[전자신문] 지니언스, 타이아 손잡고 OT보안 시장 공략</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2021031602109931820001&amp;ref=naver\">[디지털타임스] 지니언스, 타이아와 OT 보안 사업 협력 MOU</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=157236\">[데이터넷] 지니언스·타이아, OT 보안 시장 협공</a></p>\n<p><a href=\"https://zdnet.co.kr/view/?no=20210316185150\">[지디넷] 지니언스, 스마트팩토리 기업 타이아와 'OT보안' 맞손</a></p>\n<p><a href=\"http://www.inews24.com/view/1350204\">[아이뉴스24] 지니언스-타이아, OT보안 사업 '맞손'</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=210739\">[디지털데일리] 지니언스, 타이아와 손잡고 OT 보안 사업 강화</a></p>\n<p><a href=\"http://it.chosun.com/site/data/html_dir/2021/03/16/2021031600778.html\">[IT조선] 지니언스, 타이아 손잡고 OT 보안시장 개척</a></p>\n<p><a href=\"https://www.itdaily.kr/news/articleView.html?idxno=202164\">[IT데일리] 지니언스, 타이아와 OT 보안 사업 협력</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=267439\">[디지털투데이 ]지니언스, 스마트팩토리 솔루션 업체 타이아와 OT 보안 협력</a></p>\n<p><a href=\"https://www.ciokorea.com/news/186583\">[ciokorea] 지니언스-타이아, OT 보안 사업 협력 MOU 체결</a></p>\n<p><a href=\"https://www.itworld.co.kr/news/186578\">[itworld] 지니언스-타이아, OT 보안 사업 협력 MOU 체결</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=48058\">[아이티비즈] 지니언스-타이아, 신업용 OT 보안 솔루션 사업 협력</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=95635&amp;kind=\">[보안뉴스] 지니언스, 타이아와 OT 보안 사업 위한 MOU 맺어</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=122010\">[데일리시큐] 지니언스, 타이아와 MOU 체결...OT 보안 시장 본격 진출</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=222413\">[CCTV뉴스] 지니언스-타이아, 스마트팩토리 시장 겨냥한 OT 보안 사업 협력</a></p>", "body_text": "지니언스(263860, 대표 이동범)가 스마트팩토리 솔루션 전문 기업 타이아(대표 진이진 이성미)와 산업용 OT보안 솔루션 개발 협력 및 시장 개척을 골자로 업무협약(MOU)를 체결했다고 밝혔다.\n\n최근 Industry 4.0과 스마트팩토리화에 따라 산업 내부 시스템이 외부로 연결되면서 OT보안에 대한 중요성이 매우 커지고 있다. 연속 공정의 라인상에서 어...", "full_text": "지니언스(263860, 대표 이동범)가 스마트팩토리 솔루션 전문 기업 타이아(대표 진이진 이성미)와 산업용 OT보안 솔루션 개발 협력 및 시장 개척을 골자로 업무협약(MOU)를 체결했다고 밝혔다.\n\n최근 Industry 4.0과 스마트팩토리화에 따라 산업 내부 시스템이 외부로 연결되면서 OT보안에 대한 중요성이 매우 커지고 있다. 연속 공정의 라인상에서 어느 한 설비의 침해와 오류는 전체 생산에 영향을 주며 이는 대규모 불량, 생산차질은 물론 기업 신뢰도의 하락으로 이어질 수 있기 때문이다.\n\nIBM산하 연구소인 IBM-X Force 발표에 의하면 2019년 OT ICS 표적 공격은 2000% 증가하고 있으며 사이버 위협에 의한 경영 손실 및 설비 손상으로 에너지 & 유틸리티 분야의 손해는 매년 평균13.2백만달러에 이른다고 발표한 바 있다.\n\n데이터 보호에 중점을 둔 IT보안과 달리 OT보안의 목표는 가용성 보장과 산업 안전이다. 지니언스는 업계 최고 수준의 NAC와 EDR을 공급하고 있다. 이들 보안 플랫폼을 근간으로 OT 보안 요소기술들을 모듈화하고 IT/OT 융합 보안 솔루션, AI를 활용한 클라우드 보안 서비스 등의 로드맵을 통해 OT보안 시장을 적극 개척하고 있다.\n\n타이아는 다년간 국내외 대형 제조업의 산업정보시스템을 구축해 온 경험과 함께 공장의 설비 관리, 생산, 품질, 센서 데이터의 수집 등 스마트팩토리 통합 솔루션을 보유하고 있다. 4차산업혁명 시대를 맞아 IIoT와 AI 기술을 융합해 스마트 제조를 실현해 하고 있다.\n\n양사는 금번 제휴에 따라▶ 국・내외 OT 보안시장 발굴 ▶지니언스의 보안솔루션과 타이아 산업용 솔루션의 연동 개발 ▶제품의 상호 공급 및 활성화를 위한 공동사업을 수행한다는 계획이다.\n\n국내 IT 보안 기업들이 OT 보안 솔루션 개발을 준비하고 있는 가운데, 현재 국내 시장은 해외 유명 OT 보안업체들간의 각축장이 되어가고 있다. OT 보안은 그 특성상 영역별 전문업체간 협력이 절대적이며 IT 보안 전문기업인 지니언스와 제조현장 운영기술 전문업체인 타이아간 사업협력이 의미가 있으며, 이를 통해 빠르게 OT 보안 솔루션을 개발해 시장에 진입할 수 있을 것으로 전망된다.\n\n안동희 지니언스 OT 보안담당 전문위원은 “이번 전문업체간 제휴를 통해 양사 고객사 대상 OT 보안 솔루션 서비스라는 측면에서 시너지를 기대할 수 있다”며 “스마트팩토리와 주요 산업 인프라 보호의 당면과제를 양사 협력으로 적극 수행해 나가겠다”고 밝혔다.\n\n진이진 타이아 대표이사는 “중요 제조 설비를 대상으로 스마트팩토리 사업을 수행하면서 OT 제어망에 대한 고객사의 보안 요구가 있어왔으나 이에 대한 솔루션 대응이 부족했던 것이 현실이었다”며 “보안 전문기업 지니언스와의 협력으로 공동시범사업과 함께 향후 국/내외 고객사 OT 보안 서비스에 만전을 기하겠다”고 밝혔다.\n\n[[이데일리] 지니언스, 타이아와 OT보안 사업 협력…\"국내외 시장 개척\"](https://www.edaily.co.kr/news/read?newsId=01535046628983976&mediaCodeNo=257&OutLnkChk=Y)\n\n[[파이낸셜뉴스] 지니언스-타이아, OT보안 사업 협력](https://www.fnnews.com/news/202103160848585566)\n\n[[프라임경제] 지니언스, 타이아와 OT 보안 사업 협력 MOU](http://www.newsprime.co.kr/news/article/?no=536891)\n\n[[아시아경제] 지니언스, 타이아와 OT 보안 사업 협력 MOU](https://view.asiae.co.kr/article/2021031708495102419)\n\n[[글로벌이코노믹] 지니언스, 타이아와 OT 보안 사업 협력 MOU 체결](https://news.g-enews.com/ko-kr/news/article/news_all/2021031609293443291aef83fcde_1/article.html?md=20210316093111_R)\n\n[[CEO스코어데일리] 지니언스, 타이아와 OT 보안 사업 협력 MOU 체결](http://www.ceoscoredaily.com/news/article.html?no=79720)\n\n[[전자신문] 지니언스, 타이아 손잡고 OT보안 시장 공략](https://www.etnews.com/20210316000023)\n\n[[디지털타임스] 지니언스, 타이아와 OT 보안 사업 협력 MOU](http://www.dt.co.kr/contents.html?article_no=2021031602109931820001&ref=naver)\n\n[[데이터넷] 지니언스·타이아, OT 보안 시장 협공](http://www.datanet.co.kr/news/articleView.html?idxno=157236)\n\n[[지디넷] 지니언스, 스마트팩토리 기업 타이아와 'OT보안' 맞손](https://zdnet.co.kr/view/?no=20210316185150)\n\n[[아이뉴스24] 지니언스-타이아, OT보안 사업 '맞손'](http://www.inews24.com/view/1350204)\n\n[[디지털데일리] 지니언스, 타이아와 손잡고 OT 보안 사업 강화](http://www.ddaily.co.kr/news/article/?no=210739)\n\n[[IT조선] 지니언스, 타이아 손잡고 OT 보안시장 개척](http://it.chosun.com/site/data/html_dir/2021/03/16/2021031600778.html)\n\n[[IT데일리] 지니언스, 타이아와 OT 보안 사업 협력](https://www.itdaily.kr/news/articleView.html?idxno=202164)\n\n[[디지털투데이 ]지니언스, 스마트팩토리 솔루션 업체 타이아와 OT 보안 협력](http://www.digitaltoday.co.kr/news/articleView.html?idxno=267439)\n\n[[ciokorea] 지니언스-타이아, OT 보안 사업 협력 MOU 체결](https://www.ciokorea.com/news/186583)\n\n[[itworld] 지니언스-타이아, OT 보안 사업 협력 MOU 체결](https://www.itworld.co.kr/news/186578)\n\n[[아이티비즈] 지니언스-타이아, 신업용 OT 보안 솔루션 사업 협력](http://www.it-b.co.kr/news/articleView.html?idxno=48058)\n\n[[보안뉴스] 지니언스, 타이아와 OT 보안 사업 위한 MOU 맺어](https://www.boannews.com/media/view.asp?idx=95635&kind=)\n\n[[데일리시큐] 지니언스, 타이아와 MOU 체결...OT 보안 시장 본격 진출](https://www.dailysecu.com/news/articleView.html?idxno=122010)\n\n[[CCTV뉴스] 지니언스-타이아, 스마트팩토리 시장 겨냥한 OT 보안 사업 협력](http://www.cctvnews.co.kr/news/articleView.html?idxno=222413)"}, {"title": "지니언스, 구독 비즈니스로 변화", "date": "2021.03.04", "link": "https://www.genians.co.kr/pr-room/press/지니언스-기업-분석", "category": "기타 뉴스", "body_html": "<p>교보증권에서 지니언스에 대한 기업 분석 리포트가 발간되었습니다.</p>\n<p>EDR 매출 비중 확대, 대형 금융기관 중심 수주 진행, 구독 비즈니스 기반 이익률 개선세가 지속될 것이라고 전망하였습니다.</p>\n<p><img alt=\"지니언스 기업분석\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B5%90%EB%B3%B4.jpg?width=1506&amp;height=905&amp;name=%EA%B5%90%EB%B3%B4.jpg\" /></p>\n<p>보고서의 풀버전은 아래 링크나 첨부의 파일을 참고 부탁드립니다.</p>\n<p><a href=\"https://www.iprovest.com/weblogic/RSReportServlet?scr_id=34&amp;mode=detail&amp;menuCode=3&amp;pageNum=1&amp;sno=2046639&amp;rno=1\">[교보증권] 지니언스 리포트 보러 가기</a></p>", "body_text": "교보증권에서 지니언스에 대한 기업 분석 리포트가 발간되었습니다.\n\nEDR 매출 비중 확대, 대형 금융기관 중심 수주 진행, 구독 비즈니스 기반 이익률 개선세가 지속될 것이라고 전망하였습니다.\n\n![지니언스 기업분석](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B5%90%EB%B3%B4.jp...", "full_text": "교보증권에서 지니언스에 대한 기업 분석 리포트가 발간되었습니다.\n\nEDR 매출 비중 확대, 대형 금융기관 중심 수주 진행, 구독 비즈니스 기반 이익률 개선세가 지속될 것이라고 전망하였습니다.\n\n![지니언스 기업분석](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B5%90%EB%B3%B4.jpg?width=1506&height=905&name=%EA%B5%90%EB%B3%B4.jpg)\n\n보고서의 풀버전은 아래 링크나 첨부의 파일을 참고 부탁드립니다.\n\n[[교보증권] 지니언스 리포트 보러 가기](https://www.iprovest.com/weblogic/RSReportServlet?scr_id=34&mode=detail&menuCode=3&pageNum=1&sno=2046639&rno=1)"}, {"title": "보안은 중요하지만 상대적으로 투자 여력이 적은 SMB 시장에 적합", "date": "2021.02.24", "link": "https://www.genians.co.kr/pr-room/press/20210225untact", "category": "기타 뉴스", "body_html": "<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 중소벤처기업부 주관 비대면 서비스 바우처 사업 공급기업으로 2년 연속 선정됐다고 밝혔다. 비대면 서비스 바우처 사업은 포스트 코로나 시대 중소·벤처기업의 디지털화 촉진 및 비대면 솔루션・서비스 분야를 육성하는 대형 국책 사업이다.</p>\n<p>지니언스의 비대면 서비스 바우처 공급 제품은 미국 등 글로벌 시장에서 검증된 ‘클라우드 기반 차세대 NAC’이다. 네트워크에 접속하는 사용자나 다양한 기기를 식별, 인증, 통제 함으로써 네트워크를 보호하고 위협을 통제할 수 있는 솔루션으로 네트워크에 접속 중인 단말을 누가, 언제, 어디서 접속하고 있는지 실시간으로 관리할 수 있는 보안 제품이다.</p>\n<p>서비스 형태로 제공되는 ‘클라우드 NAC’는 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 보안에 관심이 많지만 초기 도입 비용 및 관리 이슈로 사용하지 못한 중소기업(SMB)이나 기관에 적합하다</p>\n<p>1차년도 사업에서는 제조업의 바이오 분야 연구개발이나 설계가 중요시 되는 기업들의 수요가 높았다. 비대면으로 업무가 전환되는 상황에서 협업의 비중이 높고 연구개발진행상황이나 결과에 대한 보안이 절대적으로 요구되기 때문에 NAC를 통해 기업 네트워크에 접근하는 모든 디바이스에 대해 보안성을 확보 한다는 것이다.</p>\n<p>또 다른 기업은 사내 IT자산에 대한 현황 파악, 백신・문서중앙화 등 보안 솔루션 설치 여부 및 점검을 통한 보안 강화를 목적으로 도입했다. 단말의 실 사용자 확인 및 단말 무결성 검사를 통해 보안성을 한층 강화시키고 있다.</p>\n<p>지니언스의 ‘클라우드 NAC’는 특화된 단말 식별 및 탐지 기술인 ‘DPI (Device Platform Intelligence)’를 통해 네트워크에 연결된 IT자산을 실시간으로 탐지하여 식별하고 상세하게 분류한다. 보안관리 및 운영을 위한 확장정보와 위협(취약성)정보를 추가로 제공한다.</p>\n<p>다양한 플랫폼 및 운영 환경을 지원하며 정책 서버의 경우 클라우드 환경인 아마존 웹 서비스(AWS)에 구성되어 있어 관리 서버를 내부 환경에 별도 설치 할 필요가 없다. 기존 시스템 환경의 변화 없이 자동으로 신속한 설치와 유지보수가 가능하고 초기도입 비용을 절감할 수 있는 장점이 있다.</p>\n<p>권진욱 지니언스 클라우드사업부 이사는 “1차 수요 기업의 의견을 바탕으로 기업의 비용 부담을 줄이고 보다 많은 기업에게 혜택을 줄 수 있는 프로모션을 기획 중 이다”며 “비대면 바우처 사업을 통해 더 많은 중소·벤처기업들이 재택근무와 비대면 업무시 발생 할 수 있는 보안 위협에 노출되지 않도록 적극적인 지원을 아끼지 않겠다.”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 중소벤처기업부 주관 비대면 서비스 바우처 사업 공급기업으로 2년 연속 선정됐다고 밝혔다. 비대면 서비스 바우처 사업은 포스트 코로나 시대 중소·벤처기업의 디지털화 촉진 및 비대면 솔루션・서비스 분야를 육성하는 대형 국책 사업이다.\n\n지니언스의 비대면 서비스 바우처 공급 제품은 미국 등 글로벌...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 중소벤처기업부 주관 비대면 서비스 바우처 사업 공급기업으로 2년 연속 선정됐다고 밝혔다. 비대면 서비스 바우처 사업은 포스트 코로나 시대 중소·벤처기업의 디지털화 촉진 및 비대면 솔루션・서비스 분야를 육성하는 대형 국책 사업이다.\n\n지니언스의 비대면 서비스 바우처 공급 제품은 미국 등 글로벌 시장에서 검증된 ‘클라우드 기반 차세대 NAC’이다. 네트워크에 접속하는 사용자나 다양한 기기를 식별, 인증, 통제 함으로써 네트워크를 보호하고 위협을 통제할 수 있는 솔루션으로 네트워크에 접속 중인 단말을 누가, 언제, 어디서 접속하고 있는지 실시간으로 관리할 수 있는 보안 제품이다.\n\n서비스 형태로 제공되는 ‘클라우드 NAC’는 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 보안에 관심이 많지만 초기 도입 비용 및 관리 이슈로 사용하지 못한 중소기업(SMB)이나 기관에 적합하다\n\n1차년도 사업에서는 제조업의 바이오 분야 연구개발이나 설계가 중요시 되  기반 구독형 서비스 모델 정착, 엔터프라이즈 시장 중심에서 SMB까지 커버리지 확대, 차세대 정보보호 리딩 메시시 강화를 필두로 고객 및 투자자에게 신뢰받는 기업으로 거듭난다는 계획입니다.\n\n[[더벨] 지니언스, 'EDR 퍼스트무버' 로드맵 선보인다](http://www.thebell.co.kr/free/content/ArticleView.asp?key=202102191242086600102950&svccode=00&page=1&sort=thebell_check_time)\n\n[[CEO스코어데일리] 성장하는 EDR 시장](http://www.ceoscoredaily.com/news/article.html?no=78647)"}, {"title": "**[****그림 1] 지니언스 EDR 솔루션 '지니안 인사이츠 E' 슬로건**", "date": "2021.02.15", "link": "https://www.genians.co.kr/pr-room/press/db-edr", "category": "EDR", "body_html": "<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 DB손해보험 EDR 구축 사업을 수주했다고 밝혔다. 지난해 공공・금융·제조 등 산업별 대표 레퍼런스를 확보한 지니언스는 시장 영향력이 있는 금융권 고객을 확보함으로써 EDR 초기 시장의 리더십을 확고히 하고 있다.</p>\n<p>대한민국을 대표하는 종합손해보험 회사인 DB손해보험은 '고객과 함께 행복한 사회를 추구하는 글로벌 보험금융그룹'이라는 비전으로 전 임직원이 고객가치경영과 사회적 책임경영에 매진하고 있다. 발빠른 디지털트랜스포메이션을 통해 고객의 커버리지를 넓혔으며 AI 기반의 보험 서비스 등 다양한 시스템으로 영업현장과 고객에게 최적의 서비스를 제공하고 있다.</p>\n<p>DB손해보험은 비즈니스의 특성상 민감하고 중요한 데이터를 다루는 만큼 IT보안인프라 개선, 내부통제 강화, 보안 조직 역량강화 등 다양한 측면에서 고객정보 보호의 수준을 높이기 위한 투자를 아끼지 않고 있다. 지능형 공격, 랜섬웨어 등의 고도화된 위협이 증가함에 따라 ‘DB손해보험의 안전한 비즈니스 환경 구축’을 목표로 차세대 보안 솔루션 EDR 도입에 착수했다.</p>\n<p>DB손해보험 EDR 도입 목적은 행위분석, 머신러닝, 침해지표탐지 등 최신 기술을 이용하여 알려지지 않은 공격 등 단말 악성 행위의 탐지와 대응 PC정보를 수집하여 악성코드 감염경로 가시성 확보 및 네트워크 확산 방지 PC침해사고시 신속한 악성행위 조사 및 대응 이다.</p>\n<p>이상행위 탐지 및 분석 기능, 위협 대응 기능, 운영관리 부문, 악성 행위에 대한 시나리오 대응 등 철저한 테스트를 진행해 최종적으로 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’를 선택했다. ‘지니안 인사이츠 E’ 는 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있는 제품이다</p>\n<p>안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다. 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.</p>\n<p>DB손해보험은 PC에 설치된 프로그램과 충돌 및 부하 등 업무 영향도를 최소화하고 보안 관제 시스템과 연계하여 탐지/대응 능력을 배가 시킨다는 계획이다. 다양한 정보 수집으로 가시성을 확보하고 이를 통한 악성코드 및 이상 행위 등의 모니터링 강화, 다양한 탐지 기법의 분석능력을 활용해 최신 보안 위협에 대한 단말 레벨에서의 차단・격리·대응 능력을 대폭 강화 할 수 있을 것으로 기대하고 있다.</p>\n<p>이동범 지니언스 대표이사는 “언택트 시대에 재택 근무 확산 등 보안 환경 변화에 따른 대안과 인공지능(AI)과 결합해 지능화된 변종 사이버 공격에 대응하기 위해 최근 가장 주목 받고 있는 솔루션이 EDR”이며 “고객 중심 제품 개발, 국내 단말에 대한 높은 이해, 다양한 연동 경험을 강점으로 DB손해보험의 EDR 사업을 성공적으로 완수하겠다”고 밝혔다.</p>\n<p><img alt=\"지니언스 EDR\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&amp;height=320&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg\" /></p>\n<p><a href=\"https://genians.co.kr/products/genian-edr-insights-e/\">지니언스 EDR 더 알아보기</a></p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 DB손해보험 EDR 구축 사업을 수주했다고 밝혔다. 지난해 공공・금융·제조 등 산업별 대표 레퍼런스를 확보한 지니언스는 시장 영향력이 있는 금융권 고객을 확보함으로써 EDR 초기 시장의 리더십을 확고히 하고 있다.\n\n대한민국을 대표하는 종합손해보험 회사인 DB손해보험은 '고객과 함께 행복한 ...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 DB손해보험 EDR 구축 사업을 수주했다고 밝혔다. 지난해 공공・금융·제조 등 산업별 대표 레퍼런스를 확보한 지니언스는 시장 영향력이 있는 금융권 고객을 확보함으로써 EDR 초기 시장의 리더십을 확고히 하고 있다.\n\n대한민국을 대표하는 종합손해보험 회사인 DB손해보험은 '고객과 함께 행복한 사회를 추구하는 글로벌 보험금융그룹'이라는 비전으로 전 임직원이 고객가치경영과 사회적 책임경영에 매진하고 있다. 발빠른 디지털트랜스포메이션을 통해 고객의 커버리지를 넓혔으며 AI 기반의 보험 서비스 등 다양한 시스템으로 영업현장과 고객에게 최적의 서비스를 제공하고 있다.\n\nDB손해보험은 비즈니스의 특성상 민감하고 중요한 데이터를 다루는 만큼 IT보안인프라 개선, 내부통제 강화, 보안 조직 역량강화 등 다양한 측면에서 고객정보 보호의 수준을 높이기 위한 투자를 아끼지 않고 있다. 지능형 공격, 랜섬웨어 등의 고도화된 위협이 증가함에 따라 ‘DB손해보험의 안전한 비즈니스 환경 구축’을 목표로 차세대 보안 솔루션 EDR 도입에 착수했다.\n\nDB손해보험 EDR 도입 목적은 행위분석, 머신러닝, 침해지표탐지 등 최신 기술을 이용하여 알려지지 않은 공격 등 단말 악성 행위의 탐지와 대응 PC정보를 수집하여 악성코드 감염경로 가시성 확보 및 네트워크 확산 방지 PC침해사고시 신속한 악성행위 조사 및 대응 이다.\n\n이상행위 탐지 및 분석 기능, 위협 대응 기능, 운영관리 부문, 악성 행위에 대한 시나리오 대응 등 철저한 테스트를 진행해 최종적으로 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E’를 선택했다. ‘지니안 인사이츠 E’ 는 차세대 기업용 단말 보안 솔루션으로 사용자의 행위 및 PC 내부의 행위를 모니터링 하여 위협을 탐지할 수 있는 제품이다\n\n안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다. 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\nDB손해보험은 PC에 설치된 프로그램과 충돌 및 부하 등 업무 영향도를 최소화하고 보안 관제 시스템과 연계하여 탐지/대응 능력을 배가 시킨다는 계획이다. 다양한 정보 수집으로 가시성을 확보하고 이를 통한 악성코드 및 이상 행위 등의 모니터링 강화, 다양한 탐지 기법의 분석능력을 활용해 최신 보안 위협에 대한 단말 레벨에서의 차단・격리·대응 능력을 대폭 강화 할 수 있을 것으로 기대하고 있다.\n\n이동범 지니언스 대표이사는 “언택트 시대에 재택 근무 확산 등 보안 환경 변화에 따른 대안과 인공지능(AI)과 결합해 지능화된 변종 사이버 공격에 대응하기 위해 최근 가장 주목 받고 있는 솔루션이 EDR”이며 “고객 중심 제품 개발, 국내 단말에 대한 높은 이해, 다양한 연동 경험을 강점으로 DB손해보험의 EDR 사업을 성공적으로 완수하겠다”고 밝혔다.\n\n\n![지니언스 EDR](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&height=320&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg)\n\n[지니언스 EDR 더 알아보기](https://genians.co.kr/products/genian-edr-insights-e/)\n\n|  |\n|"}, {"title": "**EDR** **제품 고유의 본질적 가치 증대, AI 기반 차세대 기술 개발 박차**", "date": "2021.01.13", "link": "https://www.genians.co.kr/pr-room/press/20210113edr", "category": "EDR", "body_html": "<p>지니언스(263860, 대표이사 이동범)가 지난해에만 EDR 신규 고객 26곳을 확보했다고 밝혔다. 기획재정부, NH농협, 하이트진로를 비롯해 정부부처・금융·제조・통신·인터넷 등 산업별 대표 기업(관)에 골고루 도입됐다. 특히, 지난 12월에는 제 2금융권 고객을 다수 수주함으로써 올해 확대되는 금융권 수요에 밝은 전망을 내비치고 있다.</p>\n<p>2020년 한해 공급한 EDR 노드수는 10만여대로 2019년 대비 3배 성장했다. 단순히 양적 성장만이 아니다. 외산 솔루션에 대한 윈백, 시범 사업의 성공적 마무리에 따른 본 사업 수주, 언택트 환경에 따른 재택 근무 보안 환경 강화의 대안으로 EDR 도입 등 질적으로도 큰 성공을 기록했다. 특히, 코로나 19 사태 이후 외산 제품에 대한 기술지원이 원활하지 않아 기술력에서 유지보수까지 완비한 지니언스에 대한 고객 만족도가 높았다는 것도 하나의 성과다.</p>\n<p>전 세계적으로 사이버 위협이 진화함에 따라 공격에 대한 사전점검과 인공지능에 기반한 악성코드 탐지 및 대응에 대한 필요성이 절대적으로 요구 되고 있다. 알려진 위협정보에 기반을 두어 탐지하는 백신 제품은 한계에 봉착했으며 기존 전통적인 보안 제품만으로는 신·변종 악성코드나 랜섬웨어에 능동적으로 대응할 수 없다.</p>\n<p>언택트 시대에 재택 근무 확산 등 보안 환경 변화에 따른 대안과 인공지능(AI)과 결합해 지능화된 변종 사이버 공격에 대응하기 위해 최근 가장 주목 받고 있는 솔루션이 EDR이다. 지니언스의 EDR 솔루션 ‘‘지니안 인사이츠 E V 2.0’은 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.</p>\n<p>EDR은 보안 지능화 및 혁신 전략, 기존 안티 바이러스 솔루션의 한계 극복, 다양한 정보 수집을 통한 가시성 확보, 이상행위 대응 및 확산 방지 등 보안의 새로운 패러다임 변화에 대응하는 솔루션으로 지속적인 시장 성장세를 이어갈 전망이다.</p>\n<p>이동범 지니언스 대표는 “시장 및 고객 요구에 기반한 EDR 로드맵 제시로 시장을 확대할 것이다”며 “하이엔드 시장 선점 확대로 EDR 1위 기업의 위상을 강화하고 정부부처, 대기업 그룹사로의 확장수요, 제 1금융권과 확대되는 제 2금융권의 메이저 레퍼런스를 확보하여 지니언스의 제 2 도약을 굳건히 하겠다”고 밝혔다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&amp;height=320&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg\" /></p>\n<p>|  |\n|</p>", "body_text": "지니언스(263860, 대표이사 이동범)가 지난해에만 EDR 신규 고객 26곳을 확보했다고 밝혔다. 기획재정부, NH농협, 하이트진로를 비롯해 정부부처・금융·제조・통신·인터넷 등 산업별 대표 기업(관)에 골고루 도입됐다. 특히, 지난 12월에는 제 2금융권 고객을 다수 수주함으로써 올해 확대되는 금융권 수요에 밝은 전망을 내비치고 있다.\n\n2020년 한해 ...", "full_text": "지니언스(263860, 대표이사 이동범)가 지난해에만 EDR 신규 고객 26곳을 확보했다고 밝혔다. 기획재정부, NH농협, 하이트진로를 비롯해 정부부처・금융·제조・통신·인터넷 등 산업별 대표 기업(관)에 골고루 도입됐다. 특히, 지난 12월에는 제 2금융권 고객을 다수 수주함으로써 올해 확대되는 금융권 수요에 밝은 전망을 내비치고 있다.\n\n2020년 한해 공급한 EDR 노드수는 10만여대로 2019년 대비 3배 성장했다. 단순히 양적 성장만이 아니다. 외산 솔루션에 대한 윈백, 시범 사업의 성공적 마무리에 따른 본 사업 수주, 언택트 환경에 따른 재택 근무 보안 환경 강화의 대안으로 EDR 도입 등 질적으로도 큰 성공을 기록했다. 특히, 코로나 19 사태 이후 외산 제품에 대한 기술지원이 원활하지 않아 기술력에서 유지보수까지 완비한 지니언스에 대한 고객 만족도가 높았다는 것도 하나의 성과다.\n\n전 세계적으로 사이버 위협이 진화함에 따라 공격에 대한 사전점검과 인공지능에 기반한 악성코드 탐지 및 대응에 대한 필요성이 절대적으로 요구 되고 있다. 알려진 위협정보에 기반을 두어 탐지하는 백신 제품은 한계에 봉착했으며 기존 전통적인 보안 제품만으로는 신·변종 악성코드나 랜섬웨어에 능동적으로 대응할 수 없다.\n\n언택트 시대에 재택 근무 확산 등 보안 환경 변화에 따른 대안과 인공지능(AI)과 결합해 지능화된 변종 사이버 공격에 대응하기 위해 최근 가장 주목 받고 있는 솔루션이 EDR이다. 지니언스의 EDR 솔루션 ‘‘지니안 인사이츠 E V 2.0’은 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\nEDR은 보안 지능화 및 혁신 전략, 기존 안티 바이러스 솔루션의 한계 극복, 다양한 정보 수집을 통한 가시성 확보, 이상행위 대응 및 확산 방지 등 보안의 새로운 패러다임 변화에 대응하는 솔루션으로 지속적인 시장 성장세를 이어갈 전망이다.\n\n이동범 지니언스 대표는 “시장 및 고객 요구에 기반한 EDR 로드맵 제시로 시장을 확대할 것이다”며 “하이엔드 시장 선점 확대로 EDR 1위 기업의 위상을 강화하고 정부부처, 대기업 그룹사로의 확장수요, 제 1금융권과 확대되는 제 2금융권의 메이저 레퍼런스를 확보하여 지니언스의 제 2 도약을 굳건히 하겠다”고 밝혔다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg?width=500&height=320&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-3.jpg)\n\n|  |\n|"}, {"title": "ZTNA, SASE 제품과 서비스 개발 및 EDR 시장 확대 주력", "date": "2021.01.05", "link": "https://www.genians.co.kr/pr-room/press/20210105ceointerview", "category": "EDR", "body_html": "<p>이동범 지니언스 대표이사가 신년을 맞아 보안 전문 매체인 데일리시큐와 2020년 성과 및 2021년 계획에 대해 인터뷰를 진행하였습니다.</p>\n<p>ZTNA, SASE 제품과 서비스 개발, EDR 시장 확대를 목표로 차세대 정보보안 시장의 리더십을 확고하는 것이 목표 입니다. 인터뷰 전문은 아래 링크를 참조해 주십시오.</p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=119244\">[데일리시큐] 지니언스 이동범 대표, \"차세대 정보보안 시장 리더십 확고히 할 것\"</a></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%82%AC%EC%A7%84-300x200.jpg?width=513&amp;height=343&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%82%AC%EC%A7%84-300x200.jpg\" /></p>", "body_text": "이동범 지니언스 대표이사가 신년을 맞아 보안 전문 매체인 데일리시큐와 2020년 성과 및 2021년 계획에 대해 인터뷰를 진행하였습니다.\ ttps://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/04-%EA%B9%80%EA%B3%84%EC%97%B0-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-CTO%EB%AF%B8%EA%B5%AD%EB%B2%95%EC%9D%B8%EC%9E%A5-1024x681.jpg?width=1024&height=681&name=04-%EA%B9%80%EA%B3%84%EC%97%B0-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-CTO%EB%AF%B8%EA%B5%AD%EB%B2%95%EC%9D%B8%EC%9E%A5-1024x681.jpg)\n\n|  |\n|"}, {"title": "지니언스, 차세대 정보보안 솔루션 EDR 선도", "date": "2020.12.16", "link": "https://www.genians.co.kr/pr-room/press/nestsecurity", "category": "EDR", "body_html": "<h3>교보증권리포트 : NAC 분야의 1인자, 국내 EDR 시장 선도</h3>\n<p>교보증권은 \"지니언스는 자체 EDR 솔루션의 탄력적인 성장이 시작되고 본격적인 투자 회수 구간에 진입에 따른 기업가치 재평가가 기대된다.\"고 발표하였습니다. NAC 분야의 1인자, 국내 EDR 시장을 선도한다고 평가했으며 관련 보고서를 토대로 주요 언론에 보도 되었습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/kybo-1024x670.png?width=1024&amp;height=670&amp;name=kybo-1024x670.png\" /></p>\n<p>|  |\n|</p>", "body_text": "### 교보증권리포트 : NAC 분야의 1인자, 국내 EDR 시장 선도\n\n교보증권은 \"지니언스는 자체 EDR 솔루션의 탄력적인 성장이 시작되고 본격적인 투자 회수 구간에 진입에 따른 기업가치 재평가가 기대된다.\"고 발표하였습니다. NAC 분야의 1인자, 국내 EDR 시장을 선도한다고 평가했으며 관련 보고서를 토대로 주요 언론에 보도 되었습니다.\n\n![](h...", "full_text": "### 교보증권리포트 : NAC 분야의 1인자, 국내 EDR 시장 선도\n\n교보증권은 \"지니언스는 자체 EDR 솔루션의 탄력적인 성장이 시작되고 본격적인 투자 회수 구간에 진입에 따른 기업가치 재평가가 기대된다.\"고 발표하였습니다. NAC 분야의 1인자, 국내 EDR 시장을 선도한다고 평가했으며 관련 보고서를 토대로 주요 언론에 보도 되었습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/kybo-1024x670.png?width=1024&height=670&name=kybo-1024x670.png)\n\n|  |\n|"}, {"title": "지니언스 미국법인, 실리콘밸리로 이전해 새 출발", "date": "2020.12.15", "link": "https://www.genians.co.kr/pr-room/press/globalbranch", "category": "비즈니스 & 성과", "body_html": "<p><strong>글로벌 기술 경쟁력 검증 완료…전 세계 무대로 비즈니스 확장</strong></p>\n<p><strong>고객 환경에 적합한 다양한 서비스 포트폴리오 완성</strong></p>\n<p>지니언스(263860, 대표이사 이동범) 미국법인이 미국 캘리포니아주 산호세로 이전하고 새롭게 출발한다.</p>\n<p>2016년 보스턴에 미국법인을 설립한 지니언스는 128테크놀로지(128 Technology)・세키온(Seceon)・인포블록스(Infoblox)・리버싱랩스(ReversingLabs)・IBM 등 글로벌 기업과의 협력으로 NAC 제품의 고도화와 IT・OT에 특화된 단말 식별・탐지 기술인 DPI (Device Platform Intelligence) 서비스를 시작했다.</p>\n<p>클라우드 기반 차세대 NAC 솔루션으로 제품 판매에서 기술지원까지의 모든 프로세스를 온라인화 하고 소프트웨어를 이용한 가치만큼 지불하는 서브스크립션(Subscription) 방식으로 SMB시장을 적극 공략했다. 캐나다의 온타리오주의 지방자치단체, 월스트리트 금융기관, 미국의 공립학교 등 꾸준히 고객을 확보했다.</p>\n<p>이전 보스톤은 지역 특성상 기술연구・정책관련 부문에 집중되어 되었다. 글로벌 비즈니스의 기본 토대를 완비했다는 판단아래 세계 IT 패러다임을 선도하는 실리콘밸리에서 본격적인 성장의 궤를 도모하겠다는 것이다.</p>\n<p>김계연 지니언스 CTO/미국법인장은 “클라우드・IOT・엣지 컴퓨팅 환경에서 네트워크 가시성을 확보할 수 있는 지니언스의 차세대 NAC는 클라우드 기반의 유연성과 확장성, 자동화된 NAC as a Service로의 다양한 고객 오퍼링이 가능하다”며 “글로벌 기술 경쟁력을 확보하며 다양한 고객에게 검증이 완료된 만큼 실리콘밸리 본 무대에서 글로벌 비즈니스 성장의 가속도를 내겠다”고 밝혔다.</p>\n<p>한편, 미국 진출을 필두로 시작된 지니언스의 글로벌 비즈니스는 각 국가의 특성 및 현지화에 초점을 두고 진행해 왔다. 북・남미 지역은 클라우드 기반 NAC를 구독형태로 이용 하고자 하는 고객 및 파트너들을 지속적으로 발굴하고, 중동과 아태지역은 현지 파트너를 통해 소프트웨어 라이선스 방식으로 사업을 진행 하고 있다.</p>\n<p>글로벌 시장 진입 초기에는 정부의 해외지원 사업과 해외 유수의 전시회를 통해 파트너를 발굴했지만 올해는 해외 파트너사나 기업이 직접 지니언스를 인바운드로 컨택 하는 빈도가 잦아졌다. 이는 가트너가 발표한 네트워크 접근제어 마켓가이드에 시스코와 함께 대표기업으로 지니언스가 선정된 것과 아마존웹서비스(AWS) 마켓플레이스 등록으로 구축형, 매니지드 서비스, 클라우드 환경 등 고객의 다양한 IT환경에서도 안정적이고 효율적인 보안 운영이 가능한 솔루션과 서비스 포트폴리오를 완성했기 때문으로 풀이된다.</p>\n<p>|  |\n|</p>", "body_text": "**글로벌 기술 경쟁력 검증 완료…전 세계 무대로 비즈니스 확장**\n\n**고객 환경에 적합한 다양한 서비스 포트폴리오 완성**\n\n지니언스(263860, 대표이사 이동범) 미국법인이 미국 캘리포니아주 산호세로 이전하고 새롭게 출발한다.\n\n2016년 보스턴에 미국법인을 설립한 지니언스는 128테크놀로지(128 Technology)・세키온(Seceon)・인포블록...", "full_text": "**글로벌 기술 경쟁력 검증 완료…전 세계 무대로 비즈니스 확장**\n\n**고객 환경에 적합한 다양한 서비스 포트폴리오 완성**\n\n지니언스(263860, 대표이사 이동범) 미국법인이 미국 캘리포니아주 산호세로 이전하고 새롭게 출발한다.\n\n2016년 보스턴에 미국법인을 설립한 지니언스는 128테크놀로지(128 Technology)・세키온(Seceon)・인포블록스(Infoblox)・리버싱랩스(ReversingLabs)・IBM 등 글로벌 기업과의 협력으로 NAC 제품의 고도화와 IT・OT에 특화된 단말 식별・탐지 기술인 DPI (Device Platform Intelligence) 서비스를 시작했다.\n\n클라우드 기반 차세대 NAC 솔루션으로 제품 판매에서 기술지원까지의 모든 프로세스를 온라인화 하고 소프트웨어를 이용한 가치만큼 지불하는 서브스크립션(Subscription) 방식으로 SMB시장을 적극 공략했다. 캐나다의 온타리오주의 지방자치단체, 월스트리트 금융기관, 미국의 공립학교 등 꾸준히 고객을 확보했다.\n\n이전 보스톤은 지역 특성상 기술연구・정책관련 부문에 집중되어 되었다. 글로벌 비즈니스의 기본 토대를 완비했다는 판단아래 세계 IT 패러다임을 선도하는 실리콘밸리에서 본격적인 성장의 궤를 도모하겠다는 것이다.\n\n김계연 지니언스 CTO/미국법인장은 “클라우드・IOT・엣지 컴퓨팅 환경에서 네트워크 가시성을 확 지 탐지하고 대응할 수 있다.</p>\n<p>씨플랫폼 김중균 대표는 “최근 대형 유통업계 해킹 사태 등 고도화된 보안 위협에 대한 대응과 비대면 솔루션 도입 확산에 따른 보안 환경 변화에 따른 필수 솔루션으로 자리매김하고 있는 EDR분야에 국내 최다 고객을 확보하고 있는 지니언스와 조달 비즈니스 총판 계약을 체결해 의미가 크다”며, “씨플랫폼이 보유하고 있는 약200개 이상의 조달 비즈니스 파트너망을 활용하고 전략적으로 확대해가고 있는 보안 솔루션 아이템과 시너지를 낼 수 있을 것”이라고 말했다.</p>\n<p>지니언스 이동범 대표는 “IT솔루션 공급 및 비즈니스 전문기업인 씨플랫폼의 조달 비즈니스 노하우와 지니언스의 제품 경쟁력이 시너지를 발휘하여 국내 EDR 시장 확산과 양사가 동반 성장할 수 있을 것으로 기대한다”고 밝혔다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%841-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%94%A8%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%A1%B0%EB%8B%AC-%EC%B4%9D%ED%8C%90-%EA%B3%84%EC%95%BD%EC%8B%9D%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%BB%B7-1-1024x683.jpg?width=1024&amp;height=683&amp;name=%EC%82%AC%EC%A7%841-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%94%A8%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%A1%B0%EB%8B%AC-%EC%B4%9D%ED%8C%90-%EA%B3%84%EC%95%BD%EC%8B%9D%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%BB%B7-1-1024x683.jpg\" /></p>\n<p>|  |\n|</p>", "body_text": "### **‘****지니안 인사이츠 E v2.0’ 나라장터 조달 등록 완료**\n\n### **제품경쟁력과 비즈니스 노하우 결합으로 EDR 수요 적극 공략**\n\n### **언택트 환경의 사이버 위협 해소 등 차세대 보안 사업 분야에서도 적극 협력**\n\n지니언스(263860, 대표이사 이동범)가 아이티센그룹의 IT솔루션 공급 전문기업 씨플랫폼(대표 김중균)과 단...", "full_text": "### **‘****지니안 인사이츠 E v2.0’ 나라장터 조달 등록 완료**\n\n### **제품경쟁력과 비즈니스 노하우 결합으로 EDR 수요 적극 공략**\n\n### **언택트 환경의 사이버 위협 해소 등 차세대 보안 사업 분야에서도 적극 협력**\n\n지니언스(263860, 대표이사 이동범)가 아이티센그룹의 IT솔루션 공급 전문기업 씨플랫폼(대표 김중균)과 단말 기반 지능형 위협 탐지 및 대응 솔루션(EDR) 조달 총판 계약을 체결했다고 밝혔다. 국내 최초로 메이저 업그레이드 된 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E 2.0’ 버전의 나라장터 조달 등록도 완료되어 공공기관들은 보다 손쉽게 EDR 솔루션을 구매할 수 있게 됐다.\n\n국내 EDR 시장을 빠르게 선점하고 있는 지니언스가 제조, 금융, 공공 등 산업별 대형 고객을 확보하고 조달 비즈니스 강자인 씨플랫폼과 손을 맞잡으면서 EDR 시장 확대가 보다 가속화 할 것으로 전망된다. EDR 공급 노드 수 기준으로 10월에 지난해의 2배를 훌쩍 넘어섰으며 외산 솔루션 윈백, 시범사업의 성공적 완료로 인한 본사업 수주 등 양적·질적으로 경쟁사 보다 한발 앞서나가고 있다.\n\n전 세계적으로 사이버 위협이 진화함에 따라 공격에 대한 사전점검과 인공지능에 기반한 악성코드 탐지 및 대응에 대한 필요성이 절대적으로 요구 되고 있다. 알려진 위협정보에 기반을 두어 탐지하는 백신 제품은 한계에 봉착했으며 기존 전통적인 보안 제품만으로는 신·변종 악성코드나 랜섬웨어에 능동적으로 대응할 수 없다.\n\n언택트 시대에 재택 근무 확산 등 보안 환경 변화에 따른 대안과 인공지능(AI)과 결합해 지능화된 변종 사이버 공격에 대응하기 위해 최근 가장 주목 받고 있는 솔루션이 EDR이다. 지니언스의 EDR 솔루션 ‘‘지니안 인사이츠 E V 2.0’은 지능형 공격, 랜섬웨어 등의 고도화된 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\n사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\n씨플랫폼 김중균 대표는 “최근 대형 유통업계 해킹 사태 등 고도화된 보안 위협에 대한 대응과 비대면 솔루션 도입 확산에 따른 보안 환경 변화에 따른 필수 솔루션으로 자리매김하고 있는 EDR분야에 국내 최다 고객을 확보하고 있는 지니언스와 조달 비즈니스 총판 계약을 체결해 의미가 크다”며, “씨플랫폼이 보유하고 있는 약200개 이상의 조달 비즈니스 파트너망을 활용하고 전략적으로 확대해가고 있는 보안 솔루션 아이템과 시너지를 낼 수 있을 것”이라고 말했다.\n\n지니언스 이동범 대표는 “IT솔루션 공급 및 비즈니스 전문기업인 씨플랫폼의 조달 비즈니스 노하우와 지니언스의 제품 경쟁력이 시너지를 발휘하여 국내 EDR 시장 확산과 양사가 동반 성장할 수 있을 것으로 기대한다”고 밝혔다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%841-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%94%A8%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%A1%B0%EB%8B%AC-%EC%B4%9D%ED%8C%90-%EA%B3%84%EC%95%BD%EC%8B%9D%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%BB%B7-1-1024x683.jpg?width=1024&height=683&name=%EC%82%AC%EC%A7%841-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EC%94%A8%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%A1%B0%EB%8B%AC-%EC%B4%9D%ED%8C%90-%EA%B3%84%EC%95%BD%EC%8B%9D%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%BB%B7-1-1024x683.jpg)\n\n|  |\n|"}, {"title": "지니언스, 글로벌 벤더와 차세대 보안 기술 협력 강화", "date": "2020.11.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-차세대-보안", "category": "비즈니스 & 성과", "body_html": "<p><strong>- IBM・시스코・팔로알토네트웍스 등 글로벌 선두 기업과 기술 파트너십</strong></p>\n<p><strong>- SIEM・SOAR・취약점 관리 등 차세대 보안 분야 협력 강화</strong></p>\n<p><strong>- 사용자들이 손쉽게 적용할 수 있도록 다양한 Use Case 발굴 및 공개 지속</strong></p>\n<p>지니언스(263860, 대표이사 이동범)가 IBM, 시스코, 팔로알토네트웍스, 퀄리스, 테너블 등 글로벌 벤더와 기술 협력을 강화하고 사이버 위협에 공동 대응하고 있다. APT, 방화벽, 침입탐지 및 침입방지시스템 분야는 물론 최근에는 취약점 관리, SIEM, SOAR 등 차세대 보안 분야까지 협력 범위가 광범위 해 지고 있다.</p>\n<p>사이버 위협이 진화함에 따라 단일 보안 솔루션으로 위협 대응을 위한 충분한 정보를 획득하는 것은 사실상 불가능하다. 지니언스의 차세대 NAC 솔루션은 SIEM, SOAR와 같은 솔루션과의 협업을 통해 가시성 확보, 위협탐지 및 모니터링 기능 향상으로 사이버 위협으로부터 효과적으로 시스템을 통합 관리 할 수 있다.</p>\n<p>지니언스는 IBM, 팔로알토네트웍스와는 SOAR 분야에서 비욘드시큐리티, 퀄리스, 테너블과는 취약점 관리 부분에서 표준 프로토콜 및 API를 통해 상호 기술을 연동했다. 다양한 보안 제품과 연동/협업을 통해 편리하고 효율적인 프로세스로 사용자가 손쉽게 보안대책을 강화하는 것을 목표로 추진됐다.</p>\n<p>IBM의 SOAR 솔루션인 ‘리질리언트(Resilient)와는 SOAR 시스템에서 판단한 위협에 대한 정보를 ‘지니안 NAC’로 전달하여 각 기업의 단말 정책에 근거해 차단하거나 공격의 발생시 가장 근접한 단말에 대한 신속한 방어 정책을 수행하게 했다.</p>\n<p>팔로알토네트웍스의 SOAR 솔루션인 ‘코어텍스 XSOAR(Cortex XSOAR)’에는 제품의 릴리즈에 포함된 사례로 전사적인 보안 프로세스를 자동 적용함에 있어 지니안 NAC와 연동을 통해 네트워크 에지단에서 수집된 각종 데이터, 보안정책 및 제어정책을 적용할 수 있게 구현되었다.</p>\n<p>취약점 관리(Vulnerability management) 글로벌 선두 기업인 퀄리스(Qualys), 테너블(Tenable)과는 NAC에서 신규노드가 탐지된 경우 취약점 스캔을 요청하고 스캔 결과(점수)에 따라서 사용자에게 알람을 제공하거나 네트워크 접근을 차단할 수 있도록 연동을 진행 중에 있다. 모두 클라우드 기반으로 구성되어 원격 근무 환경에서도 적용이 유연하도록 구성하고 있다.</p>\n<p>전 세계적으로 지능화된 사이버 위협에 대응하기 위해 다양한 보안 솔루션 등장하고 있다. 하지만 관리자 관점에서 너무 많은 보안 벤더와 솔루션으로 인한 복잡성과 취약점은 더 증가하고 있다. 이에 따라, 다양한 보안 솔루션 연동 및 벤더간 협업을 통해 보다 자동화되고 효율성 있는 보안 프로세스 확립이 절대적으로 필요하다.</p>\n<p>지니언스의 차세대 NAC 솔루션은 네트워크 에지단에서 앤드포인트의 가시성을 확보할 수 있으며 보안관리 및 운영을 위한 확장정보와 위협정보를 제공해 효과적인 사이버 방어 프레임워크 구축이 가능하다. 특히, 다양한 보안 솔루션과 연동하여 통합적으로 보안 정책을 시행을 가능하게 하여 전사적인 보안 프로세스에 적용하기 적합하다.</p>\n<p>김계연 CTO/미국법인장은 “보안은 시스템이 아닌 프로세스이다” 며” “프로세스를 자동화 하기 위해 Open API 제공이 선행되고, 다양한 보안 보안제품과의 연동/협업을 통하여 효율적인 프로세스를 사용자들이 손쉽게 적용할 수 있도록 해야 한다”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "**- IBM・시스코・팔로알토네트웍스 등 글로벌 선두 기업과 기술 파트너십**\n\n**- SIEM・SOAR・취약점 관리 등 차세대 보안 분야 협력 강화**\n\n**- 사용자들이 손쉽게 적용할 수 있도록 다양한 Use Case 발굴 및 공개 지속**\n\n지니언스(263860, 대표이사 이동범)가 IBM, 시스코, 팔로알토네트웍스, 퀄리스, 테너블 등 글로벌 벤더와...", "full_text": "**- IBM・시스코・팔로알토네트웍스 등 글로벌 선두 기업과 기술 파트너십**\n\n**- SIEM・SOAR・취약점 관리 등 차세대 보안 분야 협력 강화**\n\n**- 사용자들이 손쉽게 적용할 수 있도록 다양한 Use Case 발굴 및 공개 지속**\n\n지니언스(263860, 대표이사 이동범)가 IBM, 시스코, 팔로알토네트웍스, 퀄리스, 테너블 등 글로벌 벤더와 기술 협력을 강화하고 사이버 위협에 공동 대응하고 있다. APT, 방화벽, 침입탐지 및 침입방지시스템 분야는 물론 최근에는 취약점 관리, SIEM, SOAR 등 차세대 보안 분야까지 협력 범위가 광범위 해 지고 있다.\n\n사이버 위협이 진화함에 따라 단일 보안 솔루션으로 위협 대응을 위한 충분한 정보를 획득하는 것은 사실상 불가능하다. 지니언스의 차세대 NAC 솔루션은 SIEM, SOAR와 같은 솔루션과의 협업을 통해 가시성 확보, 위협탐지 및 모니터링 기능 향상으로 사이버 위협으로부터 효과적으로 시스템을 통합 관리 할 수 있다.\n\n지니언스는 IBM, 팔로알토네트웍스와는 SOAR 분야에서 비욘드시큐리티, 퀄리스, 테너블과는 취약점 관리 부분에서 표준 프로토콜 및 API를 통해 상호 기술을 연동했다. 다양한 보안 제품과 연동/협업을 통해 편리하고 효율적인 프로세스로 사용자가 손쉽게 보안대책을 강화하는 것을 목표로 추진됐다.\n\nIBM의 SOAR 솔루션인 ‘리질리언트(Resilient)와는 SOAR 시스템에서 판단한 위협에 대한 정보를 ‘지니안 NAC’로 전달하여 각 기업의 단말 정책에 근거해 차단하거나 공격의 발생시 가장 근접한 단말에 대한 신속한 방어 정책을 수행하게 했다.\n\n팔로알토네트웍스의 SOAR 솔루션인 ‘코어텍스 XSOAR(Cortex XSOAR)’에는 제품의 릴리즈에 포함된 사례로 전사적인 보안 프로세스를 자동 적용함에 있어 지니안 NAC와 연동을 통해 네트워크 에지단에서 수집된 각종 데이터, 보안정책 및 제어정책을 적용할 수 있게 구현되었다.\n\n취약점 관리(Vulnerability management) 글로벌 선두 기업인 퀄리스(Qualys), 테너블(Tenable)과는 NAC에서 신규노드가 탐지된 경우 취약점 스캔을 요청하고 스캔 결과(점수)에 따라서 사용자에게 알람을 제공하거나 네트워크 접근을 차단할 수 있도록 연동을 진행 중에 있다. 모두 클라우드 기반으로 구성되어 원격 근무 환경에서도 적용이 유연하도록 구성하고 있다.\n\n전 세계적으로 지능화된 사이버 위협에 대응하기 위해 다양한 보안 솔루션 등장하고 있다. 하지만 관리자 관점에서 너무 많은 보안 벤더와 솔루션으로 인한 복잡성과 취약점은 더 증가하고 있다. 이에 따라, 다양한 보안 솔루션 연동 및 벤더간 협업을 통해 보다 자동화되고 효율성 있는 보안 프로세스 확립이 절대적으로 필요하다.\n\n지니언스의 차세대 NAC 솔루션은 네트워크 에지단에서 앤드포인트의 가시성을 확보할 수 있으며 보안관리 및 운영을 위한 확장정보와 위협정보를 제공해 효과적인 사이버 방어 프레임워크 구축이 가능하다. 특히, 다양한 보안 솔루션과 연동하여 통합적으로 보안 정책을 시행을 가능하게 하여 전사적인 보안 프로세스에 적용하기 적합하다.\n\n김계연 CTO/미국법인장은 “보안은 시스템이 아닌 프로세스이다” 며” “프로세스를 자동화 하기 위해 Open API 제공이 선행되고, 다양한 보안 보안제품과의 연동/협업을 통하여 효율적인 프로세스를 사용자들이 손쉽게 적용할 수 있도록 해야 한다”고 밝혔다.\n\n|  |\n|"}, {"title": "지니언스, NAC・EDR 사업 호조", "date": "2020.11.16", "link": "https://www.genians.co.kr/pr-room/press/biz3q", "category": "NAC", "body_html": "<p>지니언스의 2020년 3분 기 실적 호전이 주요 매체에 게재되었습니다. 네트워크접근제어(NAC) 솔루션의 안정적인 성장세에 앤드포인트 위협탐지・대응(EDR) 사업에서 대형 프로젝트를 수주하며 3분기 매출과 영업이익이 전년대비 대폭 증가하였습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/pro_nac-3.jpg?width=370&amp;height=250&amp;name=pro_nac-3.jpg\" /></p>\n<p>|  |\n|</p>", "body_text": "지니언스의 2020년 3분 기 실적 호전이 주요 매체에 게재되었습니다. 네트워크접근제어(NAC) 솔루션의 안정적인 성장세에 앤드포인트 위협탐지・대응(EDR) 사업에서 대형 프로젝트를 수주하며 3분기 매출과 영업이익이 전년대비 대폭 증가하였습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media...", "full_text": "지니언스의 2020년 3분 기 실적 호전이 주요 매체에 게재되었습니다. 네트워크접근제어(NAC) 솔루션의 안정적인 성장세에 앤드포인트 위협탐지・대응(EDR) 사업에서 대형 프로젝트를 수주하며 3분기 매출과 영업이익이 전년대비 대폭 증가하였습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/pro_nac-3.jpg?width=370&height=250&name=pro_nac-3.jpg)\n\n|  |\n|"}, {"title": "[한국경제신문_CEO 인터뷰] 코로나로 '사이버 방역' 중요성 더 커졌죠", "date": "2020.10.26", "link": "https://www.genians.co.kr/pr-room/press/사이버-방역", "category": "기타 뉴스", "body_html": "<p>이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 한국 사이버 보안 시장 및 정부 정책에 대한 인터뷰를 진행하였습니다. <br />\n 한국의 사이버 보안 수준이 글로벌과 비교해 낮고 정부의 CISO 지정 의무화, 보안 스타트업 육성 등 정보보호산업 발전을 위한 제언을 아끼지 않았습니다.</p>\n<p><a href=\"https://www.hankyung.com/society/article/2020102567541\">[한국경제] 이동범 KISIA 회장 \"코로나로 '사이버 방역' 중요성 더 커졌죠\"</a></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/IMG_6896-scaled-1-e1604831555499.jpg?width=426&amp;height=638&amp;name=IMG_6896-scaled-1-e1604831555499.jpg\" /></p>", "body_text": "이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 한국 사이버 보안 시장 및 정부 정책에 대한 인터뷰를 진행하였습니다.   \n 한국의 사이버 보안 수준이 글로벌과 비교해 낮고 정부의 CISO 지정 의무화, 보안 스타트업 육성 등 정보보호산업 발전을 위한 제언을 아끼지 않았습니다.\n\n[[한국경제] 이동범 KISIA 회장 \"코로나로 '사이버...", "full_text": "이동범 지니언스 대표가 한국정보보호산업협회(KISIA) 회장 자격으로 한국 사이버 보안 시장 및 정부 정책에 대한 인터뷰를 진행하였습니다.   \n 한국의 사이버 보안 수준이 글로벌과 비교해 낮고 정부의 CISO 지정 의무화, 보안 스타트업 육성 등 정보보호산업 발전을 위한 제언을 아끼지 않았습니다.\n\n[[한국경제] 이동범 KISIA 회장 \"코로나로 '사이버 방역' 중요성 더 커졌죠\"](https://www.hankyung.com/society/article/2020102567541)\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/IMG_6896-scaled-1-e1604831555499.jpg?width=426&height=638&name=IMG_6896-scaled-1-e1604831555499.jpg)"}, {"title": "지니언스-시스코, 뉴노멀 시대 맞아 IT 인프라 효율성 위한 SDA 분야 맞손", "date": "2020.10.26", "link": "https://www.genians.co.kr/pr-room/press/cisco-mou", "category": "기타 뉴스", "body_html": "<p><strong>- 증가하는 SDA 및 NAC 수요 대비 신규 시스템 개발로 시장 공략</strong></p>\n<p><strong>- 양사 공동 연구 및 마케팅으로 SDA 분야 경쟁력 제고</strong></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/news-contents-mou.png?width=1000&amp;height=506&amp;name=news-contents-mou.png\" /></p>\n<p>시스코 시스템즈(<a href=\"http://www.cisco.com/\">www.cisco.com</a>, 이하 시스코)와 지니언스(263860, 대표 이동범)가 손을 잡고 SDA(소프트웨어 정의 액세스, Software-Defined Access) 및 NAC(네트워크 접근 제어 솔루션, Network Access Control) 분야 신규 비즈니스 기회 창출에 나선다. 양 사는 10월 23일 서울 삼성동 시스코코리아 본사에서 전략적 제휴 사업 협력을 위한 업무 협약(MoU)을 체결했다.</p>\n<p>코로나바이러스로 인해 기업은 규모를 가리지 않고 변화하고 있다. 원격 근무가 본격적으로 도입되기 시작했고, 이로 인해 기업의 IT 관리자는 네트워크에 연결되는 장비를 식별하고 보안 정책을 적용해야 한다. SDA는 사용자의 디바이스를 네트워크 차원에서 자동 인식해 그에 맞는 설정이나 정책을 적용해 준다. 이러한 자동화 기능은 IT 인프라 관리의 효율성 제고에 필수적인 요소이며, 기업 내 IT 부서가 보다 유연하고 능동적으로 네트워크 관리 시간을 단축하고 원격 근무자를 관리할 수 있도록 돕는다.</p>\n<p>시스코와 지니언스는 점차 증가하고 있는 SDA 및 NAC 시스템 수요에 대비하고 신규 시장 개발에 주력할 방침이다. 양 사는 SDA 및 NAC 차세대 기술 개발은 물론, 새로운 서비스 모델도 만들어 고객을 유치할 예정이다. 또한 대(對) 고객 이벤트, 기술 세미나 등을 함께 기획하고 운영해 공동으로 고객 응대에도 나선다.</p>\n<p>시스코는 이번 업무 협약 체결을 계기로 지니언스에 자사의 SDA 랩은 물론, C9K 시리즈, DNA-C 어플라이언스, ISE 서버 등을 공유하고 국내 상황에 맞는 제품 개발에 착수한다. 지니언스 역시 랩 및 관련 제품을 시스코와 공유해 보다 향상된 기능을 갖춘 제품 개발에 대응할 예정이다. 또한 시스코의 탄탄한 마케팅 채널과 고객 데이터를 활용해 세일즈 시너지 극대화를 꾀할 계획이다.</p>\n<p>조범구 시스코코리아 대표는 “SDA와 NAC는 빠르게 변화하는 IT 환경에 즉각적으로 대응하고 사용자의 편의를 극대화하는 솔루션”이라며, “시스코는 지니언스의 기술력을 활용해 함께 신제품 개발에 나서고 시장 활성화에 기여할 것”이라고 밝혔다.</p>\n<p>이동범 지니언스 대표는 “SDA 분야에서 세계적인 리더십을 보유한 시스코와는 지속적인 기술 협력 관계를 구축해 왔다”며 “차세대 네트워크 기술 개발을 통해 뉴노멀, 언택트 환경을 리드하는 획기적인 IT 인프라를 완성해 나가겠다”고 밝혔다.</p>\n<p><a href=\"https://www.mk.co.kr/news/stock/view/2020/10/1094194/\">[매일경제] 시스코-지니언스, IT 인프라 신규 비즈니스 창출 위한 SDA 분야 맞손</a>  </p>\n<p><a href=\"https://news.mt.co.kr/mtview.php?no=2020102608472426936\">[머니투데이] 시스코-지니언스, SDA·NAC 사업 '맞손'</a></p>\n<p><a href=\"https://www.edaily.co.kr/news/read?newsId=01689206625936856&amp;mediaCodeNo=257&amp;OutLnkChk=Y\">[이데일리] 지니언스, 시스코와 SDA·NAC 분야 전략적 제휴…\"신규 사업기회 창출\"</a></p>\n<p><a href=\"https://www.etoday.co.kr/news/view/1954506\">[이투데이] 시스코-지니언스, SDAㆍNAC 수요 대비 신규 시스템 개발 협력</a></p>\n<p><a href=\"https://view.asiae.co.kr/article/2020102611232483709\">[아시아경제] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손</a></p>\n<p><a href=\"http://www.ceoscoredaily.com/news/article.html?no=74412\">[CEO스코어데일리] 시스코-지니언스, 뉴노멀 시대 맞아 IT 인프라 효율성 위한 SDA 분야 협력</a></p>\n<p><a href=\"http://www.hellot.net/new_hellot/magazine/magazine_read.html?code=202&amp;sub=004&amp;idx=54735\">[헬로티] 시스코-지니언스, IT 인프라 관리 위한 SDA·NAC 분야 협력 관계 구축</a></p>\n<p><a href=\"https://www.ebn.co.kr/news/view/1455973/?sc=Naver\">[EBN] 시스코, 지니언스와 SDA 분야 맞손</a></p>\n<p><a href=\"https://www.etnews.com/20201026000086\">[전자신문] 지니언스, 시스코와 SDA/NAC 분야 협력...차세대 기술 개발</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=152025\">[데이터넷] 시스코·지니언스, SDA·NAC 시장 공략 맞손</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2020102602109931820001&amp;ref=naver\">[디지털타임스] 시스코-지니언스, SDA·NAC 분야 맞손</a></p>\n<p><a href=\"https://zdnet.co.kr/view/?no=20201026093435\">[지디넷코리아] 시스코-지니언스, SW정의 접근제어 솔루션 공동사업</a></p>\n<p><a href=\"http://www.inews24.com/view/1310411\">[아이뉴스24] 시스코-지니언스, 소프트웨어정의 액세스(SDA) 사업 '맞손'</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/169415\">[ITWORLD] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손</a></p>\n<p><a href=\"http://www.ciokorea.com/news/169420\">[CIOKorea] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손</a></p>\n<p><a href=\"http://www.digitaltoday.co.kr/news/articleView.html?idxno=250794\">[디지털투데이] 시스코-지니언스, 소프트웨어 정의 액세스 솔루션 시장 협공</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=102871\">[ITDAILY] [이슈] 시스코-지니언스, SDA 시장 개척 위해 맞손</a></p>\n<p><a href=\"http://www.it-b.co.kr/news/articleView.html?idxno=44749\">[아이티비즈] 시스코-지니언스, SDA·NAC 분야 비즈니스 창출 나선다</a></p>\n<p><a href=\"http://www.itbiznews.com/news/articleView.html?idxno=22418\">[IT비즈뉴스] 시스코·지니언스, IT인프라 관리 효율성 핵심 ‘SDA/NAC’ 분야 협력</a></p>\n<p><a href=\"https://www.boannews.com/media/view.asp?idx=92027&amp;kind=\">[보안뉴스] 지니언스, 시스코와 손잡고 SDA 및 NAC 분야 사업 강화한다</a></p>\n<p><a href=\"https://www.dailysecu.com/news/articleView.html?idxno=115552\">[데일리시큐] 시스코-지니언스, SDA 및 NAC 분야 사업 협력 위한 업무 협약 체결</a></p>\n<p><a href=\"http://www.electimes.com/article.php?aid=1603697290207068011\">[전기신문] 시스코-지니언스, IT 인프라 효율성 위해 SDA 분야 맞손</a></p>\n<p><a href=\"http://www.ddaily.co.kr/news/article/?no=203827\">[디지털데일리] 시스코-지니언스, 내트워크 보안분야 협력</a></p>\n<p><a href=\"http://www.cctvnews.co.kr/news/articleView.html?idxno=212329\">[CCTV뉴스] 시스코-지니언스, SDA 및 NAC 분야 협업 위한 업무협약 체결</a></p>", "body_text": "**- 증가하는 SDA 및 NAC 수요 대비 신규 시스템 개발로 시장 공략**\n\n**- 양사 공동 연구 및 마케팅으로 SDA 분야 경쟁력 제고**\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/news-contents-mou.png?width=1000&height=506&name=news-c...", "full_text": "**- 증가하는 SDA 및 NAC 수요 대비 신규 시스템 개발로 시장 공략**\n\n**- 양사 공동 연구 및 마케팅으로 SDA 분야 경쟁력 제고**\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/news-contents-mou.png?width=1000&height=506&name=news-contents-mou.png)\n\n시스코 시스템즈([www.cisco.com](http://www.cisco.com/), 이하 시스코)와 지니언스(263860, 대표 이동범)가 손을 잡고 SDA(소프트웨어 정의 액세스, Software-Defined Access) 및 NAC(네트워크 접근 제어 솔루션, Network Access Control) 분야 신규 비즈니스 기회 창출에 나선다. 양 사는 10월 23일 서울 삼성동 시스코코리아 본사에서 전략적 제휴 사업 협력을 위한 업무 협약(MoU)을 체결했다.\n\n코로나바이러스로 인해 기업은 규모를 가리지 않고 변화하고 있다. 원격 근무가 본격적으로 도입되기 시작했고, 이로 인해 기업의 IT 관리자는 네트워크에 연결되는 장비를 식별하고 보안 정책을 적용해야 한다. SDA는 사용자의 디바이스를 네트워크 차원에서 자동 인식해 그에 맞는 설정이나 정책을 적용해 준다. 이러한 자동화 기능은 IT 인프라 관리의 효율성 제고에 필수적인 요소이며, 기업 내 IT 부서가 보다 유연하고 능동적으로 네트워크 관리 시간을 단축하고 원격 근무자를 관리할 수 있도록 돕는다.\n\n시스코와 지니언스는 점차 증가하고 있는 SDA 및 NAC 시스템 수요에 대비하고 신규 시장 개발에 주력할 방침이다. 양 사는 SDA 및 NAC 차세대 기술 개발은 물론, 새로운 서비스 모델도 만들어 고객을 유치할 예정이다. 또한 대(對) 고객 이벤트, 기술 세미나 등을 함께 기획하고 운영해 공동으로 고객 응대에도 나선다.\n\n시스코는 이번 업무 협약 체결을 계기로 지니언스에 자사의 SDA 랩은 물론, C9K 시리즈, DNA-C 어플라이언스, ISE 서버 등을 공유하고 국내 상황에 맞는 제품 개발에 착수한다. 지니언스 역시 랩 및 관련 제품을 시스코와 공유해 보다 향상된 기능을 갖춘 제품 개발에 대응할 예정이다. 또한 시스코의 탄탄한 마케팅 채널과 고객 데이터를 활용해 세일즈 시너지 극대화를 꾀할 계획이다.\n\n조범구 시스코코리아 대표는 “SDA와 NAC는 빠르게 변화하는 IT 환경에 즉각적으로 대응하고 사용자의 편의를 극대화하는 솔루션”이라며, “시스코는 지니언스의 기술력을 활용해 함께 신제품 개발에 나서고 시장 활성화에 기여할 것”이라고 밝혔다.\n\n이동범 지니언스 대표는 “SDA 분야에서 세계적인 리더십을 보유한 시스코와는 지속적인 기술 협력 관계를 구축해 왔다”며 “차세대 네트워크 기술 개발을 통해 뉴노멀, 언택트 환경을 리드하는 획기적인 IT 인프라를 완성해 나가겠다”고 밝혔다.\n\n[[매일경제] 시스코-지니언스, IT 인프라 신규 비즈니스 창출 위한 SDA 분야 맞손](https://www.mk.co.kr/news/stock/view/2020/10/1094194/)  \n   \n [[머니투데이] 시스코-지니언스, SDA·NAC 사업 '맞손'](https://news.mt.co.kr/mtview.php?no=2020102608472426936)\n\n[[이데일리] 지니언스, 시스코와 SDA·NAC 분야 전략적 제휴…\"신규 사업기회 창출\"](https://www.edaily.co.kr/news/read?newsId=01689206625936856&mediaCodeNo=257&OutLnkChk=Y)\n\n[[이투데이] 시스코-지니언스, SDAㆍNAC 수요 대비 신규 시스템 개발 협력](https://www.etoday.co.kr/news/view/1954506)\n\n[[아시아경제] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손](https://view.asiae.co.kr/article/2020102611232483709)\n\n[[CEO스코어데일리] 시스코-지니언스, 뉴노멀 시대 맞아 IT 인프라 효율성 위한 SDA 분야 협력](http://www.ceoscoredaily.com/news/article.html?no=74412)\n\n[[헬로티] 시스코-지니언스, IT 인프라 관리 위한 SDA·NAC 분야 협력 관계 구축](http://www.hellot.net/new_hellot/magazine/magazine_read.html?code=202&sub=004&idx=54735)\n\n[[EBN] 시스코, 지니언스와 SDA 분야 맞손](https://www.ebn.co.kr/news/view/1455973/?sc=Naver)\n\n[[전자신문] 지니언스, 시스코와 SDA/NAC 분야 협력...차세대 기술 개발](https://www.etnews.com/20201026000086)\n\n[[데이터넷] 시스코·지니언스, SDA·NAC 시장 공략 맞손](http://www.datanet.co.kr/news/articleView.html?idxno=152025)\n\n[[디지털타임스] 시스코-지니언스, SDA·NAC 분야 맞손](http://www.dt.co.kr/contents.html?article_no=2020102602109931820001&ref=naver)\n\n[[지디넷코리아] 시스코-지니언스, SW정의 접근제어 솔루션 공동사업](https://zdnet.co.kr/view/?no=20201026093435)\n\n[[아이뉴스24] 시스코-지니언스, 소프트웨어정의 액세스(SDA) 사업 '맞손'](http://www.inews24.com/view/1310411)\n\n[[ITWORLD] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손](http://www.itworld.co.kr/news/169415)\n\n[[CIOKorea] 시스코-지니언스, IT 인프라 효율성 위한 SDA 분야 맞손](http://www.ciokorea.com/news/169420)\n\n[[디지털투데이] 시스코-지니언스, 소프트웨어 정의 액세스 솔루션 시장 협공](http://www.digitaltoday.co.kr/news/articleView.html?idxno=250794)\n\n[[ITDAILY] [이슈] 시스코-지니언스, SDA 시장 개척 위해 맞손](http://www.itdaily.kr/news/articleView.html?idxno=102871)\n\n[[아이티비즈] 시스코-지니언스, SDA·NAC 분야 비즈니스 창출 나선다](http://www.it-b.co.kr/news/articleView.html?idxno=44749)\n\n[[IT비즈뉴스] 시스코·지니언스, IT인프라 관리 효율성 핵심 ‘SDA/NAC’ 분야 협력](http://www.itbiznews.com/news/articleView.html?idxno=22418)\n\n[[보안뉴스] 지니언스, 시스코와 손잡고 SDA 및 NAC 분야 사업 강화한다](https://www.boannews.com/media/view.asp?idx=92027&kind=)\n\n[[데일리시큐] 시스코-지니언스, SDA 및 NAC 분야 사업 협력 위한 업무 협약 체결](https://www.dailysecu.com/news/articleView.html?idxno=115552)\n\n[[전기신문] 시스코-지니언스, IT 인프라 효율성 위해 SDA 분야 맞손](http://www.electimes.com/article.php?aid=1603697290207068011)\n\n[[디지털데일리] 시스코-지니언스, 내트워크 보안분야 협력](http://www.ddaily.co.kr/news/article/?no=203827)\n\n[[CCTV뉴스] 시스코-지니언스, SDA 및 NAC 분야 협업 위한 업무협약 체결](http://www.cctvnews.co.kr/news/articleView.html?idxno=212329)"}, {"title": "[2020 베스트 비대면 솔루션] 지니언스, 클라우드 NAC와 PC 보안관리 솔루션 제공", "date": "2020.10.20", "link": "https://www.genians.co.kr/pr-room/press/지니언스-2020-베스트-비대면-솔루션으로-선정", "category": "NAC", "body_html": "<p>지니언스의 클라우드 NAC와 PC 보안 관리 솔루션이 전자신문이 선정한 2020 베스트 비대면 솔루션으로 선정되었습니다.  중소벤처기업부의 '2020년 비대면 서비스 바우처' 사업은  2021년까지 6,400억원의 예산이 편성되어 16만개의 기업을 지원하는 사업입니다. 수요기업으로 선정시 재택근무, 화상회의, 네트워크 및 보안솔루션 등 공급기업이 제공하는 서비스를 400만원 한도에서 90%를 지원받게 됩니다. 지니언스의 베스트 비대면 솔루션을 소개 합니다.</p>\n<p><strong>-</strong><strong>지니안 클라우드 NAC  : 구독형 서비스로 초기 비용 절감</strong></p>\n<p>‘지니안 클라우드 NAC’는 중소기업에 최적화된 클라우드 기반 보안 솔루션이다. 특화된 단말 식별 및 탐지 기술인 ‘DPI (Device Platform Intelligence)’를 통해 네트워크에 연결된 IT자산을 실시간으로 탐지하여 식별하고 상세하게 분류한다. 보안관리 및 운영을 위한 확장정보와 위협(취약성)정보를 추가로 제공한다.</p>\n<p>서비스 형태로 제공되는 ‘클라우드 NAC’는 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 보안에 관심이 많지만 초기 도입 비용 및 관리 이슈로 사용하지 못한 중소기업(SMB)이나 기관에 적합하다.</p>\n<p>다양한 플랫폼 및 운영 환경을 지원하며 정책 서버의 경우 클라우드 환경인 아마존 웹 서비스(AWS)에 구성되어 있어 내부 환경에 별도 설치 할 필요가 없다. 기존 시스템 환경의 변화 없이 자동으로 신속한 설치와 유지보수가 가능하고 초기도입 비용을 절감할 수 있는 장점이 있다.</p>\n<p>2016년 미국법인 설립과 함께 출시한 제품으로 미국・유럽・중동에 다수의 고객을 확보했다. 세계적인 컨설팅 기업인 가트너가 선정한 ‘차세대 NAC’ 대표기업으로 한국은 물론 아태지역에서 유일하게 선정됐으며 ‘프로스트 앤 설리번(Frost &amp; Sullivan)’이 발표한 ‘글로벌 NAC 솔루션 마켓 리포트’에도 등재됐다.</p>\n<p>프로스트 앤 설리번은 지니언스 NAC 제품의 주요 특장점으로 IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence), 기존 인프라의 추가 설정 없이 자동으로 신속한 설치,다 계층 동적 제어,  노드 그룹핑 제로 트러스트, 타 보안 솔루션과의 연동,  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 유연성을 손꼽았다.</p>\n<p>글로벌 기술 경쟁력 보유, 다양한 고객 확보 등 글로벌하게 검증된 것을 기반으로 지난 5월에는 국내에도 서비스를 런칭했다. 현재 두 자릿수의 고객사를 확보하는 성과를 기록하고 있으며 대부분 기업이 비즈니스적으로 보안이 중요하고 보안에 관심이 많으나 초기 투자 비용의 부담을 느끼는 기업들의 도입이 증가하고 있다.</p>\n<p><strong>- 지니안 GPI : 언택트환경의 자기 주도형 PC보안 솔루션</strong></p>\n<p>‘지니안 GPI(Genian PC Inspector)’는 PC사용자의 행동 변화를 유도하는 보안 의식향상은 물론 실제 PC의 취약점을 점검하고 조치할 수 있는 PC 보안 수준 진단 솔루션이다. 수준 높은 보안 컴플라이언스 이행에 도움을 주고 PC 보안 점검결과는 개인, 부서단위로 계량화 되어 보안 수준 개선 및 문화 조성이 가능하다.</p>\n<p>‘지니안 GPI’는 포스트 코로나시대 언택트 환경에서 통합된 강력한 보안 수준이 요구로 새롭게 재조명 받고 있다. 원격·재택근무는 외부로부터 기업 내부의 네트워크에 접속하는 특성상 사용자 인증, 네트워크 및 PC 등 단말의 보안 점검 포인트가 증가하게 된다. 따라서 보안 전문가가 내부 네트워크를 집중 관리하는 방식 보다 사용자의 자기 주도형 보안이 더욱 강조된다.</p>\n<p>지니안 GPI’는 사용자 스스로가 자신의 PC의 보안 상태를 능동적으로 점검하고 조치한다. 단말 PC에 대한 통합 관리 기능으로 보안관리자의 업무 편의성을 대폭 향상시킬 수 있으며 기업 보안 의식과 수준을 향상시켜 APT, 개인정보유출사고 등 대규모 보안사고를 예방할 수 있다.</p>\n<p>PC의 무결성이 중요한 공공기관에서 이미 검증이 완료된 제품으로 국내 6,100여개 기업(관)에서 설치, 운영 중이다. 기업 및 기관의 보안 규제 준수 여부와 조건별 보안 평가 등 내부 보안 수준을 측정한 데이터를 바탕으로 조직에 적합한 보안 정책을 수립하고 평가 및 조치할 수 있다.</p>\n<p>사이버보안진단의 날, 정보통신 기반 취약점 진단 등 정부 및 금융권의 다양한 보안 컴플라이언스 지원이 가능하다. 중앙집중 관리 방식으로 각 PC의 지속적인 관리 및 수준을 개선하고, 조치 활동이 용이하다. 새로운 점검 및 관리 항목에 대한 유연성과 확장성도 특징이다.</p>\n<p><a href=\"https://www.etnews.com/20201016000107\">[전자신문] 2020 베스트 비대면 솔루션, 중기 디지털 전환 앞당긴다.</a></p>\n<p><a href=\"https://www.etnews.com/20201016000172\">[전자신문] 베스트 비대면 솔루션, 클라우드 NAC와 PC보안 관리 솔루션</a></p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-GPI-BOX.jpg?width=1450&amp;height=1450&amp;name=Genian-GPI-BOX.jpg\" /></p>", "body_text": "지니언스의 클라우드 NAC와 PC 보안 관리 솔루션이 전자신문이 선정한 2020 베스트 비대면 솔루션으로 선정되었습니다.  중소벤처기업부의 '2020년 비대면 서비스 바우처' 사업은  2021년까지 6,400억원의 예산이 편성되어 16만개의 기업을 지원하는 사업입니다. 수요기업으로 선정시 재택근무, 화상회의, 네트워크 및 보안솔루션 등 공급기업이 제공하는 ...", "full_text": "지니언스의 클라우드 NAC와 PC 보안 관리 솔루션이 전자신문이 선정한 2020 베스트 비대면 솔루션으로 선정되었습니다.  중소벤처기업부의 '2020년 비대면 서비스 바우처' 사업은  2021년까지 6,400억원의 예산이 편성되어 16만개의 기업을 지원하는 사업입니다. 수요기업으로 선정시 재택근무, 화상회의, 네트워크 및 보안솔루션 등 공급기업이 제공하는 서비스를 400만원 한도에서 90%를 지원받게 됩니다. 지니언스의 베스트 비대면 솔루션을 소개 합니다.\n\n**-****지니안 클라우드 NAC  : 구독형 서비스로 초기 비용 절감**\n\n‘지니안 클라우드 NAC’는 중소기업에 최적화된 클라우드 기반 보안 솔루션이다. 특화된 단말 식별 및 탐지 기술인 ‘DPI (Device Platform Intelligence)’를 통해 네트워크에 연결된 IT자산을 실시간으로 탐지하여 식별하고 상세하게 분류한다. 보안관리 및 운영을 위한 확장정보와 위협(취약성)정보를 추가로 제공한다.\n\n서비스 형태로 제공되는 ‘클라우드 NAC’는 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 보안에 관심이 많지만 초기 도입 비용 및 관리 이슈로 사용하지 못한 중소기업(SMB)이나 기관에 적합하다.\n\n다양한 플랫폼 및 운영 환경을 지원하며 정책 서버의 경우 클라우드 환경인 아마존 웹 서비스(AWS)에 구성되어 있어 내부 환경에 별도 설치 할 필요가 없다. 기존 시스템 환경의 변화 없이 자동으로 신속한 설치와 유지보수가 가능하고 초기도입 비용을 절감할 수 있는 장점이 있다.\n\n2016년 미국법인 설립과 함께 출시한 제품으로 미국・유럽・중동에 다수의 고객을 확보했다. 세계적인 컨설팅 기업인 가트너가 선정한 ‘차세대 NAC’ 대표기업으로 한국은 물론 아태지역에서 유일하게 선정됐으며 ‘프로스트 앤 설리번(Frost & Sullivan)’이 발표한 ‘글로벌 NAC 솔루션 마켓 리포트’에도 등재됐다.\n\n프로스트 앤 설리번은 지니언스 NAC 제품의 주요 특장점으로 IT/OT에 특화된 단말 식별 및 탐지 기술 DPI (Device Platform Intelligence), 기존 인프라의 추가 설정 없이 자동으로 신속한 설치,다 계층 동적 제어,  노드 그룹핑 제로 트러스트, 타 보안 솔루션과의 연동,  비즈니스 환경에 따라 온프레미스, 클라우드, NAC as a Service 형태로 솔루션을 이용할 수 있는 유연성을 손꼽았다.\n\n글로벌 기술 경쟁력 보유, 다양한 고객 확보 등 글로벌하게 검증된 것을 기반으로 지난 5월에는 국내에도 서비스를 런칭했다. 현재 두 자릿수의 고객사를 확보하는 성과를 기록하고 있으며 대부분 기업이 비즈니스적으로 보안이 중요하고 보안에 관심이 많으나 초기 투자 비용의 부담을 느끼는 기업들의 도입이 증가하고 있다.\n\n**- 지니안 GPI : 언택트환경의 자기 주도형 PC보안 솔루션**\n\n‘지니안 GPI(Genian PC Inspector)’는 PC사용자의 행동 변화를 유도하는 보안 의식향상은 물론 실제 PC의 취약점을 점검하고 조치할 수 있는 PC 보안 수준 진단 솔루션이다. 수준 높은 보안 컴플라이언스 이행에 도움을 주고 PC 보안 점검결과는 개인, 부서단위로 계량화 되어 보안 수준 개선 및 문화 조성이 가능하다.\n\n‘지니안 GPI’는 포스트 코로나시대 언택트 환경에서 통합된 강력한 보안 수준이 요구로 새롭게 재조명 받고 있다. 원격·재택근무는 외부로부터 기업 내부의 네트워크에 접속하는 특성상 사용자 인증, 네트워크 및 PC 등 단말의 보안 점검 포인트가 증가하게 된다. 따라서 보안 전문가가 내부 네트워크를 집중 관리하는 방식 보다 사용자의 자기 주도형 보안이 더욱 강조된다.\n\n지니안 GPI’는 사용자 스스로가 자신의 PC의 보안 상태를 능동적으로 점검하고 조치한다. 단말 PC에 대한 통합 관리 기능으로 보안관리자의 업무 편의성을 대폭 향상시킬 수 있으며 기업 보안 의식과 수준을 향상시켜 APT, 개인정보유출사고 등 대규모 보안사고를 예방할 수 있다.\n\nPC의 무결성이 중요한 공공기관에서 이미 검증이 완료된 제품으로 국내 6,100여개 기업(관)에서 설치, 운영 중이다. 기업 및 기관의 보안 규제 준수 여부와 조건별 보안 평가 등 내부 보안 수준을 측정한 데이터를 바탕으로 조직에 적합한 보안 정책을 수립하고 평가 및 조치할 수 있다.\n\n사이버보안진단의 날, 정보통신 기반 취약점 진단 등 정부 및 금융권의 다양한 보안 컴플라
