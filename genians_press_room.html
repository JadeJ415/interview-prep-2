T분야 리서치 기업 가트너에 따르면 전 세계 ZTNA 시장은 2020년 3억 6천2백만 달러(4,546억 원) 시장에서 연평균 35.8% 성장해 2025년에는 16억 7천4백만 달러(2조 1,023억 원)의 시장 규모를 형성할 것으로 전망했다. 주요 보안 기술과 통합해 접속자의 신원확인, 내부 인증부터 클라우드 기반까지 관리하면서 시장이 크게 성장할 것으로 예측했다. 전 세계 기업들이 네트워크 접근제어(NAC)가 제공하는 포괄적인 가시성과 인증을 기반으로 제로 트러스트 전략을 통해 사용자 및 단말의 보안을 강화하는 것에 관심이 많다고 설명했다.  </p>\n<p>지니언스 김계연 CTO·미국법인장은 “대규모 사이버 공격 사례 등장으로 각국의 보안 정책이 강화되면서 그 해결책으로 제로 트러스트 모델이 각광을 받고 있다”며 “글로벌 중심으로 기술을 확장하고 대표 고객을 확보해 시장을 개척하는데 총력을 기울이겠다”고 밝혔다.   </p>\n<p><img alt=\"그림 1 2022년 RSAC 행사 모습 (1)\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EA%B7%B8%EB%A6%BC%201%202022%EB%85%84%20RSAC%20%ED%96%89%EC%82%AC%20%EB%AA%A8%EC%8A%B5%20(1).jpg?width=4032&amp;height=2268&amp;name=%EA%B7%B8%EB%A6%BC%201%202022%EB%85%84%20RSAC%20%ED%96%89%EC%82%AC%20%EB%AA%A8%EC%8A%B5%20(1).jpg\" /></p>\n<p>&lt;그림 1&gt; 지니언스는 세계 최대 사이버 보안 전시회 ‘RSAC 2023’에 참가해 제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보였다. (사진은 2022년 RSAC 행사 모습)</p>\n<p><img alt=\"그림 2 Genian ZTNA 로고 (1)\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EA%B7%B8%EB%A6%BC%202%20Genian%20ZTNA%20%EB%A1%9C%EA%B3%A0%20(1).png?width=511&amp;height=67&amp;name=%EA%B7%B8%EB%A6%BC%202%20Genian%20ZTNA%20%EB%A1%9C%EA%B3%A0%20(1).png\" /></p>\n<p>&lt;그림 2&gt; 지니언스 제로 트러스트 솔루션 ‘지니안 ZTNA’</p>\n<p>|  |  |\n|</p>", "body_text": "### - 미국 등 전 세계 사이버 안보 강화 전략으로 제로 트러스트 시장 대폭 성장 전망\n\n### - ‘지니안 ZNTA’로 실용적인 제로 트러스트 구현 방법론 제시\n\n### - 미국법인 주도로 단독 부스 운영, 9년 연속 참가\n\n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2023년 4월 24일부터 27일까지 미국 샌프란시스코...", "full_text": "### - 미국 등 전 세계 사이버 안보 강화 전략으로 제로 트러스트 시장 대폭 성장 전망\n\n### - ‘지니안 ZNTA’로 실용적인 제로 트러스트 구현 방법론 제시\n\n### - 미국법인 주도로 단독 부스 운영, 9년 연속 참가\n\n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 2023년 4월 24일부터 27일까지 미국 샌프란시스코에서 개최되는 세계 최대 사이버 보안 컨퍼런스 ‘RSAC 2023’에 참가한다.   \n  \n보안 분야 최고의 권위를 자랑하는 금번 전시회는 ‘Stronger Together’를 주제로 서로의 다양한 지식에 기반하여 진화하는 위협을 막고 해결하는데 상호 협력하는 것이 주요 골자다.   \n  \n지니언스는 이번 전시회에서 제로 트러스트 기반으로 변화를 준비하는 기업들에게 ‘지니안 ZTNA(제로 트러스트 네트워크 엑세스) 도입의 가장 실용적이고 근본적인 방법을 제시한다는 계획이다.   \n  \n‘지니안 ZTNA’는 IT와 보안 환경을 위한 아키텍처로 정보 통제기능을 강화한 제로 트러스트 솔루션이다. 모든 것을 지속적으로 검증하고 대응한다는 원칙을 기본으로 한다. 다양한 네트워크 환경과 연결지점을 보호하며 지속적인 검증 과정을 거쳐 비즈니스의 연속성을 확보해 준다.  \n  \n지니언스는 미국법인 주관으로 단독 부스로 참여한다. 고객 체험관을 운영하며 라이브 데모를 통해 원격· 클라우드는 물론 하이브리드 네트워크 환경의 모든 접점에서 보안을 유지하면서 원활하게 엑세스 할 수 있는 기술을 선보인다.   \n  \n구체적으로는 ▶제로 트러스트 구현을 위한 무중단 레이어 2기반 네트워크 센싱 기술 ▶보안 원격접속 위한 ZTNA 활용 ▶ 하이브리드 네트워크에서 클라우드 및 애플리케이션 가시성 및 액세스 제어 ▶ ZTNA를 통한 SSE 및 SASE 활용 방법이 제시 된다.   \n  \n미국 IT분야 리서치 기업 가트너에 따르면 전 세계 ZTNA 시장은 2020년 3억 6천2백만 달러(4,546억 원) 시장에서 연평균 35.8% 성장해 2025년에는 16억 7천4백만 달러(2조 1,023억 원)의 시장 규모를 형성할 것으로 전망했다. 주요 보안 기술과 통합해 접속자의 신원확인, 내부 인증부터 클라우드 기반까지 관리하면서 시장이 크게 성장할 것으로 예측했다. 전 세계 기업들이 네트워크 접근제어(NAC)가 제공하는 포괄적인 가시성과 인증을 기반으로 제로 트러스트 전략을 통해 사용자 및 단말의 보안을 강화하는 것에 관심이 많다고 설명했다.  \n  \n지니언스 김계연 CTO·미국법인장은 “대규모 사이버 공격 사례 등장으로 각국의 보안 정책이 강화되면서 그 해결책으로 제로 트러스트 모델이 각광을 받고 있다”며 “글로벌 중심으로 기술을 확장하고 대표 고객을 확보해 시장을 개척하는데 총력을 기울이겠다”고 밝혔다.   \n  \n![그림 1 2022년 RSAC 행사 모습 (1)](https://www.genians.co.kr/hs-fs/hubfs/%EA%B7%B8%EB%A6%BC%201%202022%EB%85%84%20RSAC%20%ED%96%89%EC%82%AC%20%EB%AA%A8%EC%8A%B5%20(1).jpg?width=4032&height=2268&name=%EA%B7%B8%EB%A6%BC%201%202022%EB%85%84%20RSAC%20%ED%96%89%EC%82%AC%20%EB%AA%A8%EC%8A%B5%20(1).jpg)\n\n<그림 1> 지니언스는 세계 최대 사이버 보안 전시회 ‘RSAC 2023’에 참가해 제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보였다. (사진은 2022년 RSAC 행사 모습)\n\n![그림 2 Genian ZTNA 로고 (1)](https://www.genians.co.kr/hs-fs/hubfs/%EA%B7%B8%EB%A6%BC%202%20Genian%20ZTNA%20%EB%A1%9C%EA%B3%A0%20(1).png?width=511&height=67&name=%EA%B7%B8%EB%A6%BC%202%20Genian%20ZTNA%20%EB%A1%9C%EA%B3%A0%20(1).png)\n\n<그림 2> 지니언스 제로 트러스트 솔루션 ‘지니안 ZTNA’\n\n|  |  |\n|"}, {"title": "지니언스, 딜로이트와 파트너십 체결...NAC 기반 ‘제로 트러스트 솔루션’ 글로벌 공급 확대", "date": "2023.03.07", "link": "https://www.genians.co.kr/pr-room/press/20230307", "category": "NAC", "body_html": "<p>지니언스가 글로벌 사이버 보안 영향력 확대에 나선다.  </p>\n<p>사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 다국적 컨설팅 기업 딜로이트와 전략적 파트너십을 체결했다고 밝혔다. 이번 협약은 지니언스의 칠레 파트너사인 마크로스가 딜로이트에 인수된 것을 발판 삼아 진행하게 됐다.  </p>\n<p>마크로스는 지난 3년 동안 칠레 시장에 지니언스 네트워크 접근 제어(NAC) 솔루션을 공급하면서 NAC 매출 132% 증가, 고객 유지율 100%를 기록하는 등 괄목할만한 시장 경쟁력을 확보해 왔다. 지니언스는 딜로이트와 적극 협력해 칠레뿐만 아니라 엔드 투 엔드 사이버 보안 서비스와 솔루션의 글로벌 공급망 확장을 본격화할 계획이다.  </p>\n<p>지니언스는 구독 기반 클라우드 NAC를 포함한 포괄적인 NAC 타입 제공으로 글로벌 시장에서 기술력을 인정받고 있다. 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며 글로벌 NAC 시장점유율 TOP 5안에 랭크돼 있다.  </p>\n<p>네트워크 환경에 참여하는 IoT·OT 등의 다양한 단말의 증가에 따른 보안 요구 사항의 강화로 NAC의 역할 및 시장이 확장되고 있다. 가트너는 NAC의 확장 기술로 제로 트러스트 네트워크 엑세스(ZTNA:Zero Trust Network Access)를 언급하며 클라우드 및 재택 등 분산된 IT 환경에서 차세대 보안 핵심 기술로 NAC가 역할을 할 수 있을 것으로 전망했다.  </p>\n<p>마르셀로 디아즈 딜로이트 사이버 리스크 파트너는 “지니언스의 NAC 솔루션은 고객의 비즈니스 및 IT 환경에 맞게 효과적이고 경제적으로 충족할 수 있는 유연한 구축 옵션을 제공한다”며 “ 지니언스 NAC가 제로 트러스트 구현의 기반 기술을 지원하도록 진화하면서 기업 사이버 보안 시장에서 입지가 더욱 강화되고 있다”고 밝혔다.  </p>\n<p>김계연 지니언스 CTO·미국법인장은 “지니언스는 제로 트러스트 보안 아키텍처를 지원하기 위해 NAC 기능을 확장했다\"며 “딜로이트와 제로 트러스트 프레임워크에서 협력함은 물론 글로벌 사이버 보안 비즈니스 활성화에 박차를 가할 예정이다”고 말했다.   </p>\n<p>한편, 지니언스는 연결기준 지난해 매출이 전년 대비 20.5% 증가한 384.5억원, 영업이익은 전년 대비 17.2% 상승한 69.2억원을 기록하며, 창립 후 18년 연속 흑자 달성, 최대 매출 및 영업 이익 달성 등 견조한 성장세를 유지하고 있다.</p>\n<p><img alt=\"그림1-1\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EA%B7%B8%EB%A6%BC1-1.png?width=618&amp;height=81&amp;name=%EA%B7%B8%EB%A6%BC1-1.png\" /></p>\n<p>&lt;그림 1&gt; 지니언스 제로 트러스트 솔루션 ‘지니안 ZTNA’</p>\n<p>|  |  |\n|</p>", "body_text": "지니언스가 글로벌 사이버 보안 영향력 확대에 나선다.  \n  \n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 다국적 컨설팅 기업 딜로이트와 전략적 파트너십을 체결했다고 밝혔다. 이번 협약은 지니언스의 칠레 파트너사인 마크로스가 딜로이트에 인수된 것을 발판 삼아 진행하게 됐다.  \n  \n마크로스는 지난 3년 동안 칠레 시장에 지니언스 네트워크 ...", "full_text": "지니언스가 글로벌 사이버 보안 영향력 확대에 나선다.  \n  \n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 다국적 컨설팅 기업 딜로이트와 전략적 파트너십을 체결했다고 밝혔다. 이번 협약은 지니언스의 칠레 파트너사인 마크로스가 딜로이트에 인수된 것을 발판 삼아 진행하게 됐다.  \n  \n마크로스는 지난 3년 동안 칠레 시장에 지니언스 네트워크 접근 제어(NAC) 솔루션을 공급하면서 NAC 매출 132% 증가, 고객 유지율 100%를 기록하는 등 괄목할만한 시장 경쟁력을 확보해 왔다. 지니언스는 딜로이트와 적극 협력해 칠레뿐만 아니라 엔드 투 엔드 사이버 보안 서비스와 솔루션의 글로벌 공급망 확장을 본격화할 계획이다.  \n  \n지니언스는 구독 기반 클라우드 NAC를 포함한 포괄적인 NAC 타입 제공으로 글로벌 시장에서 기술력을 인정받고 있다. 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 3년 연속 선정됐으며 글로벌 NAC 시장점유율 TOP 5안에 랭크돼 있다. 해 네이버클라우드, NHN클라우드, AWS의 서비스 파트너 및 쿠버네티스 서비스 기업 인증(KCSP을 획득하는 등 단기간에 클라우드 사업 역량을 확보했다.   </p>\n<p>행정·공공 클라우드 전환사업 설계·구축 사업부터 참여해 실력을 인정 받았으며 대형 MSP 사업 윈백, 클라우드 네이티브 전환, 스타트업 고객 확보 등 탁월한 클라우드 전환 사업 역량을 보유하고 있다.   </p>\n<p>양사는 이번 투자 및 업무 제휴를 통해 클라우드 서비스 사업 역량 강화, 클라우드 향 솔루션 개발, 마케팅 전 부분을 포괄적으로 협력하게 된다. ▶클라우드 사업기회 발굴 ▶클라우드 서비스 사업 확장▶ 클라우드 네이티브 역량 확보를 적극적으로 추진할 계획이다.  </p>\n<p>지니언스 2,700여개 고객의 클라우드 사업 기회를 공동으로 발굴하며 다수의 클라우드 설계와 전환∙운영 사업에 참여해 성공적으로 이행한 클라이온의 핵심역량을 결합하면 새로운 가치를 고객에게 제공할 수 있을 것으로 기대된다.  </p>\n<p>지니언스는 이번 투자와 전략적 제휴로 클라우드 요소 기술 및 서비스 역량을 확보해 클라우드 시대에 대비하고 클라우드 네이티브(Cloud Native) 보안 경쟁력도 확고히 한다는 계획이다.  </p>\n<p>이동범 지니언스 대표는 “공공 클라우드 설계와 전환∙운영 분야에서 경쟁력을 보유한 클라이온과 지니언스의 핵심 역량을 결합하면 고객에게 새로운 가치를 제공할 수 있을 것으로 기대한다”며 “지니언스는 클라우드 서비스 영역에 대한 투자와 협업을 통해 차세대 성장동력을 확보하는데 데 총력을 기울일 것”이라고 밝혔다.  </p>\n<p>박윤지 클라이온 대표는 ““이번 투자와 전략적 제휴를 통해 클라이온의 하이브리드 &amp; 멀티 클라우드 솔루션 기반 사업 확장과 기술 고도화에도 힘이 실렸다”며 “양사의 협력을 통해 고객의 DX 전환을 통한 사업역량을 강화하고 지니언스 고객 대상 DX 전환 수요 발굴과 함께 지니언스의 클라우드 네이티브 보안 경쟁력 확보 지원 등 다양한 시너지를 창출할 것으로 예상한다”고 설명했다.     </p>\n<p>한편, 클라이온은 최근 클라우드 사업의 전문성을 강화하고 비즈니스 영역 확장을 가속화 하기 위해 쿠버네티스 옵저버빌리티 솔루션 ‘넥스클리퍼(NexClipper)’를 인수한 바 있다.</p>\n<p>|  |  |\n|</p>", "body_text": "### - 클라우드 사업 확대를 위한 투자 및 업무 제휴\n\n### - 클라우드 대전환 시대 ‘퀀텀 점프’ 초석마련\n\n### - 클라우드 기반의 디지털 전환에 시너지 효과 기대.. 차세대 비즈니스 혁신 주도\n\n![보정 2](https://www.genians.co.kr/hs-fs/hubfs/%EB%B3%B4%EC%A0%95%202.png?width=3676&...", "full_text": "### - 클라우드 사업 확대를 위한 투자 및 업무 제휴\n\n### - 클라우드 대전환 시대 ‘퀀텀 점프’ 초석마련\n\n### - 클라우드 기반의 디지털 전환에 시너지 효과 기대.. 차세대 비즈니스 혁신 주도\n\n![보정 2](https://www.genians.co.kr/hs-fs/hubfs/%EB%B3%B4%EC%A0%95%202.png?width=3676&height=2129&name=%EB%B3%B4%EC%A0%95%202.png)  \n  \n사이버 보안 전문기업 지니언스(263860, 대표 이동범)가 통합 클라우드 서비스 전문기업 클라이온(대표 박윤지)의 2대 주주가 됐다. 클라우드 사업 확대를 위한 투자 및 업무 제휴로 양사는 클라우드 대전환 시대 ‘퀀텀 점프’를 위한 초석을 마련했다는 평을 듣고 있다.  \n  \n코로나19 이후 디지털 트랜스포메이션 시대를 맞아 기업들은 IT 인프라를 혁신하는 과정에서 클라우드를 기반 기술 인식하기 시작했다. 정부도 국가 기관 서비스의 클라우드로의 대전환을 통해 디지털 선도 국가로 도약한다는 야심 찬 계획을 수립한 상태다.  \n  \n클라이온은 클라우드 전문성을 바탕으로 고객의 디지털 혁신을 주도하고 있다. 2021년 설립해 네이버클라우드, NHN클라우드, AWS의 서비스 파트너 및 쿠버네티스 서비스 기업 인증(KCSP을 획득하는 등 단기간에 클라우드 사업 역량을 확보했다.   \n  \n행정·공공 클라우드 전환사업 설계·구축 사업부터 참여해 실력을 인정 받았으며 대형 MSP 사업 윈백, 클라우드 네이티브 전환, 스타트업 고객 확보 등 탁월한 클라우드 전환 사업 역량을 보유하고 있다.   \n  \n양사는 이번 투자 및 업무 제휴를 통해 클라우드 서비스 사업 역량 강화, 클라우드 향 솔루션 개발, 마케팅 전 부분을 포괄적으로 협력하게 된다. ▶클라우드 사업기회 발굴 ▶클라우드 서비스 사업 확장▶ 클라우드 네이티브 역량 확보를 적극적으로 추진할 계획이다.  \n  \n지니언스 2,700여개 고객의 클라우드 사업 기회를 공동으로 발굴하며 다수의 클라우드 설계와 전환∙운영 사업에 참여해 성공적으로 이행한 클라이온의 핵심역량을 결합하면 새로운 가치를 고객에게 제공할 수 있을 것으로 기대된다.  \n  \n지니언스는 이번 투자와 전략적 제휴로 클라우드 요소 기술 및 서비스 역량을 확보해 클라우드 시대에 대비하고 클라우드 네이티브(Cloud Native) 보안 경쟁력도 확고히 한다는 계획이다.  \n  \n이동범 지니언스 대표는 “공공 클라우드 설계와 전환∙운영 분야에서 경쟁력을 보유한 클라이온과 지니언스의 핵심 역량을 결합하면 고객에게 새로운 가치를 제공할 수 있을 것으로 기대한다”며 “지니언스는 클라우드 서비스 영역에 대한 투자와 협업을 통해 차세대 성장동력을 확보하는데 데 총력을 기울일 것”이라고 밝혔다.  \n  \n박윤지 클라이온 대표는 ““이번 투자와 전략적 제휴를 통해 클라이온의 하이브리드 & 멀티 클라우드 솔루션 기반 사업 확장과 기술 고도화에도 힘이 실렸다”며 “양사의 협력을 통해 고객의 DX 전환을 통한 사업역량을 강화하고 지니언스 고객 대상 DX 전환 수요 발굴과 함께 지니언스의 클라우드 네이티브 보안 경쟁력 확보 지원 등 다양한 시너지를 창출할 것으로 예상한다”고 설명했다.     \n  \n한편, 클라이온은 최근 클라우드 사업의 전문성을 강화하고 비즈니스 영역 확장을 가속화 하기 위해 쿠버네티스 옵저버빌리티 솔루션 ‘넥스클리퍼(NexClipper)’를 인수한 바 있다.\n\n\n|  |  |\n|"}, {"title": "- 위협에 대한 근본적인 원인 분석에서 재발방지까지 가능한 통합 기능 제공", "date": "2022.12.20", "link": "https://www.genians.co.kr/pr-room/press/20221220", "category": "기타 뉴스", "body_html": "<p>사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 솔루션에 안티 랜섬웨어(Anti-Ransomeware) 기능을 추가하고 시장 선점에 나선다고 20일 밝혔다.   </p>\n<p>전 세계적으로 가장 큰 사이버 위협인 랜섬웨어 공격은 기하급수적으로 확산되고 있다. 랜섬웨어(Ransomware)는 몸값(Ransom)과 소프트웨어(Software)의 합성어로 시스템을 잠그거나 데이터를 암호화해 사용할 수 없도록 만든 뒤 이를 인질로 금전을 요구하는 악성 프로그램을 말한다.  </p>\n<p>랜섬웨어 공격은 공공기관, 기업, 개인 PC 등 다양한 곳에서 발생하며 해마다 과격해지고 위험해지면서 단순한 보안 위협수준을 넘어 심각한 경제적 손실을 초래했다. 실질적이고 효과적인 대응 방안의 필요성이 더욱 요구되고 있다.  </p>\n<p>지니안 EDR 안티랜섬 모듈(Genian EDR AntiRansom Module)은 랜섬웨어 전문 탐지 엔진을 통해 사전 방역을 강화한다. 감염 시 랜섬웨어 동작을 인지하여 실시간으로 대응하며 시그니처에 의존하지 않고 악성 행위를 탐지한 후 차단하는 방식으로 신•변종 랜섬웨어 탐지 및 대응이 가능하다.  </p>\n<p>주요 기능으로는 ▲랜섬웨어가 데이터 및 파일을 암호화하기 전 실시간으로 백업하고 치료 후 자동으로 복원 ▲랜섬웨어 공격으로부터 구성 파일 삭제 및 프로세스가 종료되지 않도록 보호 ▲MBR이 변조되는 것을 차단하여 윈도우 부팅 시 문제를 일으키는 것을 보호 ▲랜섬웨어 탐지 시 안티 랜섬웨어 솔루션에서 미흡했던 가시성 정보를 EDR과 연계하여 제공 등이다.  </p>\n<p>단순 랜섬웨어의 차단과 피해 파일 복구뿐 아니라 EDR을 통한 유입경로, 정보유출 등 추가적인 피해상황에 대한 가시성을 통합하여 제공한다. 위협에 대한 근본적인 원인을 분석하여 재발방지까지 가능하도록 통합된 기능을 완성도 있게 제공하며 관리자의 개입 없이 탐지•차단에서 백업•복구까지 자동화되어 사용 편의성을 높였다.  </p>\n<p>이번에 추가된 기능을 통해 랜섬웨어 방지 목적의 안티 랜섬웨어 솔루션 도입 니즈가 있는 고객을 비롯해 최신 랜섬웨어 및 APT 공격 등 엔드포인트 전반의 위협 대응 역량 고도화, 자동화된 관리의 편의성으로 중단 없는 업무의 연속성이 필요한 기업에 효과적일 것으로 예상된다. 이미 국내에 진출한 글로벌 기업 등 다수 고객사에서 도입 후 활용 중이다.  </p>\n<p>이민상 지니언스 엔드포인트보안연구개발실 상무는 “일부 EDR 벤더에서 랜섬웨어 탐지 기능과 윈도우 VSS(볼륨 새도 복사본 서비스)를 활용한 백업 기능을 제공하고 있지만 관리자 개입 없이 탐지, 차단에서 복구까지 완전 자동화된 기능을 제공하는 것은 지니언스가 유일하다고 해도 무방하다”고 밝혔다.  </p>\n<p>김준형 지니언스 엔드포인트보안사업본부 상무는 “전문 안티 랜섬웨어 기능이 추가된 지니안 EDR을 통해 완성도 높은 기능을 통합 제공함으로써 더 많은 고객에게 다가갈 수 있을 것”이라고 덧붙혔다.</p>\n<p>|  |  |\n|</p>", "body_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 솔루션에 안티 랜섬웨어(Anti-Ransomeware) 기능을 추가하고 시장 선점에 나선다고 20일 밝혔다.   \n  \n전 세계적으로 가장 큰 사이버 위협인 랜섬웨어 공격은 기하급수적으로 확산되고 있다. 랜섬웨어(Ransomware)는 몸값(Ransom)과 소프트웨어(Software)의 ...", "full_text": "사이버 보안 전문 기업 지니언스(263860, 대표 이동범)가 EDR 솔루션에 안티 랜섬웨어(Anti-Ransomeware) 기능을 추가하고 시장 선점에 나선다고 20일 밝혔다.   \n  \n전 세계적으로 가장 큰 사이버 위협인 랜섬웨어 공격은 기하급수적으로 확산되고 있다. 랜섬웨어(Ransomware)는 몸값(Ransom)과 소프트웨어(Software)의 합성어로 시스템을 잠그거나 데이터를 암호화해 사용할 수 없도록 만든 뒤 이를 인질로 금전을 요구하는 악성 프로그램을 말한다.  \n  \n랜섬웨어 공격은 공공기관, 기업, 개인 PC 등 다양한 곳에서 발생하며 해마다 과격해지고 위험해지면서 단순한 보안 위협수준을 넘어 심각한 경제적 손실을 초래했다. 실질적이고 효과적인 대응 방안의 필요성이 더욱 요구되고 있다.  \n  \n지니안 EDR 안티랜섬 모듈(Genian EDR AntiRansom Module)은 랜섬웨어 전문 탐지 엔진을 통해 사전 방역을 강화한다. 감염 시 랜섬웨어 동작을 인지하여 실시간으로 대응하며 시그니처에 의존하지 않고 악성 행위를 탐지한 후 차단하는 방식으로 신•변종 랜섬웨어 탐지 및 대응이 가능하다.  \n  \n주요 기능으로는 ▲랜섬웨어가 데이터 및 파일을 암호화하기 전 실시간으로 백업하고 치료 후 자동으로 복원 ▲랜섬웨어 공격으로부터 구성 파일 삭제 및 프로세스가 종료되지 않도록 보호 ▲MBR이 변조되는 것을 차단하여 윈도우 부팅 시 문제를 일으키는 것을 보호 ▲랜섬웨어 탐지 시 안티 랜섬웨어 솔루션에서 미흡했던 가시성 정보를 EDR과 연계하여 제공 등이다.  \n  \n단순 랜섬웨어의 차단과 피해 파일 복구뿐 아니라 EDR을 통한 유입경로, 정보유출 등 추가적인 피해상황에 대한 가시성을 통합하여 제공한다. 위협에 대한 근본적인 원인을 분석하여 재발방지까지 가능하도록 통합된 기능을 완성도 있게 제공하며 관리자의 개입 없이 탐지•차단에서 백업•복구까지 자동화되어 사용 편의성을 높였다.  \n  \n이번에 추가된 기능을 통해 랜섬웨어 방지 목적의 안티 랜섬웨어 솔루션 도입 니즈가 있는 고객을 비롯해 최신 랜섬웨어 및 APT 공격 등 엔드포인트 전반의 위협 대응 역량 고도화, 자동화된 관리의 편의성으로 중단 없는 업무의 연속성이 필요한 기업에 효과적일 것으로 예상된다. 이미 국내에 진출한 글로벌 기업 등 다수 고객사에서 도입 후 활용 중이다.  \n  \n이민상 지니언스 엔드포인트보안연구개발실 상무는 “일부 EDR 벤더에서 랜섬웨어 탐지 기능과 윈도우 VSS(볼륨 새도 복사본 서비스)를 활용한 백업 기능을 제공하고 있지만 관리자 개입 없이 탐지, 차단에서 복구까지 완전 자동화된 기능을 제공하는 것은 지니언스가 유일하다고 해도 무방하다”고 밝혔다.  \n  \n김준형 지니언스 엔드포인트보안사업본부 상무는 “전문 안티 랜섬웨어 기능이 추가된 지니안 EDR을 통해 완성도 높은 기능을 통합 제공함으로써 더 많은 고객에게 다가갈 수 있을 것”이라고 덧붙혔다.\n\n|  |  |\n|"}, {"title": "스튜디오 상상인-상상피셜2| 지니언스 편 방영", "date": "2022.11.29", "link": "https://www.genians.co.kr/pr-room/press/20221129", "category": "기타 뉴스", "body_html": "<p>스튜디오 상상인의 주식예능, 상상피셜2 지니언스편이 방영되었습니다.<br />\n지니언스 직원들이 직접 출연해 제품과 회사를 소개합니다.</p>", "body_text": "스튜디오 상상인의 주식예능, 상상피셜2 지니언스편이 방영되었습니다.  \n지니언스 직원들이 직접 출연해 제품과 회사를 소개합니다....", "full_text": "스튜디오 상상인의 주식예능, 상상피셜2 지니언스편이 방영되었습니다.  \n지니언스 직원들이 직접 출연해 제품과 회사를 소개합니다."}, {"title": "언론보도", "date": "2022.10.11", "link": "https://www.genians.co.kr/pr-room/press/20221011", "category": "기타 뉴스", "body_html": "<p>국내 보안 업계 최초로 자체 ‘버그 바운티(Bug Bounty)’ 프로그램을 시행하고 있는 지니언스(263860, 대표 이동범)가 보안 취약점을 제보한 우수 신고자 6명에게 포상금을 지급했다고 11일 밝혔다.  </p>\n<p>‘버그 바운티’는 오류, 오작동을 의미하는 버그(Bug)와 포상금이란 뜻의 바운티(Bounty)가 합해진 용어로 소프트웨어 또는 웹서비스의 취약점을 찾아낸 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용한 침해 사고를 사전에 예방함은 물론 화이트 해커 등 차세대 보안 전문가 육성의 토대도 될 수 있다.   </p>\n<p>사이버 위협의 주요 요인인 보안 취약점은 무엇보다 신속하게 발견해 조치하는 것이 중요하다. 구글•MS•페이스북 등 주요 글로벌 기업은 자사 제품 및 서비스의 취약점 발굴과 보안강화를 위해 버그 바운티 프로그램을 적극적으로 운영하고 있다.  </p>\n<p>지니언스는 2021년 차세대 보안리더 양성 프로그램(BOB) 10기 교육생들과 취약점 분석 프로젝트를 공동 진행했으며 지난 3월부터 최근까지 버그 바운티를 운영한 결과, 총 26건의 취약점이 접수됐다. 공격 영향도, 공격 난이도 등 보안 취약점 평가 국제 표준에 근거하여 객관적인 기준에 따라 취약점을 평가했다.  </p>\n<p>신고된 신규 취약점에 대해서는 내부 분석을 통해 신속하게 해결한 후 공격 위험도 등에 따라 홈페이지 등에 공지하고 고객사 패치를 진행하고 있다.  </p>\n<p>지니언스의 버그 바운티 프로그램은 네트워크 접근 제어 솔루션인 ‘지니안 NAC’와 ‘클라우드 NAC CSM 서비스’가 대상이다. 단, 지니언스 홈페이지 등 현재 운영 중인 서비스에 대한 취약점은 불법적인 해킹 우려 및 관련법에 따른 검증권한 부재로 평가 및 보상에서 제외된다.  </p>\n<p>보안 취약점 신고서 등록 및 접수 확인은 수시로 이뤄지며 취약점 평가는 월 단위, 포상금 지급은 분기단위(1월, 4월, 7월, 10월)로 이뤄진다. 접수된 취약점은 보안 취약점 평가 국제 표준(CVSS 3.1)을 기반으로 평가하게 되며 건당 최대 포상금은 2500 달러(약 357만원)이다.  </p>\n<p>이동범 지니언스 대표는 “역량 있는 보안 전문가들의 노력으로 제품 및 서비스의 안정성에 큰 힘이 되고 있다”며 “보안 취약점에 대한 선제적인 대응 강화를 목표로 버그 바운티를 지속적으로 확대할 것”이라고 말했다.  </p>\n<p>지니언스 버그 바운티 프로그램은 지니언스 홈페이지(<a href=\"https://genians.co.kr/resources/bug-bounty/\">https://genians.co.kr/resources/bug-bounty/</a>)에서 자세한 내용을 확인할 수 있다.</p>\n<p>|  |  |\n|</p>", "body_text": "국내 보안 업계 최초로 자체 ‘버그 바운티(Bug Bounty)’ 프로그램을 시행하고 있는 지니언스(263860, 대표 이동범)가 보안 취약점을 제보한 우수 신고자 6명에게 포상금을 지급했다고 11일 밝혔다.  \n  \n‘버그 바운티’는 오류, 오작동을 의미하는 버그(Bug)와 포상금이란 뜻의 바운티(Bounty)가 합해진 용어로 소프트웨어 또는 웹서비스의 ...", "full_text": "국내 보안 업계 최초로 자체 ‘버그 바운티(Bug Bounty)’ 프로그램을 시행하고 있는 지니언스(263860, 대표 이동범)가 보안 취약점을 제보한 우수 신고자 6명에게 포상금을 지급했다고 11일 밝혔다.  \n  \n‘버그 바운티’는 오류, 오작동을 의미하는 버그(Bug)와 포상금이란 뜻의 바운티(Bounty)가 합해진 용어로 소프트웨어 또는 웹서비스의 취약점을 찾아낸 사람에게 포상금을 지급하는 제도다. 보안 취약점을 악용한 침해 사고를 사전에 예방함은 물론 화이트 해커 등 차세대 보안 전문가 육성의 토대도 될 수 있다.   \n  \n사이버 위협의 주요 요인인 보안 취약점은 무엇보다 신속하게 발견해 조치하는 것이 중요하다. 구글•MS•페이스북 등 주요 글로벌 기업은 자사 제품 및 서비스의 취약점 발굴과 보안강화를 위해 버그 바운티 프로그램을 적극적으로 운영하고 있다.  \n  \n지니언스는 2021년 차세대 보안리더 양성 프로그램(BOB) 10기 교육생들과 취약점 분석 프로젝트를 공동 진행했으며 지난 3월부터 최근까지 버그 바운티를 운영한 결과, 총 26건의 취약점이 접수됐다. 공격 영향도, 공격 난이도 등 보안 취약점 평가 국제 표준에 근거하여 객관적인 기준에 따라 취약점을 평가했다.  \n  \n신고된 신규 취약점에 대해서는 내부 분석을 통해 신속하게 해결한 후 공격 위험도 등에 따라 홈페이지 등에 공지하고 고객사 패치를 진행하고 있다.  \n  \n지니언스의 버그 바운티 프로그램은 네트워크 접근 제어 솔루션인 ‘지니안 NAC’와 ‘클라우드 NAC CSM 서비스’가 대상이다. 단, 지니언스 홈페이지 등 현재 운영 중인 서비스에 대한 취약점은 불법적인 해킹 우려 및 관련법에 따른 검증권한 부재로 평가 및 보상에서 제외된다.  \n  \n보안 취약점 신고서 등록 및 접수 확인은 수시로 이뤄지며 취약점 평가는 월 단위, 포상금 지급은 분기단위(1월, 4월, 7월, 10월)로 이뤄진다. 접수된 취약점은 보안 취약점 평가 국제 표준(CVSS 3.1)을 기반으로 평가하게 되며 건당 최대 포상금은 2500 달러(약 357만원)이다.  \n  \n이동범 지니언스 대표는 “역량 있는 보안 전문가들의 노력으로 제품 및 서비스의 안정성에 큰 힘이 되고 있다”며 “보안 취약점에 대한 선제적인 대응 강화를 목표로 버그 바운티를 지속적으로 확대할 것”이라고 말했다.  \n  \n지니언스 버그 바운티 프로그램은 지니언스 홈페이지(<https://genians.co.kr/resources/bug-bounty/>)에서 자세한 내용을 확인할 수 있다.\n\n\n|  |  |\n|"}, {"title": "언론보도", "date": "2022.10.04", "link": "https://www.genians.co.kr/pr-room/press/20221004", "category": "기타 뉴스", "body_html": "<p>사이버 보안 기업 지니언스(263860, 대표 이동범)가 국내외 EDR(Endpoint Detection &amp; Response)제품 중 최초로 국가정보원 보안적합성 검증제도를 통과해 보안기능확인서를 획득했다고 4일 밝혔다.   </p>\n<p>국내 최초로 EDR을 개발, 국내 최다 고객을 확보하며 EDR 시장을 선도하고 있는 지니언스는 국가 및 공공기관의 보안 요구 사항을 충족한 최초의 제품이라는 타이틀을 다시 한번 기록했다. 경쟁 제품 보다 한층 더 높은 보안 수준과 기술을 고객에게 제공할 수 있게 된 것이다.   </p>\n<p>국가 및 공공기관은 보안 기능이 포함된 IT제품을 도입할 경우, 보안적합성을 검증한 후 운영해야 한다. 하지만 보안기능확인서를 획득한 제품은 검증과정을 면제 받는다. 따라서, 지니언스는 국내는 물론 글로벌 기업 보다 한발 앞서 국가 및 공공기관의 EDR 시장을 빠르고 폭넓게 확대할 수 있게 됐다.   </p>\n<p>지니언스의 EDR은 단말에 대한 지속적인 모니터링 및 정보 수집을 통해 위협의 탐지 및 분석, 대응을 제공하는 솔루션이다. 단말의 가시성 확보에 따라 위협이 언제, 어디서, 어떻게 유입이 되었는지 위협의 정보를 한눈에 볼 수 있어 신속하고 적극적인 대응이 가능하다.  </p>\n<p>침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은(Un-Known) 위협까지 탐지가 가능하다. 다양한 위젯 제공에 따른 사용자 편리성 증대와 위협 탐지 알람을 통한 내부 보안을 강화할 수 있다.  </p>\n<p>국내 최초로 메이저 업그레이드 된 2.0 버전은 EDR을 통해 기대하는 고객의 요구사항을 적극 반영했다. 분석을 위한 충분한 가시성 제공, 위협 관리의 편의성 증대, 모니터링의 고도화, 자동화 대응 등 기술 요소와 사용자의 편의성이 대폭 증대됐다.  </p>\n<p>지니언스의 EDR 사업은 안정적인 매출 구조를 확립하기 위해 서브스크립션(Subscription:구독형) 비즈니스 모델을 채택했다. 사용한 만큼 지불하는 서비스 모델로 라이선스와 유지보수를 통합한 선진화된 구조다.   </p>\n<p>국내 소프트웨어 비즈니스의 구조 상 B2B에서 구독형 비즈니스가 정착이 쉽지 않지만 전체 매출의 60% 이상을 구독형으로 공급하여 중장기적으로 안정적인 매출을 거둬들일 것으로 기대된다.  </p>\n<p>지니언스의 EDR 제품은 2021년 조달청 기준 공공 EDR 시장에서 79% 점유율로 1위를 기록했다. 2022년 상반기 현재 누적고객 수 120곳을 돌파했으며 지자체, 공공기관, 기업, 병원, 금융권 등 레퍼런스를 지속적으로 확보했다. 보안기능확인서를 통해 하반기 EDR 시장 전망도 밝게 하고 있다.  </p>\n<p>김준형 엔드포인트사업본부 상무는 “보안기능확인서 획득으로 경쟁사와 차별화된 높은 보안수준과 기술을 고객에게 제공할 수 있게 됐다”며 “공공기관 보안 담당자들이 악성코드의 침투 경로를 한눈에 파악할 수 있는 EDR 도입을 적극 검토하는 등 공공 EDR 시장의 성장세에 발맞춰 시장 리더십을 공고히 하는데 총력을 다하겠다”고 덧붙였다.</p>\n<p>|  |  |\n|</p>", "body_text": "사이버 보안 기업 지니언스(263860, 대표 이동범)가 국내외 EDR(Endpoint Detection & Response)제품 중 최초로 국가정보원 보안적합성 검증제도를 통과해 보안기능확인서를 획득했다고 4일 밝혔다.   \n  \n국내 최초로 EDR을 개발, 국내 최다 고객을 확보하며 EDR 시장을 선도하고 있는 지니언스는 국가 및 공공기관의 보안 요구 ...", "full_text": "사이버 보안 기업 지니언스( ": "<p>지니언스가 미국 정부 지원 교육 개발 프로젝트에 참여해 미국 대학과 차세대 사이버 보안 인력 양성에 나선다.  </p>\n<p>제로트러스트 솔루션 선두주자인 지니언스(263860, 대표 이동범)가 미국 메스베이 커뮤니티 대학(MassBay Community College)의 사이버보안 교육 프로그램에 참여한다고 15일 밝혔다.  </p>\n<p>지니언스는 메스베이 커뮤니티 대학과 협업해 사이버 보안 프로그램에 특화된 과학, 기술, 엔지니어링 및 수학 교육이 가능한 교수진을 양성하는 ‘차세대 사이버 보안 인력 양성(ACT: Next Generation Cybersecurity Workforce)’ 프로젝트를 진행한다. ACT 프로젝트는 미국 국립과학재단(NSF)으로부터 120만 달러를 지원받게 된다.  </p>\n<p>ACT 프로젝트를 성공적으로 진행하기 위해 지니언스는 보유한 양질의 사이버 교육 콘텐츠를 제공하게 된다. 이번 메스베이 커뮤니티 대학을 필두로 미국 내 중∙고등 및 대학 교육기관과 추가적인 프로젝트를 진행할 계획이다.  </p>\n<p>프로젝트에서 지니언스는 자체 개발한 제로트러스트 핵심 솔루션 NAC를 제공하는데, 이는 네트워크에 접속하는 사용자나 다양한 기기들을 식별하여 인증 절차와 통제를 함으로써 네트워크를 보호하고 위협을 차단할 수 있는 솔루션이다.  </p>\n<p>샴시 무사비(Shamsi Moussavi) 메스베이 컴퓨터학과 교수는 “지니언스의 NAC 솔루션은 업계에서 가장 손쉽게 구축할 수 있어 보안의 필수 기능을 효율적으로 경험할 수 있다”며 “지니안 NAC로 실질적 체험 중심의 보안 교육 콘텐츠를 제공하여 미국 동부 보스턴지역을 중심으로 사이버 보안 취약 계층을 위한 교육 증진에 이바지 할 것”이라고 밝혔다.   </p>\n<p>김계연 지니언스 CTO/미국법인장은 “지니언스의 검증된 기술, 경험 및 모범 사례들을 메스베이 대학에 제공하게 되어 기쁘다”며 “ACT 프로젝트를 적극 지원하고 미국 여러 대학 및 지역에 더 나은 보안 문화를 구축하기 위한 솔루션 공급 확대에 나서겠다”고 말했다.</p>\n<p>|  |  |\n|</p>", "body_text": "지니언스가 미국 정부 지원 교육 개발 프로젝트에 참여해 미국 대학과 차세대 사이버 보안 인력 양성에 나선다.  \n  \n제로트러스트 솔루션 선두주자인 지니언스(263860, 대표 이동범)가 미국 메스베이 커뮤니티 대학(MassBay Community College)의 사이버보안 교육 프로그램에 참여한다고 15일 밝혔다.  \n  \n지니언스는 메스베이 커뮤니티 ...", "full_text": "지니언스가 미국 정부 지원 교육 개발 프로젝트에 참여해 미국 대학과 차세대 사이버 보안 인력 양성에 나선다.  \n  \n제로트러스트 솔루션 선두주자인 지니언스(263860, 대표 이동범)가 미국 메스베이 커뮤니티 대학(MassBay Community College)의 사이버보안 교육 프로그램에 참여한다고 15일 밝혔다.  \n  \n지니언스는 메스베이 커뮤니티 대학과 협업해 사이버 보안 프로그램에 특화된 과학, 기술, 엔지니어링 및 수학 교육이 가능한 교수진을 양성하는 ‘차세대 사이버 보안 인력 양성(ACT: Next Generation Cybersecurity Workforce)’ 프로젝트를 진행한다. ACT 프로젝트는 미국 국립과학재단(NSF)으로부터 120만 달러를 지원받게 된다.  \n  \nACT 프로젝트를 성공적으로 진행하기 위해 지니언스는 보유한 양질의 사이버 교육 콘텐츠를 제공하게 된다. 이번 메스베이 커뮤니티 대학을 필두로 미국 내 중∙고등 및 대학 교육기관과 추가적인 프로젝트를 진행할 계획이다.  \n  \n프로젝트에서 지니언스는 자체 개발한 제로트러스트 핵심 솔루션 NAC를 제공하는데, 이는 네트워크에 접속하는 사용자나 다양한 기기들을 식별하여 인증 절차와 통제를 함으로써 네트워크를 보호하고 위협을 차단할 수 있는 솔루션이다.  \n  \n샴시 무사비(Shamsi Moussavi) 메스베이 컴퓨터학과 교수는 크를 참고하세요.</p>\n<p><a href=\"https://newsis.com/view/?id=NISX20220825_0001991172&amp;cID=10406&amp;pID=13100\">韓 국대급 보안회사, 가트너 '톱5'로 꼽힌 이유</a></p>", "body_text": "뉴시스에 지니언스 이동범 대표님의 인터뷰가 보도되었습니다.\n\n- NAC 시장서 API 공개해 누구나 연동할 수 있도록 유도  \n- 해외서 기술력 인정받아…가트너 선정 ‘글로벌 톱5 NAC 업체’에 포함  \n- 지난해 기준 EDR 공공조달 시장서 점유율 1위 기록\n\n기사전문은 아래 링크를 참고하세요.\n\n[韓 국대급 보안회사, 가트너 '톱5'로 꼽힌 이유](h...", "full_text": "뉴시스에 지니언스 이동범 대표님의 인터뷰가 보도되었습니다.\n\n- NAC 시장서 API 공개해 누구나 연동할 수 있도록 유도  \n- 해외서 기술력 인정받아…가트너 선정 ‘글로벌 톱5 NAC 업체’에 포함  \n- 지난해 기준 EDR 공공조달 시장서 점유율 1위 기록\n\n기사전문은 아래 링크를 참고하세요.\n\n[韓 국대급 보안회사, 가트너 '톱5'로 꼽힌 이유](https://newsis.com/view/?id=NISX20220825_0001991172&cID=10406&pID=13100)"}, {"title": "지니언스, 제로 트러스트 기술 특허 취득…원격근무 및 통합관리에 특화된 보안솔루션", "date": "2022.08.29", "link": "https://www.genians.co.kr/pr-room/press/220830-0", "category": "기타 뉴스", "body_html": "<h3>- IP Mobility, 동적 목적지 접근 제어 기술로 사용자 중심 네트워크, 단말의 이동성 보장</h3>\n<h3>- 지속적인 연구개발로 제로 트러스트 시대 차세대 보안 리더십 강화</h3>\n<p>지니언스(263860, 대표 이동범)가 원격 및 클라우드 등 확장된 비즈니스 환경에 최적화된 보안 모델인 제로 트러스트 기반 기술에 대한 특허를 취득했다고 29일 밝혔다. 지난해 IP Mobility에 이어 취득한 동적 목적지 접근제어 분야 특허는 원격근무에 특화된 보안기능, 디지털 전환을 위한 통합관리 기능이 핵심인 기술이다.</p>\n<p>최근 몇 년 사이에 디지털 전환이 빠르게 진행됨에 따라 기업의 비즈니스 환경이 클라우드로 전환되면서 정보의 보안과 관리가 그 어느 때보다 중요한 화두로 떠올랐다. 과거 외부의 위협만 경계해왔던 것에서 더 나아가 내부 보안에도 엄격한 적용이 필요하게 된 것이다.</p>\n<p>기존 경계선 보안으로는 더 이상 효과적으로 변화된 환경에 대응할 수 없어 강력한 사용자 인증 및 관리, 정확한 식별 및 관리, 유연한 네트워크 환경 구성, 세밀한 접근 통제 등 제로 트러스트 기반의 보안 모델이 절대적으로 요구되고 있다.</p>\n<p>특히 모바일과 클라우드 환경으로 보편화되면서 네트워크 환경은 사용자 중심의 네트워크 단말의 이동성 보장 등 동적으로 변화하고 있다. 단말의 위치도 물리적인 제약을 벗어나 어디든 존재하며 단말이 속한 네트워크 환경도 급변하고 있다.</p>\n<p>동적 목적지 접근 제어 기술은 클라우드 접근 통제를 위한 필수적인 기술이다. IP 기반이 아닌 ‘클라우드 내 ERP 서버’ 등의 형태로 목적지를 지정할 수 있어 클라우드 자원으로의 접근 통제가 용이하다. 전통적인 정적 접근제어 방식은 IP를 기반으로 목적지를 지정할 수 있었지만 클라우드 자원은 IP가 수시로 변동되기 때문에 지정할 수 없다.</p>\n<p>BMRC의 ‘글로벌 제로 트러스트 보안 시장 점유율, 규모, 산업보고서’에 따르면 제로 트러스트 보안 시장의 가치는 2020년에 156억 1000만 달러(20조 8237억 4000만원)에서 2027년에는 943억 5000만 달러(125조 9195억 1000만원)로 성장할 것으로 내다보고 있다.</p>\n<p>IP Mobility는 기존 IP 보안 중심의 보안 체계에서 데이터 기반의 보안 체계로의 전환을 의미한다. 이 기술은 사용자와 컴퓨터가 다른 지리적 위치나 네트워크에서도 설정 변경 없이 동일한 보안 정책을 적용 받을 수 있는 기술로 정책 변경으로 인한 보안의 누수를 막고 불필요한 업무를 줄일 수 있다.</p>\n<p>대표적으로 금융권의 인사이동 시 적용될 수 있는데, 자리 배치 변동이나 지점 발령 등으로 사용자의 IP가 변경되는 경우에도 별 다른 설정 변경 없이 동일한 보안 정책을 적용 받을 수 있게 된다.</p>\n<p>이동범 지니언스 대표는 “사용자 중심 네트워크, 단말 이동성 보장 기술은 다양한 네트워크 환경과 연결지점을 보호해 비즈니스 연속성을 확보하고 일관성 있는 보안 정책의 통합 관리가 가능하다”면서 “제로 트러스트에 대한 원천 기술을 확보하고 지속적인 연구 개발로 차세대 보안 시장에서의 리더십을 확고히 하겠다”고 밝혔다.</p>\n<p><strong><a href=\"https://www.hankyung.com/it/article/202208293806i\">[한국경제] 지니언스, 제로 트러스트 기술 특허 취득…원격근무·통합관리에 특화 (08.29)</a></strong></p>\n<p>|  |  |\n|</p>", "body_text": "### - IP Mobility, 동적 목적지 접근 제어 기술로 사용자 중심 네트워크, 단말의 이동성 보장\n\n### - 지속적인 연구개발로 제로 트러스트 시대 차세대 보안 리더십 강화\n\n지니언스(263860, 대표 이동범)가 원격 및 클라우드 등 확장된 비즈니스 환경에 최적화된 보안 모델인 제로 트러스트 기반 기술에 대한 특허를 취득했다고 29일 밝혔다. ...", "full_text": "### - IP Mobility, 동적 목적지 접근 제어 기술로 사용자 중심 네트워크, 단말의 이동성 보장\n\n### - 지속적인 연구개발로 제로 트러스트 시대 차세대 보안 리더십 강화\n\n지니언스(263860, 대표 이동범)가 원격 및 클라우드 등 확장된 비즈니스 환경에 최적화된 보안 모델인 제로 트러스트 기반 기술에 대한 특허를 취득했다고 29일 밝혔다. 지난해 IP Mobility에 이어 취득한 동적 목적지 접근제어 분야 특허는 원격근무에 특화된 보안기능, 디지털 전환을 위한 통합관리 기능이 핵심인 기술이다.\n\n최근 몇 년 사이에 디지털 전환이 빠르게 진행됨에 따라 기업의 비즈니스 환경이 클라우드로 전환되면서 정보의 보안과 관리가 그 어느 때보다 중요한 화두로 떠올랐다. 과거 외부의 위협만 경계해왔던 것에서 더 나아가 내부 보안에도 엄격한 적용이 필요하게 된 것이다.\n\n기존 경계선 보안으로는 더 이상 효과적으로 변화된 환경에 대응할 수 없어 강력한 사용자 인증 및 관리, 정확한 식별 및 관리, 유연한 네트워크 환경 구성, 세밀한 접근 통제 등 제로 트러스트 기반의 보안 모델이 절대적으로 요구되고 있다.\n\n특히 모바일과 클라우드 환경으로 보편화되면서 네트워크 환경은 사용자 중심의 네트워크 단말의 이동성 보장 등 동적으로 변화하고 있다. 단말의 위치도 물리적인 제약을 벗어나 어디든 존재하며 단말이 속한 네트워크 환경도 급변하고 있다.\n\n동적 목적지 접근 제어 기술은 클라우드 접근 통제를 위한 필수적인 기술이다. IP 기반이 아닌 ‘클라우드 내 ERP 서버’ 등의 형태로 목적지를 지정할 수 있어 클라우드 자원으로의 접근 통제가 용이하다. 전통적인 정적 접근제어 방식은 IP를 기반으로 목적지를 지정할 수 있었지만 클라우드 자원은 IP가 수시로 변동되기 때문에 지정할 수 없다.\n\nBMRC의 ‘글로벌 제로 트러스트 보안 시장 점유율, 규모, 산업보고서’에 따르면 제로 트러스트 보안 시장의 가치는 2020년에 156억 1000만 달러(20조 8237억 4000만원)에서 2027년에는 943억 5000만 달러(125조 9195억 1000만원)로 성장할 것으로 내다보고 있다.\n\nIP Mobility는 기존 IP 보안 중심의 보안 체계에서 데이터 기반의 보안 체계로의 전환을 의미한다. 이 기술은 사용자와 컴퓨터가 다른 지리 원</h3>\n<h3>- NAC·EDR 동반성장, 2022년 최대 실적 경신 기대감</h3>\n<p><img alt=\"이미지-391\" src=\"https://www.genians.co.kr/hs-fs/hubfs/%EC%9D%B4%EB%AF%B8%EC%A7%80-391.png?width=789&amp;name=%EC%9D%B4%EB%AF%B8%EC%A7%80-391.png\" /></p>\n<p><strong>지니언스, 2022년 2분기 실적 현황</strong></p>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)는 연결기준 2분기 영업이익이 19억원으로 전년동기 대비 58.9% 성장했다고 3일 공시를 통해 밝혔다. 지니언스의 2분기 매출액은 전년동기대비 48.9% 성장한 97억원을 기록했다.</p>\n<p>지니언스는 올해 상반기 코로나 이후 주춤했던 민간 수요가 증가함에 따라 전년동기 매출이 대폭 상승했다. 국내 NAC 시장의 산업 표준 솔루션으로 자리잡은 NAC 사업은 기존 고객의 확산사업과 신규 고객의 증가가 매출 성장을 견인했다.</p>\n<p>구독형 비즈니스 모델 및 SMB 타깃의 클라우드 NAC 사업은 꾸준히 고객을 넓혀가고 있으며 대기업 및 글로벌지사까지 비즈니스 영역이 확대됐다. 서비스 다각화를 위해 보안 관제 기업에 상품을 등록하는 등 안정적인 서비스 제공과 고객의 접근 편의성을 대폭 확대했다.</p>\n<p>차세대 성장동력 분야인 EDR은 은행・증권 등 금융권의 대표 레퍼런스를 확보했다. 상반기 공공 조달 시장에서는 73% 점유율로 1위를 기록했다. 공공 분야 EDR은 중앙정부에서 지자체로 확산되는 추세이다. 또한, 가상화폐거래소, 건설 등 EDR 사업 영역을 확대하면서 2022년 전망을 밝게 했다.</p>\n<p>한편, 지니언스는 상반기에 고객 IT 및 보안 환경을 제로 트러스트 체계로 확립시켜주는 차세대 보안 모델 ‘지니안 제로 트러스트 네트워크 액세스(ZTNA)’를 출시했다. 고객의 문의가 잇따라 잠재고객을 대상으로 다수의 POC가 진행 중인 것으로 알려졌다.</p>\n<p>교보증권 김한경 애널리스트는 “지니언스는 NAC와 EDR의 동반성장으로 매출 성장과 함께 뚜렷한 영업 레버리지 효과가 나타나고 있다”며 “선제적 투자 후 본격적인 수확 시기에 진입하며 올해에도 최대 실적 경신을 이어 갈 것”이라고 밝혔다.</p>\n<h3>관련기사</h3>\n<p>|  |  |\n|</p>", "body_text": "### - 매출 : 전년 동기 대비 48.9% 성장한 97억1천3백만원\n\n### - 영업이익 : 전년 동기 대비 58.9% 성장한 18억9천3백만원\n\n### - NAC·EDR 동반성장, 2022년 최대 실적 경신 기대감\n\n![이미지-391](https://www.genians.co.kr/hs-fs/hubfs/%EC%9D%B4%EB%AF%B8%EC%A7%80...", "full_text": "### - 매출 : 전년 동기 대비 48.9% 성장한 97억1천3백만원\n\n### - 영업이익 : 전년 동기 대비 58.9% 성장한 18억9천3백만원\n\n### - NAC·EDR 동반성장, 2022년 최대 실적 경신 기대감\n\n![이미지-391](https://www.genians.co.kr/hs-fs/hubfs/%EC%9D%B4%EB%AF%B8%EC%A7%80-391.png?width=789&name=%EC%9D%B4%EB%AF%B8%EC%A7%80-391.png)\n\n**지니언스, 2022년 2분기 실적 현황**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표 이동범)는 연결기준 2분기 영업이익이 19억원으로 전년동기 대비 58.9% 성장했다고 3일 공시를 통해 밝혔다. 지니언스의 2분기 매출액은 전년동기대비 48.9% 성장한 97억원을 기록했다.\n\n지니언스는 올해 상반기 코로나 이후 주춤했던 민간 수요가 증가함에 따라 전년동기 매출이 대폭 상승했다. 국내 NAC 시장의 산업 표준 솔루션으로 자리잡은 NAC 사업은 기존 고객의 확산사업과 신규 고객의 증가가 매출 성장을 견인했다.\n\n구독형 비즈니스 모델 및 SMB 타깃의 클라우드 NAC 사업은 꾸준히 고객을 넓혀가고 있으며 대기업 및 글로벌지사까지 비즈니스 영역이 확대됐다. 서비스 다각화를 위해 보안 관제 기업에 상품을 등록하는 등 안정적인 서비스 제공과 고객의 접근 편의성을 대폭 확대했다.\n\n차세대 성장동력 분야인 EDR은 은행・증권 등 금융권의 대표 레퍼런스를 확보했다. 상반기 공공 조달 시장에서는 73% 점유율로 1위를 기록했다. 공공 분야 EDR은 중앙정부에서 지자체로 확산되는 추세이다. 또한, 가상화폐거래소, 건설 등 EDR 사업 영역을 확대하면서 2022년 전망을 밝게 했다.\n\n한편, 지니언스는 상반기에 고객 IT 및 보안 환경을 제로 트러스트 체계로 확립시켜주는 차세대 보안 모델 ‘지니안 제로 트러스트 네트워크 액세스(ZTNA)’를 출시했다. 고객의 문의가 잇따라 잠재고객을 대상으로 다수의 POC가 진행 중인 것으로 알려졌다.\n\n교보증권 김한경 애널리스트는 “지니언스는 NAC와 EDR의 동반성장으로 매출 성장과 함께 뚜렷한 영업 레버리지 효과가 나타나고 있다”며 “선제적 투자 후 본격적인 수확 시기에 진입하며 올해에도 최대 실적 경신을 이어 갈 것”이라고 밝혔다.\n\n### 관련기사\n\n|  |  |\n|"}, {"title": "지니언스, KB국민은행 EDR 구축 사업자 선정", "date": "2022.07.24", "link": "https://www.genians.co.kr/pr-room/press/20220724", "category": "EDR", "body_html": "<p><img alt=\"KB국민은행-수주-1-300x188\" src=\"https://www.genians.co.kr/hs-fs/hubfs/KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%EC%88%98%EC%A3%BC-1-300x188.png?width=300&amp;height=188&amp;name=KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%EC%88%98%EC%A3%BC-1-300x188.png\" /></p>\n<p>전자신문에 지니언스의 KB국민은행 EDR 구축 사업자 선정 소식이 보도 되었습니다.</p>\n<p>KB국민은행은 EDR 솔루션 구축 사업자로 지니언스를 선정하고 계약했습니다.<br />\n지니언스는 NH농협은행에 이어 대형 금융기관을 EDR 고객으로 확보 했습니다.</p>\n<p>보안 기준이 높은 금융권에 EDR가 안착하면 향후 전 산업 분야로의 도입 확산 가능성이 높습니다.<br />\n올해 시장이 전년 대비 갑절 이상 성장할 것으로 추산되는 가운데 대기업 등이 가세하면 성장세가 가속화될 전망입니다.</p>\n<p>기사 전문은 아래 링크를 확인해주세요.</p>\n<p><a href=\"https://www.etnews.com/20220722000106\">[전자신문] 지니언스, KB국민은행 EDR 구축 사업자 선정</a></p>", "body_text": "![KB국민은행-수주-1-300x188](https://www.genians.co.kr/hs-fs/hubfs/KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%EC%88%98%EC%A3%BC-1-300x188.png?width=300&height=188&name=KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%E...", "full_text": "![KB국민은행-수주-1-300x188](https://www.genians.co.kr/hs-fs/hubfs/KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%EC%88%98%EC%A3%BC-1-300x188.png?width=300&height=188&name=KB%EA%B5%AD%EB%AF%BC%EC%9D%80%ED%96%89-%EC%88%98%EC%A3%BC-1-300x188.png)\n\n전자신문에 지니언스의 KB국민은행 EDR 구축 사업자 선정 소식이 보도 되었습니다.\n\nKB국민은행은 EDR 솔루션 구축 사업자로 지니언스를 선정하고 계약했습니다.  \n지니언스는 NH농협은행에 이어 대형 금융기관을 EDR 고객으로 확보 했습니다.\n\n보안 기준이 높은 금융권에 EDR가 안착하면 향후 전 산업 분야로의 도입 확산 가능성이 높습니다.  \n올해 시장이 전년 대비 갑절 이상 성장할 것으로 추산되는 가운데 대기업 등이 가세하면 성장세가 가속화될 전망입니다.\n\n기사 전문은 아래 링크를 확인해주세요.\n\n[[전자신문] 지니언스, KB국민은행 EDR 구축 사업자 선정](https://www.etnews.com/20220722000106)"}, {"title": "관련기사", "date": "2022.06.07", "link": "https://www.genians.co.kr/pr-room/press/220607", "category": "기타 뉴스", "body_html": "<ul>\n<li><strong>국내 보안 기업 중 유일하게 단독 부스 운영, 8년 연속 참가</strong></li>\n<li><strong>제로 트러스트 네트워크 엑세스 보안 솔루션, ‘지니안 ZTNA’ 출품</strong></li>\n<li><strong>디지털 대전환 시대, 급변하는 IT 및 보안 환경에 최적화된 보안 솔루션 제공</strong></li>\n</ul>\n<p>글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 세계 최대 사이버 보안 컨퍼런스 ‘RSAC 2022’에 참가한다.</p>\n<p>이번 전시회는 2022년 6월 6일부터 9일까지 샌프란시스코에서 개최된다. ‘Transform(탈바꿈시키다)’을 주제로 전 세계 사이버 보안 시장을 리딩하는 기업과 전문가 들이 참가해 차세대 사이버 보안의 기술과 미래를 조망한다.</p>\n<p>지니언스는 국내 보안 업계 중 유일하게 단독 부스로 참여하며 차세대 보안 패러다임인 제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보인다.</p>\n<p>미국 법인 주관으로 글로벌 시장에서 확보한 고객들의 성공사례를 소개해 제로 트러스트 기반으로 변화를 준비하는 기업들에게 ‘지니안 ZTNA’의 방향성과 역할을 제시한다는 계획이다. 고객 체험관을 운영하며 라이브 데모를 통해 제품의 접근성을 강화, 잠재적인 고객을 확보할 예정이다.</p>\n<p>‘지니안 ZTNA’는 IT와 보안 환경을 위한 아키텍처로 정보 통제기능을 강화한 제로 트러스트 솔루션이다. 모든 것을 지속적으로 검증하고 대응한다는 원칙을 기본으로 한다. 다양한 네트워크 환경과 연결지점을 보호하며 지속적인 검증 과정을 거쳐 비즈니스의 연속성을 확보해 준다.</p>\n<p>미국 IT분야 리서치 기업 가트너에 따르면 전 세계 ZTNA 시장은 2020년 3억 6천2백만 달러(4,546억 원) 시장에서 연평균 35.8% 성장해 2025년에는 16억 7천4백만 달러(2조 1,023억 원)의 시장 규모를 형성할 것으로 전망했다. 주요 보안 기술과 통합해 접속자의 신원확인, 내부 인증부터 클라우드 기반까지 관리하면서 시장이 크게 성장할 것으로 예측했다. 전 세계 기업들이 네트워크 접근제어(NAC)가 제공하는 포괄적인 가시성과 인증을 기반으로 제로 트러스트 전략을 통해 사용자 및 단말의 보안을 강화하는 것에 관심이 많다고 설명했다.</p>\n<p>지니언스 김계연 CTO미국법인장은 “미국은 사이버 안보 행정명령으로 제로 트러스트를 포함하는 사이버 안보 강화 전략을 실행하고 있다”라며 “제로 트러스트 보안의 완성은 ‘지니안 ZTNA’로 가능하며 관련 시장도 대폭 성장하고 있어 향후 시장 전망이 매우 밝다’라고 말했다.</p>\n<p><img alt=\"rsac2022\" src=\"https://www.genians.co.kr/hs-fs/hubfs/rsac2022.png?width=459&amp;name=rsac2022.png\" /><br />\n<strong>&lt;그림 1&gt; 지니언스는 세계 최대 사이버 보안 전시회 ‘RSAC 2022’에 참가해제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보였다.</strong></p>\n<p>|  |  |\n|</p>", "body_text": "* **국내 보안 기업 중 유일하게 단독 부스 운영, 8년 연속 참가**\n* **제로 트러스트 네트워크 엑세스 보안 솔루션, ‘지니안 ZTNA’ 출품**\n* **디지털 대전환 시대, 급변하는 IT 및 보안 환경에 최적화된 보안 솔루션 제공**\n\n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 세계 최대 사이버 보안 컨퍼런스 ‘RSA...", "full_text": "* **국내 보안 기업 중 유일하게 단독 부스 운영, 8년 연속 참가**\n* **제로 트러스트 네트워크 엑세스 보안 솔루션, ‘지니안 ZTNA’ 출품**\n* **디지털 대전환 시대, 급변하는 IT 및 보안 환경에 최적화된 보안 솔루션 제공**\n\n글로벌 통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 세계 최대 사이버 보안 컨퍼런스 ‘RSAC 2022’에 참가한다.\n\n이번 전시회는 2022년 6월 6일부터 9일까지 샌프란시스코에서 개최된다. ‘Transform(탈바꿈시키다)’을 주제로 전 세계 사이버 보안 시장을 리딩하는 기업과 전문가 들이 참가해 차세대 사이버 보안의 기술과 미래를 조망한다.\n\n지니언스는 국내 보안 업계 중 유일하게 단독 부스로 참여하며 차세대 보안 패러다임인 제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보인다.\n\n미국 법인 주관으로 글로벌 시장에서 확보한 고객들의 성공사례를 소개해 제로 트러스트 기반으로 변화를 준비하는 기업들에게 ‘지니안 ZTNA’의 방향성과 역할을 제시한다는 계획이다. 고객 체험관을 운영하며 라이브 데모를 통해 제품의 접근성을 강화, 잠재적인 고객을 확보할 예정이다.\n\n‘지니안 ZTNA’는 IT와 보안 환경을 위한 아키텍처로 정보 통제기능을 강화한 제로 트러스트 솔루션이다. 모든 것을 지속적으로 검증하고 대응한다는 원칙을 기본으로 한다. 다양한 네트워크 환경과 연결지점을 보호하며 지속적인 검증 과정을 거쳐 비즈니스의 연속성을 확보해 준다.\n\n미국 IT분야 리서치 기업 가트너에 따르면 전 세계 ZTNA 시장은 2020년 3억 6천2백만 달러(4,546억 원) 시장에서 연평균 35.8% 성장해 2025년에는 16억 7천4백만 달러(2조 1,023억 원)의 시장 규모를 형성할 것으로 전망했다. 주요 보안 기술과 통합해 접속자의 신원확인, 내부 인증부터 클라우드 기반까지 관리하면서 시장이 크게 성장할 것으로 예측했다. 전 세계 기업들이 네트워크 접근제어(NAC)가 제공하는 포괄적인 가시성과 인증을 기반으로 제로 트러스트 전략을 통해 사용자 및 단말의 보안을 강화하는 것에 관심이 많다고 설명했다.\n\n지니언스 김계연 CTO미국법인장은 “미국은 사이버 안보 행정명령으로 제로 트러스트를 포함하는 사이버 안보 강화 전략을 실행하고 있다”라며 “제로 트러스트 보안의 완성은 ‘지니안 ZTNA’로 가능하며 관련 시장도 대폭 성장하고 있어 향후 시장 전망이 매우 밝다’라고 말했다.\n\n![rsac2022](https://www.genians.co.kr/hs-fs/hubfs/rsac2022.png?width=459&name=rsac2022.png)  \n**<그림 1> 지니언스는 세계 최대 사이버 보안 전시회 ‘RSAC 2022’에 참가해제로 트러스트 보안 솔루션인 ‘지니안 ZTNA’를 선보였다.**\n\n\n|  |  |\n|"}, {"title": "[8.15 머니톡] 자율주행, 암호화폐 해킹 범죄 급증! \"이런 사이버 보안 기업\"에 투자하세요!", "date": "2022.05.30", "link": "https://www.genians.co.kr/pr-room/press/220529", "category": "기타 뉴스", "body_html": "<p>이동범 지니언스 대표가 815머니톡에 출연하여 사이버 보안에 대한 시장, 정책, 전망에 대해 인터뷰 했습니다.<br />\n시장 및 투자자 관점으로 사이버 보안 시장에 대해 설명했습니다.</p>\n<p>주요 내용은 다음과 같습니다.</p>\n<ul>\n<li>한국의 사이버 보안 기술이 글로벌 TOP 3안에 들어갈 수준</li>\n<li>미국의 경우 사이버 보안은 기존 백신 솔루션 보다 새로운 기술의 기업평가가 좋다</li>\n<li>윤석열 정부의 대통력 직속 국가사이버안보위원회 설치 내용</li>\n</ul>", "body_text": "이동범 지니언스 대표가 815머니톡에 출연하여 사이버 보안에 대한 시장, 정책, 전망에 대해 인터뷰 했습니다.  \n시장 및 투자자 관점으로 사이버 보안 시장에 대해 설명했습니다.\n\n주요 내용은 다음과 같습니다.\n\n  \n\n* 한국의 사이버 보안 기술이 글로벌 TOP 3안에 들어갈 수준\n* 미국의 경우 사이버 보안은 기존 백신 솔루션 보다 새로운 기술의 기업평...", "full_text": "이동범 지니언스 대표가 815머니톡에 출연하여 사이버 보안에 대한 시장, 정책, 전망에 대해 인터뷰 했습니다.  \n시장 및 투자자 관점으로 사이버 보안 시장에 대해 설명했습니다.\n\n주요 내용은 다음과 같습니다.\n\n  \n\n* 한국의 사이버 보안 기술이 글로벌 TOP 3안에 들어갈 수준\n* 미국의 경우 사이버 보안은 기존 백신 솔루션 보다 새로운 기술의 기업평가가 좋다\n* 윤석열 정부의 대통력 직속 국가사이버안보위원회 설치 내용"}, {"title": "관련기사", "date": "2022.05.20", "link": "https://www.genians.co.kr/pr-room/press/220520", "category": "기타 뉴스", "body_html": "<ul>\n<li><strong>순수 민간 기업 고객 성과, SMB 타깃에서 대형 기업으로 고객 확대</strong></li>\n<li><strong>인증, 조달 등록 등 공공 시장 진출 완비</strong></li>\n<li><strong>구독형 비즈니스 정착으로 안정적인 매출 확보 기대</strong></li>\n</ul>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 순수 민간기업으로만 클라우드 NAC 누적 고객 100곳을 돌파했다고 밝혔다. 공공 시장 진출을 위한 보안 인증과 조달 등록도 완료하여 하반기 시장에서 괄목할 만한 성장을 기록할 것으로 전망된다.</p>\n<p>지니언스의 클라우드 NAC는 SMB를 타깃으로 시장에 출시했다. 하지만 최근에는 대기업까지 수요가 확장되고 있다. 국내 본사에서는 구축형으로 도입했지만 해외 지사에는 서비스와 관리의 용이성으로 클라우드 NAC를 도입한 대기업과 본사 및 해외 지사 모두를 클라우드 NAC로 구축한 다양한 고객 레퍼런스를 확보했다.</p>\n<p>또한, 핀테크・블록체인・유니콘 기업 등 의무적으로 ISMS-P 인증을 받아야 하는 기업의 수요가 증가했다. ISMS-P는 기업의 주요 정보자산관리 및 개인 정보의 유출 및 피해를 예방하기 위해 기업・기관에서 수립, 관리, 운영 중인 정보보호 및 개인정보보호 관리 체계가 적합한지 인증하는 정부 제도 이다.</p>\n<p>지니언스의 클라우드 NAC는 외부자 보안, 정보자산분류, 물리적 보안, 접근 통제, 운영보안 부분 등 ISMS-P의 세부 인증 항목에 대한 대응이 가능하다. ISMS-P 인증 기업은 정보보호 체계에 대한 선도적인 이미지와 지속가능경영 나아가 ESG까지 범위를 확장할 수 있다.</p>\n<p>지니언스는 민간 기업 시장의 성공적인 안착을 발판으로 공공 시장 확대에 총력을 기울이고 있다. 국내 보안 업계 최초로 클라우드 서비스 보안인증(CASP : Cloud Security Assurance Program) 획득했다. CASP는 공공기관이 안전하게 민간 클라우드를 이용할 수 있도록 객관적이고 공정하게 제품 및 서비스 보안 수준을 평가하여 인증을 부여하는 제도이다.</p>\n<p>지니언스의 클라우드 NAC 솔루션 ‘지니안 클라우드 NAC’는 과학기술정보통신부의 디지털서비스이용지원시스템과 조달청 디지털서비스몰에도 등록이 완료되어 하반기 공공 시장에서도 가시적인 성과를 나타낼 것으로 기대하고 있다.</p>\n<p>한형권 지니언스 클라우드사업부 이사는 “지니언스의 클라우드 NAC는 미국 등 글로벌 시장에서 먼저 런칭 하고 검증한 후 한국 시장에 출시된 서비스이다”며 ”사용한 만큼만 지불하는 서브스크립션 모델로 초기 투자 비용이 적어 보안에 관심이 많지만 도입 비용 및 관리 이슈로 사용하지 못한 기업이나 기관에 적합하다”고 밝혔다.</p>\n<p><img alt=\"59709_57240_3234\" src=\"https://www.genians.co.kr/hs-fs/hubfs/59709_57240_3234.jpg?width=470&amp;name=59709_57240_3234.jpg\" /></p>\n<p><strong>그림1. 지니언스 클라우드 NAC 개념도</strong></p>\n<p>|  |\n|</p>", "body_text": "* **순수 민간 기업 고객 성과, SMB 타깃에서 대형 기업으로 고객 확대**\n* **인증, 조달 등록 등 공공 시장 진출 완비**\n* **구독형 비즈니스 정착으로 안정적인 매출 확보 기대**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 순수 민간기업으로만 클라우드 NAC 누적 고객 100곳을 돌파했다고 밝혔다. 공공 시장 진출을 ...", "full_text": "* **순수 민간 기업 고객 성과, SMB 타깃에서 대형 기업으로 고객 확대**\n* **인증, 조달 등록 등 공공 시장 진출 완비**\n* **구독형 비즈니스 정착으로 안정적인 매출 확보 기대**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 순수 민간기업으로만 클라우드 NAC 누적 고객 100곳을 돌파했다고 밝혔다. 공공 시장 진출을 위한 보안 인증과 조달 등록도 완료하여 하반기 시장에서 괄목할 만한 성장을 기록할 것으로 전망된다.\n\n지니언스의 클라우드 NAC는 SMB를 타깃으로 시장에 출시했다. 하지만 최근에는 대기업까지 수요가 확장되고 있다. 국내 본사에서는 구축형으로 도입했지만 해외 지사에는 서비스와 관리의 용이성으로 클라우드 NAC를 도입한 대기업과 본사 및 해외 지사 모두를 클라우드 NAC로 구축한 다양한 고객 레퍼런스를 확보했다.\n\n또한, 핀테크・블록체인・유니콘 기업 등 의무적으로 ISMS-P 인증을 받아야 하는 기업의 수요가 증가했다. ISMS-P는 기업의 주요 정보자산관리 및 개인 정보의 유출 및 피해를 예방하기 위해 기업・기관에서 수립, 관리, 운영 중인 정보보호 및 개인정보보호 관리 체계가 적합한지 인증하는 정부 제도 이다.\n\n지니언스의 클라우드 NAC는 외부자 보안, 정보자산분류, 물리적 보안, 접근 통제, 운영보안 부분 등 ISMS-P의 세부 인증 항목에 대한 대응이 가능하다. ISMS-P 인증 기업은 정보보호 체계에 대한 선도적인 이미지와 지속가능경영 나아가 ESG까지 범위를 확장할 수 있다.\n\n지니언스는 민간 기업 시장의 성공적인 안착을 발판으로 공공 시장 확대에 총력을 기울이고 있다. 국내 보안 업계 최초로 클라우드 서비스 보안인증(CASP : Cloud Security Assurance Program) 획득했다. CASP는 공공기관이 안전하게 민간 클라우드를 이용할 수 있도록 객관적이고 공정하게 제품 및 서비스 보안 수준을 평가하여 인증을 부여하는 제도이다.\n\n지니언스의 클라우드 NAC 솔루션 ‘지니안 클라우드 NAC’는 과학기술정보통신부의 디지털서비스이용지원시스템과 조달청 디지털서비스몰에도 등록이 완료되어 하반기 공공 시장에서도 가시적인 성과를 나타낼 것으로 기대하고 있다.\n\n한형권 지니언스 클라우드사업부 이사는 “지니언스의 클라우드 NAC는 미국 등 글로벌 시장에서 먼저 런칭 하고 검증한 후 한국 시장에 출시된 서비스이다”며 ”사용한 만큼만 지불하는 서브스크립션 모델로 초기 투자 비용이 적어 보안에 관심이 많지만 도입 비용 및 관리 이슈로 사용하지 못한 기업이나 기관에 적합하다”고 밝혔다.\n\n![59709_57240_3234](https://www.genians.co.kr/hs-fs/hubfs/59709_57240_3234.jpg?width=470&name=59709_57240_3234.jpg)\n\n**그림1. 지니언스 클라우드 NAC 개념도**\n\n\n|  |\n|"}, {"title": "관련기사", "date": "2022.04.12", "link": "https://www.genians.co.kr/pr-room/press/220412", "category": "기타 뉴스", "body_html": "<ul>\n<li>\n<h3>EDR 신규 고객 확보 더 빨라질 듯</h3>\n</li>\n<li>\n<h3>랜섬웨어 대응 능력, 탐지 능력 강화 등 연구개발 역량 총 집결</h3>\n</li>\n<li>\n<h3>시장 확대와 붐 조성을 위한 다각적인 전략 마련</h3>\n</li>\n</ul>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 공공 EDR 시장의 바로미터인 조달 시장에서 2021년 기준 79%의 시장점유율로 1위를 기록했다고 밝혔다. 기획재정부를 포함한 중앙부처의 레퍼런스를 다수 확보하고 국가 핵심 공공 기관에 EDR을 공급한 결과로 올 한해 시장 전망도 밝게 하고 있다.</p>\n<p>지니언스는 국내 최초로 EDR를 개발한 이래 2021년 기준 누적 고객 100곳을 돌파하여 국내 최다 고객을 보유하고 있다. 2022년 1분기에는 지방자치단체의 EDR 도입이 본격화 되고 관련 사업을 수주함으로써 올해 공공 시장에서도 한발 앞서나가고 있다는 평을 듣고 있다.</p>\n<p>양적 성장과 함께 질적인 성장도 두각을 나타내고 있다. 글로벌 기업 솔루션을 윈백하는 사례가 증가했으며 EDR 빅사이트의 안정적인 구축과 확산으로 고객 신뢰도가 향상됐다. 또한, 코로나로 확산된 비대면 원격 및 재택 근무에 따른 보안 강화의 대안으로 EDR을 도입하는 기업(관)이 증가 하고 있다.</p>\n<p>지니언스의 EDR 사업은 안정적인 매출 구조를 확립하기 구독형 비즈니스 모델을 채택 하고 있다. 사용한 만큼 지불하는 서비스 모델로 라이선스와 유지보수를 통합한 선진화된 구조다. 국내 소프트웨어 비즈니스의 구조 상 B2B에서 구독형 비즈니스가 정착이 쉽지 않지만 전체 매출의 60% 이상을 구독형으로 공급하여 중장기 적으로 안정적인 매출을 거둬들일 것으로 기대된다.</p>\n<p>지니언스 EDR 사업의 또다른 강점은 고객 이탈률이 거의 없다는 점이다. EDR 구독 서비스를 진행 후 고객 이탈율 1% 미만 이다. 사이버 보안 1위 국가인 미국은 EDR 시장 가치를 평가함에 있어 매출이나 이익 보다는 고객 수의 증가, 고객 이탈율 등을 주요 평가 기준으로 삼고 있다.</p>\n<p>김준형 지니언스 엔드포인트 보안사업본부 상무는 “올해 1분기에도 지자체와 공공기관, 기업, 병원 등에 지니안 EDR 레퍼런스가 지속적으로 증가하고 있다”며 “시장 확대와 붐 조성을 위한 다각적인 전략을 구사하고 있고 고객 만족도가 높은 만큼 시장 성장에는 자신이 있다”고 밝혔다.</p>\n<p><img alt=\"NISI20220412_0000972484_web\" src=\"https://www.genians.co.kr/hs-fs/hubfs/NISI20220412_0000972484_web.jpg?width=720&amp;name=NISI20220412_0000972484_web.jpg\" />&lt;그림&gt; 지니언스의 EDR 솔루션 ‘지니안 EDR’</p>\n<p>|  |\n|</p>", "body_text": "* ### EDR 신규 고객 확보 더 빨라질 듯\n* ### 랜섬웨어 대응 능력, 탐지 능력 강화 등 연구개발 역량 총 집결\n* ### 시장 확대와 붐 조성을 위한 다각적인 전략 마련\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 공공 EDR 시장의 바로미터인 조달 시장에서 2021년 기준 79%의 시장점유율로 1위를 기록했다고 밝혔다....", "full_text": "* ### EDR 신규 고객 확보 더 빨라질 듯\n* ### 랜섬웨어 대응 능력, 탐지 능력 강화 등 연구개발 역량 총 집결\n* ### 시장 확대와 붐 조성을 위한 다각적인 전략 마련\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 공공 EDR 시장의 바로미터인 조달 시장에서 2021년 기준 79%의 시장점유율로 1위를 기록했다고 밝혔다. 기획재정부를 포함한 중앙부처의 레퍼런스를 다수 확보하고 국가 핵심 공공 기관에 EDR을 공급한 결과로 올 한해 시장 전망도 밝게 하고 있다.\n\n지니언스는 국내 최초로 EDR를 개발한 이래 2021년 기준 누적 고객 100곳을 돌파하여 국내 최다 고객을 보유하고 있다. 2022년 1분기에는 지방자치단체의 EDR 도입이 본격화 되고 관련 사업을 수주함으로써 올해 공공 시장에서도 한발 앞서나가고 있다는 평을 듣고 있다.\n\n양적 성장과 함께 질적인 성장도 두각을 나타내고 있다. 글로벌 기업 솔루션을 윈백하는 사례가 증가했으며 EDR 빅사이트의 안정적인 구축과 확산으로 고객 신뢰도가 향상됐다. 또한, 코로나로 확산된 비대면 원격 및 재택 근무에 따른 보안 강화의 대안으로 EDR을 도입하는 기업(관)이 증가 하고 있다.\n\n지니언스의 EDR 사업은 안정적인 매출 구조를 확립하기 구독형 비즈니스 모델을 채택 하고 있다. 사용한 만큼 지불하는 서비스 모델로 라이선스와 유지보수를 통합한 선진화된 구조다. 국내 소프트웨어 비즈니스의 구조 상 B2B에서 구독형 비즈니스가 정착이 쉽지 않지만 전체 매출의 60% 이상을 구독형으로 공급하여 중장기 적으로 안정적인 매출을 거둬들일 것으로 기대된다.\n\n지니언스 EDR 사업의 또다른 강점은 고객 이탈률이 거의 없다는 점이다. EDR 구독 서비스를 진행 후 고객 이탈율 1% 미만 이다. 사이버 보안 1위 국가인 미국은 EDR 시장 가치를 평가함에 있어 매출이나 이익 보다는 고객 수의 증가, 고객 이탈율 등을 주요 평가 기준으로 삼고 있다.\n\n김준형 지니언스 엔드포인트 보안사업본부 상무는 “올해 1분기에도 지자체와 공공기관, 기업, 병원 등에 지니안 EDR 레퍼런스가 지속적으로 증가하고 있다”며 “시장 확대와 붐 조성을 위한 다각적인 전략을 구사하고 있고 고객 만족도가 높은 만큼 시장 성장에는 자신이 있다”고 밝혔다.\n\n![NISI20220412_0000972484_web](https://www.genians.co.kr/hs-fs/hubfs/NISI20220412_0000972484_web.jpg?width=720&name=NISI20220412_0000972484_web.jpg)<그림> 지니언스의 EDR 솔루션 ‘지니안 EDR’\n\n\n|  |\n|"}, {"title": "기사전문", "date": "2022.03.30", "link": "https://www.genians.co.kr/pr-room/press/news220330", "category": "기타 뉴스", "body_html": "<ul>\n<li>재된 보안 취약점에 선제적 대응, 고객에게 보다 안전한 서비스 제공</li>\n<li>취약점 대응 프로세스 고도화, 버그 바운티 범위 지속 확장 예정</li>\n</ul>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 고객에게 더 안전한 제품 및 서비스 제공을 목표로 자체 버그 바운티(Bug Bounty) 프로그램을 시행 한다고 밝혔다. 버그 바운티 프로그램은 소프트웨어 또는 웹 서비스의 취약점을 찾아낸 사람에게 포상금을 지급하는 제도이다.</p>\n<p>버그 바운티는 제품 및 서비스의 보안 취약점을 신속하게 찾아 점검 및 조치 하며 보안 전문가들의 노력에 적절한 보상을 하는 프로그램으로 보안 취약점을 악용한 침해 사고를 사전에 예방함은 물론 화이트 해커 등 차세대 보안 전문가 육성의 토대도 될 수 있다.</p>\n<p>사이버 위협의 주요 요인인 보안 취약점은 무엇보다 신속하게 발견해 조치하는 것이 중요하다. 구글·MS·페이스북 등 주요 글로벌 기업은 자사 제품 및 서비스의 취약점 발굴 및 보안강화를 위해 버그 바운티 프로그램을 적극적으로 운영하고 있다.</p>\n<p>반면, 국내 기업들은 취약점 제보하면 기업에 대한 간섭으로 인식하거나 공격 행위로 간주, 이미지 실추 등의 이유로 제도 도입에 소극적이다. 정부에서도 이러한 현실을 감안해 공공적인 목적으로 국가사이버안보센터(NCSC)와 한국인터넷진흥원(KISA)을 중심으로 버그 바운티 프로그램을 운영 중이다. KISA의 보안 취약점 신고 포상제 공동운영사는 현재 네이버, 지니언스 등을 포함해 21곳이다.</p>\n<p>지니언스는 그동안 KISA가 운영중인 소프트웨어 신규 취약점 신고 포상제도의 공동운영사로 참여해 왔다. 이번 자체 버그 바운티 프로그램은 보안 이슈에 보다 적극적이고 선제적으로 대응하는 선도적인 기업으로의 위상을 강화하고 고객의 사이버 위협을 미연에 방지하는 것을 목적으로 추진됐다.</p>\n<p>지니언스의 버그 바운티 프로그램은 네트워크 접근 제어 솔루션인 ‘지니안 NAC’와 ‘클라우드 NAC CSM 서비스’가 대상이다. 단, 지니언스 홈페이지 등 현재 운영 중인 서비스에 대한 취약점은 불법적인 해킹 우려 및 관련법에 따른 검증권한 부재로 평가 및 보상에서 제외된다.</p>\n<p>보안 취약점 신고서 등록 및 접수 확인은 수시로 이뤄지며 취약점 평가는 월단위, 포상금 지급은 분기단위(1월, 4월, 7월, 10월) 이뤄진다. 접수된 취약점은 보안 취약점 평가 국제 표준(CVSS 3.1)을 기반으로 평가하게 되며 건당 최대 포상금은 $2,500 이다.<br />\n이동범 지니언스 대표는 “버그 바운티 프로그램은 보안 취약점으로 인해 돌이킬 수 없는 상황이 발생하는 것을 사전에 방지하는 것이 가장 큰 목적이다”며 “제품 및 서비스의 안정성 확보는 물론, 적극적인 보안 이슈를 선제적으로 대처하여 차세대 보안 시장을 선도하는 기업 이미지 강화에도 큰 도움이 될 것”이라고 밝혔다.</p>\n<p>지니언스 버그 바운티 프로그램은 지니언스 홈페이지인 https://genians.co.kr/resources/bug-bounty/ 에서 자세한 내용을 확인할 수 있다.</p>\n<p>|  |\n|</p>", "body_text": "* 재된 보안 취약점에 선제적 대응, 고객에게 보다 안전한 서비스 제공\n* 취약점 대응 프로세스 고도화, 버그 바운티 범위 지속 확장 예정\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 고객에게 더 안전한 제품 및 서비스 제공을 목표로 자체 버그 바운티(Bug Bounty) 프로그램을 시행 한다고 밝혔다. 버그 바운티 프로그램은 소프트...", "full_text": "* 재된 보안 취약점에 선제적 대응, 고객에게 보다 안전한 서비스 제공\n* 취약점 대응 프로세스 고도화, 버그 바운티 범위 지속 확장 예정\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 고객에게 더 안전한 제품 및 서비스 제공을 목표로 자체 버그 바운티(Bug Bounty) 프로그램을 시행 한다고 밝혔다. 버그 바운티 프로그램은 소프트웨어 또는 웹 서비스의 취약점을 찾아낸 사람에게 포상금을 지급하는 제도이다.\n\n버그 바운티는 제품 및 서비스의 보안 취약점을 신속하게 찾아 점검 및 조치 하며 보안 전문가들의 노력에 적절한 보상을 하는 프로그램으로 보안 취약점을 악용한 침해 사고를 사전에 예방함은 물론 화이트 해커 등 차세대 보안 전문가 육성의 토대도 될 수 있다.\n\n사이버 위협의 주요 요인인 보안 취약점은 무엇보다 신속하게 발견해 조치하는 것이 중요하다. 구글·MS·페이스북 등 주요 글로벌 기업은 자사 제품 및 서비스의 취약점 발굴 및 보안강화를 위해 버그 바운티 프로그램을 적극적으로 운영하고 있다.\n\n반면, 국내 기업들은 취약점 제보하면 기업에 대한 간섭으로 인식하거나 공격 행위로 간주, 이미지 실추 등의 이유로 제도 도입에 소극적이다. 정부에서도 이러한 현실을 감안해 공공적인 목적으로 국가사이버안보센터(NCSC)와 한국인터넷진흥원(KISA)을 중심으로 버그 바운티 프로그램을 운영 중이다. KISA의 보안 취약점 신고 포상제 공동운영사는 현재 의 필요성과 초보안의 새로운 가치 창출에 대해\n\n한국경제신문에서는 지니언스 소개와 비전에 대해 말씀하셨습니다.\n\n기사 전문은 아래 링크를 참고 부탁드립니다.\n\n\n[[내일신문] 인터뷰│이동범 한국정보보호산업협회 회장 \"한국, 글로벌 사이버보안 3강 비전\"](http://www.naeil.com/news_view/?id_art=415102)  \n[[한경]보안솔루션 지니언스 \"NFT 자산 지켜줄 것\"](https://www.hankyung.com/economy/article/2022022212981)"}, {"title": "지니언스, 글로벌 NAC 시장점유율 TOP 5 진입", "date": "2022.02.15", "link": "https://www.genians.co.kr/pr-room/press/news220215", "category": "NAC", "body_html": "<h3>가트너 NAC 시장 보고서, 글로벌 유수의 기업과 어깨를 나란히 등재</h3>\n<h3>국내 및 아태지역 NAC 벤더 중 유일</h3>\n<h3>제로 트러스트 NAC 기반으로 SASE 등 차세대 정보보안 솔루션 개발 박차</h3>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 최근 발표한 전 세계 엔터프라이즈 네트워크 장비 분야 TOP 5 NAC 기업에 랭크 됐다고 밝혔다. 글로벌 기술력을 재 입증함은 물론 다양한 글로벌 고객 확보 등 비즈니스적으로도 성과를 내고 있어 올 한 해의 전망을 더 밝게 하고 있다.</p>\n<p>지니언스는 2005년 국내 최초로 NAC를 개발했다. 국내에 진출한 글로벌 기업과 치열한 경쟁 속에 우수한 제품기획력, 시장 선도 기술력, 탁월한 시장 창출 능력으로 우정사업본부, 국방 등 대규모 NAC 사업을 수주하면서 NAC 시장을 리딩했다. 이 같은 결과로 지난 17년간 국내 NAC 시장 부동의 시장점유율 1위, 업계 표준 솔루션으로 자리 잡았다.</p>\n<p>2016년에는 미국법인을 설립하며 글로벌 시장 진출에 나섰다. 2018년부터 3년 연속 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 선정되며 글로벌 기술력을 입증 받았다. 이번 조사는 전 세계 주요 NAC 기업의 매출액(21년 3Q)이 기준으로 지니언스는 기술력에 더해 비즈니스 성과까지 글로벌 유수의 기업과 어깨를 나란히 하게 됐다.</p>\n<p>지니언스는 지난해 사이버 보안 강국인 이스라엘에 NAC를 공급한 바 있으며 기존 고객들이 클라우드 기반 구독 서비스를 이용한 후의 이탈율이 1% 미만일 정도로 고객 충성도가 높다.</p>\n<p>가트너에 따르면 NAC는 내부 정보 보호 체계 수립, 기업 내부 인프라에 접근하는 사용자의 단말에 대한 가시성 확보를 통해 기업의 자산과 사용자를 지속적으로 보호해왔다. 네트워크 환경에 참여하는 IoT·OT 등의 다양한 단말의 증가에 다른 보안 요구 사항의 강화로 NAC의 역할 및 시장이 확장되고 있다고 설명했다. 또한, 가트너는 NAC의 확장 기술로 ZTNA(Zero Trust Network Access)를 언급하며 클라우드 및 재택 등 분산된 IT 환경에서 차세대 보안모델로 NAC가 역할을 할 수 있을 것으로 전망했다</p>\n<p>지니언스의 NAC 솔루션 ‘지니안 NAC’는 구축형, 매니지드 서비스, 클라우드 환경 등 고객의 다양한 IT환경에서도 안정적이고 효율적인 보안 운영이 가능한 서비스 포트폴리오를 갖고 있다. 고객은 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보할 수 있다.</p>\n<p>김계연 지니언스 CTO・미국법인장은 “자체 개발한 국내 독자 보안 기술이 글로벌 시장에서 인정 받고, 고객에게 한걸음 다가가는 계기가 되는 점에서 일차적인 의의가 있다”며 “그동안의 연구개발 투자가 글로벌 비즈니스의 성과로 이어질 수 있도록 시장 개척에 박차를 가하겠다”고 밝혔다.</p>\n<h3></h3>\n<p>[그림] 지니언스는 글로벌 NAC 시장점유율 TOP 5에 진입했다고 밝혔다.</p>\n<h3>관련기사</h3>\n<p>|  |\n|</p>", "body_text": "### 가트너 NAC 시장 보고서, 글로벌 유수의 기업과 어깨를 나란히 등재\n\n### 국내 및 아태지역 NAC 벤더 중 유일\n\n### 제로 트러스트 NAC 기반으로 SASE 등 차세대 정보보안 솔루션 개발 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 최근 발표한 전 세계 엔터프라이즈...", "full_text": "### 가트너 NAC 시장 보고서, 글로벌 유수의 기업과 어깨를 나란히 등재\n\n### 국내 및 아태지역 NAC 벤더 중 유일\n\n### 제로 트러스트 NAC 기반으로 SASE 등 차세대 정보보안 솔루션 개발 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 글로벌 IT 컨설팅 및 시장조사 기관 가트너가 최근 발표한 전 세계 엔터프라이즈 네트워크 장비 분야 TOP 5 NAC 기업에 랭크 됐다고 밝혔다. 글로벌 기술력을 재 입증함은 물론 다양한 글로벌 고객 확보 등 비즈니스적으로도 성과를 내고 있어 올 한 해의 전망을 더 밝게 하고 있다.\n\n지니언스는 2005년 국내 최초로 NAC를 개발했다. 국내에 진출한 글로벌 기업과 치열한 경쟁 속에 우수한 제품기획력, 시장 선도 기술력, 탁월한 시장 창출 능력으로 우정사업본부, 국방 등 대규모 NAC 사업을 수주하면서 NAC 시장을 리딩했다. 이 같은 결과로 지난 17년간 국내 NAC 시장 부동의 시장점유율 1위, 업계 표준 솔루션으로 자리 잡았다.\n\n2016년에는 미국법인을 설립하며 글로벌 시장 진출에 나섰다. 2018년부터 3년 연속 국내 및 아태지역에서 유일하게 ‘가트너 NAC 마켓가이드’ 대표 기업으로 선정되며 글로벌 기술력을 입증 받았다. 이번 조사는 전 세계 주요 NAC 기업의 매출액(21년 3Q)이 기준으로 지니언스는 기술력에 더해 비즈니스 성과까지 글로벌 유수의 기업과 어깨를 나란히 하게 됐다.\n\n지니언스는 지난해 사이버 보안 강국인 이스라엘에 NAC를 공급한 바 있으며 기존 고객들이 클라우드 기반 구독 서비스를 이용한 후의 이탈율이 1% 미만일 정도로 고객 충성도가 높다.\n\n가트너에 따르면 NAC는 내부 정보 보호 체계 수립, 기업 내부 인프라에 접근하는 사용자의 단말에 대한 가시성 확보를 통해 기업의 자산과 사용자를 지속적으로 보호해왔다. 네트워크 환경에 참여하는 IoT·OT 등의 다양한 단말의 증가에 다른 보안 요구 사항의 강화로 NAC의 역할 및 시장이 확장되고 있다고 설명했다. 또한, 가트너는 NAC의 확장 기술로 ZTNA(Zero Trust Network Access)를 언급하며 클라우드 및 재택 등 분산된 IT 환경에서 차세대 보안모델로 NAC가 역할을 할 수 있을 것으로 전망했다\n\n지니언스의 NAC 솔루션 ‘지니안 NAC’는 구축형, 매니지드 서비스, 클라우드 환경 등 고객의 다양한 IT환경에서도 안정적이고 효율적인 보안 운영이 가능한 서비스 포트폴리오를 갖고 있다. 고객은 자사의 환경에 맞게 지니언스 솔루션 및 서비스를 사용할 수 있으며 IT 환경의 전환과정에서도 보다 손쉽게 보안의 안정성과 확장성을 확보할 수 있다.\n\n김계연 지니언스 CTO・미국법인장은 “자체 개발한 국내 독자 보안 기술이 글로벌 시장에서 인정 받고, 고객에게 한걸음 다가가는 계기가 되는 점에서 일차적인 의의가 있다”며 “그동안의 연구개발 투자가 글로벌 비즈니스의 성과로 이어질 수 있도록 시장 개척에 박차를 가하겠다”고 밝혔다.\n\n### \n\n[그림] 지니언스는 글로벌 NAC 시장점유율 TOP 5에 진입했다고 밝혔다.\n\n### 관련기사\n\n|  |\n|"}, {"title": "[교보증권 리포트] 지니언스, 최대 실적 갱신 기대", "date": "2022.01.19", "link": "https://www.genians.co.kr/pr-room/ 지난해 영업이익률 대폭 증가 후 점진적 상향 기대\n\n⑤ XDR·OT·클라우드 B2C 보안 시장 신규 진출 계획, 단기·중기·장기 성장성 관점 사이버 보안 Top Pick 기업으로 제시\n\n⑥ 적정주가는 2022년 예상 EPS 587원에 Target PER 26배(동종 업계 평균 PER 26배) 적용해 15,300원으로 상향\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%9D%B4%EB%AF%B8%EC%A7%80-463.png?width=823&height=625&name=%EC%9D%B4%EB%AF%B8%EC%A7%80-463.png)\n\n보고서의 풀버전은 아래 링크를 참고 부탁드립니다.\n\n[[리서치알음] 지니언스 보고서 바로가기](https://www.genians.co.kr/resources/researcharum_report_20220117.html)\n\n### 관련기사\n\n[[파이낸셜뉴스] 리서치알음 “지니언스, EDR 구독형 서비스 수요↑ 사상 최대실적 기대”](https://www.fnnews.com/news/202201171012569452)\n\n[[뉴스토마토] 지니언스, 구독형 서비스로 역대 최대 실적 기대-리서치알음](https://www.newstomato.com/ReadNews.aspx?no=1100547&inflow=N)"}, {"title": "지니언스, EDR 누적 고객 100 곳 돌파…국내 최다 고객 확보", "date": "2022.01.14", "link": "https://www.genians.co.kr/pr-room/press/news_20220104", "category": "EDR", "body_html": "<h3>산업별 대표 레퍼런스 확보, 외산 솔루션 윈백 등 질적 성장도 성과</h3>\n<h3>구독형 비즈니스 정착 단계, 중장기적 안정적인 매출 확보 가능</h3>\n<h3>앤드포인트 넘어 IT 전체 위협 탐지하는 XDR 시장 개척 박차</h3>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범) 가 EDR 누적 고객 100 곳을 돌파하며 국내 EDR 시장의 절대 강자임을 다시 한번 입증했다. 국내 EDR 최다 고객을 보유한 지니언스는 2017년 국내 최초로 EDR 솔루션을 개발했으며 공공·금융·제조 등 전통적 산업의 대표 레퍼런스를 확보함은 물론 지난해 플랫폼 및 빅테크 기업까지 신규 고객으로 확보함으로써 향후 시장 전망도 밝게 했다.</p>\n<p>EDR 부분은 전 세계적인 사이버 위협의 증가로 위협을 사전에 인지하고 빠르게 조치할 수 있는 예방 관점으로 시장이 성장하고 있다. 공격의 영향과 범위가 확대되고 있으며 기업 및 기관뿐 아니라 국민의 생명/안전에 직접영향을 주고 사회 혼란/마비까지, 그 피해가 막대한 만큼 미국을 중심으로 대대적인 도입이 이뤄지고 있다.</p>\n<p>또한, 코로나 19로 인한 사회 ·경제 전반의 디지털 트랜스포메이션도 EDR 시장 확대에 한 몫 했다. 원격근무 및 재택근무에 따른 보안 강화의 대안으로 EDR이 각광을 받은 것이다. 사실상 재택 등 다양한 엔드포인트 접점이 생기면서 가장 기본적인 보안인 VPN 외에는 별다른 대안이 없었다. 하지만 EDR을 통해 각 사용자의 행위나 단말의 이상행위를 파악할 수 있는 EDR을 통해 재택근무의 효율과 보안성을 인정 받았다.</p>\n<p>외산 솔루션 윈백도 성과다. 국내 IT환경에 미적합, 직접적인 기술지원 서비스 제공의 어려움 등으로 기존 운영하던 외산 솔루션을 지니언스 EDR 솔루션으로 교체하는 사례가 증가하고 있다.</p>\n<p>국내에 정착하기 힘들 것으로 전망됐던 구독형 비즈니스를 정착시킨 것도 하나의 성과이다. 전통적으로 국내 소프트웨어 비즈니스는 구축형으로 불리는 라이선스와 유지보수 모델이다. 유지보수 대가 및 요율이 높지 않기 때문에 수익성 확보 및 제품의 개선이 시간이 지날수록 어렵다</p>\n<p>하지만 구독형 비즈니스 모델은 월 혹은 연단위 과금 형태로 노드 수에 따라 지불하기 때문에 중장기적으로 안정적인 매출을 가져 올 수 있다. 지니언스는 2021년 구독형 비즈니스 서비스 매출 비중이 60%를 넘어 구축형보다 높은 비중을 차지했다.</p>\n<p>지니언스는 2021년 성과를 바탕으로 2022년에는 EDR 시장 붐 조성을 위해 판매 채널 강화, 프로모션 프로그램 개발, 다양한 제휴와 연동으로 범 지니언스 전선을 구축함은 물론 EDR의 확장 시장까지 그 영역을 확대한다는 전략이다.</p>\n<p>김준형 지니언스 EDR 사업본부장은 “EDR이 다양한 산업군에 도입되고 많은 고객이 구독 서비스로 이용하고 있다”며 “기존 고객들이 구독 후 이탈률이 거의 없을 정도로 고객 충성도가 높고 시범 사업 후 본사업 적용, 본 사업 후 확대 적용이 계속 증가하고 있다”고 밝혔다. 또한, 그는 ‘글로벌 및 다양한 EDR 기업들이 속속 시장에 진출하고 EDR에 대한 관심이 더욱 커지고 있는 만큼 2022년 국내 EDR 시장은 폭발적으로 성장하는 원년이 될 것”이라고 덧붙였다.</p>\n<p>[그림 ] 지니언스 EDR 솔루션의 개념  </p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/ms_2-1024x576.png?width=500&amp;height=281&amp;name=ms_2-1024x576.png\" /></p>\n<p>|  |\n|</p>", "body_text": "### 산업별 대표 레퍼런스 확보, 외산 솔루션 윈백 등 질적 성장도 성과\n\n  \n\n### 구독형 비즈니스 정착 단계, 중장기적 안정적인 매출 확보 가능\n\n  \n\n### 앤드포인트 넘어 IT 전체 위협 탐지하는 XDR 시장 개척 박차\n\n  \n  \n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범) 가 EDR 누적 고객 100 곳을 돌파하며 국...", "full_text": "### 산업별 대표 레퍼런스 확보, 외산 솔루션 윈백 등 질적 성장도 성과\n\n  \n\n### 구독형 비즈니스 정착 단계, 중장기적 안정적인 매출 확보 가능\n\n  \n\n### 앤드포인트 넘어 IT 전체 위협 탐지하는 XDR 시장 개척 박차\n\n  \n  \n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범) 가 EDR 누적 고객 100 곳을 돌파하며 국내 EDR 시장의 절대 강자임을 다시 한번 입증했다. 국내 EDR 최다 고객을 보유한 지니언스는 2017년 국내 최초로 EDR 솔루션을 개발했으며 공공·금융·제조 등 전통적 산업의 대표 레퍼런스를 확보함은 물론 지난해 플랫폼 및 빅테크 기업까지 신규 고객으로 확보함으로써 향후 시장 전망도 밝게 했다.\n\nEDR 부분은 전 세계적인 사이버 위협의 증가로 위협을 사전에 인지하고 빠르게 조치할 수 있는 예방 관점으로 시장이 성장하고 있다. 공격의 영향과 범위가 확대되고 있으며 기업 및 기관뿐 아니라 국민의 생명/안전에 직접영향을 주고 사회 혼란/마비까지, 그 피해가 막대한 만큼 미국을 중심으로 대대적인 도입이 이뤄지고 있다.\n\n또한, 코로나 19로 인한 사회 ·경제 전반의 디지털 트랜스포메이션도 EDR 시장 확대에 한 몫 했다. 원격근무 및 재택근무에 따른 보안 강화의 대안으로 EDR이 각광을 받은 것이다. 사실상 재택 등 다양한 엔드포인트 접점이 생기면서 가장 기본적인 보안인 VPN 외에는 별다른 대안이 없었다. 하지만 EDR을 통해 각 사용자의 행위나 단말의 이상행위를 파악할 수 있는 EDR을 통해 재택근무의 효율과 보안성을 인정 받았다.\n\n외산 솔루션 윈백도 성과다. 국내 IT환경에 미적합, 직접적인 기술지원 서비스 제공의 어려움 등으로 기존 운영하던 외산 솔루션을 지니언스 EDR 솔루션으로 교체하는 사례가 증가하고 있다.\n\n국내에 정착하기 힘들 것으로 전망됐던 구독형 비즈니스를 정착시킨 것도 하나의 성과이다. 전통적으로 국내 소프트웨어 비즈니스는 구축형으로 불리는 라이선스와 유지보수 모델이다. 유지보수 대가 및 요율이 높지 않기 때문에 수익성 확보 및 제품의 개선이 시간이 지날수록 어렵다\n\n하지만 구독형 비즈니스 모델은 월 혹은 연단위 과금 형태로 노드 수에 따라 지불하기 때문에 중장기적으로 안정적인 매출을 가져 올 수 있다. 지니언스는 2021년 구독형 비즈니스 서비스 매출 비중이 60%를 넘어 구축형보다 높은 비중을 차지했다.\n\n지니언스는 2021년 성과를 바탕으로 2022년에는 EDR 시장 붐 조성을 위해 판매 채널 강화, 프로모션 프로그램 개발, 다양한 제휴와 연동으로 범 지니언스 전선을 구축함은 물론 EDR의 확장 시장까지 그 영역을 확대한다는 전략이다.\n\n김준형 지니언스 EDR 사업본부장은 “EDR이 다양한 산업군에 도입되고 많은 고객이 구독 서비스로 이용하고 있다”며 “기존 고객들이 구독 후 이탈률이 거의 없을 정도로 고객 충성도가 높고 시범 사업 후 본사업 적용, 본 사업 후 확대 적용이 계속 증가하고 있다”고 밝혔다. 또한, 그는 ‘글로벌 및 다양한 EDR 기업들이 속속 시장에 진출하고 EDR에 대한 관심이 더욱 커지고 있는 만큼 2022년 국내 EDR 시장은 폭발적으로 성장하는 원년이 될 것”이라고 덧붙였다.\n\n[그림 ] 지니언스 EDR 솔루션의 개념  \n  \n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/ms_2-1024x576.png?width=500&height=281&name=ms_2-1024x576.png)\n\n|  |\n|"}, {"title": "[메일경제 TV] 출발 오늘의 증시-THE CEO", "date": "2022.01.13", "link": "https://www.genians.co.kr/pr-room/press/news_20220113", "category": "기타 뉴스", "body_html": "<p>지니언스 이동범 대표가 메일경제 TV 출발 오늘의 증시-THE CEO에 출연했습니다.</p>\n<ul>\n<li>지니언스 회사 소개  </li>\n<li>사업 현황  </li>\n<li>주요이슈  </li>\n<li>22년 계획</li>\n</ul>", "body_text": "지니언스 이동범 대표가 메일경제 TV 출발 오늘의 증시-THE CEO에 출연했습니다.\n\n- 지니언스 회사 소개  \n- 사업 현황  \n- 주요이슈  \n- 22년 계획...", "full_text": "지니언스 이동범 대표가 메일경제 TV 출발 오늘의 증시-THE CEO에 출연했습니다.\n\n- 지니언스 회사 소개  \n- 사업 현황  \n- 주요이슈  \n- 22년 계획"}, {"title": "Log4j 취약점…스캐너와 해킹 점검 툴 만으로는 불충분, 보안의 사각지대까지 꼼꼼히 살펴야", "date": "2021.12.23", "link": "https://www.genians.co.kr/pr-room/press/news20211223", "category": "기타 뉴스", "body_html": "<p>보안 위협 사례 속속 등장, 빠른 대응과 종합적인 대응 체계 마련 해야</p>\n<h3>보안 사각지대까지 침투, 위협 탐지의 범위와 수준 확대 필요</h3>\n<p>IT 역사상 최악의 취약점으로 분류되는 ‘로그4j(Log4j)’에 대해 취약점 스캔, 해킹 점검 툴 등 다양한 대응 방안이 제시되고 있지만 취약한 대상을 확인하는 것만으로는 충분치 않은 것으로 알려졌다. 탐지 정보가 나오기 전에 이미 공격을 당한 제로데이 공격 및 침투 사례가 속속들이 밝혀지고 있기 때문이다.</p>\n<p>최근 로그4j를 이용한 제로데이 공격에 대한 우려가 높아지는 가운데 국내 기업·기관을 대상으로 유사한 내용이 확인되어 긴장감이 높아지고 있다. 로그4j의 취약점 발견 후 탐지정보와 패치가 제공되기 전에 이뤄졌기 때문에 침해의 여부 조차 알 수 없는 상황으로 현재의 보안 대응 체계가 무력화 될 수도 있다.</p>\n<p>따라서, 현재의 보안 대응 체계에 더해 제로데이 침투가 이뤄진 내부 IP를 찾아내고 외부 IP로의 통신 차단과 멀웨어 제거가 이뤄질 수 있도록 취약점에 대한 방어, 조치・해결, 조사 등 종합적이고 다각적인 접근이 필요하다.</p>\n<p>최근 지니언스(대표 이동범, 263860)와 XDR 사업투자 협정을 체결한 엑사비스(대표 이시영)는 자사의 ZDR・NDR 솔루션 넷아르고스(NetArgos)를 통해 확인한 Log4j의 제로데이 침투의 위험성 사례를 언급했다.</p>\n<p>A대학교를 비롯한 다수의 대학교에서는 넷아르고스(NetArgos)의 회귀보안검사(시간상의 보안사각 검사) 리포트를 통해 확인한 바, Log4j의 탐지정보와 패치가 적용되기 며칠 전부터 이미 다수의 공격자들이 제로데이 침투를 한 것이 발견되었다. 그 이후 Log4j의 변종 위협에 대한 탐지정보가 새로 나올 때에도, 이미 과거에 제로데이 침투가 있었던 것으로 파악되고 있다.</p>\n<p>B기관의 경우 초기 공격에서 알려진 공격방식이 아닌 변조·난독화 방법이 알려진 이후 탐지를 우회하기 위해 변조된 공격 방식을 사용하여 다양한 사이트로 제로데이 공격을 시도한 것으로 확인되었다.</p>\n<p>C기업의 경우 공격 트래픽이 최초 발생한 이래 프로토콜을 변조하여 침입탐지시스템 등을 우회한 신규 공격 방식을 사용한 것으로 조사됐다.</p>\n<p>엑사비스는 자체 개발 솔루션 넷아르고스(NetArgos)를 통해 네트워크 트래픽을 저장하고 회귀보안검사를 통하여 제로데이 침투 정보를 통합 검사/분석하여 위협 탐지와 범위와 수준을 확대하고, 보안의 사각지대를 제거하여 잠재적인 보안 위협에 대한 대응을 고도화할 필요가 있다고 지적했다.</p>\n<p>이시영 엑사비스 대표는 “로그4j 취약점 최초 공개 시점에도 이미 며칠 전에 상당한 공격 시도가 있었고, 이중 몇몇은 성공한 것으로 파악됐다”며 “ZDR 솔루션을 활용하여, 패치 이전 공격 흔적을 탐지해 잠재적인 보안 위협까지 면밀히 대비하는 강력한 보안 대응체계 필요하다”고 밝혔다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EB%A1%9C%EA%B7%B84j-%EC%B7%A8%EC%95%BD%EC%A0%90-%ED%8C%A8%ED%82%B7-%ED%83%90%EC%A7%80-%EC%82%AC%EB%A1%80.jpg?width=803&amp;height=262&amp;name=%EA%B7%B8%EB%A6%BC-1-%EB%A1%9C%EA%B7%B84j-%EC%B7%A8%EC%95%BD%EC%A0%90-%ED%8C%A8%ED%82%B7-%ED%83%90%EC%A7%80-%EC%82%AC%EB%A1%80.jpg\" /></p>\n<p>&lt;그림 1&gt; 로그4j 취약점 패킷 탐지 사례</p>\n<p>|  |\n|</p>", "body_text": "보안 위협 사례 속속 등장, 빠른 대응과 종합적인 대응 체계 마련 해야\n\n### 보안 사각지대까지 침투, 위협 탐지의 범위와 수준 확대 필요\n\nIT 역사상 최악의 취약점으로 분류되는 ‘로그4j(Log4j)’에 대해 취약점 스캔, 해킹 점검 툴 등 다양한 대응 방안이 제시되고 있지만 취약한 대상을 확인하는 것만으로는 충분치 않은 것으로 알려졌다. 탐지 정보가...", "full_text": "보안 위협 사례 속속 등장, 빠른 대응과 종합적인 대응 체계 마련 해야\n\n### 보안 사각지대까지 침투, 위협 탐지의 범위와 수준 확대 필요\n\nIT 역사상 최악의 취약점으로 분류되는 ‘로그4j(Log4j)’에 대해 취약점 스캔, 해킹 점검 툴 등 다양한 대응 방안이 제시되고 있지만 취약한 대상을 확인하는 것만으로는 충분치 않은 것으로 알려졌다. 탐지 정보가 나오기 전에 이미 공격을 당한 제로데이 공격 및 침투 사례가 속속들이 밝혀지고 있기 때문이다.\n\n최근 로그4j를 이용한 제로데이 공격에 대한 우려가 높아지는 가운데 국내 기업·기관을 대상으로 유사한 내용이 확인되어 긴장감이 높아지고 있다. 로그4j의 취약점 발견 후 탐지정보와 패치가 제공되기 전  국가 R&amp;D사업 가점 부여 등의 인센티브를 받을 수 있다.</p>\n<p>지니언스는 2005년 설립 당시부터 부설연구소를 개설했다. 전체 인력의 70% 이상이 기술인력이며 핵심 개발인력의 장기 근속과 우수 개발인력의 지속적인 확보로 주요 사업분야인 NAC, EDR 부분에서 독보적인 기술력을 확보하고 있으며 다양한 특허 기술을 보유하고 있다.</p>\n<p>연구 개발을 위한 최적의 업무 환경 조성에도 힘쓰고 있다. 연구수당, 인센티브 등 연구개발 활동에 따른 평가와 보상시스템을 갖추고 있으며 ISO 27001 및 클라우드 서비스 보안 인증(CASP) 획득을 통해 개발단계에서부터 품질 및 안정성을 확보 하고 있다.</p>\n<p>이 같은 결과로 지니언스는 가트너, 프로스트 앤 설리번 등 글로벌 조사기관으로부터 아태지역에서 유일하게 등재되는 등 글로벌 기술 경쟁력을 인정 받고 있다. 또한, 국내외 다수의 고객 확보 및 미국 법인을 통한 선도 기술 내재화 등으로 향후 지속적인 기술 경쟁력 확보 및 우위 유지가 가능할 전망이다.</p>\n<p>지니언스는 기술 경쟁력 우위를 바탕으로 국내 NAC 시장에서 부동의 1위 점유율을 기록하고 있으며 차세대 정보보호 솔루션으로 각광받는 EDR 부분에서는 국내 최초 개발, 국내 최초 조달 등록, 국내 최다 고객 확보 등 다양한 타이틀을 보유하고 있다.</p>\n<p>김성철 지니언스 기술연구소 연구기획실 이사는 “정부의 기업 R&amp;D 지원 정책과 연구소에 대한 체계적인 육성을 통해 기술혁신 경쟁력 제고 및 질적 성장이 이뤄지고 있다”며 “글로벌 기술 경쟁력을 확보한 만큼 국내 뿐 아니라 글로벌 시장에서도 대한민국 보안 소프트웨어의 위상을 강화하는데 총력을 기울일 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "### 기업 역량 및 R&D 역량에서 높은 점수\n\n### 연구 개발 성과로 NAC・EDR 독자 기술 확보 및 다양한 특허 보유\n\n### 글로벌 기술 경쟁력 확보로 해외 시장 진출 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 과학기술정보통신부와 한국산업기술진흥협회가 주관하는 ‘2021년 하반기 우수 기업연구소’로 지정됐다고 밝혔다...", "full_text": "### 기업 역량 및 R&D 역량에서 높은 점수\n\n### 연구 개발 성과로 NAC・EDR 독자 기술 확보 및 다양한 특허 보유\n\n### 글로벌 기술 경쟁력 확보로 해외 시장 진출 박차\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 과학기술정보통신부와 한국산업기술진흥협회가 주관하는 ‘2021년 하반기 우수 기업연구소’로 지정됐다고 밝혔다.\n\n우수 기업연구소는 기술혁신 성과가 우수한 중소·중견기업으로 기업연구소를 3년 이상 운영해야 신청이 가능하다. 기업역량 및 R&D 역량이 주 심사 항목으로 발표심사, 현장심사, 종합심사 등의 단계를 걸쳐 지정이 된다. 우수 기업연구소로 지정되면 현판수여, 각종 홍보 등을 지원 받고 정부 포상 및 국가 R&D사업 가점 부여 등의 인센티브를 받을 수 있다.\n\n지니언스는 2005년 설립 당시부터 부설연구소를 개설했다. 전체 인력의 70% 이상이 기술인력이며 핵심 개발인력의 장기 근속과 우수 개발인력의 지속적인 확보로 주요 사업분야인 NAC, EDR 부분에서 독보적인 기술력을 확보하고 있으며 다양한 특허 기술을 보유하고 있다.\n\n연구 개발을 위한 최적의 업무 환경 조성에도 힘쓰고 있다. 연구수당, 인센티브 등 연구개발 활동에 따른 평가와 보상시스템을 갖추고 있으며 ISO 27001 및 클라우드 서비스 보안 인증(CASP) 획득을 통해 개발단계에서부터 품질 및 안정성을 확보 하고 있다.\n\n이 같은 결과로 지니언스는 가트너, 프로스트 앤 설리번 등 글로벌 조사기관으로부터 아태지역에서 유일하게 등재되는 등 글로벌 기술 경쟁력을 인정 받고 있다. 또한, 국내외 다수의 고객 확보 및 미국 법인을 통한 선도 기술 내재화 등으로 향후 지속적인 기술 경쟁력 확보 및 우위 유지가 가능할 전망이다.\n\n지니언스는 기술 경쟁력 우위를 바탕으로 국내 NAC 시장에서 부동의 1위 점유율을 기록하고 있으며 차세대 정보보호 솔루션으로 각광받는 EDR 부분에서는 국내 최초 개발, 국내 최초 조달 등록, 국내 최다 고객 확보 등 다양한 타이틀을 보유하고 있다.\n\n김성철 지니언스 기술연구소 연구기획실 이사는 “정부의 기업 R&D 지원 정책과 연구소에 대한 체계적인 육성을 통해 기술혁신 경쟁력 제고 및 질적 성장이 이뤄지고 있다”며 “글로벌 기술 경쟁력을 확보한 만큼 국내 뿐 아니라 글로벌 시장에서도 대한민국 보안 소프트웨어의 위상을 강화하는데 총력을 기울일 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "메타버스 뜨면 '보안株 전성시대' 온다", "date": "2021.12.10", "link": "https://www.genians.co.kr/pr-room/press/news_211210", "category": "기타 뉴스", "body_html": "<p>한국경제신문에 메타버스로 주목받는 사이버 보안 회사로 지니언스가 보도되었습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/AA_28287289_4-1024x374.jpg?width=1024&amp;height=374&amp;name=AA_28287289_4-1024x374.jpg\" /></p>\n<p>경제적 가치가 커질수록 사이버 공격도 비례해 늘어날 수밖에 없습니다. 메타버스에 대한 기대가 커지면서 보안업계도 새로운 성장동력을 얻었다는 평가입니다.</p>\n<p>지니언스는 올들어 주가가 57%상승했으며, 장중 시총 1,000억원을 돌파했습니다.</p>\n<p>기사 전문은 아래 링크를 확인해주세요.</p>\n<p><a href=\"https://www.hankyung.com/finance/article/2021120976611\">[한국경제신문] 메타버스 뜨면 '보안株 전성시대' 온다</a></p>", "body_text": "한국경제신문에 메타버스로 주목받는 사이버 보안 회사로 지니언스가 보도되었습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/AA_28287289_4-1024x374.jpg?width=1024&height=374&name=AA_28287289_4-1024x374.jpg)\n\n경제적 가치가 커...", "full_text": "한국경제신문에 메타버스로 주목받는 사이버 보안 회사로 지니언스가 보도되었습니다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/AA_28287289_4-1024x374.jpg?width=1024&height=374&name=AA_28287289_4-1024x374.jpg)\n\n경제적 가치가 커질수록 사이버 공격도 비례해 늘어날 수밖에 없습니다. 메타버스에 대한 기대가 커지면서 보안업계도 새로운 성장동력을 얻었다는 평가입니다.\n\n지니언스는 올들어 주가가 57%상승했으며, 장중 시총 1,000억원을 돌파했습니다.\n\n기사 전문은 아래 링크를 확인해주세요.\n\n[[한국경제신문] 메타버스 뜨면 '보안株 전성시대' 온다](https://www.hankyung.com/finance/article/2021120976611)"}, {"title": "원광대학교병원, 지니언스 EDR로 환자·의료시스템 보호", "date": "2021.12.08", "link": "https://www.genians.co.kr/pr-room/press/news_211208", "category": "EDR", "body_html": "<p>데이터넷에 원광대학교 병원의 지니언스 EDR 도입 소식이 보도 되었습니다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_ 로써 통합형 보안 체계를 구축할 수 있는 차세대 보안 플랫폼이다.</p>\n<p>최근 전 세계적인 사이버 위협은 공격의 대상이 확장되고 지능화된 위협이 증가하고 있다. 코로나 19 이후 불어닥친 디지털 트랜스포메이션은 네트워크에 대한 의존도와 트래픽을 증가시켰으며 관련 위협도 각 보안 계층에서 대폭 증가했다.</p>\n<p>이에 따라, 단말기반의 EDR과 네트워크 기반의 NDR이 통합된 보도 고도화된 보안이 요구되고 있으며 IT 접점과 IT전체의 위협 대응을 위한 데이터 기반의 확대(eXtend)인 XDR에 대한 관심이 증대되고 있다.</p>\n<p>지니언스는 XDR 확대 전략을 위한 걸음으로 ZDR(Zero-day intrusion Detection and Response) 및 NDR(Network Detection and Response) 솔루션 전문 벤더인 엑사비스와 사업 투자 협정 조인식을 체결했다. EDR이 제공하는 단말 정보와 ZDR/NDR이 제공하는 네트워크 정보 및 제로데이 침투 정보를 통합 분석하여 위협 탐지의 범위와 수준을 확대하고, 보안의 사각지대를 없앰으로써 잠재적인 보안 위협에 대한 대응을 보다 고도화 한다는 전략이다. 나아가 장기적으로 클라우드 기반의 통합 글로벌 보안 플랫폼 개발이 가능할 것으로 기대하고 있다.</p>\n<p>이미 지니언스는 XDR의 기본이자 핵심인 EDR 제품을 2017년 국내 최초로 개발했다. 2018년 국내 최초로 머신러닝(ML) 기술을 적용해 경쟁력을 확보했다. 2021년 기준 매출 및 고객 수에서 1위를 기록하고 있으며 시장을 지속적으로 확대하고 있다.</p>\n<p>지니언스는 EDR 선도 기업으로써 IT환경의 변화에 대응하고 현재의 경쟁우위 유지 및 확대 발전을 위해 XDR로의 확대를 결정, 추진한 것으로 풀이된다. 지능형 위협에 대한 사용자, 단말부터 네트워크, 클라우드에 이르는 광범위한 대응이 필요한 시점이고 SOAR 등 이기종 솔루션 간의 확장된 상호 보안 오케스트레이션 및 자동 대응 등의 새로운 수요에 적극 대응하겠다는 것이다.<br />\n 이동범 지니언스 대표는 “엑사비스의 ZDR/NDR 솔루션은 경쟁기술 대비 현격히 적게 데이터를 저장하면서도 위협 탐지 능력은 탁월하다”며 “양사 협력을 통해 보안 시너지를 창출하여 국내 XDR 시장을 선도하는 계기가 될 것”이라고 밝혔다.</p>\n<p>이시영 엑사비스 대표는 \"언노운(Unknown) 보안사각을 해소하는 EDR 기술과 시간/운용상의 보안사각을 해소하는 ZDR 기술의 결합은 모든 종류의 보안사각에 대응할 수 있는 기술적 기반을 확보함으로써, 경쟁력 있는 XDR 솔루션 확보를 가능하게 한다\" 라고 밝혔다.</p>\n<p><img alt=\"지니언스엑사비스\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%97%91%EC%82%AC%EB%B9%84%EC%8A%A4.png?width=479&amp;height=300&amp;name=%EC%97%91%EC%82%AC%EB%B9%84%EC%8A%A4.png\" /></p>\n<p>지니언스와 엑사비스는 XDR 사업에 대한 투자 협정을 체결했다.</p>\n<p>(왼쪽부터 이동범 지니언스 대표, 이시영 엑사비스 대표)</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 EDR(Endpoint Detection & Response) 사업을 확장해 네트워크, 클라우드 등 IT전체의 위협을 탐지·분석・대응하는 XDR(eXtended Detection & Response)로의 확대를 본격화 한다. XDR은 확장된 데이터의 수집 및 분석을 통해 위협을 탐지/대응하고...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 EDR(Endpoint Detection & Response) 사업을 확장해 네트워크, 클라우드 등 IT전체의 위협을 탐지·분석・대응하는 XDR(eXtende ect the valuation gap to narrow as Genians executes on its growth strategy.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%BA%A1%EC%B2%98.png?width=997&height=783&name=%EC%BA%A1%EC%B2%98.png)\n\n보고서의 풀버전은 아래 링크를 참고 부탁드립니다.\n\n[Argus Research 리포트](https://www.argusresearch.com/PDFDownloader3.aspx?id=MDAwMDAxMDA0OQ==aAB0AHQAcAA6AC8ALwByAGUAcwBvAHUAcgBjAGUAcwAuAGEAcgBnAHUAcwByAGUAcwBlAGEAcgBjAGgALgBjAG8AbQAvAHIAZQBwAG8AcgB0AHMALwAwADAALwAwADAALwA2ADQALwA2ADcALwA4ADAALQAwADkANQBCAEMARAAxAEQALQA1AEUAOABCAC0ANAA3ADIAMQAtAEIANgAwADEALQA0AEEAQwA0AEMAMABCADAAQgA1AEEAQQAuAHAAZABmAA==)"}, {"title": "클라우드 기반의 전문화된 NAC 보안 서비스 제공으로 국내 SECaaS 시장 선도", "date": "2021.10.27", "link": "https://www.genians.co.kr/pr-room/press/news20211026", "category": "NAC", "body_html": "<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 한국인터넷진흥원(KISA)에서 인증하는 클라우드 서비스 보안인증(CASP : Cloud Security Assurance Program)을 획득했다고 밝혔다. CASP는 공공기관이 안전하게 민간 클라우드를 이용할 수 있도록 객관적이고 공정하게 제품 및 서비스 보안 수준을 평가하여 인증을 부여하는 제도이다.</p>\n<p>클라우드서비스 제공자는 이용자의 신뢰도 향상이 가능하며 클라우드서비스 이용자인 국가/공공기관은 인증 받은 클라우드서비스를 이용함으로써, 클라우드 도입의 걸림돌인 보안의 우려를 해소하고, 안전한 클라우드서비스 구축 및 이용이 가능하다.</p>\n<p>금번 인증 제품은 클라우드 기반 차세대 네트워크 접근제어 솔루션인 ‘지니안 클라우드 NAC’다. 단말관리 및 제어 플랫폼을 클라우드 기반으로 제공 하며 다양한 플랫폼 및 운영 환경을 지원한다. 기존 시스템 환경의 변화 없이 자동으로 신속한 설치와 보안 서비스 운영이 가능하다.</p>\n<p>클라우드 NAC는 순수 자체 기술로 개발하여 미국 등 글로벌 시장에서 다수의 고객을 확보한 후 국내에는 지난해 상반기 NAC 서비스 모델(NAC as SaaS)로 출시했다. 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 초기 도입 비용 절감이 가능하다.</p>\n<p>‘지니안 클라우드 NAC’는 SaaS 표준 등급 분야에서 인증을 획득했으며 국내 보안 솔루션 중 중 SaaS 인증을 받은 최초의 제품이다. SaaS 인증의 평가요소인 정보보호 정책 및 조직·인적보안·자산관리·서비스공급망관리·침해사고관리 등 총 13개 분야 78개 통제항목의 기준을 통과했다.</p>\n<p>보안제품은 CC인증 또는 보안기능확인서를 획득해야 공공 시장에 진입이 가능하며 클라우드 환경에서는 CC인증만으로 불가능하다. CC인증 대상 보안 제품을 클라우드 환경에서 서비스하기 위해서는 SaaS 인증 획득이 필수적이다.</p>\n<p>이번 인증 획득을 통해 지니언스는 클라우드 환경에서 정보보호제품의 보안 기능을 제공함에 있어 안정성과 신뢰성을 다시 한번 입증하게 됐다. ‘지니안 클라우드 NAC’는 일반기업은 AWS에서 서비스를 제공하며 공공기관은 IaaS 인증을 받은 네이버클라우드에서 보안 서비스를 제공한다.<br />\n한형권 지니언스 클라우드사업부 이사는 “범국가적으로 공공기관 정보시스템이 클라우드 기반 통합 관리 운영 환경으로 전환되고 있다”며 “지니언스는 발빠른 SaaS보안 인증 획득으로 빠르게 공공 클라우드 시장에 진입해 경쟁력을 확보하고 디지털서비스 전문계약제도 등 급변하는 클라우드 비즈니스 환경에 적극 대응할 것”이라고 밝혔다.</p>\n<p><img alt=\"SaaS 보안인증\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%EC%84%9C%EB%B9%84%EC%8A%A4-SaaS-%EB%B3%B4%EC%95%88%EC%9D%B8%EC%A6%9D%EC%9D%84-%ED%9A%8D%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.png?width=670&amp;height=360&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%EC%84%9C%EB%B9%84%EC%8A%A4-SaaS-%EB%B3%B4%EC%95%88%EC%9D%B8%EC%A6%9D%EC%9D%84-%ED%9A%8D%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.png\" /></p>\n<p>&lt;그림 1&gt; 지니언스, 최근 클라우드서비스 SaaS 보안인증을 획득했다고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 한국인터넷진흥원(KISA)에서 인증하는 클라우드 서비스 보안인증(CASP : Cloud Security Assurance Program)을 획득했다고 밝혔다. CASP는 공공기관이 안전하게 민간 클라우드를 이용할 수 있도록 객관적이고 공정하게 제품 및 서비스 보안 수준을 평가하여 인증을 부여...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 한국인터넷진흥원(KISA)에서 인증하는 클라우드 서비스 보안인증(CASP : Cloud Security Assurance Program)을 획득했다고 밝혔다. CASP는 공공기관이 안전하게 민간 클라우드를 이용할 수 있도록 객관적이고 공정하게 제품 및 서비스 보안 수준을 평가하여 인증을 부여하는 제도이다.\n\n클라우드서비스 제공자는 이용자의 신뢰도 향상이 가능하며 클라우드서비스 이용자인 국가/공공기관은 인증 받은 클라우드서비스를 이용함으로써, 클라우드 도입의 걸림돌인 보안의 우려를 해소하고, 안전한 클라우드서비스 구축 및 이용이 가능하다.\n\n금번 인증 제품은 클라우드 기반 차세대 네트워크 접근제어 솔루션인 ‘지니안 클라우드 NAC’다. 단말관리 및 제어 플랫폼을 클라우드 기반으로 제공 하며 다양한 플랫폼 및 운영 환경을 지원한다. 기존 시스템 환경의 변화 없이 자동으로 신속한 설치와 보안 서비스 운영이 가능하다.\n\n클라우드 NAC는 순수 자체 기술로 개발하여 미국 등 글로벌 시장에서 다수의 고객을 확보한 후 국내에는 지난해 상반기 NAC 서비스 모델(NAC as SaaS)로 출시했다. 사용한 만큼만 지불하는 서브스크립션(Subscription) 모델이다. 월 과금 형태로 노드 수에 따라 지불하면 되기 때문에 초기 도입 비용 절감이 가능하다.\n\n‘지니안 클라우드 NAC’는 SaaS 표준 등급 분야에서 인증을 획득했으며 국내 보안 솔루션 중 중 SaaS 인증을 받은 최초의 제품이다. SaaS 인증의 평가요소인 정보보호 정책 및 조직·인적보안·자산관리·서비스공급망관리·침해사고관리 등 총 13개 분야 78개 통제항목의 기준을 통과했다.\n\n보안제품은 CC인증 또는 보안기능확인서를 획득해야 공공 시장에 진입이 가능하며 클라우드 환경에서는 CC인증만으로 불가능하다. CC인증 대상 보안 제품을 클라우드 환경에서 서비스하기 위해서는 SaaS 인증 획득이 필수적이다.\n\n이번 인증 획득을 통해 지니언스는 클라우드 환경에서 정보보호제품의 보안 기능을 제공함에 있어 안정성과 신뢰성을 다시 한번 입증하게 됐다. ‘지니안 클라우드 NAC’는 일반기업은 AWS에서 서비스를 제공하며 공공기관은 IaaS 인증을 받은 네이버클라우드에서 보안 서비스를 제공한다.  \n한형권 지니언스 클라우드사업부 이사는 “범국가적으로 공공기관 정보시스템이 클라우드 기반 통합 관리 운영 환경으로 전환되고 있다”며 “지니언스는 발빠른 SaaS보안 인증 획득으로 빠르게 공공 클라우드 시장에 진입해 경쟁력을 확보하고 디지털서비스 전문계약제도 등 급변하는 클라우드 비즈니스 환경에 적극 대응할 것”이라고 밝혔다.\n\n![SaaS 보안인증](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%EC%84%9C%EB%B9%84%EC%8A%A4-SaaS-%EB%B3%B4%EC%95%88%EC%9D%B8%EC%A6%9D%EC%9D%84-%ED%9A%8D%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.png?width=670&height=360&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4%EB%8A%94-%EC%B5%9C%EA%B7%BC-%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%EC%84%9C%EB%B9%84%EC%8A%A4-SaaS-%EB%B3%B4%EC%95%88%EC%9D%B8%EC%A6%9D%EC%9D%84-%ED%9A%8D%EB%93%9D%ED%96%88%EB%8B%A4%EA%B3%A0-%EB%B0%9D%ED%98%94%EB%8B%A4_.png)\n\n<그림 1> 지니언스, 최근 클라우드서비스 SaaS 보안인증을 획득했다고 밝혔다.\n\n|  |\n|"}, {"title": "[KTV] K-사이버 방역 대표기업 지니언스", "date": "2021.10.22", "link": "https://www.genians.co.kr/pr-room/press/2021ktv", "category": "기타 뉴스", "body_html": "<p>KTV 한국판 뉴딜 나의 뉴딜 시즌2 -사이버 세계를 지켜라! 편에 K-사이버 방역 대표기업으로 지니언스가 소개 되었습니다.</p>\n<p>글로벌 보안 소프트웨어 기업 지니언스는 어떤 회사인지,</p>\n<p>코로나 이후 디지털 혁신에 따른 보안의 중요성과</p>\n<p>디지털 뉴딜 정책의 보안 부문에 대한 제언까지 살펴봅니다.</p>\n<p>자료 출처 : <a href=\"https://www.ktv.go.kr/program/home/PG2210039D/main?unit=281\">한국정책방송 KTV</a></p>", "body_text": "KTV 한국판 뉴딜 나의 뉴딜 시즌2 -사이버 세계를 지켜라! 편에 K-사이버 방역 대표기업으로 지니언스가 소개 되었습니다.\n\n글로벌 보안 소프트웨어 기업 지니언스는 어떤 회사인지,\n\n코로나 이후 디지털 혁신에 따른 보안의 중요성과\n\n디지털 뉴딜 정책의 보안 부문에 대한 제언까지 살펴봅니다.\n\n자료 출처 : [한국정책방송 KTV](https://www.kt...", "full_text": "KTV 한국판 뉴딜 나의 뉴딜 시즌2 -사이버 세계를 지켜라! 편에 K-사이버 방역 대표기업으로 지니언스가 소개 되었습니다.\n\n글로벌 보안 소프트웨어 기업 지니언스 탁드립니다.\n\n[[리서치알음] 지니언스 보고서 바로가기](https://www.genians.co.kr/resources/researcharum_report_20211005.html)\n\n### 관련기사\n\n[[머니투데이] 지니언스, 국내 EDR 최다고객 확보기업…재평가 기대-리서치알음](https://news.mt.co.kr/mtview.php?no=2021100509200611140)  \n [[파이낸셜뉴스] 지니언스 \"사이버 보안관심 역대 최대...국내최초 EDR솔루션 개발 주목\"](https://www.fnnews.com/news/202110051413059129)  \n [[뉴스토마토] 지니언스, 네트워크 보안 플랫폼 1위…글로벌 경쟁력↑-리서치알음](http://www.newstomato.com/ReadNews.aspx?no=1077597&inflow=N)"}, {"title": "지니언스, 원광대학교병원에 EDR 솔루션 공급", "date": "2021.10.05", "link": "https://www.genians.co.kr/pr-room/press/news20211005", "category": "EDR", "body_html": "<ul>\n<li>\n<p><strong>보다 안전한 의료서비스 제공을 위해 최적의 의료정보시스템 인프라 환경 제공</strong></p>\n</li>\n<li>\n<p><strong>지능화된 사이버 위협에 신속하고 효율적인 대응 체계 마련</strong></p>\n</li>\n<li>\n<p><strong>보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화</strong></p>\n</li>\n</ul>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 전북 익산의 상급종합병원인 원광대학교병원 EDR 구축 사업을 수주했다고 밝혔다. 공공・금융・제조 등 산업별 대표 레퍼런스를 확보한 지니언스는 시장영향력 있는 상급종합병원 고객을 확보함으로써 하반기 EDR 비즈니스의 전망을 밝게 하고 있다.</p>\n<p>1980년 설립된 원광대학교병원은 국내 유일 퀸터플 응급의료체계(권역외상센터·권역응급의료센터·응급의료전용헬기·전북권역심뇌혈관질환센터·다인용 고압산소치료 챔버)를 구축한 호남지역의 대표 상급종합병원이다. 바이오헬스 4차 산업혁명시대를 선도하는 글로벌 명문 병원으로 도약하기 위해 박차를 가하고 있다.</p>\n<p>원광대학교병원은 환자 중심의 논스톱 진료 및 안정적인 의료 서비스 제공을 위해 2018년 전산정보시스템 고도화 프로젝트를 완료했다. 최적의 보안 솔루션을 적용해 환자 개인 정보를 철저하게 보호·관리 할 수 있도록 했으며 최근에는 의료정보시스템(EMR·OCS) 및 홈페이지 서비스 운영 부문에서 ‘정보보호 관리체계(ISMS)’ 2회 연속 인증을 획득했다.</p>\n<p>이처럼 원광대학교병원은 의료기관 해킹 등 각종 보안 위협으로부터 환자정보를 안전하게 보호하고 체계적으로 관리해 왔다. 개인의 중요한 정보를 다루는 만큼 그 어느 산업보다 보안이 강조되었고 선도적으로 보안 위협에 대응하는 서비스 체계를 확보하는데 투자를 아끼지 않았다.</p>\n<p>원광대학교병원은 랜섬웨어, APT 등 고도화되고 지능화된 다양한 위협에 효율적으로 대응하여 보다 안전한 의료서비스 제공을 목표로 EDR 솔루션 도입을 추진했다. 위협 탐지 대응 체계, 직관성, 안정화, 호환성 등 EDR 솔루션들을 면밀한 검토를 거쳐 지니언스의 EDR 솔루션 ‘Genian Insight E’를 선택했다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-1.jpg?width=500&amp;height=320&amp;name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-1.jpg\" /></p>\n<p>이 제품은 악성코드 유입과 감염, 취약점을 이용한 내부 확산 탐지, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응하는 인텔리전스 보안 솔루션이다. 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.</p>\n<p>특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.</p>\n<p>원광대학교병원은 EDR 솔루션 도입을 통해 앤드포인트의 보안 위협 탐지 및 조기 대응, 단말의 보안성 강화 및 위협 가시성이 대폭향상 될 것으로 기대하고 있다.</p>\n<p>이동범 지니언스 대표이사는 “전 세계적으로 사이버 위협에 노출되고 다양한 공격방법이 속속들이 등장하고 있다”며 “지니언스의 EDR 솔루션은 검증된 단말안정성, 글로벌 수준의 위협탐지 역량, 국내 환경에 최적화된 기술력을 강점으로 원광대학교병원의 안전한 의료서비스 체계 완비에 일익을 담당할 것”이라고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "+ **보다 안전한 의료서비스 제공을 위해 최적의 의료정보시스템 인프라 환경 제공**\n\n+ **지능화된 사이버 위협에 신속하고 효율적인 대응 체계 마련**\n\n+ **보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 전북 익산의 상급종합병원인 원광대학교병원 EDR 구축 사업을...", "full_text": "+ **보다 안전한 의료서비스 제공을 위해 최적의 의료정보시스템 인프라 환경 제공**\n\n+ **지능화된 사이버 위협에 신속하고 효율적인 대응 체계 마련**\n\n+ **보안의 새로운 패러다임 변화에 적극 대응하는 선도적 입지 강화**\n\n통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 전북 익산의 상급종합병원인 원광대학교병원 EDR 구축 사업을 수주했다고 밝혔다. 공공・금융・제조 등 산업별 대표 레퍼런스를 확보한 지니언스는 시장영향력 있는 상급종합병원 고객을 확보함으로써 하반기 EDR 비즈니스의 전망을 밝게 하고 있다.\n\n1980년 설립된 원광대학교병원은 국내 유일 퀸터플 응급의료체계(권역외상센터·권역응급의료센터·응급의료전용헬기·전북권역심뇌혈관질환센터·다인용 고압산소치료 챔버)를 구축한 호남지역의 대표 상급종합병원이다. 바이오헬스 4차 산업혁명시대를 선도하는 글로벌 명문 병원으로 도약하기 위해 박차를 가하고 있다.\n\n원광대학교병원은 환자 중심의 논스톱 진료 및 안정적인 의료 서비스 제공을 위해 2018년 전산정보시스템 고도화 프로젝트를 완료했다. 최적의 보안 솔루션을 적용해 환자 개인 정보를 철저하게 보호·관리 할 수 있도록 했으며 최근에는 의료정보시스템(EMR·OCS) 및 홈페이지 서비스 운영 부문에서 ‘정보보호 관리체계(ISMS)’ 2회 연속 인증을 획득했다.\n\n이처럼 원광대학교병원은 의료기관 해킹 등 각종 보안 위협으로부터 환자정보를 안전하게 보호하고 체계적으로 관리해 왔다. 개인의 중요한 정보를 다루는 만큼 그 어느 산업보다 보안이 강조되었고 선도적으로 보안 위협에 대응하는 서비스 체계를 확보하는데 투자를 아끼지 않았다.\n\n원광대학교병원은 랜섬웨어, APT 등 고도화되고 지능화된 다양한 위협에 효율적으로 대응하여 보다 안전한 의료서비스 제공을 목표로 EDR 솔루션 도입을 추진했다. 위협 탐지 대응 체계, 직관성, 안정화, 호환성 등 EDR 솔루션들을 면밀한 검토를 거쳐 지니언스의 EDR 솔루션 ‘Genian Insight E’를 선택했다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-1.jpg?width=500&height=320&name=%EA%B7%B8%EB%A6%BC-1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-EDR-%EC%86%94%EB%A3%A8%EC%85%98-%EC%A7%80%EB%8B%88%EC%95%88-%EC%9D%B8%EC%82%AC%EC%9D%B4%EC%B8%A0-E-%EC%8A%AC%EB%A1%9C%EA%B1%B4-1.jpg)\n\n이 제품은 악성코드 유입과 감염, 취약점을 이용한 내부 확산 탐지, 반복적으로 발생하는 이상행위와 위협을 실시간으로 추적해 신속하게 대응하는 인텔리전스 보안 솔루션이다. 안티바이러스의 한계를 뛰어넘는 지능형 솔루션으로 최근 기승을 부리는 지능형 공격, 랜섬웨어 등의 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적할 수 있어 차세대 보안 제품으로 각광을 받고 있다.\n\n특히, 사용자 단말의 가시성을 확보하고 이를 통해 위협의 탐지, 조사 대응이 가능함은 물론 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(XBA), 야라(YARA) 등의 다양한 기술이 적용되어 알려지지 않은 모든 공격까지 탐지하고 대응할 수 있다.\n\n원광대학교병원은 EDR 솔루션 도입을 통해 앤드포인트의 보안 위협 탐지 및 조기 대응, 단말의 보안성 강화 및 위협 가시성이 대폭향상 될 것으로 기대하고 있다.\n\n이동범 지니언스 대표이사는 “전 세계적으로 사이버 위협에 노출되고 다양한 공격방법이 속속들이 등장하고 있다”며 “지니언스의 EDR 솔루션은 검증된 단말안정성, 글로벌 수준의 위협탐지 역량, 국내 환경에 최적화된 기술력을 강점으로 원광대학교병원의 안전한 의료서비스 체계 완비에 일익을 담당할 것”이라고 밝혔다.\n\n|  |\n|"}, {"title": "美투자사가 눈독 들이는 지니언스, EDR 성장 ‘훨훨’", "date": "2021.09.29", "link": "https://www.genians.co.kr/pr-room/press/news210929", "category": "EDR", "body_html": "<ul>\n<li>\n<p><strong>미리 캐피탈 , 4월 처음으로 투자 이후…9월 지분율 9.09% 보유</strong></p>\n</li>\n<li>\n<p><strong>성장성 높게 평가…하반기 EDR 시장, 제조와 서비스 부문 확장</strong></p>\n</li>\n<li>\n<p><strong>클라우드형 NAC도 이스라엘, 이탈리아 이어 케냐까지 진출</strong></p>\n</li>\n</ul>\n<p>지니언스의 EDR 성장과 그에 따른 미국 투자운용사의 투자소식이 보도되었습니다.</p>\n<p>4월 처음 지니언스에 투자를 단행한 미리캐피탈은 이후 꾸준히 지분율을 높이고 있으며, 이는 지니언스의 미래 성장성을 높이 평가한 것이라는 분석 입니다.</p>\n<p>지니언스 EDR은 상반기 이미 광주은행, DB손해보험을 비롯해 금융권에서만 3곳의 신규 레퍼런스를 확보했으며 중앙부처, 지자체, 공사 등 다수 공공기관에 EDR을 공급했습니다.</p>\n<p>하반기에도 전망은 맑을것으로 예상되며, 기존의 공공기관, 의료 부문 외에도 제조와 서비스 부문으로 확산되고 있습니다.</p>\n<p>해외에서의 클라우드형 NAC 계약도 꾸준히 이뤄지고 있습니다. 상반기 이스라엘과 이탈리아에 이어 최근 케냐 로스쿨에도 지니안 NAC를 공급했습니다.</p>\n<p><a href=\"https://www.ceoscoredaily.com/page/view/2021092815121112223\">[CEOSCOREDAILY] 美투자사가 눈독 들이는 지니언스, EDR 성장 ‘훨훨’</a></p>", "body_text": "+ **미리 캐피탈 , 4월 처음으로 투자 이후…9월 지분율 9.09% 보유**\n\n+ **성장성 높게 평가…하반기 EDR 시장, 제조와 서비스 부문 확장**\n\n+ **클라우드형 NAC도 이스라엘, 이탈리아 이어 케냐까지 진출**\n\n지니언스의 EDR 성장과 그에 따른 미국 투자운용사의 투자소식이 보도되었습니다.\n\n4월 처음 지니언스에 투자를 단행한 미리캐피탈...", "full_text": "+ **미리 캐피탈 , 4월 처음으로 투자 이후…9월 지분율 9.09% 보유**\n\n+ **성장성 높게 평가…하반기 EDR 시장, 제조와 서비스 부문 확장**\n\n+ **클라우드형 NAC도 이스라엘, 이탈리아 이어 케냐까지 진출**\n\n지니언스의 EDR 성장과 그에 따른 미국 투자운용사의 투자소식이 보도되었습니다.\n\n4월 처음 지니언스에 투자를 단행한 미리캐피탈은 이후 꾸준히 지분율을 높이고 있으며, 이는 지니언스의 미래 성장성을 높이 평가한 것이라는 분석 입니다.\n\n지니언스 EDR은 상반기 이미 광주은행, DB손해보험을 비롯해 금융권에서만 3곳의 신규 레퍼런스를 확보했으며 중앙부처, 지자체, 공사 등 다수 공공기관에 EDR을 공급했습니다.\n\n하반기에도 전망은 맑을것으로 예상되며, 기존의 공공기관, 의료 부문 외에도 제조와 서비스 부문으로 확산되고 있습니다.\n\n해외에서의 클라우드형 NAC 계약도 꾸준히 이뤄지고 있습니다. 상반기 이스라엘과 이탈리아에 이어 최근 케냐 로스쿨에도 지니안 NAC를 공급했습니다.\n\n[[CEOSCOREDAILY] 美투자사가 눈독 들이는 지니언스, EDR 성장 ‘훨훨’](https://www.ceoscoredaily.com/page/view/2021092815121112223)"}, {"title": "IoT, BYOD, 원격근무 환경으로 시장 성장", "date": "2021.09.15", "link": "https://www.genians.co.kr/pr-room/press/20210915_nacafirica", "category": "기타 뉴스", "body_html": "<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 아프리카 케냐 로스쿨에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 지난 3월 세계적인 정보보안 강국인 이스라엘 건설사에 NAC를 공급한 것을 비롯해 글로벌 고객을 지속적으로 확보하고 있다.</p>\n<p>케냐 로스쿨은 광대역 통신망(WAN)을 통해 다양한 지역의 직원, 학생을 연결해 왔다. BYOD(Bring Your Own Device) 확대에 따라 다양한 단말이 학내 네트워크에 접속하고, 이동성 향상, 원격접속의 증가했다. 단말의 증가와 함께 위협 역시 증가하여 내부 자산과 사용자를 보호하고 학내 자원을 안전하게 사용할 수 있는 보다 강화된 보안 정책이 요구됐다.</p>\n<p>케냐 로스쿨은 강력한 인증을 통해 자산과 사용자를 식별하고 네트워크 접근에 대한 권한을 차등 부여하는 등 사용자의 단말 상태를 점검 및 조치하여 보다 안전한 네트워크 환경 완비를 위해 NAC 솔루션 도입에 착수했다. 지니언스를 포함해 글로벌 상위권 벤더의 제품을 꼼꼼히 살폈다. 구축형·매니지드 서비스・클라우드 등 고객의 환경에 적합한 서비스 포트폴리오 제공, 제품의 손쉬운 설치와 운영 부분에서 지니언스가 높은 점수를 받았다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-Genians-NAC-Africa-1024x536.jpg?width=715&amp;height=374&amp;name=%EA%B7%B8%EB%A6%BC-1-Genians-NAC-Africa-1024x536.jpg\" /></p>\n<p>지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.</p>\n<p>케냐 로스쿨은 NAC 도입을 통해 네트워크에 접속하는 단말의 가시성 확보를 기본으로 다양한 형태의 제어, 단계적 검증 등을 통해 향상된 보안 관리 체계를 완성한다는 계획이다.</p>\n<p>김계연 지니언스 CTO/미국법인장은 “아프리카 지역의 사이버 위협 증가에 따라 NAC 솔루션 및 서비스의 수요가 증가하고 있다”며 “IoT, BYOD, 원격근무 환경에 따른 단말의 증가가 시장 성장의 요인이 되고 있다”고 밝혔다.</p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 아프리카 케냐 로스쿨에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 지난 3월 세계적인 정보보안 강국인 이스라엘 건설사에 NAC를 공급한 것을 비롯해 글로벌 고객을 지속적으로 확보하고 있다.\n\n케냐 로스쿨은 광대역 통신망(WAN)을 통해 다양한 지역의 직원, 학생을 연결...", "full_text": "통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 아프리카 케냐 로스쿨에 네트워크 접근 제어 솔루션 ‘지니안 NAC’를 공급했다고 밝혔다. 지난 3월 세계적인 정보보안 강국인 이스라엘 건설사에 NAC를 공급한 것을 비롯해 글로벌 고객을 지속적으로 확보하고 있다.\n\n케냐 로스쿨은 광대역 통신망(WAN)을 통해 다양한 지역의 직원, 학생을 연결해 왔다. BYOD(Bring Your Own Device) 확대에 따라 다양한 단말이 학내 네트워크에 접속하고, 이동성 향상, 원격접속의 증가했다. 단말의 증가와 함께 위협 역시 증가하여 내부 자산과 사용자를 보호하고 학내 자원을 안전하게 사용할 수 있는 보다 강화된 보안 정책이 요구됐다.\n\n케냐 로스쿨은 강력한 인증을 통해 자산과 사용자를 식별하고 네트워크 접근에 대한 권한을 차등 부여하는 등 사용자의 단말 상태를 점검 및 조치하여 보다 안전한 네트워크 환경 완비를 위해 NAC 솔루션 도입에 착수했다. 지니언스를 포함해 글로벌 상위권 벤더의 제품을 꼼꼼히 살폈다. 구축형·매니지드 서비스・클라우드 등 고객의 환경에 적합한 서비스 포트폴리오 제공, 제품의 손쉬운 설치와 운영 부분에서 지니언스가 높은 점수를 받았다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EA%B7%B8%EB%A6%BC-1-Genians-NAC-Africa-1024x536.jpg?width=715&height=374&name=%EA%B7%B8%EB%A6%BC-1-Genians-NAC-Africa-1024x536.jpg)\n\n지니언스의 NAC 솔루션 ‘지니안 NAC’는 단말의 가시성 확보를 통해 위협에 대응하고 내부 네트워크의 보안관리를 완성할 수 있는 제품이다. 어떤 네트워크 환경에서도 구조 변경 없이 작동되는 네트워크 센서로 연결된 모든 기기들의 정보를 자동으로 탐지, 식별, 분류한다. 네트워크 접근계층에서 연결된 모든 기기들을 실시간 모니터하며, 보안취약 및 사이버위협에 노출된 기기들을 적시적소에 관리 할 수 있다. 이 차세대 기능은 제로 트러스트 네트워크를 구축하는데 기반이 될 수 있다.\n\n케냐 로스쿨은 NAC 도입을 통해 네트워크에 접속하는 단말의 가시성 확보를 기본으로 다양한 형태의 제어, 단계적 검증 등을 통해 향상된 보안 관리 체계를 완성한다는 계획이다.\n\n김계연 지니언스 CTO/미국법인장은 “아프리카 지역의 사이버 위협 증가에 따라 NAC 솔루션 및 서비스의 수요가 증가하고 있다”며 “IoT, BYOD, 원격근무 환경에 따른 단말의 증가가 시장 성장의 요인이 되고 있다”고 밝혔다.\n\n|  |\n|"}, {"title": "지니언스, EDR 누적 고객 72곳…국내 최다 고객 확보", "date": "2021.08.31", "link": "https://www.genians.co.kr/pr-room/press/20210820_edr_customer", "category": "EDR", "body_html": "<h3>2021년 상반기 EDR 공급 노드 수, 전년 동기 대비 57% 성장</h3>\n<h3>산업별 대표 레퍼런스 확보, EDR 시장 선점</h3>\n<h3>고도화되고 지능화된 사이버 위협에 적극 대응하여 차세대 정보보안 리더십 확고</h3>\n<p>통합 보안 플랫폼 기업 지니언스(263860, 대표이사 이동범)가 국내 최다 EDR 고객을 확보하고 하반기 시장 공략에 박차를 가하고 있다. 지니언스는 2017년 국내 최초로 자체 개발한 EDR 솔루션 ‘<a href=\"https://genians.co.kr/products/genian-edr-insights-e/\">지니안 인사이츠 E</a>’를 선보인 이래 국내 최대 규모의 NH농협은행 EDR 사업 수주와 함께 공공·금융의 대형 레퍼런스를 확보하면서 시장을 선점해 왔다.</p>\n<p>2021년에는 광주은행, DB손해보험을 비롯해 금융권에서만 3곳의 신규 레퍼런스를 확보했으며 중앙부처, 지자체, 공사 등 다수의 공공기관에 EDR을 공급했다. 2021년 상반기 기준 EDR 공급 노드 수는 전년동기 대비 57% 증가했다. 단순히 양적 성장뿐이 아니다. 기존 도입 기업의 확장 수요, 외산 솔루션에 대한 윈백, 시범 사업의 성공적 마무리에 따른 본 사업 수주 등 질적으로 톡톡한 성과를 기록하고 있다.</p>\n<p>단말 가시성확보, 신변종 악성코드와 이상행위 탐지, 위협경로 파악 등 EDR 제품 고유에 대한 수요는 물론, 재택근무 보안 환경의 대안으로도 EDR이 주목을 받았다. 재택근무 사용자의 보안성 강화를 위한 조치로 현재까지 엔드포인트에 설치된 제품은 안티바이러스 솔루션이 유일하다. 이상 행위 및 파일의 흐름을 알 수 있다는 점에서 선도적인 기업을 중심으로 재택근무 보안 강화를 위해 EDR 검토가 증가하고 있다.</p>\n<p>지니언스는 시장 영향력이 있는 핵심 사업을 잇따라 수주한 것을 발판으로 시장 및 고객 요구에 기반한 EDR 로드맵 제시로 시장을 확대한다는 전략이다. 하이엔드 시장 선점 확대로 EDR 1위 기업 이미지를 강화하고 정부 부처, 대기업의 그룹사로의 확장 수요, 제 1금융권의 신규 수요와 2금융권의 메이저 레퍼런스를 확보하여 차세대 성장의 큰 틀을 확고히 한다는 계획이다.</p>\n<p>사용한 만큼 지불하는 구독형 서비스 모델을 정착하여 안정적인 수익을 확보를 통해 지속 가능 기업으로서의 위상을 높여 고객 및 투자자에게 신뢰받는 기업으로 거듭난다는 계획이다.</p>\n<p>2021년 하반기에는 금융권 보안 관제 고도화에 따른 엔드포인트 관제 범위 확대, 제조업은 내부 인프라 환경 변화에 대응하기 위해 따라 EDR 수요에 적극 대응한다는 계획이다. 주요 중앙부처에 EDR 도입을 진행한 만큼 미도입 정부 부처 및 지자체에 대한 성과가 있을 것으로 예상하고 있다</p>\n<p>이동범 지니언스 대표는 “지니언스의 EDR 솔루션은 시장 요구에 근거하고 고객과 함께 발전하는 것이 가장 큰 경쟁력 이다”며 “지능형 공격, 랜섬웨어 등의 공격 위협을 탐지하고 공격의 징후, 공격의 진행 등을 추적하는 글로벌 수준의 기술력을 바탕으로 차세대 보안 시장의 경쟁력을 확고히 하겠다”고 밝혔다.</p>\n<p>|  |\n|</p>", 의 글로벌 리더인 포티넷코리아(대표 조원균, NASDAQ: FTNT)가 재택 및 원격 근무 기업 환경에 특화된 향상된 보안 솔루션 개발을 완료하고 공동 시장 개척에 나선다. 양사는 7월19일 서울 삼성동 포티넷코리아 본사에서 전략적 사업 협력을 위한 업무 협약(MOU)을 체결했다.</p>\n<p>코로나-19 장기화로 재택/원격 근무가 확산되면서 기업 내부 네트워크와 단말기, 사용자에 의한 보안 위협이 증가하고 있다. 상반기 주요 침해사고 원인 중 20.5%가 원격 근무로 인한 VPN 사용 증가에 따른 공격이었다. 전 세계적으로 고도화된 해킹 기술과 피싱, 사회공학적기법을 결합한 APT 공격, VPN 장비 취약점을 악용한 해킹 사고는 재택 근무 시대에 보다 고도화된 보안 해결책을 요구하고 있다.</p>\n<p>지니언스와 포티넷은 국가정보보안 기본 지침과 금융감독원 전자금융 감독규정 시행 세칙을 준수하는 원격 근무 보안 솔루션의 연동을 완료했다. 포티넷 고성능 VPN에 지니언스 NAC 솔루션의 강력한 단말 보안 기능을 결합했다. 원격지에 위치한 단말기를 대상으로 실시간 컴플라이언스 준수 여부 검사 및 통제, 시스템 자원 및 상태 모니터링을 가능하게 했다. 단말기의 보안 상태 점검 후 VPN 연결, VPN 연결 시에 일반 인터넷 차단, 강력한 추가 인증, 보안 정책 위반 시에는 VPN 강제 종료 등 보다 향상된 재택 근무자를 위한 시스템 구축이 가능하다.</p>\n<p>사이버 위협이 진화함에 따라 단일 보안 솔루션으로 위협 대응을 위한 충분한 정보를 획득하는 것은 사실상 불가능하다. 양사의 협력은 국내 NAC 1등 기업과 업계 선도 글로벌 보안 기업과의 협업이라는 점에서 일차적인 의의가 있다. 이미 양사 고객 중 다수가 재택 근무 환경을 위한 보안 강화 요구사항이 있는 만큼 기술제휴를 통해 향후 가시적인 비즈니스 성과를 얻을 수 있을 것으로 기대된다.</p>\n<p>또한, 양사는 시큐어원(대표이사 유형석) 등 양사 제품의 기술지원이 가능한 파트너사를 통해 신규 비즈니스 기회 창출에 시너지를 높이고 제 2금융권 및 병원, 중견 기업을 타깃으로 웨비나, 고객체험센터 운영 등 공동 마케팅을 진행할 계획이다.</p>\n<p>이동범 지니언스 대표는 “포티넷과 보다 고도화되고 안전한 재택근무 환경의 표준을 고객에게 제시할 수 있게 됐다”며 “고객들이 언제, 어디서나, 안전하고 손쉽게 서비스를 이용할 수 있도록 차세대 보안 분야의 협력을 더욱 강화해 나가겠다”고 밝혔다.</p>\n<p>조원균 포티넷코리아 지사장은 “코로나19 장기화로 인해 재택과 원격 근무 일상화라는 뉴노멀이 노멀이 된 시대가 도래했다”라고 말하며, “양사의 기존 고객은 물론 잠재 고객들의 다양한 보안 요구사항에 맞춤화된 강력한 보안 환경을 제공하는 양사 통합 솔루션을 제공할 것이다”라고 밝혔다.</p>\n<p><img alt=\"지니언스·포티넷 MOU\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%8F%AC%ED%8B%B0%EB%84%B7-MOU-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%82%AC%EC%A7%84-1024x682.jpg?width=1024&amp;height=682&amp;name=%EC%82%AC%EC%A7%84-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%ED%8F%AC%ED%8B%B0%EB%84%B7-MOU-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-%EC%82%AC%EC%A7%84-1024x682.jpg\" /></p>\n<p>|  |\n|</p>", "body_text": "통합 보안 플랫폼 기업 지니언스(대표 이동범, KOSDAQ: 263860)와 광범위하고 자동화된 통합 사이버보안 분야의 글로벌 리더인 포티넷코리아(대표 조원균, NASDAQ: FTNT)가 재택 및 원격 근무 기업 환
