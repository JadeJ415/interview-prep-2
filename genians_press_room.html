을 체결했다고 5일 밝혔다.</p>\n<p>지니안 Insights E는 최근 기승을 부리는 지능형 지속 공격(APT), 랜섬웨어(Ransomware) 등의 고도화된 해킹 공격으로부터 기존 보안 솔루션의 한계를 극복할 수 있는 솔루션이다. 알려지지 않은 공격 위협을 탐지하고, 공격의 징후, 진행사항 등을 추적할 수 있어 최근 금융권, 대기업 등에서 많은 관심을 보이고 있다.</p>\n<p>양사는 이번 계약체결을 통해 지니언스의 기술력과 SK인포섹의 영업 네트워크 및 융합보안 컨설팅 노하우를 활용하여 ‘지니안 Insights E’ 공급 확대를 위한 영업기회 발굴 및 마케팅, 기술지원 등 비즈니스 전반에 대한 상호협력을 강화해 나갈 예정이다. 양사의 협력이 초기 EDR 시장을 확대하고 선점하는데 시너지로 작용할 것으로 판단된다.</p>\n<p>SK인포섹은 국내 최대 정보보안기업으로 보안관제, 정보보호 컨설팅, 솔루션/보안SI 분야의 사업을 영위하고 있다. 최근에는 5G시대를 맞이하여 스마트시티, 스마트팩토리 분야에 필요한 융합보안 사업에 힘 쏟고 있다.</p>\n<p>지니언스는 2017년 국내 최초로 EDR 솔루션을 출시하였다. 올해 3월 조달청 나라장터에 최초로 등록 되었으며, 이후 하반기 금융권 최초 EDR 사업을 수주하는 등 시장 확대를 위한 발 빠른 행보를 보이고 있다.</p>\n<p>‘지니안 Insights E’ 는 단말을 위협하는 악성코드 및 이상행위를 신속하게 탐지, 분석, 대응할 수 있는 전문 EDR 솔루션 이다. 침해지표(IOC), 머신러닝(ML) 뿐 아니라 행위기반 엔진(XBA)을 탑재하여 전방위로 위협에 대응할 수 있다.</p>\n<p>황성익 SK인포섹 인더스트리(Industry)서비스센터장은 “EDR 도입 수요 증가세에 발맞춰 확고한 선두 사업자가 될 수 있도록 지니언스와 협력해 나갈 것”이라고 말했다.</p>\n<p>지니언스 이동석 부사장은 국내 최대 정보보안 업체와의 협업을 통해 “EDR 시장의 개화를 가속화 하고 시장에서의 입지를 더욱 강화하겠다” 라고 말했다.</p>", "body_text": "- EDR 시장 개화 가속 및 사업 확대를 위한 상호협력 강화\n\n- 지니언스 앞선 기술력과 SK인포섹 강력한 사업역량 더해 증가하는 EDR 수요 공략\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/SK_infosec-Genians_Partnership_3-1.jpg?width=1000&hei...", "full_text": "- EDR 시장 개화 가속 및 사업 확대를 위한 상호협력 강화\n\n- 지니언스 앞선 기술력과 SK인포섹 강력한 사업역량 더해 증가하는 EDR 수요 공략\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/SK_infosec-Genians_Partnership_3-1.jpg?width=1000&height=669&name=SK_infosec-Genians_Partnership_3-1.jpg)\n\n<사진 설명> 지니언스 EDR 제품 전국 판매를 위해 총판 계약을 체결한\n\n(왼쪽부터) 황성익 SK인포섹 센터장과 이동석 지니언스 부사장이 기념촬영을 하고 있다.\n\n2019년 08월 06일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.co](http://www.genians.co)m, 대표이사 이동범)가 SK인포섹([www.skinfosec.com](http://www.skinfosec.com), 대표이사 이용환)과 단말 이상행위 탐지 및 대응 솔루션(EDR) ‘지니안 Insights E’ 총판 계약을 체결했다고 5일 밝혔다.\n\n지니안 Insights E는 최근 기승을 부리는 지능형 지속 공격(APT), 랜섬웨어(Ransomware) 등의 고도화된 해킹 공격으로부터 기존 보안 솔루션의 한계를 극복할 수 있는 솔루션이다. 알려지지 않은 공격 위협을 탐지하고, 공격의 징후, 진행사항 등을 추적할 수 있어 최근 금융권, 대기업 등에서 많은 관심을 보이고 있다.\n\n양사는 이번 계약체결을 통해 지니언스의 기술력과 SK인포섹의 영업 네트워크 및 융합보안 컨설팅 노하우를 활용하여 ‘지니안 Insights E’ 공급 확대를 위한 영업기회 발굴 및 마케팅, 기술지원 등 비즈니스 전반에 대한 상호협력을 강화해 나갈 예정이다. 양사의 협력이 초기 EDR 시장을 확대하고 선점하는데 시너지로 작용할 것으로 판단된다.\n\nSK인포섹은 국내 최대 정보보안기업으로 보안관제, 정보보호 컨설팅, 솔루션/보안SI 분야의 사업을 영위하고 있다. 최근에는 5G시대를 맞이하여 스마트시티, 스마트팩토리 분야에 필요한 융합보안 사업에 힘 쏟고 있다.\n\n지니언스는 2017년 국내 최초로 EDR 솔루션을 출시하였다. 올해 3월 조달청 나라장터에 최초로 등록 되었으며, 이후 하반기 금융권 최초 EDR 사업을 수주하는 등 시장 확대를 위한 발 빠른 행보를 보이고 있다.\n\n‘지니안 Insights E’ 는 단말을 위협하는 악성코드 및 이상행위를 신속하게 탐지, 분석, 대응할 수 있는 전문 EDR 솔루션 이다. 침해지표(IOC), 머신러닝(ML) 뿐 아니라 행위기반 엔진(XBA)을 탑재하여 전방위로 위협에 대응할 수 있다.\n\n황성익 SK인포섹 인더스트리(Industry)서비스센터장은 “EDR 도입 수요 증가세에 발맞춰 확고한 선두 사업자가 될 수 있도록 지니언스와 협력해 나갈 것”이라고 말했다.\n\n지니언스 이동석 부사장은 국내 최대 정보보안 업체와의 협업을 통해 “EDR 시장의 개화를 가속화 하고 시장에서의 입지를 더욱 강화하겠다” 라고 말했다."}, {"title": "지니언스, 2019년 국내 금융권 첫 EDR 구축사업 ‘미래에셋생명보험’ 수주", "date": "2019.06.24", "link": "https://www.genians.co.kr/pr-room/press/지니언스-2019년-국내-금융권-첫-edr-구축사업-미래에셋", "category": "EDR", "body_html": "<ul>\n<li>\n<p>국내 금융권 관심 증가하며 시작된 올해 첫 EDR 구축사업 ‘미래에셋생명보험’</p>\n</li>\n<li>\n<p>글로벌 EDR 업체와의 치열한 경쟁 속에서 이뤄낸 국산 EDR 솔루션의 쾌거</p>\n</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/I_E-3.jpg?width=473&amp;height=473&amp;name=I_E-3.jpg\" /></p>\n<p>지니언스의 지니안 인사이츠 E(Genian Insights E)</p>\n<p>종합 보안 소프트웨어 개발기업 지니언스(<a href=\"http://www.genians.co\">www.genians.co</a>m, 대표이사 이동범)가 국내 굴지의 생명보험사인 ‘미래에셋생명보험(Mirae Asset Life Insurance Co., Ltd.)의 ‘행위기반 분석 시스템 구축사업’을 지니안 인사이츠 E(이하 ‘Genian Insights E’)로 수주했다.</p>\n<p>이번 사업은 올해 첫 진행된 금융권 EDR 구축사업으로 많은 금융기관의 관심이 주목된 가운데 글로벌 외산 제품들과의 경쟁에서 순수 국내기술로 개발된 지니언스의 Genian Insights E 제품이 선정된 데 의미가 있다.</p>\n<p>‘미래에셋생명보험’ 이상행위 분석 시스템 구축사업은 최고 보안등급을 요구하는 금융권의 특성상 장기간 제품 검토를 진행한 것으로 알려졌다. 해킹, 악성코드 등으로 인한 이상 징후 탐지 및 대응을 위한 추적관리 시스템의 필요와 탐지 이후 단말에 대한 자동격리, 네트워크 차단이 주요 요구사항이었다. Genian Insights E는 해당 요구사항을 모두 충족하는 점은 물론 금융권 단말들의 에이전트 추가 설치 문제를 해결하여 높은 점수를 획득한 것으로 알려졌다.</p>\n<p>Genian Insights E는 단말을 위협하는 다양한 악성코드 및 이상행위를 신속하게 탐지, 분석, 대응할 수 있는 ‘단말 기반 지능형 위협 탐지 및 대응(EDR) 솔루션’ 이다. 최신 침해 지표(IOC), 머신 러닝(ML)뿐 아니라 행위기반 엔진(XBA)을 탑재하여 위협을 탐지한다.</p>\n<p>특히 행위기반 엔진은 2018년 인수 합병한 레드스톤소프트의 핵심역량의 결정체로 올해 초 제품 내 통합이 완료되었다. 이를 통해 침해지표나 머신러닝으로는 탐지가 불가능한 파일리스(File-Less) 공격이나 권한상승, 횡적확산(Lateral Movement) 등의 ‘위협행위’를 추가로 탐지하여 대응할 수 있게 되었다. 아울러 이번 행위기반 분석시스템 구축사업의 수주를 통하여 행위기반 기술의 완성을 시장에서 검증 받는 계기가 되었다.</p>\n<p>지니언스의 이동범 대표이사는 “미래에셋생명보험의 수주는 장기간의 투자와 연구개발의 결과로 Genian Insights E 제품이 본 궤도에 오르고 있음을 반증하는 것” 이라며 “국내 NAC 시장과 마찬가지로 초기 외산 제품과의 경쟁에서 승리한 저력이 있는 만큼 EDR 시장 역시 또 한번의 성공 신화를 써 보겠다” 라고 말했다.</p>", "body_text": "- 국내 금융권 관심 증가하며 시작된 올해 첫 EDR 구축사업 ‘미래에셋생명보험’\n\n- 글로벌 EDR 업체와의 치열한 경쟁 속에서 이뤄낸 국산 EDR 솔루션의 쾌거\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/I_E-3.jpg?width=473&height=473&name=I_E-3.jpg...", "full_text": "- 국내 금융권 관심 증가하며 시작된 올해 첫 EDR 구축사업 ‘미래에셋생명보험’\n\n- 글로벌 EDR 업체와의 치열한 경쟁 속에서 이뤄낸 국산 EDR 솔루션의 쾌거\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/I_E-3.jpg?width=473&height=473&name=I_E-3.jpg)\n\n지니언스의 지니안 인사이츠 E(Genian Insights E)\n\n종합 보안 소프트웨어 개발기업 지니언스([www.genians.co](http://www.genians.co)m, 대표이사 이동범)가 국내 굴지의 생명보험사인 ‘미래에셋생명보험(Mirae Asset Life Insurance Co., Ltd.)의 ‘행위기반 분석 시스템 구축사업’을 지니안 인사이츠 E(이하 ‘Genian Insights E’)로 수주했다.\n\n이번 사업은 올해 첫 진행된 금융권 EDR 구축사업으로 많은 금융기관의 관심이 주목된 가운데 글로벌 외산 제품들과의 경쟁에서 순수 국내기술로 개발된 지니언스의 Genian Insights E 제품이 선정된 데 의미가 있다.\n\n‘미래에셋생명보험’ 이상행위 분석 시스템 구축사업은 최고 보안등급을 요구하는 금융권의 특성상 장기간 제품 검토를 진행한 것으로 알려졌다. 해킹, 악성코드 등으로 인한 이상 징후 탐지 및 대응을 위한 추적관리 시스템의 필요와 탐지 이후 단말에 대한 자동격리, 네트워크 차단이 주요 요구사항이었다. Genian Insights E는 해당 요구사항을 모두 충족하는 점은 물론 금융권 단말들의 에이전트 추가 설치 문제를 해결하여 높은 점수를 획득한 것으로 알려졌다.\n\nGenian Insights E는 단말을 위협하는 다양한 악성코드 및 이상행위를 신속하게 탐지, 분석, 대응할 수 있는 ‘단말 기반 지능형 위협 탐지 및 대응(EDR) 솔루션’ 이다. 최신 침해 지표(IOC), 머신 러닝(ML)뿐 아니라 행위기반 엔진(XBA)을 탑재하여 위협을 탐지한다.\n\n특히 행위기반 엔진은 2018년 인수 합병한 레드스톤소프트의 핵심역량의 결정체로 올해 초 제품 내 통합이 완료되었다. 이를 통해 침해지표나 머신러닝으로는 탐지가 불가능한 파일리스(File-Less) 공격이나 권한상승, 횡적확산(Lateral Movement) 등의 ‘위협행위’를 추가로 탐지하여 대응할 수 있게 되었다. 아울러 이번 행위기반 분석시스템 구축사업의 수주를 통하여 행위기반 기술의 완성을 시장에서 검증 받는 계기가 되었다.\n\n지니언스의 이동범 대표이사는 “미래에셋생명보험의 수주는 장기간의 투자와 연구개발의 결과로 Genian Insights E 제품이 본 궤도에 오르고 있음을 반증하는 것” 이라며 “국내 NAC 시장과 마찬가지로 초기 외산 제품과의 경쟁에서 승리한 저력이 있는 만큼 EDR 시장 역시 또 한번의 성공 신화를 써 보겠다” 라고 말했다."}, {"title": "지니언스, 전세계 11개국 19개 파트너 참가하며 APAC Partner Summit 2019 성료", "date": "2019.06.13", "link": "https://www.genians.co.kr/pr-room/press/지니언스-전세계-11개국-19개-파트너-참가하며-apac-partner-summit-2019-성", "category": "비즈니스 & 성과", "body_html": "<p>-IoT 환경에서 적용 가능한 Next-Gen NAC로 글로벌 시장 공략<br />\n -글로벌 파트너 대상 판매 정책 및 신제품 세일즈 가이드 소개  </p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/a1.jpg?width=700&amp;height=525&amp;name=a1.jpg\" /></p>\n<p>2019년 6월 13일 - 종합 보안 소프트웨어 개발기업 지니언스(<a href=\"http://www.genians.com/\">www.genians.com</a>, 대표이사 이동범)는 6월 11일부터 13일까지 말레이시아 쿠알라룸푸르 리츠칼튼 호텔에서 Genians APAC Summit 2019 행사를 개최했다고 밝혔다. 이번 행사는 지니언스의 전세계 11개국 19개 파트너 사에서 자발적으로 참가한 행사로, 지니언스의 차세대 네트워크 접근 제어(이하 Next-Gen NAC) 솔루션 시장의 ‘글로벌 시장 진출 가속화’ 역할을 할 것으로 기대된다.</p>\n<p>지니언스는 이번 3일간의 행사를 통해 2019년 시행되는 글로벌 파트너 정책과 신제품(Next-Gen NAC) 교육 및 마케팅 전략, 판매 전략을 발표했다. 또한 파트너 자격검증 테스트 진행 및 우수한 매출실적을 달성한 파트너에 대한 시상도 함께 진행했다. 세부일정으로 1일차 행사에서는 이동범 대표이사의‘지니언스의 차세대 글로벌 파트너십’에 관한 기조연설을 시작으로 김계연 미국법인장의 마케팅 전략, 성공사례 발표가 진행되었다. 또한 지니언스의 Next-Gen NAC을 중심으로, 기술파트너인 128 Technology(SD-WAN)’, ‘Seceon(SIEM)‘의 패널들과 함께 ‘제로 트러스트 보안(Zero Trust Security) 구축하기’라는 주제로 토의를 진행하여 글로벌 파트너들에게 많은 관심을 받았다. 특히 태국, 말레이시아 등 파트너들이 발표한 성공적인 구축 사례가 전세계 파트너들로부터 높은 호응을 얻었다고 밝혔다.</p>\n<p>이 행사에서 지니언스는 ▲글로벌 파트너와의 긴밀한 협력 강화 ▲IT환경 변화에 따른 NAC 기능의 확장(IT에서 OT 및 IoT) ▲실시간 단말의 가시성 확보를 위한 디바이스 플랫폼 인텔리전스(Device Platform Intelligence 이하, DPI) 등을 강조했다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/a4.jpg?width=702&amp;height=395&amp;name=a4.jpg\" /></p>\n<p>이동범 지니언스 대표이사는 2019년 글로벌 비즈니스 로드맵을 설명한 ‘Genians Journey with Next-Generation Partnerships’ 발표를 통해 “파트너사와의 긴밀한 협업 속에 지속적으로 성장할 수 있었다. APAC 파트너 서밋은 글로벌 파트너가 한 자리에 모여 IoT 시대에 NAC가 얼마나 필요한지, 그리고 지니언스의 차세대 NAC가 현재와 미래의 도전 과제를 해결하는 데 최고의 해결책이 될 수 있는지를 공유하였다”며 “올해는 신제품인 Next-Gen NAC가 출시된 만큼 글로벌 파트너와 함께 한 단계 성장할 수 있는 기회를 만들기 위해 총력을 기울일 것”이라고 밝혔다.</p>", "body_text": "-IoT 환경에서 적용 가능한 Next-Gen NAC로 글로벌 시장 공략  \n -글로벌 파트너 대상 판매 정책 및 신제품 세일즈 가이드 소개  \n   \n ![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/a1.jpg?width=700&height=525&name=a1.jpg)\n\n2019년 6월 1...", "full_text": "-IoT 환경에서 적용 가능한 Next-Gen NAC로 글로벌 시장 공략  \n -글로벌 파트너 대상 판매 정책 및 신제품 세일즈 가이드 소개  \n   \n ![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/a1.jpg?width=700&height=525&name=a1.jpg)\n\n2019년 6월 13일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.com](http://www.genians.com/), 대표이사 이동범)는 6월 11일부터 13일까지 말레이시아 쿠알라룸푸르 리츠칼튼 호텔에서 Genians APAC Summit 2019 행사를 개최했다고 밝혔다. 이번 행사는 지니언스의 전세계 11개국 19개 파트너 사에서 자발적으로 참가한 행사로, 지니언스의 차세대 네트워크 접근 제어(이하 Next-Gen NAC) 솔루션 시장의 ‘글로벌 시장 진출 가속화’ 역할을 할 것으로 기대된다.\n\n지니언스는 이번 3일간의 행사를 통해 2019년 시행되는 글로벌 파트너 정책과 신제품(Next-Gen NAC) 교육 및 마케팅 전략, 판매 전략을 발표했다. 또한 파트너 자격검증 테스트 진행 및 우수한 매출실적을 달성한 파트너에 대한 시상도 함께 진행했다. 세부일정으로 1일차 행사에서는 이동범 대표이사의‘지니언스의 차세대 글로벌 파트너십’에 관한 기조연설을 시작으로 김계연 미국법인장의 마케팅 전략, 성공사례 발표가 진행되었다. 또한 지니언스의 Next-Gen NAC을 중심으로, 기술파트너인 128 Technology(SD-WAN)’, ‘Seceon(SIEM)‘의 패널들과 함께 ‘제로 트러스트 보안(Zero Trust Security) 구축하기’라는 주제로 토의를 진행하여 글로벌 파트너들에게 많은 관심을 받았다. 특히 태국, 말레이시아 등 파트너들이 발표한 성공적인 구축 사례가 전세계 파트너들로부터 높은 호응을 얻었다고 밝혔다.\n\n이 행사에서 지니언스는 ▲글로벌 파트너와의 긴밀한 협력 강화 ▲IT환경 변화에 따른 NAC 기능의 확장(IT에서 OT 및 IoT) ▲실시간 단말의 가시성 확보를 위한 디바이스 플랫폼 인텔리전스(Device Platform Intelligence 이하, DPI) 등을 강조했다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/a4.jpg?width=702&height=395&name=a4.jpg)\n\n이동범 지니언스 대표이사는 2019년 글로벌 비즈니스 로드맵을 설명한 ‘Genians Journey with Next-Generation Partnerships’ 발표를 통해 “파트너사와의 긴밀한 협업 속에 지속적으로 성장할 수 있었다. APAC 파트너 서밋은 글로벌 파트너가 한 자리에 모여 IoT 시대에 NAC가 얼마나 필요한지, 그리고 지니언스의 차세대 NAC가 현재와 미래의 도전 과제를 해결하는 데 최고의 해결책이 될 수 있는지를 공유하였다”며 “올해는 신제품인 Next-Gen NAC가 출시된 만큼 글로벌 파트너와 함께 한 단계 성장할 수 있는 기회를 만들기 위해 총력을 기울일 것”이라고 밝혔다."}, {"title": "지니언스, Next-Gen NAC 솔루션으로 유럽 공략 Infosecurity Europe 2019 성업 기대", "date": "2019.06.05", "link": "https://www.genians.co.kr/pr-room/press/지니언스-next-gen-nac-솔루션으로-유럽-공략-infosecurity-europe-2019-성업-기대", "category": "NAC", "body_html": "<p>- 미국, APAC에 이어 유럽, 중동지역 대상 사업영역 확대<br />\n - 클라우드 NAC 외 128T, Seceon 공동개발 신제품 전시<br />\n - SD-WAN과 AI기반 SIEM의 협업과 연동으로 진화한 Next-Gen NAC  </p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Infosecurity-Europe-2019_3.jpg?width=699&amp;height=524&amp;name=Infosecurity-Europe-2019_3.jpg\" /></p>\n<p>2019년 6월 5일 - 종합 보안 소프트웨어 개발기업 지니언스(<a href=\"http://www.genians.com/\">www.genians.com</a>, 대표이사 이동범)가 6월 4일부터 6일까지 영국 런던(Olympia London)에서 열리는 Infosecurity Europe 2019에 참가해 행사를 진행한다고 밝혔다. Infosecurity Europe은 정보보안을 전문으로 하는 유럽 최대 규모의 정보보안 행사이며, 유럽지역 정보보안시장의 진출 창구로 가장 큰 기대효과를 가지고 있다.</p>\n<p>지니언스는 이번 행사에서 글로벌 파트너들과 공동으로 개발한 차세대 네트워크 접근 제어 (이하 Next-Gen NAC) 솔루션의 데모 시연을 진행하며, 유럽 및 중동지역을 중심으로 글로벌 파트너와의 비즈니스 상담 준비를 모두 마쳤다고 설명했다.</p>\n<p>특히 이번에 전시되는 Next-Gen NAC 솔루션은 SD-WAN 솔루션을 보유한 라우팅 분야의 선두기업인 미국 ‘128 Technology’와 인공지능(AI) 및 머신 러닝(ML) 기반의 보안 정보 및 이벤트 관리(SIEM) 솔루션을 제공하는 ‘Seceon’과 공동으로 개발한 솔루션이다. 글로벌 파트너와의 상호보완적인 협업을 통해NAC 솔루션의 핵심역량을 강화하고, 사업영역을 수평적으로 확대할 수 있으며, Next-Gen NAC 솔루션의 영역을 선점할 수 있는 시너지 효과가 기대된다.  </p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Infosecurity-Europe-2019_1.jpg?width=701&amp;height=341&amp;name=Infosecurity-Europe-2019_1.jpg\" /><br />\n [Genian Next-Gen NAC 데모 시연 및 비즈니스 상담]</p>\n<p>이번 전시된 솔루션은 최근 미국 대형 매니지드 서비스 사업자(Managed Service Providers 이하, MSP)와의 계약이 체결되었으며, 미국을 비롯한 APAC 등 여러 국가의 사업자들에게 많은 관심을 받고 있다. 글로벌 벤더들과의 협업 및 연동을 더욱 증진하고, 클라우드 및 사물인터넷 환경에 적합한 Next-Gen NAC를 찾는 MSP, SME, 대기업 고객의 발굴을 위해 공격적인 마케팅 활동을 펼칠 예정이다.</p>\n<p>이 행사에서 지니언스는 ▲중소∙중견 기업을 위한 클라우드 기반의 NAC(NAC-as-a-Service) ▲실시간 단말의 가시성 확보를 통한 사물인터넷 환경에 대비할 수 있는 디바이스 플랫폼 인텔리전스(Device Platform Intelligence 이하, DPI) ▲글로벌 파트너와의 협업 및 연동을 통해 MSP가 공급하기 편리한 Next-Gen NAC 임을 강조했다.</p>\n<p>김계연 지니언스 미국법인장은 “전통적인 802.1x 기반의 NAC는 사물인터넷 환경에서 네트워크의 가시성을 확보하고, 유지관리를 진행하는데 어려운 문제가 있어 더 이상 기업의 요구 사항을 만족시키기에 적합하지 않다”며 “DPI 기술을 중심으로 네트워크 가시성 향상 및 접근 제어를 개선한 클라우드 기반 차세대 네트워크 접근 제어 솔루션으로 SME 뿐만 아니라 MSP, 대기업 등 다양한 환경에 적합한 서비스를 바탕으로 유럽, 중동지역을 포함한 글로벌 시장 확대에 적극적으로 나설 것”이라고 밝혔다.</p>", "body_text": "- 미국, APAC에 이어 유럽, 중동지역 대상 사업영역 확대  \n - 클라우드 NAC 외 128T, Seceon 공동개발 신제품 전시  \n - SD-WAN과 AI기반 SIEM의 협업과 연동으로 진화한 Next-Gen NAC  \n   \n ![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Infos...", "full_text": "- 미국, APAC에 이어 유럽, 중동지역 대상 사업영역 확대  \n - 클라우드 NAC 외 128T, Seceon 공동개발 신제품 전시  \n - SD-WAN과 AI기반 SIEM의 협업과 연동으로 진화한 Next-Gen NAC  \n   \n ![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Infosecurity-Europe-2019_3.jpg?width=699&height=524&name=Infosecurity-Europe-2019_3.jpg)\n\n2019년 6월 5일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.com](http://www.genians.com/), 대표이사 이동범)가 6월 4일부터 6일까지 영국 런던(Olympia London)에서 열리는 Infosecurity Europe 2019에 참가해 행사를 진행한다고 밝혔다. Infosecurity Europe은 정보보안을 전문으로 하는 유럽 최대 규모의 정보보안 행사이며, 유럽지역 정보보안시장의 진출 창구로 가장 큰 기대효과를 가지고 있다.\n\n지니언스는 이번 행사에서 글로벌 파트너들과 공동으로 개발한 차세대 네트워크 접근 제어 (이하 Next-Gen NAC) 솔루션의 데모 시연을 진행하며, 유럽 및 중동지역을 중심으로 글로벌 파트너와의 비즈니스 상담 준비를 모두 마쳤다고 설명했다.\n\n특히 이번에 전시되는 Next-Gen NAC 솔루션은 SD-WAN 솔루션을 보유한 라우팅 분야의 선두기업인 미국 ‘128 Technology’와 인공지능(AI) 및 머신 러닝(ML) 기반의 보안 정보 및 이벤트 관리(SIEM) 솔루션을 제공하는 ‘Seceon’과 공동으로 개발한 솔루션이다. 글로벌 파트너와의 상호보완적인 협업을 통해NAC 솔루션의 핵심역량을 강화하고, 사업영역을 수평적으로 확대할 수 있으며, Next-Gen NAC 솔루션의 영역을 선점할 수 있는 시너지 효과가 기대된다.  \n   \n ![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Infosecurity-Europe-2019_1.jpg?width=701&height=341&name=Infosecurity-Europe-2019_1.jpg)  \n [Genian Next-Gen NAC 데모 시연 및 비즈니스 상담]\n\n이번 전시된 솔루션은 최근 미국 대형 매니지드 서비스 사업자(Managed Service Providers 이하, MSP)와의 계약이 체결되었으며, 미국을 비롯한 APAC 등 여러 국가의 사업자들에게 많은 관심을 받고 있다. 글로벌 벤더들과의 협업 및 연동을 더욱 증진하고, 클라우드 및 사물인터넷 환경에 적합한 Next-Gen NAC를 찾는 MSP, SME, 대기업 고객의 발굴을 위해 공격적인 마케팅 활동을 펼칠 예정이다.\n\n이 행사에서 지니언스는 ▲중소∙중견 기업을 위한 클라우드 기반의 NAC(NAC-as-a-Service) ▲실시간 단말의 가시성 확보를 통한 사물인터넷 환경에 대비할 수 있는 디바이스 플랫폼 인텔리전스(Device Platform Intelligence 이하, DPI) ▲글로벌 파트너와의 협업 및 연동을 통해 MSP가 공급하기 편리한 Next-Gen NAC 임을 강조했다.\n\n김계연 지니언스 미국법인장은 “전통적인 802.1x 기반의 NAC는 사물인터넷 환경에서 네트워크의 가시성을 확보하고, 유지관리를 진행하는데 어려운 문제가 있어 더 이상 기업의 요구 사항을 만족시키기에 적합하지 않다”며 “DPI 기술을 중심으로 네트워크 가시성 향상 및 접근 제어를 개선한 클라우드 기반 차세대 네트워크 접근 제어 솔루션으로 SME 뿐만 아니라 MSP, 대기업 등 다양한 환경에 적합한 서비스를 바탕으로 유럽, 중동지역을 포함한 글로벌 시장 확대에 적극적으로 나설 것”이라고 밝혔다."}, {"title": "지니언스, EDR 솔루션 ‘Genian Insights E ’조달청 나라장터 등록 완료 [19.03.19]", "date": "2019.03.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-edr-솔루션-genian-insights-e-조달청-나라장터-등록-완", "category": "EDR", "body_html": "<p>- 국내 EDR 솔루션 최초 조달청 나라장터 등록<br />\n - 선도적인 기술력과 서비스 안정성에 대한 공신력 입증</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-InsightE-1024x1024.jpg?width=469&amp;height=720&amp;name=Genian-InsightE-1024x1024.jpg\" /></p>\n<p>▲     지니언스의 지니안 인사이츠 E(Genian Insights E)</p>\n<p>2019년 03월 19일 - 종합 보안 소프트웨어 개발기업 지니언스(<a href=\"http://www.genians.co/\">www.genians.co</a>m, 대표이사 이동범)는 자사가 개발한 EDR(Endpoint Detection &amp; Response) 솔루션인 ‘지니안 인사이츠 E(Genian Insights E)’ 의 조달청 나라장터 등록이 완료됐다고 19일 밝혔다.</p>\n<p>이번에 등록이 완료된 제품은 ‘Genian Insights E v1.5 Client, 연간라이선스’, ‘Genian Insights E v1.5, 정책서버모듈’이 포함됐다.</p>\n<p>나라장터는 조달청에서 운영∙관리하는 국가종합전자조달시스템으로 엄격한 심사를 마친 제품 및 서비스만 등록 가능하다. 이번 조달청 나라장터 등록으로 국내 최초 EDR 솔루션을 개발한 지니언스의 선도적인 기술력과 서비스 안정성에 대한 공신력을 입증하였다.</p>\n<p>Genian Insights E는 사용자의 단말을 위협하는 다양한 악성코드 및 이상행위를 신속하게 탐지, 대응, 분석할 수 있는 ‘단말 기반 지능형 위협 탐지 및 대응(EDR) 솔루션’ 이다. 최신 침해 지표(IOC)뿐 아니라 머신 러닝(ML), 행위기반 엔진(XBA) 등을 탑재하여 지능형지속위협(APT), 랜섬웨어(Ransomware) 등의 지능형위협에 대한 신속한 탐지 및 대응이 가능하다.</p>\n<p>특히 지니언스의 NAC 제품과 함께 운용되어 사용자 및 단말의 접근제어뿐 아니라 위협에 대한 통합관리가 가능하여 내부보안관리를 위한 통합플랫폼으로 운영될 수 있다. NAC 와 통합(단일)에이전트를 사용하므로 도입 및 운영에 따른 관리자 부담과 사용자 충격을 최소화 할 수 있어 Insights E를 기 도입한 고객 사로부터 높은 평가를 받고 있다.  </p>\n<p>이미 공공 및 금융, 국방, 의료, 기업 등 산업전반에 걸쳐 30여 고객사를 확보하였으며, 현재 20여개사에서 데모, POC(기능검증) 등이 진행되고 있는 것으로 알려졌다.</p>\n<p>지니언스의 이동범 대표이사는 “국내 EDR 업계 최초의 조달청 나라장터 등록으로 Genian Insights E를 기관에서 보다 손쉽게 도입할 수 있게 되었다”며 “국내에서 최초로 EDR 솔루션을 출시한 기술력을 바탕으로 지속적인 R&amp;D를 통해 조달시장과 민수시장을 아우르고 글로벌 시장까지 적극 공략해 대한민국EDR 기술의 우수성을 널리 알릴 수 있도록 최선을 다하겠다” 라고 말했다.</p>", "body_text": "- 국내 EDR 솔루션 최초 조달청 나라장터 등록  \n - 선도적인 기술력과 서비스 안정성에 대한 공신력 입증\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-InsightE-1024x1024.jpg?width=469&height=720&name=Genian-InsightE-102...", "full_text": "- 국내 EDR 솔루션 최초 조달청 나라장터 등록  \n - 선도적인 기술력과 서비스 안정성에 대한 공신력 입증\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian-InsightE-1024x1024.jpg?width=469&height=720&name=Genian-InsightE-1024x1024.jpg)\n\n▲     지니언스의 지니안 인사이츠 E(Genian Insights E)\n\n2019년 03월 19일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.co](http://www.genians.co/)m, 대표이사 이동범)는 자사가 개발한 EDR(Endpoint Detection & Response) 솔루션인 ‘지니안 인사이츠 E(Genian Insights E)’ 의 조달청 나라장터 등록이 완료됐다고 19일 밝혔다.\n\n이번에 등록이 완료된 제품은 ‘Genian Insights E v1.5 Client, 연간라이선스’, ‘Genian Insights E v1.5, 정책서버모듈’이 포함됐다.\n\n나라장터는 조달청에서 운영∙관리하는 국가종합전자조달시스템으로 엄격한 심사를 마친 제품 및 서비스만 등록 가능하다. 이번 조달청 나라장터 등록으로 국내 최초 EDR 솔루션을 개발한 지니언스의 선도적인 기술력과 서비스 안정성에 대한 공신력을 입증하였다.\n\nGenian Insights E는 사용자의 단말을 위협하는 다양한 악성코드 및 이상행위를 신속하게 탐지, 대응, 분석할 수 있는 ‘단말 기반 지능형 위협 탐지 및 대응(EDR) 솔루션’ 이다. 최신 침해 지표(IOC)뿐 아니라 머신 러닝(ML), 행위기반 엔진(XBA) 등을 탑재하여 지능형지속위협(APT), 랜섬웨어(Ransomware) 등의 지능형위협에 대한 신속한 탐지 및 대응이 가능하다.\n\n특히 지니언스의 NAC 제품과 함께 운용되어 사용자 및 단말의 접근제어뿐 아니라 위협에 대한 통합관리가 가능하여 내부보안관리를 위한 통합플랫폼으로 운영될 수 있다. NAC 와 통합(단일)에이전트를 사용하므로 도입 및 운영에 따른 관리자 부담과 사용자 충격을 최소화 할 수 있어 Insights E를 기 도입한 고객 사로부터 높은 평가를 받고 있다.  \n   \n 이미 공공 및 금융, 국방, 의료, 기업 등 산업전반에 걸쳐 30여 고객사를 확보하였으며, 현재 20여개사에서 데모, POC(기능검증) 등이 진행되고 있는 것으로 알려졌다.\n\n지니언스의 이동범 대표이사는 “국내 EDR 업계 최초의 조달청 나라장터 등록으로 Genian Insights E를 기관에서 보다 손쉽게 도입할 수 있게 되었다”며 “국내에서 최초로 EDR 솔루션을 출시한 기술력을 바탕으로 지속적인 R&D를 통해 조달시장과 민수시장을 아우르고 글로벌 시장까지 적극 공략해 대한민국EDR 기술의 우수성을 널리 알릴 수 있도록 최선을 다하겠다” 라고 말했다."}, {"title": "지니언스, SD-WAN 결합한 차세대NAC 출시 [190305]", "date": "2019.03.05", "link": "https://www.genians.co.kr/pr-room/press/지니언스-sd-wan-결합한-차세대nac-출시-190305", "category": "NAC", "body_html": "<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/imc_0pswJE3azEo4ufkj-1.jpg?width=640&amp;height=480&amp;name=imc_0pswJE3azEo4ufkj-1.jpg\" /></p>\n<h5>지니언스가 미국 RSA컨퍼런스2019 현장에 시연 중인지니언NAC 신제품. 라우팅솔루션 전문업체 128테크놀로지와 공동개발한 기술을 탑재해 SD-WAN을 구현한 uCPE형 제품이다. [사진=지니언스]</h5>\n<p>[샌프란시스코(미국)=임민철 기자] 보안 소프트웨어(SW) 회사 지니언스가 네트워크접근제어(NAC) 제품 '지니안NAC(Genian NAC)' 시리즈 신제품을 통해 미국 보안솔루션 시장 공략을 가속하기로 했다.</p>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/imc_jOulKgLcjP7RHmUq.jpg?width=640&amp;height=335&amp;name=imc_jOulKgLcjP7RHmUq.jpg\" /></p>\n<p>4일(현지시간) 지니언스(대표 이동범)는 오는 8일까지 미국 샌프란시스코에서 열리는 RSA컨퍼런스2019에 참가해 글로벌 파트너들과 공동 솔루션 출시와 시연, 비즈니스 상담을 진행할 준비를 마쳤다고 밝혔다.</p>\n<p>신제품은 범용 하드웨어에 주요 기능을 선택적으로 구성하고 사용할 수 있는 SW를 결합한 '유니버설 커스터머 프레미스 이큅먼트(uCPE)' 플랫폼 기반 솔루션이다. 현지 협력사와 소프트웨어 정의 광역네트워크(SD-WAN) 기술을 품고 인공지능(AI) 기반 보안정보이벤트관리(SIEM) 솔루션을 탑재했다. 제품의 SD-WAN 기술은 미국 라우팅 기술업체 '128테크놀로지(128 Technology)'와 공동 개발한 결과물이다. 또 AI기반 SIEM 솔루션은 '세키온(Seceon)'과의 협력으로 탑재됐다.</p>\n<p>지니언스는 미국 대형 정유회사 상대로 제품 시연을 진행 중이며, 미국과 타 국가 통신사업자들로부터도 관심을 받고 있다고 밝혔다. 지니언스는 이런 글로벌 파트너와 협업을 통해 NAC 솔루션 핵심역량을 강화하고 차세대 네트워크 보안영역을 선점할 수 있을 것이라 기대했다.</p>\n<p>지니언스는 신제품 강점으로 사물인터넷 환경을 대비할 수 있는 실시간 단말 플랫폼 인텔리전스, 5G와 운영기술(OT) 등 신기술 트렌드에 대응하는 NAC, 글로벌 파트너와 협업 및 연동을 통해 매니지드서비스프로바이더(MSP)가 공급하기 편리한 차세대 NAC이라는 점을 꼽았다.</p>", "body_text": "![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/imc_0pswJE3azEo4ufkj-1.jpg?width=640&height=480&name=imc_0pswJE3azEo4ufkj-1.jpg)\n\n##### 지니언스가 미국 RSA컨퍼런스2019 현장에 시연 중인지니언NAC 신제품. 라우팅솔루션 전...", "full_text": "![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/imc_0pswJE3azEo4ufkj-1.jpg?width=640&height=480&name=imc_0pswJE3azEo4ufkj-1.jpg)\n\n##### 지니언스가 미국 RSA컨퍼런스2019 현장에 시연 중인지니언NAC 신제품. 라우팅솔루션 전문업체 128테크놀로지와 공동개발한 기술을 탑재해 SD-WAN을 구현한 uCPE형 제품이다. [사진=지니언스]\n\n[샌프란시스코(미국)=임민철 기자] 보안 소프트웨어(SW) 회사 지니언스가 네트워크접근제어(NAC) 제품 '지니안NAC(Genian NAC)' 시리즈 신제품을 통해 미국 보안솔루션 시장 공략을 가속하기로 했다.\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/imc_jOulKgLcjP7RHmUq.jpg?width=640&height=335&name=imc_jOulKgLcjP7RHmUq.jpg)\n\n4일(현지시간) 지니언스(대표 이동범)는 오는 8일까지 미국 샌프란시스코에서 열리는 RSA컨퍼런스2019에 참가해 글로벌 파트너들과 공동 솔루션 출시와 시연, 비즈니스 상담을 진행할 준비를 마쳤다고 밝혔다.\n\n신제품은 범용 하드웨어에 주요 기능을 선택적으로 구성하고 사용할 수 있는 SW를 결합한 '유니버설 커스터머 프레미스 이큅먼트(uCPE)' 플랫폼 기반 솔루션이다. 현지 협력사와 소프트웨어 정의 광역네트워크(SD-WAN) 기술을 품고 인공지능(AI) 기반 보안정보이벤트관리(SIEM) 솔루션을 탑재했다. 제품의 SD-WAN 기술은 미국 라우팅 기술업체 '128테크놀로지(128 Technology)'와 공동 개발한 결과물이다. 또 AI기반 SIEM 솔루션은 '세키온(Seceon)'과의 협력으로 탑재됐다.\n\n지니언스는 미국 대형 정유회사 상대로 제품 시연을 진행 중이며, 미국과 타 국가 통신사업자들로부터도 관심을 받고 있다고 밝혔다. 지니언스는 이런 글로벌 파트너와 협업을 통해 NAC 솔루션 핵심역량을 강화하고 차세대 네트워크 보안영역을 선점할 수 있을 것이라 기대했다.\n\n지니언스는 신제품 강점으로 사물인터넷 환경을 대비할 수 있는 실시간 단말 플랫폼 인텔리전스, 5G와 운영기술(OT) 등 신기술 트렌드에 대응하는 NAC, 글로벌 파트너와 협업 및 연동을 통해 매니지드서비스프로바이더(MSP)가 공급하기 편리한 차세대 NAC이라는 점을 꼽았다."}, {"title": "\"미국에서 폭발적 성장한 EDR, 이제 한국 차례\" [190208]", "date": "2019.02.08", "link": "https://www.genians.co.kr/pr-room/press/미국에서-폭발적-성장한-edr-이제-한국-차례-190208", "category": "EDR", "body_html": "<ul>\n<li>이동범 지니언스 대표…\"해외 시장 성과내는 한 해 될 것\"</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2019012911293636334_1-1.jpg?width=560&amp;height=420&amp;name=2019012911293636334_1-1.jpg\" /></p>\n<h5>이동범 지니언스 대표/사진=김주현 기자[머니투데이]</h5>\n<p>“지난 3년간 해외 사업에 집중했고 지난해 하반기부터 매출이 나오고 있습니다. 올해는 본격적으로 해외사업이 성장하는 한해가 될 겁니다.”</p>\n<p>이동범 지니언스 대표는 “해외에서는 EDR(엔드포인트 탐지·대응) 시장이 엄청나게 커졌고, 글로벌 주요 기업들도 폭발적 성장을 기록했다”며 “미국과 시차가 있는 국내 시장에서 이제 본격적으로 EDR시장이 형성될 것”이라며 이같이 밝혔다.</p>\n<p>2005년 설립된 지니언스는 네트워크 보안 전문기업이다. 네트워크 접근제어(NAC) 시장에서 이 회사의 경쟁력은 독보적이다. 국내 점유율 45%를 차지한다. 지난해에도 네트워크 접근제어(NAC) 분야 대형 사업을 수주했다. 이를 기반으로 국내 EDR 시장을 개척하는 한편, 미국을 비롯한 해외 진출에 주력해왔다. 최근에는 미국 현지법인 인력을 보강하고 국내 해외지원팀을 신설해 글로벌 사업에 보다 의욕을 보이고 있다.</p>\n<p>EDR은 엔드포인트 탐지·대응 솔루션으로 실시간 침입 감지와 분석, 대응기능까지 포함한다. 머신러닝을 탑재한 지니언스 EDR솔루션의 악성코드 탐지율은 전통적 백신에 비해 월등히 높다. 공공분야에서도 EDR 도입 움직임을 보이고 있다. 국세청이 EDR 제안 요청서를 준비 중이며, 경찰청과 검찰청도 도입을 검토하는 것으로 알려졌다. 올해 EDR시장 규모는 100억원을 웃돌 전망이다.</p>\n<p>해외 EDR 시장은 미국을 중심으로 수년 전부터 빠르게 팽창하고 있고 국내에선 지니언스를 선두로 안랩, 하우리 등이 관련 사업을 시작했다. 증권업계에 따르면 글로벌 EDR 시장은 2020년까지 약 15억 달러 규모로 성장할 전망이다.</p>\n<p>이 대표는 “현지 시장에서 자리잡은 국내 보안업체가 한곳도 없을 정도로 척박한 미국에서 첫 성공사례를 남기겠다”고 포부를 밝혔다. 이를 위해 지니언스는 국내 연구소장을 직접 미국법인에 상주시키며 현지 사업을 주도하고 있다. 지니언스가 2017년 코스닥시장에 상장한 것도 미국 공략을 위해서다.</p>\n<p>이 대표는 “해외 업체와 계약을 할 때 검증된 기업이라는 점을 보여줘야 했다”고 설명했다. 그러면서 “미국에서 사업을 진행하면서 18개국 24개 파트너와 계약을 체결했다”며 “국내에 머물렀다면 이룰 수 없었을 성과”라고 강조했다.</p>\n<p>한편 지니언스는 지난해 3분기까지 누적 영업이익 3억6900만원을 기록했다. 같은 기간 매출은 133억9000만원, 당기순이익은 8억9600만원을 올렸다.</p>", "body_text": "- 이동범 지니언스 대표…\"해외 시장 성과내는 한 해 될 것\"\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2019012911293636334_1-1.jpg?width=560&height=420&name=2019012911293636334_1-1.jpg)\n\n##### 이동범 지니언스 대표/...", "full_text": "- 이동범 지니언스 대표…\"해외 시장 성과내는 한 해 될 것\"\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2019012911293636334_1-1.jpg?width=560&height=420&name=2019012911293636334_1-1.jpg)\n\n##### 이동범 지니언스 대표/사진=김주현 기자[머니투데이]\n\n“지난 3년간 해외 사업에 집중했고 지난해 하반기부터 매출이 나오고 있습니다. 올해는 본격적으로 해외사업이 성장하는 한해가 될 겁니다.”\n\n이동범 지니언스 대표는 “해외에서는 EDR(엔드포인트 탐지·대응) 시장이 엄청나게 커졌고, 글로벌 주요 기업들도 폭발적 성장을 기록했다”며 “미국과 시차가 있는 국내 시장에서 이제 본격적으로 EDR시장이 형성될 것”이라며 이같이 밝혔다.\n\n2005년 설립된 지니언스는 네트워크 보안 전문기업이다. 네트워크 접근제어(NAC) 시장에서 이 회사의 경쟁력은 독보적이다. 국내 점유율 45%를 차지한다. 지난해에도 네트워크 접근제어(NAC) 분야 대형 사업을 수주했다. 이를 기반으로 국내 EDR 시장을 개척하는 한편, 미국을 비롯한 해외 진출에 주력해왔다. 최근에는 미국 현지법인 인력을 보강하고 국내 해외지원팀을 신설해 글로벌 사업에 보다 의욕을 보이고 있다.\n\nEDR은 엔드포인트 탐지·대응 솔루션으로 실시간 침입 감지와 분석, 대응기능까지 포함한다. 머신러닝을 탑재한 지니언스 EDR솔루션의 악성코드 탐지율은 전통적 백신에 비해 월등히 높다. 공공분야에서도 EDR 도입 움직임을 보이고 있다. 국세청이 EDR 제안 요청서를 준비 중이며, 경찰청과 검찰청도 도입을 검토하는 것으로 알려졌다. 올해 EDR시장 규모는 100억원을 웃돌 전망이다.\n\n해외 EDR 시장은 미국을 중심으로 수년 전부터 빠르게 팽창하고 있고 국내에선 지니언스를 선두로 안랩, 하우리 등이 관련 사업을 시작했다. 증권업계에 따르면 글로벌 EDR 시장은 2020년까지 약 15억 달러 규모로 성장할 전망이다.\n\n이 대표는 “현지 시장에서 자리잡은 국내 보안업체가 한곳도 없을 정도로 척박한 미국에서 첫 성공사례를 남기겠다”고 포부를 밝혔다. 이를 위해 지니언스는 국내 연구소장을 직접 미국법인에 상주시키며 현지 사업을 주도하고 있다. 지니언스가 2017년 코스닥시장에 상장한 것도 미국 공략을 위해서다.\n\n이 대표는 “해외 업체와 계약을 할 때 검증된 기업이라는 점을 보여줘야 했다”고 설명했다. 그러면서 “미국에서 사업을 진행하면서 18개국 24개 파트너와 계약을 체결했다”며 “국내에 머물렀다면 이룰 수 없었을 성과”라고 강조했다.\n\n한편 지니언스는 지난해 3분기까지 누적 영업이익 3억6900만원을 기록했다. 같은 기간 매출은 133억9000만원, 당기순이익은 8억9600만원을 올렸다."}, {"title": "이동범 지니언스 대표 \"2019년, EDR 시장 개척과 글로벌 시장 확대 강화\" [190116]", "date": "2019.01.16", "link": "https://www.genians.co.kr/pr-room/press/이동범-지니언스-대표-2019년-edr-시장-개척과-글로벌-시장", "category": "EDR", "body_html": "<ul>\n<li>전방위 위협 대응 체계 확보할 수 있는 EDR솔루션...2019년 화두될 것</li>\n</ul>\n<h5>▲ 이동범 지니언스 대표이사</h5>\n<p>지니언스는 지난해 EDR 시장 개척과 글로벌 시장 확대라는 2개 축을 중심으로 퀀텀 점프를 위한 착실한 준비기간을 가졌다. 올해는 본격적인 EDR 시장 개척을 위해 기술부설연구소 내 ‘EDR 개발실’을 확대, 개편했으며 산∙학∙연 협업을 통해 EDR 선도 기술을 주도하고 EDR의 영향력을 확대해 나갈 계획이다. 한편 미국 현지법인의 인력을 보강하고 국내 해외지원팀을 신설해 글로벌 시장 확대에도 총력을 기울일 전망이다.</p>\n<p>다음은 이동범 지니언스 대표와 일문일답 내용이다.</p>\n<p><strong>Q. 지니언스 2018년 주요 성과</strong></p>\n<p>-A: 2018년은 EDR 시장 개척과 글로벌 시장 확대라는 2개 축을 중심으로 퀀텀 점프를 위한 준비기간이었습니다. 첫 번째 축인 EDR 시장 개척을 위해 행위기반 탐지 기술을 보유하고 있는 ㈜레드스톤소프트를 M&amp;A해 '지니안 인사이츠 E(Genian Insights E)'의 기술 개발 속도를 높이고 완성도 측면에서 큰 성과를 내었습니다. 두번째 축인 글로벌 시장 확대를 위해 미국 현지법인과 국내 해외사업 TFT팀(개발,기술지원, 영업)을 보강해 18개국 24개의 파트너와 계약이 진행되었습니다. 미국, 아시아, 중동 등 전 세계적으로 글로벌 고객을 확보한 한 해였습니다.</p>\n<p><strong>Q. 지니언스 주력 솔루션에 대한 소개</strong></p>\n<p>-A: '지니안 NAC(Genian NAC)'는 내부 보안을 위한 기본 플랫폼으로 내부 자산과 사용자를 보호하기 위한 솔루션입니다. 사용자의 단말 보안 상태를 점검 및 조치해 IoT 환경에서 유∙무선을 아우르는 내부 보안 관리체계를 완성할 수 있습니다. 유선과 무선에 대한 모든 위협을 통합해 탐지하고, 다양한 단말기기에 대한 접근 제어를 수행해 보안 시너지를 극대화하며 내부 네트워크의 가시성을 보장합니다.</p>\n<p>'지니안 인사이츠 E(Genian Insights E)'는 사용자 단말(엔드포인트)의 가시성을 확보하고 이를 통해 지능형 위협의 탐지, 조사, 대응을 위한 솔루션입니다. 사용자의 행위부터 데이터 수준에 이르는 단계적이고 세밀한 가시성을 확보할 수 있습니다. 또한 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(UEBA), 야라(YARA)등의 다양한 기술이 적용되어 알려진 또는 알려지지 않은 모든 공격을 탐지하고 대응할 수 있습니다. 뿐만 아니라 단순히 위협의 탐지와 차단이 아닌 사고 대응, 위협 추적, 엔드포인트 컴플라이언스, 유연한 관리 콘솔 기능 등을 포함해 엔드포인트 보안 플랫폼으로 활용이 가능합니다.</p>\n<p><strong>Q. 2019년 EDR 시장에 대한 전망</strong></p>\n<p>-A: 엔드포인트 시장은 ‘네트워크 / 단말 / 사람’을 아우르는 종합적인 보안관리가 필요한 시점입니다. 더 이상 단위 보안 솔루션이나 형식적인 연동(loose coupled)으로는 현재의 위협에 대응할 수 없습니다. ‘지능형 위협의 탐지 및 대응, 전방위 가시성 확보, 보안관리 운용 효율화’를 목표로 전방위 위협 대응 체계를 확보할 수 있는 EDR솔루션이 2019년 화두가 될 것이며 본격적인 시장 역시 확대될 것입니다.</p>\n<p><strong>Q. 2019년 지니언스 사업 전략은</strong></p>\n<p>-A: 2019년은 EDR 시장 개척과 글로벌 시장 확대의 2개 축을 중심으로 도약의 원년입니다. 이를 위해 기존 TFT 형태의 조직을 전사 조직으로 확대 개편했습니다. EDR 시장 개척을 위해 기술부설연구소 내 ‘EDR 개발실’을 확대/개편했으며 산∙학∙연과의 협업을 통해 EDR 선도 기술을 주도하고자 합니다. 더불어 CTI 등 유관분야 (글로벌)기업들과의 협업을 통해 시장에서의 EDR의 영향력을 확대하고자 합니다.</p>\n<p>두번째 축인 글로벌 시장 확대를 위해 미국 현지법인의 인력을 보강하고 국내 해외지원팀을 신설했습니다. 전사적인 역량을 총 동원해 건실한 글로벌 파트너 및 고객을 확보해 나갈 계획입니다.</p>\n<p><strong>Q. 공공, 기업 보안실무자들에게 전하고 싶은 말</strong></p>\n<p>-A: 과거 네트워크 위주의 정보보안 투자가 지속되었으나 보안 사고는 여전히 증가하고 있으며, 특히 랜섬웨어 등 단말 및 사람과 연관된 보안사고는 큰 사회적 문제로 대두되고 있습니다. 이는 엔드포인트 보안의 패러다임이 ‘솔루션과 방어’에서 ‘관리와 대응’으로 변화해야 함을 의미합니다. 누수 없는 ‘위협대응 범위’와 ‘운용효율’을 고려한 포트폴리오가 필요한 시점이며, 특히 엔드포인트 관리에 필요한 EDR 솔루션을 도입해 안전한 사이버 환경을 유지해 주길 바랍니다.</p>", "body_text": "- 전방위 위협 대응 체계 확보할 수 있는 EDR솔루션...2019년 화두될 것\n\n##### ▲ 이동범 지니언스 대표이사\n\n지니언스는 지난해 EDR 시장 개척과 글로벌 시장 확대라는 2개 축을 중심으로 퀀텀 점프를 위한 착실한 준비기간을 가졌다. 올해는 본격적인 EDR 시장 개척을 위해 기술부설연구소 내 ‘EDR 개발실’을 확대, 개편했으며 산∙학∙연 협업...", "full_text": "- 전방위 위협 대응 체계 확보할 수 있는 EDR솔루션...2019년 화두될 것\n\n##### ▲ 이동범 지니언스 대표이사\n\n지니언스는 지난해 EDR 시장 개척과 글로벌 시장 확대라는 2개 축을 중심으로 퀀텀 점프를 위한 착실한 준비기간을 가졌다. 올해는 본격적인 EDR 시장 개척을 위해 기술부설연구소 내 ‘EDR 개발실’을 확대, 개편했으며 산∙학∙연 협업을 통해 EDR 선도 기술을 주도하고 EDR의 영향력을 확대해 나갈 계획이다. 한편 미국 현지법인의 인력을 보강하고 국내 해외지원팀을 신설해 글로벌 시장 확대에도 총력을 기울일 전망이다.\n\n다음은 이동범 지니언스 대표와 일문일답 내용이다.\n\n**Q. 지니언스 2018년 주요 성과**\n\n-A: 2018년은 EDR 시장 개척과 글로벌 시장 확대라는 2개 축을 중심으로 퀀텀 점프를 위한 준비기간이었습니다. 첫 번째 축인 EDR 시장 개척을 위해 행위기반 탐지 기술을 보유하고 있는 ㈜레드스톤소프트를 M&A해 '지니안 인사이츠 E(Genian Insights E)'의 기술 개발 속도를 높이고 완성도 측면에서 큰 성과를 내었습니다. 두번째 축인 글로벌 시장 확대를 위해 미국 현지법인과 국내 해외사업 TFT팀(개발,기술지원, 영업)을 보강해 18개국 24개의 파트너와 계약이 진행되었습니다. 미국, 아시아, 중동 등 전 세계적으로 글로벌 고객을 확보한 한 해였습니다.\n\n**Q. 지니언스 주력 솔루션에 대한 소개**\n\n-A: '지니안 NAC(Genian NAC)'는 내부 보안을 위한 기본 플랫폼으로 내부 자산과 사용자를 보호하기 위한 솔루션입니다. 사용자의 단말 보안 상태를 점검 및 조치해 IoT 환경에서 유∙무선을 아우르는 내부 보안 관리체계를 완성할 수 있습니다. 유선과 무선에 대한 모든 위협을 통합해 탐지하고, 다양한 단말기기에 대한 접근 제어를 수행해 보안 시너지를 극대화하며 내부 네트워크의 가시성을 보장합니다.\n\n'지니안 인사이츠 E(Genian Insights E)'는 사용자 단말(엔드포인트)의 가시성을 확보하고 이를 통해 지능형 위협의 탐지, 조사, 대응을 위한 솔루션입니다. 사용자의 행위부터 데이터 수준에 이르는 단계적이고 세밀한 가시성을 확보할 수 있습니다. 또한 침해사고지표(IOC), 머신러닝(ML), 행위기반 위협탐지(UEBA), 야라(YARA)등의 다양한 기술이 적용되어 알려진 또는 알려지지 않은 모든 공격을 탐지하고 대응할 수 있습니다. 뿐만 아니라 단순히 위협의 탐지와 차단이 아닌 사고 대응, 위협 추적, 엔드포인트 컴플라이언스, 유연한 관리 콘솔 기능 등을 포함해 엔드포인트 보안 플랫폼으로 활용이 가능합니다.\n\n**Q. 2019년 EDR 시장에 대한 전망**\n\n-A: 엔드포인트 시장은 ‘네트워크 / 단말 / 사람’을 아우르는 종합적인 보안관리가 필요한 시점입니다. 더 이상 단위 보안 솔루션이나 형식적인 연동(loose coupled)으로는 현재의 위협에 대응할 수 없습니다. ‘지능형 위협의 탐지 및 대응, 전방위 가시성 확보, 보안관리 운용 효율화’를 목표로 전방위 위협 대응 체계를 확보할 수 있는 EDR솔루션이 2019년 화두가 될 것이며 본격적인 시장 역시 확대될 것입니다.\n\n**Q. 2019년 지니언스 사업 전략은**\n\n-A: 2019년은 EDR 시장 개척과 글로벌 시장 확대의 2개 축을 중심으로 도약의 원년입니다. 이를 위해 기존 TFT 형태의 조직을 전사 조직으로 확대 개편했습니다. EDR 시장 개척을 위해 기술부설연구소 내 ‘EDR 개발실’을 확대/개편했으며 산∙학∙연과의 협업을 통해 EDR 선도 기술을 주도하고자 합니다. 더불어 CTI 등 유관분야 (글로벌)기업들과의 협업을 통해 시장에서의 EDR의 영향력을 확대하고자 합니다.\n\n두번째 축인 글로벌 시장 확대를 위해 미국 현지법인의 인력을 보강하고 국내 해외지원팀을 신설했습니다. 전사적인 역량을 총 동원해 건실한 글로벌 파트너 및 고객을 확보해 나갈 계획입니다.\n\n**Q. 공공, 기업 보안실무자들에게 전하고 싶은 말**\n\n-A: 과거 네트워크 위주의 정보보안 투자가 지속되었으나 보안 사고는 여전히 증가하고 있으며, 특히 랜섬웨어 등 단말 및 사람과 연관된 보안사고는 큰 사회적 문제로 대두되고 있습니다. 이는 엔드포인트 보안의 패러다임이 ‘솔루션과 방어’에서 ‘관리와 대응’으로 변화해야 함을 의미합니다. 누수 없는 ‘위협대응 범위’와 ‘운용효율’을 고려한 포트폴리오가 필요한 시점이며, 특히 엔드포인트 관리에 필요한 EDR 솔루션을 도입해 안전한 사이버 환경을 유지해 주길 바랍니다."}, {"title": "지니언스, 타이항공 NAC 구축 사업 수주 [181010]", "date": "2018.10.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-타이항공-nac-구축-사업-수주-181010", "category": "NAC", "body_html": "<ul>\n<li>글로벌 구축 사례 지속적으로 확대…글로벌 솔루션 비교해 경쟁 우위 입증</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI.png?width=329&amp;height=79&amp;name=FB_GENIANS-CI.png\" /></p>\n<p>지니언스(대표 이동범)는 태국 항공사 타이항공에 네트워크 접근제어(NAC) 구축사업을 수주했다고 10일 밝혔다.</p>\n<p>이번 사업수주를 통해 지니언스는 치앙마이 대학과 인도네시아 제조기업 프라타마 아바디에 이어 새롭게 글로벌 고객사를 확보하게 됐다.</p>\n<p>타이항공 NAC 구축 사업은 최고 보안등급을 요구하는 항공사의 특성상 장기간 제품 테스트를 진행한 바 있다. 이번 사업은 글로벌 NAC 제품과의 경쟁 속에 지니언스의 차별화된 기능과 안정성을 인정받았다.</p>\n<p>지니언스는 해외 23개국 24개사의 글로벌 파트너사를 보유하고 있으며, 태국과 인도네시아 등에서 활동중인 유통사를 중심으로 ‘지니안 NAC’ 제품에 대한 관심이 늘어나고 있다.</p>\n<p>이동범 지니언스 대표이사는 “타이항공 NAC 사업은 현지 파트너사와의 장기적인 협업을 통해 자사의 글로벌 비즈니스가 본 궤도에 오르고 있음을 반증하는 것”이라며 “동남아를 비롯한 미국, 유럽, 아프리카, 인도 시장에서 글로벌 파트너들이 자사 제품을 활발히 제안하고 있는 만큼 현지에서 성과를 낼 수 있도록 최선을 다해 지원할 계획”이라고 말했다.</p>", "body_text": "- 글로벌 구축 사례 지속적으로 확대…글로벌 솔루션 비교해 경쟁 우위 입증\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI.png?width=329&height=79&name=FB_GENIANS-CI.png)\n\n지니언스(대표 이동범)는 태국 항공사 타이항공에 네트워크 ...", "full_text": "- 글로벌 구축 사례 지속적으로 확대…글로벌 솔루션 비교해 경쟁 우위 입증\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI.png?width=329&height=79&name=FB_GENIANS-CI.png)\n\n지니언스(대표 이동범)는 태국 항공사 타이항공에 네트워크 접근제어(NAC) 구축사업을 수주했다고 10일 밝혔다.\n\n이번 사업수주를 통해 지니언스는 치앙마이 대학과 인도네시아 제조기업 프라타마 아바디에 이어 새롭게 글로벌 고객사를 확보하게 됐다.\n\n타이항공 NAC 구축 사업은 최고 보안등급을 요구하는 항공사의 특성상 장기간 제품 테스트를 진행한 바 있다. 이번 사업은 글로벌 NAC 제품과의 경쟁 속에 지니언스의 차별화된 기능과 안정성을 인정받았다.\n\n지니언스는 해외 23개국 24개사의 글로벌 파트너사를 보유하고 있으며, 태국과 인도네시아 등에서 활동중인 유통사를 중심으로 ‘지니안 NAC’ 제품에 대한 관심이 늘어나고 있다.\n\n이동범 지니언스 대표이사는 “타이항공 NAC 사업은 현지 파트너사와의 장기적인 협업을 통해 자사의 글로벌 비즈니스가 본 궤도에 오르고 있음을 반증하는 것”이라며 “동남아를 비롯한 미국, 유럽, 아프리카, 인도 시장에서 글로벌 파트너들이 자사 제품을 활발히 제안하고 있는 만큼 현지에서 성과를 낼 수 있도록 최선을 다해 지원할 계획”이라고 말했다."}, {"title": "지니언스, 가시성 관리 범위 확대한 EDR로 시작 적극 공략 [18.08.23]", "date": "2018.08.23", "link": "https://www.genians.co.kr/pr-room/press/지니언스-가시성-관리-범위-확대한-edr로-시작-적극-공", "category": "EDR", "body_html": "<ul>\n<li>국내 최다 고객사 보유, 위협 전문 대응 사이클 기반 국내 시장 적극 공략  </li>\n<li>향후 MDR 등 서비스형 비즈니스 모델 발굴</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/0823-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C_%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-1-1024x682.jpg?width=1024&amp;height=682&amp;name=0823-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C_%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-1-1024x682.jpg\" /></p>\n<p>2018년 8월 23일 - 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 23일 서울 종로구 포시즌스 호텔에서 차세대 주력사업인 EDR(엔드포인트 위협 탐지 및 대응: Endpoint Detection &amp; Response) 비즈니스 전략을 설명하는 기자간담회를 가졌다.</p>\n<p>이번 간담회에는 이동범 대표이사 등 지니언스의 주요 임원과 지난달 인수한 자회사 레드스톤소프트 권진욱 대표이사가 참석해 자사의 EDR 비즈니스 성과 및 향후 전략을 발표했다. 실제 EDR을 사용하고 있는 고객사를 확보하고 있는 만큼 고객사례를 기반으로 한 EDR 도입가이드도 함께 제시했다.</p>\n<p>지니언스는 국내에서 최초로 EDR 제품인 ‘지니안 인사이츠 E(Genian Insights E)’ 출시하며 얻은 성과로 국내 보안기업 중 최다 고객사를 확보하고, 자사 제품을 중심으로 SK인포섹, 씨큐비스타, 리버싱랩스, 엔키 등과의 협력을 바탕으로 엔드포인트 위협 전문 대응 사이클을 완성한 것을 꼽았다.</p>\n<p>회사측은 EDR을 통해 가시성 관리 범위를 확장할 수 있도록 파일 등 주요 정보의 행위까지 관리할 수 있는 신제품을 선보일 계획이라고 밝혔다. 또한, EDR 솔루션을 활용해 보안관제 전문기업과의 협업을 통해 MDR(Managed Detection &amp; Response) 서비스 등의 비즈니스 모델을 발굴한다고 설명했다. ‘지니안 인사이츠 E’ 제품 로드맵을 발표하며 연내 행위기반 위협대응 기능을 제품에 탑재하고, 내년까지 알려지지 않은 위협에 대한 선제적인 대응이 가능한 새로운 버전의 EDR 을 출시한다는 계획을 밝혔다.</p>\n<p>지니언스의 이동범 대표이사는 “전세계 EDR 시장은 가트너에서 2015년에서 2020년까지 연평균복합성장률 약 45% 규모로 추산하고 있는 엔드포인트 보안 중 가장 주목받고 있는 솔루션 분야”라고 설명하며 “지니언스는 신규 엔드포인트 보안 시장 공략을 위해 국내 벤더 중 선제적으로 EDR 분야 투자를 시작해 국내 최다 고객사 확보 등 후발주자가 쉽게 따라올 수 없는 경험을 보유하게 되었다. NAC 이후 차기 주력 비즈니스로 집중해 온 만큼 차별화 된 전략을 통해 국내 EDR 시장을 주도해 나갈 것”이라고 포부를 밝혔다.</p>\n<ul>\n<li>이 상</li>\n</ul>", "body_text": "- 국내 최다 고객사 보유, 위협 전문 대응 사이클 기반 국내 시장 적극 공략  \n - 향후 MDR 등 서비스형 비즈니스 모델 발굴\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/0823-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EA%B8%B0%EC%9E%90%EA...", "full_text": "- 국내 최다 고객사 보유, 위협 전문 대응 사이클 기반 국내 시장 적극 공략  \n - 향후 MDR 등 서비스형 비즈니스 모델 발굴\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/0823-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C_%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-1-1024x682.jpg?width=1024&height=682&name=0823-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C_%EC%9D%B4%EB%8F%99%EB%B2%94-%EB%8C%80%ED%91%9C%EC%9D%B4%EC%82%AC-1-1024x682.jpg)\n\n2018년 8월 23일 - 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 23일 서울 종로구 포시즌스 호텔에서 차세대 주력사업인 EDR(엔드포인트 위협 탐지 및 대응: Endpoint Detection & Response) 비즈니스 전략을 설명하는 기자간담회를 가졌다.\n\n이번 간담회에는 이동범 대표이사 등 지니언스의 주요 임원과 지난달 인수한 자회사 레드스톤소프트 권진욱 대표이사가 참석해 자사의 EDR 비즈니스 성과 및 향후 전략을 발표했다. 실제 EDR을 사용하고 있는 고객사를 확보하고 있는 만큼 고객사례를 기반으로 한 EDR 도입가이드도 함께 제시했다.\n\n지니언스는 국내에서 최초로 EDR 제품인 ‘지니안 인사이츠 E(Genian Insights E)’ 출시하며 얻은 성과로 국내 보안기업 중 최다 고객사를 확보하고, 자사 제품을 중심으로 SK인포섹, 씨큐비스타, 리버싱랩스, 엔키 등과의 협력을 바탕으로 엔드포인트 위협 전문 대응 사이클을 완성한 것을 꼽았다.\n\n회사측은 EDR을 통해 가시성 관리 범위를 확장할 수 있도록 파일 등 주요 정보의 행위까지 관리할 수 있는 신제품을 선보일 계획이라고 밝혔다. 또한, EDR 솔루션을 활용해 보안관제 전문기업과의 협업을 통해 MDR(Managed Detection & Response) 서비스 등의 비즈니스 모델을 발굴한다고 설명했다. ‘지니안 인사이츠 E’ 제품 로드맵을 발표하며 연내 행위기반 위협대응 기능을 제품에 탑재하고, 내년까지 알려지지 않은 위협에 대한 선제적인 대응이 가능한 새로운 버전의 EDR 을 출시한다는 계획을 밝혔다.\n\n지니언스의 이동범 대표이사는 “전세계 EDR 시장은 가트너에서 2015년에서 2020년까지 연평균복합성장률 약 45% 규모로 추산하고 있는 엔드포인트 보안 중 가장 주목받고 있는 솔루션 분야”라고 설명하며 “지니언스는 신규 엔드포인트 보안 시장 공략을 위해 국내 벤더 중 선제적으로 EDR 분야 투자를 시작해 국내 최다 고객사 확보 등 후발주자가 쉽게 따라올 수 없는 경험을 보유하게 되었다. NAC 이후 차기 주력 비즈니스로 집중해 온 만큼 차별화 된 전략을 통해 국내 EDR 시장을 주도해 나갈 것”이라고 포부를 밝혔다.\n\n- 이 상"}, {"title": "지니언스, ‘가트너 NAC 마켓가이드’ 대표 기업 선정 [18.08.08]", "date": "2018.08.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-가트너-nac-마켓가이드-대표-기업-선정-18-08-08", "category": "NAC", "body_html": "<ul>\n<li>국내 NAC 기업 최초 가트너 보고서 등재  </li>\n<li>사물인터넷 환경 내 특화 DPI 기술보유 기업 강조</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI-300x72.png?width=300&amp;height=72&amp;name=FB_GENIANS-CI-300x72.png\" /></p>\n<p>2018년 8월 8일 - 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 최근 글로벌 IT 시장조사기관 가트너가 발표한 '네트워크 접근제어 마켓가이드(Market Guide for Network Access Control)’에서 대표 기업(Representative Vendor)으로 선정됐다고 8일 발표했다.</p>\n<p>국내 NAC 분야 선도기업인 지니언스는 사물인터넷, 클라우드 환경 등 변화하는 IT환경에 활용할 수 있는 기술개발에 매진해 온 결과, 국내 NAC 기업 중 최초로 글로벌 NAC 기업과 나란히 가트너 보고서에 이름을 올렸다.</p>\n<p>가트너는 지니언스가 사물인터넷(IoT) 환경에서 다양한 단말을 정확하게 판별할 수 있는 특화된 ‘단말 플랫폼 인텔리전스(이하 DPI: Device Platform Intelligence)’ 기술을 보유하고 있는 NAC 기업이라고 강조했다.</p>\n<p>지니언스는 DPI 기술을 통해 IT단말 정보 및 OT(운영기술: Operational Technology) 단말 정보와 운영중인 CCTV 등 단말 제품의 단종여부, 제조사 서비스 지원 여부 등 단말관리에 필요한 상세한 비즈니스 정보를 제공하고 있다.</p>\n<p>지니언스의 이동범 대표이사는 “지니언스는 2006년 NAC 출시 이후, 고객의 요구와 IT환경 변화에 선제적으로 대응할 수 있는 기술개발에 집중해 온 기업”이라며 “국내 NAC 시장 1등을 넘어 글로벌 NAC 벤더와 나란히 대표기업으로 인정받은 만큼 글로벌 고객확보에 더욱 매진할 것”이라고 포부를 밝혔다.</p>\n<p>한편, 가트너 측은 NAC의 새로운 활용분야로 사물인터넷 환경, 클라우드 관리 인터페이스, IT와 OT 정보 통합 관리 등을 강조하며 제조, 헬스케어 등 다양한 분야에서 NAC 솔루션 도입이 증가할 것으로 예상했다.</p>\n<p>* 가트너 Market Guide for Network Access Control 원문 *<br />\n : https://www.gartner.com/document/3884483</p>", "body_text": "- 국내 NAC 기업 최초 가트너 보고서 등재  \n - 사물인터넷 환경 내 특화 DPI 기술보유 기업 강조\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI-300x72.png?width=300&height=72&name=FB_GENIANS-CI-300x72.png)\n\n...", "full_text": "- 국내 NAC 기업 최초 가트너 보고서 등재  \n - 사물인터넷 환경 내 특화 DPI 기술보유 기업 강조\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/FB_GENIANS-CI-300x72.png?width=300&height=72&name=FB_GENIANS-CI-300x72.png)\n\n2018년 8월 8일 - 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 최근 글로벌 IT 시장조사기관 가트너가 발표한 '네트워크 접근제어 마켓가이드(Market Guide for Network Access Control)’에서 대표 기업(Representative Vendor)으로 선정됐다고 8일 발표했다.\n\n국내 NAC 분야 선도기업인 지니언스는 사물인터넷, 클라우드 환경 등 변화하는 IT환경에 활용할 수 있는 기술개발에 매진해 온 결과, 국내 NAC 기업 중 최초로 글로벌 NAC 기업과 나란히 가트너 보고서에 이름을 올렸다.\n\n가트너는 지니언스가 사물인터넷(IoT) 환경에서 다양한 단말을 정확하게 판별할 수 있는 특화된 ‘단말 플랫폼 인텔리전스(이하 DPI: Device Platform Intelligence)’ 기술을 보유하고 있는 NAC 기업이라고 강조했다.\n\n지니언스는 DPI 기술을 통해 IT단말 정보 및 OT(운영기술: Operational Technology) 단말 정보와 운영중인 CCTV 등 단말 제품의 단종여부, 제조사 서비스 지원 여부 등 단말관리에 필요한 상세한 비즈니스 정보를 제공하고 있다.\n\n지니언스의 이동범 대표이사는 “지니언스는 2006년 NAC 출시 이후, 고객의 요구와 IT환경 변화에 선제적으로 대응할 수 있는 기술개발에 집중해 온 기업”이라며 “국내 NAC 시장 1등을 넘어 글로벌 NAC 벤더와 나란히 대표기업으로 인정받은 만큼 글로벌 고객확보에 더욱 매진할 것”이라고 포부를 밝혔다.\n\n한편, 가트너 측은 NAC의 새로운 활용분야로 사물인터넷 환경, 클라우드 관리 인터페이스, IT와 OT 정보 통합 관리 등을 강조하며 제조, 헬스케어 등 다양한 분야에서 NAC 솔루션 도입이 증가할 것으로 예상했다.\n\n\\* 가트너 Market Guide for Network Access Control 원문 \\*  \n : https://www.gartner.com/document/3884483"}, {"title": "지니언스, 일본 중소기업향 클라우드 NAC 서비스 출시 [18.07.04]", "date": "2018.07.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-일본-중소기업향-클라우드-nac-서비스-출시-18-07-04", "category": "NAC", "body_html": "<ul>\n<li>제이시큐리티와 현지 클라우드 NAC 서비스 출시  </li>\n<li>연내 일본 중소기업 고객 100개 이상 확보 목표</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/00-300x300.jpg?width=300&amp;height=300&amp;name=00-300x300.jpg\" /></p>\n<p>2018년 7월 4일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 일본 현지에서 SW유통 플랫폼 제이시큐리티(JSECURITY, www.jsecurity.co.jp)와 함께 중소기업향 클라우드 NAC 서비스 ‘디바이스키퍼(Device Keeper)’를 출시했다고 4일 밝혔다.</p>\n<p>‘디바이스키퍼’는 유무선 네트워크 환경에서 단말 접속과 제어 등의 관리를 위해 중소기업 고객을 목표로 개발된 일본향 서비스다. 약 1년여간의 개발기간을 거쳐 지난 5월 개최된 일본 최대 정보보안 전시회 'IST 2018'을 통해 현지 파트너와 고객사를 대상으로 한 마케팅 활동에 착수한 바 있다.</p>\n<p>지니언스는 이 서비스를 통해 연내 일본 중소기업 고객 100개 이상 확보를 목표로 현지 유통사를 지원할 예정이다.</p>\n<p>회사측은 일본 시장에서 국내 기업의 보안솔루션을 출시하고 고객사를 확보한 경험을 보유한 현지 유통사와의 협업을 바탕으로 신속한 시장안착과 고객발굴을 위해 총력을 기울일 것 이라고 설명했다.</p>\n<p>지니언스의 이동범 대표이사는 “지니언스가 글로벌 시장에서 클라우드 NAC 서비스 제공기업으로 성장하기 위해, 클라우드 환경의 성숙과 중소기업의 보안서비스 도입이 활성화된 일본에서의 성과가 매우 중요하다.”며 “2년간 글로벌 시장에서 서비스해 온 경험을 바탕으로 품질을 중요시하는 일본 현지 고객을 만족시키기 위해 최선의 노력을 다할 것”이라고 밝혔다.</p>", "body_text": "- 제이시큐리티와 현지 클라우드 NAC 서비스 출시  \n - 연내 일본 중소기업 고객 100개 이상 확보 목표\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/00-300x300.jpg?width=300&height=300&name=00-300x300.jpg)\n\n2018년 7월 4일 - 종합 ...", "full_text": "- 제이시큐리티와 현지 클라우드 NAC 서비스 출시  \n - 연내 일본 중소기업 고객 100개 이상 확보 목표\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/00-300x300.jpg?width=300&height=300&name=00-300x300.jpg)\n\n2018년 7월 4일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 일본 현지에서 SW유통 플랫폼 제이시큐리티(JSECURITY, www.jsecurity.co.jp)와 함께 중소기업향 클라우드 NAC 서비스 ‘디바이스키퍼(Device Keeper)’를 출시했다고 4일 밝혔다.\n\n‘디바이스키퍼’는 유무선 네트워크 환경에서 단말 접속과 제어 등의 관리를 위해 중소기업 고객을 목표로 개발된 일본향 서비스다. 약 1년여간의 개발기간을 거쳐 지난 5월 개최된 일본 최대 정보보안 전시회 'IST 2018'을 통해 현지 파트너와 고객사를 대상으로 한 마케팅 활동에 착수한 바 있다.\n\n지니언스는 이 서비스를 통해 연내 일본 중소기업 고객 100개 이상 확보를 목표로 현지 유통사를 지원할 예정이다.\n\n회사측은 일본 시장에서 국내 기업의 보안솔루션을 출시하고 고객사를 확보한 경험을 보유한 현지 유통사와의 협업을 바탕으로 신속한 시장안착과 고객발굴을 위해 총력을 기울일 것 이라고 설명했다.\n\n지니언스의 이동범 대표이사는 “지니언스가 글로벌 시장에서 클라우드 NAC 서비스 제공기업으로 성장하기 위해, 클라우드 환경의 성숙과 중소기업의 보안서비스 도입이 활성화된 일본에서의 성과가 매우 중요하다.”며 “2년간 글로벌 시장에서 서비스해 온 경험을 바탕으로 품질을 중요시하는 일본 현지 고객을 만족시키기 위해 최선의 노력을 다할 것”이라고 밝혔다."}, {"title": "지니언스, 엔드포인트 보안 전문기업 레드스톤소프트 인수 [18.07.16]", "date": "2018.07.16", "link": "https://www.genians.co.kr/pr-room/press/지니언스-엔드포인트-보안-전문기업-레드스톤소프", "category": "EDR", "body_html": "<ul>\n<li>EDR 사업 경쟁력 강화 목적 엔드포인트 보안 솔루션 전문가 그룹 인수</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genians_CI@2x-300x69.png?width=300&amp;height=69&amp;name=Genians_CI@2x-300x69.png\" /></p>\n<p>2018년 7월 16일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 이상 행위 분석 기반 엔드포인트 보안 기업 레드스톤소프트(redstonesoft.com, 대표이사 권진욱)를 인수했다고 16일 밝혔다.</p>\n<p>지니언스가 레드스톤소프트 보유지분 100%를 인수하는 방식으로 인수금액은 총 26억5천만원 규모다.</p>\n<p>레드스톤소프트는 2017년 1월 안랩, 하우리, 삼성SDS 출신의 보안솔루션 전문가 그룹이 창업한 회사로 드라이버 개발자, 악성코드 분석가 등 엔드포인트 보안 분야 핵심 개발인력으로 구성되어 있다.</p>\n<p>이 회사는 다양한 산업용 커넥티드 기기(Connected Devices)의 정보 및 행위를 실시간으로 수집하고, 다중개체 행위 분석을 통해 이상 행위를 탐지하는 독자적인 기술을 보유하고 있다. 창업 6개월 만에 기술력을 인정받아 선보엔젤파트너스, 부산연합기술지주의 투자 유치 및 중소벤처기업부의 ‘팁스(TIPS)’에 선정된 바 있다.</p>\n<p>회사측은 차세대 먹거리로 선정한 EDR(Endpoint Detection &amp; Response, 엔드포인트 위협 탐지 및 대응) 사업 경쟁력 강화를 위해 레드스톤소프트를 인수하고, 이 기업이 보유한 이상 행위 분석 기술을 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E(Genian Insights E)’에 통합해 하반기 내 업그레이드 버전을 출시할 것 이라고 밝혔다.</p>\n<p>지니언스의 이동범 대표이사는 “신,변종 랜섬웨어 등 악성코드를 신속하게 탐지하기 위해서는 인공지능(AI)기술과 파일리스(Fileless) 위협 대응을 위한 이상 행위 분석 기술이 필수로 관련 분야 최고의 기술력을 보유한 전문가 그룹을 인수했다”며 “지니언스는 국내 환경에 필요한 IT 보안 솔루션을 개발하고 시장을 개척하는데 탁월한 역량을 보유하고 있는 기업인만큼 EDR 분야에서도 적극적인 투자를 통해 시장 대표 제품으로 성장시켜 나갈 것”이라고 포부를 밝혔다.</p>\n<p>&lt;용어 설명&gt;</p>\n<p>팁스(TIPS)프로그램<br />\n : 민간투자주도형 기술창업 지원프로그램. 세계시장을 선도할 기술아이템을 보유한 창업팀을 민간주도로 선발해 미래유망 창업기업을 집중 육성하는 프로그램(참고: www.jointips.or.kr)</p>\n<p>EDR(Endpoint Detection &amp; Response)<br />\n : 엔드포인트 위협 탐지 및 대응 솔루션, 엔드포인트(PC 등 단말)에서 발생하는 다양한 행위를 모니터링해 내부에 발생하는 보안위협에 조기 대응할 수 있도록 한 최근 가장 주목 받는 보안 솔루션 분야. 인공지능(머신러닝 기술), 이상 행위 분석 기술 등을 통해 백신 등으로 탐지가 어려운 신,변종 랜섬웨어 등 악성코드에 신속하게 대응하는 것이 목표</p>\n<p>파일리스(Fileless) 위협<br />\n : 기존의 악성코드 유포 방식이 실행파일(exe) 등을 활용했으나, 파일리스 공격은 특정한 파일이 없이 프로세스 메모리 등에서 바로 실행시켜 악성코드를 감염시키는 방식. 파일을 기반으로 악성 여부를 판단하는 백신 등의 기존 보안 솔루션은 탐지가 원천적으로 불가한 공격 방식</p>", "body_text": "- EDR 사업 경쟁력 강화 목적 엔드포인트 보안 솔루션 전문가 그룹 인수\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genians_CI@2x-300x69.png?width=300&height=69&name=Genians_CI@2x-300x69.png)\n\n2018년 7월 16일 - 종합 ...", "full_text": "- EDR 사업 경쟁력 강화 목적 엔드포인트 보안 솔루션 전문가 그룹 인수\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genians_CI@2x-300x69.png?width=300&height=69&name=Genians_CI@2x-300x69.png)\n\n2018년 7월 16일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 이상 행위 분석 기반 엔드포인트 보안 기업 레드스톤소프트(redstonesoft.com, 대표이사 권진욱)를 인수했다고 16일 밝혔다.\n\n지니언스가 레드스톤소프트 보유지분 100%를 인수하는 방식으로 인수금액은 총 26억5천만원 규모다.\n\n레드스톤소프트는 2017년 1월 안랩, 하우리, 삼성SDS 출신의 보안솔루션 전문가 그룹이 창업한 회사로 드라이버 개발자, 악성코드 분석가 등 엔드포인트 보안 분야 핵심 개발인력으로 구성되어 있다.\n\n이 회사는 다양한 산업용 커넥티드 기기(Connected Devices)의 정보 및 행위를 실시간으로 수집하고, 다중개체 행위 분석을 통해 이상 행위를 탐지하는 독자적인 기술을 보유하고 있다. 창업 6개월 만에 기술력을 인정받아 선보엔젤파트너스, 부산연합기술지주의 투자 유치 및 중소벤처기업부의 ‘팁스(TIPS)’에 선정된 바 있다.\n\n회사측은 차세대 먹거리로 선정한 EDR(Endpoint Detection & Response, 엔드포인트 위협 탐지 및 대응) 사업 경쟁력 강화를 위해 레드스톤소프트를 인수하고, 이 기업이 보유한 이상 행위 분석 기술을 지니언스의 EDR 솔루션 ‘지니안 인사이츠 E(Genian Insights E)’에 통합해 하반기 내 업그레이드 버전을 출시할 것 이라고 밝혔다.\n\n지니언스의 이동범 대표이사는 “신,변종 랜섬웨어 등 악성코드를 신속하게 탐지하기 위해서는 인공지능(AI)기술과 파일리스(Fileless) 위협 대응을 위한 이상 행위 분석 기술이 필수로 관련 분야 최고의 기술력을 보유한 전문가 그룹을 인수했다”며 “지니언스는 국내 환경에 필요한 IT 보안 솔루션을 개발하고 시장을 개척하는데 탁월한 역량을 보유하고 있는 기업인만큼 EDR 분야에서도 적극적인 투자를 통해 시장 대표 제품으로 성장시켜 나갈 것”이라고 포부를 밝혔다.\n\n<용어 설명>\n\n팁스(TIPS)프로그램  \n : 민간투자주도형 기술창업 지원프로그램. 세계시장을 선도할 기술아이템을 보유한 창업팀을 민간주도로 선발해 미래유망 창업기업을 집중 육성하는 프로그램(참고: www.jointips.or.kr)\n\nEDR(Endpoint Detection & Response)  \n : 엔드포인트 위협 탐지 및 대응 솔루션, 엔드포인트(PC 등 단말)에서 발생하는 다양한 행위를 모니터링해 내부에 발생하는 보안위협에 조기 대응할 수 있도록 한 최근 가장 주목 받는 보안 솔루션 분야. 인공지능(머신러닝 기술), 이상 행위 분석 기술 등을 통해 백신 등으로 탐지가 어려운 신,변종 랜섬웨어 등 악성코드에 신속하게 대응하는 것이 목표\n\n파일리스(Fileless) 위협  \n : 기존의 악성코드 유포 방식이 실행파일(exe) 등을 활용했으나, 파일리스 공격은 특정한 파일이 없이 프로세스 메모리 등에서 바로 실행시켜 악성코드를 감염시키는 방식. 파일을 기반으로 악성 여부를 판단하는 백신 등의 기존 보안 솔루션은 탐지가 원천적으로 불가한 공격 방식"}, {"title": "지니언스, EDR 솔루션 ‘지니안 인사이츠 E’ GS인증 1등급 획득", "date": "2018.06.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-edr-솔루션-지니안-인사이츠-e-gs인증-1등급", "category": "EDR", "body_html": "<p><strong>지니언스, EDR 솔루션 ‘지니안 인사이츠 E’</strong><strong>GS</strong><strong>인증 1등급 획득</strong></p>\n<ul>\n<li>신종, 변종 악성코드 대응가능한 EDR 통해 GS인증 획득</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2_7_2_4_Genian-InsightE_400x400.jpg?width=400&amp;height=400&amp;name=2_7_2_4_Genian-InsightE_400x400.jpg\" /></p>\n<p>2018년 6월 7일 - 종합 보안 소프트웨어 개발기업 지니언스(<a href=\"https://www.genians.co.kr/\">www.genians.co.kr</a>, 대표이사 이동범)는 자사의 EDR 솔루션 ‘지니안 인사이츠 E(Genian Insights E)’가 한국정보통신기술협회(TTA)의 소프트웨어품질인증(GS: Good Software) 1등급을 획득했다고 7일 밝혔다.</p>\n<p>‘지니안 인사이츠 E’는 엔드포인트에서 발생하는 보안 위협을 빠르게 탐지해 대응할 수 있도록 국내 보안기업 최초로 출시한 단말 기반 지능형 위협 탐지 및 대응 플랫폼(EDR: Endpoint Detection &amp; Response)이다. 원천적인 차단이 불가능한 랜섬웨어 등 지능형 위협에 대한 악성 행위를 파악하고 이상 징후를 탐지해 공격 실행 단계에서 대응할 수 있다.</p>\n<p>지니언스는 신종, 변종 악성코드에 대한 신속한 대응을 위해 올 초 출시한 업그레이드 버전에 자체 개발한 상용 머신러닝 엔진을 탑재한 바 있다. 하반기에는 지속적인 기술개발을 통해 행위기반 탐지 기능을 추가해 국내 환경에서 발생하는 다양한 공격에 신속하게 대응할 수 있는 위협 탐지 플랫폼으로 확장한다는 계획이다.</p>\n<p>EDR 솔루션은 최근 지속적으로 증가하고 있는 랜섬웨어 등 지능형 위협에 대한 가시성을 확보해 침해사고 대응을 위한 실질적인 기능을 제공하는 엔드포인트 보안 분야로 최근 국내 고객사의 관심이 증가하고 있다.</p>\n<p>지니언스의 이동범 대표이사는 “GS인증 획득을 통해 자사 EDR 제품의 안정성을 인정받았다”며 “지니안 인사이츠 E 출시 이후 금융기관과 공사 등 다양한 고객사를 확보하며 EDR시장 개척을 주도해온 만큼 이번 인증 획득을 계기로 공공분야 등 신규 고객 발굴을 위해 최선의 노력을 다할 것”이라고 밝혔다.</p>", "body_text": "**지니언스, EDR 솔루션 ‘지니안 인사이츠 E’****GS****인증 1등급 획득**\n\n- 신종, 변종 악성코드 대응가능한 EDR 통해 GS인증 획득\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2_7_2_4_Genian-InsightE_400x400.jpg?width=400&heigh...", "full_text": "**지니언스, EDR 솔루션 ‘지니안 인사이츠 E’****GS****인증 1등급 획득**\n\n- 신종, 변종 악성코드 대응가능한 EDR 통해 GS인증 획득\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2_7_2_4_Genian-InsightE_400x400.jpg?width=400&height=400&name=2_7_2_4_Genian-InsightE_400x400.jpg)\n\n2018년 6월 7일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.co.kr](https://www.genians.co.kr/), 대표이사 이동범)는 자사의 EDR 솔루션 ‘지니안 인사이츠 E(Genian Insights E)’가 한국정보통신기술협회(TTA)의 소프트웨어품질인증(GS: Good Software) 1등급을 획득했다고 7일 밝혔다.\n\n‘지니안 인사이츠 E’는 엔드포인트에서 발생하는 보안 위협을 빠르게 탐지해 대응할 수 있도록 국내 보안기업 최초로 출시한 단말 기반 지능형 위협 탐지 및 대응 플랫폼(EDR: Endpoint Detection & Response)이다. 원천적인 차단이 불가능한 랜섬웨어 등 지능형 위협에 대한 악성 행위를 파악하고 이상 징후를 탐지해 공격 실행 단계에서 대응할 수 있다.\n\n지니언스는 신종, 변종 악성코드에 대한 신속한 대응을 위해 올 초 출시한 업그레이드 버전에 자체 개발한 상용 머신러닝 엔진을 탑재한 바 있다. 하반기에는 지속적인 기술개발을 통해 행위기반 탐지 기능을 추가해 국내 환경에서 발생하는 다양한 공격에 신속하게 대응할 수 있는 위협 탐지 플랫폼으로 확장한다는 계획이다.\n\nEDR 솔루션은 최근 지속적으로 증가하고 있는 랜섬웨어 등 지능형 위협에 대한 가시성을 확보해 침해사고 대응을 위한 실질적인 기능을 제공하는 엔드포인트 보안 분야로 최근 국내 고객사의 관심이 증가하고 있다.\n\n지니언스의 이동범 대표이사는 “GS인증 획득을 통해 자사 EDR 제품의 안정성을 인정받았다”며 “지니안 인사이츠 E 출시 이후 금융기관과 공사 등 다양한 고객사를 확보하며 EDR시장 개척을 주도해온 만큼 이번 인증 획득을 계기로 공공분야 등 신규 고객 발굴을 위해 최선의 노력을 다할 것”이라고 밝혔다."}, {"title": "지니언스, 30개 이상의 글로벌 파트너 상담하며 RSA 컨퍼런스 2018 성료 [18.04.23]", "date": "2018.04.23", "link": "https://www.genians.co.kr/pr-room/press/지니언스-30개-이상의-글로벌-파트너-상담하며-rsa-컨퍼", "category": "비즈니스 & 성과", "body_html": "<ul>\n<li>미국법인 설립 후 세 번째 RSA 참가 30개 이상 글로벌 파트너 상담 진행  </li>\n<li>사물인터넷 환경에서 적용 가능한 클라우드 기반 NAC로 글로벌 시장 공략</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4_RSA_%EB%B6%80%EC%8A%A4%EC%A0%84%EA%B2%BD_700.jpg?width=700&amp;height=525&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4_RSA_%EB%B6%80%EC%8A%A4%EC%A0%84%EA%B2%BD_700.jpg\" /></p>\n<p>2018년 4월 23일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 지난 16일부터 20일까지 미국 샌프란시스코에서 열린 RSA 컨퍼런스 2018에 참가해 성공적으로 행사를 마쳤다고 밝혔다.</p>\n<p>회사측은 2016년 미국법인 설립 이후 세 번째 참가한 이번 행사에서 역대 가장 많은 참관객이 방문했으며, 30여개 이상의 전 세계 파트너와 비즈니스를 위한 상담을 진행했다고 설명했다.</p>\n<p>지니언스는 이번 행사를 통해 ‘사물인터넷을 위한 네트워크 접근제어를 재정의하다.(Genians Reimagines Network Access Control for the IoT Era)’를 핵심 메시지로 정했다. 이 메시지를 통해 사물인터넷 환경에 쉽게 적용할 수 있는 네트워크 접근제어(이하, NAC) 솔루션을 찾는 매니지드 서비스 사업자(이하, MSP)와 중소기업(SME) 고객을 대상으로 적극적인 마케팅 활동을 펼쳤다.</p>\n<p>이 행사에서 회사는 ▲사물인터넷 환경을 대비할 수 있는 단말 관리 인텔리전스 ▲관리 편의성을 보장하는 클라우드 기반 관리 NAC ▲직관적인 UI와 우수한 사용성을 바탕으로 MSP가 공급하기 편리한 NAC임을 강조했다.</p>\n<p>김계연 지니언스 미국법인장은 “전년대비 NAC 솔루션에 대한 이해도가 높고, 현지에서 빠르게 비즈니스가 가능한 파트너와의 상담이 이어졌다”며 “클라우드 기반 NAC라는 글로벌 환경에 적합한 서비스를 바탕으로 지속적으로 글로벌 시장 확대에 나설 것”이라고 밝혔다.</p>\n<p>한편, 지니언스는 현재 보유한 미국, 영국, 태국, 나이지리아, 벨기에, 포르투갈 등 11개국 15개사의 파트너를 기반으로 현지 고객사 확보에 총력을 기울이고 있다. 오는 5월에는 제이시큐리티와 일본에서 공동으로 진행중인 NAC를 클라우드 형태로 제공하는 ‘디바이스 키퍼(Device Keeper)’ 현지 마케팅에 착수해 아시아를 시작으로 글로벌 NAC 벤더로의 입지를 강화해 나갈 계획이다.</p>", "body_text": "- 미국법인 설립 후 세 번째 RSA 참가 30개 이상 글로벌 파트너 상담 진행  \n - 사물인터넷 환경에서 적용 가능한 클라우드 기반 NAC로 글로벌 시장 공략\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4_RSA_%EB%B...", "full_text": "- 미국법인 설립 후 세 번째 RSA 참가 30개 이상 글로벌 파트너 상담 진행  \n - 사물인터넷 환경에서 적용 가능한 클라우드 기반 NAC로 글로벌 시장 공략\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4_RSA_%EB%B6%80%EC%8A%A4%EC%A0%84%EA%B2%BD_700.jpg?width=700&height=525&name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4_RSA_%EB%B6%80%EC%8A%A4%EC%A0%84%EA%B2%BD_700.jpg)\n\n2018년 4월 23일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 지난 16일부터 20일까지 미국 샌프란시스코에서 열린 RSA 컨퍼런스 2018에 참가해 성공적으로 행사를 마쳤다고 밝혔다.\n\n회사측은 2016년 미국법인 설립 이후 세 번째 참가한 이번 행사에서 역대 가장 많은 참관객이 방문했으며, 30여개 이상의 전 세계 파트너와 비즈니스를 위한 상담을 진행했다고 설명했다.\n\n지니언스는 이번 행사를 통해 ‘사물인터넷을 위한 네트워크 접근제어를 재정의하다.(Genians Reimagines Network Access Control for the IoT Era)’를 핵심 메시지로 정했다. 이 메시지를 통해 사물인터넷 환경에 쉽게 적용할 수 있는 네트워크 접근제어(이하, NAC) 솔루션을 찾는 매니지드 서비스 사업자(이하, MSP)와 중소기업(SME) 고객을 대상으로 적극적인 마케팅 활동을 펼쳤다.\n\n이 행사에서 회사는 ▲사물인터넷 환경을 대비할 수 있는 단말 관리 인텔리전스 ▲관리 편의성을 보장하는 클라우드 기반 관리 NAC ▲직관적인 UI와 우수한 사용성을 바탕으로 MSP가 공급하기 편리한 NAC임을 강조했다.\n\n김계연 지니언스 미국법인장은 “전년대비 NAC 솔루션에 대한 이해도가 높고, 현지에서 빠르게 비즈니스가 가능한 파트너와의 상담이 이어졌다”며 “클라우드 기반 NAC라는 글로벌 환경에 적합한 서비스를 바탕으로 지속적으로 글로벌 시장 확대에 나설 것”이라고 밝혔다.\n\n한편, 지니언스는 현재 보유한 미국, 영국, 태국, 나이지리아, 벨기에, 포르투갈 등 11개국 15개사의 파트너를 기반으로 현지 고객사 확보에 총력을 기울이고 있다. 오는 5월에는 제이시큐리티와 일본에서 공동으로 진행중인 NAC를 클라우드 형태로 제공하는 ‘디바이스 키퍼(Device Keeper)’ 현지 마케팅에 착수해 아시아를 시작으로 글로벌 NAC 벤더로의 입지를 강화해 나갈 계획이다."}, {"title": "지니언스, 2017년 전년대비 영업이익 10% 증가한 결산실적 발표 [18.02.12]", "date": "2018.02.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-2017년-전년대비-영업이익-10-증가한-결산실적", "category": "비즈니스 & 성과", "body_html": "<ul>\n<li>\n<p>별도제무제표 기준 매출 208억원, 영업이익 46억원, 당기순이익 43억원 달성</p>\n</li>\n<li>\n<p>미국, 동남아 등 글로벌시장 투자확대에도 연결기준 당기순이익 9% 증가</p>\n</li>\n</ul>\n<p>|  |  |  |  |\n|</p>", "body_text": "- 별도제무제표 기준 매출 208억원, 영업이익 46억원, 당기순이익 43억원 달성\n\n- 미국, 동남아 등 글로벌시장 투자확대에도 연결기준 당기순이익 9% 증가\n\n|  |  |  |  |\n|...", "full_text": "- 별도제무제표 기준 매출 208억원, 영업이익 46억원, 당기순이익 43억원 달성\n\n- 미국, 동남아 등 글로벌시장 투자확대에도 연결기준 당기순이익 9% 증가\n\n|  |  |  |  |\n|"}, {"title": "지니언스, IoT와 클라우드 환경 지원 ‘지니안 NAC v5.0’ 출시 [18.02.21]", "date": "2018.02.21", "link": "https://www.genians.co.kr/pr-room/press/지니언스-iot와-클라우드-환경-지원-지니안-nac-v5-0-출시", "category": "NAC", "body_html": "<p>에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))</p>", "body_text": "에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))...", "full_text": "에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))"}, {"title": "지니언스, 2018 파트너 대상 워크샵 개최 [18.02.05]", "date": "2018.02.05", "link": "https://www.genians.co.kr/pr-room/press/지니언스-2018-파트너-대상-워크샵-개최-18-02-05", "category": "비즈니스 & 성과", "body_html": "<p>에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))</p>", "body_text": "에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))...", "full_text": "에러 발생으로 본문을 가져오지 못했습니다: ('Connection aborted.', ConnectionResetError(10054, '현재 연결은 원격 호스트에 의해 강제로 끊겼습니다', None, 10054, None))"}, {"title": "지니언스, 머신러닝 엔진 탑재 EDR ‘지니안 인사이츠 E’ 업그레이드 출시 [18.01.25]", "date": "2018.01.25", "link": "https://www.genians.co.kr/pr-room/press/지니언스-머신러닝-엔진-탑재-edr-지니안-인사이츠-e", "category": "EDR", "body_html": "<ul>\n<li>알려지지 않은 변종, 신종 악성코드 공격에 대한 즉각적인 대응 가능</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_Insights-E@2x.png?width=817&amp;height=120&amp;name=Genian_Insights-E@2x.png\" /></p>\n<p>2018년 1월 25일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 머신러닝 엔진을 탑재한 ‘지니안 인사이츠 E(Genian Insights E)’ 업그레이드 버전을 새롭게 출시했다.</p>\n<p>지니언스는 이번 업그레이드 버전에서 악성코드 탐지 기능을 대폭 확장하는데 초점을 맞췄다. 기존에 제공해온 침해지표(이하, IOC)에 야라(이하, YARA)룰 기반 탐지기능을 추가 적용해 알려진 악성코드에 대응하고 자체 개발한 머신러닝 기술을 통해 즉각적인 탐지가 어려운 변종, 신종 랜섬웨어 등 악성코드를 이용한 공격에도 신속한 대응이 가능하도록 했다.</p>\n<p>회사측은 ‘지니안 인사이츠 E’에 탑재된 머신러닝 기술은 딥러닝을 기반으로 다양한 학습 모델을 연구해 적용했으며, 학습용 데이터 셋 기준 악성코드 탐지 정확도는 99% 이상이라고 설명했다. 지니언스는 EDR의 도입과 운영에서 탐지 정확도만큼 오탐(False Positive)을 최소화 하는 것이 중요한 요소라고 판단하고, 이 부분에 기술역량을 집중할 계획이라고 밝혔다.</p>\n<p>또한, 엔드포인트 이벤트 연관분석 및 공격 스토리 라인을 분석할 수 있는 기능을 더욱 강화하여 실제 악성코드 감염 후 조사분석과 대응을 위한 효율적인 방법을 제공할 수 있게 되었다.</p>\n<p>지니언스는 2017년 자사 ‘지니안 인사이츠 E’ 제품을 도입한 고객사를 대상으로 머신러닝 엔진이 탑재된 버전으로 무상 업그레이드 할 예정이다.</p>\n<p>지니언스의 이동범 대표이사는 “하루에도 수십 만개의 변종, 신종 악성코드가 등장하는 가운데 학습모델을 통해 알려지지 않은 위협의 악성 여부를 판별하는 머신러닝 기술의 적용은 이제 선택이 아닌 필수”라며 “2018년 EDR 분야에 대한 시장의 관심이 높아지고 있는 만큼, 강화된 탐지기능을 바탕으로 국내시장 확대에 박차를 가할 것”이라고 밝혔다.</p>", "body_text": "- 알려지지 않은 변종, 신종 악성코드 공격에 대한 즉각적인 대응 가능\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_Insights-E@2x.png?width=817&height=120&name=Genian_Insights-E@2x.png)\n\n2018년 1월 25일 - 종합 보...", "full_text": "- 알려지지 않은 변종, 신종 악성코드 공격에 대한 즉각적인 대응 가능\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_Insights-E@2x.png?width=817&height=120&name=Genian_Insights-E@2x.png)\n\n2018년 1월 25일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 머신러닝 엔진을 탑재한 ‘지니안 인사이츠 E(Genian Insights E)’ 업그레이드 버전을 새롭게 출시했다.\n\n지니언스는 이번 업그레이드 버전에서 악성코드 탐지 기능을 대폭 확장하는데 초점을 맞췄다. 기존에 제공해온 침해지표(이하, IOC)에 야라(이하, YARA)룰 기반 탐지기능을 추가 적용해 알려진 악성코드에 대응하고 자체 개발한 머신러닝 기술을 통해 즉각적인 탐지가 어려운 변종, 신종 랜섬웨어 등 악성코드를 이용한 공격에도 신속한 대응이 가능하도록 했다.\n\n회사측은 ‘지니안 인사이츠 E’에 탑재된 머신러닝 기술은 딥러닝을 기반으로 다양한 학습 모델을 연구해 적용했으며, 학습용 데이터 셋 기준 악성코드 탐지 정확도는 99% 이상이라고 설명했다. 지니언스는 EDR의 도입과 운영에서 탐지 정확도만큼 오탐(False Positive)을 최소화 하는 것이 중요한 요소라고 판단하고, 이 부분에 기술역량을 집중할 계획이라고 밝혔다.\n\n또한, 엔드포인트 이벤트 연관분석 및 공격 스토리 라인을 분석할 수 있는 기능을 더욱 강화하여 실제 악성코드 감염 후 조사분석과 대응을 위한 효율적인 방법을 제공할 수 있게 되었다.\n\n지니언스는 2017년 자사 ‘지니안 인사이츠 E’ 제품을 도입한 고객사를 대상으로 머신러닝 엔진이 탑재된 버전으로 무상 업그레이드 할 예정이다.\n\n지니언스의 이동범 대표이사는 “하루에도 수십 만개의 변종, 신종 악성코드가 등장하는 가운데 학습모델을 통해 알려지지 않은 위협의 악성 여부를 판별하는 머신러닝 기술의 적용은 이제 선택이 아닌 필수”라며 “2018년 EDR 분야에 대한 시장의 관심이 높아지고 있는 만큼, 강화된 탐지기능을 바탕으로 국내시장 확대에 박차를 가할 것”이라고 밝혔다."}, {"title": "지니언스, 태국 치앙마이 대학 NAC 구축사업 수주 [18.01.05]", "date": "2018.01.05", "link": "https://www.genians.co.kr/pr-room/press/지니언스-태국-치앙마이-대학-nac-구축사업-수주-18-01-05", "category": "NAC", "body_html": "<ul>\n<li>글로벌 1위 NAC 제품과 경쟁해 첫 수주 성공  </li>\n<li>동남아 시장 진출 4개월 만에 의미있는 성과 거둬</li>\n</ul>\n<p>2018년 1월 5일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 동남아 진출 4개월 만에 미국법인을 통해 첫 NAC 사업 수주에 성공했다.</p>\n<p>지니언스는 태국 현지 유통 파트너인 블루지브라(BlueZebra)社를 통해 치앙마이 국립대학 NAC 구축사업을 수주했다고 5일 밝혔다. 회사는 이번 사업을 통해 1차로 2,500개 단말관리가 가능한 소프트웨어를 납품 할 예정이다.</p>\n<p>이번 사업은 글로벌 1위 NAC 제품과의 비교 테스트를 통해 지니언스 제품이 최종 선정되었다. 회사측은 치앙마이 대학 수주는 해외시장에서의 가능성을 증명한 의미있는 성과라고 설명하며 현재 유럽, 말레이시아 등에서도 자동차, 선박, 은행 등의 다수 기업에서도 도입을 위한 테스트를 진행 중이라고 밝혔다.</p>\n<p>지난 9월 동남아 시장진출에 나선 지니언스는 미국법인을 통해 2018년 1월 현재 미국 3개사, 싱가포르 2개사, 말레이시아 2개사 등 12개의 글로벌 현지 파트너사와 계약을 완료했다.</p>\n<p>지니언스의 이동범 대표이사는 “치앙마이 대학 수주는 지니언스의 제품이 기능, 안정성 측면에서 글로벌 제품과 비교해도 이길 수 있는 충분한 경쟁력을 갖추었음을 보여준 것”이라며 “현재까지 계약한 파트너사가 적극적으로 현지 고객에 소개하며 활발한 비즈니스를 전개하고 있어 지속적인 성과를 낼 수 있도록 역량을 집중할 것”이라고 말했다.</p>", "body_text": "- 글로벌 1위 NAC 제품과 경쟁해 첫 수주 성공  \n - 동남아 시장 진출 4개월 만에 의미있는 성과 거둬\n\n2018년 1월 5일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 동남아 진출 4개월 만에 미국법인을 통해 첫 NAC 사업 수주에 성공했다.\n\n지니언스는 태국 현지 유통 파트너인 블루지브라(Bl...", "full_text": "- 글로벌 1위 NAC 제품과 경쟁해 첫 수주 성공  \n - 동남아 시장 진출 4개월 만에 의미있는 성과 거둬\n\n2018년 1월 5일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 동남아 진출 4개월 만에 미국법인을 통해 첫 NAC 사업 수주에 성공했다.\n\n지니언스는 태국 현지 유통 파트너인 블루지브라(BlueZebra)社를 통해 치앙마이 국립대학 NAC 구축사업을 수주했다고 5일 밝혔다. 회사는 이번 사업을 통해 1차로 2,500개 단말관리가 가능한 소프트웨어를 납품 할 예정이다.\n\n이번 사업은 글로벌 1위 NAC 제품과의 비교 테스트를 통해 지니언스 제품이 최종 선정되었다. 회사측은 치앙마이 대학 수주는 해외시장에서의 가능성을 증명한 의미있는 성과라고 설명하며 현재 유럽, 말레이시아 등에서도 자동차, 선박, 은행 등의 다수 기업에서도 도입을 위한 테스트를 진행 중이라고 밝혔다.\n\n지난 9월 동남아 시장진출에 나선 지니언스는 미국법인을 통해 2018년 1월 현재 미국 3개사, 싱가포르 2개사, 말레이시아 2개사 등 12개의 글로벌 현지 파트너사와 계약을 완료했다.\n\n지니언스의 이동범 대표이사는 “치앙마이 대학 수주는 지니언스의 제품이 기능, 안정성 측면에서 글로벌 제품과 비교해도 이길 수 있는 충분한 경쟁력을 갖추었음을 보여준 것”이라며 “현재까지 계약한 파트너사가 적극적으로 현지 고객에 소개하며 활발한 비즈니스를 전개하고 있어 지속적인 성과를 낼 수 있도록 역량을 집중할 것”이라고 말했다."}, {"title": "지니언스, ‘아마존웹서비스(AWS) 리인벤트 2017’ 컨퍼런스 참가 [17.11.22]", "date": "2017.11.22", "link": "https://www.genians.co.kr/pr-room/press/지니언스-아마존웹서비스aws-리인벤트-2017-컨퍼런", "category": "기타 뉴스", "body_html": "<ul>\n<li>글로벌 시장에서 SaaS 제공기업으로 입지 강화 목표  </li>\n<li>사물인터넷 시대 단말 관리 자동화를 위한 NAC 역할 강조</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_NAC_Device-Platform-Intelligence-1.png?width=500&amp;height=500&amp;name=Genian_NAC_Device-Platform-Intelligence-1.png\" /></p>\n<p>2017년 11월 22일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 오는 11월 27일부터 12월 1일까지 미국 라스베가스에서 열리는 ‘아마존웹서비스 리인벤트 2017(AWS re:INVENT 2017)’에 참가한다.</p>\n<p>지니언스는 글로벌 시장에서 클라우드 기반 서비스형 소프트웨어(SaaS: Software as a Service) 제공기업으로 자리잡고자 전시에 참가해 ‘지니안 NAC’ 클라우드 버전을 소개할 예정이다.</p>\n<p>회사측은 사물인터넷(IoT) 시대 폭발적으로 증가하는 단말 관리 자동화를 위한 효율적인 대안으로 클라우드 NAC의 역할을 강조하며 현지 매니지드 서비스 사업자와 중소형(SME) 규모 기업 고객 발굴에 집중할 계획이라고 밝혔다.</p>\n<p>지니언스가 참가하는 ‘아마존웹서비스(AWS) 리인벤트’는 아마존웹서비스가 매년 개최하는 글로벌 최대 클라우드 기술 컨퍼런스로 최신 클라우드 동향을 확인할 수 있는 기술 세션, 파트너 엑스포 등이 진행된다. 주최측은 올해 전년대비 67% 이상 증가한 약 4만명 이상의 참관객이 방문할 것으로 예측하고 있다.</p>\n<p>김계연 지니언스 미국법인장은 “올 초 ‘지니안 NAC’ 클라우드 버전 글로벌 출시를 기점으로 벨기에, 태국, 말레이시아, 나이지리아 등의 리셀러와 파트너 계약을 진행하며 현지 고객확보를 위한 준비를 마쳤다.”며 “전세계 최대규모의 글로벌 클라우드 관련 컨퍼런스 참가를 통해 기술력을 갖춘 클라우드 기반 서비스형 소프트웨어 기업임을 알려 유료 고객을 확보해 나갈 것”이라고 말했다.</p>", "body_text": "- 글로벌 시장에서 SaaS 제공기업으로 입지 강화 목표  \n - 사물인터넷 시대 단말 관리 자동화를 위한 NAC 역할 강조\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_NAC_Device-Platform-Intelligence-1.png?width=500&height=500&...", "full_text": "- 글로벌 시장에서 SaaS 제공기업으로 입지 강화 목표  \n - 사물인터넷 시대 단말 관리 자동화를 위한 NAC 역할 강조\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/Genian_NAC_Device-Platform-Intelligence-1.png?width=500&height=500&name=Genian_NAC_Device-Platform-Intelligence-1.png)\n\n2017년 11월 22일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 오는 11월 27일부터 12월 1일까지 미국 라스베가스에서 열리는 ‘아마존웹서비스 리인벤트 2017(AWS re:INVENT 2017)’에 참가한다.\n\n지니언스는 글로벌 시장에서 클라우드 기반 서비스형 소프트웨어(SaaS: Software as a Service) 제공기업으로 자리잡고자 전시에 참가해 ‘지니안 NAC’ 클라우드 버전을 소개할 예정이다.\n\n회사측은 사물인터넷(IoT) 시대 폭발적으로 증가하는 단말 관리 자동화를 위한 효율적인 대안으로 클라우드 NAC의 역할을 강조하며 현지 매니지드 서비스 사업자와 중소형(SME) 규모 기업 고객 발굴에 집중할 계획이라고 밝혔다.\n\n지니언스가 참가하는 ‘아마존웹서비스(AWS) 리인벤트’는 아마존웹서비스가 매년 개최하는 글로벌 최대 클라우드 기술 컨퍼런스로 최신 클라우드 동향을 확인할 수 있는 기술 세션, 파트너 엑스포 등이 진행된다. 주최측은 올해 전년대비 67% 이상 증가한 약 4만명 이상의 참관객이 방문할 것으로 예측하고 있다.\n\n김계연 지니언스 미국법인장은 “올 초 ‘지니안 NAC’ 클라우드 버전 글로벌 출시를 기점으로 벨기에, 태국, 말레이시아, 나이지리아 등의 리셀러와 파트너 계약을 진행하며 현지 고객확보를 위한 준비를 마쳤다.”며 “전세계 최대규모의 글로벌 클라우드 관련 컨퍼런스 참가를 통해 기술력을 갖춘 클라우드 기반 서비스형 소프트웨어 기업임을 알려 유료 고객을 확보해 나갈 것”이라고 말했다."}, {"title": "지니언스-SK인포섹 위협 인텔리전스 체계 공동 운영 [17.11.14]", "date": "2017.11.14", "link": "https://www.genians.co.kr/pr-room/press/지니언스-sk인포섹-위협-인텔리전스-체계-공동-운영-17-11-14", "category": "기타 뉴스", "body_html": "<ul>\n<li>지니안 인사이츠 E’와 ‘시큐디움 인텔리전스’ 서비스 연동  </li>\n<li>국내 기업간 위협 인텔리전스 협력 활성화 앞장설 터</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84%EC%9E%90%EB%A3%8C1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4SK%EC%9D%B8%ED%8F%AC%EC%84%B9_%EC%9C%84%ED%98%91-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%ED%98%91%EB%A0%A5.jpg?width=750&amp;height=460&amp;name=%EC%82%AC%EC%A7%84%EC%9E%90%EB%A3%8C1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4SK%EC%9D%B8%ED%8F%AC%EC%84%B9_%EC%9C%84%ED%98%91-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%ED%98%91%EB%A0%A5.jpg\" /><br />\n &lt;사진 설명&gt; 경기도 성남 판교 SK인포섹 본사에서 김계연 지니언스 연구소장(왼쪽)과<br />\n 황성익 SK인포섹 마케팅부문장이 지난 13일 ‘위협 인텔리전스 기반 엔드포인트 보안 사업협력 협약식’을 가진 뒤 기념사진을 촬영하고 있다.</p>\n<p>2017년 11월 14일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 SK인포섹(www.skinfosec.com, 대표이사 안희철)과 보안위협 대응을 위한 위협 인텔리전스 체계를 공동 운영한다.</p>\n<p>이번 공동 운영은 다양한 형태의 얼라이언스를 운영하며 공동으로 위협 정보를 수집하고 분석하는 해외 사례와 같이 국내에서도 보안 전문기업간 협업이 필수라는 양사의 공감대 속에 이루어졌다. 향후 양사가 보유한 제품과 서비스의 연동을 통해 국내 기업간 위협 인텔리전스 협력 활성화에 앞장선다는 계획이다. 양사는 ‘지니안 인사이츠 E’ 제품과 ‘시큐디움 인텔리전스’ 서비스를 연동해 최신 위협정보를 수집하고 분석 후 사용자에게 제공하고 관련 사업을 확대해 나간다.</p>\n<p>지니언스의 단말기반 지능형 위협대응 솔루션 ‘지니안 인사이츠 E’는 랜섬웨어 등의 악성코드로 인해 단말에서 발생한 보안위협을 신속하게 탐지하고 대응할 수 있는 제품으로, 발견된 위협의 실행단계에서 최신 침해지표를 활용해 즉각적으로 조치 할 수 있다.</p>\n<p>SK인포섹의 CTI(Cyber Threat Intelligence: 사이버 위협 인텔리전스) 서비스 ‘시큐디움 인텔리전스’는 글로벌 사이버위협연합(CTA) 공유 정보와 운영 중인 보안 시스템, 웹 크롤러(WEB Crawler), 소셜 네트워킹 서비스(SNS) 등 다양한 경로에서 보안공격에 활용된 것으로 의심되는 정보를 수집하고 분석해 제공한다.</p>\n<p>황성익 SK인포섹 마케팅부문장은 “각 보안 분야의 선두 기업들과 위협 정보를 공유하고, 공동 대응 전선을 구축하는 것은 지능형 위협을 방어하는데 있어 매우 효과적인 전략”이라며  “국내 네트워크 보안 분야에서 우수한 기술과 노하우를 갖추고 있는 지니언스와 협력해 한층 더 고도화된 방어 체계를 만들어 나갈 것”이라고 말했다.</p>\n<p>김계연 지니언스 기술연구소장은 “국내 최고의 보안서비스 노하우를 보유한 SK인포섹과의 협업을 통해 보다 진화한 형태의 위협 인텔리전스 정보를 고객에게 제공할 수 있게 되었다.”며 “보안위협 대응을 위해서는 단일 기업이 아닌 전 산업차원의 협업이 요구되는 시대인 만큼 우수한 협업 사례가 될 수 있도록 노력할 것”이라고 말했다.</p>\n<p>- 이 상</p>", "body_text": "- 지니안 인사이츠 E’와 ‘시큐디움 인텔리전스’ 서비스 연동  \n - 국내 기업간 위협 인텔리전스 협력 활성화 앞장설 터\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84%EC%9E%90%EB%A3%8C1-%EC%A7%80%EB%8B%88%EC%96%B8%EC...", "full_text": "- 지니안 인사이츠 E’와 ‘시큐디움 인텔리전스’ 서비스 연동  \n - 국내 기업간 위협 인텔리전스 협력 활성화 앞장설 터\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%82%AC%EC%A7%84%EC%9E%90%EB%A3%8C1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4SK%EC%9D%B8%ED%8F%AC%EC%84%B9_%EC%9C%84%ED%98%91-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%ED%98%91%EB%A0%A5.jpg?width=750&height=460&name=%EC%82%AC%EC%A7%84%EC%9E%90%EB%A3%8C1-%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4SK%EC%9D%B8%ED%8F%AC%EC%84%B9_%EC%9C%84%ED%98%91-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%ED%98%91%EB%A0%A5.jpg)  \n <사진 설명> 경기도 성남 판교 SK인포섹 본사에서 김계연 지니언스 연구소장(왼쪽)과  \n 황성익 SK인포섹 마케팅부문장이 지난 13일 ‘위협 인텔리전스 기반 엔드포인트 보안 사업협력 협약식’을 가진 뒤 기념사진을 촬영하고 있다.\n\n2017년 11월 14일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 SK인포섹(www.skinfosec.com, 대표이사 안희철)과 보안위협 대응을 위한 위협 인텔리전스 체계를 공동 운영한다.\n\n이번 공동 운영은 다양한 형태의 얼라이언스를 운영하며 공동으로 위협 정보를 수집하고 분석하는 해외 사례와 같이 국내에서도 보안 전문기업간 협업이 필수라는 양사의 공감대 속에 이루어졌다. 향후 양사가 보유한 제품과 서비스의 연동을 통해 국내 기업간 위협 인텔리전스 협력 활성화에 앞장선다는 계획이다. 양사는 ‘지니안 인사이츠 E’ 제품과 ‘시큐디움 인텔리전스’ 서비스를 연동해 최신 위협정보를 수집하고 분석 후 사용자에게 제공하고 관련 사업을 확대해 나간다.\n\n지니언스의 단말기반 지능형 위협대응 솔루션 ‘지니안 인사이츠 E’는 랜섬웨어 등의 악성코드로 인해 단말에서 발생한 보안위협을 신속하게 탐지하고 대응할 수 있는 제품으로, 발견된 위협의 실행단계에서 최신 침해지표를 활용해 즉각적으로 조치 할 수 있다.\n\nSK인포섹의 CTI(Cyber Threat Intelligence: 사이버 위협 인텔리전스) 서비스 ‘시큐디움 인텔리전스’는 글로벌 사이버위협연합(CTA) 공유 정보와 운영 중인 보안 시스템, 웹 크롤러(WEB Crawler), 소셜 네트워킹 서비스(SNS) 등 다양한 경로에서 보안공격에 활용된 것으로 의심되는 정보를 수집하고 분석해 제공한다.\n\n황성익 SK인포섹 마케팅부문장은 “각 보안 분야의 선두 기업들과 위협 정보를 공유하고, 공동 대응 전선을 구축하는 것은 지능형 위협을 방어하는데 있어 매우 효과적인 전략”이라며  “국내 네트워크 보안 분야에서 우수한 기술과 노하우를 갖추고 있는 지니언스와 협력해 한층 더 고도화된 방어 체계를 만들어 나갈 것”이라고 말했다.\n\n김계연 지니언스 기술연구소장은 “국내 최고의 보안서비스 노하우를 보유한 SK인포섹과의 협업을 통해 보다 진화한 형태의 위협 인텔리전스 정보를 고객에게 제공할 수 있게 되었다.”며 “보안위협 대응을 위해서는 단일 기업이 아닌 전 산업차원의 협업이 요구되는 시대인 만큼 우수한 협업 사례가 될 수 있도록 노력할 것”이라고 말했다.\n\n- 이 상"}, {"title": "지니언스, 클라우드 시큐리티 엑스포 현지 관심 발판 삼아 동남아 시장 확대 나서 [17.10.16]", "date": "2017.10.19", "link": "https://www.genians.co.kr/pr-room/press/지니언스-클라우드-시큐리티-엑스포-현지-관심-발판", "category": "AI & Cloud", "body_html": "<ul>\n<li>\n<p>지니안 NAC 클라우드 버전 동남아 시장 소개</p>\n</li>\n<li>\n<p>지니언스 미국법인과 말레이시아 2개사, 태국 1개사 현지 리셀러 계약 체결</p>\n</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/cloudsecurity.jpg?width=680&amp;height=424&amp;name=cloudsecurity.jpg\" /></p>\n<p>[사진설명: 클라우드 사이버 시큐리티 엑스포에서 참관객을 대상으로 제품설명을 진행하고 있다.]</p>\n<p>2017년 10월 16일 - 종합 보안 소프트웨어 개발기업 지니언스(<a href=\"https://www.genians.co.kr/\">www.genians.co.kr</a>, 대표이사 이동범)가 싱가포르 마리나베이 샌즈 엑스포 컨벤션센터에서 11일과 12일 열린 클라우드 사이버 시큐리티 엑스포를 성공적으로 마무리하고 본격적인 동남아 시장 개척에 나선다고 16일 밝혔다.</p>\n<p>지니언스는 동남아 시장 진출을 위해 현지 오프라인 마케팅 활동으로 참가한 클라우드 시큐리티 엑스포에서 자사의 ‘지니안 NAC’ 클라우드 버전을 선보여 싱가포르, 말레이시아 클라우드 서비스 리셀러 등의 많은 관심을 받았다. 클라우드 시큐리티 엑스포는 45개국 1만 3천명 이상의 아시아 지역 IT관련 의사결정권자들이 방문하는 클라우드 보안 전문 전시회다.</p>\n<p>지니언스는 동남아 시장 진출을 준비하며 지난 9월부터 싱가포르, 말레이시아, 베트남 등에서 열린 시장상담회에 참여해 자사 ‘지니안 NAC’ 클라우드 버전을 소개해왔다. 글로벌 비즈니스를 담당하는 지니언스 미국법인은 당시 관심을 보인 말레이시아 2개사, 태국 1개사와 이번달 초 현지 리셀러 계약체결을 진행했다.</p>\n<p>지니언스의 김계연 미국법인장은 “병원, 학교 등을 고객사로 보유한 다양한 현지 리셀러들이 자사 NAC의 기능과 운영편의성에 많은 관심을 보이며 실제 적용 방식에 대한 문의가 이어졌다”며 “동남아 시장 진출 초기지만 현지 반응이 뜨거운 만큼 실질적인 성과로 이어질 수 있도록 노력할 것”이라고 말했다.</p>", "body_text": "- 지니안 NAC 클라우드 버전 동남아 시장 소개\n\n- 지니언스 미국법인과 말레이시아 2개사, 태국 1개사 현지 리셀러 계약 체결\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/cloudsecurity.jpg?width=680&height=424&name=cloudsecurity.jpg)\n\n...", "full_text": "- 지니안 NAC 클라우드 버전 동남아 시장 소개\n\n- 지니언스 미국법인과 말레이시아 2개사, 태국 1개사 현지 리셀러 계약 체결\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/cloudsecurity.jpg?width=680&height=424&name=cloudsecurity.jpg)\n\n[사진설명: 클라우드 사이버 시큐리티 엑스포에서 참관객을 대상으로 제품설명을 진행하고 있다.]\n\n2017년 10월 16일 - 종합 보안 소프트웨어 개발기업 지니언스([www.genians.co.kr](https://www.genians.co.kr/), 대표이사 이동범)가 싱가포르 마리나베이 샌즈 엑스포 컨벤션센터에서 11일과 12일 열린 클라우드 사이버 시큐리티 엑스포를 성공적으로 마무리하고 본격적인 동남아 시장 개척에 나선다고 16일 밝혔다.\n\n지니언스는 동남아 시장 진출을 위해 현지 오프라인 마케팅 활동으로 참가한 클라우드 시큐리티 엑스포에서 자사의 ‘지니안 NAC’ 클라우드 버전을 선보여 싱가포르, 말레이시아 클라우드 서비스 리셀러 등의 많은 관심을 받았다. 클라우드 시큐리티 엑스포는 45개국 1만 3천명 이상의 아시아 지역 IT관련 의사결정권자들이 방문하는 클라우드 보안 전문 전시회다.\n\n지니언스는 동남아 시장 진출을 준비하며 지난 9월부터 싱가포르, 말레이시아, 베트남 등에서 열린 시장상담회에 참여해 자사 ‘지니안 NAC’ 클라우드 버전을 소개해왔다. 글로벌 비즈니스를 담당하는 지니언스 미국법인은 당시 관심을 보인 말레이시아 2개사, 태국 1개사와 이번달 초 현지 리셀러 계약체결을 진행했다.\n\n지니언스의 김계연 미국법인장은 “병원, 학교 등을 고객사로 보유한 다양한 현지 리셀러들이 자사 NAC의 기능과 운영편의성에 많은 관심을 보이며 실제 적용 방식에 대한 문의가 이어졌다”며 “동남아 시장 진출 초기지만 현지 반응이 뜨거운 만큼 실질적인 성과로 이어질 수 있도록 노력할 것”이라고 말했다."}, {"title": "지니언스, 위협 인텔리전스 분석 스타트업 '엔키'에 투자 [17.10.10]", "date": "2017.10.10", "link": "https://www.genians.co.kr/pr-room/press/지니언스-위협-인텔리전스-분석-스타트업-엔키에-투", "category": "기타 뉴스", "body_html": "<ul>\n<li>지능형 악성위협 대응 서비스 역량강화를 위한 투자  </li>\n<li>KISIA 정보보안산업전문위원회 산하 ‘시큐리티 스타트업 포럼’ 1호 협력사례</li>\n</ul>\n<p>2017년 10월 10일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)가 위협 인텔리전스 분석 전문 스타트업 엔키(대표이사 박현도)에 투자했다고 10일 밝혔다.</p>\n<p>지니언스는 이번 투자를 통해 엔키가 보유한 위협 인텔리전스 분석 기술을 자사 단말기반 지능형 위협대응 솔루션 ‘지니안 인사이츠 E(Genian Insights E)’에 적용해 제품의 탐지 역량을 강화하기 위해 투자를 결정했다고 밝혔다. 네트워크와 단말기반 보안제품 개발에 주력해 온 지니언스가 지능형 악성위협 대응 서비스 역량 강화를 위해 협업할 수 있는 스타트업을 찾아 온 가운데 성사되었다.</p>\n<p>2016년 창업한 엔키는 차별화된 분석역량을 통해 악성위협 정보제공, 모의해킹과 보안 교육 플랫폼 제공 등 기업별 맞춤화 보안서비스 제공을 목표로 하고있는 정보보안 전문 스타트업이다.</p>\n<p>현재 CEO를 맡고있는 박현도 대표이사는 고려대 박사 출신으로, 미국 뉴저지 벨연구소와 코닉글로리에서 근무하며 학계와 보안산업계를 고루 경험했으며 2009년 해킹방어대회 코드게이트에서 대상을 수상한 바 있다. 엔키에 합류한 멤버 역시 세계 최고의 해킹대회인 데프콘 본선 진출 경력을 보유하고 국내외 보안대회에서 수상한 전문 인력으로 구성되어 있다.</p>\n<p>특히, 이번 투자는 지난 9월 26일 정보보안 기업이 스타트업을 발굴하고 지원해 보안산업을 활성화하기 위해 시작된 한국정보보호산업협회 정보보안산업전문위원회 산하 ‘시큐리티 스타트업 포럼(의장 이동범 지니언스 대표이사, 박찬암 스틸리언 대표이사)’에서 탄생한 기존 정보보안기업-보안 전문 스타트업 간 1호 협력사례다.</p>\n<p>지니언스의 이동범 대표이사는 “이스라엘, 미국 등을 기반으로 한 글로벌 IT기업은 전문 역량을 보유한 스타트업 투자와 인수 등을 통해 역동적인 산업생태계를 구축하고 있다”며 “엔키 투자를 시작으로 역량있는 보안 스타트업을 발굴하고 지원하며 국내 정보보안 산업이 지속적으로 성장 할 수 있는 환경을 만들기 위해 노력할 것”이라고 말했다.</p>", "body_text": "- 지능형 악성위협 대응 서비스 역량강화를 위한 투자  \n - KISIA 정보보안산업전문위원회 산하 ‘시큐리티 스타트업 포럼’ 1호
