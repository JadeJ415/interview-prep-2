보한 고객사는 오케이포스 포함 기업 4개사, 금융 1개사, 공공분야 5개 기관 등이다.</p>\n<p>올해 공식 출시한 지니언스의 EDR ‘지니안 인사이츠 E’는 랜섬웨어 등의 악성코드로 인해 단말에서 발생한 보안위협을 신속하게 탐지하고 대응할 수 있는 인텔리전스 기반 제품이다. 이 제품은 특히 발견된 위협의 실행단계에서 최신 침해지표를 활용해 신속하게 탐지하고 즉각적으로 조치 대응 할 수 있다는 강점이 있다.</p>\n<p>글로벌 시장조사기관인 가트너에 따르면 글로벌 EDR 분야는 2015년을 기준으로 2020년까지 연평균복합성장률이 45.27%를 나타내는 큰 폭의 성장이 예상되는 시장이다. 지니언스는 타 제품대비 실질적이고 즉각적인 대응이 가능한 지능형 위협대응 단말 보안 솔루션임을 강조하며 시장점유율을 확대해 나가겠다는 계획이다.</p>\n<p>지니언스의 이동범 대표이사는 “지니언스의 인사이츠 E는 최신 보안위협에 대응하기 위한 인텔리전스 플랫폼으로 환경변화에 따라 새로운 보안위협이 나타나도 그에 맞는 기능을 추가할 수 있도록 설계되었다.”며 “기존 NAC 사업을 진행하며 쌓은 노하우를 바탕으로 새롭게 떠오르는 국내외 EDR 시장을 주도할 수 있도록 총력을 기울일 것”이라고 말했다.</p>\n<ul>\n<li>이 상</li>\n</ul>", "body_text": "- 기업/금융/공공 분야 고른 신규 고객사 확보  \n - 랜섬웨어 등 지능형 악성위협 대응에 대한 관심 증가로 최근 EDR 시장 관심 높아져\n\n![](https://www.genians.co.kr/hubfs/Imported_Blog_Media/Genians_CI@2x.png)\n\n2017년 9월 13일 - 종합 보안 소프트웨어 개발기업 지니언스(www.gen...", "full_text": "- 기업/금융/공공 분야 고른 신규 고객사 확보  \n - 랜섬웨어 등 지능형 악성위협 대응에 대한 관심 증가로 최근 EDR 시장 관심 높아져\n\n![](https://www.genians.co.kr/hubfs/Imported_Blog_Media/Genians_CI@2x.png)\n\n2017년 9월 13일 - 종합 보안 소프트웨어 개발기업 지니언스(www.genians.co.kr, 대표이사 이동범)이 차기 주력제품인 ‘지니안 인사이츠 E(Genian Insights E)’를 통해 분야별 고객사를 두루 확보하며 판매 호조를 보이고 있다고 13일 밝혔다.\n\n지니언스는 지난 5월 워너크라이 사태 이후 랜섬웨어 등 지능형 악성위협에 대한 대응을 고민하는 기존 고객사를 대상으로 단말기반 지능형 위협대응 (EDR: Endpoint Detection & Response, 이후 EDR) 제품을 소개해왔다. 지니언스가 자사의 EDR 제품 ‘지니안 인사이츠 E’를 통해 확보한 고객사는 오케이포스 포함 기업 4개사, 금융 1개사, 공공분야 5개 기관 등이다.\n\n올해 공식 출시한 지니언스의 EDR ‘지니안 인사이츠 E’는 랜섬웨어 등의 악성코드로 인해 단말에서 발생한 보안위협을 신속하게 탐지하고 대응할 수 있는 인텔리전스 기반 제품이다. 이 제품은 특히 발견된 위협의 실행단계에서 최신 침해지표를 활용해 신속하게 탐지하고 즉각적으로 조치 대응 할 수 있다는 강점이 있다.\n\n글로벌 시장조사기관인 가트너에 따르면 글로벌 EDR 분야는 2015년을 기준으로 2020년까지 연평균복합성장률이 45.27%를 나타내는 큰 폭의 성장이 예상되는 시장이다. 지니언스는 타 제품대비 실질적이고 즉각적인 대응이 가능한 지능형 위협대응 단말 보안 솔루션임을 강조하며 시장점유율을 확대해 나가겠다는 계획이다.\n\n지니언스의 이동범 대표이사는 “지니언스의 인사이츠 E는 최신 보안위협에 대응하기 위한 인텔리전스 플랫폼으로 환경변화에 따라 새로운 보안위협이 나타나도 그에 맞는 기능을 추가할 수 있도록 설계되었다.”며 “기존 NAC 사업을 진행하며 쌓은 노하우를 바탕으로 새롭게 떠오르는 국내외 EDR 시장을 주도할 수 있도록 총력을 기울일 것”이라고 말했다.\n\n- 이 상"}, {"title": "지니언스, 글로벌 비즈니스 경과 보고 및 향후 전략 발표 [17.07.27]", "date": "2017.07.27", "link": "https://www.genians.co.kr/pr-room/press/지니언스-글로벌-비즈니스-경과-보고-및-향후-전략-발", "category": "비즈니스 & 성과", "body_html": "<ul>\n<li>벨기에, 브라질 2개사 현지 MSP 파트너쉽 체결 완료, 하반기 5개 국가 협력 체결 논의  </li>\n<li>온라인 NAC 서비스를 통해 60여개 국가 110여개의 고객사 대상 시범서비스 중  </li>\n<li>사물인터넷 보안, 블랙 클라우드 기술로 글로벌 시장 공략 강화</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-7%EC%9B%94-27%EC%9D%BC-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C-%EC%82%AC%EC%A7%842-1.jpg?width=1000&amp;height=666&amp;name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-7%EC%9B%94-27%EC%9D%BC-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C-%EC%82%AC%EC%A7%842-1.jpg\" /></p>\n<p>2017년 7월 27일 - 종합 보안 소프트웨어 개발기업 지니언스(구, 지니네트웍스 www.genians.co.kr, 대표이사 이동범)가 27일 강남 아크펍에서 간담회를 개최하고 미국법인 설립 이후 글로벌 비즈니스 경과 및 향후 전략에 대해 설명했다.</p>\n<p>이번 간담회를 통해 지니언스는 올해 미국 RSA 컨퍼런스, 영국 인포 시큐리티 유럽 등 글로벌 대형 이벤트에 참가해 자사의 클라우드 NAC 서비스를 선보였고, 현재 7개국 이상의 매니지드 서비스(이하 MSP) 사업자와 현지 서비스를 위한 논의를 진행 중이라고 밝혔다.</p>\n<p>지니언스는 2016년 미국법인 설립을 시작으로 온라인 기반의 클라우드 NAC 서비스를 중심으로 본격적인 글로벌 비즈니스에 역량을 집중하고 있다. 지니언스는 글로벌 비즈니스 거점인 미국법인에서 2016년 개설한 온라인 마켓에 중심으로 전세계 각 국의 현지 MSP 사업자를 통해 클라우드 NAC 서비스를 제공하겠다는 전략이다. 이 같은 전략으로 현재 60여개 국가 110여개의 고객사를 대상으로 NAC를 시범서비스 중이다.</p>\n<p>지난 6월에는 벨기에 현지 MSP와 파트너쉽을 체결했으며, 브라질의 MSP와는 파트너쉽 체결을 완료하고 하반기 현지 로드쇼를 통해 오프라인 마케팅을 진행할 예정이다. 아울러 영국, 독일, 터키, 이스라엘, 오만 지역의 잠재 파트너사를 확보해 하반기 현지 서비스를 위한 구체적인 비즈니스 협력 체결을 논의 중이라고 설명했다.</p>\n<p>지니언스는 향후 글로벌 시장 확대를 위한 2단계 전략으로 사물인터넷 환경 단말 관리 기술과 블랙 클라우드 기술 개발에 매진하고 있다는 내용도 밝혔다.</p>\n<p>사물인터넷 환경 단말 관리 기술은 지니언스가 보유하고 있는 2만 여종의 플랫폼 DB를 기반으로 빌딩 자동제어시스템 전문기업 시메트릭스, 미국 뉴햄프셔 주립대학교 상호운용성 연구소(UNH-IOL)가 공동 개발을 통해 진행하고 있다. 개발된 기술은 향후 스마트 빌딩, 스마트 카, 홈시큐리티 등에 확대 서비스 한다는 계획이다.<br />\n 블랙 클라우드는 클라우드 자원에 접근하는 사용자의 인가여부에 따라 접근 권한을 다르게 설정하기 위한 기술로, 지니언스는 산업통산자원부에서 주관하는 2017년 우수기술연구센터(ATC: Advanced Technology Center) 지원사업의 수행업체로 선정돼 이 분야 기술개발에도 힘을 쏟겠다는 방침이다.<br />\n 지니언스의 이동범 대표이사는 “클라우드 기반 NAC를 글로벌 시장에 런칭해 오프라인 중심의 전통적인 비즈니스 모델로는 발굴하기 어려운 다양한 국가의 사용자, 현지 MSP 사업자로부터 높은 관심을 받고있다”며 “IT 환경과 확장성을 토대로 온라인 보안 분야에 집중해 글로벌 비즈니스 전략에 대한 가능성을 확인한 만큼, 사물인터넷 시대 최적의 보안 솔루션을 제공하는 글로벌 보안 기업으로 성장할 수 있도록 최선의 노력을 다 할 것”이라고 말했다.</p>", "body_text": "- 벨기에, 브라질 2개사 현지 MSP 파트너쉽 체결 완료, 하반기 5개 국가 협력 체결 논의  \n - 온라인 NAC 서비스를 통해 60여개 국가 110여개의 고객사 대상 시범서비스 중  \n - 사물인터넷 보안, 블랙 클라우드 기술로 글로벌 시장 공략 강화\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog...", "full_text": "- 벨기에, 브라질 2개사 현지 MSP 파트너쉽 체결 완료, 하반기 5개 국가 협력 체결 논의  \n - 온라인 NAC 서비스를 통해 60여개 국가 110여개의 고객사 대상 시범서비스 중  \n - 사물인터넷 보안, 블랙 클라우드 기술로 글로벌 시장 공략 강화\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-7%EC%9B%94-27%EC%9D%BC-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C-%EC%82%AC%EC%A7%842-1.jpg?width=1000&height=666&name=%EC%A7%80%EB%8B%88%EC%96%B8%EC%8A%A4-7%EC%9B%94-27%EC%9D%BC-%EA%B8%B0%EC%9E%90%EA%B0%84%EB%8B%B4%ED%9A%8C-%EC%82%AC%EC%A7%842-1.jpg)\n\n2017년 7월 27일 - 종합 보안 소프트웨어 개발기업 지니언스(구, 지니네트웍스 www.genians.co.kr, 대표이사 이동범)가 27일 강남 아크펍에서 간담회를 개최하고 미국법인 설립 이후 글로벌 비즈니스 경과 및 향후 전략에 대해 설명했다.\n\n이번 간담회를 통해 지니언스는 올해 미국 RSA 컨퍼런스, 영국 인포 시큐리티 유럽 등 글로벌 대형 이벤트에 참가해 자사의 클라우드 NAC 서비스를 선보였고, 현재 7개국 이상의 매니지드 서비스(이하 MSP) 사업자와 현지 서비스를 위한 논의를 진행 중이라고 밝혔다.\n\n지니언스는 2016년 미국법인 설립을 시작으로 온라인 기반의 클라우드 NAC 서비스를 중심으로 본격적인 글로벌 비즈니스에 역량을 집중하고 있다. 지니언스는 글로벌 비즈니스 거점인 미국법인에서 2016년 개설한 온라인 마켓에 중심으로 전세계 각 국의 현지 MSP 사업자를 통해 클라우드 NAC 서비스를 제공하겠다는 전략이다. 이 같은 전략으로 현재 60여개 국가 110여개의 고객사를 대상으로 NAC를 시범서비스 중이다.\n\n지난 6월에는 벨기에 현지 MSP와 파트너쉽을 체결했으며, 브라질의 MSP와는 파트너쉽 체결을 완료하고 하반기 현지 로드쇼를 통해 오프라인 마케팅을 진행할 예정이다. 아울러 영국, 독일, 터키, 이스라엘, 오만 지역의 잠재 파트너사를 확보해 하반기 현지 서비스를 위한 구체적인 비즈니스 협력 체결을 논의 중이라고 설명했다.\n\n지니언스는 향후 글로벌 시장 확대를 위한 2단계 전략으로 사물인터넷 환경 단말 관리 기술과 블랙 클라우드 기술 개발에 매진하고 있다는 내용도 밝혔다.\n\n사물인터넷 환경 단말 관리 기술은 지니언스가 보유하고 있는 2만 여종의 플랫폼 DB를 기반으로 빌딩 자동제어시스템 전문기업 시메트릭스, 미국 뉴햄프셔 주립대학교 상호운용성 연구소(UNH-IOL)가 공동 개발을 통해 진행하고 있다. 개발된 기술은 향후 스마트 빌딩, 스마트 카, 홈시큐리티 등에 확대 서비스 한다는 계획이다.  \n 블랙 클라우드는 클라우드 자원에 접근하는 사용자의 인가여부에 따라 접근 권한을 다르게 설정하기 위한 기술로, 지니언스는 산업통산자원부에서 주관하는 2017년 우수기술연구센터(ATC: Advanced Technology Center) 지원사업의 수행업체로 선정돼 이 분야 기술개발에도 힘을 쏟겠다는 방침이다.  \n 지니언스의 이동범 대표이사는 “클라우드 기반 NAC를 글로벌 시장에 런칭해 오프라인 중심의 전통적인 비즈니스 모델로는 발굴하기 어려운 다양한 국가의 사용자, 현지 MSP 사업자로부터 높은 관심을 받고있다”며 “IT 환경과 확장성을 토대로 온라인 보안 분야에 집중해 글로벌 비즈니스 전략에 대한 가능성을 확인한 만큼, 사물인터넷 시대 최적의 보안 솔루션을 제공하는 글로벌 보안 기업으로 성장할 수 있도록 최선의 노력을 다 할 것”이라고 말했다."}, {"title": "정보보안 전문 지니언스, 코스닥시장 상장 증권신고서 제출 [17.06.20]", "date": "2017.06.20", "link": "https://www.genians.co.kr/pr-room/press/정보보안-전문-지니언스-코스닥시장-상장-증권신고", "category": "비즈니스 & 성과", "body_html": "<p>정보보안 전문기업 지니언스(대표이사 이동범)가 20일 금융위원회에 증권신고서를 제출하고 코스닥시장 상장을 본격 추진한다.</p>\n<p>지니언스의 총 공모주식 수는 830,000주로 전체 신주발행으로 진행될 예정이며, 주당 공모 희망가는 12,000원~13,500원이다. 이번 공모를 통해 최대 112억 5백만원을 조달한다. 공모자금은 연구개발, 해외시장 개척 등에 사용될 계획이다.</p>\n<p>내달 17일~18일 기관투자자 대상 수요예측을 진행해 최종 공모가를 확정하고 24일~25일 일반 청약을 받는다. 8월 초 상장 예정이며, 대표주관사는 하나금융투자이다.</p>\n<p>2005년 설립된 지니언스는 기업과 기관에서 운영중인 내부 네트워크의 보안 강화를 위해 소프트웨어를 개발하는 정보보안 전문기업이다. 네트워크 보안과 단말 분석관련 축적된 기술력을 보유하고 있다.</p>\n<p>회사의 주력 제품인 ‘지니안 NAC’는 운영중인 네트워크에 접속하는 노트북, 스마트폰 등 단말의 보안 이상유무를 판별하고 사용자 인증을 통해 네트워크 접근을 제어해 내부 자산과 사용자를 보호하는 유무선 네트워크 접근제어(NAC: Network Access Control) 솔루션이다.</p>\n<p>‘지니안 NAC’는 회사가 보유한 2만여 개의 플랫폼 데이터베이스를 바탕으로 내부 네트워크에 연결된 모든 단말에 대한 즉각적인 분석이 가능하다. 또한, 내부에서 보유한 인사정보와의 연동을 통해 단말을 사용하고 있는 사용자를 특정하고 관리할 수 있어 체계적인 보안관리를 위한 필수 보안솔루션으로 평가받고 있다. 지난해까지 지니언스 네트워크 접근제어 솔루션의 누적 고객사는 약 1,000여개 사에 이른다.</p>\n<p>최근 회사는 ‘지니안 인사이츠 E’를 출시하고 랜섬웨어와 지능형 지속위협(APT: Advanced Persistent Threat)등 새로운 유형의 악성 보안 위협에 대응하기 위해 엔드포인트 위협 탐지 및 대응(EDR: Endpoint Detection &amp; Response) 영역으로도 사업을 확장해나가고 있다.</p>\n<p>또, 국내에서 서비스해온 ‘지니안NAC’의 클라우드 버전을 글로벌 시장에 런칭, 본격적인 해외 시장 공략에 나섰다. 현재 미국을 글로벌 시장 공략을 위한 첫 번째 글로벌 거점국가로 선정하고 지난해 1월 미국 매사추세츠에 현지 법인 GENIANS,INC(USA)를 설립한 바 있다.</p>\n<p>지니언스는 지난해 설립 이후 최대 실적인 매출액 206억원, 영업이익 42억원, 당기순이익 36억원을 달성했다(별도 재무제표 기준). 전년 대비 매출액은 33.2% 상승했으며, 영업이익과 당기순이익은 각각 18.4%, 23.1%의 증가폭을 보였다.</p>\n<p>이동범 지니언스 대표이사는 \"클라우드, 사물인터넷(IoT) 등 IT 환경 변화 속에 체계적인 내부 네트워크 보안 관리의 중요성이 강조되고 있는 가운데, 네트워크에서 단말 영역을 아우르는 통합 보안 솔루션을 제공하는 지니언스에 관심이 집중되고 있다.”며, “코스닥 상장을 통해 발빠른 연구개발 투자와 우수한 보안제품 출시를 통해 국내외 정보보안 시장을 선도하는 소프트웨어 기업으로 성장해 나가겠다.”고 말했다.</p>", "body_text": "정보보안 전문기업 지니언스(대표이사 이동범)가 20일 금융위원회에 증권신고서를 제출하고 코스닥시장 상장을 본격 추진한다.\n\n지니언스의 총 공모주식 수는 830,000주로 전체 신주발행으로 진행될 예정이며, 주당 공모 희망가는 12,000원~13,500원이다. 이번 공모를 통해 최대 112억 5백만원을 조달한다. 공모자금은 연구개발, 해외시장 개척 등에 사용...", "full_text": "정보보안 전문기업 지니언스(대표이사 이동범)가 20일 금융위원회에 증권신고서를 제출하고 코스닥시장 상장을 본격 추진한다.\n\n지니언스의 총 공모주식 수는 830,000주로 전체 신주발행으로 진행될 예정이며, 주당 공모 희망가는 12,000원~13,500원이다. 이번 공모를 통해 최대 112억 5백만원을 조달한다. 공모자금은 연구개발, 해외시장 개척 등에 사용될 계획이다.\n\n내달 17일~18일 기관투자자 대상 수요예측을 진행해 최종 공모가를 확정하고 24일~25일 일반 청약을 받는다. 8월 초 상장 예정이며, 대표주관사는 하나금융투자이다.\n\n2005년 설립된 지니언스는 기업과 기관에서 운영중인 내부 네트워크의 보안 강화를 위해 소프트웨어를 개발하는 정보보안 전문기업이다. 네트워크 보안과 단말 분석관련 축적된 기술력을 보유하고 있다.\n\n회사의 주력 제품인 ‘지니안 NAC’는 운영중인 네트워크에 접속하는 노트북, 스마트폰 등 단말의 보안 이상유무를 판별하고 사용자 인증을 통해 네트워크 접근을 제어해 내부 자산과 사용자를 보호하는 유무선 네트워크 접근제어(NAC: Network Access Control) 솔루션이다.\n\n‘지니안 NAC’는 회사가 보유한 2만여 개의 플랫폼 데이터베이스를 바탕으로 내부 네트워크에 연결된 모든 단말에 대한 즉각적인 분석이 가능하다. 또한, 내부에서 보유한 인사정보와의 연동을 통해 단말을 사용하고 있는 사용자를 특정하고 관리할 수 있어 체계적인 보안관리를 위한 필수 보안솔루션으로 평가받고 있다. 지난해까지 지니언스 네트워크 접근제어 솔루션의 누적 고객사는 약 1,000여개 사에 이른다.\n\n최근 회사는 ‘지니안 인사이츠 E’를 출시하고 랜섬웨어와 지능형 지속위협(APT: Advanced Persistent Threat)등 새로운 유형의 악성 보안 위협에 대응하기 위해 엔드포인트 위협 탐지 및 대응(EDR: Endpoint Detection & Response) 영역으로도 사업을 확장해나가고 있다.\n\n또, 국내에서 서비스해온 ‘지니안NAC’의 클라우드 버전을 글로벌 시장에 런칭, 본격적인 해외 시장 공략에 나섰다. 현재 미국을 글로벌 시장 공략을 위한 첫 번째 글로벌 거점국가로 선정하고 지난해 1월 미국 매사추세츠에 현지 법인 GENIANS,INC(USA)를 설립한 바 있다.\n\n지니언스는 지난해 설립 이후 최대 실적인 매출액 206억원, 영업이익 42억원, 당기순이익 36억원을 달성했다(별도 재무제표 기준). 전년 대비 매출액은 33.2% 상승했으며, 영업이익과 당기순이익은 각각 18.4%, 23.1%의 증가폭을 보였다.\n\n이동범 지니언스 대표이사는 \"클라우드, 사물인터넷(IoT) 등 IT 환경 변화 속에 체계적인 내부 네트워크 보안 관리의 중요성이 강조되고 있는 가운데, 네트워크에서 단말 영역을 아우르는 통합 보안 솔루션을 제공하는 지니언스에 관심이 집중되고 있다.”며, “코스닥 상장을 통해 발빠른 연구개발 투자와 우수한 보안제품 출시를 통해 국내외 정보보안 시장을 선도하는 소프트웨어 기업으로 성장해 나가겠다.”고 말했다."}, {"title": "지니언스, 유럽 최대 보안 컨퍼런스 ‘인포시큐리티 유럽 2017’ 참가 [17.06.02]", "date": "2017.06.02", "link": "https://www.genians.co.kr/pr-room/press/지니언스-유럽-최대-보안-컨퍼런스-인포시큐리티", "category": "기타 뉴스", "body_html": "<ul>\n<li>오는 6일부터 8일까지 런던에서 열리는 행사에서 ‘지니안 NAC’ 클라우드 버전 전시  </li>\n<li>개발사 현황, 단종여부 등 HW 정보 제공하는 플랫폼 인텔리전스 서비스 첫 선</li>\n</ul>\n<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%95%88-NAC-%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%EC%84%9C%EB%B9%84%EC%8A%A4-%EC%A0%9C%EA%B3%B5-%EC%98%88-1.png?width=2284&amp;height=1362&amp;name=%EC%A7%80%EB%8B%88%EC%95%88-NAC-%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%EC%84%9C%EB%B9%84%EC%8A%A4-%EC%A0%9C%EA%B3%B5-%EC%98%88-1.png\" /></p>\n<p>종합 보안 소프트웨어 개발기업 지니언스(구, 지니네트웍스 www.genians.co.kr, 대표이사 이동범)가 오는 6일부터 8일까지 영국 런던 올림피아에서 개최되는 유럽 최대 보안 컨퍼런스 ‘인포시큐리티 유럽(Infosecurity Europe) 2017’에 참가한다고 밝혔다.</p>\n<p>지니언스는 지난 2월 'RSA 2017'에서 선보인 ‘지니안 NAC’ 클라우드 버전을 유럽 매니지드 서비스 사업자(MSP)에게 소개할 예정이다.</p>\n<p>특히 이번 전시를 통해 지니언스가 보유중인 ‘지니안 플랫폼 데이터베이스(GPDB: Genian Platform DataBase)’ 2만여 개 플랫폼에 대해 판매 종료여부, 기술지원 가능여부, 제조사 상태 등의 정보를 제공하는 플랫폼 인텔리전스 서비스를 처음 선보일 예정이다.</p>\n<p>회사측은 NAC 클라우드 버전의 주 고객층인 300인 이하 중소기업의 경우, IT 관리자가 도입한 하드웨어의 개별적인 정보를 관리하기가 쉽지 않으므로 플랫폼 정보를 보유한 NAC를 통해 관련 정보를 제공, 고객의 편의성을 강화할 수 있다고 설명했다.</p>\n<p>이동범 지니언스 대표이사는 “RSA를 통해 해외 매니지드 서비스 사업자의 클라우드 기반 NAC에 대한 관심을 확인하고 파트너 확보를 위해 유럽 최대 보안 컨퍼런스에 참가를 결정했다”며 “IoT 환경을 고려해 한 단계 발전한 플랫폼 가시성을 제공하는 인텔리전스 서비스를 선보여 차별화된 NAC 서비스를 제공하고 있음을 강조할 계획’이라고 말했다.</p>\n<p>한편, 지니언스는 미국법인이 위치한 미국 보스톤 지역을 비롯해 남미-브라질, 유럽-스페인, 중동-레바논 등의 현지 매니지드 서비스 사업자와 클라우드 기반 NAC 공급을 위한 파트너쉽 체결을 앞두고 있다.</p>", "body_text": "- 오는 6일부터 8일까지 런던에서 열리는 행사에서 ‘지니안 NAC’ 클라우드 버전 전시  \n - 개발사 현황, 단종여부 등 HW 정보 제공하는 플랫폼 인텔리전스 서비스 첫 선\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%95%88-NAC-%ED%94...", "full_text": "- 오는 6일부터 8일까지 런던에서 열리는 행사에서 ‘지니안 NAC’ 클라우드 버전 전시  \n - 개발사 현황, 단종여부 등 HW 정보 제공하는 플랫폼 인텔리전스 서비스 첫 선\n\n![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/%EC%A7%80%EB%8B%88%EC%95%88-NAC-%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%EC%84%9C%EB%B9%84%EC%8A%A4-%EC%A0%9C%EA%B3%B5-%EC%98%88-1.png?width=2284&height=1362&name=%EC%A7%80%EB%8B%88%EC%95%88-NAC-%ED%94%8C%EB%9E%AB%ED%8F%BC-%EC%9D%B8%ED%85%94%EB%A6%AC%EC%A0%84%EC%8A%A4-%EC%84%9C%EB%B9%84%EC%8A%A4-%EC%A0%9C%EA%B3%B5-%EC%98%88-1.png)\n\n종합 보안 소프트웨어 개발기업 지니언스(구, 지니네트웍스 www.genians.co.kr, 대표이사 이동범)가 오는 6일부터 8일까지 영국 런던 올림피아에서 개최되는 유럽 최대 보안 컨퍼런스 ‘인포시큐리티 유럽(Infosecurity Europe) 2017’에 참가한다고 밝혔다.\n\n지니언스는 지난 2월 'RSA 2017'에서 선보인 ‘지니안 NAC’ 클라우드 버전을 유럽 매니지드 서비스 사업자(MSP)에게 소개할 예정이다.\n\n특히 이번 전시를 통해 지니언스가 보유중인 ‘지니안 플랫폼 데이터베이스(GPDB: Genian Platform DataBase)’ 2만여 개 플랫폼에 대해 판매 종료여부, 기술지원 가능여부, 제조사 상태 등의 정보를 제공하는 플랫폼 인텔리전스 서비스를 처음 선보일 예정이다.\n\n회사측은 NAC 클라우드 버전의 주 고객층인 300인 이하 중소기업의 경우, IT 관리자가 도입한 하드웨어의 개별적인 정보를 관리하기가 쉽지 않으므로 플랫폼 정보를 보유한 NAC를 통해 관련 정보를 제공, 고객의 편의성을 강화할 수 있다고 설명했다.\n\n이동범 지니언스 대표이사는 “RSA를 통해 해외 매니지드 서비스 사업자의 클라우드 기반 NAC에 대한 관심을 확인하고 파트너 확보를 위해 유럽 최대 보안 컨퍼런스에 참가를 결정했다”며 “IoT 환경을 고려해 한 단계 발전한 플랫폼 가시성을 제공하는 인텔리전스 서비스를 선보여 차별화된 NAC 서비스를 제공하고 있음을 강조할 계획’이라고 말했다.\n\n한편, 지니언스는 미국법인이 위치한 미국 보스톤 지역을 비롯해 남미-브라질, 유럽-스페인, 중동-레바논 등의 현지 매니지드 서비스 사업자와 클라우드 기반 NAC 공급을 위한 파트너쉽 체결을 앞두고 있다."}, {"title": "지니네트웍스, ‘지니언스’로 사명변경 [17.03.22]", "date": "2017.03.22", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-지니언스로-사명변경-17-03-22", "category": "기타 뉴스", "body_html": "<p><a href=\"https://www.genians.co.kr/%ec%a7%80%eb%8b%88%eb%84%a4%ed%8a%b8%ec%9b%8d%ec%8a%a4-%ec%a7%80%eb%8b%88%ec%96%b8%ec%8a%a4%eb%a1%9c-%ec%82%ac%eb%aa%85%eb%b3%80%ea%b2%bd-17-03-22/genians_ci_720/\"><img alt=\"genians_ci_720\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/genians_ci_720-300x215.png?width=300&amp;height=215&amp;name=genians_ci_720-300x215.png\" /></a></p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 글로벌 보안 소프트웨어 전문기업으로의 도약을 선언하며 ‘지니언스 주식회사’로 사명을 변경한다고 22일 밝혔다.</p>\n<p>회사측은 이번 사명변경은 글로벌 비즈니스 확대와 국내 보안사업 다각화를 통해 세계 시장에서 한국을 대표하는 보안 소프트웨어 기업으로 성장하겠다는 포부를 담았다고 설명했다.</p>\n<p>창립 이후 국내 네트워크 보안 NAC 분야에 주력해 온 회사는 국내 엔드포인트 분야 보안사업을 강화한다. 클라우드 서비스를 적극 활용해 미국법인 설립과 함께 시작한 글로벌 비즈니스 확대에 나서 싱가폴, 일본 등에 진출한다. 또한, 사물인터넷 환경 보안위협에 대비하는 내부 네트워크 행위 분석 기술 등을 개발해 IT 환경 변화에 발맞춰 글로벌 시장을 선도할 수 있는 기술을 선제적으로 확보해 나갈 예정이다.</p>\n<p>새로운 사명인 ‘지니언스(GENIANS)’는 회사가 지난해 미국 현지법인을 설립하며 2016년과 2017년 RSA 컨퍼런스 등 해외에서 사용해 온 글로벌 비즈니스 브랜드이다.</p>\n<p>이동범 지니언스 대표이사는 “2017년은 글로벌 비즈니스 확대와 기업공개를 통해 회사가 한 단계 도약할 수 있는 중요한 해로, 전 세계 시장에서 일관성 있는 브랜드 이미지 구축과 인지도 확대를 위해 사명변경을 결정했다.”며 “보안분야 신기술 확보하고 글로벌 경쟁력을 강화를 통해 세계 시장에서 인정받는 보안 소프트웨어 기업으로 성장해 나갈 것”이라고 포부를 밝혔다.</p>", "body_text": "[![genians_ci_720](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/genians_ci_720-300x215.png?width=300&height=215&name=genians_ci_720-300x215.png)](https://www.genians.co.kr/%ec%a7%80%eb%8b...", "full_text": "[![genians_ci_720](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/genians_ci_720-300x215.png?width=300&height=215&name=genians_ci_720-300x215.png)](https://www.genians.co.kr/%ec%a7%80%eb%8b%88%eb%84%a4%ed%8a%b8%ec%9b%8d%ec%8a%a4-%ec%a7%80%eb%8b%88%ec%96%b8%ec%8a%a4%eb%a1%9c-%ec%82%ac%eb%aa%85%eb%b3%80%ea%b2%bd-17-03-22/genians_ci_720/)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 글로벌 보안 소프트웨어 전문기업으로의 도약을 선언하며 ‘지니언스 주식회사’로 사명을 변경한다고 22일 밝혔다.\n\n회사측은 이번 사명변경은 글로벌 비즈니스 확대와 국내 보안사업 다각화를 통해 세계 시장에서 한국을 대표하는 보안 소프트웨어 기업으로 성장하겠다는 포부를 담았다고 설명했다.\n\n창립 이후 국내 네트워크 보안 NAC 분야에 주력해 온 회사는 국내 엔드포인트 분야 보안사업을 강화한다. 클라우드 서비스를 적극 활용해 미국법인 설립과 함께 시작한 글로벌 비즈니스 확대에 나서 싱가폴, 일본 등에 진출한다. 또한, 사물인터넷 환경 보안위협에 대비하는 내부 네트워크 행위 분석 기술 등을 개발해 IT 환경 변화에 발맞춰 글로벌 시장을 선도할 수 있는 기술을 선제적으로 확보해 나갈 예정이다.\n\n새로운 사명인 ‘지니언스(GENIANS)’는 회사가 지난해 미국 현지법인을 설립하며 2016년과 2017년 RSA 컨퍼런스 등 해외에서 사용해 온 글로벌 비즈니스 브랜드이다.\n\n이동범 지니언스 대표이사는 “2017년은 글로벌 비즈니스 확대와 기업공개를 통해 회사가 한 단계 도약할 수 있는 중요한 해로, 전 세계 시장에서 일관성 있는 브랜드 이미지 구축과 인지도 확대를 위해 사명변경을 결정했다.”며 “보안분야 신기술 확보하고 글로벌 경쟁력을 강화를 통해 세계 시장에서 인정받는 보안 소프트웨어 기업으로 성장해 나갈 것”이라고 포부를 밝혔다."}, {"title": "지니네트웍스, 2017 파트너 대상 워크샵 개최 [17.02.14]", "date": "2017.02.14", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-2017-파트너-대상-워크샵-개최-17-02-14", "category": "비즈니스 & 성과", "body_html": "<p><img alt=\"2017_partner\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2017_partner.jpg?width=903&amp;height=515&amp;name=2017_partner.jpg\" /></p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 지난 10일 대천 웨스토피아에서 2017 파트너 워크샵을 개최했다고 밝혔다.</p>\n<p>이날 행사를 통해 회사는 50여개 파트너사 130여명의 영업 및 기술 담당자가 참석한 가운데 2017년 파트너 정책과 EDR 제품 ‘지니안 인사이츠’ 제품 세일즈 가이드 등을 소개하고 2016년 우수 파트너에 대한 시상을 진행했다.</p>\n<p>지니네트웍스는 벤더와 파트너사의 상생을 강조하며 2017년 조직개편을 통해 채널전략사업부와 채널 전담 지원팀을 신설했다. 전담조직을 통해 파트너 지원을 강화하고 2017년 전략제품인 ‘지니안 인사이츠’에 대한 체계적인 영업 활동을 지원한다고 설명했다.</p>\n<p>이동범 지니네트웍스 대표이사는 “NAC 분야 시장을 개척하고 1등 기업으로 자리잡을 수 있었던 가장 큰 요인은 실력 있는 파트너와의 협업이었다”며 “신규 EDR 전략제품 영업지원을 위한 다양한 프로그램을 준비한 만큼, 파트너와 함께 한 단계 성장할 수 있는 2017년이 되길 기대한다”고 말했다.</p>\n<p>지니네트웍스 세일즈 파트너 가입 및 협력 문의는 홈페이지(www.geninetworks.com)와 대표메일(geni@geninetworks.com)을 통해 가능하다.</p>", "body_text": "![2017_partner](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2017_partner.jpg?width=903&height=515&name=2017_partner.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 지난 10일 대천 웨스토피...", "full_text": "![2017_partner](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/2017_partner.jpg?width=903&height=515&name=2017_partner.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 지난 10일 대천 웨스토피아에서 2017 파트너 워크샵을 개최했다고 밝혔다.\n\n이날 행사를 통해 회사는 50여개 파트너사 130여명의 영업 및 기술 담당자가 참석한 가운데 2017년 파트너 정책과 EDR 제품 ‘지니안 인사이츠’ 제품 세일즈 가이드 등을 소개하고 2016년 우수 파트너에 대한 시상을 진행했다.\n\n지니네트웍스는 벤더와 파트너사의 상생을 강조하며 2017년 조직개편을 통해 채널전략사업부와 채널 전담 지원팀을 신설했다. 전담조직을 통해 파트너 지원을 강화하고 2017년 전략제품인 ‘지니안 인사이츠’에 대한 체계적인 영업 활동을 지원한다고 설명했다.\n\n이동범 지니네트웍스 대표이사는 “NAC 분야 시장을 개척하고 1등 기업으로 자리잡을 수 있었던 가장 큰 요인은 실력 있는 파트너와의 협업이었다”며 “신규 EDR 전략제품 영업지원을 위한 다양한 프로그램을 준비한 만큼, 파트너와 함께 한 단계 성장할 수 있는 2017년이 되길 기대한다”고 말했다.\n\n지니네트웍스 세일즈 파트너 가입 및 협력 문의는 홈페이지(www.geninetworks.com)와 대표메일(geni@geninetworks.com)을 통해 가능하다."}, {"title": "지니네트웍스, 미국법인 통해 ‘지니안 NAC’ 클라우드 버전 글로벌 출시 [17.02.09]", "date": "2017.02.09", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-미국법인-통해-지니안-nac-클라우드", "category": "NAC", "body_html": "<ul>\n<li>2017 RSA 컨퍼런스를 통해 SaaS형 클라우드 NAC 출시  </li>\n<li>전세계 중소규모 기업(SME)과 매니지드 서비스 사업자(MSP) 고객확보 목표</li>\n</ul>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)의 미국법인 지니언즈(GENIANS, www.genians.com, 법인장 김계연)가 오는 2월 13일부터 미국 샌프란시스코에서 열리는 2017 RSA 컨퍼런스를 통해 ‘지니안 NAC’ 클라우드 버전을 글로벌 시장에 출시한다.</p>\n<p>‘지니안 NAC’ 클라우드 버전은 한국시장 내 중대형 고객사에 구축형으로 제공해 온 네트워크 접근제어 제품을 클라우드에서 구현해 서비스형 소프트웨어(SaaS: Software as a Service) 형태로 제공한다.</p>\n<p>지니언즈의 클라우드 NAC는 보안솔루션 초기도입 시 IT예산과 운영인력에 대한 부담이 큰 중소규모 기업(SME)과 다양한 보안서비스를 통합 제공하는 매니지드 서비스 사업자(MSP) 고객확보를 목표로 하고 있다.</p>\n<p>지니언즈는 웹사이트(www.genians.com)를 통해 구독형(서브스크립션)으로 손쉽게 적용할 수 있도록 했다. 제공하는 기능에 따라 베이직, 프로페셔널로 구분해 베이직 에디션은 네트워크 내 접속한 단말의 가시성 확보, 자산관리, 동적 그룹 관리 기능을 사용할 수 있다. 프로페셔널 에디션은 추가로 네트워크 접근제어, 사용자 인증, IT관리 기능을 제공한다. 300개 미만의 단말을 보유한 기업은 베이직 에디션을 30일간 무료로 이용할 수 있다.</p>\n<p>김계연 지니언즈 미국법인장은 “글로벌 IT환경이 클라우드 컴퓨팅으로 인해 변화하고 있는 가운데 해외로 진출하는 IT기업의 클라우드 서비스 개발은 선택이 아닌 필수”라며 “지니언즈는 미국 현지 보안 스타트업으로 한국에서 12년간 쌓아온 기술력을 통해 클라우드 기반 보안 서비스를 선보이는 만큼 SW품질을 높여 글로벌 기업과의 경쟁에서 좋은 성적을 거둘 수 있도록 노력할 것”이라고 말했다.</p>\n<p>지니언즈는 2017 RSA 컨퍼런스가 열리는 2월 13일 ~ 17일 샌프란시스코 모스콘 센터 N3241 부스에서 ‘지니안 NAC’ 클라우드 버전을 시연 할 계획이다.</p>", "body_text": "- 2017 RSA 컨퍼런스를 통해 SaaS형 클라우드 NAC 출시  \n - 전세계 중소규모 기업(SME)과 매니지드 서비스 사업자(MSP) 고객확보 목표\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)의 미국법인 지니언즈(GENIANS, www.genians.com, 법인장 김계연)가 오는 2월 13일부터 미국 샌...", "full_text": "- 2017 RSA 컨퍼런스를 통해 SaaS형 클라우드 NAC 출시  \n - 전세계 중소규모 기업(SME)과 매니지드 서비스 사업자(MSP) 고객확보 목표\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)의 미국법인 지니언즈(GENIANS, www.genians.com, 법인장 김계연)가 오는 2월 13일부터 미국 샌프란시스코에서 열리는 2017 RSA 컨퍼런스를 통해 ‘지니안 NAC’ 클라우드 버전을 글로벌 시장에 출시한다.\n\n‘지니안 NAC’ 클라우드 버전은 한국시장 내 중대형 고객사에 구축형으로 제공해 온 네트워크 접근제어 제품을 클라우드에서 구현해 서비스형 소프트웨어(SaaS: Software as a Service) 형태로 제공한다.\n\n지니언즈의 클라우드 NAC는 보안솔루션 초기도입 시 IT예산과 운영인력에 대한 부담이 큰 중소규모 기업(SME)과 다양한 보안서비스를 통합 제공하는 매니지드 서비스 사업자(MSP) 고객확보를 목표로 하고 있다.\n\n지니언즈는 웹사이트(www.genians.com)를 통해 구독형(서브스크립션)으로 손쉽게 적용할 수 있도록 했다. 제공하는 기능에 따라 베이직, 프로페셔널로 구분해 베이직 에디션은 네트워크 내 접속한 단말의 가시성 확보, 자산관리, 동적 그룹 관리 기능을 사용할 수 있다. 프로페셔널 에디션은 추가로 네트워크 접근제어, 사용자 인증, IT관리 기능을 제공한다. 300개 미만의 단말을 보유한 기업은 베이직 에디션을 30일간 무료로 이용할 수 있다.\n\n김계연 지니언즈 미국법인장은 “글로벌 IT환경이 클라우드 컴퓨팅으로 인해 변화하고 있는 가운데 해외로 진출하는 IT기업의 클라우드 서비스 개발은 선택이 아닌 필수”라며 “지니언즈는 미국 현지 보안 스타트업으로 한국에서 12년간 쌓아온 기술력을 통해 클라우드 기반 보안 서비스를 선보이는 만큼 SW품질을 높여 글로벌 기업과의 경쟁에서 좋은 성적을 거둘 수 있도록 노력할 것”이라고 말했다.\n\n지니언즈는 2017 RSA 컨퍼런스가 열리는 2월 13일 ~ 17일 샌프란시스코 모스콘 센터 N3241 부스에서 ‘지니안 NAC’ 클라우드 버전을 시연 할 계획이다."}, {"title": "지니네트웍스-지란소프트 재팬, 일본 보안사업 협력을 위한 업무협약 체결 [16.12.21]", "date": "2016.12.21", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-지란소프트-재팬-일본-보안사업-협력", "category": "비즈니스 & 성과", "body_html": "<p><img alt=\"\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/902919_20161221150157_293_0001.jpg?width=700&amp;height=394&amp;name=902919_20161221150157_293_0001.jpg\" /></p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와 소프트웨어 전문그룹 지란지교의 일본 현지법인 지란소프트 재팬 (www.jiransoft.co.jp, 대표이사 오치영)이 일본 보안사업 협력을 위한 업무협약을 체결했다고 21일 밝혔다.</p>\n<p>지니네트웍스와 지란소프트 재팬은 이번 협약을 통해 일본향 중소기업 보안제품 현지 출시와 시장 안착을 위해 상호 협력할 계획이다. 양사는 2017년 1분기 내 클라우드 기반 유무선 단말 관리 솔루션을 출시하며 지니네트웍스가 서비스 및 HW 개발을, 지란소프트 재팬이 서비스 기획 및 현지 판매 운영을 담당한다.</p>\n<p>일본에서 출시하는 클라우드 기반 유무선 단말 관리 솔루션은 중소기업 시장을 목표로 네트워크 접근제어(NAC)와 무선 침입 방지 시스템(WIPS)의 핵심 기능을 포함한다. 이 제품은 기업 내부에서 사용하는 단말에 대한 모니터링을 통해 비인가 단말을 차단하고, 공유기를 관리할 수 있다. 특히, 대형 보안솔루션을 도입하기 어려운 중소기업에 최소의 비용으로 빠른 설치와 운영이 가능하도록 개발한다는 계획이다.<br />\n 지니네트웍스는 지란소프트 재팬과의 협력을 시작으로 글로벌 비즈니스 확대에 박차를 가할 계획이다. 2017년 미국법인을 통해 글로벌 시장 전체를 대상으로 한 온라인 기반 네트워크 접근제어(NAC) 서비스 공식 런칭과 함께 일본을 포함한 싱가포르, 인도네시아 등 아시아 시장 개척에 나선다.</p>\n<p>오치영 지란소프트 재팬 대표이사는 “10년 이상 NAC분야의 리더로서 기술노하우를 쌓아온 지니네트웍스와 10년 이상 일본 비즈니스 경험이 있는 지란소프트 재팬이 IoT시대의 흐름에 맞춰 일본 현지에 최적화된 제품을 함께 내놓게 됐다. \"며 \"양사가 동종업계에서 오랜 세월 신뢰를 쌓아온 만큼 좋은 성과가 날 것으로 기대한다.”고 말했다.</p>\n<p>이동범 지니네트웍스 대표이사는 “미국시장에서 이스라엘 기업이 자리잡을 수 있었던 가장 큰 요인으로, 해당시장에 먼저 진출한 기업과 진출을 원하는 기업이 다양한 협력을 통해 사업과 서비스를 현지화 한 것을 꼽을 수 있다”며 “이번 지니네트웍스와 지란소프트 재팬 역시 국내 대표 보안SW 기업의 강점을 결합한 만큼 우수한 해외진출 사례가 될 수 있도록 노력할 것”이라고 포부를 밝혔다.</p>", "body_text": "![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/902919_20161221150157_293_0001.jpg?width=700&height=394&name=902919_20161221150157_293_0001.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대...", "full_text": "![](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/902919_20161221150157_293_0001.jpg?width=700&height=394&name=902919_20161221150157_293_0001.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와 소프트웨어 전문그룹 지란지교의 일본 현지법인 지란소프트 재팬 (www.jiransoft.co.jp, 대표이사 오치영)이 일본 보안사업 협력을 위한 업무협약을 체결했다고 21일 밝혔다.\n\n지니네트웍스와 지란소프트 재팬은 이번 협약을 통해 일본향 중소기업 보안제품 현지 출시와 시장 안착을 위해 상호 협력할 계획이다. 양사는 2017년 1분기 내 클라우드 기반 유무선 단말 관리 솔루션을 출시하며 지니네트웍스가 서비스 및 HW 개발을, 지란소프트 재팬이 서비스 기획 및 현지 판매 운영을 담당한다.\n\n일본에서 출시하는 클라우드 기반 유무선 단말 관리 솔루션은 중소기업 시장을 목표로 네트워크 접근제어(NAC)와 무선 침입 방지 시스템(WIPS)의 핵심 기능을 포함한다. 이 제품은 기업 내부에서 사용하는 단말에 대한 모니터링을 통해 비인가 단말을 차단하고, 공유기를 관리할 수 있다. 특히, 대형 보안솔루션을 도입하기 어려운 중소기업에 최소의 비용으로 빠른 설치와 운영이 가능하도록 개발한다는 계획이다.  \n 지니네트웍스는 지란소프트 재팬과의 협력을 시작으로 글로벌 비즈니스 확대에 박차를 가할 계획이다. 2017년 미국법인을 통해 글로벌 시장 전체를 대상으로 한 온라인 기반 네트워크 접근제어(NAC) 서비스 공식 런칭과 함께 일본을 포함한 싱가포르, 인도네시아 등 아시아 시장 개척에 나선다.\n\n오치영 지란소프트 재팬 대표이사는 “10년 이상 NAC분야의 리더로서 기술노하우를 쌓아온 지니네트웍스와 10년 이상 일본 비즈니스 경험이 있는 지란소프트 재팬이 IoT시대의 흐름에 맞춰 일본 현지에 최적화된 제품을 함께 내놓게 됐다. \"며 \"양사가 동종업계에서 오랜 세월 신뢰를 쌓아온 만큼 좋은 성과가 날 것으로 기대한다.”고 말했다.\n\n이동범 지니네트웍스 대표이사는 “미국시장에서 이스라엘 기업이 자리잡을 수 있었던 가장 큰 요인으로, 해당시장에 먼저 진출한 기업과 진출을 원하는 기업이 다양한 협력을 통해 사업과 서비스를 현지화 한 것을 꼽을 수 있다”며 “이번 지니네트웍스와 지란소프트 재팬 역시 국내 대표 보안SW 기업의 강점을 결합한 만큼 우수한 해외진출 사례가 될 수 있도록 노력할 것”이라고 포부를 밝혔다."}, {"title": "지니네트웍스, 국내사업 총괄 이동석 부사장 영입 [16.08.24]", "date": "2016.08.24", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-국내사업-총괄-이동석-부사장-영입-16-08-24", "category": "기타 뉴스", "body_html": "<p><img alt=\"지니네트웍스 이동석 부사장\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20160824_041825-1024x709.jpg?width=1024&amp;height=709&amp;name=20160824_041825-1024x709.jpg\" /></p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 국내사업을 총괄할 이동석 부사장을 새롭게 영입했다고 24일 밝혔다.</p>\n<p>신임 이동석 부사장은 LG그룹 IT관련 계열사인 LG 전자, LG 정보통신, LG CNS, LG 엔시스 등에서 국내사업을 담당했으며<br />\n 지니네트웍스에 합류해 영업과 기술지원 등 대고객 서비스 경쟁력 강화를 위한 전문임원으로 활동 할 계획이다.</p>\n<p>이 부사장은 1989년 LG그룹에 입사해 LG 엔시스 네트웍사업부문장을 거쳐 통신금융사업부장을 역임한 B2B시장 IT솔루션 영업 전문가이다.</p>\n<p>지니네트웍스 관계자는 “ 이동석 부사장이 27년간 영업 전문가로 활동하며 쌓아온 다양한 경험과 역량이 지니네트웍스의<br />\n 새로운 도약에 기여할 것으로 기대하고 있다.”며 “전문임원 영입을 통해 대고객 서비스 체계를 기반으로 국내시장 경쟁력을 강화해 나갈 것”이라고 포부를 밝혔다.</p>", "body_text": "![지니네트웍스 이동석 부사장](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20160824_041825-1024x709.jpg?width=1024&height=709&name=20160824_041825-1024x709.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com...", "full_text": "![지니네트웍스 이동석 부사장](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20160824_041825-1024x709.jpg?width=1024&height=709&name=20160824_041825-1024x709.jpg)\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 국내사업을 총괄할 이동석 부사장을 새롭게 영입했다고 24일 밝혔다.\n\n신임 이동석 부사장은 LG그룹 IT관련 계열사인 LG 전자, LG 정보통신, LG CNS, LG 엔시스 등에서 국내사업을 담당했으며  \n 지니네트웍스에 합류해 영업과 기술지원 등 대고객 서비스 경쟁력 강화를 위한 전문임원으로 활동 할 계획이다.\n\n이 부사장은 1989년 LG그룹에 입사해 LG 엔시스 네트웍사업부문장을 거쳐 통신금융사업부장을 역임한 B2B시장 IT솔루션 영업 전문가이다.\n\n지니네트웍스 관계자는 “ 이동석 부사장이 27년간 영업 전문가로 활동하며 쌓아온 다양한 경험과 역량이 지니네트웍스의  \n 새로운 도약에 기여할 것으로 기대하고 있다.”며 “전문임원 영입을 통해 대고객 서비스 체계를 기반으로 국내시장 경쟁력을 강화해 나갈 것”이라고 포부를 밝혔다."}, {"title": "지니네트웍스, 인텔리전스 내부보안 플랫폼 전략 발표 [16.06.24]", "date": "2016.06.24", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-인텔리전스-내부보안-플랫폼-전략-발", "category": "기타 뉴스", "body_html": "<p><img alt=\"img_2052_conv\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/img_2052_conv-1024x683.jpg?width=1024&amp;height=683&amp;name=img_2052_conv-1024x683.jpg\" /></p>\n<p>지능화 되고 있는 보안위협 대응 방법에 대한 관심이 높아지고 있는 가운데 내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 인텔리전스 내부보안 플랫폼 전략을 설명하는 기자간담회를 개최했다. 지니네트웍스는 하반기 중 인텔리전스 위협관리 플랫폼 ‘지니안 인사이츠(Genian Insights)’를 정식 출시 할 계획이며, 단계적으로 EDR과 네트워크 트래픽 모니터링 모듈 개발도 로드맵에 포함하고 있다는 내용을 발표했다.</p>\n<p>‘지니안 인사이츠’는 엔드포인트에서 발생하는 다양한 보안 정보 및 이벤트를 ‘지니안 NAC(Genian NAC)’를 통해 수집해 모니터링 할 수 있도록 구현한 빅데이터 엔진 기반 인텔리전스 위협관리 플랫폼이다. ‘지니안 인사이츠’는 보안 정보 이벤트 관리(SIEM: Security Information and Event Management) 아키텍처를 기반으로 자산 및 감사로그를 수집/저장/검색/분석/시각화 해 확장된 네트워크 가시성을 제공하고 설치형 임베디드 시스템을 통해 향후 내부 네트워크 관련 추가 모듈 구축이 가능하도록 확장 가능한 설계 구조를 갖고 있으며 국내외 최신 침해지표(IOC: Indicators of Compromise) 기반 위협대응을 통해 인텔리전스 기능을 확보하는 등 강력한 지능형 내부 보안위협 대응 솔루션의 특징을 보유하고 있다.</p>\n<p>지니네트웍스는 향후 엔드포인트 위협 대응을 위한 EDR(Endpoint Threat Detection &amp; Response : 엔드포인트 위협 탐지 및 대응)과 네트워크 트래픽 모니터링을 위한 모듈을 선보인다는 제품 개발 계획도 제시했다. 회사측은 추가 모듈 적용 시 NAC 플러그인 통해 손쉽게 적용할 수 있도록 설계해 보안 관리자의 에이전트 배포 부담 및 사용자 PC 부하를 최소화할 수 있다고 설명했다.<br />\n이동범 지니네트웍스 대표이사는 “국내에서도 원천적인 보안위협 차단 보다 인텔리전스 기반의 탐지 및 대응을 통해 더 큰 형태의 내부 보안사고 확대를 방지하는 형태로 패러다임이 빠르게 변화하고 있다”며 “지니네트웍스는 국내 NAC 시장 점유율 45% 이상을 차지하며 내부 네트워크 보안 시장을 선도해 온 노하우를 통해 지니안 인사이츠를 최적의 인텔리전스 위협관리 플랫폼으로 성장시켜 나가는 데 역량을 집중할 것이다”이라고 포부를 밝혔다.</p>", "body_text": "![img_2052_conv](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/img_2052_conv-1024x683.jpg?width=1024&height=683&name=img_2052_conv-1024x683.jpg)\n\n지능화 되고 있는 보안위협 대응 방법에 대한 관심이 높아지고 있는 가운데 내...", "full_text": "![img_2052_conv](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/img_2052_conv-1024x683.jpg?width=1024&height=683&name=img_2052_conv-1024x683.jpg)\n\n지능화 되고 있는 보안위협 대응 방법에 대한 관심이 높아지고 있는 가운데 내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 인텔리전스 내부보안 플랫폼 전략을 설명하는 기자간담회를 개최했다. 지니네트웍스는 하반기 중 인텔리전스 위협관리 플랫폼 ‘지니안 인사이츠(Genian Insights)’를 정식 출시 할 계획이며, 단계적으로 EDR과 네트워크 트래픽 모니터링 모듈 개발도 로드맵에 포함하고 있다는 내용을 발표했다.\n\n‘지니안 인사이츠’는 엔드포인트에서 발생하는 다양한 보안 정보 및 이벤트를 ‘지니안 NAC(Genian NAC)’를 통해 수집해 모니터링 할 수 있도록 구현한 빅데이터 엔진 기반 인텔리전스 위협관리 플랫폼이다. ‘지니안 인사이츠’는 보안 정보 이벤트 관리(SIEM: Security Information and Event Management) 아키텍처를 기반으로 자산 및 감사로그를 수집/저장/검색/분석/시각화 해 확장된 네트워크 가시성을 제공하고 설치형 임베디드 시스템을 통해 향후 내부 네트워크 관련 추가 모듈 구축이 가능하도록 확장 가능한 설계 구조를 갖고 있으며 국내외 최신 침해지표(IOC: Indicators of Compromise) 기반 위협대응을 통해 인텔리전스 기능을 확보하는 등 강력한 지능형 내부 보안위협 대응 솔루션의 특징을 보유하고 있다.\n\n지니네트웍스는 향후 엔드포인트 위협 대응을 위한 EDR(Endpoint Threat Detection & Response : 엔드포인트 위협 탐지 및 대응)과 네트워크 트래픽 모니터링을 위한 모듈을 선보인다는 제품 개발 계획도 제시했다. 회사측은 추가 모듈 적용 시 NAC 플러그인 통해 손쉽게 적용할 수 있도록 설계해 보안 관리자의 에이전트 배포 부담 및 사용자 PC 부하를 최소화할 수 있다고 설명했다.  \n이동범 지니네트웍스 대표이사는 “국내에서도 원천적인 보안위협 차단 보다 인텔리전스 기반의 탐지 및 대응을 통해 더 큰 형태의 내부 보안사고 확대를 방지하는 형태로 패러다임이 빠르게 변화하고 있다”며 “지니네트웍스는 국내 NAC 시장 점유율 45% 이상을 차지하며 내부 네트워크 보안 시장을 선도해 온 노하우를 통해 지니안 인사이츠를 최적의 인텔리전스 위협관리 플랫폼으로 성장시켜 나가는 데 역량을 집중할 것이다”이라고 포부를 밝혔다."}, {"title": "지니네트웍스, 새로운 CI 공개하고 새 얼굴로 도약 다짐 [16.06.01]", "date": "2016.06.01", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-새로운-ci-공개하고-새-얼굴로-도약-다짐", "category": "기타 뉴스", "body_html": "<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 1일 글로벌 보안SW 기업으로의 도약을<br />\n 다짐하며 한국법인과 미국법인의 새로운 CI(Corporate Identity)를 공개했다.</p>\n<p>새롭게 선보인 CI는 자물쇠와 디지털 코드를 결합해 형상화한 심볼을 통해 IT 정보자산에 대한 가치를 인식하고<br />\n 안전하게 보호하는 지니네트웍스의 핵심가치를 시각화했다. 안전과 보호를 상징하는 녹색을 적용해<br />\n 보안기업의 전문성을 표현했고, 회색을 사용한 간결한 서체는 신뢰와 안정감을 더했다.</p>\n<p>지니네트웍스는 이번 CI 변경을 통해 일관성 있는 브랜드에 기반한 글로벌 시장확대 및 엔드포인트 분야<br />\n 신제품 개발에도 박차를 가할 계획이다.</p>\n<p>이동범 지니네트웍스 대표이사는 “이제 B2B 분야 IT기업도 고객친화적인 브랜드 디자인이 필요한 시점이라고 판단해<br />\n 창립 11년만에 CI를 리뉴얼했다.”며 “새 CI를 통해 글로벌 시장에서 긍정적인 브랜드 자산을 구축해<br />\n 적극적인 시장개척에 나설 것”이라고 포부를 밝혔다.</p>\n<p>한편, 지니네트웍스는 미국법인 ‘지니언즈(Genians)’를 통해 7월 사용자의 의견을 반영하여 제품의 사용성 및 기능을<br />\n 업그레이드할 수 있는 온라인 커뮤니티 버전 NAC 서비스를 선보일 예정이다.</p>", "body_text": "내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 1일 글로벌 보안SW 기업으로의 도약을  \n 다짐하며 한국법인과 미국법인의 새로운 CI(Corporate Identity)를 공개했다.\n\n새롭게 선보인 CI는 자물쇠와 디지털 코드를 결합해 형상화한 심볼을 통해 IT 정보자산에 대한 가치를 인식하고  \n 안전하게 보호하...", "full_text": "내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 1일 글로벌 보안SW 기업으로의 도약을  \n 다짐하며 한국법인과 미국법인의 새로운 CI(Corporate Identity)를 공개했다.\n\n새롭게 선보인 CI는 자물쇠와 디지털 코드를 결합해 형상화한 심볼을 통해 IT 정보자산에 대한 가치를 인식하고  \n 안전하게 보호하는 지니네트웍스의 핵심가치를 시각화했다. 안전과 보호를 상징하는 녹색을 적용해  \n 보안기업의 전문성을 표현했고, 회색을 사용한 간결한 서체는 신뢰와 안정감을 더했다.\n\n지니네트웍스는 이번 CI 변경을 통해 일관성 있는 브랜드에 기반한 글로벌 시장확대 및 엔드포인트 분야  \n 신제품 개발에도 박차를 가할 계획이다.\n\n이동범 지니네트웍스 대표이사는 “이제 B2B 분야 IT기업도 고객친화적인 브랜드 디자인이 필요한 시점이라고 판단해  \n 창립 11년만에 CI를 리뉴얼했다.”며 “새 CI를 통해 글로벌 시장에서 긍정적인 브랜드 자산을 구축해  \n 적극적인 시장개척에 나설 것”이라고 포부를 밝혔다.\n\n한편, 지니네트웍스는 미국법인 ‘지니언즈(Genians)’를 통해 7월 사용자의 의견을 반영하여 제품의 사용성 및 기능을  \n 업그레이드할 수 있는 온라인 커뮤니티 버전 NAC 서비스를 선보일 예정이다."}, {"title": "지니네트웍스, 시메트릭스와 산업제어시스템 기술협력 MOU 체결 [16.01.13]", "date": "2016.01.13", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-시메트릭스와-산업제어시스템-기술", "category": "비즈니스 & 성과", "body_html": "<p><img alt=\"&quot;\" src=\"https://www.genians.co.kr/hubfs/Imported_Blog_Media/20160113_021411-e1452651344389-1.jpg\" /></p>\n<p>&lt;사진 설명&gt; (좌측부터) 시메트릭스 알버트 퍼트넘(Albert Putnam) 부사장과 지니네트웍스 김계연 미국법인장이 기념촬영을 하고있다.</p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 빌딩 자동제어시스템 선두기업 시메트릭스<br />\n (cimetrics.com, 대표 제임스 리 James M. Lee)와 함께 산업제어시스템 환경에 적용 가능한 보안기술 개발을 위한 양해각서를 12일 체결했다.</p>\n<p>양사는 산업제어시스템 및 사물인터넷 기반 스마트홈 환경에서 확장된 가시성을 확보하고 보안을 강화하기 위한 목적으로 공동 연구 개발을 진행한다.</p>\n<p>회사측은 시메트릭스가 제공하는 테스트 환경을 기반으로 빌딩 자동화 제어망(이하 BACnet : Building Automation and Control NETworks) 내 보안 취약점을 점검하고 조치할 수 있는 보안 솔루션을 개발할 계획이라고 밝혔다.</p>\n<p>지니네트웍스와 협력하는 시메트릭스(Cimetrics)는 1989년 설립 이후 빌딩 자동화 시스템 분야를 전문 기업으로 하드웨어,<br />\n 임베디드 소프트웨어, 에너지 정보시스템, IT 컨버전스, 산업 사물인터넷 환경에서 생산되는 다양한 데이타를 효과적으로<br />\n 처리할 수 있는 분석솔루션 등을 공급하고 있다. 미국국립표준기술연구소 (NIST : National Institute of Standards and Technology)와 미국공조냉동공학회 (ASHRAE : American Society of Heating, Refrigerating and Air-Conditioning Engineers)등 과의 지속적인 협업을 통해 자동화 시스템 및 분석 분야 글로벌 시장을 선도하고 있다.</p>\n<p>지니네트웍스의 김계연 미국법인장은 “제어망 환경에서의 보안위협이 증가하는 가운데 전문기업과의 협력을 통해<br />\n 보다 전문적인 기술을 개발할 수 있는 기반을 마련했다. 향후 다양한 미국 현지 IT기업들과 공동 연구개발을 확대해 나가<br />\n 신규 원천 기술확보 및 현지 비즈니스 확대를 위해 노력할 것”이라고 설명했다.</p>\n<p>한편, 지니네트웍스는 지난 1월 7일 미국법인 ‘지니언즈(Genians Inc.)’를 설립하고 법인장으로 김계연 전무를 선임했다.</p>", "body_text": "![\"](https://www.genians.co.kr/hubfs/Imported_Blog_Media/20160113_021411-e1452651344389-1.jpg)\n\n<사진 설명> (좌측부터) 시메트릭스 알버트 퍼트넘(Albert Putnam) 부사장과 지니네트웍스 김계연 미국법인장이 기념촬영을 하고있다.\n\n내부보안 전문기업 지니네트웍스(www.gen...", "full_text": "![\"](https://www.genians.co.kr/hubfs/Imported_Blog_Media/20160113_021411-e1452651344389-1.jpg)\n\n<사진 설명> (좌측부터) 시메트릭스 알버트 퍼트넘(Albert Putnam) 부사장과 지니네트웍스 김계연 미국법인장이 기념촬영을 하고있다.\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 빌딩 자동제어시스템 선두기업 시메트릭스  \n (cimetrics.com, 대표 제임스 리 James M. Lee)와 함께 산업제어시스템 환경에 적용 가능한 보안기술 개발을 위한 양해각서를 12일 체결했다.\n\n양사는 산업제어시스템 및 사물인터넷 기반 스마트홈 환경에서 확장된 가시성을 확보하고 보안을 강화하기 위한 목적으로 공동 연구 개발을 진행한다.\n\n회사측은 시메트릭스가 제공하는 테스트 환경을 기반으로 빌딩 자동화 제어망(이하 BACnet : Building Automation and Control NETworks) 내 보안 취약점을 점검하고 조치할 수 있는 보안 솔루션을 개발할 계획이라고 밝혔다.\n\n지니네트웍스와 협력하는 시메트릭스(Cimetrics)는 1989년 설립 이후 빌딩 자동화 시스템 분야를 전문 기업으로 하드웨어,  \n 임베디드 소프트웨어, 에너지 정보시스템, IT 컨버전스, 산업 사물인터넷 환경에서 생산되는 다양한 데이타를 효과적으로  \n 처리할 수 있는 분석솔루션 등을 공급하고 있다. 미국국립표준기술연구소 (NIST : National Institute of Standards and Technology)와 미국공조냉동공학회 (ASHRAE : American Society of Heating, Refrigerating and Air-Conditioning Engineers)등 과의 지속적인 협업을 통해 자동화 시스템 및 분석 분야 글로벌 시장을 선도하고 있다.\n\n지니네트웍스의 김계연 미국법인장은 “제어망 환경에서의 보안위협이 증가하는 가운데 전문기업과의 협력을 통해  \n 보다 전문적인 기술을 개발할 수 있는 기반을 마련했다. 향후 다양한 미국 현지 IT기업들과 공동 연구개발을 확대해 나가  \n 신규 원천 기술확보 및 현지 비즈니스 확대를 위해 노력할 것”이라고 설명했다.\n\n한편, 지니네트웍스는 지난 1월 7일 미국법인 ‘지니언즈(Genians Inc.)’를 설립하고 법인장으로 김계연 전무를 선임했다."}, {"title": "지니네트웍스, 美 대학연구소와 제품 글로벌화를 위한 공동연구 진행 [15.12.03]", "date": "2015.12.03", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-美-대학연구소와-제품-글로벌화를-위", "category": "비즈니스 & 성과", "body_html": "<p><img alt=\"&quot;\" src=\"https://www.genians.co.kr/hubfs/Imported_Blog_Media/001.jpg\" /></p>\n<p>&lt;사진 설명&gt; 뉴햄프셔 주립대학 UNH-IOL 연구원들에게 지니네트웍스 김계연 소장이 ‘지니안 NAC’ 제품을 설명하고 있다.</p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 미국 뉴햄프셔 주립대학교 이노베이션 센터<br />\n(센터장 마크 스뎀 Marc Sedam) 산하 상호운용성 연구소(InterOperability Lab 이하 UNH-IOL, www.iol.unh.edu)와<br />\n자사 네트워크 접근제어 제품 글로벌화를 위한 공동연구를 진행한다고 3일 밝혔다.</p>\n<p>지니네트웍스가 해외시장 진출에 앞서 사용성(Usability) 강화를 목표로 UNH-IOL과 함께 제품 구축을 통해<br />\n사용자 인터페이스 및 기능 관련 연구를 진행한다.</p>\n<p>회사측은 글로벌 사용자가 보다 손쉽게 쉽게 ‘지니안 NAC(Genian NAC)’ 제품을 활용할 수 있도록<br />\n전반적인 사용성 테스트 ,다양한 네트워크 환경 기반 상호운용성 테스트, 영문 사용자 인터페이스 및 제품 매뉴얼 검토,<br />\n사물인터넷(Internet of Things)을 위한 IPv6 테스트 등의 평가자료를 바탕으로 향후 공동 연구 개발을 확대해<br />\n나갈 계획이라고 밝혔다.</p>\n<p>1988년 설립된 UNH-IOL은 네트워크 및 데이터 통신 제품 테스트와 표준 네트워킹 데이터 통신에 멀티 벤더 상호 운용성과<br />\n적합성을 연구할 수 있는 환경을 제공하고 있는 미국 내 유일한 전문 산학 연구소이다.</p>\n<p>UNH-IOL의 에리카 존슨(Erica Johnson) 디렉터는 “UNH-IOL이 보유한 네트워크 테스트 분야 인프라와 경험을 바탕으로<br />\n네트워크 환경을 개선하기 위해 지니네트웍스와 다양한 형태의 공동협력을 진행해 나갈 것”이라고 말했다.</p>\n<p>지니네트웍스의 김계연 연구소장은 “해외진출 시 시장을 선점한 글로벌 벤더들과 경쟁하기 위해서는 현지 사용자 특성에 맞춰<br />\n제품의 컨셉과 기능을 최적화하는 것은 필수”라며 “공신력있는 현지 연구기관과의 협력을 통해 ‘지니안 NAC’의 사용성을<br />\n강화하고 제품의 시장 경쟁력을 갖출 것”이라고 설명했다.</p>\n<p>한편, 지니네트웍스는 올 하반기부터 미국 동부지역을 중심으로 ‘지니안 NAC’ 제품을 교육청, 코워킹 스페이스,<br />\n소형기업을 대상으로 시범서비스를 진행 중이다. 2016년 1분기 미국 보스톤 법인 설립과 함께 현지에서<br />\n본격적으로 사업에 착수 할 계획이다.</p>", "body_text": "![\"](https://www.genians.co.kr/hubfs/Imported_Blog_Media/001.jpg)\n\n<사진 설명> 뉴햄프셔 주립대학 UNH-IOL 연구원들에게 지니네트웍스 김계연 소장이 ‘지니안 NAC’ 제품을 설명하고 있다.\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 미국 뉴햄프셔 주립대학교...", "full_text": "![\"](https://www.genians.co.kr/hubfs/Imported_Blog_Media/001.jpg)\n\n<사진 설명> 뉴햄프셔 주립대학 UNH-IOL 연구원들에게 지니네트웍스 김계연 소장이 ‘지니안 NAC’ 제품을 설명하고 있다.\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 미국 뉴햄프셔 주립대학교 이노베이션 센터  \n(센터장 마크 스뎀 Marc Sedam) 산하 상호운용성 연구소(InterOperability Lab 이하 UNH-IOL, www.iol.unh.edu)와  \n자사 네트워크 접근제어 제품 글로벌화를 위한 공동연구를 진행한다고 3일 밝혔다.\n\n지니네트웍스가 해외시장 진출에 앞서 사용성(Usability) 강화를 목표로 UNH-IOL과 함께 제품 구축을 통해  \n사용자 인터페이스 및 기능 관련 연구를 진행한다.\n\n회사측은 글로벌 사용자가 보다 손쉽게 쉽게 ‘지니안 NAC(Genian NAC)’ 제품을 활용할 수 있도록  \n전반적인 사용성 테스트 ,다양한 네트워크 환경 기반 상호운용성 테스트, 영문 사용자 인터페이스 및 제품 매뉴얼 검토,  \n사물인터넷(Internet of Things)을 위한 IPv6 테스트 등의 평가자료를 바탕으로 향후 공동 연구 개발을 확대해  \n나갈 계획이라고 밝혔다.\n\n1988년 설립된 UNH-IOL은 네트워크 및 데이터 통신 제품 테스트와 표준 네트워킹 데이터 통신에 멀티 벤더 상호 운용성과  \n적합성을 연구할 수 있는 환경을 제공하고 있는 미국 내 유일한 전문 산학 연구소이다.\n\nUNH-IOL의 에리카 존슨(Erica Johnson) 디렉터는 “UNH-IOL이 보유한 네트워크 테스트 분야 인프라와 경험을 바탕으로  \n네트워크 환경을 개선하기 위해 지니네트웍스와 다양한 형태의 공동협력을 진행해 나갈 것”이라고 말했다.\n\n지니네트웍스의 김계연 연구소장은 “해외진출 시 시장을 선점한 글로벌 벤더들과 경쟁하기 위해서는 현지 사용자 특성에 맞춰  \n제품의 컨셉과 기능을 최적화하는 것은 필수”라며 “공신력있는 현지 연구기관과의 협력을 통해 ‘지니안 NAC’의 사용성을  \n강화하고 제품의 시장 경쟁력을 갖출 것”이라고 설명했다.\n\n한편, 지니네트웍스는 올 하반기부터 미국 동부지역을 중심으로 ‘지니안 NAC’ 제품을 교육청, 코워킹 스페이스,  \n소형기업을 대상으로 시범서비스를 진행 중이다. 2016년 1분기 미국 보스톤 법인 설립과 함께 현지에서  \n본격적으로 사업에 착수 할 계획이다."}, {"title": "지니네트웍스-트렌드마이크로, APT 공동대응을 위한 기술협력 강화 [15.10.06]", "date": "2015.10.06", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-트렌드마이크로-apt-공동대응을-위한-기", "category": "기타 뉴스", "body_html": "<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)와<br />\n 글로벌 보안 솔루션 기업인 트렌드마이크로(www.trendmicro.co.kr, 대표 에바 첸)가<br />\n 지능형 지속 위협 (이하 APT) 대응을 위해 기술협력을 강화한다고 6일 밝혔다.</p>\n<p>양사는 네트워크에 접속하는 단말에 대한 제어 정책 적용을 통해 APT 위협 확산 최소화를 목적으로 한 제품연동을 완료했다.<br />\n 연동제품은 지니네트웍스의 네트워크 접근제어 솔루션인 ‘지니안 NAC(Genian NAC)’와<br />\n 트렌드마이크로의 APT 대응 솔루션인 ‘딥 디스커버리(Deep Discovery)’다.</p>\n<p>트렌드마이크로의 ‘딥 디스커버리’에서 APT 공격 탐지 시 ‘지니안 NAC’는 해당 단말의 네트워크 행위를 차단함과 동시에,<br />\n 트렌드마이크로의 치료 솔루션 ‘TM에이전트(TMAgent)’ 배포를 통해 악성 파일을 격리 하고 감염된 단말을 치료한다.</p>\n<p>또한, ‘지니안 NAC’는 ‘TM에이전트’의 서버 연동 상태와 버전 정보 등을 모니터링 함으로써,<br />\n 외부의 위협으로부터 네트워크를 보호하고 안전한 방어체계를 유지할 수 있도록 한다.</p>\n<p>지니네트웍스와 트렌드마이크로는 연동제품의 공동 영업 및 마케팅을 통해 국내 신규 고객 발굴에 나설 계획이다.</p>\n<p>트렌드마이크로 김진광 상무는 “국내 대표적인 NAC 제품인 ‘지니안 NAC’와의 연동을 통해 외부 위협을 실시간을 탐지할 뿐만 아니라<br />\n 감염된 단말을 효과적으로 관리할 수 있는 종합적인 조치를 받을 수 있을 것“이라고 말했다.</p>\n<p>지니네트웍스의 김계연 연구소장은 “APT 등 지능형 보안위협 대응을 위한 노하우를 보유하고 있는 트렌드마이크로와의<br />\n 장기적인 기술 파트너쉽을 통해 능동적인 네트워크 및 단말보안을 구축할 수 있게 될 것”이라고 설명했다.</p>", "body_text": "내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)와  \n 글로벌 보안 솔루션 기업인 트렌드마이크로(www.trendmicro.co.kr, 대표 에바 첸)가  \n 지능형 지속 위협 (이하 APT) 대응을 위해 기술협력을 강화한다고 6일 밝혔다.\n\n양사는 네트워크에 접속하는 단말에 대한 제어 정책 적용을 통해 APT 위협 확산...", "full_text": "내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)와  \n 글로벌 보안 솔루션 기업인 트렌드마이크로(www.trendmicro.co.kr, 대표 에바 첸)가  \n 지능형 지속 위협 (이하 APT) 대응을 위해 기술협력을 강화한다고 6일 밝혔다.\n\n양사는 네트워크에 접속하는 단말에 대한 제어 정책 적용을 통해 APT 위협 확산 최소화를 목적으로 한 제품연동을 완료했다.  \n 연동제품은 지니네트웍스의 네트워크 접근제어 솔루션인 ‘지니안 NAC(Genian NAC)’와  \n 트렌드마이크로의 APT 대응 솔루션인 ‘딥 디스커버리(Deep Discovery)’다.\n\n트렌드마이크로의 ‘딥 디스커버리’에서 APT 공격 탐지 시 ‘지니안 NAC’는 해당 단말의 네트워크 행위를 차단함과 동시에,  \n 트렌드마이크로의 치료 솔루션 ‘TM에이전트(TMAgent)’ 배포를 통해 악성 파일을 격리 하고 감염된 단말을 치료한다.\n\n또한, ‘지니안 NAC’는 ‘TM에이전트’의 서버 연동 상태와 버전 정보 등을 모니터링 함으로써,  \n 외부의 위협으로부터 네트워크를 보호하고 안전한 방어체계를 유지할 수 있도록 한다.\n\n지니네트웍스와 트렌드마이크로는 연동제품의 공동 영업 및 마케팅을 통해 국내 신규 고객 발굴에 나설 계획이다.\n\n트렌드마이크로 김진광 상무는 “국내 대표적인 NAC 제품인 ‘지니안 NAC’와의 연동을 통해 외부 위협을 실시간을 탐지할 뿐만 아니라  \n 감염된 단말을 효과적으로 관리할 수 있는 종합적인 조치를 받을 수 있을 것“이라고 말했다.\n\n지니네트웍스의 김계연 연구소장은 “APT 등 지능형 보안위협 대응을 위한 노하우를 보유하고 있는 트렌드마이크로와의  \n 장기적인 기술 파트너쉽을 통해 능동적인 네트워크 및 단말보안을 구축할 수 있게 될 것”이라고 설명했다."}, {"title": "지니네트웍스, 프리미어파트너스로부터 60억원 투자 유치 [15.08.11]", "date": "2015.08.11", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-프리미어파트너스로부터-60억원-투자", "category": "비즈니스 & 성과", "body_html": "<p>내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 국내 벤처캐피털 프리미어파트너스<br />\n (www.premierpartners.co.kr 대표 정성인, 송혁진)로부터 60억원의 투자를 유치했다고 11일 밝혔다.</p>\n<p>프리미어파트너스는 국내 ‘네트워크 접근제어(Networks Access Control, 이하 NAC)’ 솔루션과 ‘PC 보안 수준 진단’ 분야<br />\n 1위 기업인 지니네트웍스의 기술력과 O2O 매장 분석서비스인 ‘왓츠업(waasup)’의 시장잠재력을 높이 평가했다.</p>\n<p>지니네트웍스는 이번 투자 유치를 통해 빅데이터 기반 분석 기술 등 연구개발을 강화하고 해외사업을 확대해<br />\n 글로벌 비즈니스 기반 마련 후 2018년 코스닥에 상장 할 계획이다.</p>\n<p>프리미어파트너스 관계자는 “지니네트웍스는 국내 NAC 시장을 선도하는 네트워크 보안기술과<br />\n 단말 보안기술을 보유하고 있어, IoT 시대 성장잠재력이 큰 보안기업으로 판단하고 투자를 진행했다”고 설명했다.</p>\n<p>이동범 지니네트웍스 대표이사는 “회사의 새로운 도약을 위해 창립 10년만에 첫 투자 유치를 결정한 만큼<br />\n 선제적인 연구개발 투자를 통해 글로벌 기업과 어깨를 나란히 하는 국내 대표 보안기업으로 성장해 나갈 것”이라고 포부를 밝혔다.</p>\n<p>지니네트웍스는 2014년 전년대비 매출 40%, 영업이익 334% 성장한 실적인 매출 126억원 영업이익 21억원을<br />\n 달성했으며, 2015년 상반기에도 전년 동기대비 40% 이상 성장한 실적을 달성했다.<br />\n 2015년 목표 실적은 매출 156억원 영업이익 26억원이다.</p>\n<p>한편, 지니네트웍스는 미국, 인도네시아 등 영어권 시장을 대상으로 해외시장 확대에 나선다.<br />\n ‘지니안 NAC(Genian NAC)’를 미국 보스톤 현지 스쿨넷 2곳에 구축 완료했으며 ‘왓츠업(waasup)’은<br />\n 인도네시아 현지 마케팅기업과 협업을 통해 대형쇼핑몰 대상으로 8월 말부터 시범서비스를 제공한다.</p>", "body_text": "내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 국내 벤처캐피털 프리미어파트너스  \n (www.premierpartners.co.kr 대표 정성인, 송혁진)로부터 60억원의 투자를 유치했다고 11일 밝혔다.\n\n프리미어파트너스는 국내 ‘네트워크 접근제어(Networks Access Control, 이하 NAC)’ 솔루션...", "full_text": "내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표 이동범)가 국내 벤처캐피털 프리미어파트너스  \n (www.premierpartners.co.kr 대표 정성인, 송혁진)로부터 60억원의 투자를 유치했다고 11일 밝혔다.\n\n프리미어파트너스는 국내 ‘네트워크 접근제어(Networks Access Control, 이하 NAC)’ 솔루션과 ‘PC 보안 수준 진단’ 분야  \n 1위 기업인 지니네트웍스의 기술력과 O2O 매장 분석서비스인 ‘왓츠업(waasup)’의 시장잠재력을 높이 평가했다.\n\n지니네트웍스는 이번 투자 유치를 통해 빅데이터 기반 분석 기술 등 연구개발을 강화하고 해외사업을 확대해  \n 글로벌 비즈니스 기반 마련 후 2018년 코스닥에 상장 할 계획이다.\n\n프리미어파트너스 관계자는 “지니네트웍스는 국내 NAC 시장을 선도하는 네트워크 보안기술과  \n 단말 보안기술을 보유하고 있어, IoT 시대 성장잠재력이 큰 보안기업으로 판단하고 투자를 진행했다”고 설명했다.\n\n이동범 지니네트웍스 대표이사는 “회사의 새로운 도약을 위해 창립 10년만에 첫 투자 유치를 결정한 만큼  \n 선제적인 연구개발 투자를 통해 글로벌 기업과 어깨를 나란히 하는 국내 대표 보안기업으로 성장해 나갈 것”이라고 포부를 밝혔다.\n\n지니네트웍스는 2014년 전년대비 매출 40%, 영업이익 334% 성장한 실적인 매출 126억원 영업이익 21억원을  \n 달성했으며, 2015년 상반기에도 전년 동기대비 40% 이상 성장한 실적을 달성했다.  \n 2015년 목표 실적은 매출 156억원 영업이익 26억원이다.\n\n한편, 지니네트웍스는 미국, 인도네시아 등 영어권 시장을 대상으로 해외시장 확대에 나선다.  \n ‘지니안 NAC(Genian NAC)’를 미국 보스톤 현지 스쿨넷 2곳에 구축 완료했으며 ‘왓츠업(waasup)’은  \n 인도네시아 현지 마케팅기업과 협업을 통해 대형쇼핑몰 대상으로 8월 말부터 시범서비스를 제공한다."}, {"title": "지니네트웍스-대신정보통신 전국 총판 계약 체결 [15.03.10]", "date": "2015.03.10", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-대신정보통신-전국-총판-계약-체결-15-03-10", "category": "기타 뉴스", "body_html": "<p>내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와<br />\n ICT 서비스기업 대신정보통신 (www.dsic.co.kr, 대표이사 이재원)이 정보보호 제품<br />\n 전국 영업 확대를 위한 총판 계약을 체결했다고 10일 밝혔다.</p>\n<p>양사는 이번 계약체결을 통해 강력한 전국 유통망을 기반으로 ‘지니안 NAC(Genian NAC)’와<br />\n ‘지니안 GPI(Genian GPI)’ 공급 확대를 위한 영업 기회 발굴 및 마케팅, 기술지원 등<br />\n 비즈니스 전반에 대한 상호협력을 강화해 나갈 예정이다.</p>\n<p>대신정보통신은 공공, 금융, 기업 등 ICT 구축 경험을 보유한 서비스 기업이다.<br />\n 보안사업본부는 10년 이상 보안 솔루션 유통 사업과 공공 보안 SI 사업을 수행하고 있어<br />\n 전국적 리셀러 망을 구축하고 있다.</p>\n<p>지니네트웍스는 국내 최초로 NAC를 개발 해 국내 약 700여개의 고객사를 확보하고 있다.<br />\n 국내외 벤더와의 지속적인 기술 협력을 통해 고객의 전 방위적 보안체계 수립을 위한<br />\n 내부 보안 전문 솔루션을 제공한다.</p>\n<p>이재원 대신정보통신 대표이사는 “대신정보통신은 자체적으로 보안 관련 시스템 엔지니어를 포함해<br />\n 약 200여명의 IT 전문인력을 확보하고 있어 고객의 요구사항에 능동적으로 대응하여 신뢰를 바탕으로<br />\n ‘지니안 NAC’와 ‘지니안 GPI’의 시장을 확대해 나갈 것” 이라고 밝혔다.</p>\n<p>이동범 지니네트웍스 대표이사는 “ICT 분야 다양한 구축경험을 보유한 대신정보통신과의 협력을 통해<br />\n 전국 다양한 분야의 신규 고객사를 확보해 사물인터넷 시대 내부 보안 플랫폼 전문기업으로<br />\n 성장해 나갈 것“이라고 포부를 밝혔다.</p>", "body_text": "내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와  \n ICT 서비스기업 대신정보통신 (www.dsic.co.kr, 대표이사 이재원)이 정보보호 제품  \n 전국 영업 확대를 위한 총판 계약을 체결했다고 10일 밝혔다.\n\n양사는 이번 계약체결을 통해 강력한 전국 유통망을 기반으로 ‘지니안 NAC(Genian NAC)’...", "full_text": "내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와  \n ICT 서비스기업 대신정보통신 (www.dsic.co.kr, 대표이사 이재원)이 정보보호 제품  \n 전국 영업 확대를 위한 총판 계약을 체결했다고 10일 밝혔다.\n\n양사는 이번 계약체결을 통해 강력한 전국 유통망을 기반으로 ‘지니안 NAC(Genian NAC)’와  \n ‘지니안 GPI(Genian GPI)’ 공급 확대를 위한 영업 기회 발굴 및 마케팅, 기술지원 등  \n 비즈니스 전반에 대한 상호협력을 강화해 나갈 예정이다.\n\n대신정보통신은 공공, 금융, 기업 등 ICT 구축 경험을 보유한 서비스 기업이다.  \n 보안사업본부는 10년 이상 보안 솔루션 유통 사업과 공공 보안 SI 사업을 수행하고 있어  \n 전국적 리셀러 망을 구축하고 있다.\n\n지니네트웍스는 국내 최초로 NAC를 개발 해 국내 약 700여개의 고객사를 확보하고 있다.  \n 국내외 벤더와의 지속적인 기술 협력을 통해 고객의 전 방위적 보안체계 수립을 위한  \n 내부 보안 전문 솔루션을 제공한다.\n\n이재원 대신정보통신 대표이사는 “대신정보통신은 자체적으로 보안 관련 시스템 엔지니어를 포함해  \n 약 200여명의 IT 전문인력을 확보하고 있어 고객의 요구사항에 능동적으로 대응하여 신뢰를 바탕으로  \n ‘지니안 NAC’와 ‘지니안 GPI’의 시장을 확대해 나갈 것” 이라고 밝혔다.\n\n이동범 지니네트웍스 대표이사는 “ICT 분야 다양한 구축경험을 보유한 대신정보통신과의 협력을 통해  \n 전국 다양한 분야의 신규 고객사를 확보해 사물인터넷 시대 내부 보안 플랫폼 전문기업으로  \n 성장해 나갈 것“이라고 포부를 밝혔다."}, {"title": "지니네트웍스, 2015 상반기 공채 실시 [15.03.03]", "date": "2015.03.03", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-2015-상반기-공채-실시-15-03-03", "category": "기타 뉴스", "body_html": "<p><a href=\"https://www.genians.co.kr/hubfs/Imported_Blog_Media/20150303_011328.jpg\"><img alt=\"지니 구인광고 이미지\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20150303_011328-1024x620.jpg?width=1024&amp;height=620&amp;name=20150303_011328-1024x620.jpg\" /></a></p>\n<p>내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 오는 3월 17일까지 상반기 공채를 실시한다.</p>\n<p>지니네트웍스는 ▲기술지원 ▲영업 ▲연구개발 ▲총무 등 전 분야에 걸쳐 15명 규모의 신규 채용을 진행 할 예정이다.<br />\n 각 부문별 상세 자격요건 확인과 지원은 잡코리아(www.jobkorea.co.kr)와 사람인(www.saramin.co.kr)을 통해 가능하다.</p>\n<p>올해로 창립 10주년을 맞은 지니네트웍스는 네트워크 접근 제어 솔루션 ‘지니안 NAC 스위트(Genian NAC Suite)’를 통해<br />\n 국내 시장 점유율 40% 이상을 차지하고 있는 내부보안 전문 기업이다. 특화된 단말 분석 기술을 바탕으로<br />\n 보안정책 준수관리 솔루션 ‘지니안 GPI’와 매장 분석서비스 ‘왓츠업(waasup)’ 등을 시장에 선보였다.</p>\n<p>특히, 지니네트웍스는 직원이 행복한 기업문화를 만들기 위해 다양한 복리후생을 제공하고 있다.<br />\n 전 직원 인센티브 지급, 자기계발비 지원, 우수 사원 대학원 학비 지원, 점심/저녁 식사 제공, 사내도서관 운영 등을 통해<br />\n 직원의 성장과 건강한 삶을 지원하는 기업으로 고용노동부 선정 ‘강소기업’, 중소기업진흥공단 선정 ‘일자리 으뜸기업’으로 뽑힌 바 있다.</p>", "body_text": "[![지니 구인광고 이미지](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20150303_011328-1024x620.jpg?width=1024&height=620&name=20150303_011328-1024x620.jpg)](https://www.genians.co.kr/hubfs/Importe...", "full_text": "[![지니 구인광고 이미지](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/20150303_011328-1024x620.jpg?width=1024&height=620&name=20150303_011328-1024x620.jpg)](https://www.genians.co.kr/hubfs/Imported_Blog_Media/20150303_011328.jpg)\n\n내부 보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)가 오는 3월 17일까지 상반기 공채를 실시한다.\n\n지니네트웍스는 ▲기술지원 ▲영업 ▲연구개발 ▲총무 등 전 분야에 걸쳐 15명 규모의 신규 채용을 진행 할 예정이다.  \n 각 부문별 상세 자격요건 확인과 지원은 잡코리아(www.jobkorea.co.kr)와 사람인(www.saramin.co.kr)을 통해 가능하다.\n\n올해로 창립 10주년을 맞은 지니네트웍스는 네트워크 접근 제어 솔루션 ‘지니안 NAC 스위트(Genian NAC Suite)’를 통해  \n 국내 시장 점유율 40% 이상을 차지하고 있는 내부보안 전문 기업이다. 특화된 단말 분석 기술을 바탕으로  \n 보안정책 준수관리 솔루션 ‘지니안 GPI’와 매장 분석서비스 ‘왓츠업(waasup)’ 등을 시장에 선보였다.\n\n특히, 지니네트웍스는 직원이 행복한 기업문화를 만들기 위해 다양한 복리후생을 제공하고 있다.  \n 전 직원 인센티브 지급, 자기계발비 지원, 우수 사원 대학원 학비 지원, 점심/저녁 식사 제공, 사내도서관 운영 등을 통해  \n 직원의 성장과 건강한 삶을 지원하는 기업으로 고용노동부 선정 ‘강소기업’, 중소기업진흥공단 선정 ‘일자리 으뜸기업’으로 뽑힌 바 있다."}, {"title": "지니네트웍스-나임네트웍스 SDN기반 보안기술 개발 맞손 [14.12.02]", "date": "2014.12.02", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-나임네트웍스-sdn기반-보안기술-개발-맞", "category": "기타 뉴스", "body_html": "<p><strong>SDN 환경 국내 보안기술 개발을 통한 시장 활성화 목표<br />\n 네트워크-보안 기술 협력의 성공 모델로 만들어 갈 터</strong></p>\n<p>내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와 SDN 선도기업 나임네트웍스(www.naimnetworks.com, 대표이사 류기훈)가 1일 삼성동 나임네트웍스 본사에서 ‘NAC-SDN 기술협력 업무협약’을 맺었다.</p>\n<p>이번 협약은 NAC와 SDN 분야를 선도하는 두 기업이 네트워크 변화의 흐름인 SDN 환경에 적용될 국내 보안기술의 개발 필요성에 공감하며 이루어졌다.</p>\n<p>양사는 이번 협약을 통해 SDN 환경에서 운영할 수 있는 ‘지니안 NAC(Genian NAC)’ 제품을 개발하고 출시 후 마케팅까지 장기적인 파트너쉽을 기반으로 국내 시장 활성화에 앞장선다.</p>\n<p>지니네트웍스와 나임네트웍스가 공동 개발하는 기술은 ▲SDN 기술을 이용한 NAC 인포서(Enforcer) ▲SDN을 통한 DPI(Deep Packet Inspection) ▲SDN 환경에서 구현 가능한 NAC 애플리케이션 등 이다.</p>\n<p>지니네트웍스는 강력한 단말제어 기능을 제공하는 SDN기반 NAC 기술개발과 함께 다양한 네트워크 솔루션 벤더와의 파트너쉽을 확대해 나가, 사물인터넷 시대 내부망 보안플랫폼으로 NAC의 입지를 강화해 나갈 계획이다.</p>\n<p>나임네트웍스는 클라우드 컴퓨팅과 가상화 환경의 도래로 다양한 분야에서의 SDN 구현이 필수요소가 될 것으로 예상, 유용한 형태의 협업 모델을 발굴해 보안 산업의 혁신을 가져올 수 있도록 지원하겠다는 전략이다.</p>\n<p>류기훈 나임네트웍스 대표이사는 “국내 SDN 생태계 구축을 위해서는 네트워크 벤더들과의 협력은 물론 다양한 전문기업과의 협업 역시 필수적”이라며 “보안과 네트워크는 서로 밀접한 관련성을 가지고 있는 만큼 NAC와 SDN의 협력이야말로 네트워크 산업 발전에 큰 획을 긋게 될 것”이라고 말했다.</p>\n<p>이동범 지니네트웍스 대표이사는 “SDN으로의 네트워크 환경변화는 이미 전세계적인 흐름으로 네트워크 기반 보안솔루션 역시 이러한 변화에 선제적으로 대응해야 한다“며 “지니네트웍스는 IT환경 변화를 고려한 보안기술을 신속하게 개발하고 적용해 고객에게 서비스하는 내부보안 전문기업으로 성장해 갈 것”이라고 포부를 밝혔다.</p>\n<p>양사는 이번 협약을 보안과 네트워크 분야에서의 성공적인 협력 체계로 확립해 성장 동력을 얻을 뿐 아니라 다양한 산업과의 공동 연구사업을 더욱 발전시켜 경쟁력을 강화해 나가겠다는 방침이다.</p>\n<p>한편, 지니네트웍스는 오는 4일 개최되는 ‘제18회 해킹방지워크샵’에서 SDN 기반 단말 보안 방안을 제시하는 ‘기업 단말관리의 이상과 현실’을 발표할 예정이다.</p>", "body_text": "**SDN 환경 국내 보안기술 개발을 통한 시장 활성화 목표  \n 네트워크-보안 기술 협력의 성공 모델로 만들어 갈 터**\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와 SDN 선도기업 나임네트웍스(www.naimnetworks.com, 대표이사 류기훈)가 1일 삼성동 나임네트웍스 본사에서 ‘NAC-SDN 기술협...", "full_text": "**SDN 환경 국내 보안기술 개발을 통한 시장 활성화 목표  \n 네트워크-보안 기술 협력의 성공 모델로 만들어 갈 터**\n\n내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와 SDN 선도기업 나임네트웍스(www.naimnetworks.com, 대표이사 류기훈)가 1일 삼성동 나임네트웍스 본사에서 ‘NAC-SDN 기술협력 업무협약’을 맺었다.\n\n이번 협약은 NAC와 SDN 분야를 선도하는 두 기업이 네트워크 변화의 흐름인 SDN 환경에 적용될 국내 보안기술의 개발 필요성에 공감하며 이루어졌다.\n\n양사는 이번 협약을 통해 SDN 환경에서 운영할 수 있는 ‘지니안 NAC(Genian NAC)’ 제품을 개발하고 출시 후 마케팅까지 장기적인 파트너쉽을 기반으로 국내 시장 활성화에 앞장선다.\n\n지니네트웍스와 나임네트웍스가 공동 개발하는 기술은 ▲SDN 기술을 이용한 NAC 인포서(Enforcer) ▲SDN을 통한 DPI(Deep Packet Inspection) ▲SDN 환경에서 구현 가능한 NAC 애플리케이션 등 이다.\n\n지니네트웍스는 강력한 단말제어 기능을 제공하는 SDN기반 NAC 기술개발과 함께 다양한 네트워크 솔루션 벤더와의 파트너쉽을 확대해 나가, 사물인터넷 시대 내부망 보안플랫폼으로 NAC의 입지를 강화해 나갈 계획이다.\n\n나임네트웍스는 클라우드 컴퓨팅과 가상화 환경의 도래로 다양한 분야에서의 SDN 구현이 필수요소가 될 것으로 예상, 유용한 형태의 협업 모델을 발굴해 보안 산업의 혁신을 가져올 수 있도록 지원하겠다는 전략이다.\n\n류기훈 나임네트웍스 대표이사는 “국내 SDN 생태계 구축을 위해서는 네트워크 벤더들과의 협력은 물론 다양한 전문기업과의 협업 역시 필수적”이라며 “보안과 네트워크는 서로 밀접한 관련성을 가지고 있는 만큼 NAC와 SDN의 협력이야말로 네트워크 산업 발전에 큰 획을 긋게 될 것”이라고 말했다.\n\n이동범 지니네트웍스 대표이사는 “SDN으로의 네트워크 환경변화는 이미 전세계적인 흐름으로 네트워크 기반 보안솔루션 역시 이러한 변화에 선제적으로 대응해야 한다“며 “지니네트웍스는 IT환경 변화를 고려한 보안기술을 신속하게 개발하고 적용해 고객에게 서비스하는 내부보안 전문기업으로 성장해 갈 것”이라고 포부를 밝혔다.\n\n양사는 이번 협약을 보안과 네트워크 분야에서의 성공적인 협력 체계로 확립해 성장 동력을 얻을 뿐 아니라 다양한 산업과의 공동 연구사업을 더욱 발전시켜 경쟁력을 강화해 나가겠다는 방침이다.\n\n한편, 지니네트웍스는 오는 4일 개최되는 ‘제18회 해킹방지워크샵’에서 SDN 기반 단말 보안 방안을 제시하는 ‘기업 단말관리의 이상과 현실’을 발표할 예정이다."}, {"title": "지니네트웍스-팔로알토 네트웍스 보안사업 협력을 위한 업무협약 체결 [14.11.05]", "date": "2014.11.05", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-팔로알토-네트웍스-보안사업-협력을", "category": "비즈니스 & 성과", "body_html": "<p><strong>국내 1위 NAC - 차세대 보안 분야 글로벌 선도 기업간 성공적인 협업 모범사례 될 터</strong></p>\n<p>&lt;사진 설명&gt; 국내 보안 사업 협력을 위한 기술 업무 협약을 체결한 (왼쪽부터) 톰 켈리 팔로알토 네트웍스 글로벌 유통 담당,<br />\n키스 카터 팔로알토 네트웍스 아시아퍼시픽 채널 상무, 론 마이어스 팔로알토 네트웍스 글로벌 채널 부사장,<br />\n이동범 지니네트웍스 대표이사, 허광진 지니네트웍스 전무, 박희범 팔로알토 네트웍스 코리아 지사장이 기념촬영을 하고 있다.</p>\n<p>2014년 11월 5일 - 내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와<br />\n글로벌 네트워크 보안 선도 기업인 팔로알토 네트웍스(지사장 박희범, Palo Alto Networks®, NYSE: PANW,https://www.paloaltonetworks.com/)가<br />\n5일 삼성동 파크 하얏트에서 국내 보안사업 협력을 위한 업무협약을 체결했다.</p>\n<p>양사는 기술협력을 통해 증가하는 보안위협에 공동 대응하여, 국내-글로벌 보안기업간의 성공적인 협업 모델을 만들어가는데 상호 협력하기로 했다.<br />\n향후, 양사는 네트워크 접근제어 솔루션 ‘지니안 NAC 스위트(Genian NAC Suite)’와 차세대 보안 플랫폼 제품을 연동할 예정이다.</p>\n<p>이번 협약체결과 함께 양사는 네트워크 접근제어(NAC, Network Access Control)에서 수집된 다양한 개별 클라이언트의 정보를 차세대 보안 플랫폼에 실시간으로 전달하고 차세대 보안 플랫폼에 의해 정의된 보안이 취약한 단말을 분류해 NAC를 통해 격리 조치하는 제품 연동을 진행한다.<br />\n이를 기반으로, 다양한 사용자 기반의 정보를 게이트웨이 보안에 적극 활용하여 국내 기업 고객들에게 보다 높은 수준의 네트워크 보안을 선보인다는 계획이다.</p>\n<p>지니네트웍스는 팔로알토 네트웍스와의 협력을 시작으로 국내외 보안제품과의 연동을 통해 NAC를 중심으로 한 에코시스템을 구축하고 지속적으로 제품 경쟁력을 향상 시켜나갈 예정이라고 설명했다.<br />\n팔로알토 네트웍스는 고성능의 단일 보안 플랫폼을 기반으로 차세대 방화벽과 APT 솔루션에 이어 최근 엔드포인트, 클라우드, 그리고 모바일 보안 솔루션까지 출시하면서<br />\n‘차세대 엔터프라이즈 보안 기업'으로의 입지를 강화하고 있다. 특히, 팔로알토 네트웍스는 이번 ‘지니안 NAC 스위트’ 와의 연동을 위해 한국지사는 물론 글로벌 차원에서도 적극적인 기술 지원을 제공할 예정이다.</p>\n<p>지니네트웍스의 ‘지니안 NAC 스위트’는 유선과 무선 네트워크에 존재하는 모든 자원을 식별하고 그에 대한 접근을 관리해주는 네트워크 접근제어 솔루션이다.<br />\n유무선 네트워크에 대한 가시성 확보를 지원하고 전방위적 보안체계 수립을 도와 조직의 보안을 강화할 수 있도록 해준다.</p>\n<p>팔로알토 네트웍스의 차세대 보안플랫폼은 ▲모든 포트와 애플리케이션을 자동 분류하는 ‘앱-아이디(App-ID)’ ▲사용자 및 그룹별로 애플리케이션 허용 정책을 적용하는 ‘유저-아이디(User-ID)’<br />\n▲바이러스와 각종 맬웨어 등이 네트워크 전체로 확산되지 않도록 차단하고 네트워크 상의 모든 콘텐츠를 확인할 수 있는 ’콘텐트-아이디(Content-ID)’ 등의 고유의 식별 기술을 사용하여<br />\n전체 IT 인프라를 구성하는 애플리케이션과 사용자 및 콘텐츠에 대해 높은 가시성을 제공하여 보안성을 크게 높일 수 있다.</p>\n<p>박희범 팔로알토 네트웍스 지사장은 “많은 국내 고객들이 팔로알토 네트웍스와 지니네트웍스의 협력을 통해 네트워크 상의 단말 및 애플리케이션, 사용자, 콘텐츠에 대한<br />\n보다 풍부한 가시성을 확보하고 컨트롤이 가능하게 됨으로써 기업 네트워크를 보다 안전하게 운영할 수 있게 됐다”며 “국내 NAC 분야 1위 기업인 지니네트웍스와 기술 업무 협약을 맺음으로써<br />\n국내 보안 시장 발전에 기여하고 궁극적으로는 기업의 다양한 보안 요구를 충족시킬 수 있는 글로벌-국내 기업 협업의 모범사례가 되기 바란다”라고 밝혔다.</p>\n<p>이동범 지니네트웍스 대표이사는 “고객이 지능화되는 보안위협에 대응하기 위한 보안정책을 수립할 수 있도록 각 보안 솔루션에서 수집된 정보를 공유하는 제품간 연동은 필수”라며<br />\n“NAC와의 제품연동 첫 사례로 차세대 네트워크 보안 솔루션의 글로벌 표준을 만든 팔로알토 네트웍스와의 협약을 맺게 된 만큼 지속적인 기술협력을 통해 성공적인 협업모델이 될 수 있도록 노력할 것”이라고 포부를 밝혔다.</p>", "body_text": "**국내 1위 NAC - 차세대 보안 분야 글로벌 선도 기업간 성공적인 협업 모범사례 될 터**\n\n<사진 설명> 국내 보안 사업 협력을 위한 기술 업무 협약을 체결한 (왼쪽부터) 톰 켈리 팔로알토 네트웍스 글로벌 유통 담당,  \n키스 카터 팔로알토 네트웍스 아시아퍼시픽 채널 상무, 론 마이어스 팔로알토 네트웍스 글로벌 채널 부사장,  \n이동범 지니네트웍스 ...", "full_text": "**국내 1위 NAC - 차세대 보안 분야 글로벌 선도 기업간 성공적인 협업 모범사례 될 터**\n\n<사진 설명> 국내 보안 사업 협력을 위한 기술 업무 협약을 체결한 (왼쪽부터) 톰 켈리 팔로알토 네트웍스 글로벌 유통 담당,  \n키스 카터 팔로알토 네트웍스 아시아퍼시픽 채널 상무, 론 마이어스 팔로알토 네트웍스 글로벌 채널 부사장,  \n이동범 지니네트웍스 대표이사, 허광진 지니네트웍스 전무, 박희범 팔로알토 네트웍스 코리아 지사장이 기념촬영을 하고 있다.\n\n2014년 11월 5일 - 내부보안 전문기업 지니네트웍스(www.geninetworks.com, 대표이사 이동범)와  \n글로벌 네트워크 보안 선도 기업인 팔로알토 네트웍스(지사장 박희범, Palo Alto Networks®, NYSE: PANW,https://www.paloaltonetworks.com/)가  \n5일 삼성동 파크 하얏트에서 국내 보안사업 협력을 위한 업무협약을 체결했다.\n\n양사는 기술협력을 통해 증가하는 보안위협에 공동 대응하여, 국내-글로벌 보안기업간의 성공적인 협업 모델을 만들어가는데 상호 협력하기로 했다.  \n향후, 양사는 네트워크 접근제어 솔루션 ‘지니안 NAC 스위트(Genian NAC Suite)’와 차세대 보안 플랫폼 제품을 연동할 예정이다.\n\n이번 협약체결과 함께 양사는 네트워크 접근제어(NAC, Network Access Control)에서 수집된 다양한 개별 클라이언트의 정보를 차세대 보안 플랫폼에 실시간으로 전달하고 차세대 보안 플랫폼에 의해 정의된 보안이 취약한 단말을 분류해 NAC를 통해 격리 조치하는 제품 연동을 진행한다.  \n이를 기반으로, 다양한 사용자 기반의 정보를 게이트웨이 보안에 적극 활용하여 국내 기업 고객들에게 보다 높은 수준의 네트워크 보안을 선보인다는 계획이다.\n\n지니네트웍스는 팔로알토 네트웍스와의 협력을 시작으로 국내외 보안제품과의 연동을 통해 NAC를 중심으로 한 에코시스템을 구축하고 지속적으로 제품 경쟁력을 향상 시켜나갈 예정이라고 설명했다.  \n팔로알토 네트웍스는 고성능의 단일 보안 플랫폼을 기반으로 차세대 방화벽과 APT 솔루션에 이어 최근 엔드포인트, 클라우드, 그리고 모바일 보안 솔루션까지 출시하면서  \n‘차세대 엔터프라이즈 보안 기업'으로의 입지를 강화하고 있다. 특히, 팔로알토 네트웍스는 이번 ‘지니안 NAC 스위트’ 와의 연동을 위해 한국지사는 물론 글로벌 차원에서도 적극적인 기술 지원을 제공할 예정이다.\n\n지니네트웍스의 ‘지니안 NAC 스위트’는 유선과 무선 네트워크에 존재하는 모든 자원을 식별하고 그에 대한 접근을 관리해주는 네트워크 접근제어 솔루션이다.  \n유무선 네트워크에 대한 가시성 확보를 지원하고 전방위적 보안체계 수립을 도와 조직의 보안을 강화할 수 있도록 해준다.\n\n팔로알토 네트웍스의 차세대 보안플랫폼은 ▲모든 포트와 애플리케이션을 자동 분류하는 ‘앱-아이디(App-ID)’ ▲사용자 및 그룹별로 애플리케이션 허용 정책을 적용하는 ‘유저-아이디(User-ID)’  \n▲바이러스와 각종 맬웨어 등이 네트워크 전체로 확산되지 않도록 차단하고 네트워크 상의 모든 콘텐츠를 확인할 수 있는 ’콘텐트-아이디(Content-ID)’ 등의 고유의 식별 기술을 사용하여  \n전체 IT 인프라를 구성하는 애플리케이션과 사용자 및 콘텐츠에 대해 높은 가시성을 제공하여 보안성을 크게 높일 수 있다.\n\n박희범 팔로알토 네트웍스 지사장은 “많은 국내 고객들이 팔로알토 네트웍스와 지니네트웍스의 협력을 통해 네트워크 상의 단말 및 애플리케이션, 사용자, 콘텐츠에 대한  \n보다 풍부한 가시성을 확보하고 컨트롤이 가능하게 됨으로써 기업 네트워크를 보다 안전하게 운영할 수 있게 됐다”며 “국내 NAC 분야 1위 기업인 지니네트웍스와 기술 업무 협약을 맺음으로써  \n국내 보안 시장 발전에 기여하고 궁극적으로는 기업의 다양한 보안 요구를 충족시킬 수 있는 글로벌-국내 기업 협업의 모범사례가 되기 바란다”라고 밝혔다.\n\n이동범 지니네트웍스 대표이사는 “고객이 지능화되는 보안위협에 대응하기 위한 보안정책을 수립할 수 있도록 각 보안 솔루션에서 수집된 정보를 공유하는 제품간 연동은 필수”라며  \n“NAC와의 제품연동 첫 사례로 차세대 네트워크 보안 솔루션의 글로벌 표준을 만든 팔로알토 네트웍스와의 협약을 맺게 된 만큼 지속적인 기술협력을 통해 성공적인 협업모델이 될 수 있도록 노력할 것”이라고 포부를 밝혔다."}, {"title": "지니네트웍스, O2O 오프라인 매장 분석서비스 ‘왓츠업(waasup)’ 출시 [14.07.24]", "date": "2014.07.24", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-o2o-오프라인-매장-분석서비스-왓츠업w", "category": "기타 뉴스", "body_html": "<p><strong>프랜차이즈, 대형 쇼핑몰 등을 대상으로 한 매장분석서비스보안이 적용 된 와이파이 접속 서비스 제공</strong></p>\n<p><a href=\"https://www.genians.co.kr/hubfs/Imported_Blog_Media/wassup-logo.jpg\"><img alt=\"wassup logo\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/wassup-logo-1.jpg?width=180&amp;height=180&amp;name=wassup-logo-1.jpg\" /></a></p>\n<p>최근 와이파이, 비콘 등 온라인 기술을 활용한 O2O(Online 2 Offline)에 대한 관심이 높아지는 가운데, BYOD 전문 보안기업이 선보이는 오프라인 매장 분석서비스가 등장했다.</p>\n<p>국내 네트워크 접근 제어(NAC) 시장 점유율 40%를 보유한 지니네트웍스(<a href=\"http://www.geninetworks.com/\">www.geninetworks.com</a>, 대표이사 이동범)가 오프라인 매장 분석서비스 ‘왓츠업(waasup, <a href=\"http://www.waasup.co.kr/\">www.waasup.co.kr</a>)’을 선보인다.</p>\n<p>‘왓츠업’은 무선 접속장치(AP: Access Point)를 기반으로 고객의 행동을 분석해 매출을 증가시킬 수 있는 최적의 마케팅 방안을 수립하도록 돕는 서비스다. 서비스 대상은 오프라인 매장을 운영하고 있는 프랜차이즈 기업, 대형 쇼핑몰, 일반 소매점 등 이다.</p>\n<p>지니네트웍스의 ‘왓츠업’은 ▲매장 규모 및 업종에 맞는 고객 분석을 통해 매장에 최적화 된 프로모션 방안 수립 ▲대형 쇼핑몰 고객 동선 파악 및 구역별 고객 집중도 분석 ▲기업 애플리케이션 설치 여부/사용 비율 분석 ▲보안이 적용 된 와이파이 접속 서비스를 제공한다. 향후 판매시점관리시스템 (POS:Point Of Sales) 정보 연동을 통한 방문자 대비 구매 수 분석 등을 추가 제공할 계획이다.</p>\n<p>회사측은 기업을 대상으로 한 비즈니스 경험을 살려 프랜차이즈 기업, 대형 쇼핑몰 등에 시범서비스 진행을 협의 중에 있으며 추후 학교, 병원 등을 대상으로 세분화 해 특화 서비스를 선보일 계획이라고 설명했다.</p>\n<p>이대효 지니네트웍스 신사업 팀장은 “경기 침체가 이어지는 가운데 오프라인 매장의 성공확률을높이기 위한 정확한 의사결정은 필수” 라며 “왓츠업을 정확한 의사결정을 돕고 실행할 수 있도록 돕는 마케팅 플랫폼으로 정착시켜 나갈 것” 이라고 포부를 밝혔다.</p>\n<p>|  |  |\n|</p>", "body_text": "**프랜차이즈, 대형 쇼핑몰 등을 대상으로 한 매장분석서비스보안이 적용 된 와이파이 접속 서비스 제공**\n\n[![wassup logo](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/wassup-logo-1.jpg?width=180&height=180&name=wassup-logo-1.jpg)](ht...", "full_text": "**프랜차이즈, 대형 쇼핑몰 등을 대상으로 한 매장분석서비스보안이 적용 된 와이파이 접속 서비스 제공**\n\n[![wassup logo](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/wassup-logo-1.jpg?width=180&height=180&name=wassup-logo-1.jpg)](https://www.genians.co.kr/hubfs/Imported_Blog_Media/wassup-logo.jpg)\n\n최근 와이파이, 비콘 등 온라인 기술을 활용한 O2O(Online 2 Offline)에 대한 관심이 높아지는 가운데, BYOD 전문 보안기업이 선보이는 오프라인 매장 분석서비스가 등장했다.\n\n국내 네트워크 접근 제어(NAC) 시장 점유율 40%를 보유한 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)가 오프라인 매장 분석서비스 ‘왓츠업(waasup, [www.waasup.co.kr](http://www.waasup.co.kr/))’을 선보인다.\n\n‘왓츠업’은 무선 접속장치(AP: Access Point)를 기반으로 고객의 행동을 분석해 매출을 증가시킬 수 있는 최적의 마케팅 방안을 수립하도록 돕는 서비스다. 서비스 대상은 오프라인 매장을 운영하고 있는 프랜차이즈 기업, 대형 쇼핑몰, 일반 소매점 등 이다.\n\n지니네트웍스의 ‘왓츠업’은 ▲매장 규모 및 업종에 맞는 고객 분석을 통해 매장에 최적화 된 프로모션 방안 수립 ▲대형 쇼핑몰 고객 동선 파악 및 구역별 고객 집중도 분석 ▲기업 애플리케이션 설치 여부/사용 비율 분석 ▲보안이 적용 된 와이파이 접속 서비스를 제공한다. 향후 판매시점관리시스템 (POS:Point Of Sales) 정보 연동을 통한 방문자 대비 구매 수 분석 등을 추가 제공할 계획이다.\n\n회사측은 기업을 대상으로 한 비즈니스 경험을 살려 프랜차이즈 기업, 대형 쇼핑몰 등에 시범서비스 진행을 협의 중에 있으며 추후 학교, 병원 등을 대상으로 세분화 해 특화 서비스를 선보일 계획이라고 설명했다.\n\n이대효 지니네트웍스 신사업 팀장은 “경기 침체가 이어지는 가운데 오프라인 매장의 성공확률을높이기 위한 정확한 의사결정은 필수” 라며 “왓츠업을 정확한 의사결정을 돕고 실행할 수 있도록 돕는 마케팅 플랫폼으로 정착시켜 나갈 것” 이라고 포부를 밝혔다.\n\n|  |  |\n|"}, {"title": "지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입 [13.03.19]", "date": "2014.03.19", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-공공분야-영업총괄에-정준철-이사-영", "category": "기타 뉴스", "body_html": "<h4>전문가 리더십 기반으로 공공분야 역량 강화</h4>\n<p>내부보안 전문기업 지니네트웍스(<a href=\"http://www.geninetworks.com/\">www.geninetworks.com</a>, 대표이사 이동범)가 IT 공공 분야의 최고 전문가인 정준철 전 티맥스 영업대표를 공공기업부 총괄 이사로 영입했다고 18일 밝혔다.</p>\n<p>이는 지난 달 영업본부장이었던 허광진 상무를 CAO 및 전무로 선임한 데 이어 ‘전문가 리더십’을 기반으로 공공 분야의 역량을 강화하기 위한 조치인 것으로 보인다.</p>\n<p>신임 정준철 이사는 지니네트웍스에 합류하기 전 코오롱정보통신을 거쳐 티맥스소프트의 티베로 영업대표를 역임한 바 있다. 지난 10여 년 간 공공 분야에서 탁월한 능력을 발휘해온 IT 업계의 베테랑 전문가로 지니네트웍스의 영업 차별화와 경쟁력을 더욱 강화시킬 수 있는 인물로 기대된다.</p>\n<p>지니네트웍스 관계자는 “정준철 이사가 축적해온 경험과 성과가 지니네트웍스의 성장과 발전에 큰 기여를 할 것으로 기대한다”며 “특히 올해 지니네트웍스가 주력하고자 하는 공공 시장에서의 전문 역량과 리더십을 발휘할 것”이라고 전했다.</p>\n<p><img alt=\"untitled1\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/untitled1-262x300.png?width=262&amp;height=300&amp;name=untitled1-262x300.png\" /></p>\n<p>▲ 지니네트웍스 정준철 이사</p>\n<p><strong>지니네트웍스 관련 기사 (2013년 3월 19일 게재)</strong></p>\n<blockquote>\n<p><a href=\"http://www.etnews.com/news/computing/security/2736529_1477.html\">[전자신문] 지니네트웍스, 정준철 전 티맥스 영업대표 영입</a></p>\n<p><a href=\"http://www.boannews.com/media/view.asp?idx=35227&amp;kind=1\">[보안뉴스] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a><br />\n<a href=\"http://dailysecu.com/news_view.php?article_id=4026\">[데일리시큐] 지니네트웍스, 정준철 이사 영입…공공시장 박차</a><br />\n<a href=\"http://www.ddaily.co.kr/news/news_view.php?uid=102271\">[디지털데일리] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a><br />\n<a href=\"http://www.zdnet.co.kr/ArticleView.asp?artice_id=20130318105802\">[ZDNet Korea] [인사]지니네트웍스</a></p>\n<p><a href=\"http://www.inews24.com/php/news_view.php?g_serial=731233&amp;g_menu=021800&amp;rrf=nv\">[아이뉴스24] 지니네트웍스, 정준철 공공기업부 총괄이사 선임</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=65700\">[DataNet] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a><br />\n<a href=\"http://www.itdaily.kr/news/articleView.html?idxno=38491\">[IT DAILY] 지니네트웍스, 정준철 전 티맥스 영업대표 영입</a><br />\n<a href=\"http://www.itdaily.kr/news/articleView.html?idxno=38491\">[아이티투데이] 지니네트웍스, 공공분야 영업총괄 정준철 이사</a></p>\n<p><a href=\"http://www.mt.co.kr/view/mtview.php?type=1&amp;no=2013031810554361456&amp;outlink=1\">[머니투데이] [인사]지니네트웍스, 정준철 공공영업 이사 영입</a></p>\n<p><a href=\"http://www.edaily.co.kr/news/newspath.asp?newsid=01679366602744632\">[이데일리] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a></p>\n<p><a href=\"http://www.newstomato.com/ReadNews.aspx?no=344473\">[뉴스토마토] 지니네트웍스, 공공기업부 총괄에 정준철 이사 영입</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/section/newsview.php?idxno=705018\">[이투데이] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a></p>\n<p><a href=\"http://www.egreennews.com/news/articleView.html?idxno=34592\">[그린경제] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입</a></p>\n</blockquote>", "body_text": "#### 전문가 리더십 기반으로 공공분야 역량 강화\n\n내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)가 IT 공공 분야의 최고 전문가인 정준철 전 티맥스 영업대표를 공공기업부 총괄 이사로 영입했다고 18일 밝혔다.\n\n이는 지난 달 영업본부장이었던 허광진 상무를 ...", "full_text": "#### 전문가 리더십 기반으로 공공분야 역량 강화\n\n내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)가 IT 공공 분야의 최고 전문가인 정준철 전 티맥스 영업대표를 공공기업부 총괄 이사로 영입했다고 18일 밝혔다.\n\n이는 지난 달 영업본부장이었던 허광진 상무를 CAO 및 전무로 선임한 데 이어 ‘전문가 리더십’을 기반으로 공공 분야의 역량을 강화하기 위한 조치인 것으로 보인다.\n\n신임 정준철 이사는 지니네트웍스에 합류하기 전 코오롱정보통신을 거쳐 티맥스소프트의 티베로 영업대표를 역임한 바 있다. 지난 10여 년 간 공공 분야에서 탁월한 능력을 발휘해온 IT 업계의 베테랑 전문가로 지니네트웍스의 영업 차별화와 경쟁력을 더욱 강화시킬 수 있는 인물로 기대된다.\n\n지니네트웍스 관계자는 “정준철 이사가 축적해온 경험과 성과가 지니네트웍스의 성장과 발전에 큰 기여를 할 것으로 기대한다”며 “특히 올해 지니네트웍스가 주력하고자 하는 공공 시장에서의 전문 역량과 리더십을 발휘할 것”이라고 전했다.\n\n![untitled1](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/untitled1-262x300.png?width=262&height=300&name=untitled1-262x300.png)\n\n▲ 지니네트웍스 정준철 이사\n\n**지니네트웍스 관련 기사 (2013년 3월 19일 게재)**\n\n> [[전자신문] 지니네트웍스, 정준철 전 티맥스 영업대표 영입](http://www.etnews.com/news/computing/security/2736529_1477.html)\n>\n> [[보안뉴스] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.boannews.com/media/view.asp?idx=35227&kind=1)  \n>  [[데일리시큐] 지니네트웍스, 정준철 이사 영입…공공시장 박차](http://dailysecu.com/news_view.php?article_id=4026)  \n>  [[디지털데일리] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.ddaily.co.kr/news/news_view.php?uid=102271)  \n>  [[ZDNet Korea] [인사]지니네트웍스](http://www.zdnet.co.kr/ArticleView.asp?artice_id=20130318105802)\n>\n> [[아이뉴스24] 지니네트웍스, 정준철 공공기업부 총괄이사 선임](http://www.inews24.com/php/news_view.php?g_serial=731233&g_menu=021800&rrf=nv)\n>\n> [[DataNet] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.datanet.co.kr/news/articleView.html?idxno=65700)  \n>  [[IT DAILY] 지니네트웍스, 정준철 전 티맥스 영업대표 영입](http://www.itdaily.kr/news/articleView.html?idxno=38491)  \n>  [[아이티투데이] 지니네트웍스, 공공분야 영업총괄 정준철 이사](http://www.itdaily.kr/news/articleView.html?idxno=38491)\n>\n> [[머니투데이] [인사]지니네트웍스, 정준철 공공영업 이사 영입](http://www.mt.co.kr/view/mtview.php?type=1&no=2013031810554361456&outlink=1)\n>\n> [[이데일리] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.edaily.co.kr/news/newspath.asp?newsid=01679366602744632)\n>\n> [[뉴스토마토] 지니네트웍스, 공공기업부 총괄에 정준철 이사 영입](http://www.newstomato.com/ReadNews.aspx?no=344473)\n>\n> [[이투데이] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.etoday.co.kr/news/section/newsview.php?idxno=705018)\n>\n> [[그린경제] 지니네트웍스, 공공분야 영업총괄에 정준철 이사 영입](http://www.egreennews.com/news/articleView.html?idxno=34592)"}, {"title": "지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시 [13.10.18]", "date": "2013.10.18", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-공공기관용-pc-보안수준-진단-솔루션-출", "category": "기타 뉴스", "body_html": "<p><strong>지니안 내PC지키미 출시 및 GS 인증 획득 공공기관 ‘사이버보안 진단의 날’ 점검항목 100% 충족</strong><br />\n<strong>사용자 스스로 보안 항목 점검하고 개선할 수 있도록 지원</strong></p>\n<p>내부보안 내부보안 전문기업 지니네트웍스(<a href=\"http://www.geninetworks.com/\">www.geninetworks.com</a>, 대표이사 이동범)는 최근 공공기관에 최적화된 PC 보안수준 진단 솔루션 ‘지니안 내PC지키미(GPI)’을 출시했다고 18일 밝혔다.</p>\n<p>지니안 내PC지키미는 공공기관 PC와 사용자에 대한 보안실태 평가를 수행해 지수화된 점검 결과를 제시해주는 제품으로, 출시와 동시에 GS인증을 획득하며 품질에 대한 신뢰성과 적합성을 인정 받았다.</p>\n<p>지니안 내PC지키미는 사용자의 행동 양식에 변화를 주어 안전한 사이버 문화를 형성시키는 것을 목적으로 하고 있다. 사이버 공격의 1차 목표가 되고 있는 사용자의 인식 제고가 최우선이 되어야 한다는 것이 지니네트웍스 측의 설명.</p>\n<p>국가 및 특정 기관을 대상으로 하는 사이버테러는 날로 증가하고 있으며, 해커들은 시스템을 무력화시키기 위한 도구로 사용자와 PC 자체를 활용하고 있다. 정부는 해킹으로부터 국가기밀 유출 피해를 예방하고 공직자의 보안의식 제고를 위해 매월 세 번째 수요일을 ‘사이버보안 진단의 날’로 지정해 시행하고 있다.</p>\n<p>지니안 내PC지키미는 범정부 차원에서 실시하고 있는 ‘사이버보안 진단의 날’ 점검 항목을 100% 충족하고 있으며, 보안감사를 위한 최적의 자료를 제공해준다. 전용장비로 되어 있어 별도의 서버 구축 없이 운영할 수 있으며, 도입에서부터 정책 배포 및 점검에 이르기까지 편리하게 관리할 수 있다는 것이 장점이다.</p>\n<p>이동범 지니네트웍스 사장은 “보안의 근간은 결국 사람”이라고 강조하며 “지속적이고 정기적인 점검을 통해 위협을 최소화하려는 노력과 함께 사용자 스스로 보안 수준을 확인하고 개선할 수 있도록 계속 지원할 것”이라고 밝혔다.</p>\n<p>지니네트웍스는 신제품 출시 및 GS인증 획득을 계기로 전문 영업인력을 확충하며 공공 시장 공략을 적극 강화하고 있다.</p>\n<p><img alt=\"untitled008\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/untitled008-300x225.png?width=300&amp;height=225&amp;name=untitled008-300x225.png\" /></p>\n<p>△지니안 내PC지키미 화면</p>\n<p><strong>지니네트웍스 관련 기사 (2013년 10월 18일 게재)</strong></p>\n<blockquote>\n<p><a href=\"http://www.etnews.com/news/computing/security/2848058_1477.html\">[전자신문] 지니네트웍스, 공공기관 PC 보안진단 솔루션 출시</a></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2013101802019960786004\">[디지털타임스] 지니네트웍스, 공공기관용 PC보안수준 진단 솔루션 출시</a></p>\n<p><a href=\"http://www.boannews.com/media/view.asp?idx=38100&amp;kind=1\">[보안뉴스] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시</a><br />\n<a href=\"http://www.ddaily.co.kr/news/news_view.php?uid=109941\">[디지털데일리] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시</a></p>\n<p><a href=\"http://www.inews24.com/php/news_view.php?g_serial=779048&amp;g_menu=020200&amp;rrf=nv\">[아이뉴스24] 지니네트웍스 공공기관용 PC 보안수준 진단 솔루션 출시</a><br />\n<a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=68924\">[DataNet] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시</a><br />\n [IT DAILY] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시<br />\n<a href=\"http://www.ajunews.com/kor/view.jsp?newsId=20131018000139\">[아주경제] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시</a></p>\n</blockquote>\n<p>&nbsp;</p>", "body_text": "**지니안 내PC지키미 출시 및 GS 인증 획득 공공기관 ‘사이버보안 진단의 날’ 점검항목 100% 충족**  \n  **사용자 스스로 보안 항목 점검하고 개선할 수 있도록 지원**\n\n내부보안 내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)는 최근 공공기관에 최적...", "full_text": "**지니안 내PC지키미 출시 및 GS 인증 획득 공공기관 ‘사이버보안 진단의 날’ 점검항목 100% 충족**  \n  **사용자 스스로 보안 항목 점검하고 개선할 수 있도록 지원**\n\n내부보안 내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)는 최근 공공기관에 최적화된 PC 보안수준 진단 솔루션 ‘지니안 내PC지키미(GPI)’을 출시했다고 18일 밝혔다.\n\n지니안 내PC지키미는 공공기관 PC와 사용자에 대한 보안실태 평가를 수행해 지수화된 점검 결과를 제시해주는 제품으로, 출시와 동시에 GS인증을 획득하며 품질에 대한 신뢰성과 적합성을 인정 받았다.\n\n지니안 내PC지키미는 사용자의 행동 양식에 변화를 주어 안전한 사이버 문화를 형성시키는 것을 목적으로 하고 있다. 사이버 공격의 1차 목표가 되고 있는 사용자의 인식 제고가 최우선이 되어야 한다는 것이 지니네트웍스 측의 설명.\n\n국가 및 특정 기관을 대상으로 하는 사이버테러는 날로 증가하고 있으며, 해커들은 시스템을 무력화시키기 위한 도구로 사용자와 PC 자체를 활용하고 있다. 정부는 해킹으로부터 국가기밀 유출 피해를 예방하고 공직자의 보안의식 제고를 위해 매월 세 번째 수요일을 ‘사이버보안 진단의 날’로 지정해 시행하고 있다.\n\n지니안 내PC지키미는 범정부 차원에서 실시하고 있는 ‘사이버보안 진단의 날’ 점검 항목을 100% 충족하고 있으며, 보안감사를 위한 최적의 자료를 제공해준다. 전용장비로 되어 있어 별도의 서버 구축 없이 운영할 수 있으며, 도입에서부터 정책 배포 및 점검에 이르기까지 편리하게 관리할 수 있다는 것이 장점이다.\n\n이동범 지니네트웍스 사장은 “보안의 근간은 결국 사람”이라고 강조하며 “지속적이고 정기적인 점검을 통해 위협을 최소화하려는 노력과 함께 사용자 스스로 보안 수준을 확인하고 개선할 수 있도록 계속 지원할 것”이라고 밝혔다.\n\n지니네트웍스는 신제품 출시 및 GS인증 획득을 계기로 전문 영업인력을 확충하며 공공 시장 공략을 적극 강화하고 있다.\n\n![untitled008](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/untitled008-300x225.png?width=300&height=225&name=untitled008-300x225.png)\n\n△지니안 내PC지키미 화면\n\n**지니네트웍스 관련 기사 (2013년 10월 18일 게재)**\n\n> [[전자신문] 지니네트웍스, 공공기관 PC 보안진단 솔루션 출시](http://www.etnews.com/news/computing/security/2848058_1477.html)\n>\n> [[디지털타임스] 지니네트웍스, 공공기관용 PC보안수준 진단 솔루션 출시](http://www.dt.co.kr/contents.html?article_no=2013101802019960786004)\n>\n> [[보안뉴스] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시](http://www.boannews.com/media/view.asp?idx=38100&kind=1)  \n>  [[디지털데일리] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시](http://www.ddaily.co.kr/news/news_view.php?uid=109941)\n>\n> [[아이뉴스24] 지니네트웍스 공공기관용 PC 보안수준 진단 솔루션 출시](http://www.inews24.com/php/news_view.php?g_serial=779048&g_menu=020200&rrf=nv)  \n>  [[DataNet] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시](http://www.datanet.co.kr/news/articleView.html?idxno=68924)  \n>  [IT DAILY] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시  \n>  [[아주경제] 지니네트웍스, 공공기관용 PC 보안수준 진단 솔루션 출시](http://www.ajunews.com/kor/view.jsp?newsId=20131018000139)\n\n&nbsp;"}, {"title": "지니네트웍스, 보안정책 준수관리 솔루션 사업 호조 [13.09.25]", "date": "2013.09.25", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-보안정책-준수관리-솔루션-사업-호조-13", "category": "기타 뉴스", "body_html": "<h4>공공시장 비롯 기업/금융권에 잇단 공급 보안 수준 측정해 사이버 공격 위험 최소화</h4>\n<p>내부보안 전문기업 지니네트웍스(<a href=\"http://www.geninetworks.com/\">www.geninetworks.com</a>, 대표이사 이동범)는 최근 한국철도공사 및 조달청을 비롯 신한카드, 중앙대학교병원 등에 보안정책 준수관리 솔루션 ‘지니안 CAM(Genian CAM)’을 공급했다고 25일 밝혔다.</p>\n<p>‘지니안 CAM’은 내부 단말과 사용자의 보안 수준을 정량화된 자료로 제공해 조직의 정보보호 관리 체계 수립과 운영을 지원해주는 제품이다. 보안 규제에 대한 준수 상태를 확인하고 조건별 보안 평가를 통해 산출한 수치를 근거로 현재 보안 상태를 파악할 수 있도록 해주는 한편, 사이버 위험을 다각도로 점검하고 진단해준다.</p>\n<p>지니네트웍스 측은, 빈번한 보안 사고로 사용자의 보안 의식을 강화하고자 하는 움직임이 ‘지니안 CAM’ 공급을 촉진시켰다며 사업 호조에 대한 배경을 설명했다. 특히 APT 공격의 1차 목표인 단말의 보안 상황을 지속적으로 점검해 사이버 공격의 위험을 최소화하는데 기여하고 있다고 덧붙였다.</p>\n<p>‘지니안 CAM’은 국가정보원의 사이버 보안진단 항목인 내PC지키미 점검 기준을 100% 충족하고 있으며, 한국인터넷진흥원의 정보보호 관리체계(ISMS) 인증 기준을 수렴하고 있다. 또한 조직이 자체적으로 운영하고 있는 규정을 쉽게 적용할 수 있어 전사적 보안 수준을 향상시키는데 효과적이다.</p>\n<p>이동범 지니네트웍스 사장은 “공공기관의 경우, 사이버•보안 진단의 날이면 정기적으로 PC의 취약점을 점검하고 내부 보안 수준을 향상하기 위한 노력을 기울여왔다”며 “내부 보안 강화를 위한 노력은 공공뿐 아니라 기업과 금융권 등 전분야로 확산되고 있다”며 관련 시장에 대한 기대감을 드러냈다.</p>\n<p>지니네트웍스는 사용자의 자발적인 참여를 유도하면서 보안에 대한 거부감을 줄여줄 수 있는 ‘지니안 CAM’ 솔루션에 대한 영업을 더욱 활성화하는 한편 기존/잠재 고객을 대상으로 보안문화 조성 캠페인을 펼치겠다는 계획이다.</p>\n<p><img alt=\"003\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/003-300x212.png?width=300&amp;height=212&amp;name=003-300x212.png\" /></p>\n<p><strong>지니네트웍스 관련 기사 (2013년 9월 25일 게재)</strong></p>\n<blockquote>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2013092502019960800001\">[디지털타임스] 지니네트웍스, 보안정책관리 솔루션 \"잘 팔리네\"</a><br />\n<a href=\"http://www.boannews.com/media/view.asp?idx=37757&amp;kind=1\">[보안뉴스] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조</a><br />\n<a href=\"http://www.ddaily.co.kr/news/news_view.php?uid=109058\">[디지털데일리] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조</a><br />\n<a href=\"http://www.zdnet.co.kr/ArticleView.asp?artice_id=20130925211916\">[ZDNet Korea] 지니네트웍스, 지니안CAM 수주 잇따라</a></p>\n<p><a href=\"http://www.inews24.com/php/news_view.php?g_serial=773516&amp;g_menu=020200&amp;rrf=nv\">[아이뉴스24] 지니네트웍스 철도공사•조달청 등에 보안 솔루션 공급</a></p>\n<p><a href=\"http://www.datanet.co.kr/news/articleView.html?idxno=68531\">[DataNet] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조</a><br />\n<a href=\"http://itdaily.kr/atl/view.asp?a_id=43791\">[IT DAILY] 지니네트웍스 '지니안 캠', 판매 '호조'</a><br />\n<a href=\"http://www.itworld.co.kr/news/83875\">[IT World] 지니네트웍스, 보안정책 준수관리 솔루션 공급 가속화</a></p>\n<p><a href=\"http://www.fnnews.com/view?ra=Sent0901m_01A&amp;corp=fnnews&amp;arcid=201309250100235550013027&amp;cDateYear=2013&amp;cDateMonth=09&amp;cDateDay=25&amp;\">[파이낸셜뉴스] 지니네트웍스, 보안정책 준수관리 솔루션 사업 ‘호조’</a></p>\n<p><a href=\"http://www.ajunews.com/kor/view.jsp?newsId=20130925000107\">[아주경제] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조</a></p>\n<p><a href=\"http://www.ajunews.com/kor/view.jsp?newsId=20130925000107\">[이투데이] 지니네트웍스, 철도공사•조달청 등에 보안 솔루션 ‘지니안 캠’ 공급</a></p>\n<p><a href=\"http://www.egreennews.com/news/articleView.html?idxno=68414\">[그린경제] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조</a></p>\n</blockquote>", "body_text": "#### 공공시장 비롯 기업/금융권에 잇단 공급 보안 수준 측정해 사이버 공격 위험 최소화\n\n내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)는 최근 한국철도공사 및 조달청을 비롯 신한카드, 중앙대학교병원 등에 보안정책 준수관리 솔루션 ‘지니안 CAM(Genian...", "full_text": "#### 공공시장 비롯 기업/금융권에 잇단 공급 보안 수준 측정해 사이버 공격 위험 최소화\n\n내부보안 전문기업 지니네트웍스([www.geninetworks.com](http://www.geninetworks.com/), 대표이사 이동범)는 최근 한국철도공사 및 조달청을 비롯 신한카드, 중앙대학교병원 등에 보안정책 준수관리 솔루션 ‘지니안 CAM(Genian CAM)’을 공급했다고 25일 밝혔다.\n\n‘지니안 CAM’은 내부 단말과 사용자의 보안 수준을 정량화된 자료로 제공해 조직의 정보보호 관리 체계 수립과 운영을 지원해주는 제품이다. 보안 규제에 대한 준수 상태를 확인하고 조건별 보안 평가를 통해 산출한 수치를 근거로 현재 보안 상태를 파악할 수 있도록 해주는 한편, 사이버 위험을 다각도로 점검하고 진단해준다.\n\n지니네트웍스 측은, 빈번한 보안 사고로 사용자의 보안 의식을 강화하고자 하는 움직임이 ‘지니안 CAM’ 공급을 촉진시켰다며 사업 호조에 대한 배경을 설명했다. 특히 APT 공격의 1차 목표인 단말의 보안 상황을 지속적으로 점검해 사이버 공격의 위험을 최소화하는데 기여하고 있다고 덧붙였다.\n\n‘지니안 CAM’은 국가정보원의 사이버 보안진단 항목인 내PC지키미 점검 기준을 100% 충족하고 있으며, 한국인터넷진흥원의 정보보호 관리체계(ISMS) 인증 기준을 수렴하고 있다. 또한 조직이 자체적으로 운영하고 있는 규정을 쉽게 적용할 수 있어 전사적 보안 수준을 향상시키는데 효과적이다.\n\n이동범 지니네트웍스 사장은 “공공기관의 경우, 사이버•보안 진단의 날이면 정기적으로 PC의 취약점을 점검하고 내부 보안 수준을 향상하기 위한 노력을 기울여왔다”며 “내부 보안 강화를 위한 노력은 공공뿐 아니라 기업과 금융권 등 전분야로 확산되고 있다”며 관련 시장에 대한 기대감을 드러냈다.\n\n지니네트웍스는 사용자의 자발적인 참여를 유도하면서 보안에 대한 거부감을 줄여줄 수 있는 ‘지니안 CAM’ 솔루션에 대한 영업을 더욱 활성화하는 한편 기존/잠재 고객을 대상으로 보안문화 조성 캠페인을 펼치겠다는 계획이다.\n\n![003](https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/003-300x212.png?width=300&height=212&name=003-300x212.png)\n\n**지니네트웍스 관련 기사 (2013년 9월 25일 게재)**\n\n> [[디지털타임스] 지니네트웍스, 보안정책관리 솔루션 \"잘 팔리네\"](http://www.dt.co.kr/contents.html?article_no=2013092502019960800001)  \n>  [[보안뉴스] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조](http://www.boannews.com/media/view.asp?idx=37757&kind=1)  \n>  [[디지털데일리] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조](http://www.ddaily.co.kr/news/news_view.php?uid=109058)  \n>  [[ZDNet Korea] 지니네트웍스, 지니안CAM 수주 잇따라](http://www.zdnet.co.kr/ArticleView.asp?artice_id=20130925211916)\n>\n> [[아이뉴스24] 지니네트웍스 철도공사•조달청 등에 보안 솔루션 공급](http://www.inews24.com/php/news_view.php?g_serial=773516&g_menu=020200&rrf=nv)\n>\n> [[DataNet] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조](http://www.datanet.co.kr/news/articleView.html?idxno=68531)  \n>  [[IT DAILY] 지니네트웍스 '지니안 캠', 판매 '호조'](http://itdaily.kr/atl/view.asp?a_id=43791)  \n>  [[IT World] 지니네트웍스, 보안정책 준수관리 솔루션 공급 가속화](http://www.itworld.co.kr/news/83875)\n>\n> [[파이낸셜뉴스] 지니네트웍스, 보안정책 준수관리 솔루션 사업 ‘호조’](http://www.fnnews.com/view?ra=Sent0901m_01A&corp=fnnews&arcid=201309250100235550013027&cDateYear=2013&cDateMonth=09&cDateDay=25&)\n>\n> [[아주경제] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조](http://www.ajunews.com/kor/view.jsp?newsId=20130925000107)\n>\n> [[이투데이] 지니네트웍스, 철도공사•조달청 등에 보안 솔루션 ‘지니안 캠’ 공급](http://www.ajunews.com/kor/view.jsp?newsId=20130925000107)\n>\n> [[그린경제] 지니네트웍스, 보안정책 준수관리 솔루션 사업 호조](http://www.egreennews.com/news/articleView.html?idxno=68414)"}, {"title": "지니네트웍스-세아네트웍스, 전국 총판 계약 체결 [13.01.30]", "date": "2013.01.30", "link": "https://www.genians.co.kr/pr-room/press/지니네트웍스-세아네트웍스-전국-총판-계약-체결-13-01-30", "category": "기타 뉴스", "body_html": "<h4>정보보호 시장 기회 발굴 및 리더십 강화 신규 시장 확대 및 전략 고객 추가 발굴</h4>\n<p>내부보안 전문기업 지니네트웍스(<a href=\"http://www.geninetworks.com/\">www.geninetworks.com</a>, 대표이사 이동범)가 소프트웨어 유통 컨설팅 업체 세아네트웍스(<a href=\"http://www.seahnetworks.com/\">www.seahnetworks.com</a>, 대표이사 박의숙)와 협력해 정보보호 제품 시장 공략에 박차를 가한다고 30일 밝혔다.</p>\n<p>양사는 NAC 제품에 대한 전국 총판 계약을 체결하고, 강력한 유통망을 활용해 지니안 NAC 스위트 공급을 확대한다고 설명했다. 공동 영업과 마케팅, 기술 및 교육 지원 등 실무 협력을 통해 시장 기회를 발굴하고, 리더십을 강화하기 위해 상호 노력하기로 했다.</p>\n<p>세아네트웍스는 안랩, 알티베이스사 등의 제품을 공급하고 있는 IT 전문 유통업체로 넓은 영업 유통망과 풍부한 경험을 강점으로 내세우고 있다. 지니네트웍스는 이번 총판 계약 체결을 통해 ‘지니안 NAC 스위트’의 시장 경쟁력이 더욱 강화될 것으로 기대하고 있다.</p>\n<p>지니네트웍스의 ‘지니안 NAC 스위트’는 유선과 무선 네트워크에 존재하는 모든 자원을 식별하고 그에 대한 접근을 관리해주는 네트워크 접근제어 솔루션이다. 유무선 네트워크에 대한 가시성 확보를 지원하고 전방위적 보안체계 수립을 도와 조직의 보안을 강화할 수 있도록 해준다.</p>\n<p>고영규 세아네트웍스 상무는 “IT인프라 전문기업으로서 시장에서의 위상을 더욱 강화하는 계기가 될 것”이라며 “양사가 보유하고 있는 장점을 바탕으로 최고의 솔루션과 서비스를 제공해 고객의 IT경쟁력을 높이기 위해 노력하겠다”고 전했다.</p>\n<p>허광진 지니네트웍스 상무는 “세아네트웍스와의 전국 총판 계약으로 파트너 기업 간 협력체제가 강화돼 시너지 효과가 높아질 것으로 기대된다”며 “다양한 산업군별 신규 시장을 확대하고 전략고객을 추가 발굴하는데 매진하겠다”고 밝혔다.</p>\n<p><img alt=\"untitled\" src=\"https://www.genians.co.kr/hs-fs/hubfs/Imported_Blog_Media/untitled.png?width=640&amp;height=389&amp;name=untitled.png\" /><br />\n ▲ 왼쪽부터 세아네트웍스 고영규 상무, 지니네트웍스 허광진 상무</p>\n<p><strong>지니네트웍스 관련 기사 (2013년 1월 30일 게재)</strong></p>\n<p><a href=\"http://www.dt.co.kr/contents.html?article_no=2013013002019960785003\">[디지털타임스] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.boannews.com/media/view.asp?idx=34632&amp;page=1&amp;kind=1&amp;search=title&amp;find=\">[보안뉴스] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://dailysecu.co.kr/news_view.php?article_id=3719\">[데일리시큐] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://ddaily.co.kr/news/news_view.php?uid=100516\">[디지털데일리] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.zdnet.co.kr/news/news_view.asp?artice_id=20130130153138\">[ZDNet Korea] 지니네트웍스-세아네트웍스, 총판계약 체결</a></p>\n<p><a href=\"http://news.inews24.com/php/news_view.php?g_menu=020200&amp;g_serial=720888\">[아이뉴스24] 지니네트웍스-세아네트웍스, NAC 제품 총판 계약</a></p>\n<p><a href=\"http://datanet.co.kr/news/articleView.html?idxno=64967\">[DataNet] 지니네트웍스•세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.itdaily.kr/news/articleView.html?idxno=37261\">[IT DAILY] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.ittoday.co.kr/news/articleView.html?idxno=33495\">[아이티투데이] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.itworld.co.kr/news/80025\">[한국IDG] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.ciokorea.com/news/15565\">[CIO매거진] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>\n<p><a href=\"http://www.etoday.co.kr/news/section/newsview.php?idxno=684756\">[이투데이] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결</a></p>", "body_text": "#### 정보보호 시장 기회 발굴 및 리더십 강화 신규 시장 확대 및 전략 고객 추가 발굴\n\n내부보안 전문기업 지니네트웍스([w
