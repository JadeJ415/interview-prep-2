웍스, 전국 총판 계약 체결](http://datanet.co.kr/news/articleView.html?idxno=64967)\n\n[[IT DAILY] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결](http://www.itdaily.kr/news/articleView.html?idxno=37261)\n\n[[아이티투데이] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결](http://www.ittoday.co.kr/news/articleView.html?idxno=33495)\n\n[[한국IDG] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결](http://www.itworld.co.kr/news/80025)\n\n[[CIO매거진] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결](http://www.ciokorea.com/news/15565)\n\n[[이투데이] 지니네트웍스-세아네트웍스, 전국 총판 계약 체결](http://www.etoday.co.kr/news/section/newsview.php?idxno=684756)"}];
        
        let currentCategory = '전체';
        let searchQuery = '';
        let sortOrder = 'desc'; // 'desc' or 'asc'
        let viewMode = 'grid'; // 'grid' or 'list'

        // Extract unique categories
        const categories = ['전체', ...new Set(articles.map(a => a.category))];

        const grid = document.getElementById('articleGrid');
        const tagsContainer = document.getElementById('categoryTags');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const searchScopeSelect = document.getElementById('searchScope');
        const modal = document.getElementById('modal');
        const closeModalBtn = document.getElementById('closeModal');
        const btnGrid = document.getElementById('btnGrid');
        const btnList = document.getElementById('btnList');

        // View Mode Toggle
        btnGrid.addEventListener('click', () => {
            viewMode = 'grid';
            btnGrid.classList.add('active');
            btnList.classList.remove('active');
            grid.classList.remove('list-view');
        });

        btnList.addEventListener('click', () => {
            viewMode = 'list';
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
            grid.classList.add('list-view');
        });

        // Render Tags
        function renderTags() {
            tagsContainer.innerHTML = '';
            categories.forEach(cat => {
                const tag = document.createElement('div');
                tag.className = 'tag ' + (cat === currentCategory ? 'active' : '');
                tag.textContent = cat;
                tag.addEventListener('click', () => {
                    currentCategory = cat;
                    renderTags();
                    renderGrid();
                });
                tagsContainer.appendChild(tag);
            });
        }

        // Render Grid
        function renderGrid() {
            grid.innerHTML = '';
            
            const scope = searchScopeSelect.value;
            let filtered = articles.filter(a => {
                const matchCat = currentCategory === '전체' || a.category === currentCategory;
                let matchSearch = false;
                if (scope === 'title') {
                    matchSearch = a.title.toLowerCase().includes(searchQuery.toLowerCase());
                } else {
                    matchSearch = a.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                  a.body_text.toLowerCase().includes(searchQuery.toLowerCase());
                }
                return matchCat && matchSearch;
            });

            // Parse dates for sorting (assuming format YYYY.MM.DD)
            filtered.sort((a, b) => {
                const da = new Date(a.date.replace(/\./g, '-'));
                const db = new Date(b.date.replace(/\./g, '-'));
                // If invalid date, fallback to text comparison
                if (isNaN(da) || isNaN(db)) {
                    return sortOrder === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date);
                }
                return sortOrder === 'desc' ? db - da : da - db;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
                return;
            }

            filtered.forEach((a, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${(index % 10) * 0.05}s`; // staggered fade in
                
                card.innerHTML = `
                    <div class="card-category">${a.category}</div>
                    <div class="card-title">${a.title}</div>
                    <div class="card-date">${a.date}</div>
                    <div class="card-snippet">${a.body_text.substring(0, 150)}...</div>
                `;
                
                card.addEventListener('click', () => openModal(a));
                grid.appendChild(card);
            });
        }

        // Modal functions
        function openModal(article) {
            document.getElementById('modalCategory').textContent = article.category;
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalDate').textContent = article.date;
            document.getElementById('modalBody').innerHTML = article.body_html;
            document.getElementById('modalLink').href = article.link;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scroll
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Search and Sort Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
        });

        searchScopeSelect.addEventListener('change', () => {
            renderGrid();
        });

        sortSelect.addEventListener('change', (e) => {
            sortOrder = e.target.value;
            renderGrid();
        });

        // Init
        renderTags();
        renderGrid();
        
        // Escape key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

    </script>
</body>
</html>
