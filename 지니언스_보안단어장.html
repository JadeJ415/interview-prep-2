<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보안 PR 단어장 | 정세진</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#1a202c}

/* 헤더 */
header{background:linear-gradient(135deg,#0f2a4a,#1a3a5f,#1e4d8c);color:#fff;padding:22px 16px 18px}
header h1{font-size:19px;font-weight:800}
header p{font-size:12px;opacity:.8;margin-top:4px;line-height:1.6}
.tip-box{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;line-height:1.7;border-left:3px solid #60a5fa}

/* 탭 */
.tab-wrap{background:#fff;border-bottom:2px solid #e2e8f0;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-wrap::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;font-weight:700;color:#718096;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:#1a3a5f;border-bottom-color:#1a3a5f}

/* 섹션 */
.section{display:none;padding:14px}
.section.active{display:block}

/* ── 단어장 ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff}
.search-wrap input:focus{border-color:#1a3a5f}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#a0aec0}
.cat-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cf-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#4a5568;transition:.15s}
.cf-btn.active{background:#1a3a5f;color:#fff;border-color:#1a3a5f}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.card-grid{grid-template-columns:1fr}}

.word-card{background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);padding:14px;cursor:pointer;transition:.15s;border-left:4px solid #cbd5e0}
.word-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.word-card.cat-솔루션{border-left-color:#2563a8}
.word-card.cat-공격기법{border-left-color:#dc2626}
.word-card.cat-정책제도{border-left-color:#059669}
.word-card.cat-신기술{border-left-color:#7c3aed}

.wc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.wc-term{font-size:15px;font-weight:800;color:#1a202c;line-height:1.3}
.wc-en{font-size:10px;color:#a0aec0;margin-top:2px}
.cat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.cb-솔루션{background:#dbeafe;color:#1d4ed8}
.cb-공격기법{background:#fee2e2;color:#991b1b}
.cb-정책제도{background:#d1fae5;color:#065f46}
.cb-신기술{background:#ede9fe;color:#5b21b6}

.wc-desc{font-size:12px;color:#4a5568;line-height:1.65;display:none}
.wc-desc.open{display:block;margin-top:8px;padding-top:8px;border-top:1px solid #f0f4f8}
.wc-why{font-size:11px;color:#2563a8;font-weight:700;margin-top:7px;padding:6px 9px;background:#eff6ff;border-radius:7px;line-height:1.6}
.wc-source{font-size:10px;color:#a0aec0;margin-top:6px}

.no-result{text-align:center;padding:40px;color:#a0aec0;font-size:14px}

/* ── 이슈 타임라인 ── */
.issue-list{display:flex;flex-direction:column;gap:12px}
.issue-card{background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);overflow:hidden}
.issue-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.issue-date{font-size:11px;color:#a0aec0;font-weight:700;white-space:nowrap}
.issue-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.it-사건{background:#fee2e2;color:#991b1b}
.it-정책{background:#d1fae5;color:#065f46}
.it-기술{background:#dbeafe;color:#1d4ed8}
.it-글로벌{background:#ede9fe;color:#5b21b6}
.issue-title{font-size:13px;font-weight:700;color:#1a202c;flex:1;line-height:1.4}
.issue-body{display:none;padding:0 14px 14px;font-size:12px;color:#4a5568;line-height:1.75}
.issue-body.open{display:block}
.issue-link{font-size:11px;color:#2563a8;text-decoration:none;font-weight:700;display:inline-block;margin-top:8px}
.issue-key{font-size:11px;font-weight:700;color:#1a3a5f;margin-top:8px;padding:6px 9px;background:#eff6ff;border-radius:7px}

/* ── 매체 가이드 ── */
.media-list{display:flex;flex-direction:column;gap:10px}
.media-card{background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);padding:14px}
.mc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mc-name{font-size:15px;font-weight:800;color:#1a202c}
.mc-url{font-size:11px;color:#2563a8;text-decoration:none}
.mc-desc{font-size:12px;color:#4a5568;line-height:1.7}
.mc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#f0f4f8;color:#4a5568;display:inline-block;margin:4px 4px 0 0}

/* ── 학습팁 ── */
.tip-section{display:flex;flex-direction:column;gap:10px}
.tip-card{background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);padding:14px}
.tip-num{width:28px;height:28px;background:#1a3a5f;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.tip-title{font-size:14px;font-weight:700;color:#1a202c}
.tip-body{font-size:12px;color:#4a5568;line-height:1.75;margin-top:6px}
</style>
</head>
<body>

<header>
  <h1>📖 보안 PR 단어장</h1>
  <p>전자신문·보안뉴스·데일리시큐·디지털데일리·바이라인 기반 | 2025~2026</p>
  <div class="tip-box">💬 대표 면접 팁: "보안 관련 기사를 많이 읽고 자신만의 단어장을 만들어라" — 지니언스 대표</div>
</header>

<div class="tab-wrap">
  <div class="tab active" onclick="showTab('words')">📚 단어장</div>
  <div class="tab" onclick="showTab('issues')">📰 최근 이슈</div>
  <div class="tab" onclick="showTab('media')">🗞 담당 매체</div>
  <div class="tab" onclick="showTab('guide')">🎯 학습 가이드</div>
</div>

<!-- ── 단어장 ── -->
<div class="section active" id="tab-words">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="용어 검색..." oninput="filterWords()">
  </div>
  <div class="cat-filter">
    <span class="cf-btn active" onclick="setCat('전체',this)">전체</span>
    <span class="cf-btn" onclick="setCat('솔루션',this)">🔵 솔루션</span>
    <span class="cf-btn" onclick="setCat('공격기법',this)">🔴 공격기법</span>
    <span class="cf-btn" onclick="setCat('정책제도',this)">🟢 정책·제도</span>
    <span class="cf-btn" onclick="setCat('신기술',this)">🟣 신기술</span>
  </div>
  <div class="card-grid" id="wordGrid"></div>
  <div class="no-result" id="noResult" style="display:none">검색 결과가 없습니다.</div>
</div>

<!-- ── 최근 이슈 ── -->
<div class="section" id="tab-issues">
  <div class="issue-list" id="issueList"></div>
</div>

<!-- ── 매체 가이드 ── -->
<div class="section" id="tab-media">
  <div class="media-list" id="mediaList"></div>
</div>

<!-- ── 학습 가이드 ── -->
<div class="section" id="tab-guide">
  <div class="tip-section" id="guideList"></div>
</div>

<script>
// ── 단어 데이터 ──
const WORDS = [
  // 솔루션
  {term:'NAC', en:'Network Access Control', cat:'솔루션',
   desc:'네트워크에 접속하는 모든 기기와 사용자를 식별·인증하고, 정책에 맞지 않으면 접속을 차단하는 네트워크 접근제어 솔루션. IP/MAC 기반 식별이 핵심.',
   why:'지니언스 창업 원점 제품. NAC 시장 점유율 72%. "도어락"에 비유하면 됨.',
   src:'보안뉴스, 전자신문'},
  {term:'EDR', en:'Endpoint Detection & Response', cat:'솔루션',
   desc:'PC·서버 등 엔드포인트에 에이전트를 설치해 실행 파일·프로세스·네트워크 행위를 실시간 모니터링하고, 이상 행위를 탐지·차단·격리하는 솔루션.',
   why:'지니언스 공공 조달 7년 연속 1위. 금감원 금융기관 EDR 점검 이슈로 수요 급증.',
   src:'보안뉴스 2025 EDR/XDR 리포트'},
  {term:'XDR', en:'Extended Detection & Response', cat:'솔루션',
   desc:'EDR을 넘어 이메일·네트워크·클라우드·서버까지 여러 보안 계층의 데이터를 통합·연관 분석해 위협을 탐지·대응하는 확장형 플랫폼.',
   why:'EDR 이후 다음 단계로 자주 언급됨. "EDR의 눈이 XDR로 커졌다"고 설명 가능.',
   src:'보안뉴스, 마크애니 블로그'},
  {term:'MDR', en:'Managed Detection & Response', cat:'솔루션',
   desc:'EDR·SIEM 등 보안 기술을 외부 전문 업체가 24/7 대신 운영해주는 관리형 보안 서비스. 자체 SOC 구축이 어려운 기업 대상.',

   src:'지니언스 보도자료, 보안뉴스'},
  {term:'SIEM', en:'Security Information & Event Management', cat:'솔루션',
   desc:'각종 보안 장비·서버의 로그를 중앙에서 수집·분석해 이상 징후를 감지하는 보안관제 핵심 인프라. 규정 준수(컴플라이언스)에도 필수.',
   why:'2026 보안뉴스 SIEM 리포트에서 "AI 연동 SIEM"으로 진화 중이라고 강조.',
   src:'보안뉴스 2026 SIEM 솔루션 리포트'},
  {term:'SOAR', en:'Security Orchestration, Automation & Response', cat:'솔루션',
   desc:'보안 사고 대응 프로세스를 자동화하는 플랫폼. 알림이 오면 자동으로 분류·대응하고 티켓을 생성. SIEM과 함께 운영.',
   why:'보안 인력 부족 문제를 해결하는 키워드로 자주 등장. SIEM·XDR 기사에 세트로 나옴.',
   src:'보안뉴스, 마이크로소프트 보안'},
  {term:'NDR', en:'Network Detection & Response', cat:'솔루션',
   desc:'네트워크 트래픽을 상시 분석해 내부 횡적 이동, 비정상 통신 패턴 등 이상 행위를 탐지하는 솔루션. EDR의 네트워크 버전.',
   why:'2025 보안뉴스 NDR 리포트에서 별도 카테고리로 급성장. 지니언스 NAC와 연계 가능.',
   src:'보안뉴스 2025 NDR 솔루션 리포트'},
  {term:'ZTNA', en:'Zero Trust Network Access', cat:'솔루션',
   desc:'제로트러스트 원칙을 네트워크 접근에 적용한 솔루션. VPN을 대체하며 사용자·기기를 매번 검증 후 최소 권한만 부여.',
   why:'지니언스 3대 솔루션 중 하나. 망분리 완화와 함께 공공 수요 급증.',
   src:'지니언스 블로그, 보안뉴스'},
  {term:'EPP', en:'Endpoint Protection Platform', cat:'솔루션',
   desc:'백신(AV)·안티랜섬웨어·매체제어·취약점 관리 등을 하나의 플랫폼으로 통합한 엔드포인트 보호 솔루션.',
   why:'지니언스 Insights E 3.0 = EPP 플랫폼. AV+EDR+AR+매체제어 통합.',
   src:'지니언스 보도자료'},
  {term:'DLP', en:'Data Loss Prevention', cat:'솔루션',
   desc:'중요 데이터가 외부로 유출되지 않도록 감시·차단하는 솔루션. 이메일·USB·클라우드 업로드 채널을 통제.',
   why:'N2SF 데이터 등급 분류 정책과 함께 수요 급증. 망분리 완화 이후 핵심.',
   src:'보안뉴스, 데일리시큐'},
  {term:'WAF', en:'Web Application Firewall', cat:'솔루션',
   desc:'웹 애플리케이션을 겨냥한 SQL 인젝션·XSS 등 공격을 탐지·차단하는 웹 방화벽.',

  {term:'스피어피싱', en:'Spear Phishing', cat:'공격기법',

// ── 렌더 함수 ──
let currentCat = '전체';
function renderWords(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('wordGrid');
  const noR = document.getElementById('noResult');
  const filtered = WORDS.filter(w=>{
    const matchCat = currentCat === '전체' || w.cat === currentCat;
    const matchQ = !q || w.term.toLowerCase().includes(q) || w.en.toLowerCase().includes(q) || w.desc.includes(q) || w.why.includes(q);
    return matchCat && matchQ;
  });
  if(!filtered.length){grid.innerHTML='';noR.style.display='block';return;}
  noR.style.display='none';
  grid.innerHTML = filtered.map((w,i)=>`
    <div class="word-card cat-${w.cat}" onclick="toggleWord(this)">
      <div class="wc-top">
        <div><div class="wc-term">${w.term}</div><div class="wc-en">${w.en}</div></div>
        <span class="cat-badge cb-${w.cat}">${w.cat}</span>
      </div>
      <div class="wc-desc">
        ${w.desc}
        <div class="wc-why">💡 지니언스 연결: ${w.why}</div>
        <div class="wc-source">📰 출처: ${w.src}</div>
      </div>
    </div>
  `).join('');
}
function toggleWord(el){
  const desc = el.querySelector('.wc-desc');
  desc.classList.toggle('open');
}
function filterWords(){renderWords();}
function setCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value='';
  renderWords();
}

function renderIssues(){
  document.getElementById('issueList').innerHTML = ISSUES.map(i=>`
    <div class="issue-card">
      <div class="issue-header" onclick="toggleIssue(this)">
        <span class="issue-date">${i.date}</span>
        <span class="issue-tag ${i.tag}">${i.label}</span>
        <span class="issue-title">${i.title}</span>
        <span style="font-size:12px;color:#a0aec0">▼</span>
      </div>
      <div class="issue-body">
        ${i.body}
        <div class="issue-key">${i.key}</div>
      </div>
    </div>
  `).join('');
}
function toggleIssue(el){
  const body = el.nextElementSibling;
  body.classList.toggle('open');
  const arr = el.querySelector('span:last-child');
  arr.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function renderMedia(){
  document.getElementById('mediaList').innerHTML = MEDIA.map(m=>`
    <div class="media-card">
      <div class="mc-top">
        <div class="mc-icon" style="background:${m.bg}">${m.icon}</div>
        <div>
          <div class="mc-name">${m.name}</div>
          <a class="mc-url" href="${m.url}" target="_blank">${m.url}</a>
        </div>
      </div>
      <div class="mc-desc">${m.desc}</div>
      <div style="margin-top:8px">${m.tags.map(t=>`<span class="mc-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderGuide(){
  document.getElementById('guideList').innerHTML = GUIDES.map(g=>`
    <div class="tip-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="tip-num">${g.num}</div>
        <div class="tip-title">${g.title}</div>
      </div>
      <div class="tip-body">${g.body}</div>
    </div>
  `).join('');
}

function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['words','issues','media','guide'];
    t.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

// 초기화
renderWords(); renderIssues(); renderMedia(); renderGuide();
</script>
