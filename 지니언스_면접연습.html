<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지니언스 면접 연습 | 정세진</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#f0f4f8; color:#1a202c; min-height:100vh; }

/* 헤더 */
header { background:linear-gradient(135deg,#1a3a5f,#2563a8); color:#fff; padding:20px 16px 16px; }
header h1 { font-size:18px; font-weight:700; }
header p { font-size:12px; opacity:.8; margin-top:3px; }

/* 카테고리 필터 */
.filter-wrap { background:#fff; border-bottom:1px solid #e2e8f0; padding:10px 14px; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.filter-wrap::-webkit-scrollbar { display:none; }
.filter-btn { display:inline-block; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-right:6px; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#4a5568; transition:.2s; }
.filter-btn.active { background:#2563a8; color:#fff; border-color:#2563a8; }

/* 진행바 */
.progress-bar-wrap { background:#e2e8f0; height:4px; }
.progress-bar { height:4px; background:#2563a8; transition:width .3s; }

/* 메인 카드 */
.card-wrap { padding:16px; max-width:680px; margin:0 auto; }

.q-card { background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }

.q-header { padding:16px 18px 12px; border-bottom:1px solid #f0f4f8; display:flex; align-items:center; justify-content:space-between; }
.q-counter { font-size:13px; color:#a0aec0; font-weight:600; }
.cat-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.cat-자기소개 { background:#dbeafe; color:#1d4ed8; }
.cat-경력경험 { background:#d1fae5; color:#065f46; }
.cat-PR전문성 { background:#ede9fe; color:#5b21b6; }
.cat-기업이해 { background:#fef3c7; color:#92400e; }
.cat-약점극복 { background:#fee2e2; color:#991b1b; }
.cat-케이스 { background:#e0f2fe; color:#075985; }
.cat-인성가치관 { background:#f0fdf4; color:#166534; }
.cat-면접후기 { background:#fce7f3; color:#9d174d; }

.q-body { padding:22px 18px 18px; }
.q-num { font-size:12px; color:#a0aec0; margin-bottom:8px; }
.q-text { font-size:16px; font-weight:700; color:#1a202c; line-height:1.6; }
.q-tip { font-size:12px; color:#718096; margin-top:10px; padding:8px 12px; background:#f7fafc; border-radius:8px; line-height:1.6; }

/* 답변 영역 */
.ans-wrap { margin-top:14px; }
.ans-toggle { width:100%; padding:12px; background:#2563a8; color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; transition:.2s; font-family:inherit; }
.ans-toggle:hover { background:#1d4ed8; }
.ans-toggle.open { background:#f0f4f8; color:#2563a8; border:2px solid #2563a8; }

.ans-box { display:none; margin-top:12px; background:#f8faff; border:1.5px solid #bfdbfe; border-radius:10px; padding:16px; }
.ans-box.show { display:block; }
.ans-box p { font-size:14px; color:#1e3a5f; line-height:1.85; }
.ans-point { font-size:12px; color:#2563a8; font-weight:700; margin-top:10px; padding-top:10px; border-top:1px dashed #bfdbfe; }
.ans-point span { display:inline-block; background:#dbeafe; padding:2px 8px; border-radius:10px; margin-right:4px; margin-bottom:4px; font-size:11px; }

/* 내 메모 */
.memo-wrap { margin-top:10px; }
.memo-wrap textarea { width:100%; border:1.5px solid #e2e8f0; border-radius:8px; padding:10px 12px; font-size:13px; font-family:inherit; resize:vertical; min-height:60px; color:#2d3748; outline:none; }
.memo-wrap textarea:focus { border-color:#2563a8; }
.memo-label { font-size:11px; color:#a0aec0; margin-bottom:4px; }

/* 하단 네비 */
.nav-bottom { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-top:1px solid #f0f4f8; gap:8px; }
.nav-btn { flex:1; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; }
.nav-prev { background:#f0f4f8; color:#4a5568; }
.nav-prev:hover { background:#e2e8f0; }
.nav-next { background:#2563a8; color:#fff; }
.nav-next:hover { background:#1d4ed8; }
.nav-btn:disabled { opacity:.35; cursor:not-allowed; }

/* 진행 */
.progress-info { text-align:center; font-size:12px; color:#718096; padding:6px 0 12px; }

/* 완료 화면 */
.done-card { background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:40px 24px; text-align:center; }
.done-emoji { font-size:56px; margin-bottom:16px; }
.done-title { font-size:20px; font-weight:800; color:#1a202c; margin-bottom:8px; }
.done-sub { font-size:14px; color:#718096; line-height:1.7; }
.done-btn { margin-top:20px; padding:14px 28px; background:#2563a8; color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }

@media(max-width:640px) {
  .q-text { font-size:15px; }
  header h1 { font-size:16px; }
}
</style>
</head>
<body>

<header>
  <h1>🎤 지니언스 면접 연습</h1>
  <p>정세진 · 언론홍보(PR) 지원 · 총 58문항</p>
</header>

<div class="filter-wrap" id="filterWrap">
  <span class="filter-btn active" onclick="filterCat('전체')">전체 58</span>
  <span class="filter-btn" onclick="filterCat('자기소개')">자기소개 5</span>
  <span class="filter-btn" onclick="filterCat('경력경험')">경력·경험 10</span>
  <span class="filter-btn" onclick="filterCat('PR전문성')">PR 전문성 10</span>
  <span class="filter-btn" onclick="filterCat('기업이해')">기업 이해 8</span>
  <span class="filter-btn" onclick="filterCat('약점극복')">약점 극복 5</span>
  <span class="filter-btn" onclick="filterCat('케이스')">상황·케이스 7</span>
  <span class="filter-btn" onclick="filterCat('인성가치관')">인성·가치관 5</span>
  <span class="filter-btn" style="border-color:#f9a8d4;color:#9d174d;" onclick="filterCat('면접후기')">🔥 면접후기 8</span>
</div>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="card-wrap">
  <div class="progress-info" id="progressInfo"></div>
  <div class="q-card" id="qCard"></div>
  <div class="done-card" id="doneCard" style="display:none;">
    <div class="done-emoji">🎉</div>
    <div class="done-title">모든 문항 완료!</div>
    <div class="done-sub">58개 질문을 모두 연습했습니다.<br>면접 때 자연스럽게 나올 때까지 반복하세요.</div>
    <button class="done-btn" onclick="restart()">처음부터 다시</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── 자기소개 (5)
  {
    cat:'자기소개', q:'1분 자기소개를 해주세요.',
    tip:'첫인상을 결정하는 질문. 경력 흐름 → 핵심 강점 → 지원 이유 순서로 60~70초 안에 끊기.',
    ans:`서울시립대 영어영문학과를 졸업하고 PR·마케팅 분야에서 약 5년을 일했습니다. 외국계 IT 기업 대상 PR 대행사인 브라이먼커뮤니케이션스에서 인턴으로 시작해 NVIDIA, Cloudera 같은 기업의 보도자료 번역과 기자 대응을 보조했고, 네오다임에서 Adobe, AWS, Databricks 등 글로벌 IT 고객사의 디지털 캠페인을 기획하고 운영했습니다. 현재는 AI 스타트업 다리소프트에서 전략기획팀 대리로 언론홍보와 마케팅 전반을 담당하고 있습니다. 보도자료부터 대표 인터뷰, 전시회 운영까지 혼자 맡으면서 특히 기사 한 건이 영업과 투자에 직접적인 영향을 준다는 걸 체감했습니다. 그 경험을 바탕으로 이제는 PR을 전문적으로 집중해서 깊이 있게 하고 싶어 지니언스에 지원하게 됐습니다.`,
    points:['경력 흐름 명확', 'IT PR 경험 강조', '지원 이유 자연 연결']
  },
  {
    cat:'자기소개', q:'왜 지니언스에 지원하셨나요?',
    tip:'회사를 구체적으로 알고 있다는 걸 보여줘야 함. 막연한 성장 기대가 아닌 지니언스만의 이유가 있어야 함.',
    ans:`지니언스가 PR을 전략적으로 운영하는 기업이라는 점이 가장 컸습니다. 보도자료를 살펴보니 전시 참가 전후로 사전 예고와 성료 결과를 세트로 내고, 대표 인터뷰를 비즈니스 전환 시점에 배치하는 방식이 눈에 띄었습니다. 단순히 배포 중심이 아니라 메시지를 설계하는 팀이라는 인상을 받았습니다. 또한 NAC에서 EDR·ZTNA로, 제품 판매에서 MDR 서비스로 빠르게 사업 범위를 넓히고 있고, 글로벌로도 36개국까지 확장 중이라 PR이 다뤄야 하는 주제가 풍부하다고 생각했습니다. 저는 지금까지 IT 기업의 기술을 비즈니스 언어로 풀어내는 일을 해왔는데, 지니언스의 보안 기술을 그렇게 풀어내는 역할을 하고 싶습니다.`,
    points:['보도자료 직접 분석', 'NAC·EDR·ZTNA 언급', '구체적 성장 배경']
  },
  {
    cat:'자기소개', q:'왜 마케팅에서 PR로 전향하려 하세요?',
    tip:'억지스럽지 않게. 경험에서 나온 자연스러운 선택으로 보여줘야 함.',
    ans:`마케팅 전반을 5년 하면서 어떤 채널이 실제로 임팩트가 있는지 직접 보이기 시작했습니다. CEO 인터뷰 기사가 나간 후 주요 지자체에서 먼저 연락이 왔고, 보도자료를 낼 때마다 투자자 반응이 긍정적으로 온다는 피드백을 들었습니다. 광고나 SNS보다 기사 한 건의 무게가 다르다는 걸 몸으로 느꼈습니다. 동시에 보도자료나 인터뷰 자료를 쓸 때 가장 몰입이 됐습니다. 넓게 하다 보니 PR이 저한테 맞는 일이라는 걸 확인한 셈이라, 이제는 여기에 집중하고 싶습니다.`,
    points:['구체적 임팩트 사례', '몰입 경험', '선택이 아닌 발견']
  },
  {
    cat:'자기소개', q:'현직을 그만두는 이유가 무엇인가요?',
    tip:'회사 비방 없이. 구조적 한계를 담담하게, 이직의 방향성으로 전환.',
    ans:`B2G 사업 특성상 제품을 명확하게 정의하거나 공격적으로 알리기 어려운 구조였습니다. 실적이 나도 대외 노출을 조심해야 하는 상황이 반복되다 보니, PR이 전략적으로 작동하는 환경에서 일하고 싶다는 생각이 커졌습니다. 지니언스는 RSAC, 블랙햇 MEA, 자이텍스 등 글로벌 전시마다 적극적으로 노출하고, 대표님 기고와 인터뷰도 꾸준히 내는 회사라 저한테 맞는 환경이라고 판단했습니다.`,
    points:['회사 비난 없음', '구조적 맥락 설명', '지니언스와 자연 연결']
  },
  {
    cat:'자기소개', q:'5년 후 어떤 PR 전문가가 되고 싶으세요?',
    tip:'너무 추상적이면 안 됨. 지니언스 맥락에서 구체적 그림.',
    ans:`기술을 이해하고 비즈니스 언어로 번역할 수 있는 보안 PR 전문가가 되고 싶습니다. 지금 보안 업계는 AI 위협, 제로트러스트, 양자 보안까지 굉장히 빠르게 움직이고 있는데, 이 기술들을 기자와 투자자, 일반 고객에게 각각 다른 방식으로 풀어낼 수 있는 사람이 필요하다고 생각합니다. 5년 후에는 지니언스의 글로벌 PR 전략을 함께 설계하는 역할을 하고 싶습니다.`,
    points:['보안 도메인 명시', '글로벌 맥락', '지니언스 성장과 연결']
  },

  // ── 경력·경험 (10)
  {
    cat:'경력경험', q:'다리소프트에서 가장 기억에 남는 PR 성과를 말해주세요.',
    tip:'숫자나 결과가 있으면 좋음. CEO 인터뷰 → 지자체 연락 사례 활용.',
    ans:`CEO 인터뷰 기사를 기획·작성한 것이 가장 기억에 남습니다. 경북대 x IT동아 채널에 대표님 인터뷰가 나간 후 주요 지자체 담당자들에게서 먼저 연락이 왔습니다. 보도자료를 배포할 때마다 투자자들의 긍정적인 반응이 들어온다는 피드백도 꾸준히 받았고요. 기사 하나가 영업과 IR에 직접 영향을 준다는 걸 체감한 경험이어서 PR의 무게를 다시 느꼈습니다.`,
    points:['구체적 사례', '영업·IR 임팩트', '인터뷰 기획 역량']
  },
  {
    cat:'경력경험', q:'네오다임에서 가장 어려웠던 캠페인은 무엇이었나요?',
    tip:'어려움을 어떻게 해결했는지가 핵심. 글로벌 IT 기업 대행 경험 활용.',
    ans:`Adobe Korea 컨퍼런스 캠페인이 가장 기억에 남습니다. 한국 타깃으로 글로벌 메시지를 현지화해야 했는데, 본사의 크리에이티브 방향과 한국 고객의 반응 사이에 간극이 있었습니다. 본사 메시지를 그대로 번역하는 게 아니라 한국 시장에 맞게 각색해야 한다는 점을 고객사에 설득하고, 실제로 수치를 보여주면서 방향을 바꾸는 경험을 했습니다. 이 과정에서 고객사와 본사 양쪽을 설득하는 커뮤니케이션 방식을 익혔습니다.`,
    points:['글로벌 기업 대행 경험', '현지화 역량', '설득 커뮤니케이션']
  },
  {
    cat:'경력경험', q:'보도자료를 처음부터 끝까지 혼자 기획하고 작성한 경험이 있나요? 어떤 과정이었나요?',
    tip:'포트폴리오와 연결. 기획부터 배포까지 전 과정을 설명.',
    ans:`다리소프트에서 언론홍보를 전담하면서 기획부터 배포까지 혼자 담당했습니다. 먼저 개발팀과 영업팀 브리핑을 통해 기술적 사실과 비즈니스 성과를 수집하고, 기자 관점에서 어떤 부분이 뉴스가 될 수 있는지를 중심으로 핵심 메시지를 잡았습니다. 역삼각형 구조로 초안을 작성한 후 대표님 확인을 거쳐 배포했고, 주요 기사를 꾸준히 쓰는 기자분들께는 개별 연락도 드렸습니다. 포르투갈 브리사 그룹 계약, 뉴욕시 교통국 협력 같은 글로벌 성과 보도자료가 대표적입니다.`,
    points:['기획~배포 전 과정', '역삼각형 구조 언급', '구체적 사례 포함']
  },
  {
    cat:'경력경험', q:'CEO 인터뷰 기사를 어떻게 준비하고 작성했나요?',
    tip:'C레벨 커뮤니케이션 역량을 보여주는 질문. 준비 과정 디테일이 중요.',
    ans:`먼저 인터뷰 목적과 매체 독자를 파악했습니다. 어떤 메시지를 심을 것인지 대표님과 사전에 합의하고, 예상 질문 리스트와 핵심 답변 포인트를 정리해 드렸습니다. 인터뷰 중에는 배석해서 흐름을 모니터링하고, 인터뷰 후에는 기자가 작성하기 전에 보완할 사실 정보를 다시 확인시켜드렸습니다. 기사가 나온 후에는 반응과 피드백을 모니터링해서 다음 인터뷰 전략에 반영했습니다.`,
    points:['사전 메시지 설계', '배석·모니터링', '사후 피드백 반영']

    ans:`브라이먼커뮤니케이션스는 외국계 IT PR을 직접 배우고 싶어 인턴으로 지원했습니다. 인턴 종료 후 정규직 전환이 어려워 네오다임으로 이직했고, Adobe, AWS, Databricks 같은 글로벌 IT 고객사의 디지털 캠페인을 운영하며 마케팅 전반을 배웠습니다. 다리소프트는 PR을 전담으로 맡아볼 수 있는 기회여서 이직했습니다. 기술 스타트업에서 보도자료부터 CEO 인터뷰까지 혼자 기획하고 실행하는 경험을 했지만, B2G 사업 구조상 PR을 공격적으로 운영하기 어려운 한계가 있었습니다. 지니언스는 그 한계 없이 PR을 전략적으로 운영할 수 있는 환경이라 지원했습니다.`,
    points:['흐름이 있는 경력 서사', '각 이직 이유 명확', '현직 한계 담담하게']
  },
  {
    cat:'면접후기', q:'본인 생각은 A인데 상사는 B, 거래처는 C 방식을 원합니다. 어떻게 하겠습니까?',
    tip:'면접후기에서 직접 나온 시뮬레이션 질문. 정답보다 사고 과정을 보는 질문. 실제 사례 연결 필수.',
    ans:`먼저 세 방향의 공통 목적이 무엇인지 확인합니다. 방법이 달라도 목표가 같으면 절충점이 생기기 때문입니다. 다리소프트에서 영업팀이 보도자료 배포를 꺼릴 때, 목적이 신뢰 구축이라는 걸 공유하고 매체 범위와 표현 수위를 조율해서 합의한 적이 있습니다. 제 방법이 맞다고 생각해도 혼자 밀어붙이면 관계가 손상되고 결과도 안 납니다. 목적을 먼저 정렬하고, 각자의 우려를 해소하는 방향으로 방법을 조율하는 게 제 방식입니다.`,
    points:['목적 우선 확인', '실제 사례 활용', '관계 관리 관점']
  },
  {
    cat:'면접후기', q:'타 부서와 의견 충돌이 생겼을 때 어떻게 대처하나요?',
    tip:'면접후기에서 갈등 시뮬레이션 질문으로 자주 등장. 피하거나 양보하는 답이 아닌 해결 중심 답변.',
    ans:`갈등의 원인을 먼저 파악합니다. 대부분은 목표보다 방법 차이이거나, 정보가 공유되지 않아서 생기는 경우가 많았습니다. 다리소프트에서 보도자료 내용을 두고 개발팀과 의견이 달랐던 경우가 있었는데, 기자 관점에서 어떤 부분이 뉴스 가치가 있는지를 정리해서 공유하니 오히려 개발팀에서 더 적극적으로 협조해줬습니다. 상대방의 우려를 이해하는 게 먼저고, 그다음이 설득이라고 생각합니다.`,
    points:['원인 진단 우선', '구체 사례 활용', '이해 후 설득 순서']
  },
  {
    cat:'면접후기', q:'대학교 때 영어영문학과와 동아시아경제학을 복수전공한 이유는 무엇인가요?',
    tip:'경력직에게도 대학 관련 질문이 나온다는 게 면접후기의 핵심. 당황하지 않도록 준비.',
    ans:`영어는 단순 스펙보다 실제로 쓸 수 있는 커뮤니케이션 도구로 키우고 싶었습니다. 외국계 기업에서 일하고 싶다는 방향이 일찌감치 있었고, TOEIC 940점과 인턴 경험으로 이어졌습니다. 동아시아경제학은 비즈니스 맥락을 이해하고 싶어서 선택했습니다. PR이 결국 기업의 비즈니스 목표를 언어로 실현하는 일이다 보니, 두 전공이 지금 하는 일과 맞닿아 있다고 생각합니다.`,
    points:['방향성 있는 선택', 'TOEIC·인턴 연결', '현재 직무와 연결']
  },
  {
    cat:'면접후기', q:'같이 일하는 동료들에게 어떤 사람으로 기억되고 싶으세요?',
    tip:'이미지를 중시하는 지니언스 문화 반영 질문. 인성과 실행력을 동시에 보여줘야 함.',
    ans:`믿을 수 있는 사람으로 기억되고 싶습니다. 특히 PR 담당자는 내부 여러 팀에서 자료와 정보를 받아야 하는 포지션이라, 약속한 것은 반드시 지키고 결과물을 정확하게 내는 신뢰가 중요하다고 생각합니다. 그리고 기술적인 내용도 쉽게 설명해주는 사람이라는 평을 듣고 싶습니다. 개발팀이 설명하기 어려운 것을 기자가 이해할 수 있게 번역하는 게 제 역할이니까요.`,
    points:['신뢰·실행력', 'PR 포지션 인식', '번역자 역할 정의']
  }
];

let filtered = [...ALL_QUESTIONS];
let current = 0;
let memoStore = {};

function filterCat(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  filtered = cat === '전체' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.cat === cat);
  current = 0;
  renderQ();
}

function renderQ() {
  const doneCard = document.getElementById('doneCard');
  const qCard = document.getElementById('qCard');
  const progressInfo = document.getElementById('progressInfo');
  const progressBar = document.getElementById('progressBar');

  if (current >= filtered.length) {
    qCard.style.display = 'none';
    doneCard.style.display = 'block';
    progressInfo.textContent = '';
    progressBar.style.width = '100%';
    return;
  }

  doneCard.style.display = 'none';
  qCard.style.display = 'block';

  const q = filtered[current];
  const total = filtered.length;
  const pct = Math.round(((current + 1) / total) * 100);

  progressBar.style.width = pct + '%';
  progressInfo.textContent = `${current + 1} / ${total} 문항`;

  const memoKey = `${q.cat}_${current}_${q.q.slice(0, 10)}`;
  const savedMemo = memoStore[memoKey] || '';

  const catName = { '자기소개':'자기소개', '경력경험':'경력·경험', 'PR전문성':'PR 전문성',
    '기업이해':'기업 이해', '약점극복':'약점 극복', '케이스':'상황·케이스', '인성가치관':'인성·가치관', '면접후기':'🔥 면접후기' }[q.cat];

  qCard.innerHTML = `
    <div class="q-header">
      <span class="q-counter">${current + 1} / ${total}</span>
      <span class="cat-badge cat-${q.cat}">${catName}</span>
    </div>
    <div class="q-body">
      <div class="q-text">${q.q}</div>
      ${q.tip ? `<div class="q-tip">💡 ${q.tip}</div>` : ''}
      <div class="ans-wrap">
        <button class="ans-toggle" id="toggleBtn" onclick="toggleAns()">모범답변 보기 ▼</button>
        <div class="ans-box" id="ansBox">
          <p>${q.ans}</p>
          <div class="ans-point">핵심 포인트: ${q.points.map(p=>`<span>${p}</span>`).join('')}</div>
        </div>
      </div>
      <div class="memo-wrap" style="margin-top:12px;">
        <div class="memo-label">📝 내 메모 (자동 저장)</div>
        <textarea id="memoArea" placeholder="내 답변 초안이나 보완할 점을 적어두세요..." onchange="saveMemo('${memoKey}')">${savedMemo}</textarea>
      </div>
    </div>
    <div class="nav-bottom">
      <button class="nav-btn nav-prev" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← 이전</button>
      <button class="nav-btn nav-next" onclick="next()">${current === filtered.length - 1 ? '완료 🎉' : '다음 →'}</button>
    </div>
  `;
}

function toggleAns() {
  const box = document.getElementById('ansBox');
  const btn = document.getElementById('toggleBtn');
  const show = box.classList.toggle('show');
  btn.textContent = show ? '답변 닫기 ▲' : '모범답변 보기 ▼';
  btn.classList.toggle('open', show);
}

function saveMemo(key) {
  const ta = document.getElementById('memoArea');
  if (ta) memoStore[key] = ta.value;
}

function next() {
  const memoKey = `${filtered[current]?.cat}_${current}_${filtered[current]?.q.slice(0, 10)}`;
  const ta = document.getElementById('memoArea');
  if (ta) memoStore[memoKey] = ta.value;
  current++;
  renderQ();
  window.scrollTo({top: 0, behavior:'smooth'});
}

function prev() {
  const memoKey = `${filtered[current]?.cat}_${current}_${filtered[current]?.q.slice(0, 10)}`;
  const ta = document.getElementById('memoArea');
  if (ta) memoStore[memoKey] = ta.value;
  if (current > 0) current--;
  renderQ();
  window.scrollTo({top: 0, behavior:'smooth'});
}

function restart() {
  current = 0;
  renderQ();
  window.scrollTo({top: 0, behavior:'smooth'});
}

renderQ();
</script>
</body>
</html>
